body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部中品之上知母知母味苦寒無毒主消渴熱中除邪氣肢體浮腫下水補不足益氣療傷寒乆瘧煩熱脅下邪氣膈中惡及風汗内疸多服令人泄一名蚔音岐母一名連母一名野蓼一名地參一名水參一名水浚一名貨母一名蝭音匙音提又母一名女雷一名女理一名兒草一名鹿列一名韭逢一名兒踵草一名東根一名水須一名沈燔一名杜含切臣禹錫等謹按唐本一名昌支生河内川谷二月八月採根曝乾圖經曰知母生河内川谷今瀕河諸郡及解州滁州亦有之根黃色似菖蒲而柔潤藥至難死掘出隨生須燥乃止四月開青花八月結實二月八月採根暴乾用藥性論云知母君性平主治心煩躁悶骨熱勞來往生産後蓐勞腎氣勞憎寒虚損患人虚而口乾加而用之陶隱居云今出彭城似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止甚療熱結亦主瘧熱煩也郭云生山上葉如韭范子云提母出三輔黄白者善日華子云味苦甘治熱勞傳尸疰病通小腸消風痰止嗽潤心肺補虚乏安心止驚悸雷公云凡使先於槐砧上細剉焙乾木臼杵擣勿令犯鐵器聖惠方治妊娠月未足似欲産腹中痛用知母二兩末蜜丸如梧桐子大不計時候粥飲下二十丸楊氏方同貝母貝母味辛苦平微寒無毒主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗安五臟利骨髓一名空草一名藥實一名苦花一名苦菜一名商草一名勒母生晋地十月採根曝乾厚朴白薇爲之使惡桃花畏秦艽礜石莽草反烏頭圖經曰貝母生晋地今河中江陵府郢壽隨鄭蔡潤滁州皆有之根有辨子黃白色如聚貝子故名貝母二月生苗莖細青色葉亦青似蕎麥葉隨苗出七月開花碧緑色形如彭子花八月採又云四月蒜熟時採之良此藥亦治惡瘡唐人記其事云江左嘗有商人左膊上有瘡如人面亦無他苦商人戲滴酒口中其面亦赤色以物食之亦能食食多則覺膊内肉脹起或不食之則一臂痹有善醫者教其歷試諸藥金石草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毁其口灌之數日成痂遂愈然不知何疾也藥性論云貝母臣微寒治虚熱主難産作末服之兼治胞衣不出取七枚末酒下末點眼去膚翳主胸中逆氣療時疾黃疸與連翹同主項下瘤癭疾陶隱居云今出近道形似聚貝子故名貝母斷穀服之不饑唐本注云此葉似大蒜四月蒜熟時採良若十月苗枯根亦不佳也出潤州荆州襄州者最佳江南諸州亦有味甘苦不辛按爾雅一名商日華子云消痰潤心肺末和沙糖爲丸含止嗽燒灰油傅人畜惡瘡雷公云凡使先於柳木灰中炮令黃擘破去内口鼻上有米許大者心一小顆然拌糯米於鏊上同炒待米黃熟然後去米取出其中有獨顆團不作兩片無皺者號曰丹龍精不入用若誤服令人筋脉永不收用黃精小藍汁合服立愈别說云謹按貝母能散心胸鬱結之氣殊有功則詩所謂言採其虻者是也蓋作詩者本以不得志而言之今用以治心中氣不快多愁鬱者殊有功信矣白芷白芷味辛温無毒主女人漏下赤白血閉陰腫寒熱風頭侵目泪出長肌膚潤澤可作面脂療風邪久渴吐嘔兩脅滿風痛頭眩目癢可作膏藥面脂潤顔色一名芳草一名白茝一名囂許驕切一名莞一名苻蘺一名澤芬葉名蒚音歷麻可作浴湯生河東川谷下澤二月八月採根曝乾當歸爲之使惡旋復花圖經曰白芷生河東川谷下澤今所在有之吴地亦多根長尺餘白色粗細不等枝幹去地五寸已上春生葉相對婆娑紫色闊三指許花白微黃入伏後結子立秋後苗枯以黃澤者爲佳陶隱居云今出近道處處有之下濕地河東甚多葉亦可作浴湯道家以此香浴去尸蟲禹錫云按范子計然云白芷出齊郡以春取黃澤者善也藥性論云白芷君能治心腹血刺痛除風邪主女人血崩及嘔逆明目止泪出療婦人瀝血腰痛能蝕膿日華子云治目赤弩肉及補胎漏滑落破宿血補新血乳癰發背瘰癧腸風痔瘻排膿瘡痍疥癬止痛生肌去面皯疵𤻷雷公云凡採得後勿用四條作一處生者此名喪公藤兼勿用馬藺并不入藥中採得刮削上皮細剉用黄精亦細剉竹刀切二味各等分兩度蒸一伏時後取出於日中曬乾去黄精用之子母秘録治小兒身熱白芷煮湯浴之避風外臺秘要治丹癮疹白芷及根葉煮汁洗之效衍義曰白芷菹是也出吴地者良經曰能蝕膿今人用治帶下腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋爲敗膿血所致卒無已期須以此排膿白芷一兩單葉紅蜀葵根二兩芍藥根白者白礬各半兩礬燒枯别研餘爲末同以蠟丸如梧子大空肚及飯前米飲下十丸或十五丸俟膿盡仍别以他藥補之淫羊藿淫羊藿味辛寒無毒主陰痿絶傷莖中痛利小便益氣力强志堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫乆服令人無子一名剛前生上郡陽山山谷署預爲之使圖經曰淫羊藿俗名仙靈脾生上郡陽山山谷今江東陜西泰山漢中湖湘間皆有之此草似杏葉上有刺莖如粟稈根紫色有鬚四月開花白色亦有紫色碎小獨頭子五月採葉曬乾湖湘出者葉如小豆枝莖緊細經冬不凋根似黄連關中俗呼三枝九葉草苗高一二尺許根葉俱堪使陶隱居云服此使人好爲陰陽西川北部有淫羊一日百遍合蓋食藿所致故名淫羊藿唐本注云此草葉形似小豆而圓薄莖細亦堅所在皆有俗名仙靈脾者是也禹錫云按蜀本云淫羊藿温注云生處不聞水聲者良日華子云仙靈脾紫芝爲使得酒良治一切冷風勞氣補腰膝强心力丈夫絶陽不起女人絶陰無子筋骨攣急四肢不任及老人昏耄健忘俗名黄德祖千兩金乾鷄筋放杖草棄杖草雷公云凡使時呼仙靈脾須用夾刀夾去葉四畔花栨盡後細剉用羊脂相對拌炒過待羊脂盡爲度每修事一斤用羊脂四兩爲度也聖惠方治偏風手足不遂皮膚不仁宜服仙靈脾浸酒方仙靈脾一斤好者細剉以生絹袋盛於不津器中用無灰酒一剅浸之以厚紙重重密封不通氣春夏二日秋冬五日後旋開每日隨性暖飲之常令醺醺不得大醉若酒盡再合服之無不效驗合時切忌鷄犬見之經驗方治瘡子入眼以仙靈脾葳靈仙等分爲末食後米湯下一錢七小兒半錢匕食醫心鏡益丈夫興陽理脾膝冷淫羊藿一斤酒一斗浸經二日飲之佳黄芩黄芩味苦平大寒無毒主諸疾黃疸腸澼泄痢月水下血閉惡瘡疽蝕火瘍療痰熱胃中熱小便澀痛消穀利小腸女子血閉淋露下血小兒腹痛一名腐腸一名空腸一名内虚一名黃文一名經芩一名妬婦其子主腸癖膿血生歸山谷及冤句三月三日採根陰乾得厚朴黄連止腹痛得五味子牡蒙牡蠣令人有子得黄耆白斂赤小豆療鼠瘻山茱萸龍骨爲之使惡葱實畏丹砂牡丹藜蘆圖經曰黄芩生秭歸山谷及冤句今川蜀河東陜西近郡皆有之苗長尺餘莖幹麤如箸葉從地四面作叢生類紫草高一尺許亦有一莖者葉細長青色兩兩相對六月開花紫色根黄如知母粗細長四五寸二月八月採根暴乾用之張仲景治傷寒心下痞滿瀉心湯四方皆用黃芩以其主諸熱利小腸故也又太陽病下之利不止有下根黃苓黃連及主妊娠安胎故亦多用黃芩今醫家嘗用有效者因著之又千金方巴郡太守奏加减三黄丸療男子五勞七傷消渴不生肌肉婦人帶下手足寒熱者久服走及奔馬近頻有驗食禁猪肉又陶隱居云黄芩丸者名子芩仲景治雜病方亦多用之陶隱居云歸屬建平郡今第一出彭城鬱州亦有之圓者名子苓爲勝破者名宿芩其腹中皆爛故名腐腸惟取深色堅實爲好唐本注云葉細長兩葉相對作叢生亦有獨莖者今出沂州鄜州涇州者佳兖州者大實亦好名㹠尾芩也禹錫云按藥性論云黄芩臣味苦甘能治熱毒骨蒸寒熱往來腸胃不利破擁氣治五淋令人宣暢去關節煩悶解熱渴治熱腹中㽲痛心腹堅脹日華子云下氣主天行熱疾丁瘡排膿治乳癰發背千金翼方治淋黄芩四兩袋貯之水五升煑三升分三服梅師方治火丹杵黄芩末水調傅之狗脊狗脊味苦甘平微温無毒主腰背强關機緩急周痹寒濕膝痛頗利老人療失溺不節男子脚弱腰痛風邪淋露少氣目暗肩脊利俯仰女子傷中關節重一名百枝一名强膂一名扶蓋一名扶筋生常山川谷二月八月採根曝乾萆蘚爲之使惡敗醬圖經曰狗脊生常山川谷今太行山淄温眉州亦有根黑色長三四寸兩指許大苗尖細碎青色高一尺已來無花其莖葉似貫衆而細其根長而多歧似狗脊骨故以名之其肉青緑春秋採根暴乾用今方亦用金毛者藥性論云狗脊味苦辛微熱治男子女人毒風軟脚邪氣濕痹腎氣虚弱益男子續筋骨陶隱居云今山野處處有與菝葜相似而小異其莖葉少肥其節疏其莖大直上有刺葉圓有赤脉根凹凸巃嵸如羊角細强者是唐本注云此藥苗似貫衆根長多歧狀如狗脊骨其肉作青緑色今京下用者是陶所說乃有刺萆薢非狗脊也今江左俗尤用之禹錫云按吴氏云狗脊一名狗青一名赤節神農苦桐君黄帝岐伯雷公扁鵲甘無毒季氏小温如萆薢莖節如竹有刺葉圓赤根黄白亦如竹根岐伯經云莖無節葉端圓青赤皮白有赤脉雷公云凡使勿用透山藤其大𣍷根與透山藤一般只是入頂苦不可餌之凡修事細剉了酒拌蒸從已至申出曬乾用石龍芮石龍芮味苦平無毒主風寒濕痹心腹邪氣利關節止煩滿平腎胃氣補陰氣不足失精莖冷久服輕身明目不老令人皮膚光澤有子一名魯果能一名地椹一名石能一名彭根一名天豆生太山川澤石邊五月五日採子二月八月採皮陰乾大戟爲之使畏蛇蜕皮吴茱萸圖經曰石龍芮生泰山川澤石邊陶隱居云近道處處有之今惟出兖州一叢數莖青紫色每莖三葉其葉芮芮短小多刻缺子如葶藶而色黄五月採子二月八月採皮陰乾用能逐諸風除心熱躁蘇恭云俗名水堇苗如附子實如桑椹生下濕地此乃水堇非石龍芮也今兖州所生者正與本經陶說相合爲得其眞也陶隱居云今出近道子形粗似蛇床子而扁非眞好者人言是蓄菜子爾東山石上所生其葉芮芮短小其子狀如葶藶黄色而味小辛此乃實是也唐本注云今用者俗名水堇苗似附子實如桑椹故名地椹生下濕地五月熟葉子皆味辛山南者粒大如葵子關中河北者細如葶藶氣力劣於山南者陶以細者爲眞未爲通論又别録水堇云主毒腫癰癤瘡蛔蟲齒堇音謹陳藏器云苪子味辛按蘇别藥録云水堇主毒腫蛇蟲齒且水堇如蘇所注定是石龍芮更非别草爾雅云芨堇草郭注云烏頭苗也蘇又注天雄云石龍芮葉似堇草又名水堇如此則依蘇所注是水堇附子是堇草水堇堇草二物同名也禹錫云按藥性論云石龍芮能逐諸風主除心熱躁衍義曰石龍芮有兩種水中生者葉光而末圓陸生者葉有毛而末銳入藥須生水者陸生者謂之天炙取少葉揉繫臂上一夜作大泡如火燒者是惟陸生者補陰不足莖常冷失精餘如經茅根茅根味甘寒無毒主勞傷虚羸補中益氣除瘀血血閉寒熱利小便下五淋除客熱在腸胃止渴堅筋婦人崩中乆服利人其苗主下水一名蘭根一名茹根一名地菅一名地筋一名兼杜生楚地山谷田野六月採根圖經曰茅根生楚地山谷田野今處處有之春生苗布地如針俗間謂之茅針亦可噉甚益小兒夏生白花茸茸然至秋而枯其根至潔白亦甚甘美六月採根用陶隱居云此即今白茅菅詩云露彼菅茅其根如渣芹甜美服食此斷穀甚良俗方稀用唐本注云菅花味甘温無毒主衄血吐血灸瘡陳藏器云茅針味甘平無毒主惡瘡腫未潰者煮服之服一針一孔二針二孔生挼傅金瘡止血煮服之主鼻衂及暴下血成白花者功用亦同針即茅笋也又云屋茅主卒吐血細剉三升酒煑服一升屋上爛茅和醬汁研傅斑瘡蠶嚙瘡一名百足蟲茅屋滴溜水殺雲母毒日華子云茅針凉通小腸癰毒輭節不作頭濃煎和酒服花罯刀箭瘡止血并痛根主婦人月經不匀又云茅根通血脉淋瀝是白花茅根也肘後方療熱取白茅根四升剉水一斗五升煑取五升適冷煖飲之日三又治竹木刺肉紫菀紫菀味苦辛温無毒主飲逆上氣胸中寒熱結氣去勞傷痿蹶安五臟療咳唾膿血止喘悸五勞體虚補不足小兒驚癇一名紫蒨一名青苑生房陵山谷及眞定邯鄲二月三月採根陰乾款冬爲之使惡天雄瞿麥雷丸遠志茵蔯蒿圖經曰紫菀生房陵山谷及眞定邯鄲今耀城泗壽臺孟州興國軍皆有之三月内布地生苗葉其葉三四相連五月六月内開黃紫白花結黑子本有白毛根甚柔細二月三月内取根陰乾用又有一種白者名白菀古今傳信方用之最要近醫療久嗽不差此方甚佳紫菀去蘆頭款冬花各一兩百部半兩三物擳羅爲末每服三錢七生薑三片烏梅一個同煎湯調下食後欲卧各一服陶隱居云近道處處有生布地花亦紫本有白毛根甚柔細有白者名白菀不復用唐本注云白菀即女菀也療體與紫菀同無紫菀時亦用白菀陶云不復用或是未悉禹錫云按藥性論云紫菀臣味苦平能治尸疰補虚下氣及胸脅逆氣治百邪鬼魅勞氣虚熱日華子云調中及肺痿吐血消痰止渴潤肌膚添骨髓形似重臺根作節紫色潤輭者佳雷公云凡使先去髭有白如練色者號曰羊鬚草自然不同採得後去頭土了用東流水淘洗令淨用蜜浸一宿至明取於火上焙乾用凡修一兩用蜜二分千金方治婦人卒不得小便紫菀末以井花水服三撮便通小便血服五撮立止斗門方治纏喉風喉閉飲食不通欲死者用返魂草根莖淨洗内入喉中待取惡涎出即差神驗更以馬牙消津咽之即絶根本一名紫菀又南中呼爲液牽牛是也衍義曰紫菀用根其根細柔紫色益肺氣經具言之唐本注云無紫菀時用白菀菀即女菀也今本草無白菀之名蓋唐修本草删去紫草紫草味苦寒無毒主心腹邪氣五疸補中益氣利九竅通水道療腹腫脹滿痛以合膏療小兒瘡及面皶側加切一名紫丹一名紫芺哀老切生碭山山谷及楚地三月採根陰乾圖經曰紫草出碭山山谷及楚地今處處有之人家園圃中或種蒔其根所以染紫也爾雅謂之藐廣雅謂之茈䓞苗似蘭香節青二月有花紫白色秋實白三月採根陰乾治傷寒時疾發瘡𤺋不出者以此作藥使其發出韋宙獨行方治豌豆瘡煮紫草湯飲後人相承用之其效尤速藥性論云紫草亦可單用味甘平能治惡瘡瘑癬陶隱居云今出襄陽多從南陽新野來彼人種之即是今染紫者方藥家都不復用博物志云平氏陽山紫草特好魏國以染色殊黑比年東山亦種色小淺於此者雷公云凡使須用臘水蒸之待水乾取去頭并兩畔髭細剉用每修事紫草一斤用臘三兩於鐺中鎔鎔盡便投蠟水作湯用聖惠方治卒小便淋瀝痛紫草一兩擣爲散食前井水調下二錢七又治蟲咬紫草油塗之經驗後方治嬰兒童子患𤵜豆疾用紫草二兩細剉以百沸湯一大盞泡便以物合定勿令氣漏放如人體温量兒大小服半合至一合服此瘡雖出亦當减輕前胡前胡味苦微寒無毒主療痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱推陳致新明目益精二月八月採根曝乾半夏爲之使惡皂筴畏藜蘆圖經曰前胡舊不著所出州土今陜西漢梁江淮荆襄州郡及相州孟州皆有之春生苗青白色似斜蒿初出時有白芽長三四寸味甚香美又似芸蒿七月内開白花與葱花相類八月結實根細青紫色二月八月採暴乾今諸方所用前胡皆不同京師此地者色黄白枯脆絶無氣味江東乃有三四種一種類當歸皮斑黑肌黃而脂潤氣味濃烈一種色理黄白似人參而細短香味都微陶隱居云前胡似柴胡而柔軟爲療殆欲同而本經上品有茈胡而無此後來醫方用之亦有畏惡明畏惡非盡出本經也此近道皆有生下濕地出吴興者爲勝禹錫云按藥性論云前胡使味甘辛能去熱實下氣主時氣内外俱熱單煮服佳日華子云治一切勞下一切氣止嗽破癥結開胃下食通五臟主霍亂轉筋骨節煩悶反胃嘔逆氣喘安胎小兒一切疳氣越衢婺睦等處皆産七八月採外黑裏白雷公云凡使勿用野蒿根縁眞似前胡只是味咀咀酸若誤用令人胃反不受食若是前胡味甘微苦凡修事先用刀刮上蒼黑皮并髭土了細剉用甜竹瀝浸令潤於日中㬠乾用之外臺秘要治小兒夜啼前胡擣篩蜜丸如小豆日服一丸熟水下至五六丸以差爲度敗醬敗醬味苦鹹平微寒無毒主暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣除癰腫浮腫結熱風痹不足産後疾痛一名鹿腸一名鹿首一名馬草一名澤敗生江夏川谷八月採根曝乾圖經曰敗醬生江夏川谷今江東亦有之多生崗嶺間葉似水莨及薇銜叢生花黄根紫色似柴胡作陳敗醬氣故以爲名八月採根暴乾用陶隱居云出近道葉似狶薟根形似茈胡氣如敗豆醬故以爲名唐本注云不出近道多生崗嶺間葉似水莨及薇銜叢生花黄根紫作陳醬色葉殊不似狶薟禹錫云按藥性論云鹿醬臣敗醬是也味辛苦微寒治毒風㿏痹主破多年凝血能化膿爲水及産後諸病及腹痛餘疹煩渴日華子云味酸治赤眼障膜弩肉聤耳血氣心腹痛破癥結産前諸疾催生落胞血運排膿補瘻鼻洪吐血赤白帶下瘡痍疥癬丹毒又名酸益七八十月採雷公云凡使收得後便粗杵入甘草葉相拌對蒸從巳至未出焙乾去甘草葉取用楊氏産乳治蠼螋溺繞腰者煎敗醬汁塗之差白鮮白鮮味苦鹹寒無毒主頭風黄疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步療四肢不安時行腹中大熱飲水欲走大呼小兒驚癇婦人産後餘痛生上谷川谷及寃句四月五月採根陰乾惡螵蛸桔梗茯苓萆薢圖經曰白鮮生上谷川谷及冤句今河中江寧府滁州潤州亦有之苗高尺餘莖青葉稍白如槐亦似茱萸四月開花淡紫色似小蜀葵根似蔓菁皮黃白而心實四月八月採根陰乾用葛洪治鼠瘻已有口膿血出者白鮮皮煮汁服一升當吐鼠子乃愈陶隱居云近道處處有以蜀中者爲良俗呼爲白羊鮮氣息正似羊羶或名白羶唐本注云葉似茱萸苗高尺餘根白心實花紫白色根宜二月採若四五月採便虚惡也禹錫云按藥性論云白鮮皮臣治一切熱毒風惡風風瘡疥癬赤爛眉髮脱脆皮肌急壯熱惡寒主解熱黄酒黄急黃穀黃勞黃等良日華子云通關利九竅及血脉并一切風痹筋骨弱乏通小腸水氣天行時疾頭痛眼疼根皮良花功用同上以可作菜食又名金雀兒椒酸漿酸漿味酸平寒無毒主熱煩滿定志益氣利水道産難吞其實立産一名醋漿生荆楚川澤及人家田園中五月採陰乾圖經曰酸漿生荆楚川澤及人家田園中今處處有之苗似水茹而小葉亦可食實作房如囊囊中有子如梅李大皆赤黄色小兒食之尤有益可除熱陶隱居云處處人家多有葉亦可食子作房房中有子如梅李大皆黄赤色小兒食之能除熱亦主黃病多效禹錫云按蜀本注云根如菹芹白色絶苦擣其汁治黃病多效爾雅云箴寒漿注今酸漿草江東人呼曰苦箴千金方治婦人赤白帶下三葉酸漿草陰乾爲末空心温酒下三錢七靈苑方治卒患諸淋遺澁不止小便赤澁疼痛三葉酸漿草人家園林亭檻中著地開黄花味酸者是取嫩者淨洗研絞自然汁一合酒一合攪湯煖令空心服之立通衍義曰酸漿今天下皆有之苗如天茄子開小白花結青㲉熟則深㲉中子大如櫻亦紅色櫻中復有細子如落蘇子食之有青草氣此即苦躭也今圖經又立苦躭條顯然重復本經無苦躭紫參紫參味苦辛寒微寒無毒主心腹積聚寒熱邪氣通九竅利大小便療腸胃大熱唾血衂血腸中聚血癰腫諸瘡止渴益精一名牡蒙一名衆戎一名童腸一名馬行生河西及冤句山谷三月採根火炙使紫色畏辛夷圖經曰紫參生河西及冤句山谷今河中解晋齊及淮蜀州郡皆有之苗長一二尺根淡紫色如地黄狀莖青而細葉亦青似槐葉亦有似羊蹄者五月開花白色似葱花張仲景治痢紫參湯主之紫參半斤甘草二兩以水五升煎紫參取二升内甘草煎取半升分温二服藥性論云紫參使味苦能散瘀血主心腹堅脹治婦人血閉不通陶隱居云今方家皆呼爲牡蒙用之亦少唐本注云紫參葉似羊蹄紫花青穗皮紫黑肉紅白肉淺皮深所在有之藳本藳本味辛苦温微温微寒無毒主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悦顔色辟霧露潤澤療風邪嚲曳金瘡可作沐藥面脂實主風流四肢一名鬼卿一名地新一名微莖生祟山山谷正月二月採根曝乾三十日成惡䕡茹圖經曰藁本生祟山山谷今西川河東州郡及兖州杭州有之葉似白芷香又似芎藭但芎藭似水芹而大藁本葉細耳根上苗下似禾藁故以名之陶隱居云俗中皆用芎藭根鬚其形氣乃相類而桐君藥録說芎藭苗似藁本論說花實皆不同所生處又異今東山别有藁本形氣甚相似惟長大爾禹錫云按藥性論云藁本臣微温畏青葙子能治百六十種惡風鬼疰流入腰痛冷能化小便通血去頭風䵟疱日華子云治癇疾并皮膚疵皯酒齇粉刺石韋石韋味苦甘平無毒主勞熱邪氣五癃閉不通利小便水道止煩下氣通膀胱滿補五勞安五臟去惡風益精氣一名石䩾之夜切一名石皮用之去黄毛毛射人肺令人咳不可療生華陰山谷石上不聞水及人聲者良二月採葉陰乾滑石杏仁爲之使禹錫等按蜀本作絡石得菖蒲良圖經曰石韋生華陰山谷石上今晋絳滁海福州江寧府皆有之叢生石上葉如柳背有毛而斑點如皮故以名之以不聞水聲者良二月七月採葉陰乾用南中醫人炒末冷酒調服療發背甚效一名石皮福州自有一種石皮三月有花其月採葉煎浴湯主風又有生古瓦上名瓦韋治淋陶隱居云蔓延石上生葉如皮故名石韋今處處有以不聞水聲人聲爲佳出建平者葉長大而厚禹錫云按藥性論云石韋使微寒治勞及五淋胞囊結熱不通去膀胱熱滿萆薢萆薢味苦甘平無毒主腰背痛强骨節風寒濕周痹惡瘡不廖熱氣傷中恚怒陰痿失溺關節老血老人五緩一名赤節生眞定山谷二月八月採根曝乾薏苡爲之使畏葵根大黄茈胡牡蠣圖經曰萆薢生眞定山谷今河陜京東荆蜀諸郡有之根黄白色多節三指許大苗葉俱青作蔓生葉作三叉似山芋又似緑豆葉花有黄紅白數種亦有無花結白子者春秋採根暴乾舊說此藥有二種莖有刺者根白實無刺者根虚軟以軟者爲勝正元廣利方療丈夫腰脚痹緩急行履不穩者以萆薢二十四分合杜仲八分擣篩每日温酒和服三錢七增至五七忌食牛肉陶隱居云今處處有亦似菝葜而小異根大不甚有角節色小淺唐本注云此藥有二種莖有刺者根白實無刺者根虚軟内軟者爲勝葉似署預蔓生禹錫云按藥性論云萆蘚能治冷風𤸷痹腰脚不遂手足驚掣主男子䐴腰痛久冷是腎間有膀胱宿水日華子云治癰緩軟風頭旋癇疾補水臟堅筋骨益精明目中風失音時人呼爲白菝葜孫尚藥治腸痔漏如聖散萆蘚細剉貫衆逐葉擘下了去土等分搗羅末每服二錢温酒調下空心食前服杜蘅杜蘅味辛温無毒主風寒咳逆香人衣體生山谷三月三日採根熟洗曝乾圖經曰杜蘅舊不著所出州土今江淮間皆有之謹按山海經云天帝之山有草狀如葵其臭如蘼蕪名曰杜蘅可以走馬食之已癭郭璞注云帶之可以走馬或曰馬得之則健走爾雅謂之杜又名土鹵然杜若亦名杜蘅或疑是杜若據郭璞注云似葵而香故知是此杜蘅也藥性論云杜蘅使能止氣奔喘促消痰飲破留血主項間瘤癭之疾陶隱居云根葉都似細辛惟香小異爾處處有之方藥少用惟道家服之令人身衣香唐本注云杜蘅葉似葵形如馬蹄故俗云馬蹄香生必之陰水澤下濕地根似細辛白前等今俗以及己代之謬矣及己獨莖莖端四葉葉間白花殊無芳氣有獨服之令人吐惟療瘡疥不可亂杜蘅也白薇白薇味苦鹹平大寒無毒主暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱酸疼温瘧洗洗發作有時療傷中淋露下水氣利陰氣益精一名白幕一名薇草一名春草一名骨美久服利人生平原川谷三月三日採根陰乾惡黄耆大黄大戟乾薑乾漆山茱萸大棗圖經曰今陜西諸郡亦有之莖葉俱青頗類柳葉六七月開紅花結實根黃白色今云八月採陶隱居云近道處處有根狀如牛膝而短小方家多用療驚邪風狂疰病禹錫云按藥性論云白薇臣能治忽忽睡不知人百邪鬼魅葉用而實正空殻無復子爾日華子云瞿麥催生又名杜母草燕麥蘥麥又云石竹治痔瘻并瀉血作湯粥食并得雷公云凡使只用蕊殻不用花葉若一時使即空心令人氣咽小便不禁凡欲用須以堇竹瀝浸一伏時漉出㬠乾使用外臺秘要治鯁以瞿麥爲末水調方寸七千金方治産經數日不出或子死腹中母欲死以瞿麥煑濃汁服之梅師方治竹木刺入肉中不出瞿麥爲末水服方寸七或煮瞿麥汁飲之日三千金同崔氏方治魚臍瘡毒腫燒灰和油傅於腫上甚佳衍義曰瞿麥八政散用瞿麥今人爲至要藥若心經雖有熱而小腸虚者服之則心熱未退而小腸别作病料其意者不過爲心與小腸爲傳送故用此入小腸藥按經瞿并不治心熱若心無大熱則當止治其心若或制之不盡須當求其屬以衰之用八正散者其意如此玄參玄參味苦鹹微寒無毒主腹中寒熱積聚女子産乳餘疾補腎氣令人目明主暴中風傷寒身熱支滿狂邪忽忽不知人温瘧灑灑血瘕下寒血除胸中氣下水止煩渴散頸下核癰腫心腹痛堅癥定五臟久服補虚明目强陰益精一名重臺一名玄臺一名鹿腸一名正馬一名咸一名生河間川谷及冤句三月四月採根暴乾惡黄耆乾薑大棗山茱萸反藜蘆圖經曰玄參生河間及冤句今處處有之二月生苗葉似脂麻又如槐柳細莖青紫色七月開花青碧色八月採子黑色亦有白花莖方大紫赤色而有細毛有節若竹者高五六尺葉如掌大尖長如鋸齒其根尖長生青白乾即紫黑新者肥膩一根生五七枚三八九月采暴乾或云蒸日乾陶隱居云今出近道處處有莖似人參而長大根甚黑亦微香道家時用亦以合香唐本注云玄參根苗臭莖亦不似人參陶云道家亦以合香未見其理也日華子云治頭風熱毒遊風補勞虚損心驚煩躁劣乏骨蒸傳尸邪氣止徤忘消腫毒雷公云凡採得後須用蒲葉重重相隔入甑蒸兩伏時後出乾㬠使用時勿令犯銅餌之後噎人喉喪人目揀去蒲草盡了用之禹錫云按藥性論云玄參使一名逐馬味苦治暴結熱主熱風頭痛傷寒勞復散瘤癭瘰癧經驗方治患勞人燒香法玄參一斤甘松六兩爲末煉蜜一斤和匀入瓷瓶内封閉地中埋窨十日取出更用灰末六兩更煉蜜六兩和匀入瓶内封更窨五日取出燒令鼻中常聞其香疾自愈廣利方治瘰癧經年久不差生玄參搗碎傅上日二易之秦艽秦艽音交味苦辛平微温無毒主寒熱邪氣寒濕風痹肢節痛下水利小便療風無問新久通身攣急生飛烏山谷二月八月採根暴乾菖蒲爲之使圖經曰秦艽生飛烏山谷今河陜州軍多有之根上黄色相交紏長一尺已來粗細不等枝幹高五六寸葉婆娑連莖梗俱青色如萵苣葉六月開紫花似葛花當月結子每於春秋採根陰乾陶隱居云飛烏或是地名今出甘松龍洞蠶陵長大黃白色爲佳根皆作羅紋相交中多御土用之熟破除去方家多作秦膠字與獨活療風常用道家不須爾唐本注云今出涇州鄜州岐州者良本作札或作紏作膠正作艽也金釵股味甘平小毒解諸藥毒人中毒者煮汁服之亦生研更烈必大吐下如無毒亦吐去熱痰瘧瘴天行蠱毒喉閉生嶺南山谷根如細辛三四十莖一名三十根釵子股嶺南人用之離鬲草味辛寒有小毒主瘰癧丹毒小兒無辜寒熱大腹痞滿痰飲膈上熱生研絞汁服一合當吐出胸膈間宿物生人家階庭濕處高三二寸苗葉似羃䍥去瘧爲上江東有之北土無圖經衍義本草卷之十三
