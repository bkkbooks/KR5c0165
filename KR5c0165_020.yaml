body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋大醫助教辨驗藥材許洪校正木部上品桂桂味甘辛大熱有小毒主温中利肝肺氣心腹寒熱冷疾霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆能墮胎堅骨節通血脉理疏不足宣導百藥無所畏乆服神仙不老生桂陽二月八月十月採皮陰乾得人參麥門冬甘草大黄黄苓調中益氣得柴胡紫石英乾地黄療吐逆圖經曰菌桂生交趾山谷牡桂生南海山谷桂生桂陽舊經載此三種之異性味功用亦别而爾雅但言梫木桂一種郭璞云南人呼桂厚皮者爲木桂蘇恭以謂牡桂即木桂及單名桂者是也今嶺表所出則有筒桂肉桂桂心官桂板桂之名而醫家用之罕有分别者藥性論云桂心右亦名紫桂殺草木毒忌生葱味苦辛無毒主治九種心痛殺三蟲主破血通利月閉治軟脚痹不仁胞衣不下除欬逆結氣擁痹止腹内冷氣痛不可忍主下痢治鼻息肉陶隱居云按本經惟有菌牡二桂而桂用體大同小異今俗用便有三種以半卷多脂者單名桂入藥最多所用悉與前說相應仙經并有三桂常服食以葱涕合和雲母蒸化爲水者正此種爾令廣州者好湘州始興桂陽縣即是小桂亦有而不如廣州者交州桂州者形段小多脂肉亦好陳藏器云菌桂牡桂桂心已上三色并同是一物按桂林桂嶺因桂爲名令之所生不離此郡從嶺以南際海盡有桂樹惟柳象州最多味既辛烈皮又厚堅土人所採厚者必嫩薄者必老以老薄者爲一色以厚嫩者爲一色嫩既辛香兼又筒卷老必味淡自然板薄板薄者即牡桂也以老大而名焉筒卷者即菌桂也以嫩而易卷日華子云桂心治一切風氣補五勞七傷通心竅利關節益精明目暖腰膝破痃癖癥瘕消瘀血治風痹骨節攣縮續筋骨生肌肉雷公云凡使勿薄者要紫色厚者去上麤皮取心中味辛者使每斤大厚紫桂只取得五兩取有味厚處生用如未用即用重密熟并紙裹勿令犯風其州土只有桂草無桂心用桂草煮丹陽木皮遂成桂心凡使即單搗用之聖惠方治風頭痛每欲天陰雨風先發者用桂心一兩爲末以酒調如膏用傅頂上并額角又方治九種心痛妨悶用桂心等分爲末以酒一大盞煎至半盞去滓稍熱服立效又方治寒疝心痛四肢逆冷全不欲食用桂心一兩去皮擣羅爲散不計時候熱酒調下一錢七又方治産後惡血冲心痛氣悶欲絶用桂心二兩擣羅爲散狗膽汁和丸如櫻桃大不計時候熱酒磨下二丸外臺秘要方療小兒睡中遺尿不自覺桂末雄雞肝等分搗丸如小豆大温水下日三千金方治中風面目相引偏僻牙拘急舌不可轉桂心以酒煮取汁故布蘸揜病上正即止左喎㩉右右喎㩉左常用大效又方治卒中惡心痛桂心八分㕮咀以水四升煑取一升分二服肘後方治心腹俱脹痛短氣欲死或已絶桂二兩切以水一升二合煑取八合去滓頓服又方治中風四肢逆冷吐清水宛轉啼呼者取二兩㕮咀以水三升煑取二升去滓適寒温盡服梅師方蜀椒閉口者毒誤食之便氣欲絶或下白沫身體冷急煎桂汁服之多飲冷水一二升忽食飲吐漿煎濃豉汁頓服之又方治産後血泄不禁止餘血彌痛兼塊桂心乾薑等分爲末空心酒調服方寸匕抱朴子云桂可以合葱涕蒸作水亦可以竹瀝合餌之亦可以龜腦和而服之七年能步行水上長生不死又云趙他子服桂二十年足下毛生日行五百里力舉千斤牡桂味辛温無毒主上氣咳逆結氣喉痹吐吸心痛脅風脅痛温筋通脉止煩出汗利關節補中益氣乆服通神輕身不老生南海山谷菌桂味辛温無毒主百病養精神和顔色爲諸藥先聘通使乆服輕身不老面生光華媚好常如童子生交趾桂林山谷岩崖間無骨正圓如竹立秋採圖經曰文具桂條列仙傳曰范蠡好食桂飲水討藥人世世見之又曰桂父象林人常服桂皮葉以龜腦和服之韓終采藥詩曰暗河之桂實大如粟得而食之後天而老别說云今交廣商人所販及醫家見用唯陳藏器一說最近然筒厚實氣味重者宜入治臟及下焦藥輕薄者宜入治頭目發散藥故本經以菌桂養精神以牡桂利關節仲景傷寒論發汗用桂枝桂枝者枝條非身幹也取其輕薄而能發散又一種柳桂乃桂之嫩小枝條也尤宜入上焦藥衍義曰桂大熱素問云辛甘發散爲陽故漢張仲景桂枝湯治傷寒表虚皆須此藥是專用辛甘之意也本草第一又云療寒以熱藥故知三種之桂不取菌桂牡桂者蓋此二種性止温而已不可以治風寒之病獨有一字桂本經言甘辛大熱此正合素問辛甘發散爲陽之說尤知菌牡二桂不及也然本經止言桂仲景又言桂枝者蓋亦取其枝上皮其木身麤厚處亦不中用今又謂之官桂不知縁何而立名慮後世爲别物故書之又有桂心此則諸桂之心不若一字桂也松脂松脂味苦甘温無毒主疽惡瘡頭瘍白秃疥瘙風氣安五臟除熱胃中伏熱咽乾消渴及風痹死肌煉之令白其赤者主惡痹乆服輕身不老延年一名松膏一名松肪生太山山谷六月採松實味苦温無毒主風痹寒氣虚羸少氣補不足九月採陰乾松葉味苦温主風濕瘡生毛髮安五臟守中不饑延年禹錫按日華子松葉無毒松節温主百節久風風虚脚痹疼痛松根白皮主辟穀不饑圖經曰松脂生太山山谷今處處有之其用以通明如薰陸香顆者爲勝道人服餌或合茯苓松柏實菊花作丸皆先煉治其法用大釜加水置甑用白茅藉甑底又加黄砂於茅上厚寸許可矣然後布松脂於上炊以桑薪湯若减即添熱水常令滿候松脂盡入釜中乃出之投於冷水既凝又蒸如此三過其白如玉然後入藥亦可單服其實及根白皮古亦有服食法但今松實多作果品餘不聞堪入藥其花上黄粉名松黄山人及時拂取作湯點之甚佳但不堪停久陶隱居云採煉松脂法并在服食方中以桑灰汁或酒煑軟挼内寒水中數十過白滑則可用其有自流出者乃勝於鑿樹及煮用膏也其實不可多得推葉止是斷穀所宜細切如粟以水及麫飲服之亦有陰乾擣爲屑丸服者人患惡病服此無不差比來苦脚弱人釀松節酒亦皆愈松柏皆有脂潤又凌冬不凋理爲佳物但人多輕忽近易之爾禹錫云按藥性論松脂使味甘平殺蟲用之主耳聾牙有蚛孔少許咬之不落蟲自死能貼諸瘡膿血煎膏生肌止痛掏風蕭炳云又有五葉者一叢五葉如釵名五粒松道家服食絶粒子如巴豆新羅往往進之日華子云松脂潤心肺下氣除邪煎膏治瘻爛排膿又云松葉暖無毒炙罯凍瘡風濕瘡佳又云松節無毒治脚軟骨節風又云松根白皮味苦温無毒補五勞益氣聖惠方絶穀升仙不食法取松實搗爲膏酒調下三錢日三則不饑渴飲水勿食佗物百日身輕日行五百里又方服松葉令人不老身生緑毛輕身益氣服久不己絶穀不饑渴松葉不以多少細切更研每日食前以酒調下二錢亦可粥汁服之初服稍難久自便矣外臺秘要方集驗療齲齒取松脂如錐注齲孔内須臾齲蟲縁松脂出梅師方同又方治惡風疾松脂煉投冷水中二十遍蜜丸服三兩饑即服之日三鼻柱斷離者二百日瘥斷鹽及房室又方療歷節諸風百節酸痛不可忍松脂三十斤煉五十遍不能五十遍亦可二十遍用以煉酥三升温和松脂三升熟攪令極稠旦空腹以酒服方寸匕日三數食麫粥爲佳愼血腥生冷鮓物果子百瘥又方松節酒主歷節風四肢疼痛松脂二十斤酒五斗漬三七日服一合日五六服千金方治脚氣十二風痹不能行服更生散數劑及衆療不得力服此一劑便能行遠不過兩劑松葉酒松葉六十斤細剉㕮咀以水四石煮取四斗九升以釀五斗米如常法别煮松葉汁以漬米并饙飯泥釀封頭七日發澄飲之取醉得此酒力者甚衆梅師方治耳久聾松脂三兩煉巴豆一兩和熟搗可丸通過以薄綿裹内耳孔中日一度易孫尚藥治脚轉筋疼痛攣急者松節二兩細剉如米粒乳香一錢右件藥用銀石器内慢火炒令焦只留一分性出火毒研細每服一錢至二錢熱木瓜酒調下應是筋病皆治之鬼遺方治疥癬松膠香研細入少輕粉凡疥癬上先用油塗了錯末一日便乾頑者三兩度傷寒類要治天行病辟瘟方切松葉如末酒服方寸七日三辟五年瘟抱朴子云趙瞿病癩歷年醫不瘥家乃賫糧棄送於山穴經月有仙人經穴見之取囊中藥賜之教其服百餘日瘡愈顔色悦肌膚潤仙人再過視之瞿乞其方仙人曰此是松脂汝可煉服之長服身轉輕力百倍登危陟險終日不困年百歲齒不墮髮不白夜卧常見有光大如鏡野人閑話云伏虎尊師篇煉松脂法十斤松脂五度以水煑度令苦味盡取得後每一斤煉了松脂入四兩茯苓末每晨水下一刀圭即終年不食而復延齡身輕清爽槐實槐實味苦酸鹹寒無毒主五内邪氣熱止涎唾補五傷五痔火瘡婦人乳瘕子臟急痛以七月七日取之搗取汁銅器盛之日煎令可作丸大如鼠屎内竅中三易乃愈又墮胎久服明目益氣頭不白延年枝主洗瘡及陰囊下濕癢皮主爛瘡根主喉痹寒熱生河南平澤可作神燭景天爲使圖經曰槐實生河南平澤今處處有之其木有極高大者謹按爾雅槐有數種葉大而黑者名櫰槐晝合夜開者名守宫槐葉細而青緑者但謂之槐其功用不言有别四月五月開花六月七月結實七月七日採嫩實擣取汁作煎十月採老實入藥皮根採無時今醫家用槐者最多春採嫩枝煅爲黑灰以揩齒去蚛燒青枝取瀝以塗癬取花之陳乆者篩末飲服以治下血折取嫩房角作湯以當茗主頭風明目補腦煑白皮汁以治口齒及下血水令黑子以變白髮木上耳取末服方寸七治大便血及五痔脱肛等皆常用有以效者藥性論云槐子臣主治大熱難産皮煑汁淋陰囊墜腫氣痛又云槐白皮味苦無毒能主治口齒風熱𧏾血以煎漿水煑含之煎淋浴男子陰疝卵腫陶隱居云槐子以相連多者爲好十月前採之新盆盛合泥百日皮爛爲水核如大豆服之令腦滿髮不白而長生今處處有之云七月取其子未堅固擣絞取汁日華子云槐子治丈夫婦人陰瘡濕癢催生吞七枚又云槐皮平治中風皮膚不仁喉痹浸洗五痔并一切惡瘡婦人産門癢痛及湯火瘡煎膏止痛長肉消癰腫雷公云凡採得後去單子并五子者只取二子三子以用銅錘捶破烏牛乳浸一宿蒸過用千金方療胎赤眼取槐木枝如馬鞭大長二尺作二段齊頭麻油一匙置銅鉢中旦使童子一人以其木研之全瞑止令仰卧以塗向眼毗日三度瘥千金翼方療腸痔每大便常下血槐樹上木耳取末飲服方寸匕日三服百一方治中風身直不得屈伸反覆者取槐皮黄白者切之以酒或水六升煮取二升去滓經驗方治下血槐花荆芥穗等分爲末酒調下一錢七梅師方治痔有蟲咬穀道癢或下膿血多取槐白皮濃煮汁安盆坐湯之虚其穀道冷更暖良乆欲大便當蟲出不過三度即愈如用末綿裹内下部食醫心鏡方治野雞痔下血腸風明目方嫩槐葉一斤蒸如造炙法取葉碾作末如茶法煎呷之廣利方治妊娠難産令易方水吞槐子七枚即出廣濟方療牙齒疼痛取槐樹白皮一握切以酢一升煮去滓用鹽少許適寒温含之日三易子母秘録日月未足而欲産者槐木東枝令孕婦手把即易産産寳方療崩中不止不問年月遠近方槐耳燒作灰爲末以酒服方寸匕太清草木方槐者虚星之精以十月上巳日採子服之去百病長生通神衍義曰槐實止言實今當分爲二實本出莢中若擣莢作煎者當言莢也莢中子大如豆堅而紫色者實也今本條不析出莢與莢中子義其用各别皆疏導風熱槐花味苦平無毒治五痔心痛眼赤殺腹臟蟲及熱治皮膚風并腸風瀉血赤白痢并炒服葉平無毒煎湯治小兒驚癇壯熱疥癬及丁腫皮莖同用圖經曰見槐實條下簡要濟衆治婦人漏下血不絶槐花鵝不以多少燒作灰細研食前温酒服二錢匕枸杞枸杞味苦寒根大寒子微寒無毒主五内邪氣熱中消渴周痹風濕下胸脅氣客熱頭痛補内傷大勞嘘吸堅筋骨强陰利大小腸久服堅筋骨輕身不老耐寒暑一名杞根一名地骨一名枸忌一名地輔一名羊乳一名却暑一名仙人杖一名西王母杖生常山平澤及諸丘陵阪岸冬採根春夏採葉秋採莖實陰乾圖經曰枸杞生常山平澤及丘陵阪岸今處處有之春生苗葉如石榴葉而軟薄堪食俗呼爲甜菜其莖𦼮高三五尺作叢六月七月生小紅紫花隨便結紅實形微長如棗核其根名地骨春夏採葉秋採莖實冬採根謹按爾雅云枸杞檵郭璞云今枸杞也詩小雅四牡云集於苞杞陸機疏云一名苦杞一名地骨春生作羹茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣藥性論云枸杞臣子葉同說味甘平能補益精血不足易顔色變白明目安神令人長壽葉和羊肉作羹益人甚除風明目若渴可煮作飲代茶飲之白色無刺者良陶隱居云今出堂邑而石頭烽大樓下最多其葉可作羹味小苦俗諺云去家千里勿食蘿摩枸杞此言其補益精氣强盛陰道也蘿摩一名苦丸葉厚大作藤生摘亦有白乳汁人家多種之可生啖亦蒸煮食也枸杞根實爲服食家用其說甚美仙人之杖遠有㫖乎禹錫云按爾雅疏云杞一名枸檵郭璞云今枸杞也詩四牡云集於苞杞陸機云一名苦杞一名地骨春生作羹茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣爾抱朴子云家柴一名托盧或名天精或名却老又名地骨日華子云一名地仙苗除煩益志補五勞七傷壯心氣去皮膚骨節間風消熱毒散瘡腫雷公云凡使根掘得後使東流水浸以物刷上土了然後待乾破去心用熟甘草湯浸一宿然後焙乾用其根若似物命形狀者上春食葉夏食子秋冬食根并子也食療云寒無毒葉及子并堅筋能老除風補益筋骨能益人去虚勞根主去骨熱消渴葉和羊肉作羹尤善益人代茶法煑汁飲之益陽事能去眼中風癢赤膜擣葉汁點之良千金方治肝虚或當風眼泪等新病方枸杞子最肥者二升搗破内絹袋置罐中以酒一斗浸訖密封勿泄氣三七日每旦開服任往勿醉經驗方金髓煎枸杞子不計多少逐日旋採摘紅熟者去嫩蒂子揀令潔淨便以無灰酒於淨器浸之須是瓮用酒浸以兩月爲限用蠟紙封閉緊密無令透氣候日數足漉出於新竹器内盛貯旋於沙盆中研令爛細然後以細布濾過候研濾皆畢去滓不用即并前漬藥酒及濾過藥汁攪匀量銀鍋内多少升斗作番次慢火熬成膏切須不住手用物攪恐粘底不匀候稀稠得所然后用淨瓶器盛之勿令泄氣每早辰温酒下二大匙頭夜卧服之百日中身輕氣壯積年不廢可以羽化經驗後方治五勞七傷庶事衰弱枸杞葉半斤切粳米二合以石器中相和煮作粥以五味末葱白等調和食之孫眞人備急方治滿口齒有血枸杞根爲末煎湯嗽後吃又治上膈吐血妙沈存中方陜西枸杞長一二丈其圍數寸無刺根皮如厚朴甘美異於諸處生子如櫻桃全少核暴乾如餅極爛有味外臺秘要方療眼暴天行腫癢痛地骨皮三斤水三斗煮取三升絞去滓更内鹽二兩煎取二升傅目或加乾薑二兩治疽方凡患癰疽惡瘡出膿血不止者取地骨皮不拘多少淨洗先刮上面麤皮留之再刮取細白穰取麤皮同地骨一處煎湯淋瘡上令膿血盡以細穰貼之有效衍義曰枸杞當用梗皮地骨當用根皮枸杞子當用其紅實是一物有三用其皮寒根大寒子微寒亦三等此正是孟子所謂性由杞柳之杞後人徒勞分别又爲之枸棘兹强生名耳凡杞未有無棘者雖大至有成架然亦有棘但此物小則多刺大則少刺還如酸棗及棘其實皆一也今人多用其子直爲補腎藥是曾未考究經意當更量其虚實冷熱用之乾州柏實柏實味甘平無毒主驚悸安五臟益氣除風濕痹療恍惚虚損吸吸歷節腰中重痛益血止汗久服令人潤澤美色耳目聰明不饑不老輕身延年生太山山谷柏葉尤良柏葉味苦微温無毒主吐血衄血痢血崩中赤白輕身益氣令人耐寒暑去濕痹止饑四時各依方面採陰乾柏白皮主火灼爛瘡長毛髮牡蠣及桂瓜子爲之使畏菊花羊蹄諸石及麫麴圖經曰柏實生太山山谷今處處有之而乾州者最佳三月開花九月結子候成熟收採蒸暴乾春礧取熟人子用其葉名側柏密州出者尤佳雖與他柏相類而其葉皆側向而生功效殊别採無時張仲景方療吐血不止者柏葉湯主之青柏葉一把乾薑三片阿膠一挺炙三味以水二升煑一升去滓别絞馬通汁一升相和合煎取一升綿濾一服盡之藥性論云柏子仁君惡菊花畏羊蹄草味甘辛能治腰腎中冷膀胱冷濃宿水興陽道益壽去頭風治百邪鬼魅小兒驚癇又云側柏葉君與酒相宜止尿血味苦辛性行治冷風歷節疼痛唐本注云柏枝節煮釀酒主風痹歷節風燒取末療瘑疥及癩瘡良今出陜州宜州爲勝日華子云柏子仁治風潤皮膚此是側柏子入藥微炒用雷公云凡使先以酒浸一宿至明漉出㬠乾却用黄精自然汁於日中煎手不住攪若天久陰即於鐺中著水用瓶器盛柏子仁著火緩緩煑成煎爲度每煎三兩柏子仁用酒五兩浸乾爲度聖惠方治時氣瘴疫用社中西南柏樹東南枝取曝乾擣羅爲末以水調下一錢七日三四服肘後方同又方治大風疾令眉鬢再生用側柏葉九蒸九暴搗羅爲末煉蜜和丸如梧桐子大日三服夜一服熟水下五丸十丸百日即生經驗後方治霍亂轉筋先以裹脚然後以柏樹木細剉煮湯淋之孫眞人枕中記云採松柏法嘗以三月四月採新生松葉可長三四寸許并花蕊取陰乾細搗爲末其柏葉取深山岩谷中採當年新生可長三二寸者陰乾細擣爲末用白蜜爲丸如小豆大常以月一十五日日未出時燒香東向手持藥八十一丸以酒下服一年延十年命服二年延二十年命欲得長肌肉加大麻巨勝欲心力壯徤者加茯苓人參此藥除百病益元氣添五臟六腑清明耳目强壯不衰老延年益壽神驗用七月七日露水丸之更佳服時乃咒曰神仙眞藥體合自然服藥入腹天地齊年咒訖服藥斷諸雜肉五辛最切忌愼之姚氏方治鼠瘻腫核痛未成膿以柏葉傅著腫上熬鹽著腫上熨令熱氣下即消抱朴子漢武帝時獵者於終南山見一人無衣服身皆生黑毛跳坑越澗如飛乃密伺其所在合圍取得乃是一婦人問之言我是秦之宫人關東賊至秦王出降驚走入山饑無所食泊欲饑死有一老公教我吃松柏葉實初時苦澀後稍便吃遂不復饑冬不寒夏不熱此女是秦人至成帝時三百餘載也列仙傳曰赤松子好食柏實齒落更生别說云謹按隱居說柏忌取冢墓上者今云出乾州者最佳則乾州柏茂大者皆是乾陵所出他處皆無大者但取其州土所宜子實氣味豐美可也乾陵之柏異於他處其木未有無文理者而其文多爲菩薩雲氣人物鳥獸狀極分明可觀有盜得一株徑尺者可直萬錢關右人家多以爲貴宜其子實最佳又以枝節燒油膏傅惡瘡久不差有蟲者牛馬畜産有瘡疥名爲重病以傅之衍義曰柏取儲以療馬瘑疥今未見用松儲老人虚秘柏子仁大麻子仁松子仁等同研溶白蠟丸桐子大以少黃丹湯服二三十丸食前嘗官陜西每登高望之雖千萬株皆一一西指蓋此木至堅之木不畏霜雪得木之正氣他木不逮也所以受金之正氣所制故一一向之西京茯苓茯苓味甘平無毒主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩懣咳逆口焦舌乾利小便止消渴好唾大腹淋瀝膈中痰水水腫淋結開胸府調臟氣伐腎邪長陰益氣力保神守中乆服安魂養神不饑延年一名茯菟其有抱根者名茯神茯神平主辟不祥療風眩風虚五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神生太山山谷大松下二月人月採陰乾馬間爲之使得甘草防風芍藥紫石英麥門冬共療五臟惡白斂畏牡蒙地榆雄黄秦艽龜甲圖經曰茯苓生太山山谷今泰華嵩山皆有之出大松下附根而生無苗葉花實作塊如拳在土底大者至數斤似人形龜形者佳皮黑肉有白赤二種或云是多年松脂流入土中變成或云假松氣於本根上生今東人採之法山中古松久爲人斬伐者其枯折槎枿枝葉不復上生者謂之茯苓神仙方多單餌之其法取白茯苓五斤去黑皮搗篩以熟絹囊盛於三斗米下蒸之米熟即止曝乾又蒸如此三過乃取牛乳二斗和合著銅器中微火煮如膏收之每食以竹刀割取隨性任飽服之則不饑如欲食先煮葵菜汁飲之任食無礙舊說琥珀是千年茯苓所化一名江珠張茂先云今益州永昌出琥珀而無茯苓又云燒蜂窠所作二說張皆不能辨按南蠻地志云村邑多琥珀云是松脂所化又云楓脂爲之彼人亦不復知地中有琥珀則傍無草木入土淺者五尺深者或八九尺大者如斛削去皮初如桃膠久乃堅凝其方人以爲枕然古今相傳是松類故附於茯苓耳藥性論云茯苓臣忌米醋能開胃止嘔逆善安心神主肺痿痰壅治小兒驚癇療心腹脹滿婦人熱淋赤者破結氣又云茯神君味甘無毒主驚癇安神定志補乏主心下急痛堅滿人虚而小腸不利加而用之其心名黄松節偏治中偏風口之喎斜毒風筋攣不語心神驚掣虚而健忘陶隱居云按藥無馬間或是馬莖聲相近故也今出鬱州彼土人乃假研松作之形多小虚赤不佳自然成者大如三四升器外皮黑細皺内堅白形如鳥獸龜鱉者良通神而致靈和魂而煉魄明竅而益肌厚腸而開心調榮而理胃上品仙藥也其有銜松根對度者爲茯神是其次茯苓後結一塊也仙方惟云茯苓而無茯神爲療既同用之亦應無嫌范子云茯苓出嵩高三輔淮南子云下有茯苓上有菟絲注云茯苓千歲松脂也菟絲生其上而無根一名女蘿也典術云茯苓者松脂入地千歲爲茯苓望松樹赤者下有之廣志云茯神松汁所作勝茯苓或曰松根茯苓貫著之生朱提漢陽縣日華子云茯苓補五勞七傷安胎暖腰膝開心益智止徤忘忌酸及酸物雷公云凡採得後去皮心神了擣令細於水盆中攪令濁浮者去之是茯苓筋若誤服之令人眼中童子白黑晴點小兼盲目甚忌之聖惠方治面皯疱及産婦黑疱如雀卵色用白茯苓末蜜和傅之經驗後方養老延年服茯苓方華山挺子茯苓研削如棗許大令四方有角安於新瓷瓶内以好酒浸以三重紙封其頭後一百日開其色當如餳糖可日食二塊百日後肌體潤澤服一年後可夜視物久久食之腸化爲筋可延年耐老面若童顔孫眞人枕中記服百日百病除二百日夜如晝二年後役使鬼神四年後玉女來侍抱朴子云任子季服茯苓十八年玉女從之能隱能彰不食穀灸瘢滅面生光玉澤神仙服茯苓法白茯苓去皮酒浸十五日漉出爲散每服三錢水調下日三衍義曰茯苓乃樵斫訖多年松根之氣所生此蓋根之氣味噎鬱未絶故爲是物然以由土地所宜與不宜其津氣盛者方發泄於外結爲茯苓故不抱根而成物既離其本體則有苓之義茯神者其根但有津氣而不甚盛故止能伏結於本根既不離其本故曰茯神此物行水之功多益心脾不可闕也或曰松既樵矣而根尚能生物乎答曰如馬勃菌五芝木耳石耳之類皆生於枯木石糞土之上精英未淪安得不爲物也其上有菟絲下有茯苓之說甚爲輕信琥珀味甘平無毒主安五臟定魂魄殺精魅邪鬼消瘀血通五淋生永昌圖經曰文具茯苓條下藥性論云琥珀君治百邪産後血疹痛陶隱居云舊說云是松脂淪入地千年所化今燒之亦作松氣俗有琥珀中有一蜂形色如生博物志又云燒蜂窠所作恐非實此或當蜂爲松脂所粘因墜地淪没爾亦有煮蝦鷄子及青魚枕作者并非眞惟以拾芥爲驗俗中多帶之辟惡刮屑服療瘀血至驗陳藏器云琥珀止血生肌合金瘡和大黄鱉甲作散子酒下方寸匕下惡血婦人腹内血盡即止宋高祖時寧州貢琥珀枕碎以賜軍士傅金瘡漢書云出罽賔國初如桃膠凝乃成焉雷公云凡用紅松脂石珀水珀花珀物象珀瑿珀琥珀紅松脂如琥珀只是濁太脆文黄水珀多無紅色如淺黄多麤皮皺石珀如石重色黄不堪用花珀文似新馬尾松心文一路赤一路黄物象珀其内自有物命動此使有神妙瑿珀其珀是衆珀之長故號曰瑿珀琥珀如血色熱於布上拭吸得芥子者眞也夫入藥中用水調側柏子末安於瓷鍋子中安琥珀於末中了下火煑從巳至申别有異光别擣如粉重篩用衍義曰琥珀今西戎亦有之其色差淡而明澈南方者色深而重濁彼土人多碾爲物形若謂千年茯苓所化則其間有沾着蜾蠃蜂蟻宛然完具者是極不然也地理志云林邑多琥珀實松脂所化然耳此說爲勝但土地有所宜故有能化有不能化者通典曰南蠻海南林邑國秦象郡林邑縣多出琥珀松脂淪入地下及傍不生草木深八九尺大如斛削去皮成焉初如桃膠凝成乃堅夐光彩甚麗外臺秘要治魚鯁骨橫喉中琥珀珠一物貫串着繩推令前入至鯁所又復推以牽引出矣又方從高墜下若爲重物所頓笮得瘀血刮琥珀屑酒服方寸匕取蒲黄二三七服日四五度榆皮榆皮味甘平無毒主大小便不通利水道除邪氣腸胃邪熱氣消腫性滑利久服輕身不饑其實尤良療小兒頭瘡痂疕花主兒癇小便不利傷熱一名零榆生潁川山谷二月採皮取白暴乾八月採實并勿令中濕濕則傷人藥性論云榆白皮滑能主利五淋治不眠療齁取白皮陰乾後焙杵爲末每日朝夜用水五合末二錢煎如膠服瘥陶隱居云此即今榆樹剥取皮刮除上赤皮亦可臨時用之性至滑利初生莢人以作糜羹令人多睡嵇公所謂榆令人瞑也斷穀乃屑其皮并檀皮服之即令人不饑孟詵云生皮主暴患赤腫以皮三兩搗和三年醋滓封之日六七易亦治女人妬乳腫服丹石人採葉生服一兩頓佳子作醬食能助肺殺諸蟲下氣令人能食消心腹間惡氣卒心痛食之良外臺秘要治渴小便利非淋方榆皮二片去黑皮以水一斗煮取五升一服三合日三服千金方五色丹俗名油腫若犯多致死不可輕之以榆白皮末和鷄子白傅之備急方療身體暴腫滿榆皮搗屑隨多少雜米作粥食小便利子母秘録方療奸娠胎死腹中或母病欲下胎榆白皮煮汁服二升别說云謹按榆白皮焙乾爲末婦人奸娠臨月日三服方寸匕令産極易生産下兒身皆塗之信其驗也又濕搗治如糊用粘瓦石極有力京東西北人以石爲碓觜每用此以膠之衍義曰榆皮今初春先生莢者是去上皺澀乾枯者將中間嫩處剉乾磑爲粉當歉歲農將以代食葉青嫩時收貯亦用以爲羹茹嘉祐年過豐沛人闕食鄉民多食此酸棗酸棗味酸平無毒主心腹寒熱邪結氣聚四肢酸疼濕痹煩心不得眠臍上下痛血轉久泄虚汗煩渴補中益肝氣堅筋骨助陰氣令人肥健乆服安五臟輕身延年生河東川澤八月採實陰乾四十日成惡防己圖經曰酸棗生河東川澤今近京及西北州郡皆有之野生多在坡坂及城壘間似棗木而皮細其木心赤色莖葉俱青花似棗花八月結實紫紅色似棗而圓小味酸當月採實取核中仁陰乾四十日成爾雅辨棗之種類曰實小而酸曰樲棗孟子曰養其樲棗趙岐注所謂酸棗是也陶隱居云今出東山間云即是山棗樹子子似武昌棗而味極酸東人乃啖之以醒睡唐本注云此即樲棗實也樹大如大棗實無常形但大棗中味酸者是本經惟用實療不得眠不言用仁今方用其仁補中益氣自補中益肝已下此爲酸棗仁之功能又於下品白棘條中復云用其實今醫以棘實爲酸棗大誤今注陶云醒睡而經云療不得眠蓋其子肉味酸食之使不思睡核中仁服之療不得眠正如麻黄發汗根節止汗也此乃棘實更非他物若謂是大棗味酸者全非也酸棗小而圓其核中仁微扁大棗仁大而長不類也日華子云酸棗仁治臍下滿痛雷公云酸棗仁凡使採得後㬠乾取葉重拌酸棗仁蒸半日子去尖皮了任研用聖惠方治膽虚睡卧不安心多驚悸用酸棗仁一兩炒令香熟搗細爲散每服二錢竹葉湯調下不計時候又方治骨蒸勞心煩不得眠卧用酸棗仁一兩水一大盞半研絞取汁下米二合煮粥候熟下地黄汁一合更候煮過不計時候食之外臺秘要療齒蟲腐爛棘針二百枚即是棗樹朽落地者以水二升煎取一升含之瘥簡要濟衆方治膽風毒氣虚實不調昏沉睡多酸棗仁一兩生用金挺臘茶二兩以生薑汁塗炙令微焦擣羅爲末每服二錢水七分煎六分無時温服衍義曰酸棗微熱經不言用仁仍療不得眠天下皆有之但以土産宜與不宜嵩陽子曰酸棗縣即滑之屬邑其木高數丈味酸醫之所重今市人賣者皆棘子此說未盡殊不知小則爲棘大則爲酸棗平地則易長居崖塹則難生故棘多半崖塹上久不樵則成榦人方呼爲酸棗更不言棘徒以世人之意如此在物則曷若是也其實一本以其不甚爲世所須及礙塞行路故成大木者少多爲人樵去然此物纔及三尺便開花結子但窠小者氣味薄木大者氣味厚又有此别今陜西臨潼山野所出者亦好亦土地所宜也并可取仁後有白棘條乃是酸棗未長大時枝上刺也及至長成其刺亦少實亦大故棗取大去木刺取小窠也亦不必强分别爾檗木檗木黄檗也味苦寒無毒主五臟膓胃中結熱黄疸腸痔止泄痢女子漏下赤白陰傷蝕瘡療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神根一名檀桓主心腹百病安魂魄不饑渴久服輕身延年通神生漢中山谷及水昌惡乾漆圖經曰檗木黄檗也生漢中山谷及永昌今在處有之以蜀中者爲佳木高數丈葉類茱萸及椿揪葉經冬不凋皮外白裏深黄色根如松下茯苓作結塊五月六月採皮去皴麤暴乾用其根名檀桓别有一種多刺而小細葉者名刺檗不入藥用又下品有小檗條木如石榴皮黃子赤如枸杞兩頭尖人對以黄今醫家亦稀用藥性論云黄檗使平主男子陰痿治下血如鷄肝片及男子莖上瘡屑末傅之陶隱居云今出邵陵者輕薄色深爲勝出東山者厚而色淺其根於道家入木芝品今人不知取服之又有小樹狀如石榴皮黄而苦俗呼爲子檗亦主口瘡又小樹多刺皮亦黄亦主口瘡日華子云安心除勞治骨蒸洗用明目多泪口乾心熱殺蛔蟲治蛔心痛疥瘡蜜炙治鼻洪腸風瀉血後分急熱腫痛身皮力微次於根雷公曰凡使用刀削上麤皮子用生蜜水浸半日漉出日乾用蜜塗文武火炙令蜜盡爲度凡修事五兩用蜜三兩外臺秘要方口中及舌生癰爛剉黄檗含之千金方能治小兒重舌以黄檗苦竹瀝浸瀝點舌上肘後方咽喉卒腫食飲不通黃檗薄傅腫上冷復易之用苦酒和末佳葛氏方卒喉痹取黄檗片切含之又黄檗一斤㕮咀酒一斗煮三沸去滓恣飲便愈經驗方治嘔血黄檗好者以蜜塗之乾杵末用麥門冬熟水調下二錢匕立瘥梅師方治癰疽發背或發乳房初起微赤不急治之即煞人擣黄檗末和雞子白塗之深師方療傷寒熱病口瘡黃檗皮削去上麤皮取裏好處薄削以崖蜜漬之一宿唯欲令濃含其汁良乆吐更含若胸中熱有瘡時飲之五合尤佳聖惠方同衍義曰檗木今用皮以蜜匀炙與青黛各一分同爲末入生龍腦一字研匀治心脾熱舌頭生瘡當摻瘡上有涎即吐又張仲景檗皮湯無不驗傷寒論中已著楮實楮實味甘寒無毒主陰痿水腫益氣充肌膚明目久服不饑不老輕身生少室山一名榖實所在有之八月九月採實日乾四十日成葉味甘無毒主小兒身熱食不生肌可作浴湯又主惡瘡生肉樹皮主逐水利小便莖主癮𤺋癢單煮洗浴皮間白汁療癬圖經曰楮實生少室山今所在有之此有二種一種皮有斑花文謂之斑穀今人用爲冠者一種皮無花枝葉大相類但取其葉似葡萄葉作瓣而有子者爲佳其實初夏生如彈大青緑色至六七月漸深紅色乃成熟八月九月採水浸去皮穰取中子日乾仙方單服其實正赤時收取中子陰乾篩末水服二錢七益乆乃佳醫方但貴楮實餘亦稀用俚俗或取其木枝中白汁塗癬甚效藥性論云皮木亦可單用味甘平無毒能治水腫氣滿葉乾炒末溲麵作䬪飥食主水痢陶隱居云此即今穀樹也仙方採搗取汁和丹用亦乾服使人通神見鬼南人呼榖紙亦爲楮紙武陵人作榖皮衣又甚堅好爾日華子云楮實壯筋骨助陽氣補虚勞助腰膝益顔色皮斑者是楮皮白者是穀又云楮葉凉無毒治刺風身癢此是斑穀樹雷公云凡使採得後用水浸三日將物攪旋投水浮者去之然後日乾却用酒浸一伏時了便蒸從巳至亥出焙令乾用聖惠方治癬濕癢用楮葉半斤細切擣封傅癬上抱朴子云楮實赤者服之老者成少令人夜應徹視見鬼神道士梁頓年七十乃服之更少壯到百四十歲能夜出行及走馬修眞秘㫖曰服楮實者轉爲骨軟矣槐膠主一切風化涎治肝臟風筋脉抽掣及急風口噤或四肢不收頑痹或毒風周身如蟲行或破傷風口眼偏斜腰脊强硬任作湯散丸煎雜諸藥用之亦可水煮和諸藥爲丸及作湯下藥新定瑿烏兮切味甘平無毒古來相傳云松脂千年爲茯苓又千年爲琥珀又千年爲瑿然二物燒之皆有松氣爲用與琥珀同補心安神破血尤善狀似玄玉而輕出西戎來而有茯苓處見無此物今西州南三百望磧中得者大則方尺黑潤而輕燒之腥臭高昌人名爲木瑿謂玄玉爲石瑿洪州土石間得者燒作松氣破血生肌與琥珀同見風拆破不堪爲器量此二種及琥珀或非松脂所爲也有此差舛今略論也新見唐本陳藏器云蘇於琥珀注後出瑿功狀按瑿本功外小兒帶之辟惡磨滴目翳赤障等太平廣記云梁四公子傳曰交河之間平漬中掘深一丈下有瑿珀黑逾鈍漆或大如車輪末服之攻婦人小腸癥𤸅諸疾圖經衍義本草卷之二十
