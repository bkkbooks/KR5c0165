  text: 圖經衍義本草卷之十一父四
  hash: sha256:468842fc363201b6ed365562cad05a37787bd9a62214e57605caa77ece2589b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_011-001a, image: hfl/0539/0539-004.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部上品之下天名精明州天名精味甘寒無毒主瘀血血瘕欲死下血止血利小便除小蟲去痹除胸中結熱止煩渴逐水大吐下久服輕身耐老一名麥句薑一名蝦蟆藍一名豕首一名天門精一名工門精一名彘顱一名蟾蜍蘭一名覲生平原澤五月採垣衣為之使圖經曰天名精生平原川澤今江湖間皆有之夏秋抽條頗如薄荷花紫白色葉如菘菜而小故南人謂之地菘香氣似蘭故名蟾蜍蘭狀如藍故名蝦蟆藍其味甘辛故名麥句薑一名豕首爾雅所謂茢薽豕首是也江東人用以熬煼蠶蛹五月採此草既名地菘下品又有地菘藥性論云麥句薑使味辛治瘡止血及鼻衄不止陶隱居云即今人呼為豨蘞亦名豨首夏月搗汁服之除熱病味至苦而云甘恐或非是陳藏器云天名精本經一名麥句薑蘇云鹿活草也爾雅云大鞠蘧麥注云麥句薑蘧麥即今瞿麥然終非麥句薑爾雅注錯如此陶公注鉤樟條云有一草似狼牙氣辛臭名為地菘人呼為劉燼草主金瘡言劉燼昔曾用之異苑云青州劉燼宋元嘉中射獐剖五臟以此草塞之蹶然而起燼怪之拔草便倒如此三度燼密録此草種之主傷折多愈因以名焉既有活鹿之名雅與獐事相會陶蘇兩説俱是地菘功狀既同定非二物唐本注云鹿活草是也别録一名天蔓菁南人名為地菘味甘辛故有薑稱狀如藍故名蛤蟆藍香氣似蘭故名蟾蜍蘭主破血生肌止渴利小便殺三蟲除諸毒腫丁瘡瘻痔金瘡內射身癢癮疹不止者揩之立已其豨蘞苦而臭名精乃辛而香全不相類爾雅云茢薽豕首釋曰藥名也一名麥秋薑郭云江東豨首可以炒蠶蛹者三蒼云煼熬也決明子眉州決明子味鹹苦甘平微寒無毒主青盲目淫膚赤白膜眼赤痛泪出療唇口青久服益精光輕身生龍門川澤石決明生豫章十月十日採陰乾百日蓍實為之使惡大麻子圖經曰決明子生龍門川澤今處處有之人家園圃所蒔夏初生苗高三四尺許根帶紫色葉似苜蓿而大七月有花黃白花其子作穗如青緑豆而鋭十月十日採陰乾百日藥性論云決明臣利五臟常可作菜食之又除肝家熱朝朝取一匙挼令淨空心吞之百日夜見光陶隱居云龍門乃在長安北今處處有之葉如茳芏子形似馬蹄呼為馬蹄決明用之當搗細又别有草決明是萋蒿子在下品中也日華子云馬蹄決明助肝氣益精水調末塗消腫毒協太陽穴治頭痛又貼腦心止鼻洪作枕勝黑豆治頭風明目也禹錫云按唐本云石決明是蚌蛤類形似紫貝附見别出在魚獸條中皆主明目故并有決明之名俗方惟以療眼也道術時須蜀本圖經云葉似苜蓿而闊大夏花秋生子作角實似馬蹄俗名馬蹄決明今出廣州桂州十月採子陰乾外臺祕要方治積年失明不識人決明子二升杵散食後以粥飲服方寸七衍義曰決明子苗高四五尺春亦為蔬秋深結角其子生角中如羊腎今湖南北人家園圃所種甚多或在村野或成段種蜀本圖經曰葉似苜蓿而闊大甚為允當丹參隨州丹參味苦微寒無毒主心腹邪氣腸鳴幽幽如走水寒熱積聚破癥除瘕止煩滿益氣養血去心腹痼疾結氣腰脊強腳痹除風邪留熱久服利人一名郤蟬草一名赤參一名木羊乳生桐柏山川谷及太山五月採根暴乾畏鹹水反藜蘆圖經曰丹參生桐柏山川谷及太山今陜西河東州郡及隨州亦有之二月生苗高一尺許莖簳方稜青色葉生相對如薄荷而有毛三月開花紅紫色似蘇花根赤大如指長亦尺餘一苗數根五月採暴乾又云冬月採者良夏月採者虛惡藥性論云丹參臣平能治腳弱疼痹主中惡治百邪鬼魅腹痛氣作聲音鳴吼能定精神陶隱居云桐柏山在義陽非江東臨海之桐柏也今近道處處有莖方有毛紫花時人呼為逐馬酒漬飲之療風痹道家時有用處時人服多眼赤故應性熱今云微寒恐為謬矣日華子云養神定志通利關脈治冷熱勞骨節疼痛四肢不遂排膿止痛生肌長肉破宿血補新生血安生胎落死胎止血崩帶下調婦人經脈不勻血邪心煩惡瘡疥癬癭贅腫毒丹毒頭痛赤眼熱溫狂悶又名山參蕭炳云酒浸服之治風軟腳可逐奔馬故名奔馬草曾用有效聖惠方治寒疾小腹及陰中相引痛白汗出欲死丹參二兩杵為散每服熱酒調下二錢七千金方治落胎身下有血丹參十二兩以酒五升煮取二升溫服一升溫三服梅師方治中熱油及火燒除外痛丹參八兩細銼以水微調取羊脂二斤煎三上三下以傅瘡上肘後方同茜根茜根味苦寒無毒主寒濕風痹黃疸補中止血內崩下血膀胱不足踒跌蠱毒久服益精氣輕身可以染絳一名地血一名茹蘆一名茅鬼一名蒨生喬山川谷二月三月採根暴乾畏鼠姑圖經曰陸機草木疏云茹蘆茅鬼蒨草也齊人謂之茜徐州人謂之牛蔓二三月採根暴乾藥性論云茜根味甘主治六極傷心肺吐血瀉血用之陶隱居云此則今染絳茜草也東間諸處乃有而少不如西多今俗道經方不堪服用此當以其為療少而豐賤故也詩云茹蘆在坂者是陳藏器云茜根主蠱煮汁服之今之染緋者字亦作蒨周禮庶氏掌除蠱毒以嘉草攻之嘉草蘘荷與茜主蠱為最也日華子云味醶止鼻洪帶下産後血運乳結月經不止腸風痔瘻排膿治瘡癤泄精尿血撲損瘀血酒煎服殺蠱毒入藥銼炒用雷公云凡使勿用赤柳草根真似茜根只是味酸澀不入藥中用若服能令人患內障眼速服甘草水解之即毒氣散禹錫云按蜀本圖經云染緋草葉似棗葉頭尖下闊莖葉俱澀四五葉對生節間蔓延草木上根紫赤色令所在有八月採根簡要濟衆方治吐血茜草一兩生搗羅為散每服二錢水一中盞煎七分放冷食後服傷寒類要方治中蠱毒或吐下血如爛肝茜草根蘘荷葉根各三兩切以水四升煮取一服去滓適寒溫頓服即愈五味子越州號州五味子味酸溫無毒主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精養五臟除熱生陰中肌一名會及一名玄及生齊山山谷及代郡八月採實陰乾蓯蓉為之使惡萎蕤勝為頭圖經曰今河東陜西州郡尤多而杭越間亦有春初生苗引赤蔓於高木其長六七尺葉尖圓似杏葉三四月開黃白花類小蓮花七月成實如踠豆許大生青熟紅紫爾雅云菋荎蕏注云五味也蔓生子叢莖端疏云一名菋一名荎蕏今有數種大抵相近而以味甘者為佳藥性論云五味子君能治中下氣止嘔逆補諸虛勞令人體悅澤除熱氣病人虛而有氣兼嗽加用之陶隱居云今第一出高麗多肉而酸甜次出青州冀州味過酸其核并似豬腎又有建平者少肉核形不相似味苦亦良此藥多膏潤烈日暴之乃可搗篩道方亦須用唐本注云五味皮肉甘酸核中辛苦有鹹味此則五味具也日華子云明目暖水臟治風下氣消食霍亂轉筋痃癖賁豚冷氣消水腫反胃心腹氣脹止渴除煩熱解酒毒壯筋骨雷公云凡小顆皮皺治者有白撲鹽霜一重其味酸鹹苦辛甘味全者真也抱朴子云移門子服五味子十六年面色如玉女入水不霑入火不灼衍義曰五味子今華州之西至秦州皆有之方紅熟時採得蒸爛研瀘汁去子熬成稀膏量酸甘入蜜再火上待蜜熟俟冷器中貯作湯肺虛寒人可化為湯時時服作果可以寄遠本經言溫令食之多致虛熱小兒益甚藥性論以謂除熱氣日華子云謂暖水臟又曰除煩熱後學至此多惑今既用之治肺虛寒則更不取除煩熱之説補下藥亦用之入藥生曝不去子旋花池州旋花味甘溫無毒主益氣去面皯黑色媚好其根味辛主腹中寒熱邪氣利小便久服不飢輕身一名筋根花一名金沸一名美草生豫州平澤五月採陰乾圖經曰南人皆呼為續筋根苗作叢蔓葉似山芋而狹長花白夏秋間遍田野根無毛節蒸煮堪啖甚甘美五月採花陰乾二月八月採根日乾花今不見用者下品有旋復花與此殊别陶隱居云東人呼為山薑南人呼為美草根似杜若亦似高良薑腹中冷痛煮服甚效作丸散服之辟穀止飢近有人從南還遂用此術與人斷穀皆得半年百日不飢不瘦但志淺嗜深不能久服爾其葉似薑花赤色味辛美子狀如豆蔻此旋花之名即是其花也今山東甚多陳藏器云旋花本功外取根食之不飢又取根苗搗絞汁服之主丹毒小兒毒熱根主續筋骨合金瘡陶注誤而唐注是也唐本注云此即生平澤旋葍是也其根似筋故一名筋根旋徐兖反花陶所證真山薑爾陶復於下品旋葍注中云此根出河南北國來根似芎藭惟膏中用今復道似高良薑二説自相矛盾且此根味甘山薑味辛都非此類其旋葍膏療風逐水止用花言根亦無妨然不可以杜若亂之也又將旋葍花名金沸作此别名非也别録云根主續筋也救急方續斷筋法取旋葍草根淨洗去土搗量瘡大小傅之日一二易之乃瘥止一名肫腸草俗謂鼓子花也黔南出一種旋花粗莖大葉無花不作蔓怨别是一物也衍義曰旋花蔓生今之河北京西關陜田野中甚多最難鋤艾治之又生世人謂之鼓子花言其形肖也四五月開花亦有多葉者其根寸截置土下頻灌溉方涉旬苗已生蜀本圖經是矣蛇床子南州蛇床子味苦辛甘平無毒主婦人陰中腫痛男子陰痿濕癢除痹氣利關節癲癇惡瘡溫中下氣令婦人子藏熱男子陰強久服輕身好顔色令人有子一名蛇粟一名蛇米一名虺床一名思益一名繩毒一名棗棘一名墻蘼生臨淄川谷及田野五月採實陰乾惡牡丹巴豆貝母圖經曰蛇床子三月生苗高二三尺葉青碎作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月開白花又似散水子黃褐色如黍米至輕虛五月採實陰乾藥性論云蛇床子君有小毒治男子婦人虛濕痹毒風瘡痛去男子腰疼浴男女陰去風冷大益陽事主大風身癢煎湯浴之差療齒痛及小兒驚癇陶隱居云近道田野墟落間甚多花葉正似蘼蕪唐本注云爾雅一名盱日華子云治暴冷暖丈夫陽氣助女人陰氣撲損瘀血腰跨疼陰汗濕癬四肢頑痹赤白帶下縮小便凡合藥取食即挼去皮殼取仁微炒殺毒即不辣作湯洗病則生使雷公云凡使須用濃藍汁并百部草根自然汁二味同浸二伏時漉出日乾却用生地黃汁相拌蒸從午至亥日乾用此藥只令陽氣盛數號曰鬼考也禹錫等按蜀本圖經云似小葉芎藭花白子如黍粒黃白色生下濕地今所在皆有出揚州襄州者良採子暴乾千金方治産後陰下脫蛇床子絹袋盛蒸尉之又方治小兒癬瘡蛇床子末和豬脂塗之金匱方溫中坐藥蛇床子散方蛇床子仁為末以白粉少許和令勻相得如棗大綿裹內之自然溫矣地膚子密州蜀州地膚子味苦寒無毒主膀胱熱利小便補中益精氣去皮膚中熱氣散惡瘡疝瘕強陰久服耳目聰明輕身耐老使人潤澤一名地葵一名地麥生荆州平澤及田野八月十月採實陰乾圖經曰地膚子生荆州平澤及田野今蜀川關中近地皆有之初生薄地五六寸根形如蒿莖赤葉青大似荆芥三月開黃白花八月九月採實陰乾用陶隱居謂莖苗可為掃帚者蘇恭云苗極弱不能勝舉二説不同而今醫家便以為獨掃是也故蘇注云其葉味苦寒無毒主大腸泄瀉止赤白痢和氣澀腸胃解惡瘡毒三四月五月採藥性論云地膚子君一名益明與陽起石同服主丈夫陰痿不起補氣益力治陰卵㿉疾去熱風可作湯沐浴陶隱居云今田野間亦多皆取莖苗為掃帚子微細入補丸散用仙經不堪用唐本注云地膚子田野人名為地麥草葉細莖赤多出熟田中苗極弱不能勝舉今云堪為掃帚恐人未識之别録云搗取絞汁主赤痢洗目去熱暗雀盲苗灰主痢亦善北人亦名涎衣草外臺祕要方治目痛及眯忽中傷因有熱暝者取地膚子白汁注目中又方治手足煩疼地膚草三兩水四升煮取二升半分三服日一劑肘後方治積年久疢腰痛有時發動六月七月取地膚子乾末酒服方寸匕日五六服子母祕録方治妊娠患淋小便數去少忽熱痛酸索手足疼煩地膚子十二兩初以水四升煎取二升半分溫三服楊氏産乳療小便數多或熱痛酸楚手足煩疼地膚草三兩以水四升煮取二升半三服千歲虆兖州千歲虆汁味甘平無毒主補五臟益氣續筋骨長肌肉去諸痹久服輕身不飢耐老通神明一名虆蕪生太山川谷圖經曰千歲虆生太山川谷作藤生蔓延木上葉如葡萄而小四月摘其莖汁白而甘五月開花七月結實八月採子青黑微赤冬惟凋葉此即詩云葛虆者也蘇恭謂是櫻薁藤深為誤妄陶隱居陳藏器説最得之陶隱居云作藤生樹如葡萄葉如鬼排蔓延木上汁白今俗人方藥都不復識用此仙經數處須之而遠近道俗咸不識此非甚是異物正是末研訪尋識之爾草木疏云一名苣苽連蔓而生子赤可食毛詩云葛虆注云似葛之草也此藤大者盤薄故云千歲虆謂櫻薁者深是妄言日華子云味甘酸止渴性色年多大者佳莖葉同用又名櫻薁藤衍義曰千歲虆唐開元末訪隱民薑撫已幾百歲召至集賢院言服常春藤使白髮還鬒則長生可致藤生太湖終南往往有之帝遣使多取以賜老臣詔天下使自求之擢撫銀青光祿大夫號沖和先生又言終南山有旱藕餌之延年狀類葛粉帝取之作湯餅賜大臣右驍騎將軍甘守誠曰常春者千歲虆也旱藕者杜蒙也方家久不用撫易名以神之民間以酒漬藤飲者多暴死乃止撫內慚請求藥牢山遂逃去今書之以備世疑景天景天味苦酸平無毒主大熱火瘡身熱煩邪惡氣諸蠱毒痂疕寒熱風痹諸不足花主女人漏下赤白輕身明目久服通神不老一名戒火一名火母一名救火一名據火一名愼火生太山川谷四月四日七月七日採陰乾圖經曰景天生太山山谷今南北皆有之人家多種於中庭或以盆盛植於屋上云以辟火謂之愼火草春生苗葉似馬齒而大作層而上莖極脆弱夏中開紅紫碎花秋後枯死陶隱居云今人皆盆盛養之於屋上云以辟火葉療金瘡止血以洗浴小兒去煩熱驚風日華子云景天冷治心煩熱狂赤眼頭痛寒熱遊風丹腫婦人帶下禹錫云按蜀本圖經云愼火草葉似馬齒莧而大藥性諭云景天君有小毒能治風疹惡疰瘡小兒丹毒及治發熱驚疾花能明目外臺祕要方治癮疹以愼火草一斤搗絞取汁傅上熱炙摸之再三即差千金方治小兒丹發愼火草生一握搗絞汁以拭之㩉上日十遍夜三四遍談氏小兒方同楊氏産乳方療煙火丹發從背起或兩脅及兩足赤如火景天草真珠末一兩搗和如泥塗之又方療螢火丹從頭起愼火草搗和苦酒塗之衍義曰景天陶隱居既云今人皆盆盛養之於屋上即知是草藥又言廣州城外有一株云可三四圍呼為愼火木既曰云即非親見也蓋是傳聞亦非誤耳乃陶之輕聽也然極易種但折生枝置土中頻澆溉旬日便生根濃研取汁塗火心瘡甚驗乾為末水調掃遊風赤瘇頻熱者茵蔯蒿茵蔯蒿味苦平微寒無毒主風濕寒熱邪氣熱結黃疸通身發黃小便不利除頭熱去伏瘕久服輕身益氣耐老面白悅長年白兔食之仙生太山及丘陵坡岸上五月及立秋採陰乾圖經曰江寧府又有一種茵蔯葉大根粗黃白色至夏有花實階州有一種名白蒿亦似青蒿而背白本土皆通入藥用之今南方醫人用山茵蔯乃有數種本草論之但有茵蔯蒿而無山茵蔯本草注云茵蔯蒿葉似蓬蒿而緊細今京下北地用為山茵蔯者是也大體世方用山茵蔯療腦解傷寒發汗行肢節滯氣化痰利膈治勞倦諸家議論謂家茵蔯亦能解肌下膈去胸中煩方家少用但可研作飲服之本草所無自出俗方茵蔯蒿復當别是一物主療自異不得為山茵蔯此説亦未可據但以功較之則江南者為勝藥性論云茵蔯蒿使味苦辛有小毒治眼目通身黃小便赤陶隱居云今處處有似蓬蒿而葉緊細莖冬不死春又生惟入療黃疸用仙經云白蒿白兔食之仙而今茵蔯乃云此恐是誤爾陳藏器云茵蔯本功外通關節去滯熱傷寒用之雖蒿類苗細經冬不死更因舊苗而生故名茵蔯後加蒿字也今又詳此非菜中茵蔯也日華子云石茵蔯味苦涼無毒治天行時疾熱狂頭痛頭旋風眼疼瘴瘧女人癥瘕并悶損乏絶又名茵蔯蒿山茵蔯本出和州及南山嶺上皆有雷公云凡使須用葉有八角者採得陰乾去根細銼用勿令犯火千金方治遍身風癢生瘡疥茵蔯不計多少煮濃汁洗之立瘥食醫心鏡方茵蔯主除大熱黃疸傷寒頭痛風熱瘴癘利小便切煮羹生食之亦宜衍義曰茵蔯蒿張仲景治傷寒熱甚發黃者身面悉黃用之極效又一僧因傷寒後發汗不徹有留熱身面皆黃多熱期年不愈醫作食黃治之治不對病不去問之食不減尋與此藥服五日病減三分之一十日減三分之二二十日病悉去方用山茵蔯山梔子各三分秦艽升麻各四錢末之每用三錢水四合煎及二合去滓食後溫服以知為度然此藥以茵蔯蒿為本故書之杜若杜若味辛微溫無毒主胸脅下逆氣溫中風入腦户頭痛腫多涕泪出眩倒目䀮䀮莫郎切止痛除口臭氣久服益精明目輕身令人不忘一名杜蘅一名杜蓮一名白蓮一名白苓一名若芝生武陵川澤及冤句二月八月採根暴乾得辛夷細辛良惡柴胡前胡圖經曰杜若生武陵川澤及冤句今江湖多有之葉似薑花赤色根似高良薑而小辛味子如豆蔻二月八月採根暴乾用謹按此草一名杜蘅而中品自有杜蘅條杜蘅爾雅所謂土鹵者也杜若廣雅所謂楚蘅者也陶隱居云今處處有葉似薑而有文理根似高良薑而細味辛香又絶似旋復根殆欲相亂葉小異爾楚辭云山中人兮芳杜若此者一名杜蘅今復别有杜蘅不相似雷公云凡使勿用鴨喋草根真相似只是味效不同凡修事採得後刀刮上黃赤皮了細銼用三重絹作袋盛陰乾臨使以蜜浸一夜至明漉出用禹錫云按蜀本圖經云苗似山薑花黃赤子赤色大如棘子中似豆蔻今出硤州嶺南者好沙參淄州歸州沙參味苦微寒無毒主血積驚氣除寒熱補中益肺氣療胃痹心腹痛結熱邪氣頭痛皮間邪熱安五臟補中久服利人一名知母一名苦心一名志取一名虎鬚一名白參一名識美一名文希生河內川谷及冤句般陽續山二月八月採根暴乾惡防已反藜蘆圖經曰今出淄齊潞隨州而江淮荆湖州郡或有之苗長一二尺以來叢生崖壁間葉似枸杞而有叉牙七月開紫花根如葵根筋許大赤黃色中正白實者佳二月八月採根暴乾古方亦單用葛洪卒得諸疝小腹及陰中相引痛如絞白汗出欲死者搗篩末酒服方寸七立差藥性論云沙參臣能去皮肌浮風疝氣下墜治常欲眠養肝氣宣五臟風氣陶隱居云今出近道叢生葉似枸杞根白實者佳此沙參并人參是為五參其形不盡相類而主療頗同故皆有參名又有紫參正名牡蒙在中品唐本注云紫參牡蒙各是一物非異名也今沙參出華州為善日華子云補虛止驚煩益心肺并一切惡瘡疥癬及身癢排膿消腫毒徐長卿淄州泗州徐長卿味辛溫無毒主鬼物百精蠱毒疫疾邪惡氣溫瘧久服強悍輕身益氣延年一名鬼督郵生太山山谷及隴西三月採圖經曰徐長卿生太山山谷及隴西今淄齊淮泗間亦有之三月生青苗葉似小桑兩兩相當而有光潤七八月著子似蘿摩而小陶隱居云鬼督郵之名甚多今俗用徐長卿者其根正如細辛小短扁爾氣亦相似今狗脊散用鬼督郵當取其強悍宜腰腳所以知是徐長卿而非鬼箭赤箭唐本注云此藥葉似柳兩葉相當有光澤所在川澤有之根如細辛微粗長而有嬠氣今俗用代鬼督郵非也鬼督郵别有本條在下雷公云凡採得粗將拌少蜜令通用甕器皿盛蒸三伏時日乾用禹錫云按蜀本圖經云苗似小麥兩葉相對三月苗青七月八月著子似蘿摩子而小九月苗黃十月凋生下濕川澤之間今所在有之八月採日乾石龍芻味苦微寒微溫無毒主心腹邪氣小便不利淋閉風濕鬼疰惡毒補內虛不足痞滿身無潤澤出汗除莖中熱痛殺鬼疰惡毒氣久服補虛羸輕身耳目聰明延年一名龍鬚一名草續斷一名龍珠一名龍華一名懸莞一名草毒九節多味者良生梁州山谷濕地五月七月採莖暴乾陶隱居云莖青細相連實赤今出近道水石處似東陽龍鬚以作席者但多節爾陳藏器云按龍鬚作席彌敗有垢者取方尺煮汁服之主淋及小便卒不通今出汾州亦處處有之唐本注云别録云一名方賔主療蛔蟲及不消食爾今按别本注别録云微溫今之服用能除熱蓋不溫也禹錫云按蜀本圖經云莖如綖叢生俗名龍鬚草今人以為席所在有之八九月採根暴乾雲實雲實味辛苦溫無毒主泄痢腸澼殺蟲蠱毒去邪惡結氣止痛除寒熱消渴花主見鬼精物多食令人狂走殺精物下水燒之致鬼久服輕身通神明益壽一名員實一名雲英一名天豆生河間川谷十月採暴乾圖經曰雲實生河間川谷高五六尺葉如槐而狹長枝上有刺苗名臭草又名羊石子草花黃白色實若麻子大黃黑色俗名馬豆十月採暴乾用今三月四月採苗五月六月採實實過時即枯落治瘧藥中多用之陶隱居云今處處有子細如葶藶而小黑其實亦類莨菪燒之致鬼未見其法術唐本注云雲實大如黍及大麻子等黃黑似豆故名天豆叢生澤傍高五六尺葉如細槐亦如苜蓿枝間微刺俗謂苗為草雲母陶云似葶藶非也雷公云凡使採得後粗搗相對拌渾顆豫實蒸一日後出用禹錫云按蜀本圖經云葉似細槐花黃白其莢如大豆實青黃色大若麻子今所在平澤中有五月六月採實王不留行王不留行味苦甘平無毒主金瘡止血逐痛出刺除風痹內寒止心煩鼻衄癰疽惡瘡瘻乳婦人難産久服輕身耐老增壽生太山山谷二月八月採圖經曰王不留行生太山山谷今江浙及并河近處皆有之苗莖俱青高七八寸已來根色黃如薺根葉尖如小匙頭亦有似槐葉者四月開花黃紫色隨莖而生如菘子狀又似豬藍花五月內採苗莖曬乾用俗間亦謂之剪金草河北生者葉圓花紅與此小别張仲景治金瘡八物王不留行散小瘡粉其中大瘡但服之産婦亦服正元廣利方療諸風痙有王不留行湯最好陶隱居云今處處有人言是蓼子亦不爾葉似酸漿子似菘子而多入癰瘻方用之日華子云治發背遊風風疹婦人血經不勻及難産根苗花子通用又名禁宫花剪金花雷公云凡採得拌渾蒸從已至未出却下漿水浸一宿至明出焙乾用之梅師方治竹木針刺在肉中不出疼痛以王不留行為末熟水調方寸七即出地不容地不容味苦大寒無毒主解蠱毒止煩熱辟瘴癘利喉閉及痰毒一名解毒子生山西谷採無時圖經曰地不容生戎州味苦大寒無毒蔓生葉青如杏葉而大厚硬凌冬不凋無花實根黃白色外皮微粗褐纍纍相連如藥實而圓大能解蠱毒辟瘴氣治咽喉閉塞鄉人亦呼為解毒子也飛廉味苦平無毒主骨節熱脛重酸疼頭眩頂重皮間邪風如蜂螫針刺魚子細起熱瘡癰疽痔濕痹止風邪咳嗽下乳汁久服令人身輕益氣明目不老可煮可乾一名漏蘆一名天薺一名伏豬一名飛輕一名伏兔一名飛雉一名木禾生河內川澤正月採根七月八月採花陰乾得為頭良惡麻黃陶隱居云處處有之似苦芺惟葉下附莖輕有皮起似箭羽葉又多刻缺花紫色俗方殆無用而道家服其枝莖可得長生又入視枕方今既别有漏蘆則非此别名爾禹錫云按蜀本圖經云葉似苦芺莖似軟羽紫花子毛白今所在平澤皆有五月六月採蕭炳云小兒疳痢為散以漿水下之大效千金翼方治疳𧈟食口齒及下部飛廉蒿燒灰搗篩以兩錢匕著痛處甚痛忍之若不痛非疳也下部蟲如馬尾大相纏出無數十日瘥二十日平復蘭草味辛平無毒主利水道殺蠱毒辟不祥除胸中痰癖久服益氣輕身不老通神明一名水香生大吳池澤四月五月採衍義曰蘭草諸家之説異同是曾未的識故無定論葉不香惟花香今江陵鼎澧州山谷之間頗有山外平田即無多生陰地生於幽谷益可驗矣葉如麥門冬而闊且韌長及一二尺四時常青花黃中間葉上有細紫點有春芳者為春蘭色深秋芳者為秋蘭色淡秋蘭稍難得二蘭移植小檻中置座右花開時滿室盡香與他花香又别唐白樂天有種蘭不種艾之詩正為此蘭矣今未見用者本經蘇注八月花白此即澤蘭也忍冬味甘溫無毒主寒熱身腫久服輕身長年益壽十二月採陰乾陶隱居云今處處皆有似藤生凌冬不凋故名忍冬人取煮汁以釀酒補虛療風仙經少用此既長年益壽甚可常採服凡易得之草而人多不肯為之更求難得者是貴遠賤近之情乎禹錫云按藥性論云忍冬亦可單用味辛主治腹脹滿能止氣下辟肘後方飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便作風者淫躍四肢不知痛之所在每發昏恍得風雪便作沉尸者纏骨結臟衝心脅每發絞切遇寒冷便作尸注者舉身沉重精神錯雜常覺昏廢每節氣改變輒發大惡此一條别有治後尉也忍冬莖葉銼數斛煮令濃取汁煎之服如雞子一枚日二三服薇銜味苦平微寒無毒主風濕痹歷節痛驚癇吐舌悸氣賊風鼠瘻癰腫暴癥逐水療痿蹶久服輕身明目一名糜銜一名承膏一名承肌一名無心一名無顚生漢中川澤及冤句邯鄲七月採莖葉陰乾得秦皮良陳藏器云婦人服之絶産無子唐本注云此草叢生似茺蔚及白頭翁其葉有毛莖赤療賊風大效南人謂之吳風草一名鹿銜草言鹿有疾銜此草差又有大小二種楚人猶謂大者為大吳風草小者為小吳風草也白兔藿味苦平無毒主蛇虺蜂蠆猘狗菜肉蠱毒鬼疰風疰諸大毒不可入口者皆消除之又去血可末著痛上立消毒入腹者煮飲之即解一名白葛生交州山谷陶隱居云此藥療毒莫之與敵而人不復用殊不可解都不聞有識之者想當似葛爾須别廣訪交州人未得委悉唐本注云此草荆襄間山谷大有苗似蘿摩葉圓厚莖俱有白毛與衆草異蔓生山南俗謂之白葛用療毒有效禹錫云按蜀本圖經云蔓生葉圓若蓴今襄州北汝州南岡上有五月六月採苗日乾海藥云主風邪熱極宜煮白兔藿飲之乾則搗末傅諸毒妙鬼督郵味辛苦平無毒主鬼疰卒忤中惡心腹邪氣百精毒溫瘧疫疾強腰腳益膂力一一名獨搖草唐本注云苗惟一莖葉生莖端若傘根如牛膝而細黑所在有之有亦叢生今人以徐長卿代之非也唐本先附雷公云凡採并細銼了搗用生甘草水煮一伏時漉出用也白花藤味苦寒無毒主解諸藥菜肉中毒酒漬服之主虛勞風熱生嶺南交州廣州平澤唐本注云苗似野葛而白花根皮厚肉白其骨柔於野葛唐本先附雷公云凡使勿用菜花藤緣真似白花藤只是味不同菜花藤酸澀不堪用其白花藤味甘香採得後去根細銼陰乾用之人肝藤主解諸毒藥腫遊風腳手軟痹并研服之亦煮服之亦傅病上生嶺南葉三丫花紫色一名承露仙又有伏雞子亦名承靈仙葉圓與此名同物異海藥云廣志云生嶺南山石間引蔓而生主蟲毒及手腳不遂等風生研服越王餘算味鹹平無毒主下水破結氣生南海水中如竹算子長尺許異苑曰晉安有越王餘算葉白者似骨黑者似角云是越王行海作籌有餘棄於水中而生海藥云味鹹溫主水腫浮氣結聚宿滯不消腹中虛鳴并宜煮服之石蓴味甘平無毒下水利小便生南海中水石上南越志云似紫菜色青臨海異物志曰附石生也海藥云主風祕不通五膈氣并小便不利臍下結氣宜煮汁飲之胡人多用治耳疾海根味苦小溫無毒主霍亂中惡心腹痛鬼氣注忤飛尸喉痹蠱毒癰疽惡腫赤白遊疹蛇咬大毒酒及水磨服傅之亦佳生會稽海畔山谷莖赤葉似馬蓼根似菝葜而小也海人極用之圖經衍義本草卷之十一
