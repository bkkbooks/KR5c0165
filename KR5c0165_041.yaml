body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正菜部中品蓼蓼實味辛温無毒主明目温中耐風寒下水氣面目浮腫癰瘍葉歸舌除大小腸邪氣利中益志馬蓼去腸中蛭蟲輕身生雷澤川澤藥性論云蓼實使歸鼻除腎氣兼能去癧瘍葉主邪氣又云食之多發心痛令人寒熱損骨髓小兒頭瘡擣末和白蜜一云和雞子白塗上蟲出不作瘢孟詵云蓼子多食令人吐水亦通五臟擁氣損陽氣日華子云水蓼性冷無毒蛇咬擣傅根莖并用又云赤蓼煖暴脚軟人燒灰淋汁浸捋以蒸桑葉罯立愈聖惠方治肝虚轉筋用赤蓼莖葉切作三合水一盞酒三合煎至四合去滓温分二服外臺秘要方治夏月暍死取濃煮汁三升灌之經驗方治脚痛成瘡先剉水蓼煮湯令温熱得所頻頻淋洗疾瘡乾自安斗門方治血氣攻心痛不可忍以蓼根細剉酒浸服之差古今録驗方治霍亂轉筋取蓼一手把去兩頭以水二升半煮取一升半頓服之衍義曰蓼實即神農本經第十一卷中水蓼之子彼言蓼則用莖此言實即用子故此復論子之功故分爲二條春初以葫蘆盛水浸濕高挂火上晝夜使暖遂生紅芽取爲蔬以備五辛盤又一種水紅與此相類但苗莖高及丈取子微炒碾爲細末薄酒調二三錢服治瘰癧瘡七則效效則已也葱摟葱葱實味辛温無毒主明目補中不足其莖葱白平可作湯主傷寒寒熱出汗中風面日腫傷寒骨肉痛喉痹不通安胎歸目除肝邪氣安中利五臟益目晴殺百藥毒葱根主傷寒頭痛葱汁平温主溺血解藜蘆毒唐本注云葱有數種山葱曰茗葱療病以胡葱主諸惡蛓狐尿刺毒山溪中沙虱射工等毒煮汁浸或搗傅大效亦兼小蒜茱萸輩不獨爲用也其人間食葱又有一種有凍葱即經冬不死分莖栽蒔而無子也又有漢葱冬即葉枯食用入藥凍葱最善氣亦佳之日華子云葱治天行時疾頭痛熱狂通大小腸霍亂轉筋及賁豚氣脚氣心腹痛目眩及止心迷悶取其莖葉用鹽研罯蛇蟲傷并金瘡水入皸腫煨研罯傅中射工溪毒鹽研罯傅子温中補不足益精明目根殺一切魚肉毒不可以蜜同食食療云葉温白平主傷寒壯熱出汗中風面目浮腫骨節頭疼損髮鬢葱白及鬚平通氣主傷寒頭疼又治瘡上有風水腫疼秘澀取靑葉同乾薑黄檗相和煮作湯浸洗之立愈孫眞人食忌云正月勿多食生葱食之發面上游風若燒葱和蜜食殺人外臺秘要方治腸痔大便常血取白三五斤煮作湯盆中坐立差經驗方治小便淋瀝或有血以赤根樓葱近根截一寸許安臍中上以艾灸七壯梅師方治胎動不安以銀汁煮葱白羹服之又方治霍亂後煩躁卧不安穩葱白二十莖大棗二十枚以水三升煎取二升分服食醫心鏡方主赤白痢以葱一握細切和米煮粥空心食之又方主傷寒寒熱骨節碎痛出汗治中風面目浮腫喉咽不通安胎歸目除肝臟邪氣安中利五臟益目晴殺百藥葉作羹粥炸作齏食之良勝金方治鼻衂血以葱白一握擣裂汁投酒少許炒三兩滴入鼻中差傷寒類要方治婦人妊娠七月若傷寒壯熱赤斑變爲黑斑溺血以葱一把水三升煮令熱服之取汗食葱令盡楊氏産乳方療胎動五六個月困篤難較者葱白一大握水三升煎取一升去滓頓服又方療胎動腰痛搶心或下血取葱白不限多少濃煮汁飲之衍義曰葱實葱初生名葱針至夏則有花於秋月植作高溝壠旋壅起以備冬用曰冬葱其實一也又有龍角葱每莖上出歧如角皮赤者名樓葱可煎湯渫下部子皆辛色黑有皺紋作三瓣此物大抵以發散爲功多食昬人神韭韭味辛微酸温無毒歸心安五臟除胃中熱利病人可乆食子主夢泄精溺白根主養髮圖經曰韭舊不著所出州土今處處有之謹按許愼說文解字云菜名一種而乆者故謂之韭故圃人種蒔一歲而三四割之其根不傷至冬壅培之先春而復生信乎一種而乆者也在菜中此物最温而益人宜常食之易稽覽圖云政道得則陰物變爲陽鄭康成注云若葱變爲韭是也然則葱冷而韭温可驗矣陶隱居云韭子入棘刺諸丸主漏精用根入生髮膏用葉以煮鯽魚鮓斷卒下痢多驗但此菜殊辛臭雖煮食之便出猶奇薰灼不如葱薤熟即無氣最是養性所忌也日華子云韭熱下氣補虚乏和腑臟益陽止泄精尿血暖腰膝除心腹中痼冷胸中痹冷痃癖氣及腹痛等食之肥白人中風失音研汁服心脾骨痛甚生研服蛇犬咬并惡瘡搗傅多食昏神暗目酒後尤忌不可與蜜同食又云子暖腰膝治鬼交甚效入藥炒用奏運副云有人消渴引飲無度或令食韭苗其渴遂止法要日吃三五兩或炒或作羹無入鹽極效但吃得十斤即佳過清明勿吃入醬無妨聖惠方治虚勞腎損夢中泄精用韭子二兩微炒爲散食前酒下二錢七外臺秘要方治虚勞尿精新韭子二升十月霜後採好酒八合漬一宿明日日色好童子向南擣一萬杵平旦温酒服方寸七曰再服立差肘後方卧忽不寤勿以火照之殺人但痛嚙拇指甲際而唾其面則活取韭搗汁吹鼻孔冬月用韭根取汁灌口中又方男女夢與人交精便泄出此内虚邪氣感發熬韭子搗末酒漬稍稍服經驗方治五般瘡癬以韭根炒存性旋搗末以猪脂油調傅之三度差衍義曰韭春食則香夏食則臭多食則昏神子止精滑甚良未出糞土爲韭黄最不益人食即滯氣蓋含噎鬱結之氣故如是孔子曰不時不食正爲此輩花食之動風薤薤味辛苦温無毒主金瘡瘡敗輕身不饑耐老歸於骨菜芝也除寒熱去水氣温中散結利病人諸瘡中風寒水腫以塗之生魯山平澤圖經曰薤生魯山平澤今處處有之似韭而葉勝多白無實人家種者有赤白二種赤者療瘡生肌白者冷補皆春分蒔之至冬而葉枯爾雅云䪥與薤同鴻薈又云葝山䪥山䪥莖葉亦與家薤相類而根長葉差大僅若鹿葱體性亦與家薤同然今少用薤雖辛而不葷五臟故道家長餌之兼補虚最宜人凡用葱薤皆去靑留白云白冷而靑熱也故斷赤下方取薤白同黃檗煮服之言其性冷而解毒也薈烏外切葝巨盈切陶隱居云葱薤異物而今共條本經旣無韭以其同類故也今亦取爲副品種數方家多用葱白及葉中涕名葱苒無復用實者葱亦有寒熱白冷靑熱傷寒湯不得令有靑者能消桂爲水亦化五石仙方所用薤又温補仙方及服食家須之偏入諸膏用不可生啖葷辛爲忌苒音冉日華子云輕身耐寒調中補不足食之能止久痢冷瀉肥健人生食引涕唾不可與牛肉同食令人作癥瘕四月不可食之孟詵云薤療諸瘡中風水腫生搗熱塗上或煮之白色者最好雖有辛不葷五臟學道人長服之可通神安魂魄益氣續筋力肘後方救死或先病或常居寢卧奄忽而絶皆是中惡以薤汁鼻中灌葛氏方治疥瘡煮薤葉洗亦佳擣如泥傅之亦得又方誤吞釵取薤白曝令萎黄煮使熟勿切食一大束釵即隨出梅師方有傷手足而犯惡露殺人不可治以薤白爛搗以帛囊之著煻火使薤白極熱去帛以薤傅瘡以帛急裹之冷即易亦可擣作餅子以艾灸之使熱氣入瘡中水下差又方灸瘡腫痛薤白切一升猪脂一升細切以苦酒浸經宿微火煎三上三下去滓傅上食醫心鏡方主赤白痢下薤白一握切煮作粥食之又方治諸瘡敗能生肌輕身不饑耐老宜心歸骨菜芝也除寒熱去氣温中散結氣利病人諸瘡中風寒水腫生杵傅之范汪方治目中風腫痛取薤白截仍以膚上令遍膜皆差頭卒痛者止之又方産後諸痢宜煮薤白食惟多益好用肥羊肉去脂作炙食之或以羊腎脂炒薤白食尤佳産乳方療疳痢薤白一握生搗如泥以粳米粉一物蜜調相和捏作餅炙熟吃不過三兩服衍義曰薤葉如金燈葉差狹而更光故古人言薤露者以其光滑難貯之義千金治肺氣喘急用薤白亦取其滑泄也與蜜同搗塗湯火傷其效甚速蘇蘇味辛温主下氣除寒中其子尤良圖經曰蘇紫蘇也舊不著所出州土今處處有之葉下紫色而氣甚香夏採莖葉秋採實其莖并葉通心經益脾胃煮飲尤勝與橘皮相宜氣方中多用之實主上氣咳逆研汁煮粥尤佳長食之令人肥健若欲宣通風毒則單用莖去節大良謹按爾雅云謂蘇爲桂荏蓋以其味辛而形類荏乃名之然而蘇有數種有水蘇勺蘇魚蘇山魚蘇皆是荏類水蘇别條見下藥性論云紫蘇子無毒主上氣咳逆治冷氣及腰脚中濕風結氣將子研汁煮粥良長服令人肥白身香和高良薑橘皮等分蜜丸空心下一十丸又下一切宿冷氣及脚濕風葉可生食與一切魚肉作羹良陶隱居云葉下紫色而氣甚香其無紫色不香似荏者名野蘇不堪用其子主下氣與橘皮相宜同療注今俗呼爲紫蘇日華子云紫蘇補中益氣治心腹脹滿止霍亂轉筋開胃下食并一切冷氣止脚氣通大小腸又云子主調中益五臟下氣止霍亂嘔吐反胃補虚勞肥健人利大小便破癥結消五膈止嗽潤心肺消痰氣禹錫云按爾雅云蘇桂荏釋曰蘇荏類之草也以其味辛類荏故一名桂荏也孟詵云紫蘇除寒熱治冷氣南齊褚澄云澄善醫爲吴郡太守百姓李道念以公事到郡澄見謂曰汝有重病答曰舊有冷病至今久年衆醫不差澄爲診曰汝病非冷非熱當是食白瀹雞子過多所致令取蘇一升煮服仍吐一物如升涎裹之開看是雞雛羽翅爪距俱足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙一說乃是蒜煮服之聖惠方治風順氣利腸以紫蘇子一升微炒杵以生絹袋盛内於三斗清酒中浸三宿少少飲之差又方治脚氣及風寒濕痹四肢攣急脚疼不可踐地用紫蘇二兩杵碎水二升研取汁以蘇子汁煮粳米二合作粥和葱豉椒薑食之止外臺秘要方治夢失精以子一升熬杵爲末酒服方寸七日再服斗門方治失血紫蘇不限多少於大鍋内水煎令乾後去滓熬膏以赤豆炒熟杵爲末調煎爲丸如梧桐子大酒下三十丸至五十丸常服差金匱方治食蟹中毒紫蘇煮汁飲之三升以子汁飲之衍義日蘇紫蘇也背面皆紫者佳其味微辛甘能散其氣香令人朝暮湯其汁飲爲無益醫家以謂芳草致豪貴之疾者此有一焉脾胃寒人飲之子治肺氣喘急多泄滑往往人不覺耳水蘇水蘇味辛微温無毒主下氣殺穀除飲食辟口臭去毒辟惡氣乆服通神明輕身耐老主吐血衄血血崩一名鷄蘇一名勞祖一名芥蒩一名芥苴生九眞池澤七月採蒩音祖苴七余切圖經曰水蘇生九眞池澤今處處有之多生水岸傍苗似旋復兩葉相當大香馥靑齊間呼爲水蘇江左名爲薺薴吴會謂之雞蘇南人多以作菜主諸氣疾及脚腫江北甚多而人不取食又江左人謂雞蘇水蘇是兩種陳藏器謂薺薴自是一物非水蘇水蘇葉有雁齒香薷氣辛薺薴葉上有毛稍長氣臭主冷氣泄痢可爲生菜除胃間酸水陶隱居云方藥不用俗中莫識九眞遼遠亦無能訪之日華子云鷄蘇暖治肺痿崩中帶下血痢頭風目眩産後中風及血不止又名臭蘇青白孟詵云鷄蘇一名水蘇熟搗生葉綿裹塞耳療聾又頭風目眩者以清酒煮汁一升服産後中風服之彌佳可燒作灰汁及以煮汁洗頭令髮香白屑不生又云乾釀酒及清酒常服之佳梅師方治吐血及下血并婦人漏下雞蘇莖葉煎取汁飲之又方治鼻衂血不止以生雞蘇五合并香豉二合合杵研搓如棗核大内鼻中可止香薷香薷味辛微温主霍亂腹痛吐下散水腫薷音柔圖經曰香薷舊不著所出州土陶隱居云家家有之今所在皆種但北土差少似白蘇而葉更細十月中採乾之一作香袤俗呼香茸霍亂轉筋煮飲服之無不差者若四肢煩冷汗出而渴者加蓼子同切煮飲陶隱居云家家有此惟供生食十月中取乾之霍亂煮飲無不差作煎除水腫尤良日華子云無毒下氣除煩熱療嘔逆冷氣禹錫云按蕭炳云今新定新安有石上者彼人名石香袤細而辛更絶佳孟詵云香袤温又云香茸去熱風生菜中食不可多食卒轉筋可煮汁頓服半升止又乾末止鼻衂以水服之胡洽方治水病洪腫香袤煎取乾香袤五十斤一物剉内釜中以水淹之水出香袤上一寸煮使氣力都盡清澄之嚴火煎令可丸一服五丸如梧子大日漸增之以小便利好外臺秘要方治水病洪腫氣脹不消食乾香薷五十斤焙用濕者亦得細剉内釜中水浸之出香薷上數寸煮使氣盡去滓清澄之漸微火煎令可丸服五丸如梧桐子大日三稍加之以小便利爲度千金方治口臭香薷一把以水一斗煮取三升稍稍含之肘後方舌上忽出血如簪孔者香薷汁服一升日三服食醫心鏡方主心煩去熱取煎湯作羹煮粥及生食并佳子母秘録方治小兒白秃髮不生汁出慘痛濃煮陳香薷汁少許脂和胡粉傅上衍義曰香薷生山野荆湖南北二川皆有兩京作圃種暑月亦作蔬菜治霍亂不可闕也用之無不效葉如茵蔯花茸紫在一邊成穗凡四五十房爲一穗如荆芥穗别是一種香餘如經假蘇假蘇味辛温無毒主寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕痹一名鼠蓂一名薑芥生漢中川澤圖經曰假蘇荆芥也生漢中川澤今處處有之葉似落藜而細初生香辛可啖人取作生菜古方稀用近世醫家治頭風虚勞瘡疥婦人血風等爲要藥并取花實成穗者暴乾入藥用效甚速陶隱居云方藥亦不復用唐本注云此藥即菜中荆芥是也薑荆聲訛耳先居草部中今人食之録在菜部也陳士良云荆芥主血勞風氣壅滿背脊疼痛虚汗理丈夫脚氣筋骨煩疼及陰陽毒傷寒頭痛頭旋眼眩手足筋急本草呼爲假蘇又别按假蘇葉銳圓多野生以香氣似蘇故呼爲蘇衍義曰假蘇荆芥也只用穗治産後血暈及中風目帶上四肢强直爲末二三錢童子小便一小盞調下咽良乆即活甚有驗又治頭目風荆芥穗細辛川芎等爲末飯後湯點二錢風瘙遍身濃煎湯淋渫或坐湯中白囊荷微温主中蠱及瘧經曰白蘘荷舊不著所出州土今荆襄江湖間多種之北地亦有春初生葉似甘蕉根似薑而肥其根莖堪爲菹其性好陰在末下生者尤美陶隱居云今人乃呼赤者囊荷白者爲覆菹葉同一種爾於人食之赤者爲勝藥用白者中蠱者服其汁并卧其葉即呼蠱主姓名亦主諸溪毒沙虱輩多食損藥勢又不利脚人家種白囊荷亦云辟蛇聖惠方治風冷失聲咽喉不利以囊荷根二兩研絞取汁酒一大盞相和令匀不計時候温服半錢肘後方同外臺秘要方喉中及口舌生瘡爛酒漬囊荷根半日含漱其汁差梅師方治卒中蠱毒下血如雞肝晝夜不絶臟腑敗壞待死葉密安病人席下亦自說之勿令病人知覺令病者自呼蠱姓名衍義曰白囊荷八月九月間淹貯之以備冬月作蔬果治療只用生者薄荷味辛苦温無毒主賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煮汁服亦堪生食人家種之飲汁發汗大解勞乏圖經曰薄荷舊不著所出州土今處處有之莖葉似荏而大長經冬根不死夏秋採莖葉暴乾古方稀用或與薤作齏食近世醫家治傷風頭腦風通關格及小兒風涎爲要切之藥故人家園庭間多蒔之又有胡薄荷與此相類但味少甘爲别生江淛間彼人多以作茶飲之俗呼新羅薄荷日華子云治中風失音吐痰除賊風療心腹脹下氣消宿食及頭風等禹錫云按藥性論云薄荷使能去憤氣發毒汗破血止痢通利關節尤與薤作菹相宜新病差人勿食令人虚汗不止陳士良云吴菝𦽅能引諸藥入榮衛療陰陽毒傷寒頭痛四季宜食又云胡菝𦽅主風氣壅併攻胸膈作茶服之立效俗呼爲新羅菝𦽅食療云平解勞與薤相宜發汗通利關節杵汁服去心臟風熱外臺秘要方治蜂螫挼貼之差經驗方治水入耳以汁點立效食醫心鏡方煎豉湯暖酒和飲煎茶生食之并宜衍義曰薄荷世謂之南薄荷爲有一種龍腦薄荷故言南以别之小兒驚風壯熱須此引巡猫食之即醉物相感爾治骨蒸勞用其汁與衆藥熬成膏菾菜味甘苦大寒主時行壯熱解風熱毒菾音甜陶隱居云即今以作鮓蒸者菾作甜音亦作忝時行熱病初得便擣汁飲皆得除差陳藏器云菾菜擣絞汁服之主冷熱痢又止血生肌人及禽獸有傷折傅之立愈又收取子以醋浸之揩面令潤澤有光日華子云甜菜冷無毒炙作熟水飲開胃通心膈秦荻梨味辛温無毒主心腹冷脹下氣消食人所噉者生下濕地所在有之陳藏器云五辛菜味辛温歲朝食之助發五臟氣常食温中去惡氣消食下氣荆楚歲時記亦作此說熱病不可食之損目禹錫云按孟詵云秦荻梨生於菜中最香美甚破氣又末之和酒服療卒心痛悒悒塞滿氣又子末和大醋封腫氣日三易醍醐菜雷公云凡使勿用諸件草形似牛皮蔓掐之有乳汁出香甜入頂採得用苦竹刀細切入沙盆中研如膏用生細絹裹挼取汁出煖飲并用每修事去根子千金方治傷中崩絶赤醍醐杵汁拌酒煎沸空心服一盞又方治月水不利以葉絞汁和酒煎服一盞圖經衍義本草卷之四十一
