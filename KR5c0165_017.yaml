body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部下品藜蘆鈎吻射音皮干蛇合合是含字常山蜀漆甘遂白蘞青葙子雚音恆菌音郡白及大戟澤漆花附茵芋赭音者魁貫衆蕘音築花牙子及己羊躑躅三種海藥餘瓶香叉子股宜南草二十五種陳藏器餘藒車香朝生暮落花街洞根井口邊草豚耳草燈花末千金䥶草斷罐草狼杷草百草灰産死婦人冢上草孝子衫襟灰靈床下鞋履虻母草故蓑衣結故炊帚天羅勒毛蓼蛇芮草萬一藤螺黶草繼母草甲煎金瘡小草鬼叉草藜蘆藜蘆味辛苦寒微寒有毒主蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蠱毒去死肌療噦逆喉痹不通鼻中息肉馬刀爛瘡不入湯一名蔥苒一名蔥菼音毯一名山蔥生太山山谷三月採根陰乾黃連為之使反細辛芍藥五參惡大黃陶隱居云近道處處有根下極似蔥而多毛用之止剔取根微炙之禹錫等按蜀本圖經云葉似鬱金秦膠蘘荷等根若龍膽莖下多毛夏生冬凋枯今所在山谷皆有八月採根陰乾吳氏云藜蘆一名蔥葵一名豐蘆一名蕙葵神農雷公辛有毒岐伯鹹有毒季氏大毒大寒扁鵲苦有毒大葉根小相連范子曰藜蘆出河東黃白者善藥性論云藜蘆使有大毒能主上氣去積年膿血泄瀉惡風瘡疥癬頭秃殺蟲圖經曰藜蘆生太山山谷今陜西山南東西州郡皆有之三月採苗葉青似初出棕心又似車前莖似蔥白青紫色高五六寸有黑皮裹莖似𣞭皮其花肉紅色根似馬腸根長四五寸許黃白色二月三月採根陰乾有此二種一種水藜蘆莖葉大同是生在近水溪澗石上根鬚百餘莖不中入藥用今用者名蔥白藜蘆根鬚甚少只是三二十莖生高山者為佳均州土俗亦呼為鹿蔥此藥大吐上膈風痰暗風癇病小兒䶎齁用錢七一字則惡吐人又用通頂令人嚏而古今本草云療嘔逆其效未詳今萱草亦謂之鹿蔥其類全别主療亦不同爾雷公云凡採去頭用糯米泔汁煮從已至未出晒乾用聖惠方治黑痣生於身面上用藜蘆灰五兩水一大碗淋灰汁於銅器中盛以重湯煮令如黑膏以針微撥破痣處點之不過三遍神驗千金翼治牙痛內藜蘆末於牙孔中勿咽汁神驗經驗後方治中風不語喉中如拽鋸聲口中涎沫取藜蘆一分天南星一個去浮皮却臍子上陷一個坑子內入陳醋二橡斗子四面用火逼令黃色同一處搗再研極細用生麵為圓如赤豆大每服三圓溫酒下百一方治黃疸取藜蘆著灰中炮之小變色搗為末水服半錢七小吐不過數服斗門方治疥癬用藜蘆細搗為末以生油和傅之簡要濟衆治中風不省人事牙關緊急者藜蘆一兩去蘆頭濃煎防風湯浴過焙乾碎切炒微褐色搗為末每服半錢溫水調下以吐風涎為效如人行三里未吐再服衍義曰藜蘆為未油調治馬疥癢鈎吻味辛溫有大毒主金瘡乳痓中惡風咳逆上氣水腫殺鬼疰蠱毒破癥積除腳膝痹痛四肢拘攣惡瘡疥蟲殺鳥獸一名野葛折之青煙出者名固活甚熱不入湯生傅音附高山谷及會稽東野半夏為之使惡黃苓陶隱居云五符中亦云鈎吻是野葛言其入口則鈎人喉吻或言吻作挽字牽挽人腸而絶之核胡革切事而言乃是兩物野葛是根狀如牡丹所生處亦有毒飛鳥不得集之今人用含膏服之無嫌鈎吻别是一草葉似黃精而莖紫當心抽花黃色初生既極類黃精故以為殺生之對也或云鈎吻是毛莨此本及後説參錯不同未詳云何又有一物名陰命赤色著木懸其子生山海中最有大毒入口能立殺人唐本注云野葛生桂州以南村墟間巷間皆有彼人通名鈎吻亦謂苗名鈎吻根名野葛蔓生人或誤食其葉者皆致死而羊食其葉大肥物有相伏如此若巴豆鼠食則肥也陶云飛鳥不得集之妄矣其野葛以時新採者皮白骨黃宿根似地骨嫩根如漢防己皮節斷者良正與白花藤根相類不深别者頗亦惑之其新取者折之無塵氣經年已後則有塵起根骨似枸杞有細孔者人折之則塵氣從孔中出今折枸杞根亦然經言折之青煙起者名固活為良此亦不達之言也且黃精真如生龍膽澤漆兩葉或四五葉相對鈎吻蔓生葉如柿葉博物志云鈎吻葉似鳧葵并非黃精之類毛莨是有毛石龍芮何干鈎吻禹錫等按蜀本秦鈎吻主喉痹咽中塞身變咳逆葉溫中一名除辛生寒石山二月八月採謹按鈎吻一名野葛者亦如徐長卿赤箭鬼箭等并一名鬼督郵自是一物今鈎吻一名野葛則野葛自有一種明矣且藥有名同而體異者極多非獨此也據陶注云鈎吻葉似黃精而莖紫當心抽花黃色者是蘇云野葛出桂州葉似柿葉人食即死者當别是一物爾又云苗名鈎吻根名野葛亦非通論按今市人皆以葉似黃精為鈎吻按雷公炮炙方黃精勿令誤用鈎吻鈎吻葉似黃精而頭尖處有兩毛若鈎是也吳氏云秦鈎吻一名毒根神農辛雷公有毒殺人生南越山或益州葉如葛赤莖大如箭根黃正月採葛洪方云鈎吻與食芹相似而生處無他草其莖有毛誤食之殺人嶺表録異云野葛毒草也俗呼為胡蔓草誤食之則用羊血解之陳藏器云人食其葉飲冷水即死冷水發其毒也彼人以野葛飼人勿與冷水至肥大以冷水飲之至死懸尸於樹汁滴地生菌子收之名菌藥烈於野葛胡蔓葉細長光潤雷公云凡使勿用地精苗莖與鈎吻同其鈎吻治人身上惡瘡毒效其地精煞人採得後細銼搗了研絞取自然汁入膏中勿誤餌之黃帝問天老曰天地所生豈有食之死者乎天老曰太陰之精名曰鈎吻不可食之入口即死博物志云鈎吻毒桂心蔥葉涕解之射干射音夜干味苦平微溫有毒主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱療老血在心脾間咳唾言語氣臭散胸中熱氣久服令人虛一名烏扇一名烏蒲一名烏翣一名烏吹一名草薑生南陽川谷田野三月三日採根陰乾唐本注云射干此説者是其鳶尾葉都似射干而花紫碧色不抽高莖根似高良薑而肉白根即鳶頭陶説由跋都論此爾禹錫等按蜀本云射干微寒圖經云高二三尺花黃實黑根多鬚皮黃黑肉黃赤今所在皆有二月八月採根去皮日乾用之陳藏器云射干鳶尾按此二物相似人多不分射干總有三物佛經云夜干貂僦此是惡獸似青黃狗食人郭云能緣木又阮公詩云夜干臨層城此即是樹今之射干殊高大者本草射干即人間所種為花卉亦名鳳翼葉如鳥翅秋生紅花赤點鳶尾亦人間多種苗低下於射干如鳶尾春夏生紫碧花者是也又注云據此猶錯夜干花黃根亦黃色藥性論云射干使有小毒能治喉閉水漿不入能通女人月閉治疰氣消瘀血日華子云消痰破癥結胸膈滿腹脹氣喘痃癖開胃下食消腫毒鎮肝明目根亦有形似高良薑大小赤黃色淡硬五六七八月採圖經曰射干生南陽山谷田野今在處有之人家庭砌間亦多種植春生苗高二三尺葉似蠻薑而狹長橫張如翅羽狀故一名烏翣謂其葉耳葉中抽莖似萱草而強硬六月開花黃紅色瓣上有細文秋結實作房中子黑色根多鬚皮黃黑肉黃赤三月三日採根陰乾陶隱居云療毒腫方多作夜干今射干作夜音又云别有射干相似而花白莖長似射人之執竿者故阮公詩云射干臨層城是也此不入藥用蘇恭射干此説是鳶尾葉都似射干而花紫碧色不抽高莖根似高良薑而肉白根即鳶頭也又按荀子云西方有木焉名曰射干莖長四寸生於高山之上而臨百仞之淵其莖非能長也所立者然楊葆注云當是草而云木誤也今觀射干之形其莖梗疏長正似長竿狀得名由此耳而陶以夜音為疑且古字音呼固多相通若漢官僕射主射而亦音夜非有别義也又射干多生山崖之間其莖雖細小亦類木梗故荀子名木而蘇謂陶説為鳶尾鳶尾花亦不白其白者自是射干之一類非鳶尾也鳶尾布地而生葉扁闊於射干蘇云花紫碧色根如高良薑者是也本經云生九嶷山谷今在處有大類蠻薑也五月採一云九月十月採根日乾雷公云凡使先以米泔水浸一宿漉出然後用䈽竹葉煮從午至亥漉出日乾用之外臺祕要治喉痹射干一片含汁差肘後方治小兒疝發時腫痛如刺用生射干汁取下亦可圓服之衍義曰射干此乃荀子所説西方之木名曰射干者也注復引本草曰不合以射干為木殊不知五行止於水火木金土而言之故儒者以草木皆木也金鉛皆金糞土皆土也灰火皆火也水池皆水由是言之即非佛經所説火宅喻之獸及阮公所云臨層城者之木况本經亦曰一名草薑故知是草無疑今治肺氣喉痹為佳日華子曰大小似高良薑赤黃色此乃得之蛇合蛇合合是含字味苦微寒無毒主驚癇寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍療心腹邪氣腹痛濕痹養胎利小兒一名蛇銜生益州山谷八月採陰乾陶隱居云即是蛇銜蛇銜有兩種并生石上當用細葉黃花者處處有之亦生黃土地不必皆生石上也唐本注云合字乃是含字陶見誤本宜改為含含銜義同見古本草也今按陳藏器本草云蛇銜主蛇咬種之亦令無蛇今以草內蛇口中縱傷人亦不能有毒矣禹錫等按蜀本圖經云生石上及下濕地花黃白人家亦種之五月採苗生用藥性論云蛇銜臣有毒能治丹疹治小兒寒熱日華子云蛇含能治蛇蟲蜂虺所傷及眼赤止血㶸風疹癰腫莖葉俱用又名威蛇圖經曰蛇含生益州山谷今近道亦有之生土石上或下濕地蜀中人家亦種之一莖五葉或七葉此有兩種當用細葉黃色花者為佳八月採根陰乾古今録驗方治赤疹用蛇含草搗令極爛傅之差赤疹者由冷濕搏於肌中甚即為熱乃成赤疹得天熱則劇冷則減是也古今諸丹毒瘡腫方通用之又下有女青條云蛇銜根也生朱崖陶隱居蘇恭皆以為若是蛇銜根不應獨生朱崖或云是雀瓢即蘿摩之别名或云二物同名以相類故也醫家鮮用亦稀識别故但附著於此雷公云凡使勿用有蘖尖葉者號竟命草其味别空只酸澀不入用若誤服之吐血不止速服知時子解之採得後去根莖只取葉細切晒乾勿令犯火肘後方治金瘡亦搗傅之佳又方治蜈蚣螫人蛇含草挼傅之斗門方治産後瀉痢用小龍牙根一握濃煎服之甚效蛇含是也抱朴子云蛇銜膏連已斷之指晉異苑云有田父見一蛇被傷又見蛇銜一草著其瘡上經日傷蛇乃去田父因取其草以治瘡皆驗遂名曰蛇銜草常山味苦辛寒微寒有毒主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆療鬼蠱往來水脹灑灑惡寒鼠瘻一名互草生益州川谷及漢中八月採根陰乾畏玉札陶隱居云出宜都建平細實黃者呼為雄雞骨常山用最勝唐本注云常山葉似茗狹長莖圓兩葉相當三月生白花青萼五月結實青圓三子為房生山谷間高者不過三四尺禹錫等按蜀本圖經云樹高三四尺根似荆根黃色而破今出金州房州梁州五月六月採葉名蜀漆也藥性論云常山忌蔥味苦有小毒治諸瘧吐痰涎去寒熱用小麥竹葉三味合煮小兒甚良主瘧灑灑寒熱不可進多令人大吐治項下瘤癭蕭炳云得甘草吐瘧日華子忌菘菜圖經曰文具蜀漆條下雷公云凡使春使莖葉夏秋冬一時用使酒浸一宿至明漉出日乾熬搗少用勿令老人久病服之切忌也外臺祕要治瘧常山三兩以漿水三升浸經一宿煎取一升欲發前頓服然後微吐肘後方治瘧病常山三兩搗末以雞子白和圓如梧桐子空心三十圓衍義曰常山蜀漆根也亦治瘧吐痰如雞骨者佳蜀漆蜀漆味辛平微溫有毒主瘧及咳逆寒熱腹中癥堅痞結積聚邪氣蠱毒鬼疰療胸中邪氣吐出之生江林山川谷及蜀漢中常山苗也五月採葉陰乾栝樓為之使惡貫衆陶隱居云是常山苗而所出又異者江林山即益州江陽山名故是同處爾彼人採仍縈結作圓得時燥者佳唐本注云此草日乾微萎則把束使燥色青白堪用若陰乾便黑爛鬱壞矣陶云作圓此乃梌餅非蜀漆也禹錫等按蜀本圖經云五月採日乾之藥性論云蜀漆使畏橐吾味苦有小毒常山苗也能主治瘴鬼瘧多時不差去寒熱瘧治溫瘧寒熱不可多進令人吐逆主堅癥下肥氣積聚蕭炳云桔梗為使日華子云蜀漆治癥瘕又名雞尿草鴨尿草李含光云是常山莖也八九月採圖經曰蜀漆生江林山川谷及蜀漢常山苗也常山生益州山谷及漢中蜀漆根也江林山即益州江陽山名是同處耳今京西淮浙湖南州郡亦有之葉似茗而葉長兩兩相當莖圓有節三月生紅花青萼五月結實青圓三子為房苗高者不過三四尺根似荆黃色而海州出者葉似桃葉八月有花紅白色子碧似山楝子而小五月採葉八月採根陰乾此二味為治瘧之最要張仲景蜀漆散用蜀漆雲母龍骨等分搗末患者至發前以漿水和半錢服之溫瘧加蜀漆半分臨發時服一錢七今天台山出一種草名土常山苗葉極甘人用為飲香其味如蜜又名蜜香草性亦涼飲之益人非此常山也雷公云凡採得後和根苗臨用時即去根取莖并葉同拌甘草四兩細銼用拌水令濕同蒸臨時去甘草取蜀漆五兩細銼又拌甘草水勻又蒸了任用勿食木笋衍義曰蜀漆常山苗也治瘧多吐人其他亦未見所長此草也慮歲久人或别有異論故預云餘如經甘遂甘遂味苦甘寒大寒有毒主大腹疝瘕腹滿面目浮腫留飲音癊宿食破癥堅積聚利水穀道下五水散膀胱留熱皮中痞熱氣腫滿一名甘藁一名陵藁一名凌澤一名主田生中山川谷二月採根陰乾瓜蒂為之使惡遠志反甘草陶隱居云中山在代郡先第一本出太山江東比來用京口者大不相似赤皮者勝白皮者都下亦有名草甘遂殊惡蓋謂贋音雁偽之草非言草石之草也唐本注云所謂草甘遂者乃蚤休也療體全别真甘遂苗似澤漆草甘遂苗一莖莖端六七葉如萆麻鬼臼葉生食一升亦不能利大療癰疽蛇毒且真甘遂皆以皮赤肉白作連珠實重者良亦無皮白者皮白乃是蚤休俗名重臺也禹錫等按藥性論云京甘遂味苦能瀉十二種水腫能治心腹堅滿下水去痰水主皮肌浮腫日華子云京西者上汴滄吳者次形似和皮甘草節節切之圖經曰甘遂生中山川谷今陜西江東亦有之或云京西出者最佳汴滄吳者為次苗似澤漆莖短小而葉有汁根皮赤肉白作連珠又似和皮甘草二月採根節切之陰乾以實重者為佳又有一種草甘遂苗一莖莖端六七葉如萆麻鬼臼葉用之殊惡生食一升亦不能下唐注云草甘遂即蚤休也蚤休自有條古方亦單用下水小品療妊娠小腹滿大小便不利氣急已服豬苓散不差者以甘遂散下之太山赤皮甘遂二兩搗篩以白蜜二兩和圓如大豆粒多覺心下煩得微下者日一服之下後還將豬苓散不得下日再服漸加可至半錢七以微下為度中間將散也豬苓散見豬苓條雷公云凡採得後去莖於槐砧上細銼用生甘草湯小薺苨自然汁二味攪浸三日其水如墨汁更漉出用東流水淘六七次令水清為度漉出於土器中熬令脆而用之肘後方治卒腫滿身面皆洪大甘遂一分粉之豬腎一枚分為七臠入甘遂於中以火炙之令熟一一食至四五當覺腹脅鳴小便利楊氏産乳治腹滿大小便不利氣急甘遂二分為散分五服熟水下如覺心下煩得微利日一服衍義曰甘遂今惟用連珠者然經中不言此藥專於行水攻決為用入藥須斟酌白飲白斂味苦甘平微寒無毒主癰腫疽瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛下赤白殺火毒一名菟核一名白草一名白根一名崑崙生幾山山谷二月八月採根暴乾代緒為之陶隱居云近道處處有之作藤生根如白芷破片以竹穿之日乾生取根搗傅癰腫亦效唐本注云此根似天門冬一株下有十許根皮赤黑肉白如芍藥殊不似白芷禹錫等按蜀本圖經云蔓生枝端有五葉今所在有之藥性論云白斂使殺火毒味苦平有毒惡烏頭能主氣壅腫用赤小豆菵草為末雞子白調塗一切腫毒治面上疱瘡子治溫瘧主寒熱結壅熱腫日華子云止驚邪發背瘰癧腸風痔瘻刀箭瘡撲損溫熱瘧疾血痢湯火瘡生肌止痛圖經曰白斂生衡山山谷今江淮州郡及荆襄懷孟商齊諸州皆有之二月生苗多在林中作蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵三五枚同窠皮赤黑肉白二月八月採根破片暴乾今醫治風金瘡及面藥方多用之濠州有一種赤斂功用與白斂同花實亦相類但表裏俱赤耳聖惠方治丁瘡以水調白斂末傅瘡上外臺祕要備急治火湯灼爛用白斂末傅之肘後方治發背白斂末傅并良衍義曰白斂白及古今服餌方少有用者多見於斂瘡方中二物多相須而行青葙子青葙子味苦微寒無毒主邪氣皮膚中熱風瘙身癢殺三蟲惡瘡疥虱虛蝕下部𧈟瘡子名草決明療唇口青一名草蒿一名萋蒿生平谷道傍三月採莖葉陰乾五月六月採子陶隱居云處處有似麥柵花其子甚細後又有草蒿别本亦作草藁今生主療殊相類形名又相似極多足為疑而實兩種也唐本注云此草苗高尺許葉細軟花紫白色實作角子黑而扁光似莧實而大生下濕地四月五月採荆襄人名為崑崙草搗汁單服大療溫癘甘𧈟禹錫等按蜀本圖經云葉細軟長亦為蔓今所在下濕地有藥性論云青葙子一名草藁味苦平無毒能治肝臟熱毒衝眼赤障青盲翳腫主惡瘡疥瘙治下部蟲瘡蕭炳云今主理眼有青葙子圓又有一種花黃名陶珠術苗相似日華子云治五臟邪氣益腦髓明耳目鎮肝堅筋骨去風寒濕痹苗止金瘡血圖經曰青葙子生平谷道傍今江淮州郡近道亦有之二月內生青苗長三四尺葉闊似柳細軟莖似蒿青紅色六月七月內生花上紅下白子黑光而扁有似莨菪根似蒿根而白直下獨莖生根六月八月採子又有一種花黃名陶珠術苗亦相似恐不堪用之雷公云凡用勿使思蓂子并鼠細子其二件真似青葙子只是味不同其思蓂子味距煎之有涎凡用先燒鐵臼杵單搗用之廣利方治鼻衄血出不止以青葙子汁三合灌鼻中三國志云魏略初平中有青牛先生常服青葙子年如五六十者人或識之謂其已百歲有餘耳衍義曰青葙子經中并不言治眼藥性論始言之能治肝臟熱毒衝眼赤障青盲蕭炳亦云理眼日華子云益腦髓明耳目鎮肝今人多用之治眼殊不與經意相當雚音桓菌音郡味鹹甘平微溫有小毒主心痛溫中去長蟲白癬音癬蟯音饒蟲螫毒毒癥瘕諸蟲疽蝸去蛔蟲寸白惡瘡一名雚盧生東海池澤及渤海章武八月採陰乾得酒良畏雞子陶隱居云出北來此亦無有形狀似菌云鸜屎所化生一名鸜菌單末之豬肉臛和食可以遣蛔蟲唐本注云雚菌今出渤海蘆葦澤中鹹鹵地自然有此菌爾亦非是鸜屎所化生也其菌色白輕虛表裏相似與衆菌不同療蛔蛔蟲有效禹錫等按蜀本圖經云今出滄州秋雨以時即有天旱及霖即稀日乾者良藥性論云雚菌味苦能除腹內冷痛治白秃食療云菌子發五臟風壅經絡動痔病昏多睡背膊四肢無力又菌子有數般槐樹上生者良野田中者恐有毒殺人又多發冷氣外臺祕要治蛔蟲攻心如刺吐清汁雚蘆一兩搗末羊肉臛和之日一頓服佳金匱玉函云菌仰卷及赤色不可食木耳青色及仰生者不可食白及白及味苦辛平微寒無毒主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱音肥緩不收除白癬疥蟲一名甘根一名連及草生北山川谷又冤句及越山紫石英為之使惡理石畏李核杏人陶隱居云近道處處有之葉似杜若根形似菱米節間有毛方用亦稀可以作糊唐本注云此物山野人患手足皸音軍拆嚼以塗之有效禹錫等按蜀本圖經云葉似初生栟音并櫚音閭棕也及藜蘆莖端生一臺四月開生紫花七月實熟黃黑色冬凋根似菱三角白色角頭生牙今出申州二月八月採根用吳氏云神農苦黃帝辛季氏大寒雷公辛無毒莖葉如生薑藜蘆十月華直上紫赤根白連二月八月九月採藥性論云白及使能治結熱不消主陰下痿治面上皯皰令人肌滑日華子云味甘辛止驚邪血邪癇疾赤目癥結發背瘰癧腸風痔瘻刀箭瘡撲損溫熱瘧疾血痢湯火瘡生肌止痛風痹圖經曰白及生北山川谷又冤句及越山今江淮河陜漢黔諸州皆有之生石山上春生苗長一尺許似栟櫚及藜蘆莖端生一臺葉兩指大青色夏花開紫七月結實至熟黃黑色至冬而葉凋根似菱米有三角白色角端生牙二月七月採根今醫治金瘡及癰疽方中多用經驗方治鼻衄不止甚者白及為末津調塗山根上立止大戟大戟味苦甘寒大寒有小毒主蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆頸腋癰腫頭痛發汗利大小腸一名卭巨生常山十二月採根陰乾反甘草陶隱居云近道處處皆有至猥賤也禹錫等按唐本注云畏菖蒲蘆草鼠屎蜀本圖經云苗似甘遂高大葉有白汁花黃根似細苦參皮黃黑肉黃白五月採苗二月八月採根用爾雅蕎卭巨注云今本草大戟也藥性論云大戟使反芫花海藻毒用菖蒲解之味苦辛有大毒破新陳下惡血癖塊腹內雷鳴通月水善治瘀血能墮胎孕日華子云小豆為之使惡署預瀉毒藥泄天行黃病溫瘧破癥結圖經曰大戟澤漆根也生常山今近道皆有之春生紅牙漸長作叢高一尺已來葉似初生楊柳小團三月四月開黃紫花團圓似杏花又似蕪荑根似細苦參皮黃黑肉黃白色秋冬採根陰乾淮甸出者莖圓高三四尺花黃葉至心亦如百合苗江南生者葉似芍藥醫家用治癮疹風及風毒腳腫并煮水熱淋日再三日愈李絳兵部手集方療水病無問年月深者雖復脈惡亦主之大戟當歸橘皮各一大兩切以水二大升煮取七分頓服利二三斗勿怪至重不過再服禁毒食一年水下後更服永不作此方傳於張尚客也雷公云凡使勿用附生者若服冷泄氣不禁即煎薺苨子湯解夫採得後於槐砧上細銼與細銼海芋葉拌蒸從已至申去芋葉晒乾用之太上八帝玄變經大戟必瀉澤漆澤漆味苦辛微寒無毒主皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足利大小腸明目輕身一名漆莖大戟苗也生太山川澤三月三日七月七日採莖葉陰乾小豆為之使惡署預陶隱居云此是大戟苗生時摘葉有汁故名澤漆亦能嚙人肉禹錫等按蜀本圖經云五月採日乾用藥性論云澤漆使治皮肌熱利小便日華子云冷微毒止瘧疾消痰退熱此即大戟花川澤中有莖梗小有葉花黃葉似嫩菜四五月採之圖經曰澤漆大戟苗也生太山川澤今冀州鼎州明州及近道亦有之生時摘葉有白汁出亦能嚙人故以為名然張仲景治肺咳上氣脈沉者澤漆三斤以東流水五斗煮取一斗五升然後用半夏半升紫參生薑白前各五兩甘草黃苓人參桂各三兩八物㕮咀之內澤漆汁中煎取五升每服五合日三至夜服盡唐本餘有小毒逐水主蠱毒聖惠方治十種水氣可用澤漆十斤於夏間取莖嫩葉入水一斗研汁約二斗於銀鍋內慢火熬如稀餳即止瓷器內收每日空心溫酒調下一茶匙以愈為度茵芋茵芋味苦溫微溫有毒主五臟邪氣心腹寒羸瘦如瘧狀發作有時諸關節風濕痹痛療久風濕走四肢腳弱一名芫花一名卑共生太山川谷三月三日採葉陰乾陶隱居云茵芋者出彭城今近道亦有莖葉狀如莽草而細軟取用之皆連細莖方用甚稀惟以合療風酒禹錫等按蜀本圖經云苗高三四尺葉似石榴短厚莖赤今似石南葉三月四月採莖葉日乾藥性論云茵芋味苦辛有小毒療人五臟寒熱似瘧諸關節中風痹拘急攣痛治男子女人軟腳毒風治溫瘧發作有時日華子云治一切冷風筋骨怯弱羸瘦入藥炙用出自海鹽形似石南樹生葉厚五六七月採圖經曰茵芋出太山川谷今雍州絳州華州杭州亦有之春生苗高三四尺葉赤莖似石榴而短厚又似石南葉四月開細白花五月結實三月四月七月採葉連細莖陰乾用或云日乾胡洽治賊風手足枯痹四肢拘攣茵芋酒主之其方茵芋附子天雄烏頭秦艽女萎防風防己躑躅石南細辛桂心各一兩凡十二味切以絹袋盛清酒一斗漬之冬七日夏三日春秋五日藥成初服一合日三漸增之以微痹為度赭音者魁味甘平無毒主心腹積聚除三蟲生山谷二月採陶隱居云狀如小芋子肉白皮黃近道亦有唐本注云赭魁大者如斗小者如升葉似杜蘅蔓生草木上有小毒陶所説者乃土卵爾不堪藥用梁漢人名為黃獨蒸食之非赭魁也禹錫等按蜀本圖經云苗蔓延生葉似蘿摩根若菝葜皮紫黑肉黃赤大者輪菌如升小者若拳今所在有之據本經云無毒而蘇云有小毒又云陶所説者梁漢人蒸食之則無毒明矣乃陶説者為是也陳藏器云按土卵蔓生根如芋人以灰汁煮食之不聞有功也貫衆貫衆味苦微寒有毒主腹中邪熱氣諸毒殺三蟲去寸白破癥瘕除頭風止金瘡花療惡瘡令人泄一名貫節一名貫渠一名百頭一名虎卷一名扁符一名伯萍一名藥藻此謂草鴟頭生玄山山谷及冤句少室山二月八月採根陰乾雚菌為之使陶隱居云近道亦有葉如大蕨其根形色毛芒全似老鴟頭故呼為草鴟頭禹錫等按爾雅云濼貫衆注葉圓鋭莖毛黑布地冬不死一名貫渠廣雅云貫節蜀本云一名藥音洛藻又圖經云苗似狗脊狀如雉尾根直多枝皮黑肉赤曲者名草鴟頭療頭風用之今所在山谷陰處有之藥性論云貫衆使主腹熱赤小豆為使殺寸白蟲圖經曰貫衆生玄山山谷及冤句少室山今陜西河東州郡及荆襄間多有之而少有花者春生苗赤葉大如蕨莖幹三稜葉緑色似小雞翎亦名鳳尾草根紫黑色形如大瓜下有黑鬚毛又似老鴟爾雅云濼舒若切貫衆郭璞注云葉圓鋭莖毛黑布地冬不死廣雅謂之貫節是也三月採根晒乾荆南人取根為末水調服一錢七止鼻血效蕘音堯花味苦辛寒微寒有毒主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道療痰飲咳嗽生咸陽川谷及河南中牟六月採花陰乾陶隱居云中牟者平時惟從河上來形似芫花而極細白色比來隔絶殆不可得唐本注云此藥苗似葫荽莖無刺花細黃色四月五月收與芫花全不相似也禹錫等按蜀本圖經云苗高二尺許生岡原上今所在有之見用雍州者好藥性論云蕘花使治咳逆上氣喉中腫滿疰氣蠱毒痃癖氣塊下水腫等衍義曰蕘花今京洛間甚多張仲景傷寒論以蕘花治利者以其行水也水去則利止其意如此然今人用時當以意斟酌不可使過與其不及也仍須是有是證者方可用牙子牙子味苦酸寒有毒主邪氣熱氣疥瘙惡瘍瘡痔去白蟲一名狼牙一名狼齒一名狼子生淮南川谷及冤句八月採根暴乾中濕腐爛生衣殺人蕪荑為之使惡地牙子榆棗肌陶隱居云近道處處有之其根芽亦似獸之牙齒也禹錫等按蜀經云苗似蛇莓而厚大深緑色根萌芽若獸之牙今所在有之二月三月採牙日乾藥性論云狼芽使味苦能治浮風瘙癢殺寸白蟲煎汁洗惡瘡日華子云殺腹臟一切蟲止赤白痢煎服圖經曰牙子即狼牙子生淮南川谷及冤句今江東京東州郡多有之苗似蛇莓而厚大深緑色根黑若獸之牙齒故以名之三月八月採根日乾古方多用治蛇毒其法取獨莖狼牙搗臘月豬脂和以傅上立差又楊炎南行方云六月以前用葉以後用根生㕮咀以木葉裹之煻火炮令熱用尉瘡上冷即止張仲景治婦人陰瘡亦單用之聖惠方治陰瘡洗方用狼牙五兩細銼水五升煮至三升溫洗之外臺祕要范汪治寸白蟲方狼牙五兩搗末蜜圓如麻子宿不食明旦以漿水下一合服盡差之又方治金瘡狼牙草莖葉熟搗傅貼之兼止血又方治婦人陰蝕若中爛傷狼牙三兩㕮咀以水四升煮去滓內苦酒如雞子一杯以綿濡湯瀝患處日四五即愈千金方治小兒陰瘡濃煮狼牙草洗之又治射工即水弩子也以狼牙葉冬取根搗令熟傅之及已味苦平有毒主諸惡瘡疥痂瘻蝕及牛馬諸瘡陶隱居云今人多用以合瘡疥膏甚驗唐本注云此草一莖莖頭四葉葉隙著白花好生山谷陰虛軟地根似細辛而黑有毒入口使人吐血今以當杜蘅非也疥瘙必須用之禹錫等按蜀本圖經云二月採根日乾之藥性論云及己亦可單用能治瘑疥日華子云主頭瘡白秃風瘙皮膚癢可煎汁浸并傅羊躑躅羊躑躅味辛溫有大毒主賊風在皮膚中淫淫痛溫瘧惡毒諸痹邪氣鬼疰蠱毒一名玉支生太行山川谷及淮南山三月採花陰乾陶隱居云近道諸山皆有之花苗似鹿蔥羊誤食其葉躑躅而死故以為名不可近眼唐本注云玉支躑躅一名陶於梔子注云是躑躅子名玉支非也花亦不似鹿蔥正似旋葍花色黃者也今注其苗樹生高三四尺葉似桃葉花似山石榴禹錫等按蜀本圖經云樹生高二尺葉似桃葉花黃似瓜花三月四月採花日乾今所在有之藥性論羊躑躅惡諸石及麵不入湯服也圖經曰羊躑躅生太行山川谷及淮南山今所在有之春生苗似鹿蔥葉似紅花莖高三四尺夏開花似陵霄山石榴旋葍輩而正黃色羊誤食其葉則躑躅而死故以為名三月四月採花陰乾今嶺南蜀道山谷遍生皆深紅色如錦繡然或云此種不入藥古大方多用躑躅如胡洽治時行赤散及治五嗽四滿圓之類及治風諸酒方皆雜用之又治百病風濕等魯王酒中亦用躑躅花今醫方捋腳湯中多用之南方治蠱毒下血有躑躅花散甚勝三種海藥餘瓶香謹按陳藏器云生南海山谷草之狀也味寒無毒主天行時氣鬼魅邪精等并宜燒之又於水煮善洗水腫浮氣與土薑芥子等煎浴湯治風瘧甚驗也叉子股謹按陳氏云生嶺南及南海諸山每莖三十根狀似細辛味苦平無毒主解毒癰疽神驗忠萬州者佳草莖功力相似以水煎服緣嶺南多毒家家貯之宜南草謹按廣州記云生廣南山谷有莢長二尺許內有薄片似紙大小如蟬翼主邪小男女以緋絹袋盛一身佩之臂上辟惡止驚此草生南方故作南北字今人多以男女非也宜男草者即萱草是二十五種陳藏器餘藒音挈車香味辛溫主鬼氣去臭及蟲魚蛀蚛生彭城高數尺白花爾雅曰藒車芞音乞輿郭注云香草也廣志云黃葉白花也海藥按廣志云生海南山谷陳氏云主霍亂辟惡氣裛衣甚好蛀者煎此香冷淋之善辛蛀蚛也朝生暮落花主惡瘡疽𧈟疥癰蟻瘻等并日乾末和生油塗之生糞穢處頭如筆紫色朝生暮落小兒呼為狗溺臺又名鬼筆菌從地出者皆主瘡疥牛糞黑菌尤佳更有燒作灰地經秋雨生菌重臺名仙帽大主血街洞根味苦平無毒主熱毒蛇犬蟲癰瘡等毒功用同陳家白藥苗蔓亦相似嶺南恩州枝根陰乾海藥謹按廣州記云生嶺南及海隅苗蔓如土瓜根相似味辛溫無毒主一切毒氣及蛇傷并取其根磨服之應是著諸般毒悉皆吐出井口邊草主小兒啼著母卧席下勿令母知豚耳草主溪毒射工絞汁服滓傅瘡上百一方豚耳多種未知何是菘菜白葉者亦名豚耳顔氏家訓馬莧一名豚馬齒莧也又車前葉圓者亦名豚耳燈花末傅金瘡止血生肉令瘡黑今燭花落有喜事不爾得錢之兆也千金䥶草主蛇蝎蟲咬等毒取草搗傅瘡上生肌止痛生江南高二三尺也斷罐草主丁瘡合白牙荲耻六切羊啼菜也菜青苔半夏地骨皮蜂窠小兒髮緋帛并等分作灰五月採搗和諸藥末服一錢七丁根出也𦵧杷草𦵧杷草秋穗子并染皂黑人鬢髮令人不老生山道傍圖經曰𦵧杷草主療丈夫血痢不療婦人若患積年疳痢即用其根俗間頻服有效患血痢𦵧杷草二斤搗絞取汁一小升內白麵半雞子許和之調令勻空腹頓服之極重者不過三服若無生者收取苗陰乾為散患痢者取散一方寸七和蜜水半盞服之禹錫等云𦵧杷草出近世古方未見其用者雖陳藏器嘗言其黑人鬢髮令不老生道傍然未甚詳悉太宗皇帝御書記其主療甚為精至謹用書於本草圖經外類篇首云百草灰主腋臭及金瘡五月五目採露取之一百種陰乾燒作灰以井華水為團重燒令白以釅醋和為餅腋下挾之乾即易當抽一身痛悶瘡出即止以水小便洗之不過三兩度又主金瘡止血生肌取灰和石灰為團燒令白刮傅瘡上産死婦人冢上草主小兒醋瘡取之勿回顧作浴湯洗之不過三度佳孝子衫襟灰傅面皯靈床下鞋履主腳氣虻母草葉卷如實中有血蟲羽化為虻便能咬人生塞北草葉如葵以葉合和桂杵為末傅人馬山行無復虻來故蓑衣結燒為灰和油傅蠼螋溺瘡佳故炊帚主人面生白駁以月蝕夜和諸藥燒成灰和苦酒合為泥傅之天羅勒主溪毒挼碎傅之瘡上似天羅勒生江南平地毛蓼主癰腫疽瘻瘰癧杵碎內瘡中引膿血生肌亦作湯洗瘡兼濯足治腳氣生山足似烏蓼葉上有毛根冬不死也蛇芮草主蛇虺及毒蟲等螫取根葉搗傅咬處當下黃水生平地葉似苦杖而小節赤高一二尺種之辟蛇又有一種草莖圓似苧亦傅蛇毒百一方東關有草狀如苧莖方節赤挼傅蛇毒如摘却亦名蛇芮草二草總能主蛇未知何者的是有鼠芮草如菖蒲出山石上取根藥鼠立死萬一藤主蛇咬杵篩以水和如泥傅癰上藤蔓如小豆生嶺南亦名萬吉螺黶草主癰腫風疹腳氣腫搗傅之亦煮湯洗腫處藤生石上似螺黶微有赤色背有少毛繼母草主惡瘡杵傅之生塞北川原有紫碧花花有角角上有刺蒿之類也亦名繼母藉甲煎味辛平無毒主甲疽瘡及雜瘡難差者蟲蜂蛇蝎所螫疼小兒頭瘡吻瘡耳後月蝕瘡并傅之合諸藥及美果花燒成灰和蠟成口脂所主與甲煎略同三年者治蟲雜瘡及口旁饞瘡甲疽等瘡金瘡小草味甘平無毒主金瘡止血長肌斷鼻中衄血取葉挼碎傅之又預和石灰杵為圓日乾臨時刮傅亦煮服斷血瘀及卒下血生江南村落田野間下濕地高一二寸許如齊葉短春夏間有淺紫花長一粳米也鬼叉草味苦平無毒主蛇及蜘蛛咬杵碎傅之亦搗絞汁服生池畔葉有丫方莖子作叉腳著人衣如針北人呼為鬼針圖經衍義本草卷之十七
