body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正蟲魚部上品石蜜石蜜味甘平微溫無毒主心腹邪氣諸驚癇痓安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目久服强志輕身不饑不老延年神仙一名石飴生武都山谷河源山谷及諸山石中色白如膏者良圖經曰蜜本經作石蜜蘇恭云當去石字生武都山谷河源山谷及諸山中今蜀江南嶺南皆有之蠟白蠟生武都山谷出於蜜房木石間今處處有之而宣歙唐鄧伊洛間尤多石蜜即崖蜜也其蜂黑色似虻作房於巖崖高峻處或石窟中人不可到但以長竿刺令蜜出以物承之多者至三四石味醶色緑入藥勝於他蜜藥性論云白蜜君治卒心痛及赤白痢水作蜜漿頓服一碗止又生薑汁蜜各一合水和頓服之又常服面如花紅神仙方中甚貴治口瘡浸大青葉含之陶隱居云石蜜即崖蜜也高山巖石間作之色青赤味小醶食之心煩其蜂黑色似虻又木蜜呼為食蜜懸樹枝作之色青白樹空及人家養作之者亦白而豐厚味美凡蜂作蜜皆須人小便以釀諸花乃得和熟狀似作飴須蘖也陳藏器云蜜主牙齒疳𧏾唇口瘡目膚赤障殺蟲雷公云凡煉蜜一斤只得十二兩半或一分是數若火少火過并用不得食療云微溫主心腹邪氣諸驚癇補五臟不足氣益中止痛解毒能除衆病和百藥養脾氣除心煩悶不能飲食治心肚痛血刺腹痛及赤白痢則生搗地黃汁和蜜一大匙服即下又長服之面如花色仙方中甚貴此物若覺熱四肢不和即服蜜漿一碗甚良又能止腸澼除口瘡明耳目久服不饑又點目中熱膜家養白蜜為上木蜜次之崖蜜更次孫真人食忌云七月勿食生蜜若食則暴下發霍亂産書云治産後渴蜜不計多少煉過熟水溫調服即止外臺祕要方比歲有病天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨决隨生不即療數日必死差後瘡瘢黯一歲方滅此惡毒之氣世人云建武中南陽擊虜仍呼為虜瘡諸醫參詳療之方取好蜜通抹瘡上以蜜煎升麻數數拭之傷寒類要方陽明病自汗者若小便自利此為津液內竭雖爾不可攻之當須自欲大便宜蜜煎導以通之取蜜七合於銅器中微火煎可丸捻作一挺如指許大得冷以納穀道中須臾必通矣葛氏方食諸魚骨鯁雜物鯁以好蜜七抄稍稍服之令下梅師方治年少髮白拔去白髮以白蜜塗毛孔中即生黑者髮不生取梧桐子搗汁塗上必生黑者又方肛門主肺肺熱即肛塞腫縮生瘡白蜜一升猪膽一枚相和微火煎令可丸丸長三寸作挺塗油內下部卧令後重須臾通泄肘後方凡有惡毒之瘡五色無常蜜和乾薑末傅之衍義曰石蜜嘉祐本草石蜜收蟲魚部中又見果部新書取蘇恭說直將石字不用石蜜既自有本條煎煉亦自有法今人謂之乳糖則蟲部石蜜自是差誤不當更言石蜜也本經以謂白如膏者良由是知石蜜字乃白蜜字無疑去古既遠亦文字傳寫之誤故今人尚言白沙蜜蓋經久則陳白而沙新收者惟稀而黃次條蜜蠟故須别立目蓋是蜜之房攻治亦别至如白蠟又附於蜜蠟之下此又誤矣本是續上文叙蜜蠟之用及注所出州土不當更分之為二何者白蠟本條中蓋不言性味止是言其色白爾既有黃白二色今止言白蠟是取蠟之精英者在黃蠟直置而不言黃則蠟陳白則蠟新亦是蜜取陳蠟取新也蜂子蜂子味甘平微寒無毒主風頭除蠱毒補虛羸傷中心腹痛大人小兒腹中五蟲口吐出者面目黃久服令人光澤好顔色不老輕身益氣大黃蜂子主心腹脹滿痛乾嘔輕身益氣土蜂子主癰腫嗌音益喉也痛一名蜚零生武都山谷畏黃芩芍藥牡蠣陶隱居云前直云蜂子即應是蜜蜂子也取其未成頭足時炒食之又酒浸以傅面令面悅白黃蜂則人家屋上者及侯𤬏蜂也陳藏器本草云蜂子主丹毒風疹腹內留熱大小便澀去浮血婦人帶下下乳汁此即蜜房中白如蛹者其穴居者名土蜂最大螫人至死其子亦大白功用同蜜蜂子也日華子云樹蜂土蜂蜜蜂凉有毒利大小便治婦人帶下等病又有食之者須以冬瓜及苦蕒生薑紫蘇以制其毒也禹錫云按陳藏器云土蜂赤黑色燒末油和傅蜘蛛咬瘡此物能食蜘蛛亦取其相伏也蜜蠟味甘微溫無毒主下痢膿血補中續絶傷金瘡益氣不饑耐老白蠟療久泄澼後重見白膿補絶傷利小兒久服輕身不饑生武都山谷生於蜜房木石間惡芫花齊蛤圖經曰文具石蜜條下陶隱居云此即蜜蠟爾生於蜜中故謂蜜蠟蜂皆先以此為蜜跖音隻煎蜜亦得之初時極香軟人更煮煉或加少醋酒使黃赤以作燭色為好今藥家皆應用白蠟但取削之於夏月日暴百日許自然白卒用之亦可煬納水中十餘過亦白俗方惟以合療下丸而仙經斷穀最為要用今人但嚼食方寸者亦一日不饑也禹錫云按藥性論云白蠟使味甘平無毒主孕婦人胎動漏下血不絶欲死以蠟如雞子大煎消三五沸美酒半斤投之服之差主白髮鑷去消蠟點孔中即生黑者和松脂杏人棗肉茯苓等分合成食後服五十丸便不饑功用甚多又云主下痢膿血衍義曰文具石蜜條下牡蠣牡蠣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白除留熱在關節榮衛虛熱去來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便療泄精喉痹咳嗽心脅下痞熱久服强骨節殺邪鬼延年一名蠣蛤一名牡蛤生東海池澤採無時貝母為之使得甘草牛膝遠志蛇床良惡麻黃吳茱萸辛荑圖經曰牡蠣生東海池澤今海傍皆有之而南海閩中及通泰間尤多此物附石而生磈礧相連如房故名蠣房讀如阿房之房一名蠔山晋安人呼為蠔莆初生海邊才如拳石四面漸長有一二丈者嶄岩如山者一房內有蠔肉一塊肉之大小隨房所生大房如馬蹄小者如人指面每潮來則諸房皆開有小蟲入則合之以充腹海人取之皆鑿房以烈火逼開之挑取其肉而其殼左顧者為雄右顧者則牝蠣耳藥性論云牡蠣君主治女子崩中止盜汗除風熱止痛治溫瘧又和杜仲服止盜汗末蜜丸服三十丸令人面光白永不值時氣主鬼交精出病人虛而多熱加用之并地黃小草陶隱居云是百歲雕所化以十一月採為好去肉二百日成今出東海永嘉晋安皆好道家方以左顧者是雄故名牡蠣右顧則牝蠣爾生著石皆以口在上舉以腹向南視之口斜向東則是或云以尖頭為右顧者未詳孰是例以大者為好孟詵云牡蠣火上炙令沸去殼食之甚美令人細肌膚美顔色又藥家比來取左顧者若食之即不揀左右也可長服之海族之中惟此物最貴北人不識不能表其味爾段成式酉陽雜俎云牡蠣言牡非謂雄也肘後方大病差後小勞便鼻衄牡蠣十分石膏五分搗末酒服方寸七日三四亦可蜜丸如梧桐子大服之經驗方治一切渴大牡蠣不計多少於臘日端午日黃泥裹燬通赤放冷取出為末用活鯽魚煎湯調下一錢匕小兒服半錢匕只兩服差海藥云按廣州記云出南海水中主男子遺精虛勞乏損補腎正氣止盜汗去煩熱治傷熱疾能補養安神治孩兒驚癇久服輕身用之炙令微黃色熟後研令極細入丸散中用勝金方治甲疽弩肉裹甲膿血疼痛不差牡蠣頭厚處生研為末每服二錢研靛花酒調下如癰盛已潰者以末傅之乃更服藥并一日三服初虞世方治瘰癧發頸項破未破甚效如神牡蠣四兩甘草二兩為末每服一大錢食後臘茶同點日三集驗方治癰一切腫未成膿拔毒牡蠣白者為細末水調塗乾更塗衍義曰牡蠣須燒為粉用兼以麻黃根等分同搗研為極細末粉盜汗及陰汗本方使生者則自從本方左顧經中本不言止從陶隱居說其酉陽雜俎已言牡蠣言牡非為雄也且如牡丹豈可更有牝丹也今則合於地人面向午位以牡蠣頂向子視之口口在左者為左顧此物本無目如此焉得更有顧眄也龜甲味鹹甘平有毒主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合頭瘡難燥女子陰瘡及驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良久服輕身不饑益氣資智亦使人能食一名神屋生南海池澤及湖水中採無時勿令中濕中濕即有毒惡沙參蜚蠊圖經曰文具秦龜條下藥性論云畏狗膽無毒燒灰治小兒頭瘡不燥骨帶入山令人不迷血治脫肛灰治脫紅陶隱居云此用水中神龜長一尺二寸者為善厭可以供卜殼可以充藥亦入仙方用之當炙生龜溺甚療久嗽亦斷瘧肉作羹臛大補而多神靈不可輕殺書家載之甚多此不具說也蕭炳云殼主風腳弱炙之末酒服日華子云卜龜小者腹下可十鑽遍者名敗龜治血麻痹入藥酥炙用又名敗將食療云溫味酸主除溫瘴氣風痹身腫踒折又骨帶入山林中令人不迷路其食之法一如鱉法也其中黑色者常啖蛇不中食之其殼亦不堪用經驗方治産後産前痢敗龜一枚用米醋炙搗為末米飲調下抱朴子云千歲靈龜五色具焉其雄額上兩骨起似角以羊血浴之乃剔取其甲炙搗服三寸匕日三盡一具衍義曰文具秦龜條下秦龜秦龜味苦無毒主除濕痹氣身重四肢關節不可動搖生山之陰土中二月八月取圖經曰秦龜山中龜不入水者是也生山之陰土中或云秦以地稱云生山之陰者是秦地山陰也今處處有之龜甲水中神龜也生南海池澤及湖水中今江湖間皆有之山中龜其形大小無定大者有如碑趺食草根竹𥯋冬月藏土中至春而出遊山谷中今市肆間人或畜養為玩至冬而埋土穴中然藥中稀用卜人亦取以占山澤揭取其甲亦堪飾器物爾雅所謂山龜者豈是此歟水中龜其骨白而厚色至分明所以供卜人及入藥用以長一尺二寸為善陶隱居云即山中龜不入水者形大小無定方藥不堪用龜類雖多入藥止有兩種爾又有𪚻龜小狹尾長乃言療蛇毒以其食蛇故也用以卜則吉凶正反帶秦龜前臑乃到切骨令人入山不迷廣州有蟕蠵其血甚療俚人毒箭傷陳士良云𪚻龜腹下橫折秦人呼為蟕蠵山龜是也肉寒有毒主筋脉凡撲損便取血作酒食肉生研厚塗立效日華子云蟕蠵平微毒治中刀箭悶絶刺血飲便差皮甲名皮治血疾若無生血煎汁代之亦可寶裝飾物海藥云謹按正經云生在廣州山谷其殼味帶苦治婦人赤白漏下破積癥頑風冷痹關鬲氣壅或經卜者更妙凡用炙令黃然後入諸藥中用抱朴子云蠳龜啖蛇南人皆帶蠳龜之尾以辟蛇蛇中人刮此物以傅之其瘡亦便愈衍義曰秦龜即生於秦者秦地山中多老龜極大而壽龜甲即非止秦地有四方皆有之但取秦地所出大者為勝今河北獨流釣臺甚多取龜筒治療亦入衆藥止此二種各逐本條以其靈於物方家故用以補心然甚有驗真珠真珠寒無毒主手足皮膚逆臚鎮心綿裹塞耳主聾傅面令人潤澤好顔色粉點目中主膚翳障膜圖經曰真珠本經不載所出州士今出廉州北海亦有之生於珠牡俗謂之珠母珠牡蚌類也按嶺表録異廉州邊海中有洲島島上有大池謂之珠池每歲刺史親監珠户入池採老蚌剖取珠以充貢地雖在海上而人疑其底與海通池水乃淡此不可測也土人採小蚌肉作脯食之往往得細珠如米者乃知此池之蚌隨大小皆有珠矣而今之取珠牡云得於海傍不必是珠池中也禹錫云按藥性論云真珠君治眼中翳障白膜七寶散用磨翳障亦能墜痰日華子云真珠子安心明目注顔色也海藥云謹按正經云生南海石决明産出也主明目除面䵟止泄合知母療煩熱消渴以左纏根治兒子麩豆瘡入眼蜀中西路女爪亦出真珠是蚌蛤産光白甚好不及舶上彩耀欲穿須得金剛鑽也為藥須久研如粉麵方堪服餌研之不細傷人腑臟外臺祕要方療子死腹中方真珠二兩為末酒調服盡立出抱朴子云真珠徑寸已上可服服之可以長久酪漿浸之皆化如水銀亦可以浮石水蜂窠鱟化包彤蛇黃合之可以引長三四尺丸服之絶穀得長生衍義曰真珠小兒驚熱藥中多用河北塘濼中亦有圍及寸者色多微紅珠母與廉州珠母不相類但清水急流處其色光白水濁及不流處其色暗餘如經玳瑁玳瑁寒無毒主解嶺南百藥毒俚人刺其血飲以解諸藥毒大如帽似龜甲中有文生嶺南海畔山水間圖經曰玳瑁生嶺南山水間今亦出廣南蓋龜類也惟腹背甲皆有紅點斑文其大有如盤入藥須生者乃靈帶之可以辟蠱毒凡遇飲食有毒則必自搖動死者則不能神矣禹錫云按陳士良云玳瑁身似龜首觜如鸚鵡肉平主諸風毒行氣血胸膈中風痰鎮心脾逐邪熱利大小腸通婦人經脉甲殼亦似肉同療心風邪解煩熱日華子云破癥結消癰毒止驚癇等疾陳藏器云大如扇似龜甲有文餘并同楊氏産乳方産乳療中蠱毒生玳瑁以水如濃飲服一盞日解衍義曰玳瑁治心經風熱生者入藥蓋性味全也既入湯火中即不堪用為器物者是矣與生熟犀其義同桑螵蛸桑螵蛸味鹹甘平無毒主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道又療男子虛損五臟氣微夢寐失精遺溺久服益氣養神一名蝕疣音尤生桑枝上螳螂子也二月三月採蒸之當火炙不爾令人泄得龍骨療泄精畏旋復花圖經曰桑螵蛸螳螂子也本經不載所出州土今在處有之螳螂逢木便産一枚出子數百多在小木荆及棘間桑上者兼得桑皮之精氣故以為佳而市之貨者多非真須連枝折之為驗然僞者亦能以膠著桑枝上入藥不宜也三月四月採蒸過取之亦火炙不爾則令人泄一法採得便以熱漿水浸一伏時焙乾更於柳木灰中炮令黃用之藥性論云桑螵蛸臣畏戴椹主男子腎衰漏精精自出患虛冷者能止之止小便利火炮令熱空心食之虛而小便利加而用之陶隱居云俗呼螳螂為妬音石螂逢樹便産以桑上者為好是兼得桑皮之津氣市人恐非真皆令合枝斷取之爾僞者亦以膠著桑枝之上也雷公云凡使勿用諸雜樹上生者螺螺不入藥中用凡採覓者須桑樹東畔枝上者採得去核子用沸漿水浸淘七遍令水遍沸於瓷鍋中熬令乾用勿亂别修事却無效也經驗方治底耳方用桑螵蛸一個慢火炙及八分熟存性細研入麝香一字為末摻在耳內每用半書字神效如有膿先用綿包子拈去次後摻藥末入在耳內産書云治妊娠小便數不禁桑螵蛸十二枚搗為末分作兩服米飲下楊氏産乳同又方療小便不通及胞轉桑螵蛸搗末米飲服方寸匕日三衍義曰桑螵蛸自採者真市中所售者恐不得盡皆桑中者蜀本圖經浸泡之法不若略蒸過為佳鄰家有一男子小便日數十次如稠米泔色亦白心神恍惚瘦瘁食减以女勞得之令服此桑螵蛸散未終一劑而愈安神魂定心志治健忘小便數補心氣桑螵蛸遠志菖蒲龍骨人參茯神當歸龜甲醋炙已上各一兩為末夜卧人參湯調下二錢如無桑上者即用餘者仍須以炙桑白皮佐之量多少可也蓋桑白皮行水意以接螵蛸就腎經用桑螵蛸之意如此然治男女虛損益精陰痿夢失精遺溺疝瘕小便白濁腎衰不可闕也石决明石决明味鹹平無毒主目障翳痛青盲久服益精輕身生南海圖經曰石决明生南海今嶺南州郡及萊皆有之舊說或以為紫貝或以為鰒魚甲按紫貝即今人砑螺古人用以為貨幣者殊非此類鰒魚王莽所食者一邊著石光明可愛自是一種與决明相近耳决明殼大如手小者如三兩指海人亦啖其肉亦取其殼清水洗眼七孔九孔者良十孔者不佳採無時陶隱居云俗云是紫貝定小異亦難得又云是鰒魚甲附石生大者如手明耀五色內亦含珠今人皆水漬紫貝以尉眼頗能明此一種本亦附見在决明條中既是異類今為副品日華子云石决明凉明目殼磨障翳亦名九孔螺也海藥云主青盲內障肝肺風熱骨蒸勞極并良凡用先以麵裹熟煨然後磨去其外黑處并粗皮了爛搗之細羅於乳鉢中再研如麵方堪用也勝金方治小腸五淋石决明去粗皮甲研細如有軟硬物淋即添朽木細末熟水調二錢衍義曰石决明經云味鹹即是肉也人採肉以供饌及乾致都下北人遂為珍味肉與殼兩可用方家宜審用之然皆治目殼研水飛點磨外障翳登萊州甚多海蛤海蛤味苦鹹平無毒主咳逆上氣喘息煩滿背痛寒熱療陰痿一名魁蛤生東海蜀漆為之使畏狗膽甘遂芫花圖經曰海蛤文蛤并生東海今登萊滄州皆有之陶隱居以細如巨勝潤澤光淨者為海蛤云經雁食之從糞中出過數多故有光澤也以大而有紫斑文者為文蛤陳藏器以為海蛤是海中爛殼久為風波濤洗自然圓淨此有小而久遠者為佳不必雁腹中出也藥性論云海蚧亦曰海蛤臣亦名紫薇味平有小毒能治水氣浮腫下小便治嗽逆上氣主治項下瘤癭唐本注云此物以細如巨勝潤澤光淨者好有粗如半杏人者不入藥用亦謂為豚耳蛤粗惡不堪也蕭炳云止消渴潤五臟治服丹石人有瘡日華子云治嘔逆陰痿胸脅脹急腰痛五痔婦人崩中帶下病此即鮮蛤子雁食後糞中出有文彩者為文蛤無文彩者為海蛤鄉人又多將海岸邊爛蛤殼被風濤打磨瑩滑者僞作之衍義曰海蛤文蛤陳藏器所說是今海中無雁豈有食蛤糞出者若蛤殼中有肉時尚可食肉既無焉得更有糞中過數多者必為其皆無廉棱乃有是說殊不知風浪日夕淘汰故如是治傷寒汗不溜搐却手腳海蛤川烏頭各二兩川山甲二兩為末酒糊和丸大一寸許捏扁置所患足心下擘葱白蓋藥以綿纏定於暖室中取熱水浸腳至膝上久則水溫又添熱水候遍身汗出為度凡一二日一次浸腳以知為度文蛤味鹹平無毒主惡瘡蝕五痔咳逆胸痹腰痛脅急鼠瘻大孔出血崩中漏下生東海表有文取無時圖經曰文具海蛤條下陶隱居云海蛤至滑澤云從雁屎內得之二三十過方為良今人多取相摝令磨蕩似之爾文蛤小大而有紫斑此既異類而同條若别之則數多今以為附見而在副品限也凡有四物如此陳藏器云海蛤主水癊取二兩先研二日漢防已棗肉杏仁二兩葶藶子六兩熬研成脂為丸一服十丸利下水千金翼方治急疳蝕口鼻數日盡欲死燒文蛤灰臘月脂和塗之衍義曰文具海蛤條下蠡魚蠡魚音禮味甘寒無毒主濕痹面目浮腫下大水療五痔有瘡者不可食令人瘢白一名鮦魚生九江池澤取無時圖經曰蠡通作鱧字魚生九江池澤今處處有之陶隱居云為公蠣蛇所變至難死猶有蛇性謹按爾雅鱧鯇郭璞注云鱧鮦也釋者曰鱧鯇也詩小雅云魚麗於罶魴鱧毛傳云鱧鯇也正義云諸本或作鱧䱰陸機謂鯇即鮑魚也似鱧狹而厚今京東出呼鱧魚其實二類也陶隱居云今皆作鱧字舊言是公蠣蛇所變然亦有相生者至難死猶有蛇性合小豆白煮以療腫滿甚效唐本注云别録云腸及肝主久敗瘡中蟲諸魚灰并主哽噎日華子云鯉魚腸以五味炙貼痔瘻及蛇骭良久蟲出即去之諸魚中惟此膽甘可食外臺祕要方療患腸痔每大便常有血鯉魚鱠薑齏食之佳任性多少差忌冷毒物食醫心鏡云治十種水氣病不差垂死鱧魚一頭重一斤已上又熟取汁和冬瓜葱白作羹食之又方治野雞病下血不止腸疼痛鱧魚一頭如食法作鱠蒜齏食之靈苑方治急喉閉逡巡不救者蠡魚膽臘月收陰乾為末每服少許點患處藥至即差病深則水調灌之衍義曰蠡魚今人謂之黑鯉魚道家以謂頭有星為厭世有知之者往往不敢食又發故疾亦須忌爾今用之療病亦止取其一端耳鮧魚鮧魚鮧音夷又音題味甘無毒主百病圖經曰鮧魚舊不著所出州土今江浙多有之大首方口背青黑無鱗多涎其類有三陶隱居云即鯷魚也即鮎魚也又有鱯魚相似而大鮠魚亦相似色黃而美三種形性皆相類而小不同陶隱居云此即鯷音題也今人皆呼慈音即是鮎魚作臛食之云補又有鱯魚相似而大又有鮠五回切魚亦相似黃而美益人其合鹿肉及赤目赤鬚無鰓者食之并殺人又有人魚似鯷而有四足聲如小兒食之療瘕疾其膏燃之不消耗始皇驪山冢中用之謂之人膏也荆州臨沮青溪至多此魚食療云鮎與鱯大約相似主諸補益無鱗有毒勿多食赤目赤鬚者并殺人也千金翼方治刺傷中毒水燒魚目灰塗之衍義曰鮧魚形少類獺有四足腹重墜如囊身微紫色嘗剖之中有三小蟹又有四五小石塊如指面許小魚五七枚然無鱗與鮎鮠相類今未見用者鱔魚鱔魚音善味甘大溫無毒主補中益血療瀋音審唇五月五日取頭骨燒之止痢陶隱居云鱔是荇芩根化作之又云是人髮所化今其腹中自有子不必盡是變化也性熱作臛食之亦補而時行病起食之多復又善令人霍亂凡此水族魚蝦之類甚多其有名者已注在前條雖皆可食而甚損人故不入藥用又有食之反能致病者今條注如後說凡魚頭有白色如連珠至脊上者腹中無膽者頭中無鰓者并殺人魚汁不可合鸕鷀肉食之鯽魚不可合猴雉肉食之鰍音秋鱔不可合白犬血食之鯉魚子不可合猪肝食之鯽魚亦爾青魚鮓不可合生胡荽及生葵并麥醬食之陳藏器云鱔魚主濕痹氣補損婦人産後淋瀝血氣不調羸瘦止血除腹中冷氣腸鳴禹錫云按蜀本圖經云似鰻鱺魚而細長亦似蛇而無鱗有青黃二色生水岸泥窟中孟詵云鱔魚補五臟逐十二風邪患氣人常作臛空腹飽食便以衣蓋卧少頃當汗出如白膠汗從腰腳中出候汗盡暖五木湯浴須忌風一日更三五日一服并治濕風聖惠方治婦人乳結硬痛用鱔魚皮燒灰末空心暖酒調二錢匕衍義曰鱔魚腹下黃世謂之黃鱔此尤動風氣多食令人霍亂屢見之向在京師鄰舍一郎官因食黃鱔遂致霍亂吐利幾至委頓又有白鱔稍粗大色白二者皆亡鱗大者長尺餘其形類蛇但不能陸行然皆動風江陵府西有湖曰西湖每歲夏秋沮河水漲即湖水滿溢冬即復涸土人於乾土下撅得之每及二三尺則有往來之路中有泥水水涸又下水至復出鰂魚鰂魚主諸瘡燒以醬汁和塗之或取猪脂煎用又主腸癰頭灰禹錫等按藥對云頭溫主小兒頭瘡口瘡重舌目翳一名鮒音父魚合蓴作羹主胃弱不下食作鱠主久赤白痢圖經曰鯽魚本經不載所出州土今所在池澤皆有之似鯉魚色黑而體促肚大而脊隆亦有大者至重二三斤性溫無毒鱗甲中最可食或云稷米所化故其腹尚有米色又有一種背高腹狹小者名鯽魚功用亦與鯽魚同但力差劣耳又黔州有一種重唇石鯽魚亦其類也日華子云鯽魚平無毒溫中下氣補不足作鱠療腸澼水穀不調及赤白痢燒灰以傅惡瘡良又釀白礬燒灰治腸風血痢頭燒灰療嗽又云子不宜與猪肉同食禹錫等按蜀本云鯽魚味甘溫止下痢多食亦不宜人又注云形亦似鯉色黑而體促肚大而脊隆所在池澤皆有之孟詵云鯽魚平胃氣調中益五臟和蓴作羹食良又鯽魚與鯽其狀頗同味則有殊鯽是節化鯽是稷米化之其魚腹尚有米色寬大者是鯽背高腹狹小者是鯽其功不及鯽子調中益肝氣食療云食之平胃氣調中益五臟和蓴作羹食作鱠食之斷暴下痢和蒜食之有少熱和薑醬食之有少冷又夏月熱痢可食之多益冬月則不治也骨燒為灰傅𧏾瘡蟲三五度差謹按其子調中益肝氣聖惠方治小兒腦疳鼻癢毛髮作穗面黃羸瘦益腦用鯽魚膽滴於鼻中連三五日甚良效外臺祕要方治患腸痔大便常有血食鯽魚羹及隨意任作飽食孫真人同孫真人方主腳氣及上氣取鯽魚一尺長者作鱠食一兩頓差食醫心鏡方治脾胃氣冷不能下食虛弱無力鶻突羹鯽魚半斤細切起作鱠沸豉汁熱投之著胡椒乾薑蒔蘿橘皮等末空腹食之衍義曰鯽魚開其腹內藥燒之治齒鯉魚鯉魚膽味苦寒無毒主目熱赤痛青盲明目久服强悍益志氣肉味甘主咳逆上氣黃疸止渴生者主水腫腳滿下氣骨主女子帶下赤白齒主石淋生九江池澤取無時圖經曰鯉魚生九江池澤今處處有之即赤鯉魚也其脊中鱗一道每鱗上有黑小點從頭數至尾無大小三十六鱗古語云五尺之鯉與一寸之鯉大小雖殊而鱗之數等是也又崔豹古今注釋鯉魚有三種兖州人謂赤鯉為玄駒謂白鯉為白驥黃鯉為黃雉蓋諸魚中此為最佳又能神變故多貴之今人食品中以為上味其膽肉骨齒皆入藥古今方書并用之陶隱居云鯉魚最為魚之主形既可愛又能神變乃至飛越山湖所以琴高乘之山上水中有鯉不可食又鯉鮓不可合小豆藿食之其子合猪肝食之亦能害人唐本注云骨主陰蝕哽不出血主小兒丹腫及瘡皮主癮疹腦主諸癇腸主小兒肌瘡日華子云鯉魚凉有毒肉治咳嗽療腳氣破冷氣痃瘕懷妊人治胎不安絹裹鱗和魚煮羹熟後去鱗食之驗脂治小兒癇疾驚忤膽治障翳等腦髓治暴聾煮粥服之良諸溪澗中者頭內有毒不計大小并三十六鱗也禹錫云按大腹水腫通用藥云鯉魚寒群藥對云平陳士良云無毒藥性論云鯉魚膽亦可單用味大苦點眼治赤腫翳痛小兒熱腫塗之蜀漆為使魚燒為末治咳嗽糯米煮粥孟詵云鯉魚白煮食之療水腫腳滿下氣腹有宿瘕不可食又修理可去脊上兩筋及黑血毒故也又天行病後不可食再發却死其在沙石中者毒多在腦中不得食頭食療云膽主除目中赤及熱毒痛點之良肉白煮食之療水腫腳滿下氣腹中有宿瘕不可食害人久服天門冬人亦不可食刺在肉中中風水腫痛者燒鯉魚眼晴作灰納瘡中汁出即可謹按魚血主小兒丹毒塗之即差魚鱗燒烟絶研酒下方寸破産婦滯血脂主諸癇食之良聖惠方治水氣利小便除浮腫用鯉魚一個重一斤者治如食法修事食之外臺祕要方古今録療魚鯁骨橫喉中六七日不出取鯉魚鱗皮合燒作屑以水服之則出未出再服又方療水病腫鯉魚一頭極大者去頭尾及骨唯取肉以水二斗赤小豆一大升和魚肉煮可取二升已上汁生布絞去滓頓服盡如不盡分為三服後服溫令暖服訖當下利利盡即差又方凡腫已潰未潰者燒鯉魚作灰酢和塗之一切腫上以差為度千金方治暴痢小鯉魚二枚燒為末米飲服之大人小兒俱服得食醫心鏡方主肺咳嗽氣喘促鯉魚一頭重四兩去鱗紙裹火炮去刺研煮粥空腹吃衍義曰鯉魚至陰之物也其鱗故三十六陰極則陽復所以素問曰魚熱中王叔和曰熱即生風食之所以多發風熱諸家所解并不言日華子云鯉魚凉今不取直取素問為正萬一風家更使食魚則是貽禍無窮矣魁蛤味甘平無毒主痿痹泄痢便膿血一名魁陸一名活東生東海正圓兩頭空表有文取無時陶隱居云形似紡軒音狂小狹長外有縱橫文理云是老蝙蝠化為用之至少而本經海蛤一名魁蛤與此為異也禹錫云按蜀本圖經云形圓長似大腹檳榔頭有孔今出萊州鮑魚味辛臭溫無毒主墜墮腿吐猥切蹶踠折瘀血血痹在四肢不散者女子崩中血不止勿令中鹹陶隱居云所謂鮑魚之肆言其臭也俗人呼為䱒魚字似鮑又言鹽䱒之以成故也作藥當用少鹽臭者不知正何種魚爾乃言穿貫者亦入藥方家自少用之今此鮑魚乃是鱅魚長尺許合完淡乾之而都無臭氣要自療漏血不知何者是真禹錫云按蜀本圖經云十月後取魚去腸繩穿淡乾之凡魚皆堪食不的取一色也據陶注作藥當用少鹽不知正何種魚爾又據本經云勿令中鹹是知入藥當少以鹽䱒成之有鹽則中鹹而不臭鹽少則味辛而臭矣古人云與不善人居如入鮑魚之肆謂惡人之行如鮑魚之臭也考其實則今荆楚淡魚頗臭而微辛方家亦少用舊云沔州復州作之餘皆不出審陶注及圖經與本經即所在皆可作之也又據鮧魚有口小背黃腹白者為鮑魚而療治與鮧魚同補益主百病今圖經既不的取一色可淡乾此之為是也時魚平補虛勞稍發疳痼黃魚平有毒發諸氣病不可多食亦發瘡疥動風不宜和蕎麥同食令人失音也魴魚調胃氣利五臟和芥子醬食之助肺氣去胃家風消穀不化者作鱠食助脾氣令人能食患疳痢者不得食作羹臛食宜人其功與鯽魚同鱘魚味甘平無毒主益氣補虛令人肥健生江中背如龍長一二丈鼻上肉作脯名鹿頭一名鹿肉補虛下氣子如小豆食之肥美殺腹內小蟲食療云有毒主血淋可煮汁飲之其味雖美而發諸藥毒鮓世人雖重尤不益人服丹石人不可食令人少氣發一切瘡疥動風氣不與乾笋同食發癱緩風小兒不與食結癥瘕及嗽大人久食令人卒心痛并使人卒患腰痛海豚魚味鹹無毒肉主飛尸蠱毒瘴瘧作脯食之一如水牛肉味小腥耳皮中肪摩惡瘡疥癬痔瘻犬馬瘑疥殺蟲生大海中候風潮出沒形如豚鼻中聲腦上有孔噴水直上百數為群人先取得其子繫著水中母自來就而取之其子如蠡魚子數萬為群常隨母而行亦有江豚狀如豚鼻中為聲出沒水上海中舟人候之知大風雨又中有曲脂堪摩病及樗博即明照讀書及作即暗俗言懶婦化為此也鱣魚肝無毒主惡瘡疥癬勿以鹽炙食郭注爾雅云鱣魚長二三丈顔氏家訓曰鱣魚純灰色無文古書云有多用鱣魚字為鱔既長二三丈則非鱔魚明矣本經又以鱔為鼉此誤深矣今明鱑魚體有三行甲上龍門化為龍也水龜無毒主難産産婦戴之亦可臨時燒末酒下出南海如龜長二三尺兩目在側傍圖經衍義本草卷之三十一
