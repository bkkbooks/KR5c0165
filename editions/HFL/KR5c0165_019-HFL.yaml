  text: 圖經衍義本草卷之十九事六
  hash: sha256:0eb83eae0428e639b9e6fa5086b122eaab5096912f7d48365e60ed80dbb11f77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_019-001a, image: hfl/0542/0542-158.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部下品木賊木賊味甘微苦無毒主目疾退翳膜又消積塊益肝膽明目療腸風止痢及婦人月水不斷得牛角䚡麝香治休息痢歷久不差得禹餘糧當歸芎藭療崩中赤白得槐鵝桑耳腸風下血服之效又與槐子枳實相宜主痔疾出血出秦隴華成諸郡近水地苗長尺許叢生每根一𦼮無花葉寸寸有節色青陵冬不凋四月採用之新定圖經曰木賊生秦隴同華間味微苦無毒主明目療風止痢所生山谷近水地有之獨莖苗如箭苛無葉長一二尺青色經冬不枯寸寸有節採無時今醫用之最多甚治腸痔多年不差下血不止木賊枳殻各二兩乾薑一兩大黄一分四味并剉一處於銚子内炒黑色存三分性擣羅温粟米飲調食前服二錢匕甚效廣利方治瀉血不止木賊十二分切以水一升八合煎取八合去滓空心温分二服如人行五里再服衍義曰木賊細剉微微炒搗爲末沸湯點二錢食前服治小腸膀胱氣緩緩服必效音燼草味苦平無毒主久欬上氣喘逆久寒驚悸痂疥白秃瘍氣殺皮膚小蟲可以染黄作金色生青衣川谷九月十月採畏鼠婦陶隱居云青衣在益州西唐本注云此草葉似竹而細薄莖亦圓小生平澤溪澗之側荆襄人煑以染黄色極鮮好洗瘡有效俗名緑草爾雅云所謂王蒭肴也禹錫等按爾雅疏云緑鹿蓐也今呼鴟脚莎詩衛風云膽彼淇澳緑竹猗猗是也藥性論云藎草使治一切惡食蒲公草味甘平無毒主婦人乳癰腫水煑汁飲之及封之立消一名構耨草唐本注云葉似苦苣花黄斷有白汁人皆啖之唐本先附禹錫等按蜀本圖經云花如菊而大莖葉斷之俱有白汁堪生食生平澤田園中四月五月採之圖經曰蒲公草舊不著所出州土今處處平澤田園中皆有之春初生苗葉如苦苣有細刺中心抽一莖莖端出一花色黄如金錢斷其莖有白汁人亦啖之俗呼爲蒲公英語訛爲僕公罌是也水煮汁以療婦人乳癰又擣以傅瘡皆佳又治惡刺及狐尿刺搗取根莖白汁塗之惟多塗立差止此方出孫思邈千金方其序云余以正觀五年七月十五目夜以左手中指背觸著庭木至曉遂患痛不可忍經十日痛曰深瘡日高大色如熟小豆色嘗聞長者之論有此方遂依治之手下則愈痛亦除瘡亦即差未十日而平復楊炎南行方亦著其效云梅師方治産後不自乳兒蓄積乳汁結作癰取蒲公草擣傅腫上日三四度易之穀精草味辛温無毒主療喉痹齒風痛及諸瘡疥飼馬主蟲顙毛焦等病二月三月於穀田中採之一名戴星草花白而小圓似星故有此名爾今附禹錫等按日華子云凉喂飼馬肥二三月於田中生白花者結水銀成沙子圖經曰穀精草舊不載所出州土今處處有之春生於穀田中葉𦼮俱青根花并白色二月三月内採花用一名戴星草以其葉細花白而小圓似星故以名爾又有一種葉細莖梗差長有節根微赤出秦隴間古方稀用今口齒藥多使之陳藏器云味甘平亦入馬藥用之白花細葉集驗方治偏正頭痛穀精草一兩爲末用白麵調攤紙花子上貼痛處乾又換牛扁草味苦微寒無毒主身皮瘡熱氣可作浴湯殺牛虱小蟲又療牛病生桂陽山谷陶隱居云今人不復識此牛疫代代不無用之既要牛醫家應用而亦無知者唐本注云此藥葉似三堇石龍芮等根如秦艽而細生平澤下濕地田野人名爲牛扁療牛虱甚效太常貯名扁特或名扁毒禹錫等按蜀本圖經云葉似石龍芮附子等今出寧州二月八月採根日乾圖經曰牛扁出桂陽山谷今潞州寧州亦有之葉似三堇石龍芮等根如秦艽而細多生平澤下濕地二月八月採以日乾今亦稀用按本經云殺牛虱小蟲蘇恭注云太常貯名扁特今潞州上一種名便特六月有花八月結實採其根搗末油調殺蟣虱根苗主療大都相似疑此即是牛扁但扁便不同豈聲近而字訛乎今以附之苦芺音襖微寒主面目通身漆瘡陶隱居云處處有之傖土莖切人取莖生食之五月五日採暴乾燒作灰以療金瘡甚驗唐本注云今人以爲漏蘆非也禹錫等按蜀本圖經云子若猫薊莖圓無刺五月採苗堪生啖所在下濕地有之藥性論云苦芺草亦可單用味苦無毒日華子云冷治丹毒食療云苦芺微寒生食治漆瘡五月五日採暴乾作灰傅面目通身漆瘡不堪多食酢漿酢漿草味酸寒無毒主惡瘡瘑瘻搗傅之殺諸小蟲生道傍唐本注云葉如細萍叢生莖頭有三葉一名醋母草一名鳩酸草今按别本注云生陰濕處俗爲小酸茅食之解熱渴四月五月採陰乾唐本先附臣禹錫等謹按蜀本圖經云葉似水萍兩葉并大葉同枝端黄色實黑生下濕地夏採葉用之圖經曰酢漿草俗呼爲酸漿舊不載所出州土云生道傍今南中下濕地及人家園圃中多有之北地亦或有生者葉如水萍叢生莖端有三葉葉間生細黄花實黑夏月採葉用初生嫩時小兒多食之南人用揩鍮石器令白如銀色光艷昨葉何草味酸平無毒主口中乾痛水穀血痢止血生上黨屋上如蓬初生一名瓦松夏採日乾唐本注云葉似蓬高尺餘遠望如松纔生年久瓦屋上今按别本汪云今處處有皆入藥用生眉髮膏爲要爾唐本先附禹錫等按蜀本圖經云六月七月採苗日乾之聖惠方治頭風白屑用瓦松暴乾燒灰淋汁熱洗頭不過五七度蒻音弱頭味辛寒有毒主癰腫風毒摩傅腫上搗碎以灰汁煑成餅五味調和爲茹食性冷主消渴生戟人喉出血生吴蜀葉似由跋半夏根大如碗生陰地雨滴葉下生子一名蒟蒻又有斑杖苗相似至秋有花直出生赤子其根傅癰腫毒甚根如蒻頭毒猛不堪食今附禹錫等按日華子云斑杖者虎杖之别名即前條虎杖是也圖經曰文具天南星條下夏枯草夏枯草味苦辛寒無毒主寒熱瘰癧鼠瘻頭瘡破癥散癭結氣脚腫濕痹輕身一名夕句一名乃東一名燕面生蜀郡川谷四月採土瓜爲之使唐本注云此草生平澤葉似旋復首春即生四月穗出其花紫白似丹參花五月便枯處處有之圖經曰夏枯草生蜀郡川谷今河淮浙州郡亦有之冬至後生葉似旋復三月四月開花作穗紫白色似丹參花結子亦作穗至五月枯四月採簡要濟衆治肝虚目睛疼冷淚不止筋脉痛及眼羞明怕日補肝散夏枯草半兩香附子一兩共爲末每服一錢臈茶調下無時候服衍義曰夏枯草今又謂之鬱臭自秋便生經冬不瘁春開白花中夏結子遂枯古方丸燒灰合緊面藥初生嫩時作菜食之須浸洗淘去苦水治瘰癧鼠漏燕薄草無毒主眠中遺溺不覺燒令黑研水進方寸七亦主噦氣此燕窠中草也新補見陳藏器日華子千金方治婦人無故尿血胡燕窠中草燒末用酒服半錢亦治丈夫孫眞人食忌主卒患腰惡瘡若先發於心已有汁者以胡燕窠末和水塗之治不可遲遍身即害人死鴨跖草味苦大寒無毒主寒熱瘴瘧痰飲下腫肉癥澁滯小兒丹毒發熱狂癇大腹痞滿身面氣腫熱痢蛇犬咬癰疽等毒和赤小豆煑下水氣濕痹利小便生江東淮南平地葉如竹高一二尺花深碧有角如鳥嘴北人呼爲鷄舌草亦名鼻斫草吴人呼爲跖跖斫聲相近也一名碧竹子花好爲色新補見陳藏器日華子山慈菰根有小毒主癰腫瘡瘻瘰癧結核等醋摩傅之亦剥人面皮除皯𪒟生山中濕地一名金燈花葉似車前根如慈菰零陵間又有團慈菰根似小蒜所主與此略同新補見陳藏器及日華子經驗方貼瘡腫以山慈菰一名鹿蹄草取莖葉搗爲膏入蜜貼瘡口上候清血出效苘實苘音頃實味苦平無毒主赤白冷熱痢散飲之吞一分破癰腫唐本注云一作䔛字人取皮爲索者也今按别本注云今人作布及索䔛麻也實似大麻子熱結癰腫無頭吞之則爲頭居穴九月十月採實陰乾唐本先附禹錫等按蜀本圖經云樹生高四尺葉似苧花黄實殻如蜀葵子黑古方用根八月採實圖經曰苘實舊不載所出州土今處處有之北人種以績布及打繩索苗高四五尺或六七尺葉似苧而薄花黄實帶殻如蜀葵中子黑色九月十月採實陰乾用古方亦用根楊氏産乳治赤白痢苘麻子一兩炒令香熟爲末以蜜漿下一錢不過再服赤車使者味辛苦温有毒主風冷邪疰蠱毒癥瘕五臟積氣唐本注云苗似香葇蘭香葉莖赤根紫赤色生溪谷之陰出襄州八月九月採根日乾唐本先附禹錫等按蜀本圖經云根紫如蒨根生荆州襄州山谷二月八月採藥性論云赤車使者有小毒能治惡風冷氣服之悦澤皮肌好顔色雷公云赤車使者元名小錦枝凡使并麤擣用七歲童子小便拌了蒸令乾更每修事五兩用小兒溺一益爲度狼跋子有小毒主惡瘡蝸疥殺蟲魚陶隱居云出交廣形扁扁爾擣以雜米投水中魚無大小皆浮出而死人用苦酒摩療疥亦效唐本注云此今京下呼黄環子爲之亦謂度谷一名就葛陶云出交廣今交廣送人太常正是黄環子非餘物爾今按别本注云味苦寒藤生花紫色屋遊味甘寒主浮熱在皮膚往來寒熱利小腸膀胱氣生屋上陰處八月九月採陶隱居云此瓦屋上青苔衣剥取煮服之今按别本注云無毒主小兒癇熱時氣煩悶止渴禹錫等按蜀本圖經云古瓦屋北陰青苔衣也地錦草地錦草味辛無毒主通流血脉亦可用治氣生近道田野出滁州者尤良莖葉細弱蔓延於地莖赤葉青紫色夏中茂盛六月開紅花細實取苗子用之絡石注有地錦是藤蔓之類雖與此名同而其類全别新定圖經曰地錦草生滁州及近道田野中味辛無毒主通流血脉亦治氣其苗葉細弱蔓遍地莖赤葉青赤中夏茂盛六月開紅花細實今醫家取苗子用之本經絡石條注中有地錦與此同名而别是一類也經驗方治臟毒赤白地錦草採得後洗暴乾爲末米飲下一錢立效敗船茹音如平主婦人崩中吐痢血不止陶隱居云此是大輻步典切除他盍切刮竹茹以挰直萌切漏處者取乾煮之亦燒作屑服之千金方治婦人遺尿不知出時船故茹爲末酒調服三錢子母秘録治無故遺血溺執中故竹茹乾末酒服三錢匕日三服燈心草味甘寒無毒根及苗主五淋生煑服之生江南滁州叢生莖圓江南長直人將爲席敗席煑服更良今附經驗方治小兒夜啼用燈心草燒灰塗乳上與之勝金方治破傷多用燈心草爛嚼和唾貼之用帛裹血立止又方治小蟲蟻入耳挑不出者以燈心浸油釣出蟲衍義曰燈心草陜西亦有蒸熟乾則拆取中心穰然燈者是謂之熟草又有不蒸者但生乾剥取者名生草入藥宜用生草五毒草味酸平無毒根主癰疽惡瘡毒腫赤白游軫蟲蠶蛇犬咬并醋摩傅焙上亦儔莖葉傅之恐毒入腹亦煮服之生江東平地花葉如蕎麥根緊硬似狗脊一名五蕺一名蛇罔又别有蠶罔草如苧麻與蕺同名也新補見陳藏器鼠麴草味甘平無毒調中益氣止泄除痰壓時氣去熱嗽雜米粉作糗食之甜美生平崗熟地高尺餘葉有白毛黃花荆楚時記云二月三日取鼠麴汁蜜和爲粉謂之龍舌䬳以壓時氣山南人呼爲香茅取花雜櫸皮染褐至破猶鮮江西人呼爲鼠耳草新補見陳藏器日華子列當味甘温無毒主男子五勞七傷補腰腎令人有子去風血煮及浸酒服之生山南巗石上如藕根初生掘取陰乾亦名栗當一名草蓯蓉今附食醫心鏡主興陽事栗當二斤一名列當擣篩末以酒一斗浸經宿隨性飲之馬勃味辛平無毒主惡瘡馬疥一名馬疕生園中乆腐處陶隱居云俗人呼爲馬屁勃紫色虚軟狀如狗肺彈之粉出傅諸瘡用之甚良也禹錫等按蜀本圖經云此馬疕菌也虚軟如紫絮彈之紫塵出生濕地及腐木上夏秋採之衍義曰馬勃此唐韓退之所謂牛溲馬勃俱收并蓄者也有大如斗者小亦如升杓去膜以蜜揉拌少以水調呷治喉閉咽痛屐音劇屧音燮鼻繩灰水服主噎哽心痛胸滿今按别本注云屐屧江南有之北人不識以桐木爲屐及屧也用蒲爲蒵用麻穿其鼻也久著脚者堪入藥用唐本先附禹錫等按蜀本圖經云取著經久遠欲爛斷者水服之良質汗味甘温無毒主金瘡傷折瘀血内損補筋肉消惡血下血氣婦人産後諸血結腹痛内冷不下食并酒消服之亦傅病處出西蕃如凝血蕃人煎甘草松泪檉乳地黄并熱血成之今附陳藏器云蕃人試藥取兒斷一足以藥内口中以足蹋之當時能走者至良水蓼主蛇毒擣傅之絞汁服止蛇毒入内心悶水煑漬捋脚消氣腫唐本注云葉似蓼莖赤味辛生下濕水傍今按别本注云生於淺水澤中故名水蓼其葉大於家蓼水挼食之勝於蓼子唐本先附禹錫等按日華子云水蓼味辛冷無毒集驗方治脚痛先以水蓼煮湯令温熱得所頻頻淋洗瘡乾自安蕕草味甘大寒無毒主濕痹消水氣合赤小豆煮食之勿與鹽主脚氣頑痹虚腫小腹急小便赤澀搗葉傅毒腫又絞取汁服之主消渴生水田中似結縷葉長馬食之爾雅云蕕蔓於注云生水中江東人呼爲莤證俗云蕕水草也新補見陳藏器衍義曰蕕草爾雅曰酋音猶蔓于左傳亦曰一薰一蕕十年尚猶有臭者是此草敗芒箔無毒主産婦血滿腹脹痛血渴惡露不盡月閉止好血下惡血去鬼氣疰痛癥結酒煮服之亦燒爲末酒下彌乆著烟者佳今東人作箔多草爲之爾雅云芒似茅可以爲索新補見陳藏器狥舌草味苦寒有小毒主蠱疥瘙瘡殺小蟲唐本注云葉似車前無文理抽莖花黄白細叢生渠塹濕地今按别本注云疥瘙風瘡并皆有蟲爲末和塗之即差四月五月採莖暴乾唐本先附海金沙海金沙主通利小腸得栀子馬牙消蓬沙共療傷寒熱狂出黔中郡七月收採生作小株才高一二尺收採全科於日中暴之令小乾紙襯以杖擊之有細沙落紙上旋收之且暴且擊以沙盡爲度用之或丸或散新定圖經曰海金沙生黔中山谷湖南亦有初生作小株高一二尺七月採得日中暴令乾以紙襯擊取其沙落紙上旋暴旋擊沙盡乃止王通利小腸亦入傷寒狂熱藥今醫治小便不通臍下滿悶方海金沙一兩臘面茶半兩二味搗碾令細每服三錢煎生薑甘草湯調下服無時未通再服萱草萱草根凉無毒治沙淋下水氣主酒疸黄色通身者取根搗絞汁服亦取嫩苗煮食之又主小便赤澁身體煩熱一名鹿葱花名宜男風土記云懷姙婦人佩其花生男也新補見陳藏器日華子圖經云萱草俗謂之鹿葱處處田野有之味甘而無毒主安五臟利心志令人好歡樂無憂輕身明日五月採花八月採根用今人多採其嫩苗及花跗作菜云利胸隔甚佳嵇康養生論云合歡蠲忿萱草忘憂心中衍義曰萱草根洗淨研汁一大盞生薑汁半盞相和時時細呷治大熱衂血格注草味辛苦温有大毒主蠱疰諸毒疼痛等生齊魯山澤唐本注云葉似蕨根紫色若紫草根一株有二十許二月八月採根五月六月採苗日乾唐本先附唐本餘注云圖經出齊州兖州山谷間鷄窠中草主小兒白秃瘡和白頭翁花燒灰臘月猪脂傅之瘡先以酸泔洗然後塗之又主小兒夜啼安席下勿令母知新補見陳藏器日華子千金方治産後遺尿故鷄窠中草燒作末酒服二錢七即差雞冠子凉無毒止腸風瀉血赤白痢婦人崩中帶下入藥炒用新補見陳藏器日華子地椒味辛温有小毒主淋煠腫痛可作殺蛀蟲藥出上黨郡其苗覆地蔓生莖葉甚細花作小朵色紫白因舊莖而生新定草三棱根味甘平温無毒療産後惡血通月水血結墮胎破積聚癥瘕止痛利氣一名雞爪三稜生蜀地二月八月採今附合明草味甘寒無毒主暴熱淋小便赤澀小兒瘛病明目下水止血痢搗絞汁服生下濕地葉如四出花向夜即葉合新補見陳藏器鹿藥味甘温無毒主風血去諸冷益老起陽浸酒服之生姑藏以西苗根并似黄精根鹿好食今附敗天公平主鬼疰精魅陶隱居云此人所戴竹笠之敗者也取上竹燒酒服之一十一種陳藏器餘毛莨鈎吻注陶云鈎吻或是毛莨蘇云毛莨是有毛石龍芮也百一方云菜中有水莨葉圓而光有毒生水旁蟹多食之蘇云又注似水莨無毛其毛葭似龍芮而有毒也陰命鈎吻注陶云有一物名陰命赤色著木懸其子生海中有毒又云海薑生海中赤色狀如龍苪亦大毒應是此也今無的識之者毒菌地漿注陶云山中多有毒菌地漿解之地生者爲菌木生者爲檽江東人呼爲蕈爾雅云中馗菌注云地蕈子也或云地鷄亦云獐頭夜中光者有毒煮不熟者有毒煮訖照人無影者有毒有惡蟲鳥從下過者有毒欲爛無蟲者有毒冬春無毒及秋夏有毒者爲蛇過也草禹餘糧注陶云南人又呼平澤中一藤如菝葜爲餘糧言禹採此當糧根如盞連綴半在土上皮如茯苓肉赤味澀人取以當穀不饑調中止泄健行不睡云昔禹會諸侯棄糧於地化爲此草故名餘糧今多生海畔山谷之地鼠蓑草莎草注陶云别有鼠蓑草治體異此有名無用條有蓑草味苦寒主温瘧寒熱酸斯利氣生淮南山谷即此也廉薑杜若注陶云若似廉按廉薑熱主胃中冷吐水不下食似薑生嶺南劍南人多食之草石蠶蟲石蠶注陶云今俗用草根黑色按草石蠶生高山石上根如箸上有毛節如蠶葉似卷柏山人取浸酒除風破血主溪毒煑食之本經從蟲部出復有蟲石蠶已出拾遺漆姑草杉木注陶云葉細細多生石間按漆姑草如鼠迹天生階墀間陰處氣辛烈主漆瘡挼碎傅之熱更易亦主溪毒瘡蘇云此蜀羊泉羊泉是大草非細者乃同名耳麂目豆蔻注陶云麂目小冷按麂目云出嶺南如麂目食之發冷痰餘别無功梨豆蚺蛇注陶云蛇膽如梨豆生江南蔓如葛子如皂莢子作狸首文故名梨豆爾雅云慮涉子人炒食之一名虎涉别無功諸草有毒瓜兩蒂兩鼻害人瓜瓠正苦有毒檐溜滴著菜有毒堇黄花害人芹赤葉害人菰首蜜食下痢生葱不得雜白大肉食之令人九竅流血食戎葵并烏肉令人面無顔色食葵發狂犬咬食蒴葱青魚令人腹生蟲薤不得和牛肉食成癥瘕痼疾婦人妊娠食乾薑令胎肉消生葱和雞子食變嗽蓼齏食生食令氣奪乏令陰痿九月食霜下瓜血必冬發三月不得食陳菹夏熱病發惡瘡瓠牛踐苗子即苦圖經衍義本草卷之十九
