body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正木部下品橡實橡實味苦微温無毒主下痢厚腸胃肥徤人其殻爲散煮汁服亦主痢并堪染用一名杼斗槲櫟皆有斗以櫟爲勝所在山谷中皆有圖經曰橡實櫟木子也本經不載所出州土云所在山谷皆有今亦然木高二三丈三四月開黄花八九月結實其實爲皂斗槲櫟皆有斗而以櫟爲勝不拘時採其皮并實用爾雅云櫟其實捄釋曰櫟似樗之木也捄盛實之房也其實橡也有捄匯自裹詩秦風云山有苞櫟陸機云秦人謂柞櫟爲櫟又唐風云集於苞栩陸機云今柞櫟也徐州人謂櫟爲杼或謂之栩今京洛及河内謂櫟亦爲杼五方通語也然則柞櫟也杼也栩也皆橡櫟之通名也日華子云櫟樹皮平無毒治水痢消瘰癧除惡瘡橡斗子澀腸止瀉煮食可止饑御歉歲殻止腸風崩中帶下冷熱瀉痢并染鬚髮入藥并搗炒焦用雷公云凡使去粗皮一重取橡實蒸從巳至末出剉作五片用之孫眞人枕中素云橡實子非果非穀而最益人服食未能斷穀啖之尤佳無氣而受氣無味而受味消食止痢令人强健不極義曰橡實櫟木子也葉如栗葉在處有但堅而不堪充材亦木之性也山中以椿人爲糧然澀腸木善爲炭他木皆不及其殻堪染皂若曾經雨水者其色淡不若不經雨水者槲亦有殻但少而不及櫟木所實者益智子益智子味辛温無毒主遺精虚漏小便餘澀益氣安神補不足安三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有奇驗按山海經云生崑崙國圖經曰益智子生崑崙國今嶺南州郡往往有之葉似蘘荷長丈餘其根傍生小枝高七八寸無葉花萼作穗生其上如棗許大皮白中人黑人細者佳含之攝涎唾採無時盧循爲廣州刺史遺劉裕益智粽裕答以續命湯是此也禹錫云按陳藏器云止嘔噦廣志云葉似蘘荷長丈餘其根上有小枝高八九尺無葉萼子叢生大如棗中瓣黑皮白核小者名益智含之攝涎穢出交趾顧微廣州記云益智葉如蘘荷莖如竹箭子從心出一枝有十子子肉白滑四破去之或外皮蜜煮爲粽味辛鼠李鼠李主寒熱瘰癧瘡皮味苦微寒無毒主除身皮熱毒一名牛李一名鼠梓一名椑音卑生田野採無時圖經曰鼠李即烏巢子也本經不載所出州土但云生田野今蜀川多有之枝葉如李子實若五味子色黳黑其汁紫色味甘苦實熟時採日乾九蒸酒漬服能下血其皮採無時一名牛李唐本注云此藥一名趙李一名皂李一名烏槎樹皮主諸瘡寒熱毒痹子主牛馬六畜瘡中蟲或生擣傅之或和脂塗皆效食療云微寒主腹脹滿其根有毒煑濃汁含之治𧏾齒并疳蟲蝕人脊骨者可煑濃汁灌之良其肉主脹滿穀脹和麵作餅子空心食之少時當瀉其煮根汁亦空心服一盞治脊骨疳椰子皮椰子皮味苦平無毒止血療鼻衂吐逆霍亂煑汁服之殻中肉益氣去風漿服之主消渴塗頭益髮令黑生安南樹如棕櫚子殻可爲器交州記曰椰子中有漿飲之得醉海藥云謹按交州記云生南海狀若海棕實名椰子大如碗許大外有麤皮如大腹子豆蔻之類内有漿似酒飲之不醉主消渴吐血水腫去風熱雲南者亦好武侯討雲南時并令將士剪除椰樹不令小邦有此異物多食動氣也衍義曰椰子開之有汁如乳極甘香自别是一種氣味中又有一塊瓤形如瓜蔞上有細壠起亦白色但微虚紋若婦人裙褶其味亦如其汁又着殻一重白肉剮取之皆可與瓤糖煎爲果汁色如白酒其味如瓤然謂之酒者好事者當日强名之取其殻爲酒器如酒中有毒則酒沸起今人皆漆其裏則全失用椰子之意紫荆木紫荆木味苦平無毒主破宿血下五淋濃煑服之今人多於庭院間種者花艷可愛圖經曰紫荆舊不著所生州郡今處處有之人多於庭院間種植木似黄荆葉小無椏花豔紫可愛或云田氏之荆也至秋子熟如小珠名紫珠江東林澤間尤多禹錫云謹按陳藏器云紫珠寒主解毒物癰疽喉痹飛尸蠱毒腫瘻蛇虺蟲蠶狂犬等毒并煮汁服亦煑汁洗瘡腫除血長膚一名紫荆樹似黃荆葉小無椏非田氏之荆也至秋子熟正紫圓如小珠生江東林澤間有之日華子云紫荆木通小膓皮梗同用花功用亦同南藤南藤味辛温無毒主風血補衰老起陽强腰脚除痹變白逐冷氣排風邪亦煮汁服亦浸酒冬月用之生依南樹故號南藤莖如馬鞭有節紫褐色一名丁公藤生南山山谷圖經曰南藤即丁公藤也生南山山谷今出泉州榮州生依南木故名南藤苗如馬鞭有節紫褐色葉如杏葉而尖採無時此下又有千金藤云生北地者根如指色黑似漆生南土者黃赤如細辛又有榼藤子生廣南山林間木如通草藤三年方熟紫黑色一名象豆醫家稀用故附於其類南史解叔謙雁門人母有疾夜於庭中稽顙祈告聞空中云得丁公藤治即差訪醫及本草皆無至宜都山中見一翁伐木云是丁公藤療風乃拜泣求得之及漬酒法受畢失翁所在母疾遂愈杉木杉木微温無毒主療漆瘡圖經曰杉木舊不載所出州土今南中深山中多有之木類松而勁直葉附枝生若剌針爾雅云柀煔郭璞注云煔似松生江南可以爲船及棺材作柱埋之不腐也又人家常用作桶板甚耐水醫師取其節煑汁浸捋脚氣殊效唐柳柳州纂救三死方云元和十二年二月得脚氣夜半痞絶脅有塊大如石且死因大寒不知人三日家人號哭榮陽鄭洵美傳杉木湯服半食頃大下三下氣通塊散取前件杉木節一大升橘葉切一大升此地無葉可以皮代之大腹檳榔七枚合子碎之童子小便三大升共煑取一大升半分兩服若一服得快利即停後服已前三死眞死矣會有教者皆得不死恐他人不幸有類余病故傳焉又杉菌出宜州生積年杉木上若菌狀云味苦性微温主心脾氣疼及暴心痛採無時陶隱居云削作柿煑以洗漆瘡無不即差又有鼠查生去地高尺餘許煑以洗漆多差又有漆姑葉細細多生石邊亦療漆瘡其雞子及蟹并是舊方唐本注云杉材木水煑汁浸捋脚氣腫滿服之療心腹脹痛去惡氣其鼠查漆婦有别功列出下品禹錫云按日華子云味辛治風實豚霍亂止氣并煎湯服并淋洗須是油杉及臭者良衍義曰杉榦端直如松不凋但葉闊成枝廬山有萬於杉寺此杉也作屑煮汁浸洗脚氣腫滿接骨木接骨木味苦甘平無毒主折傷續筋骨除風癢齲齒可作浴湯一名蒴藋唐本注云葉如陸英花亦相似但作樹高一二丈許木輕虚無心斫枝插便生人家亦種之一名木蒴藋所在皆有之唐本先附禹錫云按陳藏器云接骨木有小毒根皮主痰飲下水腫及痰瘧煮服之當利下及吐不可多服葉主瘧小兒服三葉大人服七葉并生搗絞汁服得吐爲度本經云無毒誤也産書云治産後心悶手脚煩熱氣力欲絶血運連心頭硬及寒熱不禁接骨木破之如算子一握以水一升煎取半升分温兩服或小便數惡血不止服之即差此木煑之三遍其力一般此是起死人方木鱉子木鱉子味甘温無毒主折傷消結腫惡瘡生肌止腰痛除粉刺䵟𪒟婦人乳癰肛門腫痛藤生葉有五花狀如薯蕷葉青色面光花黄其子似栝樓而極大生青熟紅肉上有刺其核似鱉故以爲名出朗州及南中七八月採之圖經曰木鱉子出朗州及南中今湖嶺諸州及杭越全岳州亦有之春生苗作蔓葉有五花狀如山芋青色面光四月生黄花六月結實似栝樓而極大生青熟紅肉上有刺其核似鱉故以爲名每一實其核三四十枚八月九月採嶺南人取嫩實及苗葉作茹蒸食之禹錫云按日華子云醋摩消腫毒孫用和方治痔以木鱉子三枚去皮杵碎砂盆内研如泥以百沸湯一大碗以上入盆器内坐上薰之至通手即洗一日不過二三次衍義曰木鱉子蔓生歲一枯葉如蒲桃實如大栝樓熟則紅黄色微有刺不能刺人今荆南之南皆有之九月十月熟實中之子曰木鱉子但根不死春旋生苗其子一頭尖者爲雄凡植時須雌雄相合麻縷纏定及其生也則去其雄者方結實釣藤釣藤微寒無毒主小兒寒熱十二驚癇圖經曰釣藤本草不載所出州土蘇恭云出梁州今亦興元府有之葉細莖長節間有刺若釣鈎三月採字或作吊葛洪治小兒方多用之其赤湯治卒得癇用吊藤甘草炙各二分水五合煮取二合服如小棗大日五夜三大良又廣濟及崔氏方療小兒驚癇諸湯飲皆用吊藤皮藥性論云釣藤臣味甘平能主小兒驚啼瘈瘲熱擁日華子云治客忤胎風陶隱居云出建平亦作釣藤字惟療小兒不入餘方唐本注云出梁州細長莖間有刺若釣鈎者是衍義曰釣藤中空二經不言之長八九尺或一二丈者湖南北江南江西山中皆有小人有以穴隙間致酒瓮中盜取酒以氣吸之酒既出涓涓不斷專治小兒驚熱棕櫚子棕櫚子平無毒澀腸止瀉痢腸風崩中帶下及養血皮平無毒止鼻洪吐血破癥治崩中帶下腸風赤白痢入藥燒灰用不可絶過衍義曰棕櫚木今人旋爲器皮燒爲黑灰治婦人血露及吐血仍佐之他藥每歲剮取棕皮不爾束死花如魚子渫熟淹爲果雷公云治崩中帶下圖經曰棕櫚亦曰栟櫚出嶺南及西川江南亦有之木高一二丈傍無枝條葉大而圓歧生枝端有皮相重被於四傍每皮一匝爲一節二旬一採轉復生上六七月生黄白花八九月結實作房如魚子黑色九月十月採其皮木用山海經曰石脆一作翠之山其木多棕是也芫花芫花味辛苦温微温有小毒主欬逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚消胸中痰水喜音戲唾水腫五水在五臟皮膚及腰痛下寒毒肉毒久服令人虚一名去水一名毒魚一名杜芫其根名蜀桑根療疥瘡可用毒魚生淮源川谷三月三日採花陰乾决明爲之使反甘草圖經曰芫花生淮源川谷今在處有之宿根舊枝莖紫長一二尺根入土深三五寸白色似榆根春生苗葉小而尖似楊柳枝葉二月開紫花頗似紫荆而作穗又似藤花而細三月三日採陰乾其花須未成蘂蒂細小未生葉時收之葉生花落即不堪用吴晋本草云芫花一名敗葉一名兒草一名黄大戟二月生青葉加厚則黑葉有紫赤白者三月實落盡葉乃生是也而今絳州出者花黄謂之黄芫花漢太倉公淳于意治臨淄女子薄吾蟯瘕爲病腹大上膚黄麤循之戚戚然意飲以芫花一撮即出燒可數升病遂愈蟯音饒陶隱居云近道處處有用之微熬不可近眼藥性論云芫花使有大毒能治心腹脹滿去水氣利五臟寒痰涕唾如膠者主通利血脉治惡瘡風痹濕一切毒風四肢攣急不能行步能瀉水腫脹滿日華子云療嗽瘴瘧所在有小樹子在陂澗傍三月中盛花淺紫色張仲景方治太陽中風吐下嘔逆者可攻十棗湯主之芫花熬甘遂大戟三物等分停各篩末取大棗十枚水一升半煑取八合去滓納諸藥强人一錢七羸人半錢七温服之不下明旦更加半七下後糜粥自養病懸飲者亦主之經驗方治痔瘻有頭方用芫花入土根不限多少以淨水洗却入木臼搗用少許水絞取汁於銀銅器内慢火煎成膏將絲綫於膏内度過繫痔繫時微痛候心躁落時以紙拈子入膏藥於竅内永除根本未落不得使水三國志云魏初平中有青牛先生常服芫花年如五六十人或親識之謂其已百餘歲矣枳椇音止矩味甘平無毒主頭風小腹拘急一名木蜜其木皮温無毒主五痔和五臟以木爲屋屋中酒則味薄此亦奇物圖經曰陸機云枸枝枸也木似白楊所在山中皆有枝枸不直噉之甘美如飴八九月熟謂之木蜜本從南方來能敗酒若以爲屋柱則一屋之酒皆薄唐本注云其樹徑尺木名白石葉如桑柘其木作房子似珊瑚核在其端又如癩漢指頭禹錫云按蜀本云字或車作枸云木名出蜀近酒能薄酒味江南人呼謂之木蜜也紫眞檀味鹹微寒主惡毒風毒陶隱居云俗人摩以塗風毒諸腫亦效然不及青木香又主金瘡止血亦療淋用之唐本注云此物出崑崙盤四國也雖不生中華人間遍有之也陳藏器云檀樹如檀出海南本功外心腹痛霍亂中惡鬼氣殺蟲禹錫云謹按日華子云紫眞檀無毒千金方治一切腫用紫檀細碎大醋和傅腫上梅師方治金瘡止血急刮紫眞檀末傅之烏臼木根皮味苦微温有毒主暴水癥結積聚生山南平澤唐本注云樹高數仞葉似梨杏花黄白子黑色陳藏器本草云烏臼葉好染皂子多取壓爲油塗頭令黑變白爲燈極明服一合令人下痢去陰下水唐本先附禹錫云按日華子云烏臼根皮凉治頭風通大小便以慢火炙令脂汁盡黄乾後用斗門方大便不通用烏臼木方停一寸來劈破以水煎取小半盞服之立通不用多服其功神聖兼能取水鹽麩子味酸微寒無毒除痰飲瘴瘧喉中熱結喉痹止渴解酒毒黄疸飛尸蠱毒天行寒熱痰嗽變白生毛髮取子乾搗爲末食之嶺南人將以防瘴樹白皮主破血止血蠱毒血痢殺蛔蟲并煎服之根白皮主酒疸搗碎米泔浸一宿平旦空腹温服一二升葉如椿生吴蜀山谷子秋熟爲穗粒如小豆上有鹽似雪食之酸鹹止渴一名叛奴鹽陳藏器云蜀人謂之酸桶博物志云酸桶七月出穗蜀人謂之主音穗上有鹽著可爲羹亦謂之酢桶矣吴人謂之烏鹽也禹錫云按陳藏器云子主頭風白屑效日華子云鹽麩葉上球子治中蠱毒毒藥消酒毒根用并同楠材微温主霍亂吐下不止陶隱居云削作柿煑服之卒急無他藥用此禹錫云按日華子云味辛熱微毒治轉筋衍義曰楠材今江南等路造船場皆此木也縁木性堅而善居水乆則多中空爲白蟻所穴柘木味甘温無毒主補虚損取白皮及東行根白皮煮汁釀酒主風虚耳聾勞損虚羸瘦腰腎冷夢與人交接泄精者取汁服之無刺者良主婦人崩中血結及主瘧疾兼堪染黄衍義曰柘木裏有紋亦可旋爲器葉飼蠶曰柘蠶葉梗然不及桑葉東行根及皮主煑汁釀酒治風虚耳聾有驗餘如經木槿平無毒止腸風瀉血又主痢後熱渴作飲服之令人得睡入藥炒用取汁度絲使得易絡花凉無毒治腸風瀉血并赤白痢炒用作湯代茶吃治風衍義曰木槿如小葵花淡紅色五葉成一花朝開暮斂花與枝兩用湖南北人家多種植爲籬障餘如經石南味辛苦平有毒主養腎氣内傷陰衰利筋骨皮毛療脚弱五臟邪氣除熱女子不可久服令思男實殺蠱毒破積聚逐風痹一名鬼目生華陰山谷二月四月採葉八月採實陰乾五加皮爲之使圖經曰石南生華陰山谷今南北皆有之生於石上株極有高大者江湖間出者葉如枇杷葉有小刺凌冬不凋春生白花成簇秋結細紅實關隴間出者葉似莽草青黄色背有紫點雨多則併生長及二三寸根橫細紫色無花實葉至茂密南北人多移以植庭宇間陰翳可愛不透日氣入藥以關中葉細者良二月四月採葉四月採實陰乾禹錫按蜀本云終南斜谷近石處甚饒今市人多以瓦韋爲石韋以石韋爲石南不可不審之藥性論云石南臣主除熱惡小薊無毒能添腎氣治軟脚煩悶痛殺蟲能逐諸風雖能養腎又令人陰痿衍義曰石南葉狀如枇杷葉之小者但背無毛光而不皺正二月間開花冬有二葉爲花苞苞既開中有十五餘花大小如椿花甚細碎每一苞約彈許大成一球一花六葉一朵有七八球淡白緑色葉末微淡赤色花既開蘂滿花但見蘂不見花花纔罷去年緑葉盡脫落漸生新葉治腎衰脚弱最相宜但京洛河北河東山東頗少人以此故少用湖南北江東西二浙甚多故多用南實今醫家絶不用木天蓼味辛温有小毒主癥結積聚風勞虚冷生山谷中圖經曰木天蓼木高二三丈三月四月開花似柘花五月採子子作球形似苘其球子可藏作果啖之亦治諸冷氣蘇恭云作藤蔓生者自是藤天蓼也又有一種小天蓼生天目山四明山木如栀子冬不凋然則天蓼有三種雖其狀不同而療體甚相似也唐本注云作藤蔓葉似柘花白子如棗許無定形中瓤似茄子味辛啖之以當薑蓼其苗藤切以酒浸服或以釀酒去風冷癥癖大效所在皆有今出安州申州陳藏器本草云木天蓼今時所用出鳳州樹高如冬青不凋出深山人云多服損壽以其逐風損氣故也不當以藤天蓼爲主既云木蓼豈更藤生自有藤蓼爾唐本先附此禹錫云按藥性論云天蓼子使味苦辛微熱無毒能治中賊風口面斜主冷痃癖氣塊女子虚勞黄環味苦平有毒主蠱毒鬼疰鬼魅邪氣在臟中除咳逆寒熱一名凌泉一名大就生蜀郡山谷三月採根陰乾鳶尾爲之使惡茯苓防己陶隱居云似防己亦作車輻理解蜀都賦云青珠黄環者或云是大戟花定非也用甚稀市人尠有識者唐本注云此物襄陽巴西人謂之就葛作藤生根亦葛類所云似防己作車輻解者近之人取葛誤得食之吐痢不止用土漿解乃差此眞黄環也餘處亦稀惟襄陽大有本經用根今云大戟花非也其子作角生似皂角花實與葛同時矣今園庭種之大者莖徑六七寸所在有之謂其子名狼跋子今太常科劍南來者乃雞屎葛根非禹錫云按藥性論云黃環使惡乾薑大寒有小毒治上氣急寒熱及百邪搜疏味辛苦寒微寒無毒主身皮膚中熱除邪氣止遺溺通利水道除胃中熱下氣可作浴湯一名巨骨生熊耳川谷及田野故丘墟地四月採漏蘆爲之使陶隱居云李云溲疏一名楊櫨一名牡荆一名空疏皮白中空時時有節子似枸杞子冬月熟色赤味甘苦末代乃無識者此實眞也非人籬援之楊櫨也李當之此說於論牡荆乃不爲大乖而濫引溲疏恐斯誤矣又云溲疏與空疏亦不同耳疑應作熊耳熊耳山名都無掘耳之號唐本注云溲疏形似空疏樹高丈許白皮其子八九月熟色赤似枸杞子味苦必兩兩相并與空疏不同空疏一名楊櫨子爲莢不似溲疏今注溲疏枸杞雖則相似然枸杞無刺溲疏有刺此爲别爾禹錫云按藥性論云溲疏使小天蓼味甘温無毒主一切風虚羸冷手足疼痹無論老幼輕重浸酒及煑汁服之十許日覺皮膚間風出如蟲行生天目山四明山樹如栀子冬不凋野獸食之更有木天蓼出山南大樹今市人貨之云乆服促壽當是其逐風損氣故也本經有木天蓼即是此也蘇注云藤生子辛與木又異應是復有藤天蓼江淮南山間有木天蓼作藤著樹葉如梨花而薄子如棗辛甘大主風血羸痹腰脚疼冷取皮釀酒即是蘇引爲天蓼注者夫如是則有三天蓼俱能逐風其中優劣小者最爲勝今附圖經曰文具見木天蓼條下小蘖味苦大寒無毒主口瘡疳𧏾殺諸蟲去心腹中熱氣一名山石榴唐本注云其樹枝葉與石榴無異但花異子細黑圓如牛李子耳生山石間所在皆有襄陽峴山東者爲良陶於蘖木附見二種其一是此陶云皮黄其樹乃皮白今太常所貯乃葉多剌者名白剌蘖非小蘖也今注陳藏器本草云凡是蘖木皆皮黄今既不黄而自然非蘖小蘖如石榴皮黄子赤如枸杞子兩頭尖人剉枝以染黄若云子黑而圓恐是别物非小蘖也唐本先附莢蒾音迷味甘苦平無毒主三蟲下氣消穀唐本注云葉似木槿及似榆作小樹其子如溲疏兩兩相并四四相對而色赤味甘煮樹枝汁和作粥甚美以飼小兒殺蛔蟲不入方用陸機草木疏名擊蒾一名羿先蓋檀榆之類也所在山谷有之今注陳藏器本草云莢蒾主六畜瘡中蛆煑汁作粥灌之蛆立出皮堪爲索生北土山林間唐本先附楓柳皮楓音風味辛大熱有毒主風齲齒痛出原州唐本注云葉似槐莖赤根黄子六月熟緑色而細剥取莖皮用之唐本先附陳藏器云性澀止水痢蘇云下水腫腫非澀藥所治有殊蘇爲誤矣赤爪木味苦寒無毒主水痢風頭身癢生平陸所在皆有實味酸冷無毒汁服主水痢沐頭及洗身上瘡癢一名羊捄一名鼠查唐本注云小樹生高五六尺葉似香葇子似虎掌爪大如小林梢赤色出山南申安隨等州唐本先附樺木皮味苦平無毒主諸黄疸濃煮汁飲之良堪爲燭者木似山桃取脂燒辟鬼今附衍義曰樺木皮燒爲黑灰合他藥治乍風毒及取皮上有紫黑花匀者裹鞍弓鐙榼藤子味澀甘平無毒主蠱毒五痔喉痹及小兒脱肛血痢并燒灰服瀉血宜服一枚以刀剜内瓤熬研爲散空腹熱酒調二錢不過三服必效又宜入澡豆末除䵟𪒟其殻用貯丹藥經載不壞按廣州記云生廣南山林間樹如通草藤也三年方始熟紫黑色一名象豆今附禹錫云按日華子云治飛尸入藥炙用榧實上音匪味甘無毒主五痔去三蟲蠱毒鬼疰生永昌陶隱居云今出東陽諸郡食其子療寸白蟲衍義曰榧實大如橄欖殻色紫褐而脂其中子有一重粗黑衣其仁黄白色服乆漸甘美五痔人常如果食之愈過多則滑腸欒荆味辛苦温有小毒主大風頭面手足諸風癲癇狂痙濕痹寒冷疼痛俗方大用之而本草不載亦無别名但有欒花功用又别非此花也唐本注云按其莖葉都似石南乾亦反卷經冬不死葉上有細黑點者眞也今雍州所用者是而洛州乃用石荆當之非也唐本先附禹錫云按藥性論云欒荆子君惡石膏味甘辛微熱無毒能治四肢不遂主通血脉明目益精光决明爲使扶栘木皮味苦平有小毒去風血脚氣疼痹踠損瘀血痛不可忍取白皮火炙酒浸服之和五木皮煮作湯捋脚氣疼腫殺陟生切蟲風瘙燒作灰置酒中令味正經時不敗生江南山谷樹大十數圍無風葉動華反而後合詩云棠棣之華偏其反而鄭注云棠棣栘也亦名栘楊崔豹云栘楊圓葉弱蒂微風大揺新補見陳藏器藥實根味辛温無毒主邪氣諸痹疼酸續絶傷補骨髓一名連木生蜀郡山谷採無時唐本注云此藥子也當今盛用胡名那綻出通州渝州本經用根恐誤載根字子味辛平無毒主破血止痢消腫除蠱疰蛇毒崗子生葉似杏花紅白色子肉味酸甘用其核仁欒華味苦寒無毒主目痛淚出傷眦消目腫生漢中川谷五月採决明爲之使唐本注云此樹葉似木槿而薄細花黃似槐而小長大子殻似酸漿其中有實如熟豌豆圓黑堅硬堪爲數珠者五月六月花可收南人取合黄連作煎療目赤火大效花以染黄色甚鮮好蔓椒味苦温無毒主風寒濕痹歷節疼除四肢厥氣膝痛一名豕椒一名猪椒一名彘椒一名狗椒生雲中川谷及丘冢間採莖根煑釀酒陶隱居云山野處處有俗呼爲樛似椒黨小不香爾一名稀椒可以蒸病出汗也感藤味甘平無毒調中益氣主五臟通血氣解諸熱止渴除煩悶治腎釣氣如木防己生江南山谷如雞卵大斫藤斷吹氣出一頭其汁甘美如蜜葉生研傅蛇咬瘡一名甘藤甘感聲近又名甜藤也新補見陳藏器日華子赤檉木無毒主剥驢馬血入肉毒取以火炙用熨之亦可煮汁浸之其木中脂一名檉乳入合質汗用之生河西沙地皮赤色葉細今附禹錫云按爾雅疏云檉一名河柳郭云今河傍赤莖小楊陸機云生水傍皮正赤如絳一名雨師枝葉似松日華子云赤檉木温突厥白味苦主金瘡生肉止痛補腰續筋出突厥國色白如灰乃云石灰共諸藥合成之夷人以合金瘡中國用之今注醫家見用經效者潞州出焉其根黄白色狀似茯苓而虚軟苗高三四尺春夏葉如薄荷花似牽牛而紫上有白稜二月八月採根暴乾今附賣子木味甘微鹹平無毒主折傷血内溜續絶補骨髓止痛安胎生山谷中圖經曰賣子木本經不載所出州土注云出劎南卭州今惟渠州有每歲出貢謂之賣子木婆羅得味辛温無毒主冷氣塊温中補腰腎破痃癖可染髭髮令黑樹如柳子如萆音卑麻生西國今附海藥云謹按徐氏云生西海波斯國似中華柳樹也方家多用甘露藤味甘温無毒主風血氣諸病乆服調中温補令人肥健好顔色止消渴潤五臟除腹内諸冷生嶺南藤蔓如箸一名肥藤人服之得肥也新補見陳藏器日華子大空味辛苦平有小毒主三蟲殺蟣虱生山谷中取根皮作末油和塗蟣虱皆死唐本注云根皮赤葉似楮小圓厚作小樹抽條高六七尺出襄州山谷所在亦有秦隴人名爲獨空唐本先附椿莢主大便下血今近道處處有之夏中生莢樗之有花者無莢有莢者無花常生臭樗上未見椿上有莢者然世俗不辨椿樗之異故俗中名爲椿莢其實樗莢耳衍義曰椿木葉椿樗皆臭但一種有花結子一種無花不實世以無花不實木身大其榦端直者爲椿椿用木葉其有花而莢木身小榦多迂矮者爲樗樗用根葉莢故曰未見椿上有莢者惟樗木上有又有樗雞故知古人命名曰不言椿雞而言樗雞者以顯有鷄者爲樗無鷄者爲椿其義甚明用椿木葉樗木根葉莢者宜依此推窮水楊葉嫩枝味苦平無毒主久痢赤白搗和水絞取汁服一升日二大效今注水楊葉圓闊而赤枝條短硬多生水岸傍樹與楊柳相似既生水岸故名水楊唐本先附楊櫨木味苦寒有毒主疽瘻惡瘡水煮葉汁洗瘡立差生籬垣間一名空疏所在皆有唐本先附欓子味辛辣如椒主游蠱飛尸著喉口者刺破以子揩之令血出當下涎沫煑汁服之去暴冷腹痛食不消殺腥物木高大莖有刺新補見陳藏器柞木皮味苦平無毒治黄疸病皮燒末服方寸七生南方葉細今之作梳者是新補見陳藏器日華子黄櫨味苦寒無毒除煩熱解酒疸目黄煮服之亦洗湯火漆瘡及赤眼堪染黄色生商洛山谷葉圓木黄川界甚有之新補見陳藏器日華子柯樹皮味辛平有小毒主大腹水病取白皮作煎令可圓如梧桐子大平旦三圓須臾又一圓一名木奴南人用作大船者也海藥云謹按廣志云生廣南山谷臨海志云是木奴樹主乳氣採皮以水煮去滓復煉候凝結丸得爲度每朝空心飲下三圓浮氣水腫并從小便出故波斯家用爲船舫也敗扇主蚊子新造屋柱下四隅埋之蚊永不入燒爲末和粉粉身上主汗彌敗者佳罌子桐子有大毒壓爲油毒鼠主死摩疥癬蟲瘡毒腫一名虎子桐似梧桐生山中石荆欒荆注蘇云用當欒荆非也按石荆似荆而小生水傍作灰汁沐頭生髮廣濟方云一名水荆主長髮是也木黎蘆漏蘆注陶云漏蘆一名鹿驪生南山人用苗北人用根功在本經木梨蘆有毒非漏蘆樹生如茱萸樹高三尺有毒殺蟲山人以瘡疥用之圖經衍義本草卷之二十五
