body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正玉石部上品滑石味甘寒大寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣通九竅六腑津液去留結止渴令人利中久服輕身耐饑長年一名液石一名共石一名脱石一名番石生赭陽山谷及太山之陰或掖北白山或卷羌權切山採無時石韋爲之使惡曾青圖經曰滑石生赭陽山谷及太山之陰或掖北白山或卷山今道永萊濠州皆有之此有二種道永州出者白滑如凝脂南越月水閉絶不利水道能消瘀血病人虚而多熱加而用之陶隱居云咸陽即長安也生渭城者乃有實子實如小麥淮南七精散用之中間以彭城乾地黄最好次歷陽今用江寧板橋者爲勝陳藏器云本經不言生乾及蒸乾方家所用二物别蒸乾即温補生乾則平宣當依此用日華子云乾地黄助心膽氣安魂定魄治驚悸勞劣心肺損吐血鼻衄婦人崩中血運又云生者水浸驗浮者名天黄半浮半沉者名人黄沉者名地黄沉者力佳半沉者次浮者劣忌鐵器抱朴子云楚文子服地黄八年夜視有光手上車弩淮南子云地黄主屬骨食療云地黄微寒以蜜煎或浸食或煎湯或酒飲并炒生則寒主齒痛唾血折傷葉可以羹外臺秘要張文仲治骨蒸方生地黃一升搗取汁三度搗絞汁盡分再服若利即减之以身體凉爲度千金方治牙齒根欲動脱生地黄細剉綿裹着齒上咂之漬齒根日三四并咽汁十日大佳肘後方治耳中常鳴生地黃截塞耳數易之以瘥爲度一云以紙裹微灰火中煨之用良百一方妊娠漏胎生地黄汁一升漬酒四合煮三五沸服之不止又服又方治猘犬咬人搗地黄汁飲之并塗瘡口百度止梅師方治墮損筋骨蹉跌骨碎破搗生地黄熨熱裹三日夜數易若血聚以針决之又方治吐血神效方生地黄汁一升二合白膠香二兩以瓷器盛入甑蒸令膠消服又方治乳癰搗生地黄汁傅之熱即易之無不見效也孫兆方治鼻衄及膈上盛熱乾地黄龍腦薄荷等分爲末冷水調下同煮一伏時出去牡丹皮取滑石却用東流水淘過於日中曬乾方用禹錫云謹按藥性論云滑石臣一名夕冷能療五淋主難産服其末又末與丹參蜜猪脂爲膏入其月即空心酒下彈丸大臨産倍服令滑胎易生除煩熱心躁偏主石淋聖惠方治乳石發動躁熱煩渴不止滑石半兩細研如粉以水一中盞絞如白飲頓服之未差再服又方治婦人過忍小便致胞轉滑石末葱湯調下二錢外臺秘要療妊娠不得小便滑石末水和泥臍下二寸楊氏産乳云療小便不通滑石末以車前汁和塗臍四畔方四寸熱即易之水和亦得丹房鏡源云滑石能制雄雌黃爲外匱廣利方治氣壅關格不通小便淋結臍下妨悶兼痛以滑石八分研如麵水五大合和頓服衍義曰滑石今謂之畫石以其軟滑可寫畫淋家多用若暴得吐逆不下食以生細末二錢匕温水服仍急以熱麵半盞壓定石膽味酸辛寒有毒主明目目痛金瘡諸癇痙巨郢切女子陰蝕痛石淋寒熱崩中下血諸邪毒氣令人有子散癥積咳逆上氣及鼠瘻惡瘡煉餌服之不老乆服增壽神仙能化鐵爲銅成金銀一名畢石一名黑石一名棋石一名銅勒生羌道山谷羌里句青山二月庚子辛丑日採水英爲之使畏牡丹桂菌桂芫花辛夷白薇陶隱居云仙經有用此處俗方甚少此藥殆絶今人時有採者其色青緑狀如琉璃而有白文易破折梁州信都無復有俗用抱朴子云菟絲之草下有伏菟之根無此菟則絲不得生於上然實不屬也又内篇云菟絲初生之根其形似菟掘取割其血以和丹服之立變化産書云治橫生菟絲子爲末酒調下一錢匕米飲調下亦得肘後方治卒腫滿身面皆洪大菟絲子一升酒五升漬二三宿每服一升日三服又方治面上粉刺搗菟絲子絞取汁塗之瘥經驗後方治丈夫腰膝積冷痛或頑麻無力菟絲子洗秤一兩牛膝一兩同浸於銀器内五日曝乾爲末將元浸酒再入少醇酒作糊搜和丸如梧桐子大空心酒下二十丸又方固陽丹菟絲子二兩酒浸十日水淘焙乾爲末更入杜仲一兩蜜炙搗用薯蕷末酒煮爲糊丸如梧桐子大空心用酒下五十丸修眞方神仙方云服之令人光澤三年老變爲少此藥治腰膝去風久服延年之冷水化一丸亦差譚氏小兒方治初中風癱緩一日内細研膽礬如麵每使一字用温醋湯下立吐出涎空青味甘酸寒大寒無毒主青盲耳聾明目利九竅通血脉養精神益肝氣療目赤痛去膚翳止泪出利水道下乳汁通關節破堅積乆服輕身延年不老令人不忘志高神仙能化銅鐵鉛錫作金生益州山谷及越嶲山有銅處銅精熏則生空青其腹中空三月中旬採無時圖經曰空青生益州山谷及越嶲山有銅處銅精熏則生空青今信州亦時有之狀若楊梅故别名楊梅青其腹中空破之有漿者絶難得亦有大者如鷄子小者如豆子正月中旬採亦無時古方雖稀用而今治眼翳障爲最要之物藥性論云空青君畏菟絲子能治頭風鎭肝瞳人破者再得見物蕭炳云空如楊梅者勝陶隱居云越嶲屬益州今出銅官者色最鮮深出始興者弗如益州諸郡無復有恐久不採之故也凉州西平郡有空青山亦甚多今空青但圓實如鐵珠無空腹者皆鑿土石中取之又以合丹成則化鉛爲金矣諸石藥中惟此最貴醫方乃稀用之而多充畫色殊爲可惜日華子云空青大者如鷄子小者如相思子其青厚如荔枝殻内有漿酸甜能點多年青盲内障翳膜養精氣其殻又可摩翳也千金方治眼𥉂𥉂不明以空青少許漬露一宿以水點之肘後方治中風手臂不仁口喎僻取空青末一豆許著口中漸入咽即愈衍義曰空青功長於治眼宋仁宗朝嘗詔御藥院須中空有水者將賜近戚乆而方得其楊梅青治翳極有功中亦或有水者其用與空青同第有優劣今信州穴山而取世謂之楊梅青極難得曾青味酸小寒無毒主目痛止淚出風痹利關節通九竅破癥堅積聚養肝膽除寒熱殺白蟲療頭風腦中寒止煩渴補不足盛陰氣久服輕身不老能化金銅生蜀中山谷及越嶲採無時畏菟絲子圖經曰文具空青條下陶隱居云此說與空青同山療體亦相似今銅官更無曾青惟出始興形累累如黄連相綴色理小類空青甚難得而貴仙經少用之化金之法事同空青雷公云凡使勿用夾石及銅青若修事一兩要紫背天葵甘草青芝草三件乾濕各一鎰并細剉放於一瓷堝内將曾青於中東流水二鎰并諸藥等緩緩煮之五晝夜勿令水火失時足取出以東流水浴過却入乳鉢中研如粉用丹房鏡源云曾青結汞製丹砂金氣之所生寳藏論曾青若住火成膏者可立制汞成銀轉得八石禹餘糧味甘寒平無毒主咳逆寒熱煩滿下赤白血閉癥瘕大熱療小腹痛結煩疼煉餌服之不饑輕身延年一名白餘糧生東海池澤及山島中或池澤中圖經曰禹餘糧生東海池澤及山島中或池澤中今惟澤潞州有之舊說形如鵝鴨卵外有殻重疊中有黄細末如蒲黃今圖上者全是山石之形都不作卵狀與舊說小異採無時本經又有太一餘糧謹按陶隱居登眞隱訣載長生四鎭丸云太一禹餘糧定六腑鎭五臟注云按本草有太一餘糧禹餘糧兩種治體猶同而今世惟有禹餘糧不復識太一此方所用遂合其二名莫辨何者的是而後小鎭直云禹餘糧便當用之耳餘糧多出東陽山岸間茅山甚有好者狀如牛黃重重甲錯其佳處乃紫色泯泯如麵嚙之無復磣雖然用之宜細研以水洮取汁澄之勿令有沙土也陶隱居云今多出東陽形如鵝鴨卵外有殻重疊中有黄細末如蒲黄無沙者爲佳近年茅山鑿地大得之極精好乃有紫華靡靡仙經服食用之南人又呼平澤中有一種藤葉如菝葜根作塊有節似菝葜而色赤根形似薯預謂爲禹餘糧言昔禹行山乏食採此以充糧而棄其餘此云白餘糧也生池澤復有仿佛或疑今石者即是太一也張華云地多蓼者必有餘糧今廬江之間便是也適有人於銅官採空青於石坎大得黄赤色石極似今之餘糧而色過赤好疑此是太一也彼人呼爲雌黄試塗物正如雄黄色爾日華子云治邪氣及骨節疼四肢不仁痔瘻等疾乆服耐寒暑又名太一餘糧經驗方治産後煩躁禹餘糧一枚狀如酸餡者入地埋一半四面緊築用炭一秤發頂火一斤煅去火三分耗二爲度用濕砂土罨一宿方取打去外面一重只使裏面細研水淘澄五七度將紙襯乾再研數千遍患者用甘草煎湯調二錢匕只一服立效勝金方治婦人帶下白下即禹餘糧一兩乾薑等分赤下禹餘糧一兩乾薑半兩右件禹餘糧用醋淬搗研細爲末空心温酒調下二錢匕味甘平無毒主咳逆上氣癥瘕血閉漏下除邪氣肢節不利大飽絶力身重久服耐寒暑不饑輕身飛行千里神仙一名石腦生太山山谷九月採杜仲爲之使畏貝母菖蒲鐵落圖經文具禹餘糧下陶隱居云今人惟總呼爲太一餘糧自專是禹餘糧爾無復識太一者然療體亦相似仙經多用之四鎭丸亦總名太一禹餘糧陳藏器云蘇云禹餘糧及太一禹餘糧皆以精粗爲名餘糧中黄子年多變赤從赤入紫俱名太一餘糧雜色者即禹餘糧按蘇欽此談直以紫色爲名都無按據且太一者道之宗源太者大也一者道也大道之師即禹之理化神君禹之師也師常服之故有太一之名兼服混然張司空云還魂石中黄子鬼物禽獸守之不可妄得即其神物也會稽有地名蓼出餘糧土人掘之以物請買所請有數依數必得不可妄求此猶有神豈非太一也雷公云凡使勿誤用石中黃并卵石黄此二名石眞似禹餘糧也太一禹餘糧看即如石輕敲便碎可如粉也凡修事四兩先用黑豆五合黃精五合水二斗煮取五升置於瓷鍋中下禹餘糧著火煮旋添汁盡爲度其藥氣自然香如新米搗了又研一萬杵方用禹錫云太一禹餘糧一名禹哀神農岐伯雷公甘平季氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黄如鷄子黄色九月採或無時白石英味甘辛微温無毒主消渴陰痿不足咳逆胸膈間乆寒益氣除風濕痹療肺痿下氣利小便補五臟通日月光乆服輕身長年耐寒熱生華陰山谷及太山大如指長二三寸六面如削白澈有光其黄端白棱名黄石英赤端名赤石英青端名青石英黑端名黑石英二月採亦無時惡馬目毒公圖經曰白石英生華陰山谷及太山陶隱居以新安出者佳蘇恭以澤州者爲勝今亦澤州出焉大抵長而白澤明澈有光六面如削者可用長五六寸者彌佳其黄色如金在端者名黄石英赤端白後者名赤石英青端赤後者名青石英黑澤而有光者名黑石英二月採亦云無時古人服食惟白石英爲重紫石英但入五石散其黄赤青黑四種本經雖有名而方家都不見用者藥性論云白石英君能治肺癰吐膿治嗽逆上氣疸黄斜蒿亦有似麥門冬而短者七月開黄花生丹州結青子與他處者不類根赤色似前胡而强蘆頭有赤毛如鼠尾獨窠長者好藥性論云柴胡能治熱勞骨節煩痛熱氣肩背疼痛宣暢血氣勞乏羸瘦主下氣消食主時疾内外熱不解單煮服食陶隱居云博物志云芸蒿葉似邪蒿春秋有白蒻長四五寸香美可食長安及河内并有之此柴胡療傷寒第一用孫尚藥方治黄疸柴胡一兩去苗甘草一分右都細剉作一劑以水一碗白茅根一握同煎至七分絞去滓任意時時服一日盡衍義曰柴胡本經并無一字治勞方中鮮有不用者嗚呼凡此誤世甚多嘗原病勞有一種眞臟虚損復受邪熱邪因虚而致勞故曰勞者牢也當須斟的用之如經驗方中治勞熱青蒿煎丸用柴胡正合宜耳服之無不效熱去即須急已若或無熱得衍義曰白石英狀如紫石英但差大而六棱白色如水精紫白二石英當攻疾可暫煮汁用未聞乆服之益張仲景之意只令㕮咀不爲細末者豈無意焉其乆服更宜詳審紫石英味甘辛温無毒主心腹咳逆邪氣補不足女子風寒在子宫絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中乆寒散癰腫令人悦澤乆服温中輕身延年生太山山谷採無時長石爲之使得茯苓人參芍藥共療心中結氣得天雄菖蒲共療霍亂畏扁青附子不欲鮀甲黄連麥句薑圖經曰紫石英生太山山谷今嶺南及會稽山中亦有之謹按吴普本草云紫石英生太山及會稽欲令如削紫色達頭如樗蒲者陶隱居云今第一用太山石色重澈下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黑不明澈又有林邑石腹裏必有一物如眼吴興石四面纔有紫色無光澤會稽諸暨石形色如石燕子先時并雜用今丸散家採擇惟太山最勝餘處者可作丸酒餌仙經不正用而爲俗方所重也日華子云紫石英治癰腫毒等醋淬搗爲末生薑米醋煎傅之摩亦得衍義曰紫石英明澈如水精其色紫而不匀張仲景治風熱瘈瘲及驚癇瘈瘲風引湯紫石英白石英寒水石石膏乾薑大黄龍齒牡蠣甘草滑石等分混合㕮咀以水一升煎去三分食後量多少温呷不用滓服之無不效者味甘平主黄疸泄痢腸澼膿血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙乆服補髓益氣肥健不饑輕身延年五石脂各隨五色補五臟生南山之陽山谷中禹錫云按蜀本云今義陽山甚有之一本南陽山谷中也味酸平無毒主養肝膽氣明目療黄疸泄痢澼女子帶下百病及疽痔惡瘡乆服補髓益氣不饑延年生齊區山及海崖採無時赤石脂味甘酸辛大温無毒主養心氣明目益精療腹痛泄澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出乆服補髓好顔色益智不饑輕身延年生濟南射陽及太山之陰採無時惡大黃畏芫花圖經曰赤石脂生濟南射陽及太山之陰蘇恭云濟南太山不聞出者惟虢州盧氏縣澤州陵川縣慈州吕鄉縣并有及宜州諸山亦出今出潞州以色理鮮膩者爲勝採無時唐本注云此石濟南太山不聞出者今虢州盧氏縣澤州陵川縣及慈州吕鄉縣并有色理鮮膩宜州諸山亦有此五石脂中又有石骨似骨如玉堅潤服之力勝鍾乳禹錫云按藥性論云赤石脂君惡松脂補五臟虚乏千金翼論曰治痰飲吐水無時節者其源以冷飲過度遂令脾胃氣羸不能消於飲食飲食入胃則皆變成冷水反吐不停皆赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲自任稍稍加至三匕服盡一斤終身不吐淡水又不下痢補五臟令人肥健有人痰飲服諸藥不效用此方愈斗門經云治小兒疳瀉用赤石脂杵羅爲末如麵以粥飲調半錢服立差或以京芎等分同服更妙張仲景方治傷寒下痢不止便膿血者槐花湯主之其方用赤石脂一斤一半全用一半末用乾薑一兩粳米半升以水七升煮之米熟爲準去滓每滓七合内赤石脂末一方寸匕服日三衍義曰赤石脂今四方皆有以舌試之黏著者爲佳有人病大腸寒滑小便精出諸熱藥服及一斗二升未甚效後有人教服赤石脂乾薑各一兩胡椒半兩同爲末醋糊丸如梧桐子大空心及飯前米飲下五七十九終四劑遂愈白石脂味甘酸平無毒主養肺氣厚腸補骨髓療五臟驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排疽癰瘡痔久服安心不饑輕身長年生太山之陰採無時得厚朴并米汁飲止便膿燕屎爲之使惡松脂畏黄芩圖經曰白石脂生太山之陰蘇恭云出慈州諸山泰山左側不聞有之今惟潞州有焉潞與慈相近此亦應可用古斷下方多用而今醫家亦稀使採無時五色石脂舊經同一條并生南山之陽山谷中主治并同後人各分之所出既殊功用亦别用之當依後條今惟用赤白二種餘不復識藥性論云白石脂一名白符惡馬目毒公味甘辛澀大腸唐本注云白石脂今出慈州諸山勝於餘處者太山左側不聞有之唐韋宙獨行方治小兒臍中汁出不止兼赤腫以白石脂細末熬温撲臍中日三良斗門方治瀉痢用白石脂乾薑二物停搗以百沸湯和麵爲稀糊搜匀併手丸如梧子暴乾飲下三十丸乆痢不定更加三十丸霍亂煎漿水爲使子母秘録治小兒水痢形羸不勝大湯藥白石脂半大兩研如粉和白粥空服與食緑青味酸寒無毒主益氣療鼽音求鼻止泄痢生山之陰穴中色青白陶隱居云此即用晝緑色者亦出空青中相帶挾畫工呼爲碧青呼空青作緑青已反矣唐本注云緑青即扁青也畫工呼爲石緑其碧青即白青也不入畫用衍義曰緑青即石緑是也其石黑緑色者佳大者刻爲物形或作器用又同硇砂作吐風涎藥驗則驗矣亦損心肺石中黃子味甘平無毒乆服輕身延年不老此禹餘糧殻中未成餘糧黄濁水也出餘糧處有之陶云芝品中有石中黄子非也圖經曰石中黄子本經不載所生州土云出禹餘糧處處有之今惟出河中府中條山谷内舊說是餘糧殻中未成餘糧黄濁水今云其石形如麵劑紫黑色石皮内黄色者謂之中黄兩說小異謹按葛洪抱朴子云石中黄子所在有之近水之山尤多在大石中其石常潤濕不燥打石石有數十重見之赤黄溶溶如鷄子之在殻得時即當飲之不爾便堅凝成石不中服也衍義曰石中黄子此又字誤也子當作水况當條目言未成餘糧黄濁水焉得却名之子也若言未乾者亦不得謂之子也子字乃水字無疑又曰太一餘糧者則是兼石言之者也今醫家用石中黄只石中乾者及細末者即便是若用禹餘糧石即用其殻故故本條言一名石腦須火燒醋淬如此即是石中黄水爲一等石中黄爲一等太一餘糧爲一等斷無疑焉無名異味甘平主金瘡折傷内損止痛生肌肉出大食國生於石上狀如黑石炭蕃人以油煉如黳石嚼之如餳圖經曰無名異出大食國生於石上今廣州山石中及宜州南八里龍濟山中亦有之黑褐色大者如彈丸小者如墨石子採無時本經云味甘平主金瘡折傷内損生肌肉今云味鹹寒消腫毒癰疣與本經所說不同疑别是一種又嶺南人云有石無名異絶難得有草無名異彼人不甚貴重豈本經說者爲石而今所有者爲草乎用時以醋磨塗傅所苦處禹錫云按日華子云無名異無毒衍義曰無名異今圖經曰本經云味甘平治金瘡折傷生肌肉今云味鹹寒消腫毒癰腫與本經所說不同疑别是一種今詳上文三十六字未審今云字下即不知是何處云也味苦平無毒主養脾氣安五臟調中大人小兒泄痢腸澼下膿血去白蟲除黄疸癰疽蟲乆服輕身延年生嵩高山色如鶯雛採無時曾青爲之使惡細辛畏蜚蠊雷公云凡使須研如粉用新汲水投於器中攪不住手了傾作一盆如此飛過三度澄者去之取飛過者任入藥中使用服之不問多少不得食卵味味鹹平無毒主養腎氣强陰主陰蝕瘡止腸澼泄痢療口瘡咽痛乆服益氣不饑延年一名石涅一名石墨出潁川陽城採無時陶隱居云此五石脂如本經療體亦相似别録各條所以具載今俗用赤石白石二脂爾日華子云五色石脂并温無毒畏黄芩大黄味甘鹹酸平無毒主明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲乆服通神明輕身延年不老可消爲銅劍辟五兵生豫章山谷採無時陶隱居云此醫方不復用市人亦無賣者惟仙經三十六水方中時有須處銅劍之法具在九元子術中唐本注云陶所云今空青圓如鐵珠色白而腹不空者是也研之色有如碧色謂之碧青不入畫用無空青時亦用之名魚目青以形似魚目故也今出簡州梓州者好平無毒解藥毒蠱毒及金石藥發動作癰疽渴疾消撲損瘀血止熱狂驚癇通月經解風腫除淋并水磨服蛇蟲蜂蝎狼大毒箭等所傷并末傅之良新補見日華子衍義曰菩薩石出峨嵋山中如水晶明澈日中照出五色光如峨嵋普賢菩薩圓光因以名之今醫家鮮用主解一切藥毒瘴疫熱悶頭痛生南海胡人採得之無斑點有金星磨成乳汁者爲上又有豆斑石雖亦解毒功力不及復有鄂緑有文理磨點鷄熱血當化成水是也此即俗謂之摩娑石衍義曰婆娑石今則轉爲摩娑石如淡色石緑間微有金星者佳磨之色如淡乳汁其味淡又有豆斑石亦如此石但於石上有黑斑點無金星凉無毒治喉痹蚛牙口瘡及惡瘡疥癬釀鯽魚燒灰和服療腸風瀉血新補見日華子圖經曰文具附礬石條下冷無毒消痰治渴潤心肺新補見日華子圖經曰文具附礬石條下上音褊味甘平無毒主目痛明目折跌癰腫金瘡不瘳破積聚解毒氣利精神去寒熱風痹及丈夫莖中百病益精乆服輕身不老生朱崖山谷武都朱音殊提音持採無時陶隱居云仙經俗方都無用者朱崖郡先屬交州在南海中晋代省之朱提郡今屬寧州禹錫云按吴氏云扁青神農雷公小寒無毒生蜀郡治丈夫内絶令人有子廣州志云生波斯國味鹹酸澀有毒主野鷄瘻痔惡瘡疥癬等疾打破内有金綫文者爲上多入燒家用廣州記云出大秦國其色白而瑩淨内有棘針紋味酸澀温無毒主赤白漏下陰蝕泄痢瘡疥解一切蟲蛇等毒去目赤暴腫齒痛火煉之良惡牡礪多入丹竈家功力逾於河西石門者近日文州諸番往往亦有可用也味辛無毒主驚癇邪氣小兒諸惡煮取汁和諸藥煮服之文字彌古者佳爾味辛平無毒主長生神仙久服腸中盡爲金色也主惡瘡疥癬和油塗之蜘蛛蟲等咬和蒜磨傅之此鐵上衣也銹生鐵上者堪用主熨霍亂可盛灰厚二寸許以炭火安其上令微熱下以衣籍患者腹漸漸熨之腹中通熱差銀注中蘇云作器辟惡瑞物也按瑞物即黄銀載於圖經銀瓮丹甑非人所爲既堪爲器明非瑞物今烏銀辟惡煮之工人以爲器物養生者爲器以煮藥兼於庭中高一丈夜承得醴投别器中飲長年今人作烏銀以硫黃熏之再宿瀉之出即其銀黑矣此是假非眞也雄黄注中陶云通名黄石按石黄今人敲取精明者爲雄黄外黑者爲熏黄主惡瘡殺蟲熏瘡疥蟣虱和諸藥熏嗽其武都雄黃燒不臭熏黄中者燒則臭以此分别之蘇云通名未知是也味甘平温無毒主驚恐身熱邪氣鎭心久服令人眼明令人悦澤出淄川北海山谷土中如赤土代赭之類又有一名零陵極細研服之如代赭土人用以當朱呼爲赤石恐是代赭之類也人未用之味辛平無毒主石淋破血産後惡血磨服亦煮汁服亦火燒投酒中服生大海底高尺餘如樹有眼莖莖上有孔如物點之漁人以網罾得之初從水出微紅後漸青味甘温無毒主寒熱中羸瘦無顔色積聚心腹脹滿食飲不消皮膚枯槁小便數疾癖塊腹内腸鳴下痢腰脚疼冷男子絶陽女子絶産血氣不調令人肥健能食合金瘡性擁宜寒瘦人生臨海華蓋山石窟土人採取澄淘如泥作丸如彈子有白有黄彌佳矣味甘平無毒玉石主延年神仙術家取蟾蜍膏軟玉如泥以苦酒消之成水此則爲膏之法未試玉石間水飲之長生令人體潤以玉投朱草汁中化成醴朱草瑞物已出金水卷中十洲仙記瀛洲有玉膏泉如酒飲之數杯輒醉令人長生洲上多有仙家似吴兒雖仙境之事有可憑者故以引爲證也圖經衍義本草卷之二
