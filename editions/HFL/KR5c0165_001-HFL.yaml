front:
  text: 圖經衍義本草卷之一資一
  hash: sha256:0b23f020c06066a40d62fb59e0c028f21680bc04a453742dccecab84ff662264
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_001-001a, image: hfl/0536/0536-004.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋大醫助教辨驗藥材許洪校正玉石部上品丹砂味甘微寒無毒主身體五臟百病養精神安魂魄益氣明目通血脉止煩滿消渴益精神悦澤人面殺精魅邪惡鬼除中惡腹痛毒氣疥瘻諸瘡乆服通神明不老輕身神仙能化爲汞作末名眞珠光色如雲母可析者良生符陵山谷採無時惡磁石畏鹹水圖經曰丹砂生符陵山谷今出辰州宜州薑桂心皂莢桔梗各三兩附子二兩六物搗篩蜜丸服如梧子五丸日三漸增以知爲度又有匈奴露宿丸硫黄丸并主積聚及飲食不下心腹堅實皆用礜石近世乃少用者衍義曰礜石并特生譽石博物志及陶隱居皆言此二石鸛取之以擁卵如此則是一物也隱居又言仙經不云特生則止是前白譽石今補注但隨文解義不見特生之意蓋二條止是一物但以特生不特生爲異耳所謂特生者不附著他石爲特耳今用者絶少惟兩字礜石入藥然極須謹用其毒至甚及論鸛巢中者皆無此石乃曰鸛常入水冷故取以擁卵如此則鸕鷀雁鶩之類皆食於水亦自繁息生化復不用此二石其說往往取俗士之言未嘗究其實而窮其理也砒霜冷水醋治瘧疾腎氣帶辟蚤蟲入藥以醋煮殺毒乃用别說云謹按今信州玉山有砒井官中封禁甚嚴生不夾石者色赤甚如雄黄以冷水磨解熱毒治痰壅甚效近火即殺人圖經所謂不啻金價者此也若今市人通貨者即取山中夾砂石者燒烟飛作白霜乃碎屑而芒刺其傷火多者塊大而微黄則圖經所謂如鵝子色明澈者此也古方并不入藥唯是燒煉丹石家用近人多以治瘧然大意本以生者能解熱毒蓋瘧本傷暑故用今俗醫乃不究其理即以所燒霜用服之其坑常封鎖坑中有濁緑水先絞水盡然後下鑿取生砒謂之砒黄其色如牛肉或有淡白路謂石非石謂土非土磨研必吐下因此幸有安者遂爲定法爾後所損極長不可不謹也初取飛燒霜時人在上風十餘丈外立下風所近草木皆死又見以和飯毒鼠若猫犬食死鼠者亦死其毒過於射罔遠矣可不察之也日華子云凉微毒潤心肺治瘡疥痂息肉服并塗用雷公云凡使宜須細認取諸般上有百等不可一一論之有妙硫砂如拳許大或重一鎰有十四面如鏡若遇陰沉大雨即鏡面上有紅漿汁出有梅柏砂如梅子許大夜有光生照見一室有白庭砂如帝珠子許大面上有小星現有神座砂又有金座砂玉座砂不經丹竈服之而自延壽命次有白金砂澄小砂陰成砂辰錦砂芙蓉砂鏡面砂箭鏃砂曹末砂土砂金星砂平面砂神末砂已上不可一一細述也禹錫云謹按藥性論云丹砂君有大毒鎭心主尸疰抽風青霞子云丹砂自然不死若以氣衰血散體竭骨枯入石之功稍能添益若欲長生乆視保命安神須餌丹砂且入石見火悉成灰燼丹砂伏火化爲黄銀能重能輕能靈能神能黑能白能暗能明一斛人擎力單服一味伏火作丸子亦有兼硫黄馬牙消輩合餌者不知方出何時殊非古法此本攻積聚之物熱而有毒多食腐壞人腸胃生用又能化人心爲血固非平居可餌者陳藏器云硇砂主婦人丈夫羸瘦積病血氣不調腸鳴食飲不消腰脚疼冷痃癖痰飲喉中結氣反胃吐水令人能食肥健一飛爲酸砂二飛爲伏翼三飛爲定精色如鵝兒黄和諸補藥爲丸服之有暴熱飛煉有法亦能變鐵日華子云北庭砂味辛酸暖無毒畏一切酸補水臟暖子宫消冷癖瘀血宿食不消氣塊痃癖及血崩帶下惡瘡息肉食肉飽脹夜多小便女人血氣心疼丈夫腰胯酸重四肢不任凡修制用黄丹石灰作櫃煅赤使無毒世人自疑爛肉如人被刃傷以北庭罯傅定當時生痂亦名狄鹽者禹錫云謹按藥性論云硇砂有大毒畏漿水忌羊血味酸鹹能銷五金八石腐壞人箭鏃帶石者得自土中非此之比也此物鎭養心神但宜生使煉服少有不作疾者亦不减硫黄輩又一醫流服伏火者數粒一旦大熱數夕而斃李善勝嘗煉朱砂爲丹經歲餘沐浴再入鼎誤遺下一塊其徒丸服之遂發懵冒一夕而斃生朱砂初生兒便可服因火力所變遂能殺人可不謹也雲母味甘平無毒主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目下氣堅肌續絶補中療五勞七傷虚損少氣止痢久服輕身延年悦澤不老耐寒暑志高神仙一名雲珠色多赤一名雲華五色具一名雲英色多青一名雲液色多白一名雲砂色青黄一名磷石色正白生太山山谷齊廬山及琅琊北定山石間二月採澤瀉爲之使畏鮀甲及流水圖經曰雲母生泰山山谷齊廬山及琅玡北定山石間今兖州雲夢山及江州濠州杭越間亦有之生土石間作片成層可析明滑光白者爲上江南生者多青黑色不堪入藥二月採其片絶有大而瑩潔者今人或以飾燈籠亦古屛扇之遺事也謹按方書用雲母皆以白澤者爲貴惟中山衛叔卿單服法雲母五色具者蓋本經所謂一名雲華者是一物中而種類有别耳葛洪抱朴子内篇云雲母有五種而人不能别也當舉以向日看其色詳占視之乃可知正爾於陰地視之不見其雜色也五色并具而多赤者名雲母宜夏服之五色并具而多白者名雲液宜以秋服之五色并腸胃生食之化人心爲血中者研生緑豆汁飲一二升解之道門中有伏煉法能除冷病大益陽事蕭炳云硇砂使生不宜多服光淨者良今生北庭爲上外臺秘要救急治魚骨鯁在喉中以少硇砂口中咀嚼咽之立下經驗方硇砂丸方硇砂不計多少用罐子内著硇砂上面更坐罐子一個用紙筋白土和上下俱泥了窨乾後從辰初時便用蒼耳自在落下葉將來搗羅爲末藥上鋪頭蓋底上面罐子内用水坐著水旋添火燒從罐子外五寸已來圍繞欲盡更添火移向前罐子周迴火盡更旋燒促向前計一伏時爲度更不移火即閑雜人及婦人不得見一伏時住取來搗羅爲末醋麵糊爲丸如桐子大每服逐日十丸至十五丸温酒或米飲下并無忌若燒吃三二斤進食無病陳巽方治元臟虚冷氣攻臍腹疼痛硇砂一兩川爲頭生去皮臍杵爲末一二兩硇砂生研用纖霞草末二兩與硇砂同研匀用一小砂罐子不固濟慢火燒候罐熱將拌了者硇砂入罐子内不蓋口燒炭火一秤候火盡爐寒取出研與烏頭生同研匀湯浸蒸餅丸如桐子大每服三丸或木香湯醋湯任下青霞子云寳藏論硇砂若草伏住火不碎可轉制得諸石藥并引諸藥可治婦人乆冷硇砂爲五金賊也若石藥并灰霜伏得不堪用也太清服煉靈砂法北庭砂所禀陰石之氣性含陽毒之精功能消敗去穢益陽丹房鏡源云硇砂性有大毒或沉冷之疾可服則愈乆服有癰腫出北庭白黄者訣曰爲之金賊能制合群藥藥中之使自制雄雌黄衍義曰硇砂金銀有僞投鎔窩中其僞物盡消散矧人腹中有乆積故可潰腐也合他藥治目中翳用之須水飛過入瓷器中不信黃丹及胡粉是化鉛所作今唐注以二物俱炒錫大誤矣肘後方客忤中惡之類多於道間門外得之令人心腹疼痛脹滿氣衝心胸不即治亦害人救之方眞丹方寸匕蜜三合和服之口噤者折齒灌經驗方碧霞丹治吐逆立效北來黃丹四兩篩過用好米醋半斤同藥入銚内煎令乾却用炭火三稱就銚内煅透紅冷取研細爲末用粟米飯丸如梧子大煎酵湯下七丸不嚼只一服王氏博濟方治風癇驅風散鉛丹二兩白礬二兩爲末用磚相鬥以紙鋪磚上先以丹鋪紙上次以礬鋪丹上然後用紙掩却將十斤柳木柴燒過爲度取出細研每服一錢温酒下劉氏方治小兒瘧方黄丹兩錢匕以蜜水和與服冷即以酒和令服之良治瘧方百草霜黃丹等分細研每服二錢匕於發日空心米飲調服不過兩服愈病煅製雲母粉法雲母一斤拆開揉碎入一大瓶内築實上澆水銀一兩封固以十斤頂火煅通赤取出却拌香葱紫引翹草二件合搗如泥後以夾絹袋盛於大水盆内揺取粉餘滓未盡再添草藥重搗如前法取粉沉水乾以小木盤一面於灰上印一淺坑鋪紙傾粉在内直候乾移入火焙焙之取出細研以麵糊丸如梧桐子大遇有病者服之無不效知成都府辛諫議曾患大風衆醫不效遇此道士進得此方服之有神驗衍義曰雲母古雖有服煉法今人服者至少謹之至也市廛多折作花朵以售之今惟合雲母膏治一切癰毒瘡等惠民局别有法也玉屑味甘平無毒主除胃中熱喘息煩滿止渴屑如麻豆服之乆服輕身長年生藍田採無時惡鹿角圖經曰謹按本經玉泉生藍田山谷玉屑生藍田陶隱居注云好玉出藍田及南陽徐善亭部界中日南盧容水中外國于闐疏勒諸處皆善今藍田南陽日南不聞有玉禮器及乘輿服御多是于闐玉陶隱居云此玉屑亦是以玉爲屑非應别一種物也仙經服瑴玉有搗如米粒乃以苦酒輩消令如泥亦有合爲漿者凡服玉皆不得用已成器物及冢中玉璞也好玉出藍田及南陽徐善亭部界中日南盧容水中外國于闐疏勒諸處皆善仙方名玉爲玄眞潔白如猪膏叩之鳴者是眞也其比類甚多相似宜精别之所以燕石入笥乆成霜亦謂之鉛白霜性極冷入治風痰及嬰孺驚滯藥令之醫家用之尤多經驗方治發背及諸般癰毒瘡黑鉛一片甘草三兩微炙剉用酒一斗著空瓶在傍先以甘草置在酒瓶内然後熔鉛投在酒瓶中却出酒在空瓶内取出鉛依前熔後投如此者九度并甘草去之只留酒令病者飲醉寢即愈勝金方烏髭鬢明目牢齒牙黑鉛半斤大鍋内熔成汁旋入桑條灰柳木攪令成沙右以熟絹羅爲末每日早晨揩齒後用温水漱在孟内取用其水洗眼治諸般眼疾髭黃白者用之皆變黑青霞子云寳藏論云黑鉛草伏得成實可點銅爲銀并鑄作鼎養朱砂住得火養水銀住火斷粉霜住火錫非城門下土又言生齊地山谷今齊州亭山出赤石其色有赤紅青者其赤者亦如鷄冠且潤澤土人惟採以丹楹柱而紫色且暗此物與代州出者相似古來用之今靈州鳴沙縣界河北平地掘深五尺得者皮上赤滑中紫如鷄肝大勝齊代者赤土也今人以朱塗牛角云以辟惡又云大次之山其陽多堊又北山經天池之山其中多黄堊又中山經葱襲之山其中有大谷多白黑青黄堊注云言有雜色之堊也然則赭以西土者爲貴堊有五色入藥惟白者取日華子云代赭畏附子止吐血鼻衄腸風痔瘻月經不止小兒驚癇疳疾反胃止瀉痢脱精尿血遺溺金瘡長肉安胎健脾又治夜多小便禹錫云謹按藥性論云代赭使雁門城土乾薑爲使味甘平治女子崩中淋瀝不止療生子不落味温服之辟鬼魅蕭炳云代赭臣豆乆服輕身長壽惡鹿角馬明先生金丹訣玉屑常服令人精神不亂玉泉味甘平無毒主五臟百病柔筋强骨安魂魄長肌肉益氣利血脉療婦人帶下十二病除氣癃明耳目乆服耐寒暑不饑渴不老神仙輕身長年人臨死服五斤死三年色不變一名玉札生藍田山谷採無時畏款冬花圖經曰陶隱居云玉泉是玉之精華白者質色明澈可消之爲水故名玉泉世人無復的識者惟通呼爲玉爾陶隱居云藍田在長安東南舊出美玉此當是玉之精華白者質色明澈可消之爲水故名玉泉今人無復的識者惟通呼爲玉爾張華又云服玉用藍田瑴玉白色者此物平常服之則應神仙有人臨死服五斤死經三年其色不變古來發冢見尸如生者其身腹内外無不大有金玉漢制王公葬皆用珠襦玉匣是使不朽故也煉服之法亦應依仙經服玉法水屑隨宜雖曰性平而服玉者亦多發熱如寒食散狀金玉既天地重寳不比餘石若未深解節度勿輕用之别本注云玉泉者玉之泉液也以仙室玉池中者爲上今仙經三十六水法中化玉爲玉漿稱爲玉泉服之長年不老然功劣於自然泉液也一名玉液一名瓊漿禹錫云謹按日華子云玉泉治血塊衍義曰玉泉經云生藍田山谷採無時今藍田山谷無玉泉泉水古今不言採又曰服五斤古今方水不言斤又曰一名玉札如此則不知定是何物諸家所解更不言泉但爲玉立文陶隱居雖曰可消之爲水故名玉泉誠如是則當言玉水亦不當言玉泉也蓋泉具流布之義别之則無所不通易又曰山下出泉蒙如此則誠非止水終未臻厥理今詳泉字乃是漿字於義方允漿中既有玉故曰服五斤去古既遠亦文字脱誤也採玉爲漿斷無疑焉石鍾乳味甘温無毒主咳逆上氣明目益精安五臟通百節利九竅下乳汁益氣補虚損療脚弱疼冷下焦傷竭强陰乆服延年益壽好顔色不老令人有子不煉服之令人淋一名公乳一名蘆石一名夏石生少室山谷及太山採無時蛇床爲之使惡牡丹玄石牡蒙畏紫石英蘘草圖經曰石鍾乳生少室山谷及泰山今道州江華縣及連英韶階峽州山中皆有之玕乃有數種是琉璃之類火齊寳也琅玕五色具以青者入藥爲勝出嶲州以西烏白蠻中及于闐國也今秘書中有異魚圖載琅玕青色生海中云海人於海底以網掛得之初出水紅色乆而青黑枝柯似珊瑚而上有孔竅如蟲蛀擊之有金石之聲乃與珊瑚相類其說不同人莫能的識謹按尚書禹貢雍州厥貢璆琳琅玕陶隱居云此蜀都賦所稱青珠黄環也黄環乃是草苟取名類而種族爲乖琅玕亦是崑山上樹名又九眞經中大丹名也此石今亦無用惟以療手足逆臚化丹之事未的見其術唐本注云琅玕乃有數種色是琉璃之類火齊寳也且琅玕五色具以青者入藥爲勝今出嶲州以西爲白蠻中及于闐國也日華子云玻璃冷無毒安心止驚悸明目摩翳障禹錫云按陳藏器云琉璃主身熱目赤以水浸令冷熨之韵集曰火齊珠也南州異物志云琉璃本是石以自然灰理之可爲器硨磲碼碯并玉石類是西國重寳佛經云七寳者謂金銀琉璃硨磲碼碯玻璃眞珠是也或云珊瑚琥珀今碼碯碗上刻鏤爲奇工者皆以自然灰又昆吾刀治之自然灰今時以生皮膠作假者非也衍義曰青琅玕書曰三危既宅三危西裔之山也厥貢推球琳琅玕孔穎達以謂琅玕石似玉新書亦謂三苗西戎西域記云天竺國山出此物陶隱居謂爲本名大丹名既是大丹名則本經豈可更言煮煉服之又曰可化爲丹陶不合遠引非此琅玕也自然銅自然銅燒之皆成青焰如硫黄者是也此亦有二三種一種有殻如餘糧擊破其中光明如鑒色黄類𥔢石也一種青黄而有墻壁或文如束針一種碎理如團砂者皆光明如銅色多青白而赤少者燒之皆成烟焰頃刻都盡今藥家多誤以此爲自然銅市中所貨往往是此自然銅用多須鍛此乃畏火不必形色只此可辨也雷公云石髓鉛即自然銅也凡使勿用方金牙其方金牙眞似石髓鉛若誤餌吐煞人其石髓鉛色似乾銀泥味微甘如採得先搥碎同甘草湯煮一伏時至明漉出攤令乾入臼中搗了重篩過以醋浸一宿至明用六一泥泥瓷合子約盛得二升已來於文武火中養三日夜才乾便用蓋蓋了泥用火鍛兩伏時去土抉蓋研如粉用若修事五兩以醋兩鎰爲度禹錫云按日華子云自然銅凉排膿消瘀血續筋骨治産後血邪安心止驚悸以酒磨服陰處岸下溜汁成如乳汁黄白色空中相通二月三月採陰乾蕭炳云如蟬翅者上爪甲者次鵝管者下明白薄者可服泰清石壁記煉鍾乳法太清經云取好細末置金銀甌器中瓦一片密蓋甌上勿令泄氣蒸之自然化作水衍義曰蕭炳云如蟬翼爪甲者爲上鵝管者下經既言乳令復不取乳此何義也蓋乳取其性下不用如雁齒者謂如烏頭附子不用尖角之義同但明白光潤輕鬆色如煉消石者佳礬石味酸寒無毒主寒熱泄痢白沃陰蝕惡瘡目痛腎骨齒除固熱在骨髓去鼻中息肉煉餌服之輕身不老增年岐伯云乆服傷人骨能使鐵爲銅一名羽泥結切一名羽澤生河西山谷及隴西武都石門採無時甘草爲之使惡牡蠣圖經曰礬石生河西山谷及隴西武都石門今白礬則晋州慈州無爲軍緑礬則隰州温泉縣池州銅陵縣并煎礬處出焉初生皆石也採得碎之煎煉乃成礬凡有五種其色各異謂白礬黄礬黑礬緑礬絳礬也白礬則入藥及染人所用者緑礬亦入咽喉口齒藥及染色黄礬丹竈家所須時亦入藥黑礬惟出西戎亦謂之皂礬染鬚鬢藥或用之絳礬本來緑色亦謂之石膽燒之赤色故有絳名今亦稀見又有礬精礬蝴蝶皆煉白礬時候其極沸盤心有濺溢者如物飛出以鐵匕接之作蟲飛者礬蝴蝶也但成塊光瑩如水晶者礬精也此二種入藥力緊於常礬也又有一種柳絮礬亦出礬處有之煎煉而成輕虚如綿絮故以名之今醫家用治痰壅及心肺煩熱甚佳陶隱居云今出益州北部西川從河西來色青白生者名馬齒礬已煉成絶白蜀人又以當消石名白礬其黄黑者名鷄屎礬不入藥惟堪鍍作以合熟銅投苦酒中塗鐵皆作銅色外雖銅色内質不變仙經餌之丹方亦用俗中合藥皆先火熬令沸燥以療齒痛多即壞齒是傷骨之證而云堅骨齒誠爲疑也今注陶云蜀人用白礬當消石誤也日華子云白礬性凉除風去勞消痰止渴暖水臟治中風失音疥癬和桃人葱湯浴出汗雷公云凡使須以瓷瓶盛於火中煅令内外通赤用鉗揭起蓋旋安石蜂窠於赤瓶子中燒蜂窠盡爲度將鉗夾出放冷敲碎入鉢中研如粉後於屋下掘一坑可深五寸却以紙裹留坑中一宿取出再研每修事十兩用石蜂窠六兩盡爲度禹錫云謹按藥論云礬石使一名理石畏告其主使捕之不得一日遇絶壁下以網三面圍之俄而騰上山頂其主異之或曰此婢宿有仙骨不過靈藥服食遂以酒饌五味香美置往來之路觀其食否果來食食訖不能遠去擒之具述其故指所食之草即黄精也道藏神仙芝草經黄精寬中益氣五臟調良肌肉充盛骨體堅强其力倍多年不老顔色鮮明髮白更黑齒落更生博物志昔黄帝問天老曰天地所生豈有食之令人不死乎天老曰太陽之草名曰黄精餌之可以長生太陰之草名曰鈎吻不可食入口立死人信鈎吻之殺人不信黄精之益壽不亦甚乎聖惠方神仙服黄精成地仙根莖不限多少細剉陰乾搗末每日淨水調服服一年變老爲少菖蒲搊痛者取一二寸搥碎同吴茱萸煎湯飲之良黔蜀蠻人亦常將隨行卒患心痛嚼一二寸熱湯或酒送亦效陶隱居云菖蒲大根者主風濕不堪服食此藥甚去蟲并蚤虱而今都不言之眞菖蒲葉有脊一如劍刃四月五月亦小釐華也東澗溪側又有名溪蓀者根形氣色極似石上菖蒲而葉正如蒲無脊俗人多呼此爲石上菖蒲者謬矣此止主咳逆亦斷蚤虱爾不入服日華子云除風下氣丈夫水臟女人血海冷敗多忘長智除煩悶止心腹痛霍亂轉筋治客風瘡疥澀小便殺腹臟蟲及蚤虱耳痛作末炒承熱裹罯甚驗忌飴糖羊肉抱朴子云韓藂服之十三年身生毛日誦書萬言冬不寒又須得石上寸九節紫花尤善漢武帝内傳武帝上嵩山見仙長二丈問曰吾九嶷山人也聞中嶽有石上菖蒲一寸九節食之長生故來採之忽然不見過黄丹炒令紫色各等分相衮合以貼患處簡要濟衆方治牙齒腫痛白礬一兩燒灰大露蜂房一兩微炙爲散每用二錢水一中盞煎十餘沸熱渫牙冷吐之孫用和方治懸癰垂長咽中妨悶白礬一兩燒灰鹽花一兩二味細研以箸頭點藥子母秘録治小兒風疹不止白礬十二分暖熱酒投化用馬尾揾酒塗之御藥院方治脚膝風濕虚汗少力多疼痛及陰汗燒礬作灰細研末一匙頭沸湯投之淋洗痛處衍義曰礬石今坊州礬務以野火燒過石取以煎礬色惟白不逮晋州者皆不可多服損心肺却水故也水化書紙上纔乾水不能濡故知其性却水治涎藥多須者用此意爾火枯爲粉貼嶔甲牙縫中血出如衄者貼之亦愈消石味苦辛寒大寒無毒主五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣療五臟十二經脉中百二十疾暴傷寒腹中大熱止煩滿消渴利小便及瘻蝕瘡煉之如膏乆服輕身天地至神之物能化成十二種石一名芒消生益州山谷及武都隴西西羌採無時火爲之使惡苦參苦菜畏女苑圖經曰文具朴消條下藥性論云消石君惡曾青畏粥味鹹有小毒主項下瘰癧瀉得根出破血一名芒消燒之即成消石矣主破積散堅結一作苦消甚治腹脹其消石芒消多川原人製多問之詳其理陶隱居云療病亦與朴消相似仙經多用此消化諸石今無正識别此者須求尋訪猶云與朴消同山所以朴消名消石朴也如此則非一種物先時有人得一種物其色理與朴消大同小異朏朏如掘鹽雪不冰强燒之紫青烟起仍成灰不停沸如朴消云是眞消石也此又云一名芒消今芒消乃是煉朴消作之與後皇甫說同并未得核研其驗須試效當更證記爾化消石法在三十六水方中隴西屬秦州在長安西羌中今宕昌以北諸山有鹹土處皆有之唐本注云此即芒消是也朴消一名消石朴今煉粗惡朴消淋取汁煎煉作芒消即是消石本經一名芒消後人更出芒消條謬矣今注此即地霜也所在山澤冬月地上有霜掃取以水淋汁後乃煎煉而成蓋以能消化諸石故名消石非與朴消芒消同類而有消名也一名芒消者以其初煉時有細芒狀若消故有芒消之號與後條芒消全别舊經陶注引證多端蓋不的識今不取焉日華子云消石畏杏人竹葉含之治喉閉眞者火上伏法用柳枝湯煎三周時如湯减少即入熱者伏火即止也雷公云凡使先研如粉以瓷瓶子於五斤火斗煅令通赤鷄腸菜柏子仁和作一處分丸如小帝珠子許待瓶子赤時投消石於瓶子内其消石自然伏火每四兩消石用鷄腸菜柏子仁共十五個帝珠子盡爲度禹錫云謹按蜀本云大黃爲使按今消石是煉朴消或地霜爲之狀如釵脚好者長五分已來能化七十二種石爲水故名消石吕氏云消石神農苦扁鵲甘寳藏論消石若草伏而斤兩不折軟一切金銀銅鐵硬物立軟史記淳于意云菑川王美人懷子而不乳來召意意往飲以莨菪藥一撮以酒飲之旋乳意復診其脉而脉躁躁者有餘病即飲以消石一劑出血如豆比五六枚聖惠方治眼赤痛用消石研令極細臨卧以銅箸取黍米大點目眦頭至明旦以鹽漿水洗外臺秘要療惡寒嗇嗇似欲發背或已生瘡腫癮疹起方消石三兩以暖水一升和令消待冷取故青布揲三重於赤處方圓濕布搨之熱即頻易立差靈苑方治五種淋疾勞淋血淋氣淋熱淋石淋及小便不通至甚者透格散用消石一兩不夾泥土雪白者亦研爲細末每服二錢諸淋各依湯使如後勞倦虚損小便不出小腹急痛葵子末煎湯下通後便須服補虚丸散血淋小便不出時下血疼痛滿急熱淋小便熱赤色淋瀝不快臍下急痛并用冷水調下氣淋小腹滿急尿後常有餘瀝木通煎湯下石淋莖内痛尿不能出内引淋腹膨脹急痛尿下砂石令人悶絶將藥末先入銚子内隔紙炒至紙焦爲度再研令細用温水調下小便不通小麥湯下卒患諸淋并只以冷水調下并空心先調使藥消散如水即服之更以湯使送下服諸藥未效者服此立愈衍義曰消石是再煎煉時已取訖芒消凝結在下如石者精英既去但餘滓而已故功力亦緩惟能發烟火唐本注蓋以能消諸石故曰消石煎柳枝湯煮三周時即伏火湯耗即又添柳枝湯芒消味辛苦大寒主五臟積聚乆熱胃閉除邪氣破留血腹中痰實結搏通經脉利大小便及月水破五淋推陳致新生於朴消石韋爲之使惡麥句薑圖經云文具朴消條下藥性論云芒消使味鹹有小毒能通女子月閉癥瘕下瘰癧黃疸病主墮胎患漆瘡汁傅之主時疾壅熱能散惡血陶隱居云按神農本經無芒消只有消石名芒消爾後名醫别載此說其療與消石正同疑此即是消石舊出寧州黄白粒大味極辛苦頃來寧州道斷都絶今醫家多用煮煉作者色全白粒細而味不甚烈此云生於朴消則作者亦好陳藏器云石脾芒消消石并出於西戎鹵地鹹水結成所主亦以類相次唐本注云晋宋古方多用消石少用芒消近代諸醫但用芒消少言消石豈古人昧於芒消也本經云生於朴消朴消一名消石樸消石一名芒消理既明白不合重出之聖惠方治伐指用芒消煎湯淋漬之千金方療漆瘡方用湯漬芒消令濃洗之又礬石亦可子母秘録小兒赤遊行於體上下至心即死以芒消内湯中取濃汁以拭丹上百一方療關膈大小便不通脹滿欲死兩三日則殺人芒消三兩紙裹三四重炭火燒之令内一升湯中盡服當先以湯一升漱口乃服之孫眞人食忌方主眼有翳取芒消一大兩置銅器中急火上煉之放冷後以生絹細羅點眼角中每夜欲卧時二度點妙雷公云凡使先以水飛過用五重紙滴過去脚於鐺中乾之方入乳鉢研如粉任用芒消是朴消中煉出形似麥芒者曰芒消衍義曰芒消經云生於朴消乃是朴消以水淋汁澄清再經熬煉减半傾木盆中經宿遂結芒有廉棱者故其性和緩古今多用以治傷寒朴消味苦辛寒大寒無毒主百病除寒熱邪氣逐六腑積聚結固留癖胃中食飲熱結破留血閉絶停痰痞滿推陳致新能化七十二種石煉餌服之輕身神仙煉之白如銀能寒能熱能滑能澀能辛能苦能鹹能酸入地千歲不變色青白者佳黃者傷人赤者殺人一名消石朴生益州山谷有鹹水之陽採無時畏麥句薑圖經曰朴消生益州山谷有鹹水之陽消石生益州山谷及武都隴西西羌芒消生於朴消今南北皆有之而以西川者爲佳舊說三物同種初採得其苗以水淋收汁煎煉而成乃朴消也一名消石朴以消石出於其中又煉朴消或地霜而成堅白如石者乃消石也一名芒消又取朴消以暖水淋汁煉之减半投於盆中經宿而有細芒生乃芒消也雖一體異名而修煉之法既殊則主治之功别矣然本經各載所出疑是二種而今醫方家所用亦不復能究其所來但以未煉成塊微青色者爲朴消煉成盆中上有芒者爲芒消亦謂之盆消其芒消底澄凝者爲消石朴消力緊芒消次之消石更緩未知孰爲眞者又按蘇恭謂晋宋古方多用消石少用芒消近代諸崔元亮海上方治發背秘法李北海云此方神授極奇秘以甘草三大兩生搗别篩末大麥麵九兩於一大盤中相和攪令匀取之好酥少許别捻入藥令匀百沸水溲如餅劑方圓大於瘡一分熱傅腫上以油斤及故紙隔令通風冷則换之已成膿水自出未成腫便内消藥性論云主腹中冷痛治驚癇除腹脹滿補益五臟制諸藥毒養腎氣内傷令人陰痿主婦人血瀝腰痛虚而多熱加而用之陶隱居云河西上郡不復通市今出蜀漢中悉從汶山諸夷中來赤皮斷理看之堅實者是抱罕草最佳抱罕羌地名亦有火炙乾者理多虚疏又有如鯉魚腸者被刀破不復好青州間亦有不如又有紫甘草細而實乏時可用此草最爲衆藥之主經方少不用者猶如香中有沉香也國老即帝師之稱雖非君爲君所宗是以能安和草石而解諸毒也日華子云安魂定魄補五勞七傷一切虚損驚悸煩悶健忘通九竅利百脉益養精氣壯筋骨解冷熱入藥炙用雷公云凡使甘草須去頭尾尖處其頭尾吐人孫眞人云主一切傷寒甘草如指長炙細剉童子小便一升煎取七合空心服日再服之金匱玉函云治誤飲饌中毒者未審中何毒只急煎甘草薺苨湯服之入口便活又方治小兒中蠱欲死甘草半兩剉以水一盞煎五分去滓作二服當吐蠱出傷寒類要治傷寒三二日咽痛者與甘草二兩炙水三升煮取一升半服五合日三又方傷寒脉結代者心悸動方甘草二兩水三升煮取一升半服七合日二姚和衆方治小兒尿血甘草五分以水六合煎取二合去滓一歲兒一日服令盡廣利方治肺痿乆咳嗽涕唾多骨節煩悶寒熱甘草十二分炙搗爲末每日取小便三合甘草末一錢匕攪令散服飲藥先安於盞内攪熱藥澆服禹錫云謹按藥性論云朴消君味苦鹹有小毒能治腹脹大小便不通女子月候不通聖惠方治時氣頭痛不止用朴消二兩搗羅爲散用生油調塗於頂上又方治乳石發動煩悶及諸風熱用朴消煉成者半兩細研如粉每服以蜜水調下一錢匕日三四服外臺秘要療喉痹神驗朴消一兩細細含咽汁頃刻立差簡要濟衆治小便不通膀胱熱白花散朴消不以多少研爲末每服二錢温茴香酒調下衍義曰朴消是初採掃得一煎而成者未經再煉治故曰朴消其味酷澀所以力堅急而不和可以熟生牛馬皮及治金銀有僞葛洪治食鱠不化取此以蕩逐之臘月中以新瓦罐滿注熱水用朴消二升投湯中攪散掛北檐下俟消滲出罐外却收之以人乳汁調半錢掃一切風熱毒氣攻注目瞼外及發於頭面四肢腫痛應手神驗味辛甘冷無毒治心熱煩躁并五臟宿滯癥結明目退膈上虚熱消腫毒此即朴消煉成者仙經云以朴消製伏爲玄明粉朴消是太陰之精華水之子也陰中有陽之藥太陰號曰玄明粉内搜衆疾功莫大焉治一切熱毒風邪令痃癖氣脹滿五勞七傷骨蒸傳尸頭痛煩熱搜除惡疾五臟秘澀大小腸不通三焦熱淋疰忤疾咳嗽嘔逆口苦乾澀咽喉閉塞心肝脾肺臟胃積熱驚悸健忘榮衛不調中酒中膾飲食過度腰膝冷痛手脚痠乆冷乆熱四肢壅塞背膊拘急眼昏目眩乆視無力腸風痔病血癖不調婦人産後小兒疳氣陰毒傷寒表裏疫癘等疾并悉治之乆服令人身輕目明駐顔延壽急解毒藥補益妙唐明皇帝聞說終南山有道士劉玄眞服食此藥遂詔而問曰朕聞卿壽約三百歲服食何藥得住世間充悦如此玄眞答曰臣按仙經修煉朴消號玄明粉止服此藥遂無病長生其藥無滓性温能除衆疾生餌尚能救急難性命何况修煉長服益精壯氣助陽證陰味甘大寒無毒能除五臟積熱伏氣末篩點眼及點眼藥中用甚去赤腫障翳澀泪痛圖經曰文具朴消條下經驗方治食物過飽不消遂成痞鬲馬牙消一兩碎之吴茱萸半斤陳者煎取茱萸濃汁投消乘熱服良乆未轉更進一服立愈竇群在常州此方得效又方退翳明目白龍散馬牙消光淨者用厚紙裹令按實安在懷内著肉處養一百二十日取出研如粉入少龍腦同研細不計年歲深遠眼内生翳膜漸漸昏暗遠視不明但瞳人不破散并醫得每點用藥末兩米許點目中簡要濟衆方治小兒鵝口細研馬牙消於舌上摻大豆許日三五度姚和衆方治小兒重舌馬牙消塗舌下日三度太清伏煉靈砂法馬牙消陰極之精能制伏陽精消化火石之氣味苦大寒無毒主風熱癲癇小兒驚邪瘈瘲風眩頭痛肺壅耳聾口瘡喉痹咽塞牙頷腫痛目赤熱痛多眵泪生茂州西山岩石間其形塊大小不定色青白採無時惡麥句薑圖經曰文附朴消條下圖經衍義本草卷之一
