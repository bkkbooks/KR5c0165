body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正木部上品乾漆乾漆味辛温無毒有毒主絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹療欬嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲生漆去長蟲乆服輕身耐老生漢中川谷夏至後採乾之半夏爲之使畏雞子今又忌油脂圖經曰乾漆生漆出漢中川谷今蜀漢金峽襄歙州皆有之多高三二丈皮白葉似椿花似槐子一若牛李木心黄六月七月以竹筒釘入木中取之崔豹古今注曰以剛斧斫其皮開以竹管承之汁滴則成漆是也乾漆奮云用漆桶中自然乾者狀如蜂房孔孔隔者今多用筒子内乾者以墨如䃜堅若鐵石爲佳華佗傳彭城樊阿少師事佗求服食法佗授以漆葉青黏散方云服之去三蟲利五臟輕身益氣使人頭不白阿從其言年五百餘歲漆葉所在有之青黏生於豐沛城及朝歌一名地節一名黄芝主理五臟益精氣本出於迷人入山者見仙人服之以告佗佗以爲佳語阿阿秘之近者人見阿之壽而氣力强盛怪之以問所服食阿因醉亂誤說人服多驗陶隱居云今梁州漆最勝益州亦有廣州漆性急易燥其諸處漆桶上蓋裏自然有乾者狀如蜂房孔孔隔者爲佳生漆毒烈人以雞子和服之去蟲猶有嚙腸胃者畏漆人乃故死外氣亦能使身肉瘡腫自别有療法仙方用蟹消之爲水煉服長生外臺秘要療蛔蟲心痛惡心吐水乾漆熬擣蜜和丸服十五丸日再服經驗方治婦人不曾生長血氣臟腑疼痛不可忍及治丈夫元氣小腸氣撮痛者并宜服二聖丸乾漆一兩爲末濕漆一兩先將濕漆入銚子内熬如一食飯間已來住火與乾漆末一處拌和丸如半皂子大每服一丸温酒吞下無時如元氣小腸傍胱氣痛牙關緊急但擊開牙關温酒化一丸灌下必安怕漆人不可服簡要濟衆方治九種心痛及腹脅積聚滯氣筒子乾漆二兩搗碎炒烟出細研醋煑麫糊和丸如梧桐子大每服五丸至七丸熱酒下醋湯亦得無時服杜壬方治小兒胃寒蟲上諸證危惡與癇相似乾漆搗炒烟盡白入蕪荑等分爲細末米飲調下一字至一錢衍義曰乾漆若濕漆藥中未見用凡用者皆乾漆耳其濕者在燥熱及霜冷時則難乾得陰濕雖寒月亦易乾亦物之性也若霑漬人以油治之凡驗漆惟稀者以物蘸起細而不斷斷而急收起又塗於乾竹上蔭之速乾者并佳餘如經五加皮五加皮味辛苦温微寒無毒主心腹疝氣腹痛益氣療躄小兒不能行疽瘡陰蝕男子陰痿囊下濕小便餘瀝女人陰癢及腰脊痛兩脚疼痹風弱五緩虚羸補中益精堅筋骨强志意乆服輕身耐老一名豺節五葉者良生漢中及冤句五月七月採莖十月採根陰乾遠志爲之使畏蛇皮玄參圖經曰五加皮生漢中及冤句今江淮湖南州郡皆有之春生苗莖葉俱青作叢赤莖又似藤蔓長三五尺上有黑刺葉生五又作簇者良四葉三葉者最多爲次每一葉下生一刺三四月開白花結細青子至六月漸黑色根若荆根皮黄黑肉白骨堅硬五月七月採莖十月採根陰乾用藥性論云五加皮有小毒能破逐惡風血四肢不遂賊風傷人軟脚䐴腰主多年瘀血在皮肌治痹濕内不足主虚羸小兒二歲不能行用此便行走陶隱居云今近道處處有東間彌多四葉者亦好煮根莖釀酒主益人道家用此作灰亦以煑石與地榆并有秘法日華子云明目下氣治中風骨節攣急補五勞七傷葉治皮膚風可作蔬菜食東華眞人煑石經舜常登蒼梧山曰厥金玉之香草朕用偃息正道五加也又異名曰金鹽昔西域眞人王屋山人王常言何以得長乆何不食石蓄金鹽母何以得長壽何不食石用玉豉玉豉者即地榆也五加地榆皆是煮石而餌得長生之藥也昔尹公度聞孟綽子童士固共相與言曰寧得一把五加不用金玉滿車寧得一斤地榆安用明月寳珠魯定公云母單服五加酒以致不死臨隱去佯託死時人自莫之悟耳張子聲楊建始王叔才于出彦等皆服此酒而房室不絶得壽三百年有子二十人世世有得服五加酒散而獲延年不死者不可勝計或只爲散以代湯茶而餌之驗亦然也大王君謂五加云蓋天有五車之星精也金應五胡人應五德位應五方物應五車故青精入莖則有東方之液白氣入節則有西方之津赤氣入華則有南方之光玄精入根則有北方之飴黄烟入皮則有戊己之靈五神鎭主相轉育成用之者眞仙服之者反嬰也牡荆牡荆實味苦温無毒主除骨間寒熱通利胃氣止咳逆下氣生河間南陽冤句山谷或平壽都鄉高岸上及田野中八月九月採實陰乾得术柏實青葙共療頭風防風爲之使惡石膏圖經曰牡荆生河間南陽冤句山谷或平壽都鄉高岸上及田野中今眉州蜀州及近京亦有之此即作箠杖者俗名黄荆是也枝莖堅勁作科不爲蔓生故稱牡葉如蜱麻更疏瘦花紅作穗實細而黄如麻子大或云即小荆也八月九月採實陰乾此有青赤二種以青者爲佳謹按登眞隱訣云荆木之華葉通神見鬼精注云尋荆有三種直云荆木即是今可作箠杖者葉香亦有花子子不入藥方術則用牡荆牡荆子入藥北方人略無識其木者崔元亮集驗方治腰脚蒸法取荆葉不限多少蒸令熟熱置於瓮中其下著火温之以病人置於葉中剩著葉蓋須臾當汗出藥中旋旋吃飯稍倦即止便以綿衣蓋避風仍進葱豉酒及豆酒并得以差爲度蔓荆蔓荆實味苦辛微寒平温無毒主筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲長蟲主風頭痛腦鳴目泪出益氣乆服輕身耐老令人光澤脂緻音雉小荆實亦等惡烏頭石膏圖經云蔓荆實舊不載所出州土今近京及秦隴明越州多有之苗莖高四尺對節生枝初春因舊枝而生葉類小楝至夏盛茂有花作穗淺紅色蕊黄白色花下有青萼至秋結實斑黑如梧子許大而輕虚八月九月採一說作蔓生故名蔓荆而今所有并非蔓也藥性論云蔓荆子臣治賊風能長髭髮陶隱居云小荆即應是牡荆蔓荆牡荆子大於蔓荆子而反呼爲小荆恐或以樹形爲言復不知蔓荆樹若高大小日華子云利關節治赤眼癇疾注云海鹽亦有大如豌豆蒂有小輕軟蓋子六七八月採雷公云凡使去蒂子下白膜一重用酒浸一伏時後蒸從巳至未出曬乾用衍義曰蔓荆實諸家所解蔓荆牡荆紛然不同今既言蔓荆明知是蔓生即非高木也况此牡荆則是木上生者况漢書郊祀志所言以牡荆莖爲幡竿故知蔓荆即子大者是又何疑焉後條有欒荆此即便是牡荆也子青色如茱萸不言更立欒荆條故文中云本草不載亦無别名但有欒花功用又别斷無疑焉注中妄稱石荆當之其說傳見穿鑿辛夷辛夷味辛温無毒主五臟身體寒熱風頭腦痛面䵟温中解肌利九竅通鼻塞涕出治面腫引齒痛眩冒身兀兀如在車船之上者生鬚髮去白蟲乆服下氣輕身明目增年耐老可作膏藥用之去心及外毛毛射人肺令人欬一名辛矧一名侯桃一名房木生漢中川谷九月採實暴乾芎藭爲之使惡五石脂畏菖蒲蒲黄黄連石膏黃環圖經曰辛夷生漢中川谷今處處有之人家園庭亦多種植木高數丈葉似柿而長正月二月生花似著毛小桃子色白蒂紫花落無子至夏復開花初出如筆故北人呼爲木筆花又有一種枝葉并相類但歲一開花四月花落時有子如相思子或云都是一種經一二十年老者方結實即其花開早晚亦隨南北節氣寒温九月採實暴乾用或云用花蕊縮者良已開者劣謝者不佳藥性論云辛夷臣能治面生䵟疱面脂用生光華日華子云通關脉明目治頭痛憎寒體噤瘙癢入藥微炙已開者劣謝者不佳雷公云凡用之去粗皮拭上赤肉毛了即以芭蕉水浸一宿漉出用漿水煮從巳至未出焙乾用若治眼目中患即一時去皮用向裏實者寄生桑上寄生味苦甘平無毒主腰痛小兒背强巨兩切癰腫安胎充肌膚堅髮齒長鬚眉主金瘡去痹女子崩中内傷不足産後餘疾下乳汁其實明目輕身通神一名寄屑一名寓木一名宛童一名蔦音鳥生洪農川谷桑樹上三月三日採莖葉陰乾圖經曰桑寄生出洪農山谷桑上今處處有之云是烏鳥食物子落枝節間感氣而生葉似橘而厚軟莖似槐枝而肥脆三四月生花黄白色六月七月結實黄色如小豆大三月三日採莖葉陰乾凡槲櫸柳水楊楓等上皆有寄生惟桑上者堪用然殊難辨别醫家非自採不敢用或云斷其莖而視之其色深黄并實中有汁稠粘者爲眞藥性論云桑寄生臣能令胎牢固主懷妊漏血不止日華子云助筋骨益血脉採人多在櫸樹上收呼爲桑寄生在桑上者極少縱有形與櫸樹上者亦不同次即楓樹上方同櫸樹上者黃色七月人月採雷公云凡使在樹上自然生獨枝樹是也採得用銅刀和根枝莖細剉陰乾任用勿令見火衍義曰桑寄生新舊書云今處處有之從宦南北實處處難得豈歲歲窠斫摘踐之苦而不能生邪抑方宜不同也若以爲鳥食物子落枝節間感氣而生則麥當生麥穀當生穀不當但生此一物也又有於柔滑細枝上生者如何得子落枝節間由是言之自是感造化之氣别是一物古人當日惟取桑上者實假其氣耳又云今醫家鮮用此極誤矣今醫家非不用也第以難得眞桑上者當得眞桑寄生下咽必驗如神向承乏吴山有求藥於諸邑者乃遍令人搜摘卒不可得遂以實告甚不樂蓋不敢以僞藥罔人鄰邑有人僞以他木寄生送之服之逾月而死哀哉杜仲杜仲味辛甘平温無毒主腰脊痛補中益精氣堅筋骨强志除陰下癢濕小便餘瀝脚中酸疼不欲踐地乆服輕身耐老一名思仙一名思仲一名木綿生上虞山谷及上黨漢中二月五月六月採皮惡蛇蜕皮玄參圖經曰杜仲生上虞山谷及上黨漢中今出商州成州峽州近處大山中亦有之木高數丈葉如辛夷亦類柘其皮類厚朴折之内有白絲相連二月五月六月九月採皮用江南人謂之檰初生葉嫩時採食主風毒脚氣及乆積風冷腸痔下血亦宜乾末作湯藥性論云杜仲味苦能治腎冷䐴腰病人虚而身强直風也腰不利加而用日華子云暖治腎勞腰脊攣入藥炙用雷公云凡使先須削去粗皮用酥蜜和作一兩炙之盡爲度炙乾了細剉用凡修事一斤酥二兩蜜三兩二味相合令一處用之聖惠方治卒患腰脚疼痛補腎杜仲一兩去麤皮炙微黄剉以水二大盞煎至一盞去滓用羊腎一對細切去脂膜入藥中煑次入薤白七莖鹽花椒薑醋等和作羹喫空腹食之勝金方治婦人胎臟不安并産後諸疾宜服杜仲丸瓦上乾於木臼中杵爲末煮棗爲丸如彈子大每服一丸爛嚼以糯米飲下楓香脂楓香脂味辛苦平無毒主癮疹風癢浮腫齒痛一名白膠香其樹皮味辛有小毒主水腫下水氣煮汁用之所在大山皆有圖經曰楓香脂舊不載所出州郡云所在大山皆有今南方及關陜多有之似白楊甚高大其葉圓而作歧有三角而香二月有花白色乃連著實大如鴨卵八月九月熟暴乾可燒南方草木狀曰楓實惟九眞有之用之有神乃難得之物其脂爲白膠香五月斫爲坎十一月採之其皮性澀止水痢水煎飲之任昉述異記曰南中楓子鬼楓木之老者爲人形亦呼爲靈楓蓋瘤癭也至今越巫有得之者以雕刻鬼神可致靈異下沉香條有楓香云療風癮疹癢毒與此相類即一物也陳藏器云楓皮本功外性澀止水痢蘇云下水腫水腫非澀藥所療蘇爲誤爾又云有毒轉明其謬水煎止下痢爲最日華子云楓皮止霍亂刺風冷風煎湯浴之衍義曰楓香與松脂皆可亂乳香尤宜區别楓香微黄白色燒之尤見眞僞兼能治風癮疹癢毒水煎熱煠洗女貞女貞實味苦甘平無毒主補中安五臟養精神除百疾乆服肥健輕身不老生武陵川谷立冬採圖經曰女貞實生武陵川谷今處處有之山海經云太山多眞木是此木也其葉似枸骨及冬青木極茂盛凌冬不凋實細青白色九月而實成似牛李子立冬採實暴乾其皮可以浸酒或云即今冬青木也而冬青木肌理白文如象齒道家取以爲簡其實亦浸酒去風補血木蘭木蘭味苦寒無毒主身大熱在皮膚中去面熱赤疱酒皶惡風癤疾陰下癢濕明耳目療中風傷寒及癰疽水腫去臭氣一名林蘭一名杜蘭皮似桂而香生零陵山谷及太山十二月採皮陰乾圖經曰木蘭生零陵山谷及太山今湖嶺蜀川諸州皆有之木高數丈葉似菌桂葉亦有三道縱文皮如板桂有縱橫文香味劣於桂此與桂枝全别而韶州所生乃云與桂同是一種取外皮爲木蘭中肉爲桂心蓋是桂中之一種耳十一月十二月採陰乾用任昉述異記云木蘭舟在潯陽江中多木蘭又七里洲中有魯班刻木蘭舟至今在洲中今詩家云木蘭舟出於此陶隱居云零陵諸處皆有狀如楠樹皮甚薄而味辛香今益州有皮厚狀如厚朴而氣味爲勝今東人皆以山桂皮當之亦相類道家用合香亦好外臺秘要方療面上皶䩅皯𪒟方木蘭皮一斤細切以三年酢漿漬之自日出於日中曬搗末漿水服方寸七日三子母秘録方療小兒重舌木蘭皮一尺廣四寸削去粗皮用醋一升漬取汁注重舌上蕤核蕤核味甘温微寒無毒主心腹邪結氣明目目赤痛傷泪出目腫毗爛齆鼻破心下結痰痞氣乆服輕身益氣不饑生函谷川谷及巴西圖經曰蕤核生函谷川谷及巴西今河東亦有之其木高五七尺莖間有刺葉細似枸杞而尖長花白子紅紫色附枝莖而生類五味子六月成熟五月六月採實去核殻陰乾劉禹錫傳信方所著法最奇云眼風泪癢或生翳或赤毗一切皆主之宣州黄連搗篩末蕤核人去皮碾爲膏縁此性稍濕末不得故耳與黄連等分和合取無蚛病乾棗三枚割頭少許留之却核以二物滿填於中却取所割下棗頭依前合定以少綿裹之惟薄綿爲佳以大茶碗量水半碗於銀器中文武火煎取一鷄子以來以綿濾待冷點眼萬萬不失前後試驗數十人皆應今醫家亦多用得效故附之陶隱居云今從北方來云出彭城間形如烏豆大圓而扁有文理狀似胡桃桃核今人皆合殻用爲分兩此乃應破取人秤之醫方惟以藥眼仙經以合守中丸也雷公云凡使先湯浸去皮尖擘作兩片用芒消木通草二束和蕤人同水煮一伏時後瀝出去諸般藥取蕤人研成膏任加减入藥中使每修事四兩用芒消一兩木通草七兩丁香丁香味辛温無毒主温脾胃止霍亂擁脹風毒諸腫齒疳𧏾能發諸香其根療風熱毒腫生交廣南蕃二月八月採圖經曰丁香出交廣南蕃今惟廣州有之本類桂高丈餘葉似櫟凌冬不凋花圓細黄色其子出枝蕊上如釘子長三四分紫色其中有麤大如山茱萸者亦謂之母丁香二月八月採子及根又云盛冬生花子至次年春採藥性論云丁香臣能主冷氣腹痛日華子云治口氣反胃鬼疰蠱毒及療腎氣賁豚氣陰痛壯陽暖腰膝治冷氣殺酒毒消痃癖除冷勞雷公云凡使有雄雌雄顆小雌顆大似懷棗核方中多使雌力大膏煎中用雄若欲使雄須去丁蓋乳子發人背癰也簡要濟衆方治傷寒咳噫不止及噦逆不定丁香一兩乾柿蒂一兩焙乾擣羅爲末每服一錢煎人參湯下千金方治乾霍亂不吐不下方丁香十四枚末以熱湯一升和之頓服衍義曰丁香日華子云治口氣此正是御史所含之香治胃寒及脾胃冷氣不和有大者名母丁香味尤佳爲末縫紗囊如小指實末内陰中主陰冷病中病便已沉香沉香微温療風水毒腫去惡氣圖經曰沉香青桂香鷄骨香馬蹄香煎香同是一本舊不著所出州土今惟海南諸國及交廣崖州有之其木類椿櫸多節葉似橘花白子似檳榔大如桑椹紫色而味辛交州人謂之蜜香若欲取之先斷其積年老木根經年其外皮榦俱朽爛其木心與枝節不壞者即香也細枝緊實未爛者爲青桂堅黑而沉水者爲沉香半沉半浮與水面平者爲鷄骨最麤者爲煎香又云沉香中形如鷄骨者爲雞骨香形如馬蹄者爲馬蹄香然今人有得沉香奇好者往往亦作雞骨形不必獨是煎香也其又麤不堪藥用者爲生結黃熟香其實一種有精麤之異耳并採無時又薰陸香形似白膠出天竺單于二國南方草木狀如薰陸出大秦國其木生於海邊沙上盛夏木膠出沙上夷人取得賣與賈客乳香亦其類也廣志云南波斯國松木脂有紫赤如櫻桃者名乳香蓋薰陸之類也今人無復别薰陸者通謂乳香爲薰陸耳治腎氣補腰膝霍亂吐下衝惡中邪氣五疰治血止痛等藥及膏煎多用之然至黏難研用時以繒袋挂於窗隙間良乆取研之乃不黏又雞舌香出崑崙及交州以南枝葉及皮并似栗花如梅花子似棗核此雌者也雄者著花不實採花釀之以成香今醫家又一說云按三省故事尚書郞口含鷄舌香以其奏事答對欲使氣芬芬也而方家用雞舌香療口臭者亦縁此義耳蘇合香生中臺川谷蘇恭云此香從西域及崑崙來紫色與眞紫檀相似而堅實極芬香其香如石燒之灰白者好今不復見此等廣南雖有此而類蘇木無香氣藥中但用如膏油者極芬烈耳陶隱居以爲是獅子屎亦是指此膏油者言之耳然獅子屎今内帑亦有之其臭極甚燒之可以辟邪惡固知非此也梁書云天竺出蘇合香是諸香汁煎之非自然一物也又有檀香木如檀生南海消風熱腫毒主心腹痛霍亂中惡鬼氣殺蟲有人種黄白紫之異今人盛用之眞紫檀舊在下品亦主風毒蘇恭云出崑崙盤盤國雖不生中華人間遍有之檀木生江淮及河朔山中其木作斧柯者亦檀香類但不香耳陶隱居云此香合香家要用不入藥惟療惡核毒腫道方頗有用處日華子云沉香味辛熱無毒調氣補五臟益精壯陽暖腰膝去邪氣止轉筋吐瀉冷氣破癥癖冷風麻痹骨節不任濕風皮膚癢心腹痛氣痢雷公云沉香凡使須要不枯者如觜角硬重沉於水下爲上也半沉者次也夫入丸散中用須候衆藥出即入拌和用之衍義曰沉香木嶺南諸郡悉有之旁海諸州尤多交幹連枝崗嶺相接千里不絶葉如冬青大者合數人抱木性虚柔山民或以構茅廬或爲橋多在折枝枯幹中或爲沉或爲煎或爲黄熟自枯死者謂之水盤香今南恩高竇等州惟産生結香蓋山民入山見香木之曲幹斜枝必以刀斫成坎經年得雨水所漬遂結香復以鋸取之刮去白木其香結爲斑點遂名鷓鴣斑燔之極清煎沉之良者惟在瓊崖等州俗謂之角沉黄沉乃枯木中得者宜入藥用依木皮而結者謂之青桂氣尤備在土中歲久不待刓剔而成者謂之龍鱗亦有削之自卷咀之柔韌者謂之黄蠟沉尤難得也然經中止言療風水毒腫去惡氣餘更無治療今醫家用以保和衛氣爲上品藥須極細爲佳今人故多與烏藥磨服走散滯氣獨行則勢弱與他藥相佐當緩取效有益無損餘藥不可方也薰陸香木葉類棠梨南印度界阿吒釐國出今謂之西香南番者更佳此即今人謂之乳香爲其垂滴如乳熔塌在地者謂之塌香皆一也薰陸香微温療風水毒腫去惡氣伏尸圖經曰文具沉香條下唐本云薰陸香微温去惡氣惡瘡出天竺國及邯鄲似松脂黄白色天竺者多白邯鄲者夾緑色香不甚梅師方治齒蟲痛不可忍嚼薰陸香咽其汁立瘥雞舌香微温療風水毒腫去惡氣療霍亂心痛圖經曰文具沉香條下禹錫云按藥性論云鷄舌香使味辛無毒入吹鼻散子中用殺腦疳入諸香中令人身香齊民要術云俗人以其似丁子故爲丁子香抱朴子云鷄舌香黄連乳汁煎治目中之病應邵漢官侍中年老口臭帝賜鷄舌香含之外臺秘要方療齲齒方煮雞舌香汁含之瘥檀香熱無毒治心痛霍亂腎氣腹痛圖經曰文具沉香條下陶隱居云白檀消熱腫禹錫云按陳藏器云主心腹霍亂中惡鬼氣殺蟲白檀樹如檀出海南日華子云檀香熱無毒治心痛霍亂腎氣腹痛濃煎服水磨傅外腎并腰腎痛處乳香微温療風水毒腫去惡氣療風癮疹癢毒圖經曰文具沉香條下陳藏器云蓋薰陸之類也其性温療耳聾中風口噤婦人血氣能發酒理風冷止大腸泄澼療諸瘡癤令内消日華子云味辛熱微毒下氣益精補腰膝治腎氣止霍亂衝惡中邪氣心腹痛疰氣煎膏止痛長肉入丸散微炒殺毒得不粘博濟方治子死腹中黄明乳香以端午日午時或歲除夜收猪心血相和研爲丸如雞頭大以紅絹袋盛挂於門上如患者冷酒磨下一丸又方治急慢驚風乳香半兩甘遂半兩同研細每服半錢用乳香湯調下或小便調妙靈苑方治甲疽胬肉裏甲膿血疼痛不瘥凡此疾須剔去肉中甲不治亦愈或已成瘡不瘥用此法乳香末膽礬燒研等分傅之肉消愈降眞香出黔南拌和諸雜香燒烟直上天召鶴得盤旋於上海藥云徐表南州記云生南海山又云生大秦國味温平無毒主天行時氣宅舍怪異并燒悉驗又按仙傳云燒之或引鶴降醮星辰燒此香甚爲第一度籙燒之功力極驗小兒帶之能辟邪惡之氣也蘇合香味甘温無毒主辟惡殺鬼精物温瘧蠱毒癇痓去三蟲除邪令人無夢魘久服通神明輕身長年生中臺川谷圖經曰文具沉香條下陶隱居云俗傳云是獅子屎外國說不爾今皆從西域來眞者難别不復入藥惟合好香唐本注云此香從西域及崑崙來紫赤色與紫眞檀相似堅實極芬香惟重如石燒之灰白者好云是獅子屎此是胡人誑言陶不悟之猶以爲疑也禹錫云按梁書云中天竺國出蘇合香合是諸香汁煎之非自然一物也陳藏器云按獅子屎赤黑色燒之去鬼氣服之破宿血殺蟲蘇合香色黄白二物相似而不同人云獅子屎是西國草木皮汁所爲胡人將來欲人貴之飾其名爾雚香藿香微温療風水毒腫去惡氣療霍亂心痛圖經曰藿香舊附五香條不著所出州土今嶺南郡多有之人家亦多種植二月生苗莖梗甚密作叢葉似桑而小薄六月七月採之暴乾乃芬香須黄色然後可收又金樓子及俞益期箋皆云扶南國人言衆香共是一木根便是栴檀節是沉水花是雞舌葉是藿香膠是薰陸詳本經所以與沉香等共條蓋義出於此然南中所有乃是草類南方草木狀云藿香榛生吏民自種之正相符合也范曄和香方云零藿虚燥古人乃以合熏香本經主霍亂心痛故近世醫方治脾胃吐逆爲最要之藥禹錫云按南州異物志云藿香出海邊國形如都梁可著衣服中南方草木狀云味辛榛生吏民自種之五六月採暴之乃芬芳出交趾九息諸國别說云謹按藿香圖經云二月生苗舊雖附五香條中今詳枝梗殊非木類恐當移入草部金櫻子金櫻子味酸澀平温無毒療脾泄下痢止小便利澀精氣乆服令人耐寒輕身方術多用云是今之刺梨子形似榅桲而小色黄有刺花白在處有之圖經曰金櫻子舊不載所出州土云處處有之今南中州郡皆有而以江西劍南嶺外者爲佳叢生郊野中夫類薔薇有刺四月開白花夏秋結實亦有刺黄赤色形似小石榴十一月十二月採江南蜀中人熬作煎酒服云補治有殊效禹錫云按蜀本方術多用言是今之刺榆子形如榅桲而小今醫家用之甚佳日華子云金櫻花平止冷熱痢殺寸白蛔蟲等和鐵粉研拔白髮傅之再出黑者亦可染髮又云金櫻東行根平無毒治寸白蟲剉二兩入糯米三十粒水二升煎五合空心服須臾瀉下孫眞人食忌云金櫻子煎經霜後以竹夾子摘取於木臼中轉柞却剌勿損之擘爲兩片去其子以水淘洗過爛擣入大鍋以水煎不得絶火煎約水耗半取出澄濾過仍重煎似稀餳每服一匙用暖酒一盞調服其功不可具載沈存中云金櫻子止遺泄取其温且澀世之用者待紅熟取汁熬膏大誤也紅熟則却央本性今取半黄時採用妙衍義曰金櫻子經九月十月熟時採不爾復令人利落雁木落雁木謹按徐表南州記云生南海山野中藤蔓而生四面如刀削代州雁門亦有藤蘿高丈餘雁過皆綴其中故曰落雁木又云雁銜至代州雁門皆放落而生以此爲名蜀中雅州亦出味平温無毒主風痛傷折脚氣腫腹滿虚脹以粉木同煮汁蘸洗并立效又主婦人陰瘡浮疱以椿木同煮之妙也圖經曰落雁木生雅州味甘性平無毒治産後血氣痛并折傷内損等疾其苗作蔓纏繞大木苗葉形色大都似茶無花實彼土人四月採苗入藥用詹糖香微温療風水毒腫去惡氣伏尸陶隱居云此香皆合香家要用不止入藥惟療惡核毒腫詹糖出晋安岑州上眞淳者難得多以其皮及蠹蟲屎雜之惟軟者爲佳餘香無眞僞而有精麤爾皋蘆葉味苦平作飲止渴除痰不睡利水明目出南海諸山葉似茗而大南人取作當茗極重之廣州記曰新平縣出皋蘆名之别名也葉大而澁又南越志曰龍川縣出皋蘆葉似茗味苦澁土人爲飲南海謂之過羅或曰物羅皆夷語也海藥云謹按廣州記云出新平縣狀若茶樹闊大無毒主煩渴熱悶下痰通小腸淋止頭痛彼人用代茶故人重之如蜀地茶也不凋木味苦温無毒主調中補衰治腰脚去風氣却老變白生太白山巗谷樹高三尺葉似椿莖赤者毛如棠梨牛奶藤味甘温無毒主荒年食之令人不饑取藤中粉食之如葛根令人髮落牛好食之生深山大如樹震燒木主火驚失心煑服之又取挂門户間大厭火灾此霹靂木也木蜜味甘平無毒止渴除煩潤五臟利大小便去膈上熱功用如蜜樹生南方枝葉俱可噉亦煎食如飴今人呼白石木蜜子名枳柤味甘本經云木蜜非此中汁如蜜也崔豹古今注云木蜜生南方合體甜軟可啖味如蜜老枝煎取倍甜止渴圖經衍義本草卷之二十一
