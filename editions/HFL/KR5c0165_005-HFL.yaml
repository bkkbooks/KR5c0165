front:
  text: 圖經衍義本草卷之五資五
  hash: sha256:46fcd72517940721cb4b0228ef13b199065bcfe3114f8a96f95149dd692a2164
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_005-001a, image: hfl/0537/0537-064.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正玉石部下品伏龍肝伏龍肝味辛微温主婦人崩中吐下血止咳逆止血消癰腫毒氣圖經曰文具石灰條下陶隱居云此竈中封釜月下黄土也取搗篩合葫塗癰甚效以竈有神故號爲伏龍肝并以遷隱其名爾今人又用廣州鹽城屑以療漏血瘀血亦是近耳之上兼得火燒之義也陳藏器云竈中土及四交道土合末以飲兒辟夜啼日華子云伏龍肝熱微毒治鼻洪腸風帶下血崩泄精尿血催生下胞及小兒夜啼雷公云凡使勿誤用竈下土其伏龍肝是十年已來竈額内火氣積自結如赤色石中黄其形貌八棱取得後細研以滑石水飛過兩遍令乾用熟絹裹却取子時安於舊額内一伏時重研用禹錫云按藥性論云伏龍肝單用亦可味鹹無毒末與醋調塗癰腫外臺秘要救急治心痛冷熱伏龍肝末煮水服方寸匕若冷以酒服又方治癰腫伏龍肝以蒜和作泥塗用布上貼之如乾則再易蕭炳云釜月中墨一名釜臍下墨千金方治風痱者卒不能語口噤手足不隨而强直伏龍肝五升以水八升和攪取汁飲之廣利方治吐血鼻衄不止伏龍肝半升以新汲水一大升淘取汁和蜜頓服十全博濟方治子死腹中其母氣欲絶伏龍肝二錢匕以水調下其土當兒頭上戴出産寳方胞衣不出取竈下土一寸研碎用好醋調令相得内於臍中續取甘草湯三四合服之出衍義曰伏龍肝婦人血露蠶沙一兩炒伏龍肝半兩阿膠一兩同爲末温酒調空心服二三錢以知爲度本條中有東壁土陳藏器云取其東壁土乆乾也今詳之南壁土亦向陽乆乾也何不取蓋東壁常先得曉日烘炙日者太陽眞火故治瘟瘧或曰何不取午盛之時南壁上而取日初出東壁土者何也火生之時其氣壯故素問云少火之氣壯及其當午之時則壯火之氣衰故不取實用此義或曰何以知日者太陽眞火以水精珠或心凹銅鑒向日射之以艾承接其光聚處火出石灰石灰味辛温主疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉療髓骨疽一名惡灰一名希灰生中山川谷圖經曰石灰生中山川谷今所在近山處皆有之此燒青石爲灰也又名石鍛有兩種風化水化風化者取鍛了石置風中自解此爲有力水化者以水沃之則熱蒸而解力差劣古方多用合百草團末治金瘡殊勝今醫家或以臘月黄牛膽取汁溲和却内膽中掛之當風百日研之更勝草葉者又敗船茹灰刮取用亦同陶隱居云中山屬代郡今近山生石青白色作竈燒竟以水沃之即熱蒸而解末矣性至烈人以度酒飲之則腹痛下痢療金瘡亦甚良俗名石堊古今多以結冢用捍水而辟蟲故古冢中水洗諸瘡皆即瘥唐本注云别録及今人用療金瘡止血大效若五月五日採蘩蔞葛葉鹿活草槲葉芍藥地黄葉蒼耳葉青蒿葉合石灰搗爲團如鷄卵暴乾末以療瘡生肌大神驗日華子云味甘無毒生肌長肉止血并主白癜癧瘍瘢疵等療冷婦人粉刺痔瘻疽瘡癭贅疣子又治産後陰不能合濃煎汁熏洗解酒味酸令不壞治酒毒暖水臟倍勝爐灰又名鍛石雷公云凡使用醋浸一宿漉出待乾下火鍛令腥穢氣出用瓶盛密蓋放冷拭上灰令淨用别本注云燒青石爲灰也有兩種風化水化風化爲勝禹錫云謹按蜀本云有毒墮胎藥性論云石灰治瘑疥蝕惡肉不入湯服止金瘡血和鷄子白敗船茹甚良抱朴子内篇古大墓中多石灰汁夏月行人有瘡者見墓中清水因自洗浴瘡偶愈於是諸病者聞之悉往洗之轉有飲以治腹内疾者丹房鏡源云石灰伏硫黄去錫上暈制雄黄制硇砂可用之聖惠方治螻蛄咬人用石灰醋和塗之又方治大腸乆積虚冷每因大便脱肛收不能入方炒石灰令熱故帛裹坐其上冷即易之外臺秘要元希聲侍郞治卒發疹秘驗方石灰隨多少和醋漿水調塗隨手即减肘後方治産後陰道開不閉石灰一斗熬之令可燒草以水二斗投灰中適寒温入水中坐梅師方治産後陰腫下脱腸出玉門不閉取石灰一斗熬令黄以水三斗投灰中放冷澄清取一斗二升暖洗孫用和方治誤吞金銀或錢在腹内石灰一杏核大硫黄一皂子大同研爲末酒調下斗門方治刀斧傷用石灰上包定痛止血立差崔氏方治血痢十年方石灰三升熬令黄以水一斗攪令清澄一服一升日三服衍義曰石灰水調一盞如稠粥揀好糯米粒全者半置灰中半灰外經宿灰中米色變如水精若人手面上有黑黶子及紋刺先微微以針頭撥動置少許如水精者於其上經半日許黶汁自出剔去藥不用且不得着水三二日愈又取新硬石灰一合以醋炒調如泥於患偏風牽口喎邪人口唇上不患處一邊塗之立便牽正礜石礜石味辛甘大熱生温熟熱有毒主寒熱鼠瘻蝕瘡死肌風痹腹中堅癖邪氣除熱明目下氣除膈中熱止消渴益肝氣破積聚痼冷腹痛去鼻中息肉乆服令人筋攣火煉百日服一刀圭不煉服則殺人及百獸一名青分石一名立制石一名固羊石一名白礜石一名太白石一名澤乳一名食鹽生漢中山谷及少室採無時得火良棘針爲之使惡馬目毒公鶩屎虎掌細辛畏水圖經曰礜石生漢中山谷及少室今潞州亦有焉性大熱置水中令水不冰又堅而拒火燒之一日夕但解散而不奪其堅市人多取潔白石當之燒即爲灰也此藥攻擊積聚痼冷之病爲良用之須眞者乃佳又有特生礜石生西域張華博物志云鸛巢中者爲眞即此特生礜石也然此色難得人多使漢中者藥性論云礜石使鉛丹爲之使味甘有小毒主除胸膈間積氣去冷風濕痹瘙癢忌羊血陶隱居云今蜀漢亦有而好者出南康南野溪及彭城界中洛陽城南塹常取少室生礜石内水中令水不冰如此則生亦大熱今以黄土泥苞炭火燒之一日一夕則解碎可用療冷結爲良丹方及黄白術多用之此又湘東新寧及零陵皆有白譽石能柔金博物志云鸛伏卵時取譽石周圍繞卵以助暖氣方術家取鸛巢中礜石爲眞也胡洽大露宿丸主寒冷百病方礜石煉乾薑桂心皂莢桔梗各三兩附子二兩六物搗篩蜜丸服如梧子五丸日三漸增以知爲度又有匈奴露宿丸硫黄丸并主積聚及飲食不下心腹堅實皆用礜石近世乃少用者衍義曰礜石并特生譽石博物志及陶隱居皆言此二石鸛取之以擁卵如此則是一物也隱居又言仙經不云特生則止是前白譽石今補注但隨文解義不見特生之意蓋二條止是一物但以特生不特生爲異耳所謂特生者不附著他石爲特耳今用者絶少惟兩字礜石入藥然極須謹用其毒至甚及論鸛巢中者皆無此石乃曰鸛常入水冷故取以擁卵如此則鸕鷀雁鶩之類皆食於水亦自繁息生化復不用此二石其說往往取俗士之言未嘗究其實而窮其理也砒霜砒霜味苦酸而有毒主諸瘧風痰在胸膈可作吐藥不可乆服能傷人飛煉砒黄而成造作别有法圖經曰砒霜舊不著所出郡縣今近銅山處亦有之惟信州者佳其塊甚有大者色如鵝子黃明澈不雜此類本處自是難得之物每一兩大塊眞者人競珍之市之不啻金價古服食方中亦或用之必得此類乃可入藥其市肆所畜片如細屑亦挾土石入藥服之爲害不淺誤中解之用冷水研緑豆漿飲之乃無他雷公云凡使用小瓷瓶子盛後入紫背天葵石龍芮二味三件便下火鍛從已至申便用甘草水浸從申至子出拭乾却入瓶盛於火中鍛别研三萬下用禹錫云謹按日華子云砒霜暖治婦人血氣衝心痛落胎又砒黄暖亦有毒畏緑豆冷水醋治瘧疾腎氣帶辟蚤蟲入藥以醋煮殺毒乃用别說云謹按今信州玉山有砒井官中封禁甚嚴生不夾石者色赤甚如雄黄以冷水磨解熱毒治痰壅甚效近火即殺人圖經所謂不啻金價者此也若今市人通貨者即取山中夾砂石者燒烟飛作白霜乃碎屑而芒刺其傷火多者塊大而微黄則圖經所謂如鵝子色明澈者此也古方并不入藥唯是燒煉丹石家用近人多以治瘧然大意本以生者能解熱毒蓋瘧本傷暑故用今俗醫乃不究其理即以所燒霜用服之其坑常封鎖坑中有濁緑水先絞水盡然後下鑿取生砒謂之砒黄其色如牛肉或有淡白路謂石非石謂土非土磨研必吐下因此幸有安者遂爲定法爾後所損極長不可不謹也初取飛燒霜時人在上風十餘丈外立下風所近草木皆死又見以和飯毒鼠若猫犬食死鼠者亦死其毒過於射罔遠矣可不察之聖惠方治卒中風昏憒若醉痰涎壅盛四肢不收方用砒霜如緑豆大研以新汲水調下少許用熟水投大吐即愈若未吐再服博濟方小兒牙宣常有鮮血不止牙齦臭爛砒黄抄一錢麝香抄半錢同研細末用紙條子以生油塗之後摻藥末在上少用末剪作小片紙棋子大看大小用插在爛動處簡要濟衆方治瘧神聖丹砒霜半錢研黑豆麵一錢右件二味細研滴水丸小豆大雄黃爲衣未發時空心面東新水下三丸青霞子云寳藏論云砒霜若草伏住火胎色不變移溶成汁添得者點銅成銀若見質枯折者不堪用衍義曰砒霜瘧家或用纔過劑則吐瀉兼作須濃研緑豆汁仍兼冷水飲得石腦油即伏今信州鑿坑井下取之酒飲治癖積氣有功纔見火便有毒不可造次服也取砒之法將生砒就置火上以器覆之令砒烟上飛着覆器遂凝結累然下垂如乳尖長者爲勝平短者次之圖言大塊者其大塊者以是下等片如細屑者極下也入藥當用如乳尖長者直須詳謹硇砂硇砂味鹹苦辛温有毒不宜多服主積聚破結血爛胎止痛下氣療咳嗽宿冷去惡肉生好肌柔金銀可爲焊音旱藥岀西戎形如牙消光淨者良驢馬藥亦用圖經曰硇砂出西戎今西凉夏國及河東陜西近邊州郡亦有之然西戎來者顆塊光明大者有如拳重三五兩小者如指面入藥最緊邊界出者雜碎如麻豆粒又挾砂石用之須飛澄去土石訖亦無力彼人謂之氣砂此藥近出唐世而方書著古人單服一味伏火作丸子亦有兼硫黄馬牙消輩合餌者不知方出何時殊非古法此本攻積聚之物熱而有毒多食腐壞人腸胃生用又能化人心爲血固非平居可餌者陳藏器云硇砂主婦人丈夫羸瘦積病血氣不調腸鳴食飲不消腰脚疼冷痃癖痰飲喉中結氣反胃吐水令人能食肥健一飛爲酸砂二飛爲伏翼三飛爲定精色如鵝兒黄和諸補藥爲丸服之有暴熱飛煉有法亦能變鐵日華子云北庭砂味辛酸暖無毒畏一切酸補水臟暖子宫消冷癖瘀血宿食不消氣塊痃癖及血崩帶下惡瘡息肉食肉飽脹夜多小便女人血氣心疼丈夫腰胯酸重四肢不任凡修制用黄丹石灰作櫃煅赤使無毒世人自疑爛肉如人被刃傷以北庭罯傅定當時生痂亦名狄鹽者禹錫云謹按藥性論云硇砂有大毒畏漿水忌羊血味酸鹹能銷五金八石腐壞人腸胃生食之化人心爲血中者研生緑豆汁飲一二升解之道門中有伏煉法能除冷病大益陽事蕭炳云硇砂使生不宜多服光淨者良今生北庭爲上外臺秘要救急治魚骨鯁在喉中以少硇砂口中咀嚼咽之立下經驗方硇砂丸方硇砂不計多少用罐子内著硇砂上面更坐罐子一個用紙筋白土和上下俱泥了窨乾後從辰初時便用蒼耳自在落下葉將來搗羅爲末藥上鋪頭蓋底上面罐子内用水坐著水旋添火燒從罐子外五寸已來圍繞欲盡更添火移向前罐子周迴火盡更旋燒促向前計一伏時爲度更不移火即閑雜人及婦人不得見一伏時住取來搗羅爲末醋麵糊爲丸如桐子大每服逐日十丸至十五丸温酒或米飲下并無忌若燒吃三二斤進食無病陳巽方治元臟虚冷氣攻臍腹疼痛硇砂一兩川爲頭生去皮臍杵爲末一二兩硇砂生研用纖霞草末二兩與硇砂同研匀用一小砂罐子不固濟慢火燒候罐熱將拌了者硇砂入罐子内不蓋口燒炭火一秤候火盡爐寒取出研與烏頭生同研匀湯浸蒸餅丸如桐子大每服三丸或木香湯醋湯任下青霞子云寳藏論硇砂若草伏住火不碎可轉制得諸石藥并引諸藥可治婦人乆冷硇砂爲五金賊也若石藥并灰霜伏得不堪用也太清服煉靈砂法北庭砂所禀陰石之氣性含陽毒之精功能消敗去穢益陽丹房鏡源云硇砂性有大毒或沉冷之疾可服則愈乆服有癰腫出北庭白黄者訣曰爲之金賊能制合群藥藥中之使自制雄雌黄衍義曰硇砂金銀有僞投鎔窩中其僞物盡消散矧人腹中有乆積故可潰腐也合他藥治目中翳用之須水飛過入瓷器中於重湯中煮其器使自乾殺其毒及去其塵穢鉛丹味辛微寒主吐逆胃反驚癇疾除熱下氣止小便利除毒熱臍攣金瘡溢血煉化還成九光乆服通神明一名鉛華生於鉛生蜀郡平澤圖經曰文具鉛錫條下陶隱居云即今熬鉛所作黄丹也畫用者俗方亦稀用惟仙經塗丹釜所須云化成九光者當謂九光丹以爲釜爾無别變煉法日華子云凉無毒鎭心安神療反胃止吐血及嗽傅金瘡長肉及湯火瘡染鬚髮可煎膏禹錫云謹按藥性論云鉛丹君主治驚悸狂走嘔逆煩渴煎膏用止痛生肌今注云此即今黄丹也與粉錫二物俱是化鉛爲之按李含光音義云黃丹胡粉皆化鉛未聞用錫者故參同契云若胡粉投炭中色壞還隱鉛抱朴子内篇云愚人乃不信黃丹及胡粉是化鉛所作今唐注以二物俱炒錫大誤矣肘後方客忤中惡之類多於道間門外得之令人心腹疼痛脹滿氣衝心胸不即治亦害人救之方眞丹方寸匕蜜三合和服之口噤者折齒灌經驗方碧霞丹治吐逆立效北來黃丹四兩篩過用好米醋半斤同藥入銚内煎令乾却用炭火三稱就銚内煅透紅冷取研細爲末用粟米飯丸如梧子大煎酵湯下七丸不嚼只一服王氏博濟方治風癇驅風散鉛丹二兩白礬二兩爲末用磚相鬥以紙鋪磚上先以丹鋪紙上次以礬鋪丹上然後用紙掩却將十斤柳木柴燒過爲度取出細研每服一錢温酒下劉氏方治小兒瘧方黄丹兩錢匕以蜜水和與服冷即以酒和令服之良治瘧方百草霜黃丹等分細研每服二錢匕於發日空心米飲調服不過兩服愈衍義曰鉛丹本謂之黃丹化鉛而成别有法唐本汪炒錫作然經稱鉛丹則炒錫之說誤矣亦不爲難辨蓋錫則色黯暗鉛則明白以此爲異治瘧及乆積皆用鉛鉛味甘無毒鎭心安神治傷寒毒氣反胃嘔噦蛇蜴所咬炙熨之圖經曰鉛生蜀郡平澤錫生桂楊山谷今有銀坑處皆有之而臨賀出錫尤盛亦謂之白鑞鉛丹黄丹也粉錫胡粉也二物并是化鉛所作故附於鉛鏡雖銅而皆用錫雜之乃能明白故鏡鼻附於錫謹按字書謂錫爲鑞鉛爲青金雖相似而入用殊别也又有鉛霜亦出於鉛其法以鉛雜水銀十五分之一合煉作片置錯瓮中密封經乆成霜亦謂之鉛白霜性極冷入治風痰及嬰孺驚滯藥令之醫家用之尤多經驗方治發背及諸般癰毒瘡黑鉛一片甘草三兩微炙剉用酒一斗著空瓶在傍先以甘草置在酒瓶内然後熔鉛投在酒瓶中却出酒在空瓶内取出鉛依前熔後投如此者九度并甘草去之只留酒令病者飲醉寢即愈勝金方烏髭鬢明目牢齒牙黑鉛半斤大鍋内熔成汁旋入桑條灰柳木攪令成沙右以熟絹羅爲末每日早晨揩齒後用温水漱在孟内取用其水洗眼治諸般眼疾髭黃白者用之皆變黑青霞子云寳藏論云黑鉛草伏得成實可點銅爲銀并鑄作鼎養朱砂住得火養水銀住火斷粉霜住火錫粉錫味辛寒無毒主伏尸毒螫音釋殺三蟲去鱉瘕療惡瘡墮胎止小便利一名解錫圖經曰文具鉛條下陶隱居云即今化鉛所作胡粉也其有金色者療尸蟲甚良而謂之粉錫事與經乖唐本注云鉛丹胡粉實用錫造陶今言化鉛作之經云粉錫亦爲深誤矣陳藏器云胡粉本功外主乆痢成疳和水及鷄子白服以糞黑爲度爲其殺蟲而止痢也日華子云光粉凉無毒治癰腫瘻爛嘔逆療癥瘕小兒疳氣今注按本經呼爲粉錫然其實鉛粉也故英公序云鉛錫莫辨者蓋謂此也禹錫云按藥性論云胡粉使又名定粉味甘辛無毒能治積聚不消焦炒止小兒疳痢外臺秘要誤吞錢并金銀物以胡粉一兩搗調之分再服食水銀金如吞金銀物在腹中服之令消洋出之千金方治瘡中水胡粉炭灰白等分脂和塗孔上水即止肘後方治篤病新起早勞食飲多致復欲死方水服胡粉少許傷寒類要同張文仲方治反胃吐逆内陰下恒濕且臭或作瘡但以胡粉一分粉之即差常用大驗又方治寸白蟲熬胡粉令速燥平旦作肉臛以藥方寸匕内臛中服之有大效又方小兒疳瘡胡粉熬八分猪脂和塗之差爲度油亦得子母秘録小兒夜啼胡粉服水調三豆大日三服衍義曰粉錫胡粉也又名定粉止泄痢積聚乆痢銅青平微毒治婦人血氣心痛合金瘡止血明目去膚赤息肉生銅皆有青青則銅之精華銅器上緑色是北庭罯者最佳治目時淘洗用陳藏器云陶云青銅不入方用按青銅明目去膚赤合金瘡止血入水不爛令瘡青黑生熟銅皆有青即是銅之精華大者即空緑以次空青也銅青獨在銅器上緑色者是代赭代赭味苦甘寒無毒主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下帶下百病産難胞衣不出墮胎養血氣除五臟血脉中熱血痹血瘀大人小兒驚氣入腹及陰痿不起一名須丸出姑幕者名須丸出代郡者名代赭一名血師生齊國山谷赤紅青色如鷄冠有澤染爪甲不渝者良採無時畏天雄圖經曰代赭生齊國山谷今河東京東山中亦有之以赤紅赤色如鷄冠有澤染爪甲不渝者良古方染丸治小兒用代赭云無眞者以左顧牡蠣代使乃知眞者難得今醫家所用多擇取大塊其上文頭如浮漚下者爲勝謂之丁頭代赭採無時次條又有白堊生邯鄲山谷即畫家所用者多而且賤一名白善土胡居士云始興小桂縣鄉有白善俗方稀用今處處皆有人家往往用以浣衣山海經西山經石䣀之其陰灌水出焉而北流於愚水其中有流赭以塗牛馬無病郭璞注云赭陶隱居云舊說云是代郡城門下土江東乆絶頃魏國所獻猶是彼間赤土爾非復眞物此於俗用乃疏而爲仙方之要并與戎鹽鹵鹹皆是急須唐本注云此石多從代州來云山中採得非城門下土又言生齊地山谷今齊州亭山出赤石其色有赤紅青者其赤者亦如鷄冠且潤澤土人惟採以丹楹柱而紫色且暗此物與代州出者相似古來用之今靈州鳴沙縣界河北平地掘深五尺得者皮上赤滑中紫如鷄肝大勝齊代者赤土也今人以朱塗牛角云以辟惡又云大次之山其陽多堊又北山經天池之山其中多黄堊又中山經葱襲之山其中有大谷多白黑青黄堊注云言有雜色之堊也然則赭以西土者爲貴堊有五色入藥惟白者取日華子云代赭畏附子止吐血鼻衄腸風痔瘻月經不止小兒驚癇疳疾反胃止瀉痢脱精尿血遺溺金瘡長肉安胎健脾又治夜多小便禹錫云謹按藥性論云代赭使雁門城土乾薑爲使味甘平治女子崩中淋瀝不止療生子不落味温服之辟鬼魅蕭炳云代赭臣斗門方治小腸氣用血師一兩米醋一升以火燒血師通赤淬入醋中以淬竭爲度搗羅如麵用湯調下一大錢即差如神矣血師即代赭也石燕石燕以水煮汁飲之主淋有效婦人難産兩手各把一枚立驗出零陵圖經曰石燕出零陵郡今永州祁陽縣江傍沙灘上有之形似蚶而小其實石也或云生山洞中因雷雨則飛出墮於沙上而化爲石未審的否今人催生令産婦兩手各握一枚須臾子則下唐本注云俗云因雷雨則從石穴中出隨雨飛墮者妄也永州祁陽縣西北百一十五里土岡上掘深丈餘取之形似蚶而小堅重如石也陳藏器云石燕主消渴取水牛鼻和煮飲之自死者鼻不如落崖死者良唐本先附日華子云石燕凉無毒出南土穴中凝强似石者佳禹錫云謹按蜀本作蜬汪云爾雅云螺小者蜬音含禹錫等謹按蕭炳云别有乳洞中食乳有命者亦名石燕似蝙蝠口方生氣物也食療云在乳穴石洞中者冬月採之堪食餘月採者只堪治病不堪食也又治法取石燕一十枚和五味炒令熟以酒一斗浸三日即每夜卧時飲一兩盞隨性也甚能補益進飲食令人健力聖惠方治傷寒小腹脹滿小便不通用石燕搗羅爲末不計時候葱白湯調半錢得通爲度簡要濟衆方治淋疾石燕子七個搗如黍米粒大新桑根白皮三兩剉如豆粒同拌令匀分作七貼用水一盞煎一貼取半盞去滓温服空心午前至夜各一服衍義曰石燕今人用者如蜆蛤之狀色如土堅重則石也既無羽翼焉能自石穴中飛出何故只墮沙灘上此說近妄唐本汪永州土岡上掘深丈餘取之形似蚶而小重如石則此自是二物餘說不可取治虚積藥中多用鐺墨主蠱毒中惡血暈吐血以酒或水細研温服之亦塗金瘡生肌止血瘡在面切勿塗之黑入肉如印此鐺下墨是也禹錫云謹按蜀本云鐺墨無毒東壁土主下部瘡脱肛陶隱居云此屋之東壁上土爾當取東壁之東邊謂當先見日光刮取用之亦療小兒風臍又可除油污衣勝石灰滑石日華子云東壁土温無毒赤銅屑以醋和如麥飯袋盛先刺腋下脉去血封之攻腋臭神效又熬使極熱投酒中服五合日三主賊風反折又燒赤銅五斤内酒二斗中百遍服同前主賊風甚驗禹錫云謹按日華子云銅屑味苦平微毒明目治風眼接骨焊齒療女人血氣及心痛錫銅鏡鼻臣禹錫等謹按月閉通用藥云錫銅鏡鼻平主女子血閉癥瘕伏腸絶孕及伏尸邪氣生桂陽山谷陶隱居云此物與胡粉異類而今共條當以其非止成一藥故云附見錫品中也古無純銅作鏡者皆用錫雜之别録用銅鏡鼻即是今破古銅鏡鼻爾用之當燒令赤内酒中飲之若置醯中出入百過亦可搗也鉛與錫本經云生桂陽今則乃出臨賀猶是分桂陽所置鉛與錫相似而入用大異日華子云古鑒平微毒井底砂至冷治湯火燒瘡用之千金方蝎螫人以井底泥塗傅之温則易之戎鹽味鹹寒無毒主明目目痛益氣堅肌骨去毒蠱心腹痛溺血吐血齒舌血出一名胡鹽生胡鹽山及西羌北地酒泉福禄城東南角北海青南海赤十月採陶隱居云今俗中不復見鹵鹹惟魏國所獻虜鹽即是河東大鹽形如結冰圓强味鹹苦日華子云戎鹽平助水臟益精氣除五臟癥結心腹積聚痛瘡疥癬等即西蕃所出衍義曰戎鹽成垛裁之如枕細白味甘鹹亦功在却血入腎治目中瘀赤澀昏大鹽味甘鹹寒無毒主腸胃結熱喘逆胸中病令人吐生邯鄲及河東池澤漏蘆爲之使禹錫云按蕭炳云大鹽臣衍義曰大鹽新者不苦乆則鹹苦今解州鹽池所出者皆成斗子其形大小不等乆亦苦海水煎成者但味和二鹽互有得失入藥及金銀作多用大鹽及解鹽傍海之人多黑色蓋日食魚鹽此走血之驗也齒縫中血出鹽湯嗽之及接藥入腎北虜以鹽淹尸使不腐鹵鹹味苦鹹寒無毒主大熱消渴狂煩除邪及下蠱毒柔肌膚去五臟腸胃留熱結氣心下堅食已嘔逆喘滿明目目痛生河東鹽池陶隱居云是煎鹽釜下凝滓唐本注云鹵鹹既生河東河東鹽不釜煎明非凝滓此是鹹土名鹵鹹令人熟皮用之漿水味甘酸微温無毒主調中引氣宣和强力通關開胃止渴霍亂泄痢消宿食宜作粥薄暮啜之解煩去睡調理腑臟粟米新熟白花者佳煎令醋止嘔噦白人膚體如繒帛爲其常用故人不齒其功冰漿至冷婦人懷妊不可食之食譜所忌也衍義曰漿水不可同李實飲令人霍亂吐利井華水味甘平無毒主人九竅大驚出血以水噀面亦主口臭正朝含之吐棄厠下數度即差又令好顔色和朱砂服之又堪煉諸藥石投酒醋令不腐洗目膚翳及酒後熱痢與諸水有異其功極廣此水井中平旦第一汲者本經注井苔條中略言之今此重細解也新補菊華水味甘温無毒除風補衰乆服不老令人好顔色肥健益陽道温中去痼疾出南陽酈縣北潭水其源悉芳菊生被崖水爲菊味盛洪之荆州記云酈縣菊水太尉胡廣乆患風羸常飲此水後疾遂瘳此菊甘美廣後收此菊實播之京師處處傳植抱朴子云南陽酈縣山中有甘谷水所以甘者谷上左右皆生甘菊菊花墮其中歷世彌乆故水味爲變其臨此谷中居民皆不穿井悉食甘谷水食無不壽考故司空王暢太尉劉寬太傅袁隗皆爲南陽太守每到官常使酈縣月送甘谷水四十斛以爲飲食此諸公多患風痹及眩冒皆得愈新補衍義曰菊花水本條言南陽酈縣北潭水其源悉芳菊生被崖水爲菊味此甚怪且菊生於浮土上根深者不過尺百花之中此特淺露水泉莫非深遠而來况菊根亦無香其花當九月十月間止三兩旬中焉得香入水也若因花而香其無花之月合如何也殊不詳水自有甘淡鹹苦焉知無有菊味者宜細詳之地漿寒主解中毒煩悶陶隱居云此掘地作坎以水沃其中攪令濁俄頃取之以解中諸毒山中有毒菌人不識煮食之無不死又楓樹菌食之令人笑不止唯飲土漿皆差餘藥不能救矣臘雪味甘冷無毒解一切毒治天行時氣温疫小兒熱癇狂啼大人丹石發動酒後暴熱黄疸仍小温服之藏淹一切果實良春雪有蟲水亦便敗所以不堪收之新補見陳藏器及日華子泉水味甘平無毒主消渴反胃熱痢熱淋小便赤澀兼洗漆瘡射癰腫令散久服却温調中下熱氣利小便并多飲之又新汲水百一方云患心腹冷病者若男子病令女人以一杯與飲女子病令男子以一杯與飲又解合口椒毒又主食魚肉爲骨所鯁取一杯水合口向水張口取水氣鯁當自下又主人忽被墜損腸出以冷水噴之令身噤腸自入也又臘日夜令人持椒井傍無與人語内椒井中服此水去温氣博物志云凡諸飲水療疾皆取新汲清泉不用停污濁暖非直無效固亦損人新補半天河微寒主鬼疰狂邪氣惡毒陶隱居云此竹籬頭水也及空樹中水皆可飲并洗諸瘡用之衍義曰半天河水一水也然用水之義有數種種各有理如半天河水在上天澤水也故治心病鬼疰狂邪氣惡毒熱湯主忤死先以衣三種籍忤死人腹上乃取銅器若瓦器盛湯著衣上湯冷者去衣大冷者换湯即愈又霍亂手足轉筋以銅器若瓦器盛湯熨之亦可令蹋器使脚底熱徹亦可以湯捋之冷則易用醋煮湯更良煮蓼子及吴茱萸汁亦好以綿絮及破氈角脚以湯淋之貴在熱徹又繰絲湯無毒主蛔蟲熱取一盞服之此煮繭汁爲其殺蟲故也又燖猪湯無毒主産後血刺心痛欲死取一盞温服之新補見抱朴子陳藏器衍義曰熱湯助陽氣行經絡患風冷氣痹人多以湯渫脚至膝上厚覆使汗出周身然别有藥亦終假湯氣而行也四時暴泄利四肢冷臍腹疼深湯中坐浸至腹上頻頻作生陽佐藥無速於此虚寒人始坐湯中必戰仍常令人伺守之圖經衍義本草卷之五
