front:
  text: 圖經衍義本草卷之三十曰五
  hash: sha256:ddc23313cadc33e61d52be9c1039cba0a1981169e10b375b76632fa5c280c6ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_030-001a, image: hfl/0546/0546-053.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正禽部上品諸雞丹雄雞味甘微温微寒無毒主女人崩中漏下赤白沃補虚温中止血乆傷乏瘡通神殺毒辟不祥頭主殺鬼東門上者尤良白雄鷄肉味酸微温主下氣療狂邪安五臟傷中消渴烏雄雞肉微温主補中止痛膽微寒主療目不明肌瘡心主五邪血主踒折骨痛及痿痹肪主耳聾腸主遺溺小便數不禁肝及左翅毛主起陰冠血主乳難肶胵裏黃皮微寒主泄利小便利遺溺除熱止渴屎白微寒主消渴傷寒寒熱破石淋及轉筋利小便止遺溺滅瘢痕黑雌鷄主風寒濕痹五緩六急安胎血無毒主中惡腹痛及踒折骨痛乳難翮羽主下血閉黃雌鷄味酸甘平主傷中消渴小便數不禁腸澼泄利補益五臟絶傷療勞益氣肋骨主小兒羸瘦食不生肌雞子主除熱火瘡癇痙可作虎魄神物卵白微寒療目熱赤痛除心下伏熱止煩滿欬逆小兒下泄婦人産難胞衣不出醯漬之一宿療黄疸破大煩熱卵中白皮主久咳結氣得麻黃紫菀和服之立已鷄白蠹肥脂生朝鮮平澤禹錫云按日華子云未雄雞冠血療白癜風糞治白虎風并傅風痛白雄雞調中除邪利小便去丹毒烏雄鷄温無毒止肚痛除風濕麻痹補虚羸安胎治折傷并癰疽主罯竹木刺不出者諸雞肶胵平無毒止泄精并溺血崩中帶下腸風瀉痢此即是肫肉黃皮烏雌雞温無毒安心定志除邪辟惡氣治血邪破心中宿血及治癰疽排膿補新血補産後虚羸益色助氣膽治疣目耳瘑瘡日三傅腸治遺尿并小便多糞治中風失音疾逆消渴破石淋利小腸餘澀傅瘡痍滅瘢痕炒服治小兒客忤蠱毒翼治小兒夜啼安席下勿令母知窠中草治頭瘡白秃和白頭翁草燒灰猪脂傅黃雌雞止勞劣添髓補精助陽氣暖小腸止泄精補水氣按藥性論云黑雌雞味甘安胎孟詵云産後血不止以鷄子三枚醋半升好酒二升煎取一升分爲四服如人行三二里微暖進之又新産婦可取一隻理如食法和五味炒熟香即投二升酒中封口經宿取飲之令人肥白又和烏油麻二升熬令黃香末之入酒酒盡極效黄雌雞主腹中水癖水腫以一隻理如食法和赤小豆一升同煮俟豆爛即出食之其汁日二夜一每服四合補丈夫陽氣治冷氣瘦著床者雞子食之良又先患骨熱者不可食之雞子動風氣不可多食又光粉諸石爲末和飯與雞食之後取雞食之甚補益又子醋煮熟空腹食之治久赤白痢又人熱毒發可取三顆雞子白和蜜一合服之差雷公云雞子凡急切要用勿便敲損恐得二十一日滿在内成形空打損後無用若要用先於温湯中試之若動是成形也若不動即敲損取清者用黃即去之内有自潰者亦不用也外臺秘要主天行嘔逆不可食以鷄卵一枚煮三五沸出以水浸之外熟内熱則吞之良肘後方自縊死安定心神徐緩解之愼勿割繩斷抱取心下猶温者刺雞冠血滴口中即活男雌女雄又方以雞屎白如棗大酒半盞和灌之及鼻中尤佳經驗方治小兒疳痢肚服方用雞子一個打破眼子如豆大納巴豆一粒去皮膩粉一錢用五十重紙裹於飯甑中蒸三度放冷打破用雞子肉同巴粉一時研入少麝添日糊丸如米粒大食後夜卧温湯下二丸三丸又方婦人産後口乾舌縮不止打雞子一個煎水一盞衝之揉蓋少時服廣濟方主咽喉塞鼻中瘡出及乾嘔頭痛食不下生雞子一個開頭取白去黄著米酢拌煻火頓沸起擎下沸定更頓三度成就熱飲酢盡不過一二差子母秘録小兒頭身諸瘡燒卵殻研和猪脂傅之譚氏方小兒急丹毒不止以鷄子白和赤小豆未傅之衍義曰丹雄雞今言赤鷄者是也蓋以毛色言之巽爲雞爲風雞鳴於五更者日將至巽位感動其氣而鳴也體有風人故不可食經所著其用甚備産後血暈身痙直帶眼口角與目外眵向上牽急不知人取子一枚去殻分清以荆芥末二錢調服遂安仍依次調治若無他疾則不須治甚敏捷烏雞子尤善經注皆不言鷄發風今體有風人食之無不發作爲雞爲巽信可驗矣食者當審白鵝膏主耳卒聾以灌之毛主射工水毒肉平利五臟陶隱居云東川多溪毒養鵝以辟之毛羽亦佳中射工毒者飲血又以塗身鵝未必食射工蓋以威相制爾乃言鵝不食生蟲今雞子亦噉蚯蚓輩唐本注云鵝毛主小兒驚癇及者又燒灰主噎氣逆上日華子云蒼鵝冷有毒發瘡膿糞可傅蛇蟲咬毒舍中養能辟蟲蛇白鵝凉無毒解五臟熱止渴脂潤皮膚尾罌治聤耳及聾内之亦療手足皴子補中益氣不可多食尾燒灰酒服下治目孟詵云脂可合面脂肉性冷不可多食令人易霍亂與服丹石人相宜亦發痼疾肘後方誤吞環若指彄燒鵝羽數枚末飲服之子母秘録小兒鵝口不乳者白鵝矢汁灌口中鶩肪鶩音牧味甘無毒主風虚寒熱白鴨屎名通主殺石藥毒解結縛散蓄熱肉補虚除熱和臟腑利水道陶隱居云鶩即是鴨鴨有家有野又本經云雁肪一名鶩肪其療小異此說則專是家鴨爾黄雌鴨爲補最勝鴨卵不可合鱉魚食之凡鳥自死口不閉者皆不可食食之殺人唐本注云别録云鴨肪主水腫血主解諸毒肉主小兒驚癇頭主水腫通利小便古方療水用鴨頭丸孟詵云白鴨肉補虚消毒熱利水道及小兒熱驚癇頭生瘡腫又和葱豉作汁飲之去卒煩熱又糞主熱毒痢又取和鷄子白封熱腫毒上消又黑鴨消中發冷痢下脚氣不可多食子微寒少食之亦發氣令背膊悶食醫心鏡治十種水病不差垂死青頭鴨一隻治如食法細切和米并五味煮令及熟作粥空腹食之又云主水氣脹滿浮腫小便澀少白鴨一隻去毛腸湯洗饙飯半升以飯薑椒釀鴨腹中縫定如法蒸候熟食之衍義曰鶩肪陶隱居云鶩即是鴨然有家鴨有野鴨陳藏器本草曰尸子云野鴨爲鳧家鴨爲鶩蜀本注云爾雅云野鳧騖注云鴨也如此則鳧鶩皆是鴨也又云本經用鶩肪即家鴨也如此所說各不同其義不定又按唐王勃滕王閣記云落霞與孤鶩齊飛則明知鶩爲野鴨也勃唐之名儒必有所據故知鶩爲野鴨明矣鴣鷓鴣味甘温無毒主嶺南野葛菌毒生金毒及温瘴乆欲死不可差者合毛熬酒漬服之生搗取汁服最良生江南形似母雞鳴云鈎輈格磔者是圖經曰鷓鴣出江南今江西閩廣蜀夔州郡皆有之形似母鷄臆前有白丸點背間有紫色毛彼人亦呼爲越雉又謂之隨陽之鳥南越志云鷓鴣雖東西徊翔然開翅之始必先南翥崔豹古今注云其鳴自呼此不然也其鳴若云鈎輈格磔者是矣亦有一種鳥酷相類但不作此鳴不可食日華子云微毒療蠱氣瘴疾欲死者酒服之禹錫云按孟詵云鷓鴣能補五臟益心力聰明此鳥出南方不可與竹笋同食令人小腹脹自死者不可食一言此鳥大地之神每月取一隻饗至尊所以自死者不可食也衍義曰鷓鴣鄭谷所謂相呼相應湘江闊者南方專充庖然治瘴及菌毒甚效餘悉如經禽部中品雀雀卵味酸温無毒主下氣男子陰痿不起强之令熱多精有子腦主耳聾頭血主雀盲雄雀屎療目痛决癰癤女子帶下溺不利除疝瘕五月取之良圖經曰雀舊不著所出州土今處處有之其肉大温食之益陽冬月者良卵及腦頭血皆入藥雄雀屎冬月收之俗呼爲青丹頭尖者爲雄屎陶隱居云雀性利陰陽故卵亦然術云雀卵和天雄丸服之令莖大不衰人患黄昏間目無所見謂之雀盲其頭血療之雄屎兩頭尖者是也亦療齲齒雀肉不可合李子食之大忌合醬食之妊身人尤忌之陳藏器云雀肉起陽道食之令人有子冬月者良臘月收雀屎俗呼爲青丹主痃癖諸塊伏梁和乾薑桂心艾等爲丸入腹能爛痃癖患癰苦不漬以一枚傅之立效日華子云雀暖無毒壯陽益氣暖腰膝縮小便治血崩帶下糞頭尖及成挺者雄禹錫云按耳聾通用藥云雀腦平齒痛通用藥云雄雀屎温孟詵云其肉七月以後正月以前食之續五臟不足氣助陰道益精髓不可停息糞和天雄乾薑爲丸令陰强腦塗凍瘡食療云卵白和天雄末菟絲子未爲丸空心酒下五丸主男子陰痿不起女子帶下便溺不利除疝瘕决癰腫續五臟氣外臺秘要療齒齲痛有蟲取雄雀糞以綿裹塞齒孔内日一二易之良肘後方療目熱生膚赤白膜取雀屎細直者以人乳和傅目上消爛盡梅師方治諸癰不消已成膿懼針不得破令速决取雀屎塗頭上即易之雄屎佳堅者爲雄簡要濟衆婦人吹奶獨勝散白丁香半兩搗羅爲散每服半錢匕温酒調下無時服廣利方妊娠食雀肉飲酒令子心淫亂又云妊娠食雀肉及豆醬令子面多䵟衍義曰雀肉十月已後正月已前食之此蓋取其陰陽靜定未决飲之義卵亦取第一番者伏冀伏翼味鹹平無毒主目瞑音冥癢痛療淋利水道明目夜視有精光乆服令人喜樂媚好無憂一名蝙蝠生泰山川谷及人家屋間立夏後採陰乾莧實雲實爲之使圖經曰伏翼蝙蝠也出大山川谷及人家屋間立夏後採陰乾用天鼠屎即伏翼屎也出合浦山谷十月十二月取蘇恭引方言伏翼一名仙鼠故知一物又云仙鼠在山孔中食諸乳石精汁皆千歲頭上有冠淳白大如鶉鵲其大如鶉未白者皆已百歲而并倒懸其石乳中此仙經所謂肉芝者也其屎皆白如大鼠屎入藥當用也陶隱居云伏翼目及膽術家用爲洞視法自非白色倒懸者不可服陳藏器云伏冀主蚊子五月五日取倒懸者曬乾和桂薰陸香爲末燒之蚊子去取其血滴目令人不睡夜中見物雷公云凡使要重一斤者方採之每修事先拭去肉上毛去爪腸即留翅并肉脚及嘴然後用酒浸一宿漉出取黄精自然汁塗之炙令乾方用每修事重一斤一個用黃精自然汁五兩爲度李氏本草云即天鼠又云西平山中别一有天鼠十一月十二月取主女人生子餘疾帶下病無子方言一名仙鼠在山孔中食諸乳石精汁皆千歲頭上有冠淳白大如鶉鵲食之令人肥健長年其大如鶉未白者皆已百歲而并倒懸其石孔中屎皆白如大鼠屎下條天鼠屎當用此也其屎灰酒服方寸七主子死腹中其腦主女子面疱服之令人不忘也聖惠方治小兒生十餘月後母又有妊令兒精神不爽身體萎瘁名爲魃病用伏翼燒爲灰細研以粥飲調下半錢日四五服效若炙令香熟嚼之哺兒亦效百一方治久咳嗽上氣十年二十年諸藥治不差方蝙蝠除翅足燒令焦末飲服之鬼遺方治金瘡出血肉瘻蝙蝠二枚燒烟盡末以水調服方寸令一日服盡當下如水血消抱朴子千歲蝙蝠色白如雪集則倒懸蓋腦重也得而陰乾末服令人壽千歲也衍義曰伏翼屎合疳藥白日亦能視但畏鷙鳥不敢出此物善服氣故能壽冬月不食亦可驗矣雉肉雉肉味酸微寒無毒主補中益氣力止泄痢除蟻瘻圖經曰雉本經不載所出州士今南北皆有之多取其充庖厨周禮庖人共六禽雉是其一亦食品之貴然有小毒不宜常食九月以後至十一月以前食之即有補他月則發五痔及諸瘡疥陶隱居云雉雖非辰屬而正是離禽午日不可食者明主於火也唐本注云雉温主諸瘻瘡禹錫云按孟詵云山雞主五臟氣喘不得息者食之發五痔和蕎麥麵食之生肥蟲卵不與葱同食生寸白蟲又野雞久食令人瘦又九月至十一月食之稍有補他月即發五痔及諸瘡疥不與胡桃同食菌子木耳同食發五痔立下血日華子云雉雞平微毒有痼疾人不宜食秋冬益春夏毒食療不與胡桃同食即令人發頭風如在船車内兼發心痛亦不與豉同食自死者食之殺人食醫心鏡主消渴飲水無度小便多口乾渴雉一隻細切和鹽豉作羹食又云主脾胃氣虚下痢日夜不止腸滑不下食野雞一隻如食法細研著橘皮椒葱鹽醬調和作餛飩熟煮空心食之又云治消渴舌焦口乾小便數野雞一隻以五味煮令極熟取二升半已來去肉取汁渴飲之肉亦可食又云治産後下痢腰腹痛野鷄一隻作餛飩食之衍義曰雉其飛若矢一往而墮故今人取其尾置船車上意欲如此快速也漢吕太后名雉高祖字之曰野雞其實即雞屬也食之所損多所益少禽部下品孔雀屎微寒主女子帶下小便不利禹錫云按陳藏器云孔雀味鹹無毒日華子云孔雀凉微毒解藥毒蠱毒血治毒藥等生飲良糞治崩中帶下及可傅惡瘡衍義曰孔雀不可入目昏翳人眼白鶴味鹹平無毒血主益氣力補勞乏去風益肺肫中砂石子摩服治蠱毒邪今鶴有玄有黄有白有蒼取其白者爲良他者次之穆天子傳云天子至巨蒐二氏獻白鶴之血以飲天子注云血益人氣力烏鴉烏鴉平無毒治瘦咳嗽骨蒸勞臘月者瓦缶泥煨燒爲灰飲下治小兒身疼鬼魅目晴注目中通治目也圖經曰烏鴉今人多用而本經不著古方有用其翅羽者葛洪肘後療從高墮下瘀血脹心面青短氣者以烏翅羽七枚得左翅最良燒末酒調服之當吐血便愈近世方家多用烏鴉之全者以治急風其法臘月捕取翅羽嘴足全者泥缶固濟大火燒煅入藥烏犀丸中用之聖惠方治土蜂瘻以鴉頭燒灰細研傅之雄鵲雄鵲肉味甘寒無毒主石淋消結熱可燒作灰以石投中散解者是雄也圖經曰雄鵲舊不著所出州土今在處有之肉主風大小腸澁四肢煩熱胸膈痰結婦人不可食經云燒作灰以石投中散解者是雄也陶隱居云五月五日鵲腦入術家用一名飛駁烏鳥之雌雄難别舊云其翼左覆右是雄右覆左是雌又燒毛作屑納水中沉者是雄浮者是雌今云投石恐止是鵲餘鳥未必爾陳藏器云雄鵲下石淋燒作灰淋取汁飲之石即下禹錫云按日華子云雄鵲凉主消渴疾巢多年者療癲狂鬼魅及蠱毒等燒之仍呼祟物名號亦傅瘻瘡良鸕鷀鸕鷀屎一名蜀水花去面黑䵟黶志頭微寒主鯁及噎燒服之圖經曰鸕鷀屎本經不載所出州土今水鄉皆有之此鳥胎生從口中吐子如兔子類故杜臺卿淮賦云此鳥吐子於八九鵁鵲銜冀而低昂是也産婦臨蓐令執之則易生其屎多在小石上紫色如花就石上刮取用之南人用治小兒疳既乾碾爲末炙猪肉點與噉有奇功陶隱居云溪谷間甚多見之當自取其屎擇用白處市賣不可信骨亦主魚鯁此鳥不卵生口吐其子獨爲一異日華子云冷微毒療面瘢疵及湯火瘡痕和猪脂調傅丁瘡杜臺卿淮賦云鸕鷀吐子於八九鵁鵲銜翼而低昂聖惠方治鼻面酒皶疱用鸕鷀糞二合研以臘月猪脂和每夜傅之孫眞人方治噎欲發時銜此鳥嘴遂下外臺秘要同衍義曰鸕鷀陶隱居云此鳥不卵生口吐其子今人謂之水老鴉巢於大木群集宿處有常乆則木枯以其糞毒也懷妊者不敢食爲其口吐其子陳藏器復云使易産臨時令産婦執之與陶相戾嘗官於澧州公宇後有大木一株其上有三四十巢日夕觀之既能交合兼有卵殻布地其色碧豈得子吐口中是全未考尋可見當日聽人之誤言也啄木鳥平無毒主痔瘻及牙齒疳𧏾蚛牙燒爲末納牙齒孔中不過三數此鳥有大有小有褐有斑褐者是雌斑者是雄穿木食蠧爾雅云鴷斫木荆楚歲時記云野人以五月五日得啄木貨之主齒痛古今異傳云本雷公採藥吏化爲此鳥淮南子云斫木愈齲信哉又有青黑者黑者頭上有紅毛生山中土人呼爲山啄木大如鵲姚大夫治瘻有頭出膿水不止以啄木一隻燒灰酒下二錢七立差深師方治蛀牙有孔竅處以啄木鳥舌尖綿裹於痛處咬之慈鴉味酸鹹平無毒補勞治瘦助氣止欬嗽骨蒸羸弱者和五味淹炙食之良慈鴉似烏而小多群飛作鴉鴉聲者是北土極多不作膻臭也今謂之寒鵲食療云主瘦病欬嗽骨蒸者可和五味淹炙食之良其大鴉不中食肉澁只能治病不宜常食也以目晴汁滴眼中則夜見鬼神又神通目法中亦要用此物又北帝攝鬼籙中亦用慈鴉卵雁肪味甘平無毒主風攣拘急偏枯氣不通利久服長毛髮鬚眉益氣不肌輕身耐老一名鶩肪生江南池澤取無時唐本注云雁喉下白毛療小兒癇有效夫雁爲陽鳥冬則南翔夏則北徂時當春夏則尋育於北豈謂北人不食之乎然雁與燕相反燕來則雁往燕往則雁來故禮云秋鴻雁來春玄鳥至衍義曰雁人之不食者謂其知陰陽之升降分長少之行序世或謂之天厭亦道家之三說爾食之則治諸疾唐本注曰雁爲陽鳥其義未盡兹蓋得中和之氣熱則即北寒則即南以就和氣所以爲社幣者一以取其信二取其和也燕屎味辛平有毒主蠱毒鬼疰逐不祥邪氣破五癃利小便生高山平谷陶隱居云燕有兩種有胡有越紫胸輕小是越燕不入藥用胸斑黑聲大是胡燕俗呼胡燕爲夏候其作窠喜長人言有窠一疋絹者令家富窠亦入藥用與屎同多以作湯浴療小兒驚邪唐本注云别録云胡燕卵王水浮腫肉出痔蟲越燕屎亦療痔殺蟲去目翳天鼠屎味辛寒無毒主面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸去面黑皯一名鼠法一名石肝生合浦山谷十月十二月收惡白蔹白薇唐本注云李氏本草云即伏冀屎也伏翼條中不用屎是此明矣方言名仙鼠伏翼條已論也今按一名夜明砂鷹屎白主傷撻滅瘢藥性論云鷹屎臣微寒有小毒主中惡又頭燒灰和米飲服之衍義曰鷹屎白兼他藥用之作潰虚積藥治小兒奶癖黄鴟頭味鹹平無毒主頭風眩顚倒癇疾鴟尺脂切陶隱居云即俗人呼爲老殦者一名鳶又有雕鴞并相似而大雖不限雌雄恐雄者當勝今鴟頭酒用當微炙不用蠹蟲者鸂䳵味甘平無毒治驚邪食之主短狐可養亦辟之今短狐處多有鸂䳵五色尾有毛如船舵小如鴨臨海異物志曰鸂䳵水鳥食短狐在山澤中無復毒氣也又杜臺卿淮賦云鸂䳵尋邪而逐害是也新補斑鷦味甘平無毒主明目多食其肉益氣助陰陽一名斑鳩范方有斑鳩圓是處有之春分則化爲黄褐候秋分則化爲斑又有青鹪平無毒安五臟助氣虚損排膿治血并一切瘡癤癰瘻又名黄褐侯新補衍義曰斑鹪斑鳩也嘗養之數年并不見春秋分化有有斑者有無斑者有灰色者有小者有大者久病虚損人食之補氣雖有此數色其用即一也練鵲味甘温平無毒益氣治風疾冬春間取細剉炒令香袋盛於酒中浸每朝取酒温服之似鸜鵒小黑褐色食槐子者佳鴝鵒肉味甘平無毒主五痔止血炙食或爲散飲服之唐本注云鳥似雕而有幘者是也禹錫云按日華子云治嗽及吃噫下氣炙食之作妖可通靈眼晴和乳點眼甚明也鸛骨味甘無毒主鬼蠱諸疰毒五尸心腹疾陶隱居云鸛亦有兩種似鵲而巢樹者爲白鸛黑色曲頸者爲烏鸛今宜用白者佳衍義曰鸛頭無丹項無烏帶身如鶴者是兼不善唳但以喙相擊而鳴作池養魚蛇以哺子之事豈可垂後世此禽多在樓殿土作窠日夕人觀之故知其未審耳磐石條中亦著白鴿味鹹平無毒肉主解諸藥毒及人馬久患疥屎主馬疥一云犬疥鳩類也鴿鳩類翔集屋間人患疥食之立愈馬患疥入鬃尾者取屎炒令黄搗爲末和草飼之又云鵓鴿暖無毒調精益氣治惡瘡疥并風瘙解一切藥毒病者食之雖益人縁恐食多减藥力白癜癧瘍風炒酒服傅驢馬瘡疥亦可新補衍義曰白鴿其毛羽色於禽中品第最多其野鴿糞一兩炒微焦麝香别研吴白术各一分赤芍藥青木香各半兩柴胡三分懸胡索一兩炒赤色去薄皮七物同爲末温無灰酒空心調一錢服勞平有毒毛主小兒繼病繼病母有娠乳兒有病如瘧痢他日亦相繼腹大或差或發他人相近亦能相繼北人未識此病懷妊者取毛帶之又取其蹋枝鞭小兒令速語鄭禮注云鵙博勞也楚詞云左見兮鳴鵰言其鳴惡也白澤圖云屋間鬥不祥鶉補五臟益中續氣實筋骨耐寒温消結熱小豆和生薑煮食之止泄痢酥煎偏令人下焦肥與猪肉同食令人生小黑子又不可和菌子食之令人發痔四月已前未堪食是蝦蟆化爲也新補衍義曰鶉有雌雄從卵生何言化也其說甚容易嘗於田野屢得其卵初生謂之羅鶉至初秋謂之早秋中秋已後謂之白唐然此物四名當悉書之小兒患疳及下痢五色旦旦食之有效鶻嘲味鹹平無毒助氣益脾胃主頭風目眩煮炙食之頓盡一枚至驗今江東俚人呼頭風爲瘇頭先從兩項邊筋起直上入頭目眩頭悶者是大都此疾是下俚所患其鳥南北總有似鵲尾短黃色在深林間飛翔不遠北人名鸜爾雅云鳴鳩似鵲鶻鵃似鵲尾短多聲東京賦云鶻嘲春鳴或呼爲骨雕鵜鹕嘴味鹹平無毒主赤白乆痢成疳者燒爲黑末服一方寸七鳥如蒼鵝頤下有皮袋容一二升物展縮由袋中盛水以養魚一名逃河身是水沫惟胸前有兩塊肉如拳云昔爲人竊肉入河化爲此鳥今猶有肉因名逃河詩云維鵜在梁不濡其咮鄭云鵜鴣咮喙也言愛其嘴新補鴛鴦味鹹平小毒肉主諸瘻疥癬病以酒浸炙令熱傅瘡上冷更易食其肉令人患大風食療云其肉主瘻瘡以清酒炙食之則令美麗又主夫婦不和作羹臛私與食即立相憐愛陽烏鸛注陶云陽烏是鸛按二物殊不似陽烏身黑頸長白殊小鸛嘴主惡蟲咬作瘡者燒爲末酒下亦名陽鴉出建州魚狗味鹹平無毒主鯁及魚骨入肉不可出痛甚者燒令黑爲末頓服之煮取汁飲亦佳今之翠鳥是也有大小小者名魚狗大者名翠取其尾爲飾亦有白者俱能水上取魚故曰魚狗爾雅云竭天狗注云小鳥青似翠食魚江東呼爲魚狗穴土爲窠百舌鳥主蟲咬炙食之亦主小兒乆不語又取其窠及糞塗蟲咬處今之鶯一名反舌也布穀脚腦骨令人夫妻相愛五月五日收帶之各一男左女右云置水中自能相隨未試江東呼爲郭公北人云撥穀一名獲穀似鷂長尾爾雅云鳴鳩注云今之布穀也牝牡飛鳴以翼相拂禮記云鳴鳩拂其羽鄭注云飛且羽相擊杜鵑初鳴先聞者主離别學其聲令人吐血於厠溷上聞者不祥厭之法當爲狗聲以應之俗作此說按荆楚歲時記亦云有此言乃復古今相會鳥小似鷂鳴呼不已蜀王本紀云杜宇爲望帝淫其臣鱉靈妻乃亡去蜀人謂之望帝異苑云杜鵑先鳴者則人不敢學其聲有人山行見一群聊學之嘔血便殞楚辭云鶗鴂鳴而草木不芳人云口出血聲始故有嘔血之事也圖經衍義本草卷之三十
