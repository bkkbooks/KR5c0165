  text: 圖經衍義本草卷之三十八嚴五
  hash: sha256:c90b56600bf8471f9cb6005fbc38f1a4876634094e83402c9af7870010a16b0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_038-001a, image: hfl/0549/0549-104.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正米穀部中品豆生大豆味甘平塗癰腫煮汁飲殺鬼毒止痛逐水脹除胃中熱痹傷中淋露下瘀血散五臟結積内寒殺鳥頭毒乆服令人身重炒爲屑味甘主胃中熱去腫除痹消穀止腹脹生太山平澤九月採惡五參龍膽得前胡烏喙杏人牡蠣良圖經曰大豆黄卷及生大豆生太山平澤今處處有之黄卷是以生豆爲蘖待其芽出便曝乾取用方書名黄卷皮今蓐婦藥中用之大豆有黑白二種黑者入藥白者不用其緊小者爲雄豆入藥尤佳豆性本平而修治之便有數等之效煮其汁甚凉可以壓丹石毒及解諸藥毒作腐則寒而動氣炒食則熱投酒主風作豉極冷黄卷及醬皆平牛食之温馬食之凉一體而用别大抵宜作藥使耳殺烏頭毒尤勝仙方修製黄末可以辟穀度饑歲然多食令人體重久則如故矣陳藏器云大豆炒令黑烟未斷及熱投酒中主風痹癰痪口噤産後諸風食罷生服半兩去心胸煩熱熱風恍惚明目鎭心温補久服好顔色變白去風不忘煮食寒下熱氣腫壓丹石煩熱汁解諸藥毒消腫大豆炒食極熱煮食之及作豉極冷黄卷及醬平牛食温馬食冷一體之中用之數變禹錫等按蜀本注云煮食之主温毒水腫日華子云黑豆調中下氣通關脉制金石藥毒治牛馬温毒孟詵云大豆寒和飯搗塗一切毒腫療男女陰腫以綿裹内之主殺諸藥毒謹按煮飲服之去一切毒氣除胃中熱痹腸中淋露下淋血散五臟結積内寒和桑柴灰汁煮之下水鼓腹脹食療云微寒主中風脚弱産後諸疾若和甘草煮湯飲之去一切熱毒氣善治風毒脚氣煮食之主心痛筋攣膝痛脹滿殺烏頭附子毒抱朴内篇云相國張公文蔚莊在東都柏坡莊内有鼠狼穴養四子爲蛇所食鼠狼雄雌情切乃於穴外坋土恰容蛇頭俟其出穴果入所坋處出頭度其回轉不及當腰咬斷而劈蛇腹銜出四子尚有氣置於穴外銜豆葉嚼而傅之皆活千金方治頭項强不得顧視蒸大豆一升令變色内囊中枕之又方從高墜下頭破腦出血中風口噤豆一升熬去腥勿使太熟杵末蒸之氣遍令甑下盆中以酒一升淋之温服一升覆取汗傅膏瘡上又方治身腫浮鳥豆一升水五升煮取三升汁去滓内酒五升更取三升分温三服不差再合服之又方治口喎大豆麵三升炒令焦酒三升淋取汁頓服日一服肘後方治卒風不得語煮豆煎汁如飴含之亦濃煮飲之佳又方從早夜連時不得眠暮以新布火炙以熨目并蒸大豆更翻囊盛枕枕冷後更易熱終夜常枕熱豆即立愈證如前經驗方治小兒大人多年牙齒不生用黑豆三十粒牛糞火内燒令烟盡細研入麝香少許一處研匀先以針挑不生齒處令血出用末少許揩不得見風忌酸鹹物又方治秋夏之交露坐夜久腹中痞如群石在腹方大豆半升生薑八分水二升煎取一升已來頓服差又方治赤痢臍下痛黑豆茱萸子二件搓摩吞咽必宜良食醫心鏡治風毒攻心煩躁恍惚大豆半升淨淘以水二升煮取七合去滓食後服又方治産後風虚五緩六急手足頑痹頭旋眼眩血氣不調大豆一升炒令熱熟投三升酒中密封飲之廣利方治脚氣衝心煩悶亂不識人大豆一升水三升濃煮取汁頓服半升如未定可更服傷寒類要辟温病以新布盛大豆二斗内井中一宿出服七粒佳子母秘録主産後中風困篤或背强口噤或但煩熱苦渴或身頭皆重或身癢極嘔逆直視此皆虚熱中風大豆三升熬令極熟候無聲器盛以酒五升沃之熱投可得二升盡服之温覆令少汗出身潤即愈産後得依常稍服之以防風氣又消結血又方治小兒斑瘡豌豆瘡熟煮大豆取汁服之佳又方治小兒湯火瘡火煮大豆汁塗上易差無斑楊氏産乳療有孕月數未足子死腹中母欲悶絶取大豆三升醋煮濃汁三升頓服立差産書産後猶有餘血水氣者宜服豆淋酒黑豆五升熬之令烟絶出於瓷器中以酒一斗焠之衍義曰生大豆有緑褐黑三種亦有大小兩等其大者出江浙湖南北黑小者生他處今用小者力更佳炒熟以棗肉同擣之爲麩代糧又治産後百病血熱并中風疾痱止痛背强口噤但煩熱瘛瘲若渴身背腫劇嘔逆大豆五升急水淘淨無灰酒一斗熬豆令微温出傾入酒瓶中沃之經一日以上服酒一升取差爲度如素不飲酒即量多少服若口噤即加獨活半斤微微捶破同沃仍增酒一斗二升逐月旋作恐酸壞又可磑爲豆腐食之赤小豆赤小豆味甘酸平無毒主下水排癰腫膿血寒熱熱中消渴止泄利小便吐逆卒澼下脹滿圖經曰赤小豆舊與大豆同條蘇恭分之今江淮間尤多種蒔主水氣脚氣方最急用其法用此豆五合葫一頭生薑一分并碎破商陸根一條切同水煮豆爛湯成適寒温去葫薑細嚼豆空腹食之旋旋啜汁令盡腫立消便止韋宙獨行方療水腫從脚起入腹則殺人亦用赤小豆一斗煮令極爛取汁四五升温漬膝以下若己入腹但服小豆勿雜食亦愈藥性論云赤小豆使味甘能消熱毒癰腫散惡血不盡煩滿治水腫皮肌脹滿搗薄塗癰腫上主小兒急黄爛瘡取汁冷洗之不過三度差能令人美食末與鷄子白調塗熱毒癰腫差陶隱居云大小豆共條猶如葱薤義也以大豆爲蘖芽生便乾之名爲黄卷用之亦熬服食所須煮大豆主温毒水腫殊效復有白大豆不入藥小豆性逐津液久服令人枯燥矣陳藏器云赤小豆和桑根白皮煮食之主濕氣痹腫小豆和通草煮食之當下氣無限名脱氣丸驢食脚輕人食體重日華子云赤豆粉治煩解熱毒排膿補血脉解油衣粘綴甚妙葉食明目禹錫云按蜀本注云病酒熱飲汁即愈食療云和鯉魚爛煮食之甚治脚氣及大腹水腫别有諸治具在魚條中散氣去關節煩熱令人心孔開止小便數緑赤者并可食暴痢後氣滿不能食煮一頓服之即愈孫眞人云赤白豆合魚鮓食之成消渴小豆醬合魚鮓食之成口瘡肘後方辟温病取小豆新布囊盛之置井中三日出舉家服男十枚女二十枚又方治腸痔大便常血小豆一升苦酒五升煮豆熟出乾復内法酒中候酒盡止末酒服方寸七日三度又方産後心悶目不開生赤小豆杵末東流水服方寸七不差再服千金方主産後不能食煩滿方小豆三七枚燒作屑篩冷水頓服之佳梅師方治熱毒下血或因食熱物發動以赤小豆杵末水調下方寸七又方治婦人乳腫不得消小豆莽草等分爲末苦酒和傅之佳食醫心鏡理脚腫滿轉上入腹殺人豆一升水五升煮令極熟去豆適寒温浸脚冷重煖必效方治水穀痢小豆一合和蠟三兩頓服愈又方治卒下血小豆一升搗碎水三升絞汁飲之産寳治難産方赤小豆生吞七枚出若是女二七枚佳修眞秘㫖云理淋方惟赤小豆三合慢火炒熟爲末煨葱一莖細剉煖酒調二錢七服男子女人熱淋血淋并療衍義曰食之行小便久則虚人令人黑瘦枯燥關西河北京東西多食之花治宿酒渴病大豆黄卷味甘平無毒主濕痹筋攣膝痛五臟胃氣結積益氣止毒去黑皯潤澤皮毛圖經曰文具大豆條下唐本注云以大豆爲芽蘖生便乾之名爲黄卷用亦服食食療云卷蘖長五分者破婦人惡血良食醫心鏡理乆風濕痹筋攣膝痛除五臟胃氣結聚益氣止毒去黑痣面䵟潤皮毛宜取大豆黄卷一升熬令香爲末空心煖酒下一匙酒味苦甘辛大熱有毒主行藥勢殺百邪毒氣陶隱居云大寒凝海惟酒不冰明其性熱獨冠群物藥家多須以行其勢人飲之使體弊神昏是其有毒故也昔三人晨行觸露一人健一人病一人死健者飲酒病者食粥死者空腹此酒勢辟惡勝於作食唐本注云酒有葡萄秫黍粳粟麴蜜等作酒醴以麴爲而葡萄蜜等獨不用麴飲葡萄酒能消痰破癖諸酒醇醨不同惟米酒入藥用日華子云酒通血脉厚腸胃除風及下氣禹錫云按陳藏器云酒本功外殺百邪去惡氣通血脉厚腸胃潤皮膚散石氣消憂發怒宣言暢意書曰若作酒醴爾惟麯蘖蘇恭乃廣引葡萄蜜等爲之乃以僞亂眞殊非酒本稱至於入藥更亦不堪凡好酒欲熟皆能候風潮而轉此是合陰陽矣又云甜糟味鹹温無毒主温中冷氣消食殺腥去草菜毒藏物不敗揉物能軟潤皮膚調腑臟三歲已下有酒以物盛之堪磨風瘙止嘔噦及煎魚菜取臘月酒糟以和粥成之食療云紫酒治角弓風薑酒主偏風中惡桑椹酒補五臟明耳目葱豉酒解煩熱補虚勞蜜酒療風疹地黃牛膝虎骨仙靈脾草大豆牛蒡枸杞等皆可和釀作酒在别方葡萄子釀酒益氣調中耐饑强志取藤汁釀酒亦佳狗肉汁釀酒大補外臺秘要治水下或不下則滿溢下之則虚竭虚竭還腹十無一活以桑椹并心皮兩物細剉重煮煎取四斗以釀米四升釀酒一服一升千金方斷酒方以酒七升著瓶中硃砂半兩細研著酒中緊閉塞瓶口安猪圈中任猪揺動經七日頓飲之又方治耳聾酒三升漬牡荆子二升碎之浸七日去滓任性飲盡三十年聾差經驗後方孫眞人催産以鐵器燒赤焠酒吃便令分解廣利方治蛇咬瘡暖酒淋洗瘡上日三易傷寒類要天行病毒攻手足疼痛欲斷作坑令深三尺大小容足燒令中熱以酒灌坑中著屐踞坑上衣壅勿令泄氣衍義曰酒吕氏春秋曰儀狄造酒戰國策曰帝女儀狄造酒進之於禹然本草中已著酒名信非儀狄明矣又讀素問首言以妄爲常以酒爲漿如此則酒自黄帝始非儀狄也古方用酒有醇酒春酒社壇餘胙酒糟下酒白酒清酒好酒美酒葡萄酒秫黍酒粳酒蜜酒有灰酒新熟無灰酒地黄酒今有糯酒煮酒小豆麴酒香藥麴酒鹿頭酒羔兒等酒今江浙湖南北又以糯米粉入衆藥和合爲麴曰餅子酒至於官務亦用四夷酒更别中國不可取以爲法今醫家所用酒正宜斟酌但飲家惟取其味不顧入藥如何爾然乆之未見不作疾者蓋此物損益兼行可不謹歟粟米味鹹微寒無毒主養腎氣去胃脾中熱益氣陳者味苦主胃熱消渴利小便圖經曰文具青粱米條下陶隱居云江東所種及西間皆是其粒細於粱米熟舂令白亦以當白粱呼爲白粱粟陳者謂經三五年者或呼爲粢諸米以作粉尤解煩悶服食家亦將食之唐本注云粟類多種而并細於諸粱北土常食與粱有别陶云當白粱又云或呼爲粢粢則是稷稷乃穄之異名也甘米泔汁主霍亂卒熱心煩渴飲數升立差臭泔止消渴尤良米麥麫味甘苦寒無毒主寒中除熱渴解煩消石氣蒸米麥熬磨作之一名糗也穄音祭陳藏器云粉解諸毒主卒得鬼打水攪服之亦主熱腹痛鼻衂并水煮服之粳粟總堪爲粉粟强浸米至敗者損人又云泔主霍亂新研米清水和瀘取汁服亦主轉筋入腹胃冷者不宜多食酸泔洗皮膚瘡疥服主五野鷄病及消渴下澱酸者殺蟲及惡瘡和臭樗皮煎服主疳痢樗皮一名武目樹千金方治反胃食即吐搗粟米作粉和水丸如梧子大七枚爛煮内醋中細吞之得下便已麫亦得用之食醫心鏡主脾胃氣弱食不消化嘔逆反胃湯飲不下粟米半升杵如水和丸如梧子煮令熟點少鹽空心和汁吞下姚和衆方兒初生七日助穀神以導達腸胃研粟米煮粥飲厚薄如乳每日研與半粟殻産寳方粢米粉熬令黑以雞子白和如泥以塗帛上貼之帛作穴以泄癰毒氣易之效衍義口粟米利小便故益脾胃秫米味甘微寒止寒熱利大腸療漆瘡圖經曰文具丹黍米條下陶隱居云此人以作酒及煮糖者肥軟易消方藥不正用惟嚼以塗漆及釀諸藥醪唐本注云此米功用是稻秫也今大都呼粟糯爲秫稻秫爲糯矣北土亦多以粟秫釀酒而汁少於黍米粟秫應有别功但本草不載凡黍稷粟秫粳糯此三穀之籼秫也籼音仙日華子云無毒犬咬凍瘡并嚼傅禹錫云按顔師古刊謬正俗云今之所謂秫者似黍米而粒小者耳亦堪作酒孟詵云秫米其性平能殺瘡疥毒熱擁五臟氣動風不可常食北人往往有種者代米作酒耳又生擣和鷄子白傅毒腫良根煮作湯洗風又米一石麴三斗和地黄一斤茵陳蒿一斤炙令黄一依釀酒法服之治筋骨攣痹聖惠方治食鴨肉成病胸滿面赤不下食用秫米汁服一中盞肘後方治妊娠忽下黄水如膠或如小豆汁秫米黄耆各一兩細剉以水七升煎取三升服食醫心鏡主寒熱利大腸治漆瘡秫米飯食之良衍義曰秫米初搗出淡黄白色經乆色如糯用作酒者是此米亦不堪爲飯最黏故宜酒粳米味甘苦無毒主益氣止煩止泄圖經曰文具稻米條下陶隱居云此即人常所食米但有白赤小大異族四五種猶同一類也前陳廪米亦是此種以廪軍人故曰廪爾唐本注云傳稱食廪爲禄廪倉也前陳倉米曰廪字誤作廪即廪軍米也若廪軍新米亦爲陳米日華子云補中壯筋骨補腸胃禹錫云按蜀本云斷下痢和胃氣長肌肉温中孟詵云粳米平主益氣止煩泄其赤則粒大而香不禁水停其黄緑即實中又水漬有味益人都大新熟者動氣經再年者亦發病江南貯倉人皆多收火稻其火稻宜人温中益氣補下元燒之去芒舂宿米食之即不發病耳外臺秘要蛟龍子生在芹菜上食之入腹變成龍子須愼之餳粳米杏人乳餅煮粥食之三升日三服吐出蛟龍子有兩頭開皇二年賈橋有人吐出蛟龍大驗無所忌肘後方若遇荒年穀貴無可以充糧應須藥濟命者粳米十斗酒三升漬之出暴之又漬酒正出稍食之渴飲之辟三十日足一斛三升辟周年又方小兒新生三日應開腸胃助穀神碎米濃作汁飲如乳酪與兒大豆許數含飲之頻與三豆許三七日可與哺愼不得取次與雜藥紅雪少少得也千金方倉米無毒衍義曰粳米白晚米爲第一早熟米不及也平和五臟補益胃氣其功莫逮然稍生則復不益脾過熟則佳梁米青粱米味甘微寒無毒主胃痹熱中消渴止泄痢利小便益氣補中輕身長年陶隱居云凡云粱米皆是粟類惟其芽頭色異爲分别爾青粱出北今江東少有氾勝之書云粱是秫粟今俗用則不爾汜音泛唐本注云青粱殻穗有毛粒靑米亦微靑而細於黄白粱也穀粒似青稞而少粗夏月食之極爲清凉但以味短色惡不如黄白粱故人少種之此穀早熟而收少也作餳清白勝餘米日華子云健脾治泄精醋拌百蒸百暴可作乾糧禹錫云按孟詵云靑粱米以純苦酒十斗漬之三日出百蒸百暴好裹藏之遠行一餐十日不饑重餐四百九十日不饑又方以米一升赤石脂三斤合以水漬之令足相淹置於暖處二三日上靑白衣擣爲九如李大日服三丸不饑謹按靈寳五符經中白鮮米九蒸九暴作辟穀糧此文用靑粱米未見有别出處其米微寒常作飯食之澀於黄白米體性相似食醫心鏡主胃痹熱中除渴止痢小便益氣力補中輕身長年以粱米炊飯食之衍義曰靑黄白粱米此三種食之不及黄粱靑白二種性皆微凉黃粱性甘平豈非得土之中和氣多邪今黃白二種西洛間農家多種爲飯尤佳餘用則不相宜然其粒尖小於他穀收實少故能種者亦稀白色者味淡黍米味甘温無毒主益氣補中多熱令人煩陶隱居云荆南州及江北皆種此其苗如蘆而異於粟粒亦大粟而多是秫今人又呼秫粟爲黍非也北人作黍飯方藥釀黍米酒則皆用秫黍也又有穄米與黍米相似而粒殊大食不宜人言發宿病唐本注云黍有數種已備注前條今此通論丹黑黍米爾亦不似蘆雖似粟而非粟也穄即稷也具釋後條禹錫云按孟詵云黍米性寒患鱉瘕者以新熟赤黍米淘取泔汁生服一升不過三兩度愈謹按性寒有少毒不堪久服昬五臟令人好睡仙家重此作酒最勝餘糧又燒爲灰和油塗杖瘡不作瘢止痛不得與小兒食之令不能行若與小猫犬食之其脚便蝸曲行不正緩人筋骨絶血脉食療云合葵菜食之成痼疾於黍米中藏乾脯通食禁云牛肉不得和黍米白酒食之生寸白蟲千金方治人六畜天行時氣病豌豆瘡方濃煮黍穰汁洗之一莖是穄穰則不差瘡若黑者杵蒜封之亦可煮乾芸苔洗之肘後方食苦瓠中毒煮黍稷汁解之飲數升止又云治湯火所灼未成瘡黍米女麴等分各熬令焦杵下以雞子白傅之丹黍米丹黍米味苦微温無毒主咳逆霍亂止泄除熱止煩渴陶隱居云此即赤黍米也亦出北間江東時有種而非土所宜多入神藥用又黑黍名秬供釀酒祭祀用之禹錫云按爾雅云秬黑黍秠一稃二米釋曰按詩生民篇云誕降嘉種維秬維秠李巡云黑黍一名秬黍即黑黍之大名也秠是黑黍米一秤有二米者别名爲秠若然秬秠皆黑黍矣而春官鬯人注云釀秬爲酒秬如黑黍一秠二米言如者以黑黍一米者多秬爲正二米則秬中之異故言如以明秬有二等則一米者亦可爲汁又云秠即皮其秤亦皮也秠秤古今語之異耳漢和帝時任城縣生黑黍或三四實實二米得黍三斛八斗是也日華子云赤黍米温下氣止咳嗽除煩止渴退熱不可合蜜并葵同食傷寒類要傷寒後男子陰易米三兩煮薄飲酒和飲之發汗出愈隨人加减衍義曰丹黍米黍皮赤其米黄惟可爲糜不堪爲飯黏著難解然亦動風白粱米味甘微寒無毒主除熱益氣陶隱居云今處處有襄陽竹根者最佳所以夏月作粟食亦以除熱千金方主霍亂不吐白粱粉米五合水一升和之頓服如粥食肘後方手足忽發疣取粱粉鐵鐺熬令赤以塗之以衆人唾和塗上厚一寸即消黄粱米味甘平無毒主益氣和中止泄陶隱居云黄粱出靑冀州此間不見有爾唐本注云黄粱出蜀漢兩浙間亦種之穗大毛長穀米俱粗於白粱而收子少不耐水旱食之香美逾於諸粱人號爲竹根黄外臺秘要小兒面上生瘡如火燒以一升末蜜水和傅之差爲度又方治霍亂煩躁以黄粱米粉半升水一升半和絞如白飲頓服糯米亦得肘後方治霍亂吐下後大渴多飲則殺人黃粱米五升水一斗煮取三升清澄稍稍飲之食醫心鏡主益氣和中止泄痢去當風卧濕遇冷所中等病以作飲食之兵部手集治孩兒赤丹不止上翻用黄米粉鷄子白和傅糵米味苦無毒主寒中下氣除熱陶隱居云此是以米爲蘖非别米名也米甘米脂和傅面亦使皮膚悦澤爲熱不及麥蘖禹錫云按日華子云糵米温能除煩消宿食開胃又名黄子可作米醋衍義曰蘖米此則粟糵也今穀神散中用之性又温於大麥蘖小麥小麥味甘微寒無毒主除熱止躁渴咽乾利小便養肝氣止漏血唾血以作麴温消穀止痢以作麫温不能消熱止煩陶隱居云小麥合湯皆完用之熱家療也作麫則温明穬麥亦當如此今服食家啖麫不及大穬麥猶勝於米爾陳藏器云麩味甘寒無毒和麫作餅止泄痢調中去熱健人蒸熱袋盛熨人馬冷失腰脚和醋蒸抱所傷折處止痛散血人作麫第三磨者凉爲近麩也小麥皮寒肉熱又云麥苗味辛寒無毒主酒疸目黄消酒毒暴熱麥苗上黑微名麥奴主熱煩解丹石天行熱毒又云麫味甘温補虚實人膚體厚腸胃强氣力性擁熱小動風氣又云女麫一名䴷子按䴷子與黄蒸不殊黄蒸温補消諸生物北人以小麥南人以粳米皆六七月作之蘇又云磨破之謂當完作之亦呼爲黄衣塵緑者佳外臺秘要方治痢色白不消者爲末下方好麫炒右一味擣篩煮米粥内麫方寸七又云此療法百行師不救者千金方治黃疸取小麥苗杵絞取汁飲六七合晝夜三四飲之三四日便愈經驗方治鼻衂以冷水調麫漿服之立差兵部手集治嘔噦麫醋和作彈丸二三十個以沸湯煮别盛漿水二斗已來彈丸湯内漉出於漿中看外熱氣稍减乘熱吞三兩個噦定即止吞餘者加至七八丸尚未定晚後飯前再作吞衍義曰小麥暴淋煎湯飲爲麫作糊入藥水調治人中暑馬病肺卒熱亦以水調灌愈生嚼成筋可以黏禽蟲大麥味鹹温微寒無毒主消渴除熱益氣調中又云令人多熱爲五穀長蜜爲之使陶隱居云今稞麥一名麰麥似穬麥惟皮薄爾麰音牟唐本注云大麥出關中即靑稞麥是形似小麥而大皮厚故謂大麥殊不似穬麥也大麥麫平胃止渴消食療脹禹錫云按藥性論云大麥糵使味甘無毒能消化宿食破冷氣去心腹脹滿陳士良云大麥補虚劣壯血脉益顔色實五臟思穀食乆食令人肥白滑肌膚爲麫勝如麥無躁熱又云蘖微暖乆食消腎不可多食聖惠方治妊娠欲去胎以麥糵二兩水一盞半煎至一盞分温三服兵部手集方治産後秘結膨脹不通轉氣急坐卧不安供奉輔太初與崔家方以麥蘖末一合和酒服食良久通轉崔郞中云神效衍義曰大麥性平凉有人患纏喉風食不能下將此麫作稀糊令嚥之既滑膩容易下嚥以助胃氣三伏中朝廷作麫以賜臣下作蘖造餳麴味甘大暖療臟腑中風氣調中下氣開胃消宿食主霍亂心膈氣痰逆除煩破癥結及補虚去冷氣除腸胃中塞不下食令人有顔色六月作者良陳乆者入藥用之當炒令香六畜食米脹欲死者煮麴汁灌之立消落胎并下鬼胎又神麴使無毒能化水穀宿食癥氣健脾暖胃千金方治産後運絶麴末水服方寸七不差更服即差又方治小腹堅大如盤胸中滿能食而不消麴末服方寸七日三肘後方治赤白痢下水穀食不消以麴熬粟米粥服方寸七日四五止又方妊娠卒胎動不安成腰痛胎轉搶心下血不止生麴半餅碎末水和絞取汁服三升蕎麥味甘平寒無毒實腸胃益氣力久食動風令人頭眩和猪肉食之患熱風脱人眉鬚雖動諸病猶挫丹石能煉五臟滓穢續精神作飯與丹石人食之良其飯法可蒸使氣餾於烈日中暴令口開使舂取人作飯葉作茄食之下氣利耳目多食即微泄燒其穰作灰淋洗六畜瘡并驢馬躁蹄新補見陳藏器孟詵蕭炳陳士良日華子圖經曰文具附小麥條下丹房玉鏡源蕎麥灰煮粉霜兵部手集方治小兒油丹赤腫蕎麥麫醋和傅之良藊豆藊豆味甘微温主和中下氣豆葉主霍亂吐下不止藊音扁藥性論云白藊豆亦可單用王解一切草毒生嚼及煎湯服取效陶隱居云人家種之於籬援其莢蒸食甚美無正用取其豆者葉乃單行用之患寒熱病者不可食也日華子云平無毒補五臟葉傅蛇蟲咬禹錫云按孟詵云藊豆療霍亂吐痢不止末和醋服之下氣又吐痢後轉筋生擣葉七把以少酢浸汁服之立差其豆如緑豆餅食亦可衍義曰藊豆有黑白鵲三等皆於豆脊方白路白者治霍亂轉筋豉味苦寒無毒主傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虚勞喘吸兩脚疼冷又殺六畜胎子諸毒圖經曰文具附大豆黄卷條下陶隱居云豉食中之常用春夏天氣不和蒸炒以酒漬服之至佳依康伯法先以醋酒搜蒸暴燥以麻油和又蒸暴之凡三過乃末椒乾薑屑合和以進食勝今作油豉也患脚人常將其酒浸以滓傅脚皆差好者出襄陽錢溏香美而濃取中心者彌善陳藏器云蒲州豉味鹹無毒主解煩熱熱毒寒熱虚勞調中發汗通關節殺腥氣傷寒鼻塞作法與諸豉不同其味烈陜州有豉汁經年不敗大除煩熱入藥并不如今之豉心爲無鹽故也日華子云治中毒藥蠱氣瘧疾骨蒸并治犬咬孟詵云豉能治乆盜汗患者以一升微炒令香清酒三升漬滿三日取汁冷暖任人服之不差須作三兩劑即止聖惠方治口舌生瘡胸膈疼痛用焦豉細末含一宿便差外臺秘要方治蟲刺螫人方好豉心以足爲限但覺刺即熟嚼豉以傅之少頃見豉中毛即差不見又嚼傅之晝夜勿絶見毛爲度千金方治酒病豉葱白各半升水二升煮取一升頓服又方治被毆傷瘀血聚腹滿豉一升水三升煮三沸分服不差再服肘後方中緩風四肢不收者豉三升水九升煮取三升分爲三服日二作亦可酒漬飲之葛氏方治重下此即赤白痢也熬豉令小焦杵服一合日三無比又豉熬令焦水一升淋取汁冷服冷則酒淋曰三服有效梅師方傷寒汗出不解已三四日胸中悶吐方豉一升鹽一合水四升煎升半分三服當吐食醫心鏡方主風毒脚膝攣急骨節痛豉心五升九蒸九暴以酒一斗取浸經宿空心隨性緩飲之菉豆味甘寒無毒主丹毒煩熱風𤺋藥石發動熱氣奔豚生研絞汁服亦煮食消腫下氣壓熱解石用之勿去皮令人小壅當是皮寒肉平圓小緑者佳又有稙豆苗子相似主霍亂吐下取葉搗絞汁和少醋温服子亦下氣也稙音陟日華子云緑豆冷益氣除熱毒風厚腸胃作枕明目治頭風頭痛禹錫云按孟詵云緑豆平諸食法作餅炙食之佳謹按補益和五臟安精神行十二經脉此最爲良今人食皆撻去皮即有少擁氣若愈病須和皮故不可去又研汁煮飲服之治消渴又去浮風益氣力潤皮肉可長食之雷公云益氣明目治頭風舂杵頭細糠主卒噎陶隱居云食卒噎不下刮取含之即去亦是舂搗義爾天下事理多有相影響如此也自草部今移聖惠方治膈氣咽喉噎塞飲食不下用碓觜上細糠蜜丸如彈子大非時含一丸咽津穬麥味甘微寒無毒主輕身除熱乆服令人多力健行以作糵温消食和中陶隱居云此是今馬所食者性乃熱而云微寒恐是作屑與合殻異也服食家并食大穬二麥令人輕健唐本注云穬麥性寒陶云性熱非也復云作屑與合殻異此皆江東少有故斟酌言白豆平無毒補五臟益中助十二經脉調中暖腸胃葉利五臟下氣嫩者可作菜食生食之亦佳可常食新補見孟詵及日華子孫眞人食忌白豆味鹹腎之穀腎病宜食煞鬼氣圖經衍義本草卷之三十八
