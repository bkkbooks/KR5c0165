body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部上品之下芎藭宋康軍鳳阿府芎藭味辛温無毒主中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子除腦中冷動面上遊風去來目泪出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛温中内寒一名胡藭一名香果其葉名蘼蕪生武功川谷斜谷西嶺三月四月採根暴乾白芷爲之使畏黄連圖經云蘼蕪芎藭苗也生雍州川澤及冤句今關陜蜀川江東山中多有之而以蜀川者爲勝江東蜀川人採其葉作飲香關中出者俗呼爲京芎并通用雀腦狀者謂之雀腦芎此最有力也山芎藭能去痹濕風氣簡文帝勸醫文曰麥麯芎藭終止河魚之腹藥性論云芎藭臣能治腰脚軟弱半身不遂主胞衣不生治腹内冷痛陶隱居云今惟出歷陽節大莖細狀如馬銜謂之馬銜芎藭蜀中亦有而細人患齒根血出者含之多差苗名蘼蕪亦入藥别在下說俗方多用唐本注云今出秦州其人間種者形塊大重實多脂潤山中採者瘦細味苦辛以九月十月採爲佳歷陽出者今不復用日華子云治一切風一切氣一切勞損一切血補五勞壯筋骨調衆脉破癥結宿血養新血長肉鼻洪吐血及溺血痔瘻腦癰發背瘰癧癭贅瘡疥及排膿消瘀血禹錫云按蜀本圖經云苗似芹胡荽蛇床輩叢生花白今出秦州者爲善九月採根乃佳千金方治崩中晝夜不止芎藭八兩清酒五升煎取二升半分三服不耐者徐徐進之又方治胎忽因倒地忽舉動擎重促損腹中不安及子死腹中以芎藭末酒服方寸匙須臾一二服出經驗後方治頭風化痰川芎不計分兩用淨水洗浸薄切片子日乾或焙杵爲末煉蜜爲丸如彈子大不拘時茶酒嚼下一丸靈苑方治婦人經絡住經三個月驗胎法川芎生爲末空心濃煎艾湯下一匙頭腹内微動者是有胎也斗門方治偏頭痛用京芎細剉酒浸服之差衍義曰芎藭今出川中大塊其裏色白不油色嚼之微辛甘者佳他種不入藥止可爲末煎湯沐浴此藥今人所用最多頭面風不可闕也然須以他藥佐之沈括云予一族子舊服芎藭醫鄭叔熊見之云芎藭不可乆服多令人暴死後族子果無疾而卒又朝士張子通之妻病腦風服芎藭甚乆亦一日暴亡皆目見者此蓋單服耳若單服既乆則走散其氣既使他藥佐使又不久服中病便已則致使能至此也黄連黄連味苦寒微寒無毒主熱氣目痛眦傷此出明目腸澼腹痛下痢婦人陰中腫痛五臟冷熱乆下泄澼膿血止煩渴大驚除水利骨調胃厚腸益膽療口瘡乆服令人不忘一名王連生巫陽川谷及蜀郡太山二月八月採黄芩龍骨理石爲之使惡菊花芫花玄參白鮮畏款冬勝烏頭解巴豆毒圖經云今江湖荆夔州郡亦有而以宣城者爲勝施黔者次之苗高一尺已來葉似甘菊四月開花黄色六月結實似芹子色亦黄二月八月採根用古方以黃連爲治痢之最胡洽方載九盞湯主下痢不問冷熱赤白穀滯休息久下悉主之以黄連長三寸三十枚秤重一兩半龍骨如棋子四枚重四分附子大者一枚乾薑一兩半膠一兩半并切先以水五合著銅器中去火三寸煎沸便下著生土上沸止又上水五合如此九上九下内諸藥著火上沸輒下著土上沸止又復九上九下度可得一升頓服即止又香蓮丸亦主下痢近世盛行其法以宣蓮青木香分兩停同搗篩白蜜丸如梧子空腹飲下三十丸日再如神其久冷人即用煨熱大蒜作丸此方本出李絳兵部手集方嬰孺用之亦效又治目方用黄連多矣藥性論云黄蓮臣一名支蓮耳白薑蠶忌猪肉惡冷水殺小兒疳蟲點赤眼昏痛鎭肝去熱毒陶隱居云巫陽在建服今而間者色淺而虚不及東陽新安諸縣最勝臨海諸縣者不佳用之當布裹挼去毛令如連珠俗方多療下痢及渴道方服食長生唐本注云蜀道者粗大節平味極濃苦療渇爲最江東者節如連珠療痢大善今澧州者更勝今注醫家見用宣州九節堅重相擊有聲者爲勝劉禹錫云有崔承元者囚官治一死罪囚出活之囚後數年以病自致死一旦崔爲内障所苦喪明逾年後半夜嘆息獨坐時聞階際間蟋蟀之聲崔問爲誰曰是昔所蒙活者囚今故報恩至此遂以此方告訖而没崔依此合服不數月眼復明因傳此方於世羊肝丸黃連末一大兩白羊子肝一具去膜同於沙盆内研令極細衆手撚爲丸如梧桐子每食以暖漿水吞二七枚連作五劑差但是諸眼目疾及障翳青盲皆主之禁食猪肉及冷水抱朴子云乳汁煎之治目中百病外臺秘要治卒心痛黄連八兩一味㕮咀水七升煮取五升絞去滓寒温飲五合日三服千金方治大熱毒純血痢宣蓮六兩以水七升煮取三升半夜露星月下平旦空腹頓服之肘後方治眼泪出不止濃汁漬綿乾拭目又方赤痢熱下久不止黄連末鷄子白丸飲服十丸三十丸即差又方治卒消渴小便多搗黄連絹篩蜜和服三十丸治渴延年經驗方治暴赤白痢如鵝鴨肝者痛不可忍黄連黃芩各一兩以水二升煎取一升分三服熱吃冷即凝矣梅師方傷寒病發豌豆瘡未成膿方黄連四兩水三升煎取一升去滓分服斗門方治痔疾有頭如鷄冠者用黃連末傅之即差更加赤小豆末尤良簡要濟衆方小兒吐血不止以一兩去鬚搗碎爲散每服一錢水七分入豉二十粒同煎至五分去滓温服量兒大小加减進廣利方治骨節熱積漸黄瘦黃連四分碎切以童子小便用大合浸經宿微煎三四沸去滓食上分兩服如人行四五里再服杜壬方治氣痢瀉裏急後重神妙方宣連一兩乾薑半兩各爲末每用連二錢姜半錢和匀空心温酒下子母秘録方小兒赤白痢多時體弱不堪宣連濃煎和蜜服日六七服量其大小每煎三分水减二分頓服又方治兒耳後月蝕瘡黃連末傅之又方小兒鼻下兩道赤者名曰𧏾亦名赤鼻疳鼻以米泔洗傅黄連末日三四度佳衍義曰黄連今人多用治痢蓋熱以苦燥之義下俚但見腸虚滲泄微似有血便即用之更不知止又不顧寒熱多少但以盡劑爲度由是多致危困若氣實初病熱多血痢服之便血乃不必盡劑也或虚而冷則不須服餘如經蒺藜子同州秦州蒺藜子味苦辛温微寒無毒主惡血破癥結積聚喉痹乳難身體風癢頭痛咳逆傷肺肺痿止煩下氣小兒頭瘡癰腫陰㿉可作摩粉其葉主風癢可煮以浴乆服長肌肉明目輕身一名旁道一名屈人一名止行一名豺羽一名升推一名即藜一名茨生馮翊平澤或道傍七月八月採實暴乾烏頭爲之使圖經曰蒺藜子生馮翊平澤或道傍七月八月採實暴乾又冬采黄白色類軍家鐵蒺藜此詩謂墻有茨者郭璞注爾雅云布地蔓生細葉子有三角刺人是也古方云蒺藜子皆用刺者治風明目最良神仙方亦有單餌蒺藜云不問黑白但取堅實者舂去刺用兼主痔漏及婦人發乳帶下藥性論云白蒺藜子君味甘有小毒治諸風癧瘍破宿血療吐膿主難産去躁熱不入湯用陶隱居云多生道上而葉布地子有刺狀如菱而小長安最饒人行多著木屐今軍家乃鑄鐵作之以布敵路亦呼蒺藜易云據於蒺藜言其凶傷今按别本注云本經云温别録云寒此藥性宣通乆服不冷而無壅熱則其温也日華子云治賁豚腎氣肺氣胸膈滿催生并墮胎益精療腫毒及水藏冷小便多止遺瀝泄精溺血入藥不計丸散并炒去刺用雷公云凡使採得後淨揀擇了蒸從午至酉出日乾於木臼中舂令皮上刺盡用酒拌再蒸從午至酉出日乾用神仙秘㫖云服蒺藜子一碩當七八月熟時收日乾舂去刺然後杵爲末每服二錢新汲水調下日三服勿令中絶斷穀長生服之一年已後冬不寒夏不熱服之二年老者復少髮白復黑齒落重生服之三年身輕長生外臺秘要方補肝散治三十年失明蒺藜子七月七日收陰乾搗散食後水服方寸七又方治蛔蟲攻心如刺吐清汁七月七日採蒺藜子陰乾作灰先食服方寸七日三服又方治一切丁腫蒺藜子一升作灰以釅醋和封頭上如破塗之佳千金方治遍身風癢生瘡疥以蒺藜子苗煮湯洗之立差千金翼方同梅師方治難産礙胎在腹中如已見兒并胞衣不出胎死蒺藜子貝母各四兩爲末米湯下一匙相去四五里不下再服衍義曰蒺藜有兩等一等杜蒺藜即今之道傍布地而生或生墻上有小黄花結芒刺此正是墻有茨者花收摘陰乾爲未每服三二錢飯後以温酒調服治白癜風又一種白蒺藜出同州沙苑牧馬處黄紫花作莢結子如羊内腎補腎藥今人多用風家惟用刺蒺藜黄耆黄耆味甘微温無毒主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虚小兒百病婦人子藏風邪氣逐五臟間惡血補丈夫虚損五勞羸瘦止渴腹痛泄痢益氣利陰氣生白水者冷補其莖葉療渴及筋攣癰腫疽瘡一名戴糝一名戴椹一名獨椹一名芰草一名蜀脂一名百本生蜀郡山谷白水漢中二月十月採陰乾惡龜甲圖經云今河東陜西州郡多有之根長二三寸已來獨莖作叢生枝幹去地二三寸其葉扶疏作羊齒狀又如蒺藜苗七月中開黄紫花其實作莢子長寸許八月中採根用其皮折之如綿謂之綿黄耆木耆不通用唐許裔言初仕陳爲新蔡王外兵參軍時太后感風不能言脉沉而口噤裔宗曰既不能下藥宜湯氣熏之藥入腠理周時可差乃造黄耆防風湯數斛置於床下氣如烟霧其夕便得語藥力熏蒸其效如此因附著之使善醫者知所取法焉藥性論云黃耆一名王孫治發背内補主虚喘腎衰耳聾療寒熱生隴西者下補五臟蜀白水赤皮者微寒此治客熱用之陶隱居云第一出隴西叨陽色黄白甜美今亦難得唐本注云葉似羊齒或如蒺藜獨莖或作叢生今出原州及華原者最良蜀漢不復採用日華子云黄耆惡白鮮皮助氣壯筋骨長肉補血破癥癖瘰癧癭贅腸風血崩帶下赤白痢産前後一切病月候不匀消渴痰嗽并治頭風熱毒赤目等藥中補益呼爲羊肉又云白水耆凉無毒排膿治血及煩悶熱毒骨蒸勞功次黄耆赤水耆凉無毒治血退熱毒餘功用并同上木耆凉無毒治煩排膿力微於黃耆遇關即焙乾之别說云謹按黄耆本出綿上爲良故名綿黄耆今圖經所繪憲水者即綿上地相鄰爾若以謂柔韌如綿即謂之綿黄耆然黄耆本皆柔韌若僞者但以乾脆爲别爾聖惠方治肺壅得吐以黄耆二兩杵爲細末每服三錢水一盞煎至六分温服日三四服梅師方補肺排膿以黄耆六兩剉碎以水三升煎取一升去滓服孫用和方治腸風瀉血黄耆黄連等分右爲末麵糊丸如緑豆大每服三十丸米飲下席延賞方治虚中有熱咳嗽膿血口舌咽乾又不可服凉藥好黃耆四兩甘草一兩爲末每服三錢如茶點羹粥中亦可服肉蓯蓉肉蓯蓉味甘酸鹹微温無毒主五勞七傷補中除莖中寒熱痛養五臟强陰益精氣多子婦人癥瘕除膀胱邪氣腰痛止痢乆服輕身生河西山谷及代郡雁門五月五日採陰乾圖經曰舊說是野馬遺山落地所生今西人云大木門及土正垣中多生此非遊牡之所而乃有者則知自有種類耳或疑其初生於馬瀝後乃滋殖如茜根生於人血之類是也草蓯蓉性温補男子疑即是此物今人鮮用故少有辨之者因附見於此藥性論云肉蓯蓉臣益髓悦顔色延年治女人血崩壯陽日御過倍大補益主赤白下補精敗面黑勞傷用蓯蓉四兩水煮令爛薄切細研精羊肉分爲四度五味以米煮粥空心服之陶隱居云代郡雁門屬并州多馬處便有言是野馬精落地所生生時似肉以作羊肉羹補虚乏極佳亦可生啖芮芮河南間至多今第一出隴西形扁廣柔潤多花而味甘次出北國者形短而少花巴東建平間亦有而不如也以陳藏器序云强筋健髓蓯蓉鮮魚爲末黄精酒丸服之力可十倍此說出乾寧記唐本注云此注論草蓯蓉陶未見肉者今人所用亦草蓯蓉刮去花用代肉爾本經有肉蓯蓉功力殊勝比來醫人時有用者日華子云治男陽不興女陰不産潤五臟長肌肉暖腰膝男子泄精尿血遺瀝帶下陰痛雷公云凡使先須用清酒浸一宿至明以棕刷刷去沙土浮甲盡劈破中心去白膜一重如竹絲草樣是此偏隔人心前氣不散令人上氣不出凡使用先須酒浸并刷草了却蒸從午至酉出又用酥炙得所禹錫云按蜀本圖經云出肅州禄福縣沙中三月四月掘根切取中央好者三四寸編穿陰乾八月始好皮如松子鱗甲根長尺餘據本草云即是野馬精餘瀝結成採訪人方知勃落樹下并土壍上此即非馬交之處陶說誤耳又有花蓯蓉即是春抽苗者力較微耳衍義曰肉蓯蓉圖經以謂皮如松子有鱗子字當爲殻於義爲允又曰以酒淨洗去黑汁作羹黑汁既去氣味皆盡然嫩者方可作羹老者苦入藥少則不效防風河中府齊州同州防風味甘辛温無毒主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩懣脅痛脅風頭面去來四肢攣急字乳金瘡内莖乆服輕身葉主中風熱汗出一名銅芸一名茴草一名百枝一名屏風一名簡根一名百蜚生沙苑川澤及邯鄲琅邪上蔡二月十月採根暴乾得澤瀉藁本療風得當歸芍藥陽起石禹餘糧療婦人子藏風殺附子毒惡乾薑藜蘆白斂芫花圖經云今京東淮浙州郡皆有之根上黄色與蜀葵根相類莖葉俱青緑色莖深而葉淡似青蒿而短小初時嫩紫作菜茹極爽口五月開細白花中心攢聚作大房似時蘿花實似胡荽而大二月十月採根暴乾關中生者三月六月採然輕虚不及齊州者良又有石防風出河中府根如蒿根而黄葉青花白五月開花六月採根暴乾亦療頭風眩痛藥性論云防風臣花主心腹痛四肢拘急行履不得經脉虚羸主骨節間疼痛段成式酉陽雜俎云青州防風子可亂蓽撥陶隱居云郡縣無名沙苑今第一出彭城蘭陵即近琅玡者爵州互市亦得之次出襄陽義陽縣界亦可用即近上蔡者惟實而脂潤頭節堅如蚯蚓頭者爲好俗用療風最要道方時用唐本注云今出齊州龍山最善淄州兖州青州者亦佳葉似牡蒿附子苗等别録云叉頭者令人發狂叉尾者發痼疾陶云無沙苑誤矣襄陽義陽上蔡元無防風陶乃妄注爾日華子云治三十六般風男子一切勞劣補中益神風赤眼止泪及癱緩通利五臟關脉五勞七傷羸損盜汗心煩體重能安神定思匀氣脉經驗後方治破傷風防風天南星等分爲末每服二三匙童子小便五升煎至四升服愈即止又方治崩中防風去蘆頭炙赤色爲末每服二錢以麵糊酒調下更以麫糊酒投之蒲黃蒲黃味甘平無毒主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙生河東池澤四月採圖經曰蒲黄生河東池澤香蒲蒲黄苗也生南海池澤今處處有之而太山者爲良春初生嫩葉未出水時紅白色茸茸然至夏抽梗於叢葉中花抱梗端如武士棒杵故俚俗謂蒲捶亦謂之蒲釐花黄即花中蕊屑也細若金粉當其欲開時有便取之市廛間亦採以蜜搜作果食貨賣甚益小兒醫家又取其粉下篩後有赤滓謂之蒲萼入藥以澀腸止泄殊勝陶隱居云此即蒲釐花上黄粉也伺其有便拂取之甚療血仙經亦用此日華子云蒲黄治撲損血悶排膿瘡癤婦人帶下月候不匀血氣心腹痛妊孕人下血墜胎血運血癥兒枕急痛小便不通腸風瀉血遊風腫毒鼻洪吐血下乳止泄精血痢此即是蒲上黃花入藥破血消腫即生使補血止血即炒用蒲黄篩下後有赤滓名爲萼炒用甚澁腸止瀉血血痢雷公云凡使勿用松黃并黄蒿其二件全似只是味跙及吐人凡欲使蒲黄須隔三重紙焙令色黄蒸半日却焙令乾用之妙禹錫云按藥性論云蒲黃君通經脉止女子崩中不住主痢血止鼻衄治尿血利水道千金方治臉上舌上生瘡涎出以蒲黄傅之差又方治丈夫陰下濕癢蒲黄末傅之良肘後方治腸痔每大便常血水服蒲黄方寸匕日三服良葛氏方忍小便久致胞轉以蒲黄裹腰腎令頭致地三度通梅師方治産後血不下蒲黄三兩水三升煎取一升頓服簡要濟衆方治吐血唾血蒲黄一兩搗爲散每服三錢温酒或冷水調妙塞上方治鼠奶痔蒲黄末空心温酒下方寸七日三服又方治墜傷撲損瘀血在内煩悶蒲黄末空心熱酒調下三錢七服催生蒲黄地龍陳橘皮等分地龍洗去土於新瓦上焙令微黄各爲末三處貼如經日不産各炒一錢匕新汲水調服立産此常親用之甚妙衍義曰蒲黃處處有即蒲槌中黄粉也今京師謂槌爲蒲棒初得細羅取萼别貯以備他用將蒲黄水調爲膏擘爲塊人多食之以解心臟虚熱小兒尤嗜涉月則燥色味皆淡須蜜水和然不可多食令人自利不益極虚人香蒲徐州香蒲味甘平無毒主五臟心下邪氣口中爛臭堅齒明目聰耳乆服輕身耐老一名睢一名醮生南海池澤圖經曰文具蒲黄條下陶隱居云方藥不復用俗人無採彼土人亦不復識者江南貢菁茅一名香茅以供宗廟縮酒或云是薰草又云是燕麥此蒲亦相類爾唐本注云此即甘蒲作薦者春初生用白爲菹亦堪蒸食山南名此蒲爲香蒲謂昌蒲爲臭蒲陶隱菁茅乃三脊茅也其鷰麥薰草香茅野俗皆識都不爲類此并非例也蒲黄即此香蒲花是也續斷晉州越州續斷味苦辛微温無毒主傷寒補不足金瘡癰傷折跌續筋骨婦人乳難崩中漏血金瘡血内漏止痛生肌肉及踠傷惡血腰痛關節緩急乆服益氣力一名龍豆一名屬折一名接骨一名南草一名槐生常山山谷七月八採陰乾地黄爲之使惡雷丸圖經曰續斷生常山山谷今陜西河中興元有寄越晋州亦有之三月已後生苗幹四棱似苧麻葉亦類之兩兩相對而生四月開花紅白顔色似益母花根如大薊赤黄色七月八月採市之貨者亦有數種少能辨其粗良醫人用之但以節節斷皮黄皺者爲眞藥性論云續斷君主絶傷去諸温毒能通宣經脉陶隱居云按桐君藥録云續斷生蔓延葉細莖如荏大根本黄白有汁七月八月採根今皆用莖葉節節斷皮黄皺狀如鷄神者又呼爲桑上寄生恐皆非眞唐本注云此藥所在山谷皆有今俗用者是葉似苧而莖方根如大薊黄白色陶注者非日華子云助氣調血脉補五勞七傷破癥結瘀血消腫毒腸風痔瘻乳癰瘰癧撲損婦人産前後一切病面黄虚腫縮小便止泄精尿血胎漏子宫冷又名大薊山牛蒡也雷公云凡使勿用草茅根縁眞似續斷若誤用服之令人筋軟採得後橫切剉之又去向裏硬筋了用酒浸一伏時焙乾用外臺秘要方治淋取生續斷絞取汁服之馬薊根是子母秘録方治産後心悶手足煩熱厭厭氣欲絶血暈心頭硬乍寒乍熱增寒忍不禁續斷皮握剉以水三升煎取一升分三服温服如人行二三里再服無所忌此藥救産後垂死漏蘆單州秦州海州漏蘆味苦鹹寒大寒無毒主皮膚熱惡瘡疽痔濕痹下乳汁止遺溺熱氣瘡癢如麻豆可作浴湯乆服輕身益氣耳目聰明不老延年一名野蘭生喬山山谷八月採根陰乾圖經曰秦州海州所謂漏蘆者花葉及根頗相近然彼人但謂之漏蘆今醫家罕有用飛廉者既未的識故不復分别但附其說於下陶隱居云喬山應是黄帝所葬處乃在上郡今出近道亦有療諸瘻疥此久服甚益人而服食方罕用之今市人皆取苗用之俗中取根名鹿驪根苦酒摩以療瘡疥唐本注云此藥俗名莢蒿莖葉似白蒿花黄生莢長以細麻如箸許有四五瓣七月八月後皆黑異於衆草蒿之類也日華子云連翹爲使治小兒壯熱通小腸泄精尿血風赤眼乳癰發背瘰癧腸風排膿補血治撲損續筋骨傅金瘡止血長肉通經脉花苗并同用俗呼爲鬼油麻形并氣味似乾牛蒡頭上有白花子雷公云凡使勿用獨漏緑似漏蘆只是味苦酸誤服令人吐不止須細驗夫使漏蘆細剉拌生甘草相對從已至申去甘草淨揀用禹錫云按蜀本圖經云葉似角蒿今曹兖州下濕地最多六月七月採莖日乾之黑於衆草聖惠方治小兒無辜疳肚脹或時瀉痢冷熱不調以漏蘆一兩杵爲散每服以猪肝一兩散子一錢七鹽少許以水煮熟空心頓服外臺秘要方治蛔蟲漏蘆杵以餅羅和方寸七服之藍實福州馬監江陵府吳監藍實味苦寒無毒主解諸毒殺蟲蚑音其小兒鬼也疰鬼螫毒乆服頭不白輕身其葉汁殺百藥毒解狼毒射罔毒其莖葉可以染青生河内平澤圖經曰藍實生河内平澤今處處有之人家蔬圃中作畦種蒔三月四月生苗高三二尺許葉似水蓼花紅白色實亦若蓼子而大黑色五月六月採實按藍有數種有木藍出嶺南不入藥有草藍可以爲澱者亦名馬藍爾雅所謂葴馬藍是也有蓼藍但可染碧而不堪作澱即醫方所用也禹錫云治蟲豸傷咬取大藍汁一碗入雄黄麝香二物隨意看多少細研投藍汁中以點咬處若是毒者即并細服其汁神異之極也張薦云昔在劍南爲張延賞判官忽被斑蜘蛛咬項上一宿咬處有三道赤色細如箸繞項上從胸前下至心經兩宿頭面腫疼如數升碗大肚漸腫幾至不救張相素重薦因出家財五百千并薦家財又數百千募能療者忽一人應召云可治張相初甚不信欲驗其方遂令目前合藥其人云不惜方當療人性命耳遂取大藍汁一瓷盌取蜘蛛投之藍汁良乆方出得汁中甚困不能動又别搗藍汁加麝香末更取踟蛛投之至汁而死又更取藍汁麝香復加雄黄和之更取一蜘蛛投汁中隨化爲水張相及諸人甚異之遂令點於咬處兩日内悉平愈但咬處作小瘡痂落如舊廣五行記曰永徽中絳州僧病噎不下食告弟子吾死之後便可開吾胸喉視有何物致終而卒弟子依言而開視胸中得一物形似魚而有兩頭遍體是肉鱗弟子致器中跳躍不止致以諸味皆隨化盡時夏中藍盛作澱有一僧以澱致器中此蟲遂繞器中走須臾化爲水矣聖惠方治時氣熱毒心神煩躁用藍澱半大匙以新汲水一盞服又方治小兒中蠱下血欲死搗青藍汁頻頻服半合千金方治唇上生瘡連年不瘥以八月藍葉一斤搗取汁洗不過三日差又方治自經死以藍汁灌之又極須安定其心徐緩解愼勿割斷繩抱取心下猶温者刺鷄冠血滴著口中即活也男雌女用雄梅師方治虎傷人瘡取青布緊捲作纏燒一頭内竹筒中射瘡口令烟熏入瘡中佳子母秘録方治小兒赤痢搗青藍汁二升分四服又方治小兒丹藍澱傅熱即安衍義曰藍實即大藍實也謂之蓼藍非是爾雅所說是解諸藥等毒不可闕也實與葉兩用注不解實只解藍葉爲未盡經所說盡矣藍一本而有數色刮竹青緑雲碧青藍黄豈非青出於藍而青於藍者也生葉汁解藥毒即大葉藍又非蓼藍也蓼藍即堪挼汁染翠碧花成長穗細小淺紅色絡石絡石味苦温微寒無毒主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫不通水漿不下大驚入腹除邪氣養腎主腰髖痛堅筋骨利關節久服輕身明目潤澤好顔色不老延年通神一名石鯪一名石蹉一名略石一名明石一名領石一名懸石生太山川谷或石山之陰或高山岩石上或生人間正月採杜仲牡丹爲之使惡鐵落畏貝母菖蒲圖經曰絡石生太山川谷或石山之陰或高山岩上或生人間今在處有之宫寺及人家亭圃山石間種以爲飾葉圓如細橘正青冬夏不凋其莖蔓延莖節著處即生根鬚包絡石以此得名又云薛荔治背癰晟頃寓宜興縣張渚鎭有一老舉人聚村學年七十餘忽一日患發背村中無他醫藥急取薛荔葉爛研汁和蜜飲數升以其滓傅瘡上後以他藥傅貼遂愈醫者云其本蓋得薛荔之力乃知圖經所載不妄陶隱居云不識此藥仙俗方法都無用者或云是石類既云或生人間則非石猶如石斛等繫石以爲名爾陳藏器云絡石煮汁服之主一切風變白宜老在石者良在木者隨木有功生山之陰與薛荔相似更有木蓮石血地錦等十餘種藤并是其類大略皆主風血暖腰脚變白不衰若呼石血爲絡石殊誤爾石血葉尖一頭赤絡石葉圓正青地錦味甘温無毒主破老血産後血結婦人瘦損不能飲食腹中有塊淋瀝不盡赤白帶下天行心悶并煎服之唐本注云此物生陰濕乾處冬夏常青實黑而圓其莖蔓延繞樹石側若在石間者葉細厚而圓短繞樹生者葉大而薄以其包絡石木而生故名絡石雷公云凡採得後用粗布拭葉上莖蔓上毛了用熟甘草水浸一伏時出切日乾任用外臺秘要方治喉痹咽喉寒喘息不通須臾欲絶神驗以絡石草二兩水一升煎取三大盞去滓細細吃須臾即通蘼蕪味辛温無毒主咳逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神主身中老風頭中乆風風眩一名薇蕪一名茳蘺芎藭苗也生雍州川澤及冤句四月五月採葉暴乾圖經曰蘼蕪說文已具芎藭條下陶隱居云今出歷陽處處亦有人家多種之葉似蛇床而香騷人借以爲譬方藥用甚稀唐本注云此有二種一種似芹葉一種似蛇床香氣相似用亦不殊爾禹錫云按爾雅云蘄苣蘼蕪注香草葉小如萎狀疏引郭云如萎蔫之狀廣志曰蘼蕪香草魏武帝以藏衣中郭璞贊曰蘼蕪香草亂之蛇床不隕其貴自烈以芳營實味酸温微寒無毒主癰疽惡瘡結肉跌筋敗瘡熱氣陰蝕不瘳利關節乆服輕身益氣根止泄痢腹痛五臟客熱除邪逆氣疽癰諸惡瘡金瘡傷撻生肉復肌一名薔薇一名墻麻一名牛棘一名牛勒一名薔蘼一名山棘生零陵川谷及蜀郡八月九月採陰乾藥性論云薔薇使味苦子治頭瘡白秃使五臟客熱陶隱居云營實即是薔薇子以白花者爲良根亦可煮釀酒莖葉亦可煮作飲日華子云白薔薇根味苦澀冷無毒治熱毒風癰疽惡瘡牙齒痛治邪氣通血經止赤白痢腸風瀉血惡瘡疥癬小兒疳風肚痛野白者用良雷公云今薔薇也凡採得去根并用麤布拭黄毛了用刀於槐砧上細剉用漿水拌令濕蒸一宿至明出日乾用禹錫云按蜀本圖經云即薔薇也葛洪治金方用薔薇灰末一方寸七日三服之外臺秘要方治鯁及刺不出薔薇根末水服方寸七日三服千金方治癰腫發背及癰癤已潰爛疼痛薔薇殻更炙熨之即愈又方治小兒疳痢行數暴多生薔薇根洗淨切以適多少濃煎汁稍稍飲之差肘後方治口瘡以根避風打去土煮濃汁温含冷易聖惠方同圖經衍義本草卷之十
