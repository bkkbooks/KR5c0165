front:
  text: 圖經衍義本草卷之二十六曰一
  hash: sha256:3d0cbbd23122fa43f313d426ea1352a80b8397e57d11e42a031d9551b2d188b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_SJB_026-170612a, image: sjb/17/170612a.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正人部髮髲音被髮髲味苦温小寒無毒主五癃關格不通利小便水道療小兒癇大人痓仍自還神化合雞子黄煎之消爲水療小兒驚熱陶隱居云李云是童男髮神化之事未見别方今俗中嫗母爲小兒作雞子煎用髮雜熬良久得汁與小兒服去痰熱治百病而用髮皆取其父梳頭亂者爾不知此髮髮審是何物且髲字書記所無或作蒜音人今呼斑髮爲蒜髮書家亦呼亂髮爲鬈恐髲即舜音也童男之理未或全明唐本注云此髮髲根也年久者用之神效即髮字誤矣既有亂髮及頭垢則闕髲明矣又頭垢功劣於髮髲猶去病用陳久者梳及船茹敗天翁蒲席皆此例甄立言作𩮀亦髮也字書無髮字但有髮鬈鬈髮美貌作丘權音有聲無質則髲爲眞者也禹錫云按蜀本云本經云仍自還神化李云神化之事未見别方按異苑云人髮變爲鱔魚神化之異應此者也日華子云髮温止血悶血運金瘡傷風血痢入藥燒灰勿令絶過煎膏長肉消瘀血也陳藏器云生人髮挂果樹上烏鳥不敢來食其實又人逃走取此髮於緯車上却轉之則迷亂不知所適矣衍義曰髮髲與亂髮自是兩等髮髲味苦即陳舊經年歲者如橘皮皆橘也而取其陳者狼毒麻黄吴茱萸半夏枳實之類皆須陳者謂之六陳入藥更良敗蒲亦然此用髮之義耳今人又謂之頭髮其亂髮條中自無用髲之義此二義甚明亦不必如此過謂搜索亂髮微温主咳嗽五淋大小便不通小兒驚癇止血鼻衂燒之吹内立已陶隱居云此常人頭髮爾與髮髲療體相似唐本注云亂髮灰療轉胞小便不通赤白痢哽噎鼻衄癰腫狐尿剌尸疰丁腫骨疽雜瘡禹錫云按藥性論云亂髮使味苦能消瘀血關格不通利水道外臺秘要治霍亂煩躁燒亂髮如鷄子大鹽湯三升和服之不吐再服經驗方孩子熱瘡亂髮一團梨許大鷄子黄煮熟二物相和於銚子内炭火上熬初甚乾少頃髮焦遂有液出旋取置一瓷盞中以液盡爲度取此液傅熱瘡上即以苦參粉粉之梅師方治鼻衂出血眩冒欲死燒亂髮細研水服方寸七須更吹鼻中差簡要濟衆方治小兒重舌欲死以亂髮灰細研以半錢傅舌下日不住用之蘇學士云亂髮露蜂房蛇蜕皮各燒灰存性每味取一錢匕酒調服治瘡口久不合神驗老唐云收自己亂髮洗淨乾每一兩入椒五十粒泥封固入爐大火一煅如黑糟細研酒服一錢七髭髮長黑衍義文具髮髮條下人乳汁主補五臟令人肥白悅澤陶隱居云張蒼常服人乳故年百歲餘肥白如瓠唐本注云别録云首生男乳療目赤痛多淚解馬肝牛肉毒合豉濃汁服之神效又取和雀屎去目赤胬肉日華子云人乳冷益氣治瘦悴悅皮膚潤毛髮點眼止淚并療赤目使之明潤也衍義曰人乳汁治目之功多何也人心生血肝藏血肝受血則能視蓋水入於經則其血乃成又曰上則爲乳汁下則爲月水故知乳汁則血也用以點目豈有不相宜者血爲陰故其性冷臟寒人如乳餅酪之類不可多食雖曰牛羊乳然亦不出乎陰陽造化爾西戎更以駝馬乳爲酥酪老人患口瘡不能食飲人熱乳甚良聖惠方治卒中風不語舌根强硬陳醬五合三年者妙人乳汁五合二件相和研以生布絞取汁不計時候少少與服良乆當語金匱方啖蛇牛肉殺人何以知之啖蛇毛髮向後順者是也食之欲死飲人乳汁一升立可頭垢主淋閉不通陶隱居云術云頭垢浮針以肥膩故爾今當用悦澤人者其垢可丸又主噎亦治勞復禹錫云按藥性論云頭垢治噎酸漿水煎膏用之立愈日華子云温治中蠱毒及蕈毒米飲或酒化下并得以吐爲度外臺秘要傷寒病欲令不勞復頭垢燒水丸如梧桐子大飲服一丸千金方治百邪鬼魅水服頭垢一小豆大故膩頭巾無毒天行勞復渇浸取汁煖服一升又方主食自死鳥獸肝中毒取故頭巾垢一錢七熱湯中烊服之三年頭𢄼主卒心痛沸湯取汁飲以頭𢄼於閑處椀覆之同時開愈頭𢄼即縛髻帛也人牙齒平除勞治瘧蠱毒氣入藥燒用齒垽温和黑虱研塗出箭頭并惡剌破癰腫葛稚川治乳癰取人牙齒燒灰細研酥調貼癰上李世績治箭頭不出及惡剌以齒垽和鶴虱研傅之人屎寒主療時行大熱狂走解諸毒宜用絶乾者擣末沸湯沃服之東向圊厠溺坑中青泥療喉痹消癰腫若已有膿即潰陶隱居云交廣俚人用焦銅爲箭鏃射人傷皮便死惟飲屎汁即差而射猪狗不死以其食糞故也時行大熱飲屎汁亦差今近城寺别塞空罌口内糞倉中乆年得汁甚黑而苦名爲黄龍湯治温病垂死皆差唐本注云人屎主諸毒卒惡熱黄悶欲死者新者最效須與水和服之其乾者燒之烟絶水漬飲汁名破棺湯主傷寒熱毒水漬飲彌善破丁腫開以新者封之一日根爛禹錫云按日華子云糞清冷臘月截淡竹去青皮浸滲取汁治天行熱狂熱疾中毒并惡瘡蕈毒取汁服浸皂角甘蔗治天行熱疾外臺秘要治骨蒸熱非其人莫浪傳取屎乾者燒令外黑内水中澄清每旦服一小升薄色小便服一小升以差爲度既常服新作大坑燒二升夜以水三升漬之稍稍减服小便用童子者斗門方治熱病及時疾心躁狂亂奔走狀似癲癇言語不定久不得汗及時疾不知人事者以人中黄不以多少入大罐内以泥固濟大火燬半日去火候冷取出於地上以盆蓋之又半日許細研如麫新汲水調下三錢或未退再作差姚氏方毒箭有三種交廣夷俚用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著筒中漬箭鏃此二種纔傷皮便鬨膿沸爛而死若中之便飲屎汁并以傅之亦可療惟此最妙又一種用射菵以塗箭鏃人中之亦困若著實處不死近腹亦宜急治今葛氏方是射菵者耳傷寒類要治天行病六七日熱盛心煩狂見鬼者絞人屎汁飲數合衍義曰人屎用乾陳者爲末於陰地淨黄土中作五六寸小坑將末三兩匙於坑中以新汲水調匀良乆侯澄清與時行大熱狂渇須水人飲之差今世俗謂之地清然飲之勿極意恐過多耳又治一切癰癤熱毒腫膿血未潰疼痛不任用乾末麝香各半錢同研細抄一豆大津唾貼瘡心醋麫錢子貼定膿潰出去藥人溺療寒熱頭疼温氣童男者尤良陶隱居云若人初得頭痛直飲尿數升亦多差合葱豉作湯彌佳唐本注云尿主卒血攻心被打内有瘀血煎服之一服一升又主癥積滿腹諸藥不差者服之皆下血片塊二十日即出也亦主久嗽上氣失聲尿坑中竹木主小兒齒不生正旦刮塗之生陳藏器云尿寒主明目益聲潤肌膚利大腸推陳致新去咳嗽肺痿鬼氣痙病彌久停臭者佳恐冷當以熱物和温服乆臭溺浸蜘蛛咬於瓮中坐浸仍取烏鷄屎炒浸酒服不爾恐毒入内日華子云小便凉止勞渴嗽潤心肺治血悶熱狂撲損瘀血運絶及困乏揩灑皮膚治皸裂能潤澤人蛇犬等咬以熱尿淋患處難産及胞衣不下即取一升用薑葱各一分煎三兩沸乘熱飲便下吐血鼻洪和生薑一分絞汁并壯健丈夫小便一升乘熱頓飲差楊氏産乳療傷胎血結心腹痛取童子小便日服二升差衍義曰人溺須童男者産後温一杯飲壓下敗血惡物有飲過七日者過多恐乆遠血臟寒令人發滯病人亦不覺氣血虚無熱者尤不宜多服此亦性寒故治虚勞方中同婦人月水解毒箭并女勞復新補見陶隱居陳藏器云經衣主金瘡血涌出取衣熱炙熨之又燒末傅虎狼傷瘡燒末酒服方寸七日三主箭鏃入腹梅師方治丈夫熱病差後交接復發忽卵縮入腸腸中絞痛欲死燒女人月經赤衣爲灰熟水調方寸七服孫眞人方治霍亂困篤取童女月經衣和血燒灰和酒服方寸七扁鵲云治陰陽易傷寒燒婦人月經衣熟水服方寸七天靈蓋味鹹平無毒主傳尸尸疰鬼氣伏連久瘴勞瘧寒熱無時者此死人頂骨十字解者燒令黑細研白飲和服亦合諸藥爲散用之方家婉其名陳藏器云彌腐爛者入用有一片如三指闊此骨是天生天賜蓋謂一身之骨未合即未有只有囟門取得後用煻灰火罨一夜待腥穢氣出盡却用童兒溺於瓮鍋子中煑一伏時滿漉出於屋中掘一坑可深一尺置天靈蓋於中伏時其藥魂歸神妙陽人使陰陰人使陽外臺秘要治犬咬衆治不差毒攻人煩亂唤已作犬聲者燒灰爲末以水服方寸七以活别說云謹按天靈蓋神農本經人部惟髮髲一物外餘皆出後世醫家或禁術之流奇怪之論殊非人之用心世稱孫思邈有大功於世以殺命治命尚有陰責况於是也近數見醫家用以治傳尸病未有一效者言本經不用未爲害也殘忍傷神又不急於取效苟有可易仁者宜盡心焉苟不以是說爲然决爲庸人之所惑亂設云非此不可是不得已則宜以年深塵泥所漬朽者爲良人髭唐李勣嘗疾醫診之云得鬚灰服之方止太宗遂自剪髭燒灰賜服之復令傅癰瘡立愈故白樂天云剪鬚燒藥賜功臣仁宗皇帝賜吕夷簡古人有語髭可治疾今朕剪髭與之合藥表朕意人血主羸病人皮肉乾枯身上麩片起又狂犬咬寒熱欲發者并刺熱血飲之人肉治瘵疾人膽主鬼氣尸疰伏連圖經衍義本草卷之二十六
