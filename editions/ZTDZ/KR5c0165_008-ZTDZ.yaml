front:
  text: 圖經衍義本草卷之八父一
  hash: sha256:8d07380409863be6976ae1f450820dbe18c29eb618cf79b20046d8b8611aadf9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_SJB_008-170351c, image: sjb/17/170351c.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部上品之上牛膝牛膝爲君味苦酸平無毒主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎療傷中少氣男子陰消老人失溺補中續絶填骨髓除腦中痛及腰脊痛婦人月水不通血結益精利陰氣止髮白乆服輕身耐老一名百倍生河内川谷及臨朐二月八月採根陰乾惡螢火陸英龜甲畏白前圖經曰今江淮閩粤關中亦有之然不及懷州者爲眞春生苗莖高二三尺青紫色有節如鶴膝又如牛膝狀以此名之唐崔元亮海上方治瘧用水煮牛膝根未發前服今福州人單用土牛膝根淨洗切焙乾搗下篩酒煎温服云治婦人血塊立效陶隱居云今出近道蔡州者最長大柔潤其莖有節似牛膝故以爲名也乃云有雌雄雄者莖紫色而節大爲勝爾日華子云懷州者長白近道蘇州者色紫外臺秘要治乆勞瘧不斷者牛膝一握切以水六升煮取二升分二服未發前服臨發又服聖惠方治氣濕痹腰膝痛用牛膝葉一斤切米三合於豉汁中相和煮作粥和鹽醬空心食千金方治婦人小便澀痛牛膝五兩酒三升煮取一升半去滓分作三服肘後方口舌生瘡牛膝酒漬含漱之又方治小便不利莖中痛欲死兼治婦人血結堅痛牛膝一大把并葉不以多少酒煮飲之立愈又治卒暴癥腹中有如石刺經驗後方治消渴不止下元虚損牛膝五兩細剉爲末生地黄汁五升浸晝暴夜浸汁盡爲度蜜丸如梧桐子大空心温酒下三十丸乆服壯筋骨駐顔色黑髮津液自生梅師方治胞衣不出牛膝八兩葵子一兩以水九升煎取三升分三服孫眞人食忌云治牙齒疼痛燒牛膝根灰致牙齒間又方治卒得惡瘡人不識者以牛膝根搗傅之衍義曰今西京作畦種有長三尺者最佳與蓯蓉浸酒服益腎竹木刺入肉嚼爛罨之即出柴胡淄州夀州江寧府柴胡爲君味苦平微寒無毒主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣大腸停積水脹及濕痹拘攣亦可作浴湯乆服輕身明目益精一名地薰一名山菜一名茹草葉一名芸蒿辛香可食生洪農川谷及冤句二月八月採根暴乾半夏爲之使惡皂莢畏女菀藜蘆圖經曰柴胡生洪農山谷及冤句今關陜江湖間近道皆有之以銀州者爲勝二月生苗甚香莖青紫葉似竹葉稍緊亦有似斜蒿亦有似麥門冬而短者七月開黄花生丹州結青子與他處者不類根赤色似前胡而强蘆頭有赤毛如鼠尾獨窠長者好藥性論云柴胡能治熱勞骨節煩痛熱氣肩背疼痛宣暢血氣勞乏羸瘦主下氣消食主時疾内外熱不解單煮服食陶隱居云博物志云芸蒿葉似邪蒿春秋有白蒻長四五寸香美可食長安及河内并有之此柴胡療傷寒第一用孫尚藥方治黄疸柴胡一兩去苗甘草一分右都細剉作一劑以水一碗白茅根一握同煎至七分絞去滓任意時時服一日盡衍義曰柴胡本經并無一字治勞方中鮮有不用者嗚呼凡此誤世甚多嘗原病勞有一種眞臟虚損復受邪熱邪因虚而致勞故曰勞者牢也當須斟的用之如經驗方中治勞熱青蒿煎丸用柴胡正合宜耳服之無不效熱去即須急已若或無熱得此愈甚雖至死人亦不怨目擊甚多麥門冬隨州陸州麥門冬爲君味甘平微寒無毒主心腹結氣腸中傷飽胃絡脉絶羸瘦短氣身重目黄心下支滿虚勞客熱口乾燥渴止嘔吐愈痿蹶强陰益精消穀調中保神定肺氣安五臟令人肥健美顔色有子久服輕身不老不饑秦名羊韭齊名愛韭楚名馬韭越名羊蓍一名禹葭一名禹餘糧葉如韭冬夏長生生函谷川谷及堤坂肥土石間久廢處二月三月八月十月採陰乾地黃車前爲之使惡款冬苦瓠畏苦參青蘘圖經曰崔元亮海上方治消渴丸云偶於野人處得神驗不可言藥性論云麥門冬使惡苦芺畏木耳能治熱毒止煩渴主大水面目支節浮腫下水治肺痿吐膿主泄精療心腹結氣身黑目黄心下苦支滿虚勞客熱日華子云治五勞七傷安魂定魄止渴肥人時疾熱狂頭痛止嗽陶隱居云函谷即秦關而麥門冬異於羊韭之名矣處處有以四月採冬月作實如青珠根似穬麥故謂麥門冬以肥大者爲好用之湯澤抽去心不爾令人煩陳藏器云本經方家自有分别出江寧小潤出新安大白其大者苗如鹿葱小者如韭葉大小有三四種功用相似其子圓碧乆服輕身明目和車前子乾地黃爲丸食後服之去温瘴變白明目夜中見光衍義曰麥門冬根上子也治心肺虚熱并虚勞客熱亦可取苗作熟水飲獨活文州寧化軍羌潔鳳翔府獨活味苦甘平微温無毒主風寒所擊金瘡止痛賁豚癇痓女子疝瘦療諸賊風百節痛風無久新者久服輕身耐老一名羌活一名羌青一名護羌使者一名胡王使者一名獨揺草此草得風不揺無風自揺動生雍州川谷或隴西南安二月八月採根暴乾豚實爲之使圖經曰獨活羌活出雍州川谷或隴西南安今用蜀漢出者佳春生苗葉如青麻六月開花作叢或黄或紫結實時葉黃者是夾石上生葉青者是土脉中生本經云二物同一類今人以紫色而節密者爲羌活黄色而作塊者爲獨活藥性論云羌活君味苦辛無毒能治賊風失音不語多癢血癩手足不遂口面喎邪遍身𤸷痹陶隱居云羌活形細而多節軟潤氣息極猛烈出益州北部西川爲獨活色微白形虚大爲用亦相似而小不如其一莖直上不爲風摇故名獨活至易蛀宜密器藏之唐本注云療風宜用獨活兼水宜用羌活日華子云羌活治一切風并氣筋骨拳攣四肢羸劣頭旋明目赤目疼及伏梁水氣五勞七傷虚損冷氣骨節酸疼通利五臟獨活即是羌活母類也千金方治中風通身冷口噤不知人獨活四兩好酒一升煎取半升分温再服必效方治産後腹中絞刺疼痛羌活二兩酒二升煎取一升去滓爲二服小品方治産後風虚獨活湯主之又白癬皮湯主之亦可與獨活合白癬皮各三兩水三升煮取一升半分三服又方治産後中風語澀四肢拘急羌活三兩爲末每服五錢水酒各半盞煎去滓温服文潞公云治牙齒風上攻腫痛獨活地黄各三兩末每服三錢水一盞煎温服升麻漢州滁州升麻味甘苦平微寒無毒主解百毒殺百精老物殃鬼辟温疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡乆服不夭輕身長年一名周麻生益州山谷二月八月採根日乾圖經曰今蜀漢陜西淮南州郡皆有之以蜀川者爲勝春生苗高三尺以來葉似麻葉并青色四月五月著花似粟穗白色六月以後結實黑色根紫如蒿根多鬚今醫家以治咽喉腫痛口舌生瘡解傷寒頭痛凡腫毒之屬細剉一兩水一升煎煉取濃汁服之入口即止止毒氣蜀人多用之藥性論云蜀升麻主治小兒風驚癇時氣熱疾能治口齒風𧏾腫疼牙根浮爛惡臭熱毒膿血除心肺風毒熱壅閉不通口瘡煩悶療癰腫豌豆瘡水煎綿沾拭瘡上主百邪鬼魅陶隱居云舊出寧州者第一形細而黑極堅實頃無復有今惟出益州好者細削皮青緑色謂之鷄骨升麻北部間亦有形又虚大黄色建平間亦有形狀味薄不堪用雷公云採得了刀刮上面粗皮熏了用黄精自然汁浸一宿出暴乾細剉蒸了暴乾用之日華子云安魂定魄并鬼附啼泣遊風腫毒口氣疳𧏾又名落新婦聖惠方治小兒斑瘡及豆瘡心躁眠卧不安用川升麻一味不計多少細剉水一盞煎去滓取汁以綿沾汁洗拭瘡瘢上千金翼方治産後惡血不盡或經月半歲升麻三兩清酒五升煮取二升半分温再服梅師方治時行病發瘡升麻五兩以水和蜜二味同煎三沸半服半傅瘡姚和衆方小兒尿血蜀升麻五分水五合煎取一合去滓一歲兒一日服盡肘後方喉痹升麻剉含之喉塞亦然車前子車前子味甘鹹寒無毒主氣癃止痛利水道小便除濕痹男子傷中女子淋瀝不欲食養肺强陰益精令人有子明目療赤痛乆服輕身耐老葉及根味甘寒主金瘡止血衄鼻瘀血血瘕下血小便赤止煩下氣除小蟲一名當道一名芣苢一名蝦蟆衣一名牛遺一名勝舄生眞定平澤丘陵阪道中五月五日採陰乾圖經曰今江湖淮甸近京北地處處有之春初生苗葉布地如匙面累年者長及尺餘如鼠尾花甚細青色微赤結實如葶藶赤累色駐景丸用車前菟絲二物蜜丸食下服方今以爲奇方藥性論云車前子君味甘平能去風毒肝中風熱毒風衝眼目赤痛障翳腦痛泪出壓丹石毒去心胸煩熱葉主泄精病治尿血能補五臟明目利小便通五淋日華子云常山爲使通小便淋澀壯陽治脱精心煩下氣禹錫云謹按爾雅云芣苢馬舄馬舄車前注今車前草大葉長穗好生道邊江東呼爲蝦蟆衣疏引陸機疏云馬舄一名車前一名當道喜在牛迹中生故曰車前當道也幽州人謂之牛舌草可鬻作茹大滑其子治婦人産難外臺秘要治尿血車前草搗絞取汁五合空心服之聖惠方治久患内障眼車前子乾地黄麥門冬等分爲末蜜丸如梧桐子大服屢試有效百一方小便不通車前子草一斤水三升煎取一升半分三服又方治石淋車前子二升以絹囊盛水八升煮取三升不食盡服之須臾石下梅師方治妊娠患淋水道熱不通車前子五兩葵根切一升同以水五升煎取升半作二服子母秘録治橫生不得出車前子末酒服二錢匕治瀉方歐陽文忠公嘗得暴下國醫不能愈夫人云市人有此藥三文一貼甚效夫人買之以國醫藥雜進之一服而愈後召賣藥者問其方但用車前子一味爲末米飲下二錢匕云利水道衍義曰車前陶隱居云其葉搗取汁服療泄精大誤矣此藥甘滑利小便走泄精氣經云主小便赤下氣有人作菜食小便不禁幾爲所誤木香廣州海州木香味辛温無毒主邪氣辟毒疫温鬼强志主淋露療氣劣肌中偏寒主氣不足消毒殺鬼精物温瘧蠱毒行藥之精乆服不夢寤魘寐輕身致神仙一名蜜香生水昌山谷圖經曰惟廣州舶上有來者他無所出陶隱居云江淮間亦有此種名上青木香不堪入藥用修養書云正月一日取五木煮湯以浴令人至老鬚髮黑藥性論云木香君治女人血氣刺心心痛不可忍末酒服之治九種心痛積年冷氣痃癖癥塊脹痛逐諸擁氣上衝煩悶治霍亂吐瀉心腹㽱刺唐本注云此有二種當以崑崙來者爲佳出西胡來者不善葉似羊蹄而長大花如菊花其實黄黑所在亦有之今按别本注云葉似署蕷而根大花紫色功多爲藥之要用陶云不入藥非日華子云治心腹一切氣止瀉霍亂痢疾安胎健脾消食療羸瘦膀胱冷痛嘔逆反胃蕭炳云崑崙船上來形如枯骨者良禹錫云謹按蜀本云今苑中種之花黄苗高三四尺葉長八九寸皺軟而有毛隋書云樊子蓋爲武威太守車駕西巡將入吐谷渾子蓋以彼多瘴氣獻青木香以禦霧露海藥云謹按山海經云生東海崑崙山外臺秘要療腋臭方醶醋浸青木香置腋下夾之即愈傷寒類要天行熱病若發赤黑斑如瘑青木香二兩水二升煮取一升頓服之效衍義曰木香專泄决胸腹間滯塞冷氣他則次之得橘皮肉豆蔻生薑相佐使絶佳效尤速又一種嘗自岷州出塞得生青木香特歸西洛葉如牛蒡但狹長莖高三四尺花黄一如金錢其根則青木香也生嚼之極辛香尤行氣薏苡人薏苡人味甘微寒無毒主筋急拘攣不可屈伸風濕痹下氣除筋骨邪氣不仁利腸胃消水腫令人能食久服輕身益氣其根下三蟲一名解蠡一名屋菼一名起實一名贛生眞定平澤及田野八月採實採根無時圖經曰薏苡人生眞定平澤及田野今所在有之春生苗莖高三四尺葉如黍開紅白花作穗子五月六月結實青白色形如珠子而稍長故名薏珠子小兒多以綫穿如貫珠爲戲古方大抵心肺藥多用之葛洪治卒心腹煩滿又胸脅痛者剉根濃煮汁服三升乃定今人多取葉爲飲香張仲景治風濕身煩疼日晡劇者與麻黄杏人薏苡人湯麻黄三兩杏人三十枚甘草薏苡人各一兩四物以水四升煮取二升分温再服陶隱居云眞定縣屬常山郡近道在處有多生人家交阯者子最大彼土呼爲幹珠馬援大取將還人讒以爲眞珠也實重累者爲良用之取中人今小兒病蛔蟲取根煮汁作糜食之甚香而去蛔蟲大驗陳藏器餘云主消渴煞蛔蟲根煮服墮胎雷公曰凡使物用𧆐米顆大無味其𧆐米時人呼爲粳𧆐是也若薏苡人顆小色青味甘咬着粘人齒大用一兩以糯米二兩同熬令糯米熟去糯米取使若更以鹽湯煮别是一般修制亦得禹錫云謹按藥性論云能治熱風筋脉攣急能令人食主肺痿肺氣吐膿血咳嗽涕唾上氣孟詵云性平去乾濕脚氣大驗食醫心鏡云治筋脉拘攣久風濕痹下氣除骨中邪氣利腸胃消水腫乆服輕身益氣力薏苡人一升搗爲散每服以水二升煮兩匙末作粥空腹食之梅師方肺疾唾膿血取薏苡人十兩杵碎以水三升煎取一升入酒少許服之衍義曰意苡人此李商隱太倉銘中所謂薏苡似珠不可不虞者也取人用本經云微寒主筋急拘攣拘攣有兩等素問注中大筋受熱則縮而短縮短故攣急不伸此是因熱而拘攣也故可用薏苡人若素問言因寒即筋急者不可更用此也澤瀉齐州澤瀉味甘鹹寒無毒主風寒濕痹乳難消水養五臟益氣力肥健補虚損五勞除五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水乆服耳目聰明不饑延年輕身面生光能行水上扁鵲云多服病人眼一名水瀉一名及瀉一名芒芋一名鵠瀉生汝南池澤五月六月八月採根陰乾畏海蛤文蛤葉味鹹無毒主大風乳汁不出産難强陰氣乆服輕身五月採實味甘無毒主風痹消渴益腎氣强陰補不足除邪濕久服面生光令人無子九月採圖經云澤瀉生汝南池澤今山東河陜江淮亦有之以漢中者爲佳春生苗多有淺水中葉似牛舌草獨莖而長秋開白花作叢似穀精草五月六月八月採根陰乾素問身熱解墮汗出如浴惡風少氣名曰酒風治之以澤瀉术各十分麋銜五分合以二指撮爲後飯後飯者飯後藥先謂之後飯張仲景治雜病心下有支飲苦冒澤瀉湯主之澤瀉五兩术二兩水二升煎取半升分温再服治傷寒有大小澤瀉湯五苓散輩皆用澤瀉行利停水爲最藥性論云澤瀉君味苦能主腎虚精自出治五淋利膀胱熱宣通水道陶隱居云汝南郡屬豫州近道亦有不堪用惟用漢中南鄭青弋形大而長尾間必有兩歧爲好此物易朽蠹常須密藏之葉狹長叢生諸淺水中仙經服食斷穀皆用之身輕能步行水上日華子云治五勞七傷主頭旋耳虚鳴筋骨攣縮通小腸止遺瀝尿血催生難産補女人血海令人有子葉壯水臟下乳通血脉經驗方常服澤瀉皂莢水煮爛焙乾爲末煉蜜爲丸如桐子大空心以温酒下十五丸至二十丸甚妙治腎臟風生瘡尤良衍義曰澤瀉其功尤長於行水張仲景八味丸用之者亦不過引接桂附等歸就腎經别無他意凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用薯蕷明州滁州薯蕷味甘温平無毒主傷中補虚羸除寒熱邪氣補中益氣力長肌肉主頭面遊風風頭眼眩下氣止腰痛補虚勞羸瘦充五藏除煩熱强陰乆服耳目聦明輕身不饑延年一名山芋秦楚名玉延鄭越名土諸生嵩高山谷二月八月採根暴乾紫芝爲之使惡甘遂圖經曰北都四明者爲佳春生苗蔓延籬援莖紫色葉青有三尖角似牽牛更厚而光澤郭璞注云根似芋可食今江南人單呼諸語或有輕重耳據此注則薯蕷與諸乃一種南北之産或有不同故其形類差别然字音殊儲不同蓋相傳之訛也一名山芋藥性論云薯蕷臣能補五勞七傷去冷風止腰疼鎭心神安魂魄開達心孔多記事補心氣不足患人體虚羸加而用陶隱居云今近道在處有東山南江皆多掘取食之以充糧南康間最大而美服食亦用禹錫云謹按吴氏云薯蕷一名諸薯齊越名山芋一名修脆一名兒草神農甘小温桐君雷公甘無毒或生臨朐鍾山始生赤莖細蔓五月華白七月實青黄八月熟落根中白皮黄類芋也食醫心鏡云主下焦虚冷小便數瘦損無力生芋藥半斤刮去皮以刀切碎研令細爛於鐺中著酒酒沸下薯蕷不得攪待熟著鹽葱白更添酒空腹飲三二盞妙聖惠方補虚損益顔色用薯蕷於砂盆中細研然後下於銚中先以酥一大匙熬令香次旋添酒一盞煎攪令匀空心飲之茺蔚子茺蔚子味辛甘微温微寒無毒主明目益精除水氣療血逆大熱頭痛心煩乆服輕身莖主癮疹癢可作浴湯一名益母一名益明一名大札一名貞蔚生海濱池澤五月採圖經曰皆云蓷益母也故曾子見之感恩劉歆亦謂蓷臭穢臭穢即茺蔚也廣濟方療小兒疳痢困垂死者取益母草煮食之取足差止甚佳又主難産搗取汁七大合煎半頓服立下無新者以乾者一大握水七合煎服陶隱居云今處處有葉如荏方莖子形細長三棱方用亦稀唐本注云擣茺蔚莖傅丁腫服汁使丁腫毒内消又下子死腹中主産後血脹悶諸雜毒腫丹油等腫取汁如豆滴耳中主聤耳中虺蛇毒傅之良陳藏器云此草田野間人呼爲鬱臭草又按别本注云其子狀如析蓂子而稍粗大微有寒蒸作煎及搗絞取汁服之下死胎也日華子云治産後血脹苗葉同功乃益母草子也作節節生花如鷄冠子黑色九月採聖惠方治婦人勒乳痛成癰益母爲末水調塗乳上一宿自差生搗爛用之亦得又方治産後血不下益母搗絞汁每服一小盞入酒一合温攪匀服肘後方治婦人一切血病産婦一切傷損益母草不限多少竹刀切洗淨銀器内煉成膏瓷器内封之并以酒服之孫眞人方治馬咬方益母草細切和醋炒封之集驗方治婦人帶下赤白色益母草花開時採搗爲末每服二錢食前温湯調下丹房鏡源云燒益母灰用麵湯溲燒之偏治面上風刺亦制硫黃衍義曰茺蔚子葉至初春亦可煮作菜食凌冬不凋悴唐武后曾燒此灰入緊面藥女萎亦名萎蕤舒州滁州女萎萎蕤味甘平無毒主中風暴熱不能動揺跌筋結肉諸不足心腹結氣虚熱濕毒腰痛莖中寒及目痛皆爛泪出乆服去面黑䵟好顔色潤澤輕身不老一名熒一名地節一名玉竹一名馬薰生太山山谷及丘陵立春後採陰乾畏鹵鹹圖經曰郭璞注云藥草也亦無女萎之别名疑别是一物且本經中品又别有女萎條蘇恭云即此女萎今本經朱書是女萎能效黑字是萎蕤之功觀古方書所用則似差别藥性論云萎蕤君主時疾寒熱内補不足去虚勞客熱頭痛不安加而用之良陶隱居云按本經有女萎無萎蕤别録無女萎有萎蕤而爲用正同惟名異爾如此女萎即應是萎蕤也今處處有其根似黄精而小異服食家亦用之日華子云除煩悶止渴潤心肺補五勞七傷虚損腰脚疼痛天行熱狂服食無忌雷公云凡使勿用鈎吻并黄精其二物相似萎蕤只是不同有誤疾人萎蕤節上有毛莖斑葉尖處有小黄點採得先用竹刀刮上節皮了洗淨却以蜜水浸一宿蒸了焙乾用蕭炳云萎蕤補中益氣出均州楊氏産乳方療久痢脱肛不止取女萎切一升燒薰之防葵襄州防葵味辛甘苦寒無毒主疝瘕腸泄膀胱熱結溺不下咳逆温瘧癲癇驚邪狂走療五藏虚氣小腹支滿臚脹口乾除腎邪强志久服堅骨髓益氣輕身中火者不可服令人恍惚見鬼一名梨蓋一名房慈一名爵離一名農果一名利茹一名方蓋生臨淄川谷及嵩高太山少室三月三日採根暴乾圖經曰陶隱居云與狼毒同根但置水不沉耳今乃用枯朽狼毒當之極爲謬矣三月三日採六月開花即結實採根爲藥唐本注云此藥上品無毒久服主邪氣驚狂之病其根葉似葵花子根香味似防風故名防葵採依時者亦能沉水今乃用枯朽狼毒當之極爲謬矣陳藏器云按此二物一是上品而陶云防葵與狼毒根同但置水中不沉爾然此二物善惡不同形質又别陶既爲此說後人因而用之防葵將以破堅積爲下品之物與狼毒同功今古因循遂無甄别此殊誤也雷公云凡使勿誤用狼毒縁眞似防葵而驗之有異效又不同切須審之恐誤疾人禹錫云謹按藥性論云防葵君有小毒能治疝氣痃癖氣塊膀胱宿水血氣瘤大如椀悉能消散治鬼瘧主百邪鬼魅精怪通氣肘後方治癲狂疾防葵末温酒服一刀圭至二三服身潤又小不仁爲候圖經衍義本草卷之八
