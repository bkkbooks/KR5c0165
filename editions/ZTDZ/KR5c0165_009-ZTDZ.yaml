body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部上品之上遠志齊州威勝軍商州遠志爲君味苦温無毒主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘强志倍力利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黄乆服輕身不老好顔色延年葉名小草主益精補陰氣止虚損夢淺一名棘菀一名葽繞一名細草生太山及冤句川谷四月採根葉陰乾得茯苓冬葵子龍骨良殺天雄附子毒畏眞珠藜蘆蜚蠊齊蛤圖經曰今河陜京西州郡亦有之根黄色形如蒿根苗名小草似麻黃而青又如蓽豆葉亦有似大青而小者三月開花白色根長及一尺四月採根葉陰乾泗州出者花紅根葉俱大於他處商州者根又黑色俗傳夷門遠志最佳范汪方治胸痹心痛逆氣膈中飲不下藥性論云遠志畏蠐螬治心神健忘安魂魄令人不迷堅壯陽道主夢邪陶隱居云按藥名無齊蛤恐是百合冤句縣屬兖州濟陰郡今猶從彭城北蘭陵來用之打去心取皮今用一斤止得三兩皮或云陶云恐是百合非也日華子云主膈氣驚魘長肌肉助筋骨婦人血噤失音小兒客忤服無忌抱朴子内篇云陵陽仲子服遠志三十年有子三十七人開書所視便記而不忘雷公云遠志凡使先須去心若不去心服之令人悶去心了用熟甘草湯浸一宿漉出暴乾用之也肘後方云治人心孔惛塞多忘喜誤丁酉日密自至市買遠志著巾角中還爲末服之勿令人知細辛岢嵐軍華州細辛味辛温無毒主咳逆頭痛腦動百節拘攣風濕痹痛死肌温中下氣破痰利水道開胸中除痹齆鼻風癇癲疾下乳結汗不出血不行安五臟益肝膽通精氣乆服明目利九竅輕身長年一名小辛生華陰山谷二月及八月採根陰乾曾青棗根爲之使惡狼毒山茱萸黄耆畏消石滑石反藜蘆圖經云今處處有之然他處所出者不及華州者眞其根細而其味極辛故名之曰細辛今人多以杜蘅當之杜蘅吐人用時須細辨耳江淮俗呼爲馬蹄香以人多誤用故此詳述之藥性論云細辛臣忌生菜味苦辛治咳逆上氣惡風風頭手足拘急安五臟六腑添膽氣去皮風濕痒能止眼風泪下明目開胸中滯除齒痛主血閉婦人血瀝腰痛雷公云凡使一一揀去雙葉服之害人須去頭土了用瓜水浸一宿至明漉出曝乾用之禹錫云按范子云細辛出華陰色白者苦外臺秘要治卒客忤停口不能言細辛桂心等分内口中别說云謹按細辛非華陰者不得爲細辛用若杜蘅之類自應依本性於用爾又細辛若單用末不可過半錢匕多即氣悶塞不通者死聖惠方云治口臭及𧏾齒腫痛細辛煮取濃汁熱含令吐差衍義曰細辛用根今惟華州者佳柔韌極細直深紫色味極辛嚼之習習如椒治頭面風痛不可闕也葉如葵葉亦黑非此則杜蘅也杜蘅葉形如馬蹄下故俗云馬蹄香蓋根似白前又似細辛襄漢間一種細辛極細而直色黄白乃是鬼督郵不可用石斛温州春州石斛味甘平無毒主傷中除痹下氣補五臟虚勞羸瘦强陰益精補内絶不足平胃氣長肌肉逐皮膚邪熱痱氣脚膝疼冷痹弱久服厚腸胃輕身延年定志除驚一名林蘭一名禁生一名杜蘭一名石遂生六安山谷水傍石上七月八月採莖陰乾陸英爲之使惡凝水石巴豆畏僵蠶雷丸圖經曰今荆湖川廣州郡及温台州亦有之以廣南者爲佳在山谷中五月生苗莖似竹節節間出碎葉七月開花十月結實其根細長黄色或云採莖以酒洗捋蒸炙成不用灰湯其江南生者有二種一種似大麥累累相連頭生一名麥斛一種大如雀髀名雀髀斛惟生石上者勝亦有生藥木上者名木斛不堪用陶隱居云今用石斛出始興生石上細實桑灰湯沃之色如金形似蚱蜢髀者爲佳近道亦有次宣城間生櫟樹上者名木斛其莖形長大而色淺六安屬廬江今始安亦出木斛至虚長不入丸散惟可爲酒漬煮湯用爾俗方最以補虚療脚膝日華子云治虚損劣弱壯筋骨暖水藏輕身益智平胃氣逐虚邪雷公云凡使先去頭土用酒浸一宿漉出於日中曝乾却用酥蒸從巳至酉却徐徐焙乾用禹錫云謹按藥性論云石斛君益氣除熱主治男子腰脚軟弱健陽逐皮肌風痹骨中乆冷虚損補腎積精腰痛養腎氣益力衍義曰石斛細若小草長三四寸柔韌折之如肉而實今人多以木斛渾行醫工亦不能明辨世又謂之金釵石斛蓋後人取象而言之然其不輕將木斛折之中虚如禾草長尺餘但色深若光澤而已眞石斛治胃中虚熱有功巴㦸天滁州歸州巴㦸天味辛甘微温無毒主大風邪氣陰痿不起强筋骨安五臟補中增志益氣療頭面遊風小腹及陰中相引痛下氣補五勞益精利男子生巴郡及下邳山谷二月八月採根陰乾覆盆子爲之使惡朝生雷丸丹參圖經曰今江淮河東州郡亦有之皆不及蜀川者佳葉似茗經冬不枯俗名三蔓草又名不凋草葉似麥門冬今兩種但擊破視其中紫而鮮潔者僞也眞者擊破其中雖紫又有微白糝如粉色陶隱居云今亦用建平宜都者狀如牡丹而細外赤内黑用之打去心唐本注云巴戟天苗俗方名三蔓草葉似茗經冬不枯根如連珠多者良宿根青色嫩根白紫用之亦同連珠厚者爲勝日華子云味苦五臟定心氣除一切風治邪氣療水腫又名不凋草色紫如小念珠有小孔子堅硬難擣搗雷公云凡使須用枸杞子湯浸一宿待稍軟漉出却用酒浸一伏時又漉出用菊花同熬令焦黄去菊花布拭令乾用禹錫云謹按藥性論云紫巴戟天使能治男子夜夢鬼交泄精强陰除頭面中風主下氣大風血癩病人虚損加而用之衍義曰巴戟天本有心乾縮時偶自落或可以抽摘故中心或空非自有小孔子也今人欲要中間紫色則多僞以大豆汁沃之不可不察外堅難染故先從中間紫色有人嗜酒日須五七杯後患脚氣甚危或教以巴戟半兩糯米同炒米微轉色不用米大黄一兩剉炒同爲末熟蜜爲丸温水下五七十丸仍禁酒遂愈赤箭兗州赤箭味辛温主殺鬼精物蠱毒惡氣消癰腫下支滿疝下血乆服益氣力長陰肥健輕身增年一名離母一名鬼督郵生陳倉川谷雍州及太山少室三月四月八月採根暴乾圖經曰赤箭生陳倉川谷雍州及泰山少室今江湖間亦有之然不中藥用謹按抱朴子云按仙方中有合離草一名獨揺一名離母所以謂之合離離母者此草爲物下根如芋魁有游子十二枚周環之去大魁數尺雖相須而實不連但以氣相屬耳陶隱居云陳倉屬雍州扶風郡按此草亦是芝類云莖赤如箭杆葉生其端根如人足又云如芋有十二子爲衛有風不動無風自揺如此亦非俗所見而徐長卿亦名鬼督郵又復有鬼箭莖有羽其療并相似而益人乖異恐并非此赤箭禹錫云按藥性論云赤箭無毒别說云謹按今醫家見用天麻即是此赤箭根今補注與圖經所載乃别是一物中品之下又出天麻一目注云出鄆州考今之所出赤箭根苗乃自齊鄆而來者爲上今翰林沈公括最爲博識嘗解此一說云古方用天麻者不用赤箭用赤箭者即無天麻方中諸藥皆同而唯此名或别即是天麻赤箭本爲一物并合用根也今中品之下所别出天麻一目乃與此赤箭所說都不相干即明說是一物爾然中品之下所爲天麻者世所未嘗見用今就此赤箭根爲天麻則與今所用不相違然赤箭則言苗用之有自表入裏之功天麻則言根用之有自内達外之理根則抽苗徑直而上苗則結子成熟而落返從簳中而下至上而生以此粗可識其内外主治之理衍義曰赤箭天麻苗也然與天麻治療不同故後人分之爲二經中言八月採根曝乾故知此即苗也菴䕡子寧州泰州菴䕡子味苦微寒微温無毒主五臟瘀血腹中水氣臚脹留熱風寒濕痹身體諸痛療心下堅膈中寒熱周痹婦人月水不通消食明目乆服輕身延年不老駏驉食之神仙生雍州川谷亦生上黨及道邊十月採實陰乾荆實薏苡爲之使圖經曰今江淮亦有之春生苗葉如艾蒿高三二尺七月開花八月結實十月採陰乾今人通以九月採江南人家多種此辟蛇今人治打撲損多用此法飲散皆通其效最速服食方不見用日華子云治腰脚重痛膀胱疼明目及骨節煩痛不下食禹錫云謹按藥性論云菴䕡使味辛苦益氣主男子陰痿不起治心腹脹滿能消瘀血廣利方治瘀血不散變成癰搗生菴䕡蒿取汁一升服之菥蓂子菥蓂子味辛微温無毒主明目目痛泪出除痹補五臟益精光療心腹腰痛乆服輕身不老一名蔑菥一名大蕺一名馬辛一名大薺生咸陽川澤及道旁四月五月採暴乾得荆實細辛良惡乾薑苦參圖經曰爾雅云菥蓂大薺郭璞云似薺細葉俗呼之曰老薺蘇恭亦云是大薺又云然菥蓂味辛大薺味甘陳藏器以大薺當是葶藶非菥蓂菥蓂大而褊葶藶細而圓二物殊也而爾雅自有葶藶謂之蕇注云實葉皆似芥一名狗薺大抵二物皆薺類故人多不能細分乃爾致疑也古今眼目方中多用之崔元亮海上方療眼熱痛泪不止以菥蓂子一物搗篩爲末欲卧以銅箸點眼中當有熱泪及惡物出并去努肉可三四十夜點之甚佳藥性論云菥蓂子苦參爲使能治肝家積聚眼目赤腫陶隱居云今處處有之人乃言是大薺子俗用甚稀陳藏器云菥蓂子本經一名大薺蘇引爾雅爲注云大薺按大薺即葶藶非菥蓂也菥蓂大而褊葶藶細而圓二物殊别也蓍實泰州蓍實味苦酸平無毒主益氣充肌膚明目聰慧先知乆服不饑不老輕身生少室山谷八月九月採實日暴乾圖經曰今蔡州上蔡縣白龜祠傍其生如蒿作叢高五六尺一本一二十莖至多者三五十莖生便條直所以異於衆蒿也秋後有花出於枝端紅紫色形如菊八月九月採其實日乾入藥今醫家亦稀用其莖爲筮以問鬼神知吉凶故聖人贊之謂之神物史記龜策傳曰龜千歲乃遊於蓮葉之上蓍百莖共一根又其所生獸無虎狼蟲無毒螫徐廣注曰劉向云龜千歲而靈蓍百年而一本生百莖又褚先生云蓍生滿百莖者其下必有神龜守之其上常有黄雲覆之唐本注云此草所在有之以其莖爲筮陶誤用楮實爲之本經云味苦楮實味甘其楮實移在木部也卷柏海州兗州卷柏味辛甘温平微寒無毒主五臟邪氣女子陰中寒熱痛癥瘕血閉絶子止咳逆治脱肛散淋結頭中風眩痿蹶强陰益精乆服輕身和顔色令人好容體一名萬歲一名豹足一名求股一名交時生常山山谷石間五月七月採陰乾圖經曰今關陜沂兖諸州亦有之宿根紫色多鬚春生苗似柏葉而細碎拳攣如鷄足青黄色高三五寸無花子多生石上五月七月採陰乾去下近石有沙土處用之藥性論云卷柏君能治月經不通尸疰鬼疰腹痛去百邪鬼魅陶隱居云今出近道叢生石土上細葉似柏卷屈狀如鷄足青黄色用之去下有沙土處日華子云鎭心治邪啼泣除面皯頭風暖水藏生用破血炙用止血龍膽襄洲睦州山龍膽龍膽味苦寒大寒無毒主骨間寒熱驚耀邪氣續絶傷定五臟殺蠱毒除胃中伏熱時節温熱熱泄下痢去腸中小蟲益肝膽氣止驚惕久服益智不忘輕身耐老一名陵游生齊朐山谷及冤句二月八月十一月十二月採根陰乾貫衆爲之使惡防葵地黄圖經曰今近道亦有之宿根黄白色下抽根十餘本大類牛膝直上生苗高尺餘四月生葉似柳葉而細莖如小稍枝七月開花如牽牛花作鈴鐸形青碧色冬後結子苗便枯俗呼云草龍膽湘中又有山龍膽草味苦澀此同類而别種也古方治疸多用之集驗方穀疸丸苦參三兩龍膽一兩二物下篩牛膽和丸先食以麥飲服之陶隱居云今出近道吴興爲勝狀似牛膝味甚苦故以膽爲名今按别本注云狀似龍葵味苦如膽因以爲名日華子云小豆爲使治客忤疳氣熱病狂語及瘡疥明目止煩益智治健忘雷公云採得後陰乾欲使時用銅刀切去髭土頭了剉於甘草湯中浸一宿至明漉出暴乾用勿空腹餌之令人溺不禁禹錫云謹按藥性論云龍膽能主小兒驚癇入心壯熱骨熱擁腫治時疾熱黄口瘡聖惠方治蛔蟲攻心如刺吐水龍膽一兩去頭剉水二盞煮取一盞去滓隔宿不食平旦服外臺秘要治卒下血不止龍膽一虎口以水五升煮取二升半分温五服差肘後方治卒心痛龍膽四兩酒三升煮取一升半頓服白蒿白蒿味甘平無毒主五藏邪氣風寒濕痹補中益氣長毛髮令黑療心懸少食常饑久服輕身耳目聦明不老生中山川澤二月採圖經曰白蒿蓬蒿也今所在有之似青蒿而葉粗上有白毛錯澁從初生至枯白於衆蒿頗似細艾三月採此爾雅所謂蘩皤蒿是也疏云蓬蒿今白蒿春始生及秋香美可生食又可蒸一名游胡北海人謂之旁勃故大戴禮夏小正云蘩游胡游胡旁勃也此草故人以爲唐孟詵亦云生挼醋食今人但食蔞蒿不復食此或疑此蒿即蔞蒿陶隱居云蒿類甚多而俗中不聞呼白蒿者方藥家既不用皆無復識之所主療既殊則應更加研訪服食七禽散云白兔食之仙與菴䕡子同法耳孟詵云白蒿寒春初此蒿前諸草生摶汁去熱黄及心痛其葉生挼醋淹之爲菹甚益人白英味甘寒無毒主寒熱八疸消渴補中益氣乆服輕身延年一名穀菜一名白草生益州山谷春採葉夏採莖秋採花冬採根陶隱居云諸方藥不用此乃有蔛菜生水中人蒸食之此乃生山谷當非是又有白草葉作羹飲甚治勞而不用根華益州乃有苦菜土人專食之皆充倦無病疑或是此唐本注云此鬼目草也蔓生葉似王瓜小長而五椏實圓若龍葵子生青熟紫黑煮汁飲解勞東人謂之白草陶云白草似識之而不的辨陳藏器云白英主煩熱風疹丹毒瘧瘴寒熱小兒結熱煮汁飲之一名鬼目爾雅云苻鬼目注似葛葉有毛子赤如耳璫珠若云子熟黑誤矣紫芝味甘温主耳聾利關節保神益精氣堅筋骨好顔色乆服輕身不老延年一名木芝生高夏山谷六芝皆無毒六月採薯蕷爲之使得髮良得麻子人白瓜子牡桂共益人惡常山畏扁青茵蔯蒿藥性論云紫芝使畏髮味甘平無毒主能保神益壽陶隱居云按郡縣無高夏名恐是山名爾此六芝皆仙草之類俗所稀見族種甚多形色壞異并載芝草圖中今俗所用紫芝此是朽樹木株上生狀如木檽名爲紫芝蓋止療痔而不宜以合諸補丸藥也凡得芝草便正爾食之無餘節度故皆不云服法也抱朴子云赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黄者如紫金而皆光明洞徹如堅冰也又云木芝者松柏脂倫地千歲化爲茯苓萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不焦帶之辟兵赤芝味苦平主胸中結益心氣補中增智慧不忘久食輕身不老延年神仙一名丹芝生霍山陶隱居云南嶽本是衡山漢武帝始以小霍山代之非正也此則應生衡山也黑芝味鹹平主癃利水道益腎氣通九竅聰察久食輕身不老延年神仙一名玄芝生常山唐本注云五芝經云皆以五色生於五嶽諸方所獻白芝未必華山黑芝又非常嶽且芝多黄白稀有黑青者然紫芝最多非五芝類但芝自難得縱獲一二豈得終久服耶青芝味酸平主明目補肝氣安精魂仁恕久食輕身不老延年神仙不忘强志一名龍芝生泰山黄芝味甘平主心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙一名金芝生嵩山白芝味辛平主咳逆上氣益肺氣通利口鼻强志意勇悍安魄久食輕身不老延年神仙一名玉芝生華山兜木香燒去惡氣除病疫漢武帝故事西王母降上燒兜木香末兜木香兜渠國所獻如大豆塗宫門香聞百里關中大疾疫死者相枕燒此香疫則止内傳云死者皆起此則靈香非中國所致標其功用爲衆草之首焉無風獨摇草帶之使夫婦相愛生嶺南頭如彈子尾若鳥尾兩片開合見人自動故曰獨揺草海藥云謹按廣志云生嶺南又云生大秦國性温平無毒主頭面遊風遍身癢煮汁淋蘸陶朱術云五月五日採諸山野往往亦有之羊不吃草味苦辛温無毒主一切風血補益攻諸病煮之亦浸酒生蜀川山谷葉細長在諸草中羊不吃者是仙人草主小兒酢瘡煮湯浴亦搗傅之酢瘡頭小大硬小者此瘡或有不因藥而自瘥者當丹毒入腹必危可預飲冷藥以防之兼用此草洗瘡亦明目去膚醫按汁滴目中生階庭間高二三寸葉細有薦齒似離鬲草北地不生也千里及味苦平小毒主天下疫氣結黄瘧瘴蟲毒煮服之吐下亦搗傅瘡蟲蛇犬等咬處藤生道旁籬落間有之葉細厚宣湖間有之錢葛味甘温無毒主一切風血氣羸弱令人性健乆服風緩及偏風并正生山南峽中葉似枸杞根如葛黑色也甜藤味甘寒無毒去熱煩解毒調中氣令人肥健又主剥馬血毒入肉狂犬牛馬熱黄搗絞取汁和米粉作糗餌食之甜美止泄搗葉汁傅蛇咬瘡生江南山林下蔓如葛又有小葉尖長氣辛臭搗傅小兒腹除痞滿閃癖地楊梅味辛平無毒主赤白痢取莖子煎服生江東温濕地四五月有子似楊梅苗如蓑草也天竺乾薑味辛温無毒主冷氣寒中宿食不消腹脹下痢腰背疼痃癖氣塊惡血積聚生婆羅門國似薑小黄一名胡乾薑圖經衍義本草卷之九
