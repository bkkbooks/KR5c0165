  text: 圖經衍義本草卷之十六事三
  hash: sha256:659b637c3a0212ed711e00ac92ef99781a91d169435ad8996aebdabec7278d96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_SJB_016-170466b, image: sjb/17/170466b.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部下品附子味辛甘温大熱有大毒主風寒欬逆邪氣温中金瘡破癥堅積聚血瘕寒濕踒烏卧切躄拘攣膝痛脚疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下利赤白堅肌骨强陰又墮胎爲百藥長生犍爲山谷及廣漢冬月採爲附子春採爲烏頭地膽爲之使惡蜈蚣畏防風黑豆甘草黄耆人參烏韭陶隱居云附子以八月上旬採八角者良凡用三建皆熱灰微炮令拆勿過焦惟薑附湯生用之俗方每用附子皆須甘草人參生薑相配者正以制其毒故也今按陳藏器本草云附子醋浸削如小指内耳中去聾去皮炮令拆以蜜塗上炙之令蜜入内含之勿咽其汁主喉痹圖經曰文具側子條下陳藏器云附子無八角陶强名之古方多用八角附子市人所貨以八角爲名雷公云凡使先須細認勿誤用有烏頭烏喙天雄側子木鱉子烏頭少有莖苗長身烏黑少有傍尖烏喙皮上蒼有如大豆許者孕八九個周圍底陷黑如烏鐵宜於文武火中炮令皴拆即劈破用天雄身全矮無尖周匝四面有附孕十一個皮蒼色即是天雄宜炮皴拆後去皮尖底用不然陰制用并得側子只是附子傍有小顆附子如棗核者是宜生用治風𤺋神妙木鼈子只是諸喙附雄烏側中毗槵者號曰木鼈子不入藥中用若服令人喪目若附子底平有九角如鐵色一個重一兩即是氣全堪用夫修事十兩於文武火中炮令皴拆者去之用刀刮上孕子并去底尖微細劈破於屋下午地上掘一坑可深一尺安於中一宿至明取出焙乾用夫欲炮者灰火勿用雜木火只用柳木最妙若陰制使即生去尖皮底了薄切用東流水并黑豆浸五日夜然後漉出於日中㬠令乾用凡使須陰制去皮尖了每十兩用生烏豆五兩東流水六升聖惠方治丁瘡腫甚者用附子末醋和塗之乾即再塗千金翼方同外臺秘要療偏風半身不遂冷癖疰附子一兩生用無灰酒一升右㕮咀内於酒中經一七日隔日飲之服一小合差千金翼治大風冷痰癖脹滿諸痹等病用大附子一枚重半兩者兩枚亦得炮之酒漬春冬五日夏秋三日服一合以差爲度日再服無所不治又方治口噤卒不開搗附子末内管中開口吹入喉差經驗方嘔逆翻胃散大附子一箇生薑一斤細剉煮研如麵糊米飲下之經驗後方治大人乆患口瘡生附子爲末醋麫調男左女右貼脚心日再换又方治熱病吐下水利身冷脉微發躁不止附子一枚去皮臍分作八片入鹽一錢水二升煎一升温服立效斗門方治翻胃附子一個最大者坐於㙛上四面着火漸逼碎入生薑自然汁中又依前火逼乾復淬之約生薑汁可盡半椀許搗羅爲末用粟米飲下一錢不過三服差又方治元臟傷冷及開胃附子炮過去皮尖搗羅爲末以水兩盞入藥二錢鹽及棗薑同煎取一盞空心服大去積冷暖下元肥腸益氣酒食必無所礙簡要濟衆治脚氣連腿腫滿久不差方黑附子一兩去皮臍生用搗爲散生薑汁調如膏塗傅腫上藥乾再調塗之俟腫消爲度孫用和治大瀉霍亂不止附子秤重七錢炮去皮臍爲末每服四錢水兩盞鹽半錢煎取一盞温服立止張文仲療眼暴赤腫磣痛不得開又泪出不止削附子去皮末如蠶屎著眦中以定爲度崔氏方療耳聾風牙關急不得開方取八角附子一枚酢漬之三宿令潤微削一頭内耳中灸上十四壯氣通耳中即差孫兆口訣云治陰盛隔陽傷寒其人必躁熱而不欲飲水者是也宜服霹靂散附子一枚燒爲炭存性爲末蜜水調下爲一服而愈此逼散寒氣然後熱氣上行而汗出乃愈又方治頭痛附子炮石膏煅等分爲末入腦麝少許茶酒下半錢修眞秘㫖治頭風至驗以附子一個生去皮臍用緑豆一合同入銚子内煑豆熟爲度去附子服豆即立差每個附子可煑五服後爲末服之烏頭味辛甘温大熱有大毒主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱消胸上痰冷食不下心腹冷疾臍間痛肩脾痛不可俯仰目中痛不可久視又墮胎其汁煎之名射罔殺禽獸射罔味苦有大毒療尸疰癥堅及頭中風痹痛一名奚毒一名即子一名烏喙禹錫等按中蠱通用藥云射罔温大毒烏喙音諱味辛微温有大毒主風濕丈夫腎濕陰囊癢寒熱歷節制引腰痛不能行步癰腫膿結又墮胎生朗陵山谷採陰乾長三寸已上爲天雄莽草爲之使反半夏栝樓貝母白歛白及惡藜蘆陶隱居云今採用四月烏頭與附子同根春時莖初生有腦形似烏鳥之頭故謂烏頭有兩歧其蒂狀如牛角名烏喙喙即烏之口也亦以八月採搗笮莖取汁日煎爲射罔獵人以傅箭射禽獸中人亦死宜速解之唐本注烏喙即異名烏頭也此物同苗或有三岐者然兩岐者少縱天雄附子兩岐者仍依本名如烏頭兩岐即名烏喙天雄附子若有兩岐者復云何名之禹錫等按吴氏云烏頭一名莨一名千秋一名毒公一名果負一名耿子神農雷公桐君黃帝甘有毒正月始生葉厚莖方中空葉四四相對與蒿相似如烏之喙名曰烏喙也所畏惡使盡與烏頭同爾雅云芨堇草注即烏頭也江東呼爲堇音靳崔寔四民月令云三月可採烏頭藥性論云烏頭使遠志爲之使忌豉汁味苦甘大熱有大毒能治惡風憎寒濕痹逆氣冷痰包心腸腹疞痛痃癖氣塊益陽事中風洗洗惡寒除寒熱主胸中痰滿冷氣不下食治咳逆治齒痛破積聚寒主强志又云烏喙使忌豉汁味苦辛大熱能治男子腎氣衰弱陰汗主療風温濕邪痛治寒熱癰腫歲月不消者陳藏器云射罔本功外主瘻瘡瘡根結核瘰癧毒腫及蛇咬先取藥塗肉四畔漸漸近瘡習習逐病至骨瘡有熟膿及黃水出塗之若無膿水有生血及新傷肉破即不可塗立殺人亦如殺走獸塗箭鏃射之十步倒也日華子云土附子味㿌辛熱有毒生去皮搗濾汁澄清旋日乾取膏名爲射罔獵人以作毒箭使用或中者以甘草藍青小豆葉浮萍冷水薺苨皆可禦也圖經曰文具側子條下聖惠方治風腰脚冷痹疼痛用川烏頭三分去皮臍生搗羅釅醋調塗於故帛上傅之須臾痛止又方治乆疥癬方用川烏頭七枚生用搗碎以水二大盞煎至一大盞去滓温洗之外臺秘要治頭風頭痛臘日烏頭一升炒令黄末之絹袋盛酒三升浸温服千金方治耳鳴如流水聲耳癢及風聲不治久成聾生烏頭一味掘得承濕削如棗核大塞耳旦易夜易不過三日愈又方治沙虱毒以射罔傅之佳經驗方治一切冷氣去風痰定遍身疼痛益元氣强精力固精益髓令人少病川烏頭一斤用五升許大瓷鉢子盛以童子小便浸逐日添注任令溢出浸二七日其烏頭通軟揀去爛壞者不用餘以竹刀切破每個作四片却用新汲井水淘七遍後浸之每日换七日通前浸二十一日取出焙乾其藥潔白搗羅爲末酒煮麫糊丸緑豆大每服十丸空心鹽湯酒下少粥飯壓之如冷氣稍盛加丸數服之經驗後方治痢獨聖丸川烏頭一個好者柴灸火燒烟欲盡取出地上盞子合良久細研用酒蠟丸如大麻子每服三丸赤痢用黄連甘草黑豆煎湯放冷吞下如白用甘草黑豆煎湯放冷吞下如瀉及肚痛水吞下每於空心服之忌熱物梅師方治蛇虺螫人以射罔塗螫處頻易又方治婦人血風虚冷月候不匀或即脚手心煩熱或頭面虚腫頑麻川烏頭一觔清油四兩鹽四兩一處鐺内熬令裂如桑椹色爲度去皮臍五靈脂四兩合一處爲末入臼中搗令匀後蒸餅丸如梧桐子大空心温酒鹽湯下二十丸亦治丈夫風疾又方補益元藏進飲食壯筋骨二虎丸烏頭附子各四兩釅醋浸三宿取出切作片子穿一小坑以炭火燒令通赤用好醋三斗同藥傾入熱坑子内盆合之經一宿取出去砂土用好青鹽四兩研與前藥同炒令赤黃色杵爲末醋麫糊丸如梧桐子大空心冷酒下十五丸鹽湯亦得婦人亦宜又方療癰風手足嚲曳口眼喎斜言語蹇澁步履不正神驗烏龍丹川烏頭去皮臍了五靈脂各五兩右爲末入龍腦麝香研令細匀滴水丸如彈子大每服一丸先以生薑汁研化次煖酒調服之一日兩服空心晚食前服治一人只三十丸服五七丸便覺擡得手移得步十丸可以自梳頭勝金方治蝎咬烏頭末少許頭醋調傅之靈苑方治馬汗入瘡腫痛甚宜急療之遲則毒深難理以生烏頭末傅瘡口良久有黄水愈初虞世治陷甲割甲成瘡連年不差川烏頭尖黄檗等分爲末洗了貼藥修眞秘訣治瀉痢三神丸草烏頭三兩一兩生一兩熟炒一兩燒存性研爲末以醋麵糊丸如緑豆大每服五丸空心服瀉用井花水赤痢甘草湯下白痢乾薑湯下赤白痢生薑甘草湯下孫兆口訣治陰毒傷寒手足逆冷脉息沉細頭疼腰重兼治陰毒咳逆等疾川烏頭乾薑等分右爲麤散炒令轉色放冷再搗爲細末每一錢水一盞鹽一撮煎取半盞温服古今録驗治癰攻腫若有瘜肉突出烏頭五枚以苦酒三升漬三日洗之日夜三四度楊氏産乳療耳鳴無晝夜烏頭燒作灰菖蒲等分爲末綿裹塞耳中日再用效也唐李寳臣爲妖人置堇於液中寳臣飲之即喑三日死武后置堇於食賀蘭氏食之暴死衍義曰烏頭烏喙附子天雄側子五等皆一物也止以大小長短似像而名之後世補虚寒則須用附子仍取其端平而圓大及半兩以上者其力全不僭風家即多用天雄亦取其大者以其尖角多熱性不肯就下故取敷散也此用烏頭附子之大略如此餘三等則量其材而用之其炮製之法經方已著天雄天雄味辛甘温大温有大毒主大風寒濕痹歷節痛拘攣緩急破積聚邪氣金瘡强筋骨輕身健行療頭面風去來疼痛心腹結積關節重不能行步除骨間痛長陰氣强志令人武勇力作不倦又墮胎一名白幕生少室山谷二月採根陰乾遠志爲之使惡腐婢陶隱居云今採用八月中旬天雄似附子細而長便是長者乃至三四寸許此與烏頭附子三種本并出建平故謂之三建今宜都佷山最好謂爲西建錢塘間者謂爲東建氣力劣弱不相似故曰西水猶勝東白也其用灰殺之時有水强巨兩切者不佳唐本注云天雄附子烏頭等并以蜀道綿州龍州出者佳餘處縱有造得者力弱都不相似江南來者全不堪用陶以三物俱出建平故名之非按國語置堇於肉注云烏頭也爾雅云芨堇音靳草郭注云烏頭苗也此物本出蜀漢其本名堇今訛爲建遂以建平釋之又石龍芮葉似堇故名水堇今復爲水莨亦作建音此豈復生建平耶檢字書又無莨字甄立言本草音義亦論之天雄附子側子并皆用八月採造其烏頭四月上旬今云二月採恐非時也禹錫等按淮南子云天雄雄鷄志氣益注云取天雄三枚内雄鷄腸中搗生食之令人勇藥性論云天雄君忌豉汁大熱有大毒乾薑製用之能治風痰冷痹軟脚毒風能止氣喘促急殺禽蟲毒日華子云治一切風一切氣助陽道暖水臟補腰膝益精明目通九竅利皮膚調血脉四肢不遂破痃癖癥結排膿止痛續骨消瘀血補冷氣虚損霍亂轉筋背脊僂傴消風痰下胸膈水發汗止陰汗炮含治喉痹凡丸散炮去皮臍用飲藥即和皮生使甚佳可以便驗又云天雄大長少角刺而虚烏喙似天雄而附子大短有角平穩而實烏頭次於附子側子小於烏頭連聚生者名爲虎掌并是天雄一裔子母之類氣力乃有殊等即宿根與嫩者耳已上并忌豉汁圖經曰文具側子條下陳藏器云天雄身全短無尖周匝四面有附子孕十一個皮蒼色即是天雄宜炮皴拆後去皮尖底用之不然陰製用并得别說云謹按此數條說前項備悉但天雄者始種烏頭而不生附子側子之類經年獨生長大者是也蜀人種之忌生此以爲不利如養蠶而爲白僵之類側子側子味辛大熱有大毒主癰腫風痹歷節腰脚疼冷寒熱鼠瘻又墮胎陶隱居云此即附子邊角之大者脱取之昔時不用比來醫家以療脚氣多驗凡此三建俗中乃是同根而本經分生三處當各有所宜故也方云少室天雄朗陵烏頭皆稱本土今則無别矣少室山連嵩高朗陵縣屬豫州汝南郡今在北國唐本注云側子只是烏頭下共附子天雄同生小者側子與附子皆非正生謂從烏頭傍出也以小者爲側子大者爲附子今稱附子角爲側子理必不然若當陽已下江左及山南嵩高齊魯間附子時復有角如大豆許夔州已上劍南所出者附子之角曾微黍粟持此爲用誠亦難充比來京下皆用細附子有效未嘗取角若然方須八角附子應言八角側子言取角用不近人情也禹錫等按蜀本注云昔多不用今以療脚氣甚效按陶云側子即附子邊角之大者削取之蘇云只是烏頭下共附子同生小者側子大者爲附子殊無證據但云附子角小如黍粟難充於用故有此說今據附子邊果有角大如棗核及檳榔已來者形狀亦自是一顆仍不小則是烏頭傍出附子附子傍出側子理亦明矣陶云初生形似烏鳥頭故謂之烏頭兩岐者如烏烏口故名烏喙細而長乃至三四寸者爲天雄根傍如芋散生者名附子傍連生者名側子五物同出而異名苗高二尺許葉似石龍芮及艾其花紫赤其實紫黑今以龍州綿州者爲佳作之法以生熟湯浸半日勿令滅氣出以白灰裛之數易使乾又法以米粥及糟麴等并不及前法吴氏云側子一名莨神農岐伯有大毒八月採陰乾是附子角之大者畏惡與附子同藥性論云側子使能治冷風濕痹大風筋骨攣急圖經曰烏頭烏喙生朗陵山谷天雄生少室山谷附子側子生犍爲山谷及廣漢今并出蜀土然四品都是一種所産其種出於龍州種之法冬至前先將肥腴陸田耕五七遍以猪糞糞之然後布種逐月耕耔至次年八月後方成其苗高三四尺已來莖作四稜葉如艾花紫碧色作穗實小紫黑色如桑椹本只種附子一物至成熟後有此四物收時一處造釀方成釀之法先於六月内踏造大小麥麴至收採前半月預先用大麥煑成粥後將上件麴造醋候熱淋去糟其醋不用大酸酸則水解之便將所收附子等去根須於新潔瓮内淹浸七日每日攪一遍日足撈出以彌疏篩攤之後向慢風日中曬之百十日以透乾爲度若猛日曬則皺而皮不附肉其長三二寸者爲天雄割削附子傍尖牙角爲側子附子之絶小者亦名爲側子元種者母爲烏頭其餘大小皆爲附子以八角者爲上如方藥要用須炮令裂去皮臍使之綿州彰明縣多種之惟赤水一鄉者最佳然收採時月與本經所說不同蓋今時所種如此其内地所出者與此殊别今亦稀用謹按本經冬採爲附子春採爲烏頭而廣雅云奚毒附子也一歲爲萴與側同子二歲爲烏喙三歲爲附子四歲爲烏頭五歲爲天雄今一年種之便有五物也豈今人種蒔之法用力倍至故爾繁盛也雖然藥力當緩於歲久者耳崔氏治寒疝心腹脅引痛諸藥不可近者蜜煎烏頭主之以烏頭五枚大者去芒角及皮四破以白蜜一斤煎令透潤取出焙乾搗篩又以熟蜜丸如梧桐子大冷鹽湯吞二十圓永除又法用煎烏頭蜜汁以桂枝湯五合解之飲三合不知加五合其知者如醉以爲中病續傳信方治陰毒傷寒煩躁迷悶不主悟人急者用大附子一個可半兩者立劈作四片生薑一大塊立劈作三片如中指長糯米一撮三味以水一升煎取六合去滓如人體温頓服厚衣覆之或汗出或不出候心神定别服水解散太白通關散之類不得與冷水如渴更將滓煎與喫今人多用有效故詳著之陳藏器云側子冷酒調服治遍身風𤺋雷公云側子只是附子傍有小顆附子如棗核者是官生用治風𤺋神妙也木鼈子只是諸喙附雄烏側中毗槵者號曰木鼈子不入藥用若服之令人喪目半夏半夏味辛平生微寒熟温有毒主傷寒寒熱心下堅下氣咽喉腫痛頭眩胸脹欬逆腸鳴止汗消心腹胸膈痰熱滿結欬嗽上氣心下急痛堅痞時氣嘔逆消癰墮胎療痿黄悦澤面目生令人吐熟令人下用之湯洗令滑盡一名守田一名地文一名水玉一名示姑生槐里川谷五月八月採根暴乾射干爲之使惡皂莢畏雄黄生薑乾薑秦皮龜甲反烏頭陶隱居云槐里屬扶風今第一出青州吴中亦有以肉白者爲佳不厭陳久用之皆先湯洗十許過令滑盡不爾戟人咽喉方中有半夏必須生薑者亦以制其毒故也唐本注云半夏所在皆有生平澤中者名羊眼半夏圓白爲勝然江南者大乃徑寸南人特重之頃來互用功狀殊異問南人說苗乃是由跋陶注云虎掌極似半夏注由跋乃說鳶尾於此注中似說由跋二事混淆陶終不識禹錫等按蜀本云熟可以下痰又圖經云苗一莖莖端三葉有二根相重上小下大五月採則虚小八月採則實大採得當以灰裛二日湯洗暴乾之藥性論云半夏使忌羊血海藻飴糖柴胡爲之使有大毒湯淋十遍去涎方盡其毒以生薑等分制而用之能消痰涎開胃徤脾止嘔吐去胸中痰滿下肺氣主咳結新生磨塗癰腫不消能除瘤癭氣虚如有痰氣加而用之日華子云味㿌辛治吐食反胃霍亂轉筋腸腹冷痰瘧圖經曰半夏生槐里川谷今在處有之以齊州者爲佳二月生苗一莖莖端出三葉淺緑色頗似竹葉而光江南者葉似芍藥葉根下相重生上大下小皮黄肉白五月八月内採根以灰裛二日湯洗暴乾一云五月採者虚小八月採者實大然以圓白陳久者爲佳其平澤生者甚小名羊眼半夏又由跋絶類半夏而苗高近一二尺許根如鷄卵大多生林下或云即虎掌之小者足以相亂半夏主胃冷嘔噦方藥之最要張仲景治反胃嘔吐大半夏湯半夏三升人參三兩白蜜一升以水一斗二升和揚之二百四十遍煑取三升半温服一升日再亦治膈間支飲又主嘔吐穀不得下眩悸半夏加茯苓湯半夏一升生薑半斤茯苓三兩切以水七升煎取一升温服之又主心下悸半夏麻黄圓二物等分末蜜丸大如小豆每服三丸日三服其餘主寒厥赤丸四逆嘔吐附子粳米湯及傷寒方用半夏一升洗去滑焙乾搗末小麥麵一升合和以水溲令熟和如彈丸以水煑令麵熟則藥成初吞四五枚日二稍稍增至十五枚旋煮旋服覺疾减欲更重合亦佳禁食餳與羊肉雷公云凡使勿誤用傍𥳏子眞似半夏只是咬著微酸不入藥用若修事半夏四兩白芥子末二兩頭醋六兩二味攪令濁將半夏投於中洗三遍用之半夏上有隙涎若洗不淨令人氣逆肝氣怒滿聖惠方治時氣嘔逆不下食用半夏半兩浸洗七遍去滑生薑一兩同剉碎以水一大盞煎至六分去滓分二服不計時候温服又方治蝎瘻五孔皆通半夏一分爲末以水調傅之經驗後方正胃半夏二兩天南星二兩右以爲末用水五升入罎子内與藥攪匀浸一宿去清水焙乾重研令細每服水二盞藥末二錢薑三片同煎至六分温服至五服效斗門方治胸膈壅滯去痰開胃用半夏淨洗焙乾搗羅爲末以生薑自然汁和爲餅子用濕紙裹於慢火煨令香熟水兩盞用餅子一塊如彈丸大入鹽半錢煎取一盞温服能去胸膈壅逆大壓痰毒及治酒食所傷其功極驗簡要濟衆治乆積冷不下食嘔吐不止冷在胃中半夏五兩洗過爲末每服三錢白麫一兩以水和搜切作棋子水煮麫熟爲度用生薑醋和調服之古今録驗治喉痹半夏末方寸七雞子一枚頭開竅子去内黄白盛淳苦酒令小滿内半夏末著中攪和雞子内以鐶子坐之於炭上煎藥成置杯中稍暖嚥之錢相公篋中方治蝎螫人取半夏以水研塗之立止梅師方治傷寒病啘不止半夏熟洗乾末之生薑湯服一錢七子母秘録治小兒腹脹半夏少許洗搗末酒和丸如粟米大每服二丸生薑湯吞下不差加之日再服又若以火炮之爲末貼臍亦佳又方治五絶一曰自縊二曰墻壓三曰溺水四曰魘魅五曰産乳凡五絶皆以半夏一兩搗篩爲末丸如大豆内鼻孔中即愈此是扁鵲法御藥院治膈壅風痰半夏不計多少酸漿浸一宿温湯洗五七遍去惡氣日中㬠乾搗爲末漿水搜餅子日中乾之再爲末每入生腦子一錢研匀以漿水濃脚丸鷄頭大紗袋盛通風處陰乾每一丸以好茶或薄荷湯下紫虚元君南嶽夫人内傳治卒死半夏末如大豆許吹入鼻中衍義曰半夏今人知去痰不言益脾蓋能分水故也脾惡濕濕則濡而困困則不能制水經曰水勝則瀉一男子夜數如厠或教以生薑一兩碎之半夏湯洗與大棗各三十枚水一升瓷瓶中慢火燒爲熟水時時呷數日已虎掌虎掌味苦温微寒有大毒主心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道除陰下濕風眩生漢中山谷及冤句二月八月採陰乾蜀漆爲之使惡莽草陶隱居云近道亦有形似半夏但皆大四邊有子如虎掌今用多破之或三四片爾方藥亦不正用也唐本注云此藥是由跋宿者其苗一莖莖頭一葉枝丫音鴉脥古協切莖根大者如拳小者如鷄卵都似扁柿四畔有圓牙看如虎掌故有此名其由跋是新根猶大於半夏二三倍但四畔無子牙爾陶云虎掌似半夏即由來以由跋爲半夏釋由跋苗全說鳶尾南人至今猶用由跋爲半夏也禹錫等按蜀本圖經曰其莖端有八九葉花生莖間根周圍有牙然若獸掌也吴氏云虎掌神農雷公苦無毒岐伯桐君辛有毒立秋九月採藥性論云虎掌使味甘不入湯服能治風眩目轉主疝瘕腸痛主傷寒時疾强陰圖經曰虎掌生漢中山谷及冤句今河北州郡亦有之初生根如豆大漸長大似半夏而扁累年者其根圓如寸大者如鷄卵周回生圓牙二三枚或五六枚三四月生苗高尺餘獨莖上有葉如爪五六出分布尖而圓一窠生七八莖時出一莖作穗直上如鼠尾中生一葉如匙裹莖作房傍開一口上下尖中有花微青褐色結實如麻子大熟即白色自落布地一子生一窠九月苗殘取根以湯入器中漬五七日湯冷乃易日换三四遍洗去涎暴乾用之或再火炮今冀州人菜園種之亦呼爲天南星江州有一種草葉大如掌面青背紫四畔有芽如虎掌生三五葉如一本冬青治心痛寒熱積氣不結花實與此名同故附見之由跋主毒腫結熱陶隱居云本出始興今都下亦種之狀如烏翣而布地花紫色根似附子苦酒摩塗腫亦效不入餘藥唐本注云由跋根尋陶所注乃是鳶尾根即鳶頭也由跋今南人以爲半夏頓爾乖越非惟不識半夏亦不知由跋與鳶尾今按陳藏器本草云半夏高三尺生澤中熟地根如小指正員所謂羊眼半夏也由跋苗高一二尺似苣蒻根如鷄卵生林下所謂由跋也禹錫等按蜀本圖經云春抽一莖莖端直八九葉根圓扁而肉白也圖經曰文具半夏條下鳶尾味苦平有毒主蠱毒邪氣鬼疰諸毒破癥瘕積聚大水下三蟲療頭眩殺鬼魅一名烏園生九疑山谷五月采陶隱居云方家云是射干苗無鳶尾之名主療亦異當别一種物方亦有用鳶頭者即應是其根療體相似而本草不顯之唐本注云此草葉似射干而闊短不抽長莖花紫碧色根似高良薑皮黄肉白有小毒嚼之戟人咽喉與射干今别人家亦種所在有之射干花紅抽莖長根黃有臼今陶云由跋正說鳶尾根莖禹錫等按蜀本云此草名鳶尾根名鳶頭亦謂鳶根又圖經葉似射干布地生黑根似高良薑而節大數個相連今所在皆有九月十月採根日乾陳藏器云鳶尾主飛尸游蠱著喉中氣欲絶者以根削去皮内喉中摩病處令血出爲佳大黄大黄將軍味苦寒大寒無毒主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹諸老血留結一名黄良生河西山谷及隴西二月八月採根火乾得芍藥黄苓牡蠣細辛茯苓療驚恚怒心下悸氣得消石紫石英桃人療女子血閉黄苓爲之使無所畏陶隱居云今採益州北部汶山及西山者雖非河西隴西好者猶作紫地錦色味甚苦澀色至濃黑西川陰乾者勝北部日乾亦有火乾者皮小焦而耐蛀堪久此藥至勁利粗者便不中服最爲俗方所重道家時用以去痰疾爾非養性所須也將軍之號當取其駿快矣唐本注云大毒性濕潤而易壞蛀火也易佳二月八月日不烈恐不時燥即不堪矣葉子莖并似羊蹄但粗長而厚其根細者亦似宿羊蹄大者乃如碗長二尺作時燒石使熱横寸截著石上煿之一日微燥乃繩穿眼之至乾爲佳幽并已北漸細氣力不如蜀中者今出宕州凉州羌蜀地皆有其莖味酸堪生啖亦以解熱多食不利人陶稱蜀地者不及隴西誤矣今按陳藏器本草云大黄用之當分别其力若取和厚深沉能攻病者可用蜀中似牛舌片緊硬者若取瀉泄駿快推陳去熱當取河西錦紋者凡有蒸有生有熟不得一概用之禹錫等按蜀本云葉似蓖麻根如大芋傍生細根如牛蒡小者亦似羊蹄又云圖經云高六七尺莖脆藥性論云蜀大黄使去寒熱忌冷水味苦甘消食鍊五臟通女子經候利水腫能破痰實冷熱結聚宿食利大小腸貼熱毒腫主小兒寒熱時疾煩熱蝕膿破留血日華子云宣通一切氣調血脉利關節泄壅滯水氣四肢冷熱不調瘟瘴熱疾利大小便并傅一切瘡癤癰毒廓州馬蹄峽中者次之圖經曰大黄生河西山谷及隴西今蜀川河東陜西州郡皆有之以蜀川錦文者佳其次秦隴來者謂之土蕃大黄正月内生青葉似蓖麻大者如扇根如芋大者如椀長一二尺傍生細根如牛蒡小者亦如芋四月開黄花亦有青紅似蕎麥花者莖青紫色形如竹二月八月採根去黑皮火乾江淮出者曰土大黄一月開黄花結細實又鼎州一種羊蹄大黄療疥瘙又甚效初生苗葉如羊蹄累年長大即葉似商陸而狹尖四月内於押條上出穗五七莖相合花葉同色結實如蕎麥而輕小五月熟即黄色亦呼爲金蕎麥三月採苗五月收實并陰乾九月採根破之亦有錦文日乾之亦呼爲土大黄凡收大黄之法蘇恭云作時燒石使熱橫寸截著石上煿之一日微燥乃繩穿眼之至乾今土大黄往往作横片曾經火爆蜀大黄乃作緊片如牛舌形謂之牛舌大黄二者用之皆等本經稱大黄推陳致新其效最神故古方下積滯多用之張仲景治傷寒用處尤多又有三物備急員司空裴秀爲散用療心腹諸疾卒暴百病其方用大黄乾薑巴豆各一兩須精好者搗篩蜜和更搗一千杵圓如小豆服三圓老小斟量之爲散不及圓也若中惡客忤心腹脹卒痛如錐刀刺痛氣急口噤停尸卒死者以暖水若酒服之若不下捧頭起灌令下喉須臾差未知更與三丸腹當鳴轉即吐下便愈若口已噤亦須拆齒灌之藥入喉即差崔知悌療小兒無辜閃癖瘰癧或頭乾黄聳或乍痢乍差諸狀多者皆大黄煎主之大黄九兩錦文新實者若微朽即不中用削去蒼皮乃秤搗篩爲散以上好米醋三升和之置銅椀中於大鐺中浮湯上炭火煑之火不用猛又以竹木篦攪藥候任丸乃停於小瓷器中貯兒年三歲一服七圓如梧桐子日再服常以下青赤膿爲度若不下膿或下膿少者稍加圓下膿若多者圓又須减病重者或至七八劑方盡根本大人小兒以意量之此藥惟下膿宿結不令兒利須禁食毒物食乳者乳母亦同忌法崔元亮海上方治腰脚冷風氣以大黄二大片切如棋子和少酥炒令酥盡入藥中切不得令黄焦則無力搗篩爲末每日空腹以水大三合入生薑兩片如錢煎十餘沸去薑取大黄末兩錢别置椀子中以薑湯調之空腹頓服如有餘薑湯徐徐呷之令盡當下冷膿及惡物等病即差止古人用藥毒攻病必隨人之虚實而處置非一切而用也姚僧垣初仕梁武帝因發熱欲服大黄僧垣曰大黄乃是快藥至尊年高不可輕用帝勿從幾至委頓元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧垣曰脉洪而實此有宿妨非用大黄無差理帝從而遂愈以此言之今醫用一毒藥而攻衆病以偶中病便謂此方之神奇其差誤乃不言用藥之失如此者衆矣可不戒哉唐本注云葉似蓖麻根如大芋傍生細根如牛蒡圖經云高六七尺莖脆味酸醒酒雷公云凡使細剉内文如水旋斑緊重剉蒸從巳至未㬠乾又灑臘水蒸從未至亥如此蒸七度㬠乾却灑薄蜜水再蒸一伏時其大黄擘如烏膏樣於日中㬠乾用之爲妙聖惠方治時氣發豌豆瘡用川大黄半兩微炒以水一大盞煎至七分去滓分爲二服又方熱病狂語及諸黄用川大黄五兩剉炒微赤搗爲散用臘月雪水五升煎如如膏每服不計時候冷水調下半匙外臺秘要療癖方大黄十兩杵篩醋三升和匀白蜜兩匙煎堪丸如梧桐子大一服三十圓生薑湯吞下以利爲度小者减之千金方治産後惡血衝心或胎衣不下腹中血塊等用錦紋大黄一兩杵羅爲末用頭醋半升同熬成膏圓如梧桐子大患者用温醋七分盞化五圓服之良久下亦治馬墜内損千金翼治婦人血癖痛大黄三兩搗篩以酒二升煮十沸頓服經驗後方治風熱疏積熱風壅消食化氣導血大解壅滯大黄四兩牽牛子四兩半生半熟爲末煉蜜圓如梧桐子大每服茶下一十圓如要微動吃十五圓冬月中最宜服并不搜攪人梅師方治卒外腎偏腫疼痛大黄末醋和塗之乾即易之斗門方治腰痛用大黄半兩更入生薑半兩同切如小豆大於鐺内炒令黃色投水兩椀至五更初頓服天明取下腰間惡血物用盆器盛如雞肝樣即止簡要濟衆治吐血川大黄一兩搗羅爲散每服一錢以生地黄汁一合水半盞煎三五沸無時服廣利方治骨節熱積漸黄瘦大黄四分以童子小便五大合煎取四合去滓空心分爲二服如人行四五里再服傷寒類要療急黄病大黄麤切二兩水三升半漬一宿平旦煎絞汁二升半内芒消二兩絞服須臾當快利姚和衆治小兒腦熱常閉目大黄一分廢剉以水三合浸一宿一歲兒每日與半合服餘者塗頂上乾即再塗别說云謹按大黄收時皆以火燒石煿乾欲速貨賣更無生者用之不須更多炮炙少蒸煮之類也衍義曰大黄損益前書已具仲景治心氣不足吐血衂血瀉心湯用大黄黄芩黃連或曰心氣不足矣而不用補心湯更用瀉心湯答曰若心氣獨不足則不當須吐衂也此乃邪熱因不足以客之故吐衂以苦泄其熱就以若補其心蓋兩全之有是證者用之無不效量虚實用之葶藶葶藶味辛苦寒大寒無毒主癥瘕積聚結氣飲食寒熱破堅逐邪通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱音沸癢利小腹乆服令人虚一名丁歷一名蕇音典蒿一名大室一名大適生藁城平澤及田野立夏後採實陰乾得酒良榆皮爲之使惡僵蠶石龍芮陶隱居云出彭城者最勝今近道亦有母則公薺子細黄至苦用之當熬今按此藥亦療肺壅上氣咳嗽定喘促除胸中痰飲禹錫等按蜀本云苗似薺苨春末生高二三尺花黄角生子黄細五月熟採子暴乾藥性論云葶藶臣味酸有小毒能利小便抽肺氣上喘息急止嗽爾雅云蕇葶藶注實葉皆似芥一名狗薺日華子云利小腸通水氣虚腫圖經曰葶藶生藁城平澤及田野今京東陜西河北州郡皆有之曹州者本勝初春生苗葉六七寸有似薺根白枝莖俱青三月開花微黄結角子偏小如黍米微長黄色立夏後採實暴乾月令孟夏之月靡草死許愼鄭康成注皆云靡草薺葶藶之屬是也至夏則枯死故比時採之張仲景治肺癰喘不得卧葶藶大棗瀉肺湯主之葶藶炒黄色搗末爲圓大如彈子每服用大棗二十枚水三升煎之取二升然後内一彈丸更煎取一升頓服之支飲不得息亦主之崔知悌方療上氣嗽長引氣不得卧或遍體氣腫或單面腫或足腫并主之葶藶子三升微火熬搗篩爲散以清酒五升漬之冬七日夏三日初服如桃許大日三夜一冬日二夜二量其氣力取微利一二爲度如患急困者不得待日滿亦可以綿細絞即服其葶藶單莖向上葉端出角角麤且短又有一種苟芥草葉近根下作奇生角細長取時必須分别前件二種也又篋中方治嗽含膏丸曹州葶藶子一兩紙襯熬令黑知母一兩貝母一兩三物同搗篩以棗肉半兩别銷沙糖一兩半同入藥中和爲丸大如彈丸每服以新綿裹一丸含之徐徐嚥津甚者不過三丸今醫亦多用雷公云凡使勿用赤鬚子眞相似葶藶子只是味微甘苦葶藶子入項苦凡使以糯米相合於焙上微微焙待米熟去米單搗用聖惠方治上氣喘急遍身浮腫用甜葶藶一升隔紙炒令紫色搗令極細用生絹袋盛以清酒五升浸三日後每服抄一匙用粥飲調下日三四服外臺秘要治食飲不得息葶藶子三兩熬令黄搗爲末以水三升煮大棗三十枚得汁一升内藥中每服如棗大煎取七合頓服千金方治腹脹積聚癥瘕葶藶子一升然以酒五升浸七日日服三合千金翼治頭風搗葶藶子以湯淋取汁洗頭止經驗方河東裴氏傳經效治水腫及暴腫葶藶三兩杵六千下令如泥即下漢防己末四兩取緑頭鴨就臼中截頭瀝血於臼中血盡和鴨頭更搗五千下圓如梧桐子甚者空腹白湯下十圓稍可五圓頻服五日止此藥利小便有效如神梅師方治遍身腫浮小便澁葶藶子二兩大棗二十枚以水一大升煎取一小升去棗内葶藶於棗汁煎丸如梧桐子飲下十圓又方治肺壅氣喘急不得卧葶藶子三兩炒大棗三十枚水三升煮棗取二升又煎取一升去滓併二服簡要濟衆治小兒水氣腹腫兼下痢膿血小便澀葶藶子半兩微炒搗如泥以棗肉和搗爲圓如緑豆大每服五圓棗湯下空心晚下量兒大小加减服之續十全方治一切毒入腹不可療及馬汗用葶藶子一兩炒研以水一升浸湯服取下惡血崔氏治水氣葶藶三兩以物盛甑上蒸令熟即搗萬杵若圓得如梧桐子不須蜜和一服五圓漸加至七圓以得微利即佳不可多服令人不甚美食若氣發服之得利氣下定即停此方治水氣無比蕭駙馬患水腫惟服此得差傷寒類要治腎痹唇乾以葶藶主之子母秘録治小兒白秃葶藶搗末以湯洗訖塗上姚和衆治孩兒蛔蟲葶藶子一分生爲末用以水三合煎取一合一日服盡聖惠又方治支飲乆不差大腹水腫喘促不止用甜葶藶三兩隔紙炒令紫色搗如膏每服圓如彈子大以水一中盞入棗四枚煎至五分去滓非時服衍義曰葶藶用子子之味有甜苦兩等其形則一也然既言味辛苦即甜者不復更入藥也大概治體皆以行水走泄爲用故曰久服令人虚蓋取苦泄之義其理甚明藥性論所說盡矣但不當言味酸桔梗桔梗味辛苦微温有小毒主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣利五臟腸胃補血氣除寒熱風痹温中消穀療喉咽痛下蠱毒一名利如一名房圖一名白藥一名梗草一名薺苨生嵩高山谷及冤句二月採根暴乾節皮爲之使得牡蠣遠志療恚怒得消石石膏療傷寒畏白及龍眼龍膽陶隱居云近道處處有葉名隱忍二三月生可煮食之桔梗療蠱毒甚驗俗方用此乃名薺苨今别有薺苨能解藥毒所謂亂人參者便是非此桔梗而葉甚相似但薺苨葉下光明滑澤無毛爲異葉生又不如人參相對者爾唐本注云人參苗似五加闊短莖圓有三四椏椏頭有五葉陶引薺苨亂人參謬矣且薺苨桔梗又有葉差互者亦有葉三四對者皆一莖直上葉既相亂惟以根有心無心爲别爾禹錫等按藥性論云桔梗臣味苦平無毒能下痢破血去積氣消積聚痰涎主肺氣氣促嗽逆除腹中冷痛主中惡及小兒驚癇日華子云下一切氣止霍亂轉筋心腹脹痛補五勞養氣除邪辟瘟補虚消痰破癥瘕養血排膿補内漏及喉痹㿌毒以白粥解之圖經曰桔梗生嵩高山谷及冤句今在處有之根如小指大黄白色春生苗莖高尺餘葉似杏葉而長橢四葉相對而生嫩時亦可煑食之夏開花紫碧色頗似牽牛子也秋後結子八月採根細剉暴乾用葉名隱忍其根有心無心者乃薺苨也而薺苨亦能解毒二物頗相亂但薺苨葉下光澤無毛爲異關中桔梗根黄頗似蜀葵根莖細青色葉小青色似菊花葉古方亦單用之古今録驗療卒中蠱下血如雞肝者晝夜出血石餘四藏皆損惟心未毁或鼻破待死者取桔梗搗屑以酒服方寸七日三不能下藥以物校口開灌之心中當煩須臾自定服七日止當食猪肝臛以補之神良集驗方療胸中滿而振寒脉數咽燥不渴時時出濁唾腥臭久久吐膿如粳米粥是肺癰治之以桔梗甘草各二兩炙以水三升煑取一升分再服朝暮吐膿血則差也雷公云凡使勿用木梗眞似桔梗咬之只是腥澁不堪凡使去頭上尖硬二三分已來并兩畔附枝子於槐砧上細剉用百合水浸一伏時漉出緩火熬令乾用每修事四兩用生百合五分搗作膏投於水中浸聖惠方治馬喉痹并毒氣壅塞用桔梗二兩去蘆頭剉以水三大盞煎至一盞去滓不計時分温三服又方妊娠中惡心腹疼痛用桔梗一兩細剉水一中盞入生薑三片煎至六分去滓非時温服外臺秘要治卒客忤停尸不能言者燒桔梗一兩末米飲服仍吞麝香如豆大許佳千金方治喉閉并毒氣桔梗二兩水三升煮取一升頓服又方鼻衂方桔梗爲末水服方寸七日四五亦止吐下血百一方若被打擊瘀血在腸内久不消時發動者取桔梗末熟水下刀圭經驗後方治骨曹風牙疼腫桔梗爲末棗穰和圓如皂子大綿裹咬之腫則荆芥湯漱之簡要濟衆治痰嗽不定喘急桔梗一兩半搗羅爲散用童子小便半升煎取四合去滓温服子母秘録治小兒卒客忤死燒桔梗末三錢七飲服杜壬治上焦有熱口舌咽中生瘡嗽有膿血桔梗一兩甘草二兩右爲末每服二錢水一盞煎六分去滓温服食後細呷之亦治肺壅梅師方治卒蠱毒下血如鵝肝晝夜不絶臟腑敗壞桔梗搗汁服七合佳衍義曰桔梗治肺熱氣奔促嗽逆肺癰排膿陶隱居云俗方用此乃名薺苨今别薺苨所謂亂人參者便是非此桔梗也唐本注云陶引薺苨亂人參謬矣今詳之非也隱居所言其意止以根言之所以言亂人參唐本注却以苗難之乃本注誤矣莨菪莨音浪菪音蕩子味苦甘寒有毒主齒痛出蟲肉痹拘急使人健行見鬼療癲狂風癇顚倒拘攣多食令人狂走乆服輕身走及奔馬强志益力通神一名橫唐一名行唐生海濱川谷及雍州五月採子陶隱居云今處處有子形頗似五味核而極小惟入療顚狂方用尋此乃不可多食過劑爾久服自無嫌通神健行足爲大益而仙經不見用今方家多作狼唐今按陳藏器本草云莨菪子主痃癖安心定志聰明耳目除邪逐風變白性温不寒取子暴乾隔日空腹水下一指捻勿令子破破即令人發狂亦用小便浸之令吸小便盡曝乾依前服之禹錫等按蜀本圖經云葉似王不留行菘藍等莖葉有細毛花白子殻作罌子形實扁細若粟米許青黄色所在皆有六月七月採子日乾藥性論云莨菪亦可單用味苦辛微熱有大毒生能瀉人見鬼拾針狂亂熟炒止冷瀉主齒痛蚛牙孔子咬之蟲出石灰清煑一伏時掬出去牙暴乾以附子乾薑陳橘皮桂心厚朴爲圓去一切冷氣積年氣痢甚温暖熱發用緑豆汁解之焦炒碾細末治下部脫肛日華子云温有毒甘草升麻犀角并能解之燒熏蚛牙及洗陰汗圖經曰莨菪子生海濱川谷及雍州今處處有之苗莖高二三尺許葉似地黄王不留行紅藍等而三指闊四月開花紫色苗莢莖有白毛五月結實有殻作罌子狀如小石榴房中子至細青白如米粒一名天仙子五月採子陰乾謹按本經云莨菪性寒後人多云大熱而史記淳於意傳云淄川王美人懷子而不乳意飲以莨菪藥一撮以酒飲之旋乳且不乳豈熱藥所治又古方主卒癲狂又多單用莨菪不知果性寒邪小品載治癲狂方云取莨菪三升作末酒一升漬數日出搗之以向汁和絞去滓湯上煎令可圓服如小豆三圓日三當覺口面急頭中有蟲行額及足手有赤色處如此便是差候未知再服取盡神良又篋中方主腸風莨菪煎取莨菪實一升治之暴乾搗篩生薑半斤取汁二物相和銀鍋中更以無灰酒二升投之上火煎令如稠餳即旋投酒度用酒可及五升以來即止煎令可圓如梧子每日酒飲通下三圓增至五七圓止若圓時粘手則菟絲粉襯隔煎熬切戒火緊則藥易焦而失力矣初服微熱勿怪疾甚者服過三日當下利疾去利亦止絶有效雷公云凡使勿令使蒼冥子其形相似只是服無效時人多用雜之其蒼冥子色微赤若修事十兩以頭醋一鎰煑盡醋爲度别用黄牛乳汁黑即是莨菪子大毒㬠乾别搗重篩用勿誤服衝人心大煩悶眼生暹火别說云謹按莨菪之功未見如所說而其毒有甚煑一二日而牙方生用者宜審之草蒿草蒿味苦寒無毒主疥瘙痂癢惡瘡殺虱留熱在骨節間明目一名青蒿一名方潰生華陰川澤陶隱居云處處有之即今青蒿人亦取雜香菜食之唐本注云此蒿生挼傅金瘡大止血生肉止疼痛良也今按陳藏器本草云草蒿主鬼氣尸疰復連婦人血氣腹内滿及冷熱乆痢秋冬用子春夏用苗并搗絞汁服亦暴乾爲末小便中服如覺冷用酒煮又燒爲灰紙八九重淋取汁和石灰去息肉黶子禹錫等按蜀本圖經云葉似茵蔯蒿而背不白高四尺許四月五月採苗日乾江東人呼爲𤜦蒿爲其臭似𤜦北人呼爲青蒿爾雅云蒿菣釋曰蒿一名菣詩小雅云食野之蒿陸機云青蒿也荆豫之間汝南汝陰皆云菣孫炎云荆楚之間謂蒿爲菣郭云今人呼青蒿香中炙啖者爲菣是也日華子云青蒿補中益氣輕身補虚駐顔色長毛髮髮黑不老兼去蒜髮心痛熱黄生搗汁服并傅之瀉痢飯飲調末五錢七燒灰和石灰煎治惡毒瘡并莖亦用又云子味甘冷無毒明目開胃炒用治勞壯徤人小便浸之治惡瘡疥癬風𤺋殺虱煎洗又云臭蒿子凉無毒治勞下氣開胃止盜汗及邪氣鬼毒又名草蒿圖經曰草蒿即青蒿也生華陰川澤今處處有之春生苗葉極細嫩時人亦取雜諸香菜食之至夏高三五尺秋後開細淡黄花花下便結子如粟米大八九月間採子陰乾根莖子葉并入藥用乾者炙作飲香尤佳青蒿亦名方潰凡使子勿使葉使根勿使莖四者若同反以成疾得童子小便浸之良治骨蒸熱勞爲最古方多單用者葛氏治金刃所傷取青蒿搗傅上以帛裹創血止即愈崔元亮海上方療骨蒸鬼氣取童子小便五大斗澄過青蒿五斗八九月採帶子者最好細剉二物相和内好大釜中以猛火煎取三大斗去滓淨洗令乾再瀉汁安釜中以微火煎可取二大斗即取猪膽十枚相和煎一大斗半除火待冷以新瓷器盛每欲服時取甘草二三兩熟炙搗末以煎和搗一千杵爲圓空腹粥飲下二十圓漸增至三十圓止雷公云凡使惟中爲妙到膝即仰到腰即俯使子勿使葉使根勿使莖四件若同使翻然成痼疾採得葉不計多少用七歲兒七個溺浸七日七夜後漉出㬠乾用之食療云青蒿寒益氣長髮能輕身補中不老明目煞風毒搗傅瘡上止血生肉最早春便生色白者是自然香醋淹爲菹益人治骨蒸以小便漬一兩宿乾末爲圓甚去熱勞又鬼氣取子爲末酒服之方寸七差燒灰淋汁和石灰煎治惡瘡瘢靨百一方治蜂螫人嚼青蒿傅瘡上即差斗門方治丈夫勞痩青蒿細剉水三升童子小便五升同煎取一升半去滓入器中煎成膏圓如梧桐子大空心臨卧以温酒吞下二十圓衍義曰草蒿今青蒿也在處有之得春最早人剔以爲蔬根赤葉香今人謂之青蒿亦有所别也但一類之中又取其青色者陜西綏銀之間有青蒿在蒿叢之間時有一兩窠迥然青色土人謂之爲香蒿莖葉與常蒿一同但常蒿色淡青此蒿色深青故氣芬芳恐古人所用以深青者爲勝不然諸蒿何嘗不青旋覆花旋覆花味鹹甘温微冷利有小毒主結氣脅下滿驚悸除水去五臟間寒熱補中下氣消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肉目中眵音嗤䁾音蔑利大腸通血脉益色澤一名戴椹一名金沸草一名盛椹其根主風濕生平澤川谷五月採花日乾二十日成陶隱居云出近道下濕地似菊花而大又别有旋葍根出河南來北國亦有形似芎藭惟合旋葍膏用之餘無所入非此覆花根也唐本注云旋覆根在中品陶云苗似薑根似高良薑而細此是山薑證不是旋覆根今復道從北國來似芎藭芎藭與高良薑全無仿佛爾禹錫等按蜀本圖經云旋覆花葉似水蘇花黄如菊今所在皆有六月至九月採花藥性論云旋覆花使味甘無毒主肋脅氣下寒熱水腫主治膀胱宿水去逐大腹開胃止嘔逆不下食爾雅云蕧盜庚注旋覆似菊疏復一名盜庚也蕭炳云旋覆用花葍旋用根日華子云無毒明目治頭風通血脉葉止金瘡血圖經曰旋覆花生平澤川谷今所在有之二月已後生苗多近水傍大如紅藍而無刺長一二尺已來葉似柳莖細六月開花似菊花銅錢大深黃色上黨田野人呼爲金錢花七月八月採花暴乾二十日成今近都人家園囿所蒔金錢花花葉并如上說極易繁盛恐即旋覆也張仲景治傷寒汗下後心下痞堅噫氣不除有七物旋覆代赭湯雜治婦人有三物旋覆湯胡洽有除痰飲在兩脅脹滿等疾旋覆花圓用之者尤多也雷公云凡採得後去裹花蕊殻皮并蒂子取花蘂蒸從已至午㬠乾用外臺秘要救急續斷筋法取旋覆花草根淨洗土搗量瘡大小傅之日一二易以差爲度又方破斫筋斷者以旋覆根搗汁瀝瘡中仍用滓封瘡上十五日即斷筋便續此方出蘇景仲家獠奴用效經驗後方治中風及壅滯以旋覆花洗塵令淨搗末煉蜜圓如梧桐子大夜卧以茶湯下五圓至七圓十圓梅師方治金瘡止血搗旋覆花苗傅瘡即止衍義曰旋覆花葉如大菊又如艾蒿七八月有花大如梧桐子花淡黃緑繁茂圓而覆下亦一異也其香過如菊行痰水去頭目風其味甘苦辛亦走散之藥也其旋花四月五月有花别一種非此花也第八卷已具之圖經衍義本草卷之十六
