body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正菜部上品冬葵冬葵子味甘寒無毒主五臟六腑寒熱羸瘦五癃利小便療婦人乳難内閉久服堅骨長肌肉輕身延年生少室山十二月採之黄苓爲之使葵根味甘寒無毒主惡瘡療淋利小便解蜀椒毒葉爲百菜主其心傷人圖經曰冬葵子生少室山今處處有其子是秋種葵覆養經冬至春作子者謂冬葵子古方入藥用最多苗葉作菜茹更甘美大抵性滑利能宣導積壅服丹石人尤相宜煮汁單飲佳仍利小腸孕婦臨産煮葉食則胎滑易産暴乾葉將燒灰同作末主金瘡根主惡瘡小兒吞錢煮汁飲之出陶隱居云以秋種葵覆養經冬至春作子謂之冬葵多入藥用至滑利能下石春葵子亦滑不堪餘藥用根故是常葵爾葉尤冷利不可多食日華子云冬葵久服堅筋骨秋葵即是種早者俗呼爲葵菜禹錫云按藥性論云冬葵子臣滑平能治五臟及奶腫能下乳汁根治惡瘡小兒吞錢不出煮飲之即出神妙若患天行病後食之頓喪明以葉燒灰及搗乾葉末治金瘡煮汁能滑小腸單以汁主治時行黄病孟詵云葵冷主疳瘡生身面上汁黄者可取根作灰和猪脂塗之其性冷若熱食之亦令人熱悶甚動風氣乆服丹石人時吃一頓佳也冬月葵菹汁服丹石人發動舌乾咳嗽每食後飲一盞便卧少時其子患瘡者吞一粒便作頭女人産時可煮頓服之佳若生時困悶以子一合水二升煮取半升去滓頓服之少時便産食療云主患腫未言頭破者三日後取葵子一百粒吞之當日瘡頭開又凡有難産若生未得者取一合搗破以水二升煮取一升已下只可半升去滓頓服之則小便與兒便出外臺秘要云天行斑瘡須臾遍身皆戴白漿此惡毒氣永徽四年此瘡自西域東流於海内但煮葵菜葉以蒜齏啖之則止聖惠方小兒發斑散惡毒氣用生葵菜葉絞取汁少少與服之千金方小兒死腹中葵子末酒服方寸七若口噤不開格口灌之藥下即活肘後方同又方妊娠患淋葵子一升水三升煮取二升分爲二服無葵子用葵根一把肘後方大便不通十日至一月葵子三升水四升煮取一升去滓服不差更服又方治卒關格大小便不通脹滿欲死葵子二升水四升煮取一升頓服内猪脂如鷄子一丸則彌佳經驗後方治一切癰腫無頭以葵菜子一粒新汲水吞下須臾即破如要兩處破服兩粒要破處逐粒加之驗必效方治諸瘻先以泔清温洗以綿拭水取葵菜微火煖貼之瘡引膿不過二三百葉膿頭出肉生忌諸雜厭及房室等産寳方治妬乳及癰葵莖及子爲末酒服方寸七愈産書方治倒生手足冷口噤以葵子炒令黄擣末酒服二錢七則順衍義曰冬葵子葵菜子也四方皆有苗性滑利不益人患癰癤毒熱内攻未出膿者水吞三五枚遂作竅膿出蕪菁蕪菁及蘆菔味苦温無毒主利五臟輕身益氣可長食之蕪菁子主明目圖經曰蕪菁及蘆菔舊不著所出州土今南北皆通有之蕪菁即蔓菁也蘆菔即下萊菔今俗呼蘿蔔是也此二菜北土種之尤多蕪菁四時仍有春食苗夏食心亦謂之苔子秋食莖冬食根河朔尤多種亦可以備饑歲菜中之最有益者惟此耳常食之通中益氣令人肥健菔音蔔陶隱居云蘆菔是今温菘其根可食葉不中啖蕪菁根乃細於温菘而葉似菘好食西川惟種此而其子與温菘甚相似小細爾陳藏器云按本草蕪菁主急黄黃疸及内黄腹結不通擣爲末水絞汁服當得嚏鼻中出黄水及下痢孟詵云蕪菁消食下氣其子九蒸九暴摶爲粉服之長生壓油塗頭能變蒜髮又研子入面脂拯去皺又搗子水和服治熱黄結腹不通少頃當瀉一切惡物沙石草髮并出又利大小便及治妬乳腫取其根生擣後和鹽醋漿水煮取汁洗之五六度差又擣和雞子白封之亦妙食療云温下氣治黄疸利小便根主消渴治熱毒風腫食令人氣脹滿傷寒類要神仙教子法立春後有庚子日温蕪菁汁合家大小并服不限多少可理時疾崔元亮海上方但腫子不壞者療十得九愈蔓菁子六升一物蒸之看氣遍合甑下釜中熱湯淋乃暴令乾還淋如是三遍即取杵篩爲末食上清酒服二寸七日再塗膏亦有用者聖惠方治風疹入腹身體强舌乾燥便用蔓菁子三兩爲末每服温酒下一錢七外臺秘要方治心腹脹蔓菁子一大合揀淨擣熟研水一升更和研瀘取汁可得一盞頓服之少頃轉利或自吐腹中自寬或得汗愈又方治廪疽著手足肩背累累如米起色白刮之汁出復發熱蕪菁子熟擣帛裹傅之即止千金方常服明目洞視肥腸蕪菁子三升以苦酒三升煮令熟日乾末下篩以井花水服方寸七加至三七日三無所忌肘後方治豌豆瘡蔓菁根搗汁挑瘡破傅上三食頃即出葛氏方卒腫毒起急痛蕪菁根大者削去上皮熟搗苦酒和如泥煮三沸急攪之出傅腫帛裹上日再三易之經驗後方治虚勞目暗採三月蔓菁花陰乾爲末以井花水空心調下二錢七久服長生集療方男子陰腫甚及大核痛人所不能治者蕪菁根搗傅之子母秘録方治妊娠小便不利蕪菁子末水服方寸七日二楊氏産乳方同衍義曰蕪菁蘆菔二菜也蘆菔即蘿蔔也蕪菁今世俗謂之蔓菁夏則苦當此之時蔬園中復種之謂之鷄毛菜食心正在春時諸菜之中有益無損於世有功採擷之餘收子爲油根多食動氣河東太原所出極大他處不及也又出吐谷中後於萊菔條中爾雅釋但名蘆菔今謂之蘿蔔是也則蕪菁條中不合更言及蘆菔二字顯見重復從爾雅爲正瓜蒂瓜蒂味苦寒有毒主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之去鼻中息肉療黄疸花主心痛咳逆生嵩高平澤七月七日採陰乾圖經曰瓜蒂即甜瓜蒂也生嵩高平澤今處處有之亦園圃所蒔舊說瓜有青白二種入藥當用青瓜蒂七月採陰乾方書所用多入吹鼻及吐膈散中莖亦主鼻中息肉齆鼻等葉主無髮搗汁塗之即生花主心痛咳逆肉主煩渴除熱多食則動痼疾又有越瓜色正白生越中胡瓜黄色亦謂之黄瓜别無可用食之亦不益人故可略之陶隱居云瓜蒂多用早青蒂此云七月採便是甜瓜蒂也人亦有用熟瓜蒂者取吐乃無異此止於論其蒂所主爾今瓜例皆冷利早靑者尤甚熟瓜乃有數種除瓤食之不害人若覺多即入水自漬便即消今按甜瓜有靑白二種入藥當用青瓜蒂前條白瓜子唐注云甘瓜子主腹内結聚破潰膿血最爲腸胃脾内壅要藥正是此甜瓜子之功前條便以白瓜子爲甘瓜子非也日華子云無毒治腦塞熱病眼昏吐痰禹錫云按藥性論云瓜蒂使莖主鼻中息肉齆鼻和小豆丁香吹鼻治黄疸雷公云凡使勿用白瓜蒂要採取青緑色瓜待瓜氣足其瓜蒂自然落在蔓莖上採得未用時使榔榔葉裹於東墻有風處挂令吹乾用食療云瓜蒂主身面四肢浮腫殺蠱去鼻中息肉陰黄黄疸及暴急黄取瓜蒂丁香各七枚小豆七粒爲末吹黑豆許於鼻中少時黄水出差聖惠方治鼻中息肉陳瓜蒂一分爲末羊脂和少許傅息肉上日三經驗方治遍身如金色瓜蒂四十九個須是六月六日收者丁香四十九個用甘鍋子燒烟盡爲度細研爲末小兒用半字吹鼻内及揩牙大人只用一字吹鼻内立差傷寒類要方治黄疸目黃不除瓜丁散瓜丁爲細末如大豆許内鼻中令病人深吸取鼻中黄水出而歇衍義曰瓜蒂此即甜瓜蒂也去瓜皮用蒂約半寸許暴極乾不限多少爲細末量疾每用一二錢七膩粉一錢七以水半合同調匀灌之治風涎暴作氣塞倒卧服之良久涎自出或覺有涎用諸藥行化不下但如此服涎即出或服藥良久涎未出含沙糖一塊下咽即涎出此物甚不損人全勝石碌硇砂輩白冬瓜味甘微寒主除小腹水脹利小便止渴陶隱居云被霜後合取置經年破取核水洗燥乃擂取人用之冬瓜性冷利解毒消渴止煩悶直搗絞汁服之日華子云冬瓜冷無毒除煩治胸膈熱毒癰腫毒及蜂疔藤燒灰可出綉點黯洗黑䵟并洗瘡疥濕穰亦可漱練白縑禹錫云按藥性論云冬瓜練亦可單用味甘平汁止煩躁熱練壓丹石毒止熱渴利小腸能除消渴差五淋孟詵云冬瓜益氣耐老除胸心滿去頭面熱熱者食之佳冷者食之瘦也肘後方治發背欲死方取冬瓜截去頭合瘡上瓜當爛截去更合之瓜未盡瘡已斂小矣即用膏養之古今録驗方治患痢日乆津液枯竭四肢浮腫口乾冬瓜一枚黄土泥厚裹五寸煨令爛熟去土絞汁服之兵部手集方治水病初得危急冬瓜不限多少任吃神效無比衍義曰白冬瓜一二斗許大冬月收爲菜壓去汁蜜煎代果患發背及一切癰疸削一大塊置瘡上熱則易之分散熱毒氣甚良白瓜白瓜子味甘平寒無毒主令人悦澤好顔色益氣不饑乆服輕身耐老主除煩滿不樂久服寒中可作面脂令面悅澤一名水芝一名白爪子生嵩高平澤冬瓜人也八月採爪則巧切圖經曰白瓜子即冬瓜人也生嵩高平澤今在處有之皆園圃所蒔其實生苗蔓下大者如桶而更長皮厚而有毛初生靑緑經霜則白者塗粉其中肉及子亦白故謂之白瓜人家多藏蓄彌年作菜果入藥須霜後合取置之經年破出核洗燥乃擂取人用之亦堪單作服餌又有末作湯飲又作面藥并令人顔色光澤宗懔荆楚歲時記云七月採瓜犀以爲面脂犀瓣也瓤亦堪作澡豆其肉主三焦渴疾解積熱利大小腸壓丹石毒日華子云冬瓜人去皮膚風剥黑䵟潤肌膚外臺秘要云補肝散治男子五勞七傷明目白瓜子七升絹袋盛絞沸湯中三遍訖以酢五升浸一宿暴乾搗下篩酒服方寸七日三乆服差孫眞人方治多年損傷不差熬瓜子末温酒服之衍義曰白瓜子實冬瓜人也服食中亦稀用莧實莧實味甘寒無毒主青盲白翳明目除邪利大小便去寒熱殺蛔蟲乆服益氣力不饑輕身一名馬莧一名莫實細莧亦同生淮陽川澤及田中葉如藍十一月採食療云葉食動氣令人煩悶冷中損腹不可與鱉肉同食生鱉癥及取鱉甲如豆片大者以莧菜封裹之置於土坑内上以土蓋之一宿盡變成鱉兒也又五月五日採莧菜和馬齒莧爲末等分調與妊娠服之易産衍義曰莧實入藥亦稀苗又謂之人莧人多食之莖高而葉紅可淹菜用紅黄二色者謂之紅人莧胡荽味辛温一云微寒微毒消穀治五臟補不足利大小腸通小腸氣拔四肢熱止頭痛療沙𤺋豌豆瘡不出作酒散之立出通心竅久食令人多忘發腋臭脚氣根發痼疾子主小兒秃瘡油煎傅之亦主蠱五痔及食肉中毒下血煮冷取汁服并州人呼爲香荽入藥炒用孫眞人云食之令人多忘發痼疾腋臭𧏾齒口氣臭金瘡疾食療云平利五臟補筋脉主消穀能食若食多則令人多忘外臺秘要方主齒疼胡𦳮子五升應是胡荽子也以水五升煮取一升含之經驗後方治小兒𤺋豆欲令速出宜用胡荽二三兩切以酒二大盞煎令沸沃胡荽便以物合定不令泄氣候冷去滓微微從項已下噴一身令遍除面不噴必效方主蠱毒神驗以根絞汁半升和酒服之立下又治熱氣結滯經年數發以半斤五月五日採陰乾水七升煮取一升半去滓分服未差更服春夏葉秋冬根莖并用亦可預備之兵部手集方治孩子赤丹不止以汁傅之差譚氏方同子母秘録方治肛帶出切一升燒以烟熏肛即入菘菘味甘温無毒主通利腸胃除胸中煩解酒渴菘音嵩日華子云凉微毒多食發皮膚風瘙癢梗長葉痩高者爲菘葉闊厚短肥而痹及梗細者爲蕪菁葉也食療云温治消渴又發諸風冷有熱人食之亦不發病即明其性冷本草云温未解又消食亦少下氣九英菘出河西葉及大根亦粗長和羊肉甚美常食之都不見發病其冬月作菹煮作羹食之能消宿食下氣聖惠方治酒醉不醒用菘菜子二合細研井花水一盞調爲二服食醫心鏡方主通利腸胃除胸中煩熱解酒渴菘菜二斤煮作羹啜之止渴作齏菹食傷寒類要方辟温病菘菜如粟米酒服方寸七日三辟五年温衍義曰菘菜張仲景傷寒論凡用甘草皆禁菘菜者是此菘菜也葉如蕪菁緑色差淡其味微苦葉嫩稍闊不益中虚人食之覺冷苦菜味苦寒無毒主五臟邪氣厭穀胃痹腸澼渴熱中疾惡瘡乆服安心益氣聰察少卧輕身耐老耐饑寒高氣不老一名荼苦一名選一名游冬生益州川谷山陵道傍凌冬不死三月三日採陰乾厭於叶反伏也陶隱居云疑此即是今茗茗一名茶又令人不眠亦凌冬不彫而嫌其止生益州益州乃有苦菜正是苦𧄹爾上卷上品白英下已注之桐君録云苦菜三月生扶疏六月華從葉出莖直黄八月實黑實落根復生冬不枯𧄹音式衍義曰苦菜四方皆有在北道則冬彫斃生南方則冬夏常靑此月令小滿節後所謂苦菜秀者是此葉如苦苣更狹其緑色差淡折之白乳汁出常常點瘊子自落味苦花與野菊相似春夏秋皆旋開花去中熱安心神黄蜀葵花治小便淋及催生又治諸惡瘡膿水久不差者作末傅之即愈近道處處有之春生苗葉與蜀葵頗相似葉尖狹多刻缺夏末開花淺黄色六七月採之陰乾用圖經曰文具附冬葵條下經驗後方治臨産催産以黃蜀葵子焙乾爲末井花水下二錢七如無子以根細切煎汁令濃滑待冷服之衍義曰蜀葵四時取紅單葉者根陰乾治帶下排膿血惡物極驗黄蜀葵花與蜀葵别種非爲蜀葵中黃者也葉心下有紫檀色摘之剔爲數處就日乾之不爾即浥爛瘡家爲要藥子臨産時取四十九粒研爛用温水調服良久産蜀葵味甘寒無毒久食鈍人性靈根及莖并主客熱利小便散膿血惡汁葉燒爲末傅金瘡煮食主丹石發熱結擣碎傅火瘡又葉炙煮與小兒食治熱毒下痢及大人丹痢擣汁服亦可恐腹痛即暖飲之葵花冷無毒治小兒風𤺋子冷無毒治淋澀通小腸催生落胎療水腫治一切瘡疥并瘢疵土靨花有五色白者療痎瘧去邪氣陰乾末食之小花者名錦葵一名茙葵功用更强圖經曰凡葵有數種有蜀葵爾雅所謂菺茙葵者是也菺古田切爾雅云菺茙葵釋曰菺一名茙葵郭璞日蜀葵也似葵華如槿花戎蜀蓋其所自因以名之孫眞人云食之狗咬瘡不差又能鈍人情性千金方治橫生倒産末葵花酒服方寸七經驗後方治癰毒無頭杵蜀葵末傅之聖惠方治婦人白帶下臍腹冷痛面色痿黄日漸虚困以白葵花一兩陰乾爲末空心温酒下二錢匕如赤帶下用赤花衍義日文具附黄蜀葵花條下甜瓜寒有毒止渴除煩熱多食令人陰下濕癢生瘡動宿冷病發虚熱破腹又令人惙惙弱脚手無力少食即止渴利小便通三焦間擁塞氣兼主口舌鼻瘡禹錫云按日華子云無毒葉治人無髮擣汁塗之即生圖經曰文具附瓜蒂條下陳藏器序云甘瓜子止月經太過爲末去油水調服食醫心鏡云治熱去煩渴取甜瓜去皮食後喫之煮皮作羹亦佳孫眞人食忌患脚氣人勿食甜瓜其患永不除又五月甜瓜沉水者殺人又多食發黄疸病動冷氣令人虚羸解藥力兩蒂者殺人千金方治口臭杵乾甜瓜子作末蜜和丸每旦洗淨漱含一丸如棗核大亦用傅齒衍義曰甜瓜暑月服之永不中暑氣多食未有不下痢者貧下多食至深秋作痢爲難治爲其消損陽氣故也亦可以如白甜瓜煎漬收薺味甘温無毒主利肝氣和中其實主明目目痛陶隱居云薺類又多此是今人可食者葉作菹羹亦佳詩云誰謂荼苦其甘如薺是也日華子云薺菜利五臟根療目疼陳士良云實亦呼菥蓂子主壅去風毒邪氣明日去障翳解熱毒久食視物鮮明四月八日收實良其花將去席下辟蟲禹錫云按藥性論云薺子味甘平患氣人食動冷疾主靑盲病不見物補五臟不足其根葉燒灰能治赤白痢極效孟詵云薺子入治眼方中用不與麫同食令人背悶服丹石人不可食聖惠方治暴赤眼疼痛滲澁薺菜根汁點目中邪蒿味辛温平無毒似青蒿細軟主胸膈中臭爛惡邪氣利腸胃通血脉續不足氣生食微動風氣作羹食良不與胡荽同食令人汗臭氣食醫心鏡云治五臟邪氣厭穀者治脾胃腸澼大渴熱中暴疾惡瘡煮令熟和醬醋食同蒿平主安心氣養脾胃消水飲又動風氣熏人心令人氣滿不可多食羅勒味辛温微毒調中消食去惡氣消水氣宜生食又療齒根爛瘡爲灰用甚良不可過多食壅關節澀榮衛令血脉不行又動風發脚氣患啘取汁服半合定冬月用乾者煮之子主目翳及物入目三五顆致目中少頃當濕脹與物俱出又療風赤眵淚根主小兒黄爛瘡燒灰傅之佳北人呼爲蘭香爲石勒諱也圖經曰此有三種一種堪作生菜一種葉大二十步内聞香一種似紫蘇葉陶隱居云術家取羊角馬蹄燒作灰撒於濕地遍踏之即生俗呼爲西王母菜食之益人外臺秘要云治面上滅瘢方木蘭香一斤以三歲米醋浸令没百日出暴乾爲末以傅之用醋漿漬百日出日乾末服方寸七石胡荽寒無毒通鼻氣利九竅吐風痰不任食亦去翳熟挼内鼻中翳自落俗名鵝不食草芥味辛温無毒歸鼻主除腎邪氣利九竅明耳目安中久食温中圖經曰芥舊不著所出州土今處處有之似菘而有毛味極辛辣此所謂靑芥也芥之種亦多有紫芥莖葉純紫多作齏者食之最美有白芥子粗大色白如粱米此入藥者最佳陶隱居云似菘而有毛味辣好作菹亦生食其子可藏冬瓜又有莨以作菹甚辣快唐本注云此芥有三種葉大粗者葉堪食子入藥用熨惡疰至良葉小子細者葉不堪食其子但堪爲齏爾又有白芥子粗大白色如白粱米甚辛美從戎中來别録云子主射工及疰氣發無常處丸服之或搗爲末醋和塗之隨手有驗衍義曰芥似蕪菁葉上紋皺起色尤深緑爲異子與苗皆辛子尤甚多食動風一品紫芥與此無異紫色可愛人多食之然亦動風又白芥子比諸芥稍大其色白入藥用萊菔根味辛甘温無毒散服及炮煮服食大下氣消穀去痰癖肥健人生搗汁服主消渴試有大效菔音匐唐本注云陶謂温菘是也其嫩葉作生菜食之大葉熟啖消食和中根效在蕪菁之右爾雅云葖蘆萉釋曰紫花菘也俗呼温菘似蕪菁大根一名葖俗呼雹葖一名蘆菔今謂之蘿蔔是也蕭炳云蘿蔔根消食利關節理顔色練五臟惡氣制麫毒凡人飲食過度生嚼下之便消研如泥制麫作餺飥佳飽食亦不發熱亦主肺嗽吐血酥煎食下氣衍義曰萊菔根即前條所謂蘆菔今人止謂之蘿蔔河北甚多登萊亦好服地黄何首烏人食之則令人髭髮白世皆言草木中惟此下氣速者爲其辛也不然如生薑芥子又辛也何止能散而已萊菔辛而又甘故能散緩而又下氣速也散氣用生薑下氣用萊菔荏子味辛温無毒主咳逆下氣温中補體葉主調中去臭氣九月采陰乾陶隱居云荏狀如蘇大白色不甚香其子研之雜米作糜甚肥美下氣補益東人呼爲䔡以其似蘇字但除禾邊故也笮其子作油用煎之即今油帛及和漆所用者服食斷穀亦用之名爲重油胡瓜葉味苦平小毒主小兒閃癖一歲服一葉已上斟酌與之生挼絞汁服得吐下根擣傅胡刺毒腫其實味甘寒有毒不可多食動寒熱多瘧病積寒熱發疰氣令人虚熱上逆少氣發百病及瘡疥損陰血脉氣發脚氣天行後不可食小兒切忌滑中生疳蟲不與醋同食北人亦呼爲黃瓜爲石勒諱因而不改千金髓水病肚脹至四肢腫胡瓜一個破作兩片不出子以醋者一半水煮一半俱爛空心頓服須臾下水越瓜味甘寒利腸胃止煩渴不可多食動氣發諸瘡令人虚弱不能行不益小兒天行病後不可食又不得與牛乳酪及鮓同餐及空心食令人心痛禹錫云按陳藏器云越瓜大者色正白越人當果食之利小便去煩熱解酒毒宣泄熱氣小者糟藏之爲灰傅口吻瘡及陰莖熱瘡白芥味辛温無毒主冷氣色白甚辛美從西戎來子主射工及疰氣上氣發汗胸膈痰冷面黃生河東圖經曰文具芥條下日華子云白芥能安五臟功用與芥頗同子燒灰服可辟邪魅千金方治反胃吐食上氣小芥子日乾爲末酒服方寸七肘後方治中風卒不得語以苦酒煮芥子傅頸一周以帛包之一日一夕乃差龍葵味苦寒無毒食之解勞少睡去虚熱腫其子療疔腫所在有之圖經曰龍葵舊云所在有之今近處亦稀惟北方有之北人謂之苦葵葉圓似排風而無毛花白實若牛李子生靑熟黑亦似排風子但堪煮食不任生啖其實赤者名赤珠服之變白令黑不與葱薤同食根亦入藥用今醫以治發背癰疽成瘡者其方龍葵根一兩剉麝香一分研先搗龍葵根羅爲末入麝香研令匀塗於瘡上甚善苦耽苗子味苦寒小毒主傳尸伏連鬼氣疰忤邪氣腹内熱結目黃不下食大小便澁骨熱咳嗽多睡勞乏嘔逆痰壅痃癖痞滿小兒無辜癧子寒熱大腹殺蟲落胎去蠱毒并煮汁服亦生搗絞汁服亦研傅小兒閃癖生故墟垣塹間高二三尺子作角如撮口袋中有子如珠熟則赤色人有骨蒸多服之關中人謂之洛神珠一名王母珠一名皮弁草又有一種小者名苦𧄹苦苣味苦平一云寒除面目及舌下黄强力不睡折取莖中白汁傅疔腫出根及取汁滴癰上立潰碎莖葉傅蛇咬根主赤白痢及骨蒸并煮服之今人種爲菜生食之乆食輕身少睡調十二經脉利五臟霍亂後胃氣逆煩生擣汁飲之雖冷甚益人不可同血食一本作蜜食作痔疾苦苣即野苣也野生者又名褊苣今人家常食爲白苣江外嶺南吴人無白苣嘗植野苣以供厨饌衍義曰苦苣搗汁傅疔瘡殊驗靑苗陰乾以備冬月爲末水調傅苜蓿味苦平無毒主安中利人可久食陶隱居云長安中乃有苜蓿園北人甚重此江南人不甚食之以無味故也外國復别有苜蓿草以療目非此類也唐本注云苜蓿莖葉平根寒主熱病煩滿目黄赤小便黄酒疸搗取汁服一升令人吐愈日華子云凉去腹臟邪氣脾胃間熱氣通小腸衍義曰苜蓿唐李白詩云天馬常銜苜蓿花是此陜西甚多飼牛馬嫩時人兼食之微甘淡不可多食利大小腸有宿根刈訖又生蕨葉似老蕨根如紫草按蕨味甘寒滑去暴熱利水道令人睡弱陽小兒食之脚弱不行生山間人作茹食之四皓食芝而壽夷齊食蕨而夭固非良物捜神記曰郗鑒鎭丹徒二月出獵有甲士折一枝食之覺心中淡淡成疾後吐一小蛇懸屋前漸乾成蕨遂明此物不可生食之食療云寒補五臟不足氣壅經絡筋骨間毒氣令人脚弱不能行消陽事令眼暗鼻中塞髮落不可食又冷氣人食之多腹脹圖經衍義本草卷之四十
