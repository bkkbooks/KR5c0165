front:
  text: 圖經衍義本草卷之七資七
  hash: sha256:3144e058aff227290a13f7c244426c29f7fd489e931bc1b8a9217306fbd056c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_SJB_007-170340c, image: sjb/17/170340c.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部上品之上黄精黄精味甘平無毒主補中益氣除風濕安五臟久服輕身延年不饑一名重樓一名菟竹一名鷄格一名救窮一名鹿竹一名萎蕤一名仙人餘糧一名垂珠一名馬箭一名白及生山谷今南北皆有之以嵩山茅山者爲佳二月三月採根陰乾圖經曰黄精舊不載所出州郡二月採根蒸過暴乾用今通八月採山中人九蒸九暴作果賣甚甜美而黄黑色博物志云天老謂黃帝曰太陽之草名黄精餌之可以長生陶隱居云今處處有二月始生葉狀似竹根似萎蕤根如鬼臼俗方無用仙經所貴根葉華實皆可餌服酒散隨宜具在斷穀方中黄精葉乃與鈎吻相似惟莖不紫花不黄爲異而人多惑唐本注云黃精肥地生者即大如拳薄地生者猶如拇指日華子云補五勞七傷助筋骨止饑耐寒暑益脾胃潤心肺單服九蒸九暴食之駐顔雷公云凡使勿用鈎吻眞似黄精只是葉有毛鈎子二個是别認處若誤服害人黄精葉似竹葉凡採得以溪水洗淨後蒸從已至子刀薄切曝乾用抱朴子云服其花勝其實其實勝其根但花難得服黃精十年乃可大得其益耳斷穀不及术术餌令人肥健可以負重涉險但不及黄精甘美易食凶年可以與老小休糧食療云餌黄精能老不饑其法可取瓮子去底釜上安置令得所盛黄精令滿密蓋蒸之令氣溜即曝之第二遍蒸之亦如此九蒸九曝凡生時有一石熟有三四斗蒸之若生則刺人咽喉暴使乾不爾朽壞其生者若初服只可一寸半漸漸增之十日不食能長服之止三尺五寸服三百日後盡見鬼神餌必升天根葉花實皆可食之但相對者是不對者名扁精稽神録臨川有士人虐所使婢婢乃逃入山中乆之見野草枝葉可愛即拔取根食之甚美自是常食乆而遂不饑輕健夜息大樹下聞草中動以爲虎懼而上樹避之及曉下平地其身欻然凌空而去或自一峰之頂若飛鳥焉數歲其家人採薪見之告其主使捕之不得一日遇絶壁下以網三面圍之俄而騰上山頂其主異之或曰此婢宿有仙骨不過靈藥服食遂以酒饌五味香美置往來之路觀其食否果來食食訖不能遠去擒之具述其故指所食之草即黄精也道藏神仙芝草經黄精寬中益氣五臟調良肌肉充盛骨體堅强其力倍多年不老顔色鮮明髮白更黑齒落更生博物志昔黄帝問天老曰天地所生豈有食之令人不死乎天老曰太陽之草名曰黄精餌之可以長生太陰之草名曰鈎吻不可食入口立死人信鈎吻之殺人不信黄精之益壽不亦甚乎聖惠方神仙服黄精成地仙根莖不限多少細剉陰乾搗末每日淨水調服服一年變老爲少菖蒲菖蒲味辛温無毒主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲主耳聾癰瘡温腸胃止小便利四肢濕痹不得屈伸小兒温瘧身積熱不解可作浴湯乆服輕身聰耳目不忘不迷惑延年益心智高志不老一名昌陽生上洛池澤及蜀郡嚴道一寸九節者良露根不可用一名堯韭今處處有之生石磧上五月十二月採根陰乾秦皮秦艽爲之使惡地膽麻黄圖經曰菖蒲其根盤屈有節狀如馬齦大一根傍引三四根傍根節尤密一寸九節者佳亦有十二節者蜀人用治心腹冷氣搊痛者取一二寸搥碎同吴茱萸煎湯飲之良黔蜀蠻人亦常將隨行卒患心痛嚼一二寸熱湯或酒送亦效陶隱居云菖蒲大根者主風濕不堪服食此藥甚去蟲并蚤虱而今都不言之眞菖蒲葉有脊一如劍刃四月五月亦小釐華也東澗溪側又有名溪蓀者根形氣色極似石上菖蒲而葉正如蒲無脊俗人多呼此爲石上菖蒲者謬矣此止主咳逆亦斷蚤虱爾不入服日華子云除風下氣丈夫水臟女人血海冷敗多忘長智除煩悶止心腹痛霍亂轉筋治客風瘡疥澀小便殺腹臟蟲及蚤虱耳痛作末炒承熱裹罯甚驗忌飴糖羊肉抱朴子云韓藂服之十三年身生毛日誦書萬言冬不寒又須得石上寸九節紫花尤善漢武帝内傳武帝上嵩山見仙長二丈問曰吾九嶷山人也聞中嶽有石上菖蒲一寸九節食之長生故來採之忽然不見别說云其池澤所生肥大節疏粗慢恐不可入藥唯可作果盤蓋氣味不烈而和淡爾千金方日月未足而欲産者搗菖蒲根汁一二升灌喉中又方治産後崩中下血不止菖蒲一兩半剉酒二盞煎取一盞去滓分三服食前温服又方治好忘乆服聰明益智七月七日取菖蒲酒服三方寸匕飲酒不醉好事者服而驗之不可犯鐵若犯之令人吐逆肘後方扁鵲云中惡與卒死鬼擊亦相類爲治皆參取而用之已死搗菖蒲生根絞汁灌之立瘥又方耳聾菖蒲根一寸巴豆一粒去心二物合搗分作七丸綿裹塞耳日著一丸效又方卒胎動不安或腰痛胎轉搶心下血不止菖蒲汁三升服之衍義曰菖蒲世又謂之蘭蓀生水次失水則枯根節密者氣味足有人患遍身生熱毒瘡痛而不癢手足尤甚然至頸而止黏著衣被曉夕不得睡痛不可任有下俚教以菖蒲三斗剉日乾之舂羅爲末布蓆上使病瘡人恣卧其間仍以被衣覆之既不黏著衣被又復得睡不五七日至其瘡如失後自患此瘡亦如此用應手神驗其石菖蒲根絡石而生者節乃密入藥須此等菊花菊花味苦甘平無毒主風頭頭眩腫痛目欲脱泪出皮膚死肌惡風濕痹療腰痛去來陶陶除胸中煩熱安腸胃利五脉調四肢乆服利血氣輕身耐老延年一名節花一名日精一名女節一名女花一名女莖一名更生一名周盈一名傅延年一名陰成生雍州川澤及田野正月採根三月採葉五月採莖九月採花十一月採實皆陰乾术枸根桑根白皮爲之使圖經曰菊花紫莖而氣香葉厚至柔嫩可食者其爲眞主丈夫婦人乆患頭風眩悶頭髮乾落胸中痰結每風發即頭旋眼昏暗不覺欲倒者是其候也藥性論云甘菊花使能治熱頭風旋倒地腦骨疼痛身上諸風令消散陶隱居云菊有兩種一種莖紫氣香而味甘葉可作羹食者爲眞一種青莖而大作蒿苦氣味苦不堪食者名苦薏非眞其花正相似唯以甘苦别之爾日華子云治四肢遊風利血脉心煩胸膈壅悶并癰毒頭痛作枕明目葉亦明目生熟可食楊損之云甘者入藥苦者不任食療云甘菊可作羹主頭風目眩泪出去煩熱利五臟肘後方犯丁腫垂死菊葉一握搗絞汁一升入口即活此神驗冬用其根衍義曰菊花近世有二十餘種惟單葉花小而黄緑葉色深小而薄應候而開者是也月令所謂菊有黄花者也又鄧州白菊單葉者亦入藥餘依經不用專治頭目風熱今多收之作枕人參人參味甘微寒微温無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脉破堅積令人不忘乆服輕身延年一名人銜一名鬼蓋一名神草一名人微一名土精一名血參如人形者有神生上黨山谷及遼東高麗潞州澤易檀箕幽嬀等州并出蓋以其山相連接故皆有之次出海東新羅國又出渤海今河東諸州及泰州皆有之又河北閩中來者俱不及上黨者佳二月四月八月上旬採根竹刀刮暴乾無令見風茯苓爲之使惡溲疏反藜蘆又云馬蘭爲使惡鹵鹹圖經曰試上黨人參者當使人二同走一與人參含之一不與人參俱走三五里許其不含人參者必大喘含者氣息自如此乃人參之力也李絳兵部手集方療反胃嘔吐無常粥飲入口即吐困弱無力垂死者以上黨人參三大兩擘破水一大升煮取四合熱頓服唐名醫治心腹病藥性論云人參主五臟氣不足五勞七傷虚損痰弱吐逆不下食止霍亂煩悶嘔噦補五臟六腑保中守神陶隱居云上黨郡在冀州西南今魏國所獻即是形長而黄狀如防風多潤實而甘俗用不入服乃重百濟者形細而堅白氣味薄於上黨次用高麗高麗即是遼東形大而虚軟不及百濟百濟今以屬高麗高麗所獻兼有兩種止應擇取之爾實用并不及上黨者高麗人讚曰三椏五葉背陽向陰欲來求我椵樹相尋椵音賈今注高麗百濟者太行山所出謂之紫團參日華子云殺金石藥毒調中治氣消食開胃食之無忌外臺秘要治蜂蝎螫人方人參嚼以封之千金方開心肥健大人參一分猪肘十分酒拌服百日滿體髓溢日誦千言肌膚潤去熱風痰經驗後方治大人小兒不進乳食和氣去痰人參四兩半夏一兩生薑汁熬一宿曝乾爲末麵糊丸如緑豆大每服十丸食後生薑湯吞下又方治狗咬破傷風以人參不計多少桑柴火燒令烟絶用盞子合研爲末糝在瘡上立效勝金方治吐血以人參一味爲末鷄子清投新汲水調下一錢服之又治咳嗽上氣喘急衍義曰人參今之用者皆河北榷場博易到盡是高麗所出率虚軟味薄不若潞州上黨者味厚體實用之有據天門冬天門冬味苦甘平大寒無毒主諸暴風濕偏痹强骨髓殺三蟲去伏尸保定肺氣去寒熱養肌膚益氣力利小便冷而能補乆服輕身益氣延年不饑一名顚勒生奉高山谷二月三月七月八月採根暴乾垣衣地黄爲之使畏曾青圖經曰今處處有之春生藤蔓大如釵股高至丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者其葉如絲杉而細散皆名天門冬夏生白花亦有黃色者秋結黑子在其根枝傍入伏後無花暗結子其根白或黃紫色大如手指長二三寸大者爲勝頗與百部根相類藥性論云主肺氣咳逆喘息促急除熱通腎氣療肺痿生癰吐膿治濕疥止消渴去熱中風宜乆服煮食之令人肌體滑澤除身中一切惡氣不潔之疾唐本注云此有二種苗有刺而澀者無刺而滑者俱是門冬俗云顚刺浣草者形貌詔之雖作數名終是一物二根浣垢俱淨門冬浣草互名之也詺音瞑日華子云貝母爲使鎭心潤五臟益皮膚悦顔色補五勞七傷治肺氣并嗽消痰風痹熱毒遊風煩悶吐血去心用楊損之云服天門冬誤食鯉魚中毒浮萍解之抱朴子云或名地門冬或名筵門冬或名巓棘或名淫羊食或名管松其生高地根短味甜氣香者上其生水側下地者葉細似藴而微黄根長而味多苦氣臭者下亦可服食然喜令人下氣爲益又遲也服之百日皆丁壯兼倍快於术及黄精也杜紫微服之御八十妾有男一百四十人食療云補虚勞治肺勞止渴去熱風可去皮心入蜜煮之食後服之若曝乾入蜜丸尤佳外臺秘要治風癲引脅牽痛發作則吐耳如蟬鳴天門冬去心皮曝乾搗篩酒服方寸匕孫眞枕中記天門冬釀酒服之去癥瘕積聚風痰癲狂三蟲伏尸除瘟痹輕身益氣令人不饑百日還年却老道書云欲不畏寒取天門冬茯苓等分爲末服方寸匕日再服大寒時單衣汗出列仙傳赤頂子食天門冬齒落更生細髮復出神仙傳甘始者太原人服天門冬在人間二百餘年修眞秘㫖方神仙服天門冬三十斤細切陰乾搗末每服三錢酒調下日五六服二百日後怡泰拘急者緩羸劣者强三百日身輕三年走及奔馬衍義曰天門冬麥門冬之類雖曰去心不可浸出脂液其不知者乃以湯浸一二時柔即柔矣然氣味都盡用之不效治肺熱之功爲多其味苦但專泄而不專收寒多人禁服餘如二經甘草甘草國老味甘平無毒主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金瘡尰解毒温中下氣煩滿短氣傷臟咳嗽止渴通經脉利血氣解百藥毒爲九土之精安和七十種石一千二百種草乆服輕身延年一名蜜甘一名美草一名蜜草一名潞草生河西川谷積沙山及上郡二月八月除日採根暴乾十日成术乾漆苦參爲之使惡遠志反大戟芫花甘遂海藻四物圖經曰有人中烏頭巴豆甘草入腹即定崔元亮海上方治發背秘法李北海云此方神授極奇秘以甘草三大兩生搗别篩末大麥麵九兩於一大盤中相和攪令匀取之好酥少許别捻入藥令匀百沸水溲如餅劑方圓大於瘡一分熱傅腫上以油斤及故紙隔令通風冷則换之已成膿水自出未成腫便内消藥性論云主腹中冷痛治驚癇除腹脹滿補益五臟制諸藥毒養腎氣内傷令人陰痿主婦人血瀝腰痛虚而多熱加而用之陶隱居云河西上郡不復通市今出蜀漢中悉從汶山諸夷中來赤皮斷理看之堅實者是抱罕草最佳抱罕羌地名亦有火炙乾者理多虚疏又有如鯉魚腸者被刀破不復好青州間亦有不如又有紫甘草細而實乏時可用此草最爲衆藥之主經方少不用者猶如香中有沉香也國老即帝師之稱雖非君爲君所宗是以能安和草石而解諸毒也日華子云安魂定魄補五勞七傷一切虚損驚悸煩悶健忘通九竅利百脉益養精氣壯筋骨解冷熱入藥炙用雷公云凡使甘草須去頭尾尖處其頭尾吐人孫眞人云主一切傷寒甘草如指長炙細剉童子小便一升煎取七合空心服日再服之金匱玉函云治誤飲饌中毒者未審中何毒只急煎甘草薺苨湯服之入口便活又方治小兒中蠱欲死甘草半兩剉以水一盞煎五分去滓作二服當吐蠱出傷寒類要治傷寒三二日咽痛者與甘草二兩炙水三升煮取一升半服五合日三又方傷寒脉結代者心悸動方甘草二兩水三升煮取一升半服七合日二姚和衆方治小兒尿血甘草五分以水六合煎取二合去滓一歲兒一日服令盡廣利方治肺痿乆咳嗽涕唾多骨節煩悶寒熱甘草十二分炙搗爲末每日取小便三合甘草末一錢匕攪令散服御藥院方治二三日咽痛可與甘草湯去滓日三服百一方小兒初生未可與朱蜜取甘草一分節長炙碎以水二合煮取一合以纏綿點兒口中可一蜆殻止兒當快吐胸中惡汁後待兒饑渴更與之若兩服不吐盡一合止得吐惡汁兒智惠無病又方中蠱生煮甘草服之吐疾出若平生預服防蠱者宜熟炙甘草煮服之若中蠱毒即内消不令吐也神驗又方食牛羊肉中毒者煮甘草汁服之一二升當愈經驗方崔宣州衍傳赤白痢方甘草一尺炙擘破以淡漿水蘸三二度又以熳火炙之後用生薑去皮半兩二味以漿水一升半煎取八合服之立效梅師方治初得痢冷熱赤白及霍亂甘草一兩炙豆蔻七個剉以水三升煎取一升分服衍義曰甘草枝葉悉如槐高五六尺但葉端微尖而糙澀似有白毛實作角生如相思角作一本生子如小扁豆齒嚙不破今出河東西界入藥須微炙不爾亦微凉生則味不佳生乾地黃乾地黄味甘苦寒無毒主折跌絶筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絶補五臟内傷不足通血脉益氣力利耳目生者尤良生地黄大寒主婦人崩中血不止及産後血上薄心悶絶傷身胎動下血胎不落墮墜踠折瘀血留血衄鼻吐血皆搗飲之乆服輕身不老一名地髓一名苄一名芑生咸陽川澤黄土地者佳二月八月採根陰乾得麥門冬清酒良惡貝母畏蕪荑圖經曰崔元亮海上方治一切心痛無問新久以生地黄一味隨人所食多少搗絞取汁搜麵作䬪飥或冷淘食良乆當利出蟲長一尺許頭似壁宫後不復患矣昔有人患此病三年不瘥深以爲恨臨終戒其家人吾死後當剖去病本果得以置於竹節中每所食皆飼之因食地黄䬪飥亦與之隨即壞爛由此得方劉禹錫傳信方亦紀其事云正元十年通事舍人崔抗女患心痛垂氣絶遂作地黄冷淘食之便吐一物可方一寸已來如蝦蟆狀無目足微似有口蓋謂此物所食自此遂愈食冷淘不用著鹽藥性論云乾地黄君能補虚損温中下氣通血脉乆服變白延年治産後腹痛上吐血不止又云生地黄解諸熱破血通利月水閉絶不利水道能消瘀血病人虚而多熱加而用之陶隱居云咸陽即長安也生渭城者乃有實子實如小麥淮南七精散用之中間以彭城乾地黄最好次歷陽今用江寧板橋者爲勝陳藏器云本經不言生乾及蒸乾方家所用二物别蒸乾即温補生乾則平宣當依此用日華子云乾地黄助心膽氣安魂定魄治驚悸勞劣心肺損吐血鼻衄婦人崩中血運又云生者水浸驗浮者名天黄半浮半沉者名人黄沉者名地黄沉者力佳半沉者次浮者劣忌鐵器抱朴子云楚文子服地黄八年夜視有光手上車弩淮南子云地黄主屬骨食療云地黄微寒以蜜煎或浸食或煎湯或酒飲并炒生則寒主齒痛唾血折傷葉可以羹外臺秘要張文仲治骨蒸方生地黃一升搗取汁三度搗絞汁盡分再服若利即减之以身體凉爲度千金方治牙齒根欲動脱生地黄細剉綿裹着齒上咂之漬齒根日三四并咽汁十日大佳肘後方治耳中常鳴生地黃截塞耳數易之以瘥爲度一云以紙裹微灰火中煨之用良百一方妊娠漏胎生地黄汁一升漬酒四合煮三五沸服之不止又服又方治猘犬咬人搗地黄汁飲之并塗瘡口百度止梅師方治墮損筋骨蹉跌骨碎破搗生地黄熨熱裹三日夜數易若血聚以針决之又方治吐血神效方生地黄汁一升二合白膠香二兩以瓷器盛入甑蒸令膠消服又方治乳癰搗生地黄汁傅之熱即易之無不見效也孫兆方治鼻衄及膈上盛熱乾地黄龍腦薄荷等分爲末冷水調下産寳方妊娠下血如月信通恐胎乾方乾地黄乾薑等分爲末用酒調方寸匕衍義曰地黃葉如甘露子花如脂麻花但有細斑點北人謂之牛奶子花莖有微細短白毛經只言乾生二種不言熟者如血虚勞熱産後虚熱老人中虚燥熱須地黄者生與生乾常慮太寒如此之類故後世改用熟者术术味苦甘温無毒主風寒濕痹死肌痙疸止汗除熱消食主大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿及霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食作煎餌乆服輕身延年不饑一名山薊一名山薑一名山連生鄭山山谷漢中南鄭二月三月八月九月採根曝乾防風地榆爲之使圖經曰以嵩山茅山者爲佳春生苗青色無椏一名山薊以其葉似薊也莖作蒿𦾮狀青色長三二尺以來夏開花紫碧色亦似刺薊花或有黄白花者入伏後結子至秋而苗枯今白术生杭越舒宣州高山崗上葉葉相對上有毛方莖莖端生花淡紫碧紅數色根作椏生二月三月八月九月採根暴乾以大塊紫花者爲勝藥性論云白术君忌桃李雀肉菘菜青魚味甘辛無毒能主大風𤸷痹多年氣痢心腹脹痛破消宿食開胃去痰涎除寒熱止下泄主面光悦治水腫脹滿止嘔逆腹内冷痛及胃氣虚冷痢陶隱居云今處處有以蔣山白山茅山者勝仙經云亦能除惡氣弭灾沴丸散煎餌并有法其苗又可作飲甚香美去水术乃有兩種白术葉大有毛而作椏東境术大而無氣烈而不任用今市人賣者皆以米粉塗令白非自然用時宜刮去之日華子云术治一切風疾五勞七傷冷氣腹脹補腰膝消痰治水氣利小便止反胃嘔逆及筋骨弱軟痃癖氣塊婦人冷癥瘕温疾山嵐瘴氣除煩長肌用米泔浸一宿入藥抱朴子云术一名山精故神農藥經曰必欲長生常服山精聖惠方治雀目不計時月用蒼术一兩搗羅爲散每服一錢不計時候千金方療煩悶白术末水調服方寸匕梅師方治心下有水白术三兩澤瀉五兩剉以水三升煎取一升半分服衍義曰蒼术其長如大小指肥實皮色褐氣味辛烈須米泔浸洗再换泔浸二日去上麤皮白术麤促色微褐氣味亦微辛苦而不烈古方及本經止言术未見分其蒼白二種也只縁陶隱居言术有兩種自此人多貴白者今人但貴其難得惟用白者往往將蒼术置而不用如古方平弱散之類蒼术爲最要藥功尤速殊不計本草元無白术之名近世多用亦宜兩審嵇康曰聞道人遺言餌术黄精令人久壽亦無白菟絲子菟絲子味辛甘平無毒主續絶傷補不足益氣力肥健汁去面䵟養肌强陰堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血爲積久服明目輕身延年一名菟蘆一名菟縷一名蓎蒙一名玉女一名赤網一名菟纍生朝鮮川澤田野蔓延草木之上色黄而細爲赤網色淺而大爲菟纍九月採實曝乾得酒良署預松脂爲之使惡雚菌圖經曰按爾雅云唐蒙女蘿菟絲釋曰唐也蒙也女蘿也菟絲也一物四名而本經并以唐蒙爲一名詩云蔦與女蘿毛傳云女蘿菟絲也仙方多單服者取實酒浸曝乾再浸又暴令酒盡篩末酒服乆而彌佳兼明目其苗生研汁塗面斑神效藥性論云菟絲子君能治男子女人虚冷添精益髓去腰疼膝冷乆服延年駐悦顔色陶隱居云宜丸不宜煮田野虚落中甚多皆浮生藍紵麻蒿上舊言下有茯苓上菟絲今不必爾其莖挼以浴小兒療熱痱用其實先須酒浸之一宿仙經俗方并以爲補藥雷公云勿用天碧草子其樣眞相似只是天碧草子味酸澀并黏不入藥抱朴子云菟絲之草下有伏菟之根無此菟則絲不得生於上然實不屬也又内篇云菟絲初生之根其形似菟掘取割其血以和丹服之立變化産書云治橫生菟絲子爲末酒調下一錢匕米飲調下亦得肘後方治卒腫滿身面皆洪大菟絲子一升酒五升漬二三宿每服一升日三服又方治面上粉刺搗菟絲子絞取汁塗之瘥經驗後方治丈夫腰膝積冷痛或頑麻無力菟絲子洗秤一兩牛膝一兩同浸於銀器内五日曝乾爲末將元浸酒再入少醇酒作糊搜和丸如梧桐子大空心酒下二十丸又方固陽丹菟絲子二兩酒浸十日水淘焙乾爲末更入杜仲一兩蜜炙搗用薯蕷末酒煮爲糊丸如梧桐子大空心用酒下五十丸修眞方神仙方云服之令人光澤三年老變爲少此藥治腰膝去風久服延年衍義曰菟絲子附叢木中即便蔓延花實無緑葉此爲草本之異其上有菟絲下有茯苓之說未必耳已於茯苓條中具言之圖經衍義本草卷之七
