body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正木部中品桑根白皮桑根白皮味甘寒無毒主傷中五勞六極羸瘦崩中脉絶補虚益氣去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡採無時出土上者殺人續斷麻子桂心爲之使葉主除寒熱出汗汁解蜈蚣毒桑耳味甘有毒黑者主女子漏下赤白汁血病癥瘕積聚陰痛陰陽寒熱無子療月水不調其黃熟陳白者止乆泄益氣不饑其金色者治癖飲積聚腹痛金瘡一名桑菌一名木麥蜀本麥作夋詮荀切五木耳名檽音軟益氣不饑輕身强志生犍爲山谷六月多雨時採即暴乾圖經曰桑根白皮本經不著所出州土今處處有之採無時不可用出土上者用東行根益佳或云木白皮亦可用初採得以銅刀剥去上粗皮取其裏白切焙乾其皮中青涎勿使刮去藥力都在其上惡鐵及鉛不可近之桑葉以夏秋再生者爲上霜後採之煮湯淋渫手足去風痹殊勝桑耳一名桑黄有黄熟陳白者又有金色者皆可用碎切酒煎主帶下其實椹有白黑二種暴乾皆主變白髮皮上白鮮花亦名桑花狀似地錢刀削取炒乾以止衂吐血等其柴燒灰淋汁醫家亦多用之桑上有蟲主暴心痛金瘡肉生不足皮中白汁主小兒口瘡傅之便愈又以塗金刃所傷燥痛須臾血止更剥白皮裹之令汁得入瘡中良冬月用根皮皆驗白皮作綫以縫金瘡腸出者更以熱鷄血塗上唐安金藏剖腹用此法便愈仙經云一切仙藥不得桑煎不服出抱朴子本方陶隱居云東行桑根乃易得而江邊多出土不可輕信桑耳斷穀方云木檽又呼爲桑上寄生此云五木耳而不顯四者是何木按老桑樹生燥耳有黄者赤白者又多雨時亦生軟濕者人採以作菹皆無復藥用陳藏器云桑葉汁主霍亂腹痛吐下冬月用乾者濃煮服之研取白汁合金瘡又主小兒吻瘡細剉大釜中煎取如赤糖去老風及宿血葉椏者名鷄桑最堪入用椹利五臟關節通血氣乆服不饑多收暴乾擣末蜜和爲丸每日服六十丸變白不老禹錫云按藥性論云桑白皮使平能治肺氣喘滿水氣浮腫主傷絶利水道消水氣虚勞客熱頭痛内補不足桑耳使一名桑巨又名桑黄味甘辛無毒能治女子崩中帶下月閉血凝産後血凝男子疫癖兼療伏血下赤血孟詵云桑根白皮煮汁飲利五臟又入散用下一切風氣水氣又桑葉炙煎飲止渇如茶法日華子云桑白皮温調中下氣益五臟消痰止渴利大小便開胃下食殺腹臟蟲止霍亂吐瀉此即山桑根皮又云桑耳温微毒止腸風瀉血婦人心腹痛雷公曰凡使六年已上向東畔嫩根採得後銅刀剥上面黄薄皮一重只取第二重白嫩青涎者於槐砧上用銅刀剉了焙令乾勿使皮上涎落涎是藥力此藥惡鐵并鉛也聖惠方治大風頭面髭髮脱落以桑柴灰熱湯淋取汁洗頭面以大豆水研取漿解澤灰味彌佳次用熟水入緑豆面濯之取淨不過十度良三日一沐頭一日一洗面外臺秘要方治偏風及一切風桑樹枝剉一大升用今年新嫩枝以水一大斗煎取二大升夏用井中沉恐酢壞每日服一盞空心服盡又煎服終身不患偏風若預防風能服一大升佳又方五痔以桑耳作羹空心下飯飽食之日三食之待孔卒痛如烏啄取大小豆各一升合搗作兩囊蒸之及熱更互坐之即瘥千金方治口瘡白漫漫取桑樹汁先以髮拭口次以汁傅之肘後方治人少小鼻衂小勞輒出桑耳無多少熬令焦搗末每衂發以杏人塞鼻數度可葛氏方卒小便多消渴入地三尺取桑根剥取白皮炙令黄黑剉以水煑之令濃隨意飲之亦可内少米勿入鹽又方産後下血不止炙桑白皮煮水飲之梅師方治水腫坐卧不得頭面身體悉腫取東引花桑枝燒灰淋汁煑赤小豆空心食令飽饑即食盡不得喫飯又方治金瘡止痛取桑柴灰研傅瘡上佳經驗方治咳嗽甚者或有吐血殷鮮桑根白皮一斤米泔浸三宿淨刮上黄皮剉細入糯米四兩焙乾一處擣爲末每服米飲調下一二錢經驗後方治肺毒瘡如大風疾緑雲散桑葉好者淨洗熟蒸一宿後日乾爲末水調二錢廣濟方治瀉血不止桑耳一大兩熬令黑水一大升三合煎取六大合去滓空心分温三服錢相公方治蜈蚣及蜘蛛毒取桑白皮汁傅之效子母秘録方治落胎下血不止以桑木中蝎蟲燒末酒服方寸七日二服仙方桑椹熟時收之日乾爲末蜜丸桐子大空心酒服四十丸長服之良衍義曰桑根白皮條中言桑之用稍備然獨遺烏椹桑之精英盡在於此採摘微研以布濾去滓石器中熬成稀膏量多少入蜜再熬成稠膏貯瓷器中每抄一二錢食後夜卧以沸湯點服治服金石發熱渴生精神及小腸熱性微凉竹葉竹葉䈽竹葉䈽音謹味苦平大寒無毒主欬逆上氣溢筋急惡瘍殺小蟲除煩熱風痙喉痹嘔吐根作湯益氣止渴補虚下氣消毒汁主風痓實通神明輕身益氣生益州淡竹葉味辛平大寒主胸中痰熱咳逆上氣瀝大寒療暴中風風痹胸中大熱止煩悶皮筎微寒主嘔啘温氣寒熱吐血崩中溢筋苦竹葉及瀝療口瘡目痛明目利九竅竹笋蜀本作諸笋味甘無毒主消渴利水道益氣可久服圖經曰䈽竹淡竹苦竹本經并不載所出州土今處處有之竹之類甚多而入藥者惟此三種人多不能盡别謹按竹譜䈽字音斤其竹堅而促節體圓而質勁皮白如霜大者宜刺船細者多用桂竹作笛者有一種亦不名䈽竹苦竹亦有二種一種出江西及閩中本極粗大笋味甚苦不可噉一種出江浙近地亦時有肉厚而葉長闊笋微有苦味俗呼甜苦笋食品所最貴者亦不聞入藥用淡竹肉薄節間有粉南人以燒竹瀝者醫家只用此一品與竹譜所說大同小異竹實今不復用陶隱居云竹類甚多此前一條云是䈽竹次用淡竹苦竹爾又一種薄殻者名甘竹葉最勝又有實中竹篁竹并以笋爲佳於藥無用凡取竹瀝惟用淡竹苦竹䈽竹爾竹實出藍田江東乃有花而無實而頃來斑斑有實狀如小麥堪可爲飯禹錫云按藥性論云淡竹葉味甘無毒主吐血熱毒風壓丹石毒主消渴竹燒瀝治卒中風失音不語苦者治眼赤又云青竹筎使味甘能止肺痿唾血鼻衂治五痔日華子云淡竹并根味甘冷無毒消疾治熱狂煩悶中風失音不語壯熱頭痛頭旋并懷奸人頭旋倒地止驚悸温疫迷悶小兒驚癇天吊莖葉同用又云苦竹味苦冷無毒治不睡止消渴解酒毒除煩熱發汗治中風失音作瀝功用與淡竹同孟詵云笋寒主逆氣除煩熱又動氣發冷癥不可多食越有蘆及箭笋新者稍可食陳者不可食其淡竹及中母笋雖美然發背悶脚氣外臺秘要方療凡脱折折骨諸瘡腫者愼不可當風及多自扇若中風則發痓口噤殺人若已中風覺頸强身中急束者急服此方竹瀝飲二三升若已口噤者以物强開内之忌冷飲食及酒竹瀝卒煩難得可合十許束併燒中央承取投之可活千金方治時氣五六日心神煩躁不解用竹瀝半盞新水半盞相和令匀非時服孫眞人食忌方卒得惡瘡不識者燒苦竹葉和雞子黄傅食醫心鏡云理心煩悶益氣力止渴苦笋熟煑任性食之又苦竹笋主消渴利水道下氣理風熱短氣取蒸煑食之又䈽笋主消渴風熱益氣力發氣眼蒸煮炒任食簡要濟衆方頭瘡大笋殻葉燒爲灰量瘡大小用灰調生油傅入少膩粉佳産書云治妊娠誤有失墜忽推築著疼痛新青竹筎二合好酒一升煮筎三五沸分三度服衍義曰竹葉凡諸竹與笋性皆微寒故知葉其用一致本經不言笋及苦竹性若取瀝作油亦不必强擇也張仲景竹葉湯用淡竹笋難化不益脾鄰家一小兒方二歲偶失照管壯熱喘粗不食多睡仰頭呻吟微嘔逆暝目多驚凡三五日醫作慢驚治之治不對病不愈忽然其母誤將有巴豆食藥作驚藥化五丸如麻子大灌之良久大吐有物噎於中乳媪以指摘出之約長三寸麤如小指乃三日前臨階曝者乾箭笋是夜諸證皆定次日但以和氣藥調治遂安其難化也如此經曰問而知之者謂之工小兒不能問故爲難治醫者當審謹也吴茱萸吴茱萸味辛温大熱有小毒主温中下氣止痛欬逆寒熱除濕血痹逐風邪開腠理去痰冷腹内絞痛諸冷實不消中惡心腹痛逆氣利五臟根殺三蟲根白皮殺蟯蟲治喉痹咳逆止泄注食不消女子經産餘血療白癬一名藙生上谷川谷及冤句九月九日採陰乾蓼實爲之使惡丹參消石白堊畏石英圖經曰吴茱萸生上谷川谷及冤句今處處有之江浙蜀漢尤多木高丈餘皮青緑色葉似椿而闊厚紫色三月開花紅紫色七月八月結實似椒子嫩時微黄至成熟則深紫九月九日採陰乾風土記曰俗尚九月九日謂爲上九茱萸到此日氣烈熟色赤可折其房以插頭云辟惡氣禦冬又續齊諧記曰汝南桓景隨費長房學長房謂曰九月九日汝家有灾厄宜令急去家人各作絳囊盛茱萸以繫臂上登高飲菊花酒此禍可消景如言舉家登高山夕還見鷄犬一時暴死長房聞之曰此代之矣故世人每至此日登高飲酒戴茱萸囊由此耳世傳茱萸氣好上言其衝膈不爲服食之藥也張仲景治嘔而胸滿者茱萸湯主之吴茱萸一升棗二十枚生薑一大兩人參一兩以水五升煎取三升每服七合日三乾嘔吐涎沫而頭痛者亦主之禹錫云按藥性論云吴茱萸味苦辛大熱有毒能主心腹疾積冷心下結氣疰心痛治霍亂轉筋胃中冷氣吐瀉腹痛不可勝忍者可愈療遍身𤸷痹冷食不消利大腸擁氣削皮能療漆瘡主中惡腹中刺痛下痢不禁治寸白蟲孟詵云茱萸主心痛下氣除嘔逆臟冷又皮止齒痛又患風瘙癢痛者取茱萸一升清酒五升和煑取一升半去滓以汁暖洗中賊風口偏不能語者取茱萸一升清酒一升和煮四五沸冷服之半升日三服得少汗瘥謹按殺鬼疰氣又開目者不堪食又魚骨在人腹中刺痛煮一盞汁服之止又骨在肉中不出者嚼封之骨當爛出脚氣衝心可和生薑汁飲之甚良雷公云凡使先去葉核并雜物了用大盆一口使鹽水洗一百轉自然無涎日乾任入丸散中用修事十兩用鹽二兩研作末投東流水四斗中分作一百度洗别有大效若用醋煑即先沸醋三十餘沸後入茱萸待醋盡㬠乾每用十兩使醋一鎰爲度聖惠方治陰毒傷寒四肢逆冷宜熨以茱萸一升酒和匀濕絹袋一隻盛蒸令極熱熨脚心候氣通暢匀暖即停熨累用驗外臺秘要方集驗熨癥法茱萸三升碎之以酒和煮熟布裹熨癥上冷更炒更番用之癥移走逐熨之候消乃止也又方治癰疽發背及發乳房茱萸一升擣之以苦酒和貼病上千金方治寸白蟲茱萸根洗去土四兩切以水酒各一升漬一宿平旦分再服凡茱萸皆用細根東北陰者良若稍大如指已上者皆不任用千金翼方産後虚羸盜汗時嗇嗇惡寒茱萸一雞子大以酒三升漬半日煑服肘後方治中風不能語豉茱萸各一升水五升煑取二升稍稍服之經驗方治脾元氣發歇痛不可忍者茱萸一兩桃人一兩和炒令茱萸焦黑後去茱萸取桃人去皮尖研細葱白三莖煨熟以酒浸温分三服經驗後方補水氣藥赤茱萸二兩米醋煮爛細研爲膏丸如梧桐子大椒湯下七丸空心兵部手集方治醋心每醋氣上攻如醉醋茱萸一合水三盞煎七分頓服縱濃亦强服楊氏産乳方療中惡心痛吴茱萸五合以酒三升煮三沸分三服衍義曰吴茱萸須深湯中浸去苦烈汁凡六七過始可用今文與注及注中藥法皆不言亦漏落也此物下氣最速腸虚人服之愈甚檳榔檳榔味辛温無毒主消穀逐水除痰癖殺三蟲伏尸療寸白生南海圖經曰檳榔生南海今嶺外州郡皆有之大如桄榔而高五七丈正直無枝皮似青桐節如桂竹葉生木巓大如楣頭又似甘蕉葉其實作房從葉中出傍有刺若棘針重叠其下一房數百實如鷄子狀皆有皮殻肉滿殻中正白味苦澀得扶留藤與瓦屋子灰同咀嚼之則柔滑而甘美嶺南人噉之以當果實其俗云南方地温不食此無以祛瘴癘此有三四種有小而味甘者名山檳榔有大而味澀核亦大者名猪檳榔最小者名蒳子其功用不說有别又云尖長而紫文者名檳圓而矮者名榔檳力小榔力大今醫家不復細分但取作雞心狀存坐正穩心不虚破之作錦文者爲佳其大腹與檳榔相似但莖葉根幹小異并皮收之謂之大腹榔或云檳榔難得眞者今貨者多大腹也陶隱居云此有三四種出交州形小而味甘廣州南者形大而味澀核亦有大者名猪檳榔作藥皆用之又小者南人名蒳子俗人呼爲檳榔孫亦可食唐本注云檳榔生者極大停數日便爛今入北來者皆先灰汁煮熟仍火熏使乾始堪停其中仁主腹脹生擣末服利水穀道傅瘡生肌肉止痛燒爲灰主口吻白瘡生交州愛州及崑崙禹錫云按藥性論云白檳榔君味甘大寒能主宣利五臟六腑擁滯破堅滿氣下水腫治心痛風血積聚海藥云陶弘景云向陽曰檳榔向陰曰大腹味澀温無毒主賁豚諸氣不消脚氣論云以沙牛尿一盞磨一枚空心暖服治脚氣壅毒水腫浮氣雷公云凡使取好存坐穩心堅文如流水碎破内文如錦文者妙半白半黑并心虚者不入藥用凡使須别檳與榔頭圓身形矮毗者是榔身形大紫文粗者是檳檳力小榔力大欲使先以刀刮去底細切勿經火恐無力效若熟使不如不用聖惠方治胎動腰痛搶心或有血下用一兩爲末非時水煑葱白濃汁調下一錢七外臺秘要方若脚氣非冷非熱老人弱人脹滿者檳榔仁爲末以檳榔殻汁或茶飲或豉汁中調服方寸七甚利經驗方治金瘡白檳榔黄連少許爲末傅之即瘥梅師方治酸心檳榔四兩橘皮二兩細擣爲散空心生蜜湯下方寸七孫眞人食忌方治嘔吐以白檳榔一顆煨橘皮十分炙爲末水一盞煎半盞服簡要濟衆方治諸蟲在臟腑久不差檳半兩炮擣爲末每服一錢至二錢葱蜜煎湯調下空心服又方脚氣衝心白檳榔一個雞心大者爲末童子小便生薑汁温酒共半盞調作一服廣利方治脚氣衝心腹悶亂不識人白檳榔子二分爲末分三貼空心暖小便五大合調服日再服御藥院方治痰涎檳榔爲末白湯點一錢衍義曰檳榔二書所說甚詳今人又取尖長者入藥言其快鋭速效屢嘗試之果如其說栀子栀子味苦寒大寒無毒主五内邪氣胃中熱氣面赤酒疱鼻白癩赤癩瘡瘍療目熱赤痛胸心大小腸大熱心中煩悶胃中熱氣一名木丹一名越桃生南陽川谷九月採實暴乾圖經曰栀子生南陽川谷今南方及西蜀州郡皆有之木高七八尺葉似李而厚硬又似樗蒲子二三月生白花花皆六出甚芬香俗說即西域詹匐也夏秋結實如訶子狀生青熟黄中仁深紅九月採實暴乾南方人競種以售利貨殖傳云卮茜千石亦比千乘之家言獲利之博也此亦有兩三種入藥者山栀子方書所謂越桃也皮薄而圓小刻房七棱至九棱者佳其大而長者乃作染色又謂之伏尸栀子不堪入藥用張仲景傷寒論及古今諸名醫治發黄皆用栀子茵蔯香豉甘草等四物作湯飲又治大病起勞復皆用栀子鼠矢等湯并小利而愈其方極多不可悉載陶隱居云解玉支毒處處有亦兩三種小異以七棱者爲良經霜乃取之今皆入染用禹錫云按藥性論云山栀子殺䗪蟲毒去熱毒風利五淋主中惡通小便解五種黄病明目治時疾除熱及消渴口乾目赤腫病雷公云凡使勿用顆大者號曰伏尸栀子無力須要如雀腦并鬚長有九路赤色者上凡使先去皮鬚了取仁以甘草水浸一宿漉出焙乾搗篩如赤金末用食療云治下鮮血栀子仁燒灰水和一錢七服之量其大小多少服之千金方治火瘡未起栀子仁灰麻油和封之厚乃佳已成瘡燒白糖灰粉之燥即瘥肘後方治霍亂心腹脹痛煩滿短氣未得吐下若轉筋燒栀子二七枚研末熟水調服梅師方治熱毒下血或因食物發動以三十枚擘水三升煎取一升去滓服又方治熱病新瘥早起及多食復發以十枚水三升煎取一升去滓温服卧令微汗若食不消加大黄三兩又方治傷寒瘥後交接發動因欲死眼不開不能語栀子三十枚水三升煎取一升服勝金方治婦人臨産痢不限多少燒灰細末空心熟水調一匙頭甚者不過五服孫尚方治傷寒下痢後更煩按之心下軟者虚煩也栀子十四枚擘破豉四合二味以水四升煎栀子取二升半内豉更煎取一升去滓分再服得吐餘勿服嘔有癰膿者不可服嘔膿盡乃愈衍義曰栀子仲景治發汗吐下後虚煩不得眠若劇者必反覆顚心中懊憹栀子豉湯治之虚故不用大黄有寒毒故也栀子雖寒無毒治胃中熱氣既亡血亡津液腑臟無潤養内生虚熱非此物不可去張仲景傷寒論已著又治心經留熱小便赤澀去皮山栀子火炮大黄連翹甘草炙等分末之水煎三二錢七服之無不效紫礦騏驎竭紫礦騏驎竭味甘鹹平有小毒主五臟邪氣帶下止痛破積血金瘡生肉與騏驎竭二物大同小異禹錫云按日華子云紫礦無毒治驢馬蹄漏可熔補又云騏驎竭暖無毒得密陀僧良治一切惡瘡疥癬乆不合者傅此藥性急亦不可多使却引膿圖經曰騏驎竭舊不載所生州土今出南蕃諸國及廣州木高數丈婆娑可愛葉似櫻桃而有三角其脂泪從木中流出滴下如膠飴狀乆而堅凝乃成竭赤作血色故謂之血竭採無時其味鹹而氣腥者是海母血不可用眞竭微鹹而甘作栀子氣味舊說與紫礦大都相似而别是一物功力亦殊今按段成式酉陽雜俎云紫礦出眞臘國國人呼爲勒佉亦出波斯國木高丈許枝幹繁鬱葉似橘柚冬不凋落三月花開不結子每有霧露微雨沾濡其枝條則爲紫礦雷公云騏驎竭凡使勿用海母血眞似騏驎竭只是味鹹并腥氣其騏驎竭味微鹹甘似栀子氣是也欲使先研作粉重篩過臨使安於丸散或膏中任使用勿與衆藥同搗化作飛塵也聖惠方産後血暈不知人及狂語騏驎竭一兩細研爲末非時温酒調二錢七廣利方治金瘡血不止兼痛驎竭末傅之立止衍義曰紫礦如糖霜結於細枝上累累然紫黑色研破則紅今人用造綿烟脂邇來亦難得龍腦香龍腦香及膏香味辛苦微寒一云温平無毒主心腹邪氣風濕積聚耳聾明目去目赤膚翳出婆律國形似白松脂作杉木氣明淨者善乆經風日或如雀屎者不佳云合糯一作粳米炭相思子貯之則不耗膏主耳聾圖經曰龍腦香出婆律國今惟南海番舶賈客貨之相傳云其木高七八丈大可六七尺圍如積年杉木狀旁生枝葉正圓而背白結實如豆蔻皮有甲錯香即木中脂似白松脂作杉木氣膏乃根下清液耳亦謂之婆律膏段成式酉陽雜俎說此木有肥瘦瘦者出龍腦香其香在木心波斯斷其木剪取之肥者出婆律膏於木端流出斫木作坎而承之兩說大同而小異今海南龍腦多用火煏成片其中亦容雜僞入藥惟貴生者狀若梅花瓣甚佳也唐本注云樹形似杉木言婆律膏是樹根下清脂龍腦是根中乾脂子似豆蔻皮有甲錯香似龍腦味辛尤下惡氣消食散脹滿香人口舊云出婆律國藥以國爲名即杉脂也江南有杉木未經試或方土無脂甘蕉無實唐本先附經驗方治急中風目瞑牙噤無門下藥者以中指點散子揩齒三二十揩大牙左右其口自開如得下藥龍腦天南星等分爲末鉢内研自五月五日午時合出者只用一字至半錢名開關散經驗後方治時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見鬼神龍腦一錢細研旋滴猪心血和丸如鷄頭肉大每服一丸紫草湯下心神便定得睡瘡復發透依常將息取安衍義曰龍腦條中與圖經所說名未盡此物大通利關膈熱塞其清香爲百藥之先大人小兒風涎閉壅及暴得中熱甚濟用然非常服之藥獨行則勢弱佐使則有功於茶爾相宜多則掩茶氣味萬物中香無出其右者西方抹羅短吒國在南印度境有羯布羅香榦如松株葉異濕時無香採乾之後折之中有香狀類雲母色如冰雪此龍腦香也蓋西方亦有食茱萸食茱萸味辛苦大熱無毒功用與吴茱萸同少爲劣爾療水氣用之乃佳圖經曰食茱萸舊不載所出州土云功用與吴茱萸同或云即茱萸中顆粒大經久色黄黑堪啖者是今南北皆有之其木亦甚高大有長及百尺者枝莖青黄上有小白點葉正類油麻花黄蜀人呼其子爲艾子蓋禮記所謂藙者元艾聲訛故云耳宜入食羹中能發辛香然不可多食多食衝眼兼又脱髮採無時唐本注云皮薄開口者是雖名爲食茱萸而不堪多啖之也陳藏器云食茱萸殺鬼魅及惡蟲毒起陽殺牙齒蟲痛唐本先附又云云經已有吴茱萸云是口折者且茱萸南北總有以吴地爲好所以有吴之名兩處俱堪入食若充藥用要取吴者禹錫云按藥性論云畏紫石英治冷痹腰脚軟弱通身刺痛腸風痔疾殺腸中三蟲去虚冷孫眞人食忌云六月七月勿食傷人氣發瘡疾勝金方治蛇咬毒茱萸一兩爲末冷水調分爲三服立瘥蕪荑蕪黃味辛平無毒主五内邪氣散皮膚骨節中淫淫温行毒去三蟲化食逐寸白散腸中嗢嗢喘息一名無始一名𦽄䕋上音殿下音唐生晋山川谷三月採實陰乾圖經云蕪荑生晋山川谷今近道亦有之大抵榆類而差小其實亦早成此榆乃大氣臭如𤜦爾雅釋木云無姑其實夷郭璞云無姑姑榆也生山中葉圓而厚剥取皮合漬之其味辛香所謂蕪荑也又釋草云莁荑蔱蘠注云一名白蕢而與本經一名𦽄䕋相近蘇恭云蔱蘠𦽄䕋字之誤也然莁荑草類蕪荑乃木也明是二物或氣類之相近歟三月採實陰乾殺蟲方中多用之今人又多取作屑以芼五味其用陳者良人收藏之多以鹽漬則失氣味此等不堪入藥但可作食品耳藥性論云蕪荑使味苦辛能主積冷氣心腹癥痛除肌膚節中風淫淫如蟲行陶隱居云今惟出高麗狀如榆莢氣臭如𤜦人皆作醬食性殺蟲置物中辟蛀但患其臭陳藏器云作醬食之主五雞病除瘡癬其氣膻者良此山榆人也孟詵云主五臟皮膚肢節邪氣又熱瘡擣和猪脂塗瘥又和白蜜治濕癬和沙牛酪療一切瘡陳者良可少食之傷多發熱心痛爲辛故也秋天食之尤宜人長食治五痔諸病不生日華子云治腸風痔瘻惡瘡疥癬海藥云謹按黄州記云生大秦國是波斯蕪荑也味辛温無毒治冷痢心氣殺蟲止痛又婦人子宫風虚孩子疳瀉得訶子豆蔻良食療云散腹中氣痛又和馬酪可治癬作醬甚香美功尤勝於榆人陳者良又殺中惡蠱毒外臺秘要方治膀胱氣急宜下氣蕪荑又和食鹽末二物等分以綿裹如棗大内下部或下水惡汁并下氣佳千金方主脾胃有蟲食即痛面黃無色疼痛無時必效以石州蕪荑仁二兩和麵炒令黄色爲末非時米飲調一錢七瘥衍義曰蕪荑有大小兩種小蕪荑即榆莢也揉取仁醖爲醬味尤辛入藥當用大蕪荑别有種然小蕪荑醖造多假以外物相和不可不擇去也治大腸寒滑及多冷氣不可缺枳殻合依圖經本草積寶枳殻味苦酸微寒無毒主風癢麻痹通利關節勞氣咳嗽背腫悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛生商州川谷九月十月採陰乾用當去瓤核乃佳此與枳實主療稍别故特出此條今附圖經曰文具枳實條下陳藏器云其根皮主野鷄病末服方寸七本經採實用九月十月不如七月八月既厚且辛書曰江南爲橘江北爲枳今江南俱有枳橘江北有枳無橘此自别種非干變易也禹錫云按藥性論云枳殻使味苦辛治遍身風疹肌中如麻豆惡癢主腸風痔疾心腹結氣兩脅脹虚關膈擁塞根浸酒煎含治齒痛消痰有氣加而用之日華子云健脾開胃開五臟下氣止嘔逆消痰治反胃霍亂瀉痢消食破癥結痃癖五膈氣除風明目及肺氣水腫利大小腸皮膚癢痔腫可炙熨入藥浸軟剉炒令熟雷公云凡使勿用枳實縁性效不同若使枳殻取辛苦腥并有隙油能消一切𤸷要陳久年深者爲上用時先去瓤以麩炒過待麩焦黑遂出用布拭上焦黑然後單搗如粉用千金方主口僻眼急風枳茹刮取上青爲末欲至瓤上者得茹五升微火灼去濕氣以酒三升漬微火煖令得藥味遂性飲之肘後方治中風身直不得屈伸者刮枳樹皮一升酒二升漬一宿服五合至一升酒盡再作食醫心鏡方治水氣皮膚癢及明目枳殻一兩杵末如茶法煎呷之經驗後方治風疹癢不止枳殻三兩麩炒微黄去瓤爲末每服二錢非時水一中盞煎至六分去滓服梅師方治一切瘡以水煮枳殻爲煎塗之博濟方治遠年日近腸風下血不止枳殻燒成黑灰存性羊脛炭爲末枳殻末五錢炭末三錢和匀用濃米飲一中盞調下空心服五更初一服如人行五里再服當日見效必效方熨痔痔頭出或痛不可忍枳殻於煻灰中煨熱微熨盡七枚立定發即熨之杜壬方瘦胎散昔胡陽公主難産方士進枳殻四兩甘草二兩爲末每服空心大錢七如茶點服自五月後一日一服至臨月不惟易産仍無胎中惡病忌登高厠枳實枳實味苦酸寒微寒無毒主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄明目生河内川澤九月十月採陰乾圖經曰枳實生河内川澤枳殻生商州川谷今西京江湖州郡皆有之以商州者爲佳如橘而小高亦五七尺葉如棖多刺春生白花至秋成實九月十月採陰乾舊說七月八月採者爲實九月十月採者爲殻今醫家多以皮厚而小者爲實實完大者殻皆以翻肚如盆口唇狀須陳久者爲勝近道所出者俗呼臭橘不堪用張仲景治心下堅大如盤水飲所作枳實术湯主之枳實七枚术三兩以水一斗煎取三升分三服腹中軟即消陶隱居云今處處有採破令乾用之除中核微炙令香亦如橘皮以陳者爲良枳樹莖及皮療水脹暴風骨節疼急枳實俗方多用道家不須陳藏器云枳實根皮主痔末服方寸凡本經採實用九月十月不如七月人月物厚且辛舊云江南爲橘江北爲枳今江南俱有枳橘江北有枳無橘此是自種别非關變也禹錫云按藥性論云枳實臣味苦辛解傷寒結胸入陷胸湯用主上氣喘咳腎内傷冷陰陽而有氣加而用之外臺秘要方塗風疹取枳實以醋漬令濕火炙令熱適寒温用熨上即消千金方治胸痹氣壅滿心膈不利枳實二兩麩炒微黄爲末非時以清粥飲調下二錢聖惠方同又方治積痢脱肛枳實石磨令滑鑽著柄蜜塗火炙令暖更易熨肛取縮即止集驗方治五痔不以年月日乆新枳實爲末煉蜜丸如桐子大空心飲下二十丸濟衆方治傷寒後卒胸膈閉痛枳實一味剉麩炒黄爲末服二錢米飲調下日二服廣利方治小兒久痢淋瀝水穀不消枳實六分擣末以飲汁調二錢七二歲服一錢子母秘録方治婦人陰腫堅痛用半斤碎炒令熱故帛裹熨冷即易之衍義曰枳殻枳實一物也小則性酷而速大則性詳而緩故張仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通决泄破結實之義他方但導敗風壅之氣可常服者故用枳殻厚朴厚朴味苦温大温無毒主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲温中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃一名厚皮一名赤朴其樹名榛其子名逐折療鼠瘻明目益氣生交趾冤句三月九月採皮陰乾乾薑爲之使惡澤瀉寒水石消石圖經曰厚朴出交趾冤句今京西陜西江淮湖南蜀川山谷中往往有之而以梓州龍州者爲上木高三四丈徑一二尺春生葉如槲葉四季不凋紅花而青實皮極鱗皴而厚紫色多潤者佳薄而白者不堪三月九月十月採皮陰乾廣雅謂之重皮方書或作厚皮藥性論云厚朴臣忌豆食之者動氣味苦辛大熱能主療積年冷氣腹内雷鳴虚吼宿食不消除痰飲去結水破宿血消化水穀止痛大温胃氣嘔逆酸水主心腹滿病人虚而尿白陶隱居云今出建平宜都極厚肉紫色爲好殻薄而白者不如用之削去上甲錯皮俗方多用道家不須今注出梓州龍州者最佳禹錫云按吴氏云厚朴神農岐伯雷公苦無毒季氏小温范子厚朴出洪農日華子云健脾主反胃霍亂轉筋冷熱氣瀉膀胱泄五臟一切氣婦人産前産後風臟不調關節殺腹藏蟲除驚去煩悶明耳目入藥去粗皮薑汁炙或薑汁炒用又名烈朴雷公曰凡使要用紫色味辛爲好或丸散便去粗皮用酥炙過修一斤用酥四兩炙了細剉用若湯飲中使用自然薑汁八兩炙一升爲度聖惠方治霍亂製之以薑汁火上炙令香爲末非時新水調下二錢七佳梅師方治水穀痢乆不瘥厚朴三兩黄連三兩剉水三升煎取一升空心服子母秘録方治月水不通厚朴三兩以水三升煎取一升爲三服空心不過三四劑瘥衍義曰厚朴今西京伊湯縣及商州亦有但薄而色淡不如梓州者厚而紫色有油味苦不以薑製則棘人喉舌平胃散中用最調中至今此藥盛行既能温脾胃氣又能去冷氣爲世所須也茗苦茶茗茗苦茶茗味甘苦微寒無毒主瘻瘡利小便去痰熱渇令人少睡春採之苦茶主下氣消宿食作飲加茱萸葱薑等良圖經曰茗苦茶舊不著所出州郡今閩浙蜀荆江湖淮南山中皆有之爾雅所謂之苦茶郭璞云大小似栀子冬生葉可煑作羹飲今呼早採者爲茶晚取者爲茗一名荈蜀人謂之苦荼是也今通謂之茶茶荼聲近故呼之春中始半嫩葉蒸焙去苦水末之乃可吃與古所食殊不同也唐本注云爾雅釋木云檟苦茶注樹小似栀子冬生葉可煮作羹飲今呼早採者爲茶晚取者爲茗一名荈蜀人名之苦荼生山南漢中山谷陳藏器云茗苦茶寒破熱氣除瘴氣利大小腸食之宜熱冷即聚痰茶是茗嫩葉搗成餅并得火良乆食令人瘦去人脂使不睡唐本先附茶譜云蒙山有五頂頂有茶園其中頂曰上清峰昔有僧人病冷且乆遇一老父謂曰蒙之中頂茶當以春分之先後多聚人力俟雷之發聲併手採摘三日而止若獲一兩以本處水煎服即能祛宿疾二兩當限前無疾三兩固以換骨四兩即爲地仙矣外臺秘要方治卒頭痛如破非中冷非中風其病是胸膈有痰厥氣上衝所致名爲厥頭痛吐之即差單煮茗作飲二三升適冷暖飲一二升須臾吐吐畢又飲能如此數過劇者須吐膽汁乃止不損人待渇即瘥食醫心鏡方主赤白痢及熱毒痢好茶一斤炙擣末濃煎一二盞吃如久患痢亦宜服經驗方治陰囊上瘡用蠟面茶爲末先以甘草煎水洗後用貼妙别說云謹按圖經云今閩浙蜀荆江湖淮南山中皆有之唯建州北苑數處産此性味獨與諸方略不同今亦獨名臘茶研治作餅日得火愈良或用芽葉爲末收貯微若見大便更不可久收衍義曰茗苦茶今也其文有陸羽茶經丁謂北苑茶録毛文錫茶譜蔡宗顔茶山節對其說甚詳然古人謂其芽爲雀舌麥顆言其至嫩也又有新芽一發便長寸餘微麤如針惟芽長爲上品其根榦水土力皆有餘故也如雀舌麥顆又下品前人未盡識誤爲品題唐人有言曰釋滯消壅一日之利暫佳斯言甚當飲茶者宜原其始終又晋温嶠上表貢茶千斤茗三百斤郭璞曰早採者爲茶晚採者爲茗茗或曰荈兖葉老者也秦皮秦皮味苦微寒大寒無毒主風寒濕痹洗洗寒氣除熱目中青翳白膜療男子少精婦人帶下小兒癇身熱可作洗目湯久服頭不白輕身皮膚光澤肥大有子一名岑皮一名石檀生廬江川谷及冤句二月八月採皮陰乾大戟爲之使惡吴茱萸圖經曰秦皮生廬江川谷及冤句今陜西州郡及河陽亦有之其木大都似檀枝幹皆青緑色葉如匙頭許大而不光并無花實根似槐根二月八月採皮陰乾其皮有白點而不粗錯俗呼爲樳木取皮漬水便碧色書紙看之青色此爲眞也外臺秘要方治赤眼及睛上瘡秦皮一兩清水一升於白碗中浸春夏一食時以上看碧色出即以箸頭纏綿仰卧點所患眼仍先從大毗中滿眼著微痛不畏良乆三五飯之間即側卧瀝却熱汁每日十度已上著不過兩日瘥沈存中方奏皮治天蛇毒似癩而非癩也天蛇即草間黄花蜘蛛是也人被其螫仍爲露水所濡乃成此疾遂煮汁一斗飲之瘥圖經衍義本草卷之二十二
