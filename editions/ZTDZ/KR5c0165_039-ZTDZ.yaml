front:
  text: 圖經衍義本草卷之三十九嚴六
  hash: sha256:0e3ad37d4240e77eeff83531f06ac2190db8e362cf642b2a847333d4ba71e1cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_SJB_039-170751a, image: sjb/17/170751a.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正米穀部下品醋醋味酸温無毒主消癰腫散水氣殺邪毒陶隱居云醋酒爲用無所不入愈久愈良亦謂之醯以有苦味俗呼爲苦酒丹家又加餘物謂爲華池左味但不可多食之損人肌臟日華子云醋治産後婦人并傷損及金瘡血運下氣除煩破癥結治婦人心痛助諸藥力殺一切魚肉菜毒又云米醋功用同醋多食不益男子損顔色禹錫云按陳藏器云醋破血運除癥塊堅積消食殺惡毒破結氣心中酸水痰飲多食損筋骨然藥中用之當取二三年米酢良蘇云葡萄大棗皆堪作酢縁渠是荆楚人土地儉嗇果敗猶取以釀醋糟醋猶不入藥况於果乎孟詵云多食損人胃消諸毒氣能治婦人産後血氣運取美清醋煎稍稍含之即愈又人口有瘡以黄檗皮醋漬含之愈又牛馬疫病和灌服諸藥不可多食不可與蛤肉同食相反又江外人多爲米醋北人爲糟醋發諸藥不可同食研青木香服止卒心痛血氣等又大黄塗腫米醋飛丹用外臺秘要方治轉筋取故綿以釅醋浸甑中蒸及熱用裹病人脚冷更易勿停差止又方治風毒腫白虎病以三年釅醋五升熱煎三五沸切葱白二三升煮一沸許漉出布帛熱裹當病上熨之差爲度千金方治耳聾以醇酢微火煎附子削令尖塞耳效又方治霍亂心腹脹痛煩滿短氣未得吐下飲好苦酒三升小老羸者可飲一二升肘後方治癰已有膿當壞以苦酒和雀屎傅癰頭上如小豆大即穿經驗方治汗不溜痩却腰脚耳聾米醋浸京三棱夏浸四日冬六日杵爲末醋湯調下衍義曰醋酒糟爲之乞鄰者是此物然有米醋麥醋棗醋米醋最釅入藥多用穀氣全也故勝糟醋産婦房中常得醋氣則爲佳酸益血也磨雄黄塗蜂蠆亦取其收而不散也今人食酸則齒軟謂其水生木水氣弱木氣盛故如是造靴皮須得此而紋皺故知其性收斂不負酸收之說稻米稻米味苦王温中令人多熱大便堅圖經曰稻米有秔與粳同稻有糯稻舊不載所出州土今有水田處皆能種之秔糯既通爲稻而本經以秔爲粳米糯爲稻米者謹按爾雅云稌稻釋曰别二名也郭璞云沛國呼稌詩頌云多黍多稌禮記内則云牛宜稌豳詩云十月獲稻是一物也說文解字云沛國謂稻爲糯粳稌屬也字林云糯黏稻也粳稻不黏者今人呼之者如字林所說也本經稱號者如說文所說也前條有陳廪米即粳米以廪軍人者是也入藥最多稻稈灰亦主病見劉禹錫傳信方云湖南李從事治馬墜撲損用稻稈燒灰用新熟酒未壓者和糟入鹽和合淋前灰取汁以淋痛處立差陶隱居云道家方藥有俱用稻米粳米此則是兩物矣云稻米白如霜又江東無此皆通呼粳爲稻爾不知其色類復云何也陳藏器云糯米性微寒妊身與雜肉食不利子作糜食一斗主消渴久食之令人身軟黍米及糯飼小猫犬令脚屈不能行緩人筋故也又云稻穰主黄病身作金色煮汁浸之又稻穀芒炒令黄細研作末酒服之日華子云糯米凉無毒補中益氣止霍亂取一合以水研服煮粥稻穰治蠱毒濃煎汁服稻稈治黄病通身煮汁服之孟詵云糯米寒使人多睡發風動氣不可多食又霍亂後吐逆不止清水研一碗飲之即止蕭炳云糯米擁諸經絡氣使四肢不收發風昏昏主痔疾以駱駝脂作煎餅服之空腹與服勿令病人知外臺秘要方治渴方糯米二升淘取泔飲訖則定若不渴不須一方渴者服當飽研糯米取白汁恣飲之以差爲度梅師方治霍亂心悸熱心煩渴以糯米水清研之冷熟水混取米泔汁任意飲之簡要濟衆方治鼻衄不止服藥不應獨聖散糯米微炒黄爲末每服二錢新汲水調下衍義曰稻米今造酒者是此水田米皆謂稻前既言粳米即此稻米乃糯稻無疑温故可以爲酒酒爲陽故多熱又令人大便堅非糯稻孰能與於此西域記天竺國土溽熱稻歲四熟亦可驗稷米稷米味甘無毒主益氣補不足陶隱居云稷米亦不識書多云黍與稷相似又有稌亦不知是何米詩云黍稷稻粱禾麻菽麥此即八穀也俗人莫能證辨如此穀稼尚弗能明而况芝英乎稌音吐日華子云稷米冷治熱壓丹石毒多食發冷氣能解苦瓠毒不可與川附子同服禹錫云按陳藏器云彫胡是菰蔣草米古今所貴彫胡性冷止渴内則云魚宜菰枲粱按枲粱亦粱之類消玉未聞按糜穄一物性冷塞北最多廣雅云穄也如黍黑色稗有二種一黄白一紫黑其紫黑者芑有毛北人呼爲烏禾又云五穀燒作灰爇主惡瘡疥癬蟲瘻疽螫毒塗之和松脂雄黄燒灰更良作法如甲煎爲之孟詵云稷益諸不足山東多食服丹石人發熱食之熱消也發三十六種冷病氣八穀之中最爲下苗黍乃作酒此乃作飯用之殊途不與瓠子同食令冷病發發即黍釀汁飲之即差外臺秘要方治脚氣衝心悶洗脚漬脚湯以糜穰一石内釜中多煮取濃汁去滓内椒目一斗更煎十餘沸漬脚三兩度如冷温漬洗差衍義曰稷米今謂之穄米先諸米熟又其香可愛故取以供祭祀然發故疾只堪爲飯不黏著其味淡也腐婢腐婢味辛平無毒主痎瘧寒熱邪氣泄痢陰不起止消渴病酒頭痛生漢中即小豆花也七月採陰乾痎音皆圖經曰腐婢小豆花也生漢中今處處有之陶隱居以爲海邊有小木狀似栀子氣作臭腐土人呼爲腐婢疑是此蘇恭云山南相承呼以爲葛花是也今注云小豆花亦有腐氣按本經云主病酒頭痛海邊小木自主瘧及心腹痛葛花不言主酒病注云并小豆花末服方寸久飲酒不知醉也然則三物皆有腐婢名是異類同名耳本經此比甚多也一說赤小豆花亦主病酒禹錫云按藥性論云赤小豆花名腐婢能消酒毒明目散氣滿不能食煮一頓服之又下水氣并治小兒丹毒熱腫食醫心鏡云主寒熱泄痢瘴瘧寒熱邪氣泄痢陰氣不足止渇及病酒頭痛以小豆花於豉中煮五味調和作羹食之外臺秘要方治渴小便利復非淋小豆藿一把搗取汁頓服醬味鹹酸冷利主除熱止煩滿殺百藥熱湯及火毒陶隱居云醬多以豆作純麥者少今此當豆者亦以乆乆者彌妙又有肉醬魚醬皆呼爲醢不入藥用聖惠方治飛蛾入耳醬汁灌入耳即出又擊銅器於耳傍千金方治指掣痛以醬清和蜜任多少温傅之愈肘後方湯火燒灼未成瘡豆醬汁傅之衍義曰醬聖人以謂不得即不食意欲五味和五臟悅而受之此亦安樂之一端也陳廪米味鹹酸温無毒主下氣除煩渴調胃止泄陶隱居云此今乆入倉陳赤者湯中多用之人以作醋勝於新粳米也禹錫云按陳士良云陳倉米平胃口止泄瀉暖脾去憊氣宜作湯食日華子云陳倉米補五臟澁腸胃食療云炊作乾飯食之止痢補中益氣堅筋骨通血脉起陽道又毒腫惡瘡久陳者蒸作飯和酢封腫上立差卒心痛研取汁服之北人炊之於瓮中水浸令酸食之煖五臟六腑之氣食醫心鏡云除煩熱下氣調胃止泄痢作飯食之衍義曰陳廪米今經與諸家注說皆不言是粳米爲復是粟米然粳粟二米陳者性皆冷頻食之令人自利與經所說稍戾煎煮亦無膏膩入藥者今人多用新粟米至舂杵頭細糠又復不言新陳粳粟然皆不及新稻粟二糠陳則氣味已腐敗罌子粟罌子粟味甘平無毒主丹石發動不下食和竹瀝煮作粥食之極美一名象穀一名米囊一名御米花紅白色似鶻箭頭中有米亦名囊子鶻音孝衍義曰罌子粟其花亦有多葉者其子一罌數千萬粒大小如葶藶子其色白隔年種則佳研子以水煎仍加蜜爲罌粟湯服石人甚宜飲師草實味甘平無毒主不饑輕身出東海洲島似大麥秋熟一名禹餘糧非石之餘糧也海藥云其實如球子八月收之彼常食之物主補虚羸乏損温腸胃止嘔逆久食健人一名然穀中國人未曾見也寒食飯主滅瘢痕有舊瘢及雜瘡并細研傅之飯灰主病後食病外臺秘要云治蛟龍瘕寒食餳三升每服五合一日三服遂吐出蛟龍有兩頭及尾也狼尾草子作黍食之令人不饑似茅作穗生潤澤地廣志云可作黍爾雅云孟狼尾今人呼爲狼茅子蒯草子亦堪食如粳米苗似茅胡豆子味甘無毒主消渴勿與鹽煮食之苗似豆生野田間米中往往有之麥苗味辛寒無毒主蠱煮取汁細絹瀘服之穩即芒秕也穩與本切社酒噴屋四壁去蚊蟲内小兒口中令速語此祭祀餘者酒也圖經衍義本草卷之三十九
