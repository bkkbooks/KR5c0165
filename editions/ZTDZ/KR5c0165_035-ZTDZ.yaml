body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正果部上品豆蔻豆蔻味辛温無毒主温中心腹痛嘔吐去口臭氣生南海圖經曰豆蔻即草豆蔻也生南海今嶺南皆有之苗似蘆葉似山薑杜若輩根似高良薑花作穗嫩葉卷之而生初如芙蓉穗頭深紅色葉漸展花漸出而色漸淡亦有黄白色者南人多採以當果實尤貴暴乾者煎湯服之極能除冷氣止霍亂消酒食毒甚佳藥性論云草豆蔻可單用能主一切冷氣陶隱居云味辛烈者爲好甚香可常含之其五和糝中物皆宜人廉薑最温中下氣益智熱枸櫞温甘蕉麂目并小冷爾糝素切感枸音矩櫞音沿麂音几唐本注云豆蔻苗似山薑花黄白苗根及子赤似杜若枸櫞性冷陶云温誤爾今注此草豆蔻也下氣止霍亂日華子云豆蔻花熱無毒下氣止嘔逆除霍亂調中補胃氣消酒毒又云山薑花暖無毒調中下氣消食殺酒毒禹錫云按蜀本圖經云苗似杜若春花作穗端如芙蓉四房生於莖下白色花開即黃根似高良薑實若龍眼而無鱗甲中如石榴子莖葉子皆味辛而香十月收今苑中亦種之海藥云豆蔻生交趾其根似益智皮殻小厚核如石榴辛且香蒳草樹也葉如芄蘭而小三月採其葉細破陰乾之味近苦而有甘千金方治心腹脹滿短氣以草豆蔻一兩去皮爲末以木瓜生薑湯下半錢衍義曰豆蔻草豆蔻也味極辛微香此是對肉豆蔻而名之若作果則味不和不知前人之意編入果部有何意義性温而調散冷氣力甚速花性熱淹置京師然味不甚美微苦必爲能消酒毒故爲果花乾則色淡紫藕實藕實莖味甘平寒無毒主補中養神益氣力除百疾乆服輕身耐老不饑延年一名水芝丹一名蓮生汝南池澤八月採圖經曰藕實莖生汝南池澤今處處有之生水中其葉名荷謹按爾雅及陸機疏謂荷爲芙蕖江東呼荷其莖茄其葉蕸加遐二音或作葭其本蔤莖下白蒻在泥中者其華未發爲菡萏已發爲芙蓉其實蓮上謂房也其根藕凡此數物今人皆以中藥藕生食其莖主霍亂後虚渴煩悶不能食及解酒食毒花鎭心益顔色入香尤佳荷葉止渴殺蕈毒今婦人藥多用荷葉者葉中蒂謂之荷鼻主安胎去惡血留好血實主益氣其的至秋表皮黑而沉水者謂之石蓮陸機云可磨爲飯如粟飯輕身益氣令人强健醫人炒末以止痢治腰痛又治噦逆以實人六枚炒赤黄色研末冷熱水半盞和服便止惟苦薏不可食能令人霍亂大抵功用主血多效蒻音若藥性論云藕汁亦單用味甘能消瘀血不散即擣汁主吐血不止口鼻并皆治之陶隱居云此即今蓮子八月九月取堅黑者乾搗破之花及根并入神仙用今云莖恐即是根不爾不應言甘也宋帝時大官作血疱人削藕皮誤落血中遂皆散不凝醫用藕療血多效唐本注云别録云藕主熱渴散血生肌乆服令人心喜陳藏器云荷鼻味苦平無毒主安胎去惡血留好血血痢煮服之即荷葉蒂又葉及房主血脹腹痛産後胎衣不下酒煮服又主食野菌毒水煮服鄭玄云芙蕖莖曰荷的中薏食之令人霍亂陳士良云蓮子心生取爲末以米飲調下三錢療血渴疾産後渴疾服之立愈日華子云藕温止霍亂開胃消食除煩止悶口乾渴疾止怒令人喜産後血悶生研服亦不妨可及金瘡并傷却止暴痛蒸煮食大開胃節冷解熱毒消瘀血産後血悶合地黄生研汁熱酒并小便服并得又云蓮子温并石蓮益氣止渴助心止痢治腰痛治泄精安心多食令人喜又名蓮的蓮子心止霍亂又云荷葉止渴落胞殺蕈毒并産後口乾心肺燥煩悶入藥炙用之又云蓮花暖無毒鎭心輕身益色駐顔入香甚妙忌地黄蒜孟詵云藕生食之主霍亂後虚渴煩悶不能食其産後忌生冷物惟藕不同生冷爲能破血故也又蒸食甚補五臟實下焦與蜜同食令人腹臟肥不生諸蟲亦可休糧仙家有貯石蓮子及乾藕經千年者食之至精矣又云蓮子性寒主五臟不足傷中氣絶利益十二經脉血氣生食微動氣蒸食之良又熟去心爲末蠟蜜和丸日服三十丸令人不饑此方仙家用爾禹錫云按蜀本圖經云此生水中葉名荷圓徑尺餘爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏是也爾雅釋曰芙蕖其總名也别名芙蓉江東呼荷菡萏蓮葉也的蓮實也薏中心也郭云蔤下白蒻在泥中者今江東人呼荷葉爲芙蓉北方人便以藕爲荷亦以蓮爲荷蜀人以藕爲茄或用其母爲華名或用根子爲母葉號此皆名相錯習俗傳誤失其正體也陸機疏云蓮靑皮裏白子爲的的中有靑爲薏味甚苦故俚語云苦如薏是也孫眞人云蓮子不去心食成霍亂食醫心鏡云藕實味甘平無毒主補中養神益氣力除百病久服令人歡心止渴去熱輕身耐老不饑延年其根止熱渴破留血生肌乆服令人悅澤矣聖惠方治時氣煩渴用生藕汁一半盞入生蜜一合令匀分爲二服又方治撲打墜損惡血攻心悶亂疼痛以火乾荷葉五斤燒令烟盡細研食前以童子熱小便一小盞調三錢七日三服千金方治墜馬積血心腹唾血無數乾花根爲末酒服方寸七日三服經驗後方主吐血咯血以荷葉疳乾爲末米湯下二錢七梅師方治産後餘血不盡奔上衝心煩悶腹痛以生藕汁一升飲之救急方治産後血不盡疼悶心痛荷葉熬令香爲末煎水下方寸七集驗方治漆瘡取蓮葉乾者一斤水一斗煮取二升洗瘡上曰再即差衍義曰藕實就蓬中乾者爲石蓮子取其於砂盆中乾擦去浮上赤色留靑心爲末少入龍腦爲湯點寧心志清神然亦有粉紅千葉白千葉者皆不實如此是有四等也其根惟白蓮爲佳今禁中又生碧蓮亦一瑞也橘柚橘柚味辛温無毒主胸中瘕熱逆氣利水穀下氣止嘔咳除膀胱留熱停水五淋利小便主脾不能消穀氣衝胸中吐逆霍亂止泄去寸白久服去臭下氣通神輕身長年一名橘皮生南山川谷生江南十月採圖經曰橘柚生南山川谷及江南及江浙荆襄湖嶺皆有之木高一二丈葉與枳無辨刺出於莖間夏初生白花六月七月而成實至冬而黄熟乃可噉舊說小者爲橘大者爲柚又云柚似橙而實酢大於橘孔安國注尚書厥包橘柚郭璞注爾雅柚條皆如說又閩中嶺外江南皆有柚比橘黃白色而大襄唐間柚色靑黄而實小皆味酸皮厚不堪入藥陶隱居云此是說其皮功爾以東橘爲好西江亦有而不如其皮小冷療氣乃言勝橘北人亦用之并以陳者爲良其肉味甘酸食之多痰恐非益也今此雖用皮旣是果類所以猶宜相從柚子皮乃可服而不復入藥用此應亦下氣唐本注云柚皮厚味甘不如橘皮味辛而苦其肉亦如橘有甘有酸酸者名胡甘今俗人或謂橙爲柚非也按吕氏春秋云果之美者有雲夢之柚郭璞云柚似橙而大於橙孔安國云大曰柚小曰橘皆爲甘酸今注自木部今移入此陳藏器云橘柚本功外中實冷酸者聚痰甜者潤肺皮堪入藥子非宜人其類有朱柑乳柑黃柑石柑沙柑橘類有朱橘乳橘塌橘山橘黃淡子此輩皮皆去氣調中實總堪食就中以乳柑爲上本經合入果部宜加實字入木部非也嶺南有柚大如冬瓜日華子云橘味甘酸止消渴開胃除胸中膈氣又云皮暖消痰止嗽破癥瘕痃癖又云核治腰痛膀胱氣腎疼炒去殻酒服良橘囊上筋膜治渴及吐酒炒煎湯飲甚驗也又云柚子無毒治妊孕人吃食少并口淡去胃中惡氣消食去腸胃氣解酒毒治飲酒人口氣禹錫云按藥性論云橘皮臣味苦辛能治胸膈間氣開胃主氣痢消痰涎治上氣咳嗽孟詵云橘止泄痢食之下食開胸膈痰實結氣下氣不如皮穰不可多食止氣性雖温止渴又乾皮一斤禱爲末蜜爲丸每食前酒下三十丸治下焦冷氣又取陳皮一斤和杏仁五兩去皮尖熬加少蜜爲丸每日食前飲下三十丸下腹臟間虚冷氣脚氣衝心心下結硬悉主之食醫心鏡云主胸中伏熱下氣消痰化食橘皮半兩微熬作末如茶法煎呷之肘後方治卒失聲聲咽不出橘皮五兩水三升煮取一升去滓頓服經驗後方治膈下冷氣及酒食飽滿常服靑橘皮四兩鹽一兩分作四分一分無用湯浸靑橘皮一宿漉出去穰又用鹽三分一處拌和匀候良久跳子内炒微焦爲末每服一錢半茶末半錢水一盞煎至七分放温常服不用入茶煎沸湯點亦妙孫尚藥方治諸吃噫橘皮二兩湯浸去瓤剉以水一升煎之五合通熱頓服更加枳殻一兩去瓤炒同煎之服效集驗方治腰痛不可忍橘子仁炒研爲末每服一錢酒一盞煎至七分和滓空心服衍義曰橘柚自是兩種故曰一名橘皮是元無柚字也豈有兩等之物而治療無一字别者即知柚一字爲誤後人不深求其意謂柚字所惑妄生分别亦以過矣且青橘與黃橘治療尚别矧柚爲别種也郭璞云柚似橙而大於橘此即是識橘柚者也今若不如此言之恐後世亦以柚皮爲橘皮是貽無窮之患矣去古旣遠後之賢者亦不以意逆之耳橘惟用皮與核皮天下甚所須也仍湯浸去穰餘如經與注核皮二者須自收爲佳有人患氣嗽將期或教以橘皮生薑焙乾神麯等分爲末丸如桐子大食後夜卧米飲服三五十丸兼舊患膀胱縁服此皆愈然亦取其陳皮入藥此六陳中一陳也腎疰腰痛膀胱氣痛微炒核去殻爲末酒調服愈棗大棗味甘平無毒主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥補中益氣强力除煩悶療心下懸腸澼久服輕身長年不饑神仙一名乾棗一名美棗一名良棗八月採暴乾三歲陳核中人燔之味苦主腹痛邪氣生棗味甘辛多食令人多寒熱羸瘦者不可食葉覆麻黄能令出汗生河東平澤殺烏頭毒燔音煩圖經曰大棗乾棗也生棗并生河東今近北州郡皆有而青晋絳州者特佳江南出者堅燥少脂謹按棗之類最多郭璞注爾雅棗壺棗云今江東呼棗大而銳上者爲壺壺猶瓠也邊腰棗云子細腰今謂之鹿盧棗櫅白棗云即今棗子白乃熟樲酸棗云木小實酢者遵羊棗云實小而圓紫黑色今俗呼之爲羊矢棗洗尖棗云今河東猗氏縣出大棗子如雞卵蹶泄苦棗云子味苦者晳無實棗云不著子者還味稔棗云還味短味也而酸棗自見别條其餘種類非一今園圃皆種蒔之亦不能盡别其名又其極美者則有水菱棗御棗之類皆不堪入藥櫅子兮切稔五切審陶隱居云舊云河東猗氏縣棗特異今靑州者形大核細多膏甚甜鬱州互市亦得之而鬱州者亦好小不及爾江東臨沂金城棗形大而虚少脂好者亦可用南棗大惡殆不堪啖道家方藥以棗爲佳餌其皮利肉補虚所以合湯皆擘之也唐本注云别録云棗葉散服使人瘦乆即嘔吐揩熱痱瘡良日華子云乾棗潤心肺止嗽補五臟治虚勞損除腸胃癖氣和光粉燒治疳痢牙齒有病人切忌啖凡棗不宜合生葱食又云棗葉温無毒治小兒壯熱煎湯浴和葛粉裛痱子佳及治熱瘤禹錫云按孟詵云乾棗温主補津液强志三年陳者核中人主惡氣卒疰忤又療耳聾鼻塞不聞音聲香臭者取大棗十五枚去皮核萆麻子三百顆去皮二味和搗綿裹塞耳鼻日一度易三十餘日聞聲及香臭先治耳後治鼻不可并塞之又方巴豆十粒去殻生用松脂同搗綿裹塞耳又云洗心腹邪氣和百藥毒通九竅補不足氣生者食之過多令人腹脹蒸煮食補腸胃肥中益氣第一靑州次蒲州者好諸處不堪入藥小兒患秋痢與蟲棗食良食療云棗和桂心白瓜人松樹皮爲丸久服香身并衣亦香軟棗温多食動風發冷風咳嗽聖惠方令髮易長東行棗根三尺横安甑上蒸之兩頭汗出收之傅髮即長外臺秘要方痔發疼痛肥大棗一枚剥去皮取水銀掌中以唾研令極熟傅棗瓤上内下部差梅師方治妊娠四五月忽腹絞痛以棗十四枚燒令焦爲末以小便服衍義曰大棗今先靑州次蒲州此二等可㬠曝入藥益脾胃爲佳餘止可充食用又御棗甘美輕脆後衆棗熟以其甘故多生蟲今人所謂撲落酥者是又有牙棗先衆棗熟亦甘美但微酸尖長此二等止堪啖不堪收曝今人將乾棗去核於鐺鍋内微火緩逼乾爲末量多少入生薑末爲湯點服調和胃氣又將煮棗肉和治脾胃丸藥尤佳又靑州棗去皮核焙乾爲棗圈達都下爲奇果栗栗味鹹温無毒主益氣厚腸胃補腎氣令人耐饑生山陰九月採圖經曰栗舊不著所出州土但云生山陰今處處有之而兖州宣州者最勝木極類櫟花青黄色似胡桃花實有房匯若拳中子三五小者若桃杏中子惟一二將熟則罅拆子出凡栗之種類亦多詩云樹之莘栗陸機疏云栗五方皆有之周秦冀揚宣饒吴越彼城表裏皆栗惟濮陽及范陽栗甜美味長他方者悉不及也果中栗最有益治腰脚宜生食之仍略曝乾去其木氣淮患風水氣不宜食以其味鹹故也殻煮汁飲止反胃及消渴木皮主瘡毒醫家多用莘音榛陶隱居云今會稽最豐諸暨栗形大皮厚不美剡及始豐皮薄而甜相傳有人患脚弱往栗樹下食數升便能起行此是補腎之義然應生啖之若餌服故宜蒸曝之暨音既剡時冉切唐本注云栗作粉勝於菱芡嚼生者塗瘡上療筋骨斷碎疼痛腫瘀血有效其皮名扶擣爲散蜜和塗肉令急縮毛殻療火丹療毒腫實飼孩兒令齒不生樹白皮水煮汁主溪毒斷音段禹錫云按蜀本圖經云樹高二三丈葉似櫟花靑黄色似胡桃花實大者如拳小如桃李又有板栗佳栗二樹皆大又有茅栗似栗而細其樹雖小然葉與諸栗不殊惟春生夏花秋實冬枯今所在皆有之孟詵云栗子生食治腰脚蒸炒食之令氣擁患風水氣不宜食又樹皮主癉瘡毒謹按宜日中曝乾食即下氣補益不爾猶有木氣不補益就中吴栗大無味不如北栗也其上薄皮研和蜜塗面展皺又殻煮汁飲之止反胃消渴今所食生栗可於熱灰火中煨令汗出食之良不得通熱熱則擁氣生即發氣故又煨殺其木氣耳肘後方丹者惡毒之瘡五色無常治之煮栗皮有刺者洗之佳經驗後方治腎虚腰脚無力生栗袋盛懸乾每日平明吃十餘顆次吃猪腎粥衍義曰栗欲乾莫如曝欲生莫如潤沙中藏至春末夏初尚如初收摘小兒不可多食生者難化熟即滯氣隔食生蟲往往致小兒病疳亦不知所謂補腎氣者以其味鹹又滯其氣爾湖北路有一種栗頂圓末尖謂之旋栗圖經引詩言莘栗者謂其象形也葡萄葡萄味甘平無毒主筋骨濕痹益氣倍力强志令人肥健耐饑忍風寒乆食輕身不老延年可作酒逐水利小便生隴西五原敦煌山谷圖經曰葡萄生隴西五原敦煌山谷今河東及近京州郡皆有之苗作藤蔓而極長大盛者一二本綿被山谷開花極細而黄白色其實有紫白二色而形之圓銳亦二種又有無核者皆七月八月熟取其汁可以釀酒謹按史記云大宛以葡萄爲酒富人藏酒至萬餘石久者十數歲不敗張騫使西域得其種而還種之中國始有蓋北果之最珍者藥性論云葡萄君味甘酸除腸間水氣調中治淋通小便陶隱居云魏國使人多賫來狀如五味子而甘美可作酒云用其藤汁殊美好北國人多肥健耐寒蓋食斯乎不植淮南亦如橘之變於河北矣人說即此間蘡薁恐如彼之枳類橘耶唐本汪云蘡薁與葡萄相似然蘡薁是千歲蔂葡萄作酒法總收取子汁釀之自成酒蘡薁山葡萄并堪爲酒陶云用藤汁爲酒謬矣蘡於庚切薁於六切衍義曰葡萄先朝西夏持獅子來獻使人兼賫葡萄遺州郡比中國者皆相似最難乾不乾不可收仍酸澌不可食李白所謂胡人歲獻葡萄酒者是此瘡疱不出食之盡出多食皆昏人眼波斯國所出者如雞卵雞頭實雞頭實味甘平無毒主濕痹腰脊膝痛補中除暴疾益精氣强志令耳目聰明久服輕身不饑耐老神仙一名雁喙實一名芡生雷澤池澤八月採芡音儉圖經曰雞頭實生雷澤今處處有之生水澤中葉大如荷皺而有刺俗謂雞頭盤花下結實其形類雞頭故以名之其莖𦵸之嫩者名蔿𦵸人採以爲菜茹八月採實服餌家取其實并中子搗爛暴乾并搗下篩熬金櫻子煎和丸服之云補下益人謂之水陸丹經傳謂其子爲芡陶隱居云此即今蔿子形上花似雞冠故名雞頭仙方取此并蓮實合餌能令小兒不長正爾食之亦當益人蔿音葦唐本注云此實去皮作粉與菱粉相似益人勝菱菱音陵日華子云雞頭開胃助氣根可作蔬菜食淮南子云雞頭已瘻頸疾幽人謂之雁頭禹錫云按蜀本圖經云此生水中葉大如荷皺而有刺花子若拳大形似雞頭實若石榴皮青黑肉白如菱米也孟詵云雞頭作粉食之甚妙是長生之藥與小兒食不能長大故駐年耳生食動風冷氣蒸之於烈日曬之其皮即開亦可舂作粉陳士良云此種雖生於水而有軟根名䓈菜主小腹結氣痛宜食經驗後方治益精氣强志意聰利耳目以雞頭實三合煮令熟去殻研如膏入粳米一合煮粥空心食之衍義曰雞頭實今天下皆有之河北沿溏濼居人採得舂去皮搗人爲粉蒸渫作餅可以代糧食多不益脾胃氣兼難消化蓬蘽蓬蘽味酸鹹平無毒主安五臟益精氣長陰令堅强志倍力有子又療暴中風身熱大驚久服輕身不老一名覆盆一名陵蘽一名陰蘽生荆山平澤及冤句蘽力軌切圖經曰蓬蘽覆盆苗莖也生荆山平澤及冤句覆盆子舊不著所出州土今并處處有之而秦吴地尤多苗短不過尺莖葉皆有刺花白子赤黄如半彈丸大而下有莖承如柿蒂狀小兒多食其實五月採其苗葉採無時江南人謂之莓然其地所生差晚三月始有苗八九月花開十月而實成功用則同古方多用笮其子取汁合膏塗髮不白挼葉絞汁滴目中去膚赤有蟲出如絲綫即效陶隱居云李云即是人所食莓爾今注是覆盆苗莖也陶言蓬蘽是根名乃昌容所服以易顔者蓋根苗相近爾李云莓也按切韵莓是覆盆草也又蘽者藤也今據蓬蘽之名明其藤蔓也唐本注云蓬蘽覆盆一物異名本謂實而非根此亦誤矣亦如蜀漆與常山異條芎藭與蘼蕪各用今此附入果部者蓋其子是覆盆子也莓音茂陳藏器云變白不老佛說云蘇蜜那花點燈正言此花也乍取汁合成膏塗髮不白食其子令人好顔色葉挼絞取汁汁滴目中去膚赤有蟲出如絲綫其類有三種四月熟甘美如覆盆子者是也餘不堪入藥今人取茅莓當覆盆誤矣禹錫云按陳士良云諸家本草皆說是覆盆子根今觀採取之家按草木類所說自有蓬蘽似蠶莓子紅色其葉似野薔薇有刺食之酸甘恐諸家不識誤說是覆盆也衍義曰蓬蘽非覆盆别是一種雖枯敗而枝梗不散今人不見用此即賈山策中所言是也覆盆子味甘平無毒主益氣輕身令髮不白五月採之圖經曰文具蓬蘽條下藥性論云覆盆子臣微熱味甘辛能主男子腎精虚竭女子食之有子主陰痿能令堅長陶隱居云蓬蘽是根名方家不用乃昌容所服以易顔者也覆盆是實名李云是莓今莓子乃似覆盆之形而以津汁爲味其核微細藥中用覆盆子小異此未詳孰是唐本注云覆盆蓬蘽一物異名本謂實非根也李云莓子近之矣其根不入藥用然生處不同沃地則子大而甘瘠地則子細而酸此乃子有甘酸根無酸味陶景以根酸子甘將根入果重出子條殊爲孟浪今注蓬蘽是覆盆之苗也覆盆乃蓬蘽之子也陶注唐注非爾今用覆盆子補虚續强陰陽悅澤肌膚安和臟腑温中益力療勞損風虚補肝明目日華子云莓子安五臟益顔色養精氣長髮强志療中風身熱及驚又有樹莓即覆盆子孟詵云覆盆子味酸五月於麥田中得之良採得及烈日曬乾免爛不堪江東亦有名懸鈎子大小形異氣味功力同北士即無懸鈎南地無覆盆是土地有前後生非兩種物耳衍義曰覆盆子長條四五月紅熟秦州甚多永興華州亦有及時山中人採來賣其味酸甘外如荔枝櫻桃許大軟紅可愛失採則就枝生蛆益腎臟縮小便服之當覆其溺蓋如此取名食之多熱出時五六分熟便可採烈曰曝仍須薄綿蒙之今人取汁作煎爲果仍少加蜜或熬爲稀湯點服治肺虚寒採時著水則不堪煎櫻桃櫻桃味甘主調中益脾氣令人好顔色美志陶隱居云此即今朱櫻味甘酸可食而所主又與前櫻桃相似恐醫家濫載之未必是今者爾又胡頽子凌冬不凋子亦應益人或云寒熱病不可食唐本注云葉搗傅蛇毒絞葉汁服防蛇毒内攻曰華子云櫻桃微毒多食令人吐禹錫云按孟詵云櫻桃熱益氣多食無損又云此名櫻非桃也不可多食令人發暗風東根療寸白蛔蟲衍義曰櫻桃孟詵以爲櫻非桃類然非桃類蓋以其形肖桃故曰櫻桃又何疑焉謂如木猴梨胡桃之類亦取其形相似爾古謂之含桃可薦宗廟禮云先薦寢廟者是此唐王維詩云纔是寢園春薦後非干御苑鳥銜殘小兒食之纔過多無不作熱芰實芰實味甘平無毒主安中補五臟不饑輕身一名菱芰音伎圖經曰芰菱實也舊不著所出州土今處處有之葉浮水上花黄白色花落而實生漸向水中乃熟實有二種一種四角一種兩角兩角中又有嫩皮而紫色者謂之浮菱食之尤美江淮及山東人曝其實人以爲米可以當糧陶隱居云廬江間最多皆取火燔以爲米充糧今多蒸曝蜜和餌之斷穀長生水族中又有菰首性冷恐非上品被霜後食之令陰不强又不可雜白蜜食令生蟲也菰音孤唐本注云芰作粉極白潤宜人孟詵云菱實仙家蒸作粉蜜和食之可休糧水族之中此物最不能治病又云令人臟冷損陽氣痿莖可少食多食令人腹脹滿者可暖酒和薑飲一兩盞即消矣食療云神仙家用發冷氣人含吴茱萸嚥其津液消其腹脹矣衍義曰芰今世俗謂之菱角所在有煮熟取人食之代糧不益脾又有水菱亦芰也但大而脆可生食和合治療未聞其用有食生芰多則利及難化是亦性冷橙子皮味苦辛温作醬醋香美散腸胃惡氣消食去胃中浮風氣其瓤味酸去惡心不可多食傷肝氣又以瓤洗去酸汁細切和鹽蜜煎成煎食之去胃中浮風其樹亦似橘樹而葉大其形圓大於橘而香皮厚而皺八月熟圖經曰文具附橘柚條下禹錫云按陳士良云橙子暖無毒行風氣發虚熱療癭氣發瘰癧殺魚蟲毒不與檳榔肉同食發頭旋惡心食鏡云温去惡心胃風取其皮和鹽貯之又瓤去惡氣和鹽蜜細細嚼之雷公云味苦辛無毒衍義曰橙子皮今人止以爲果或取皮合湯待賔不見入藥宿酒未醒食之速醒果部中品梅實梅實味酸平無毒主下氣除熱煩滿安心肢體痛偏枯不仁死肌去靑黑痣惡疾止下痢好唾口乾生漢中川谷五月採火乾圖經曰梅實生漢中川谷今襄漢川蜀江湖淮嶺皆有之其生實酢而損齒傷骨發虚熱不宜多食之服黄精人尤不相宜其葉煮濃汁服之已休息痢根主風痹出土者不可用五月採其黄實火熏乾作烏梅主傷寒煩熱及霍亂躁渴虚勞痩羸産婦氣痢等方中多用之陶隱居云此亦是今烏梅也用當去核微熬之傷寒煩熱水漬飲汁生梅子及白梅亦應相似今人多用白梅和藥以點痣蝕惡肉也服黄精人云禁食梅實唐本注云别録云梅根療風痹出土者殺人梅實利筋脉去痹陳藏器云梅實本功止渴令人膈上熱烏梅去痰主瘧瘴止渴調中除冷熱痢止吐逆梅葉搗碎湯洗衣易脱也嵩陽子云清水揉梅葉洗蕉葛衣不脆余試之驗日華子云梅子暖止渴多痰傷骨蝕脾胃令人發熱根葉煎濃湯治休息痢并霍亂又云白梅暖無毒治刀箭止血研傅之禹錫云按藥性論云梅核人亦可單用味酸無毒能除煩熱蕭炳云今人多用烟熏爲烏梅孟詵云烏梅多食損齒又刺在肉中嚼白梅封之刺即出又大便不通氣奔欲死以烏梅十顆置湯中須臾挼去核杵爲丸如棗大内下部少時即通謹按擘破水漬以少蜜相和止渴霍亂心内不安及痢赤治瘧方多用之聖惠方主傷寒下部生𧏾瘡用烏梅肉三兩炒令燥杵爲末煉蜜丸如梧子大以石榴根皮煎湯食前下十丸又方治痰厥頭痛以十個取肉鹽二錢酒半盞合煎至七分去滓非時温服吐即佳又方治痢下積久不差腸垢已出以二十個水一盞煎取六分去滓食前分爲二服肘後方同外臺秘要方治下部蟲嚙杵梅桃葉一斛蒸之令極熱内小器中大布上坐蟲死肘後方治心腹俱脹痛短氣欲死或已絶烏梅二七枚水五升煮一沸内大錢二七枚煮取二升半强人可頓服羸人可分之再服又方治手指忽腫痛名爲代指以烏梅人杵苦酒和以指漬之須臾差葛氏方治赤白痢下部疼重以二十枚打碎水二升煮取一升頓眼經驗方治馬汗入肉用烏梅和核爛杵爲末以頭醋和爲膏先將瘡口以針刺破但出紫血有紅血出用帛拭乾以膏傅上以帛縛定梅師方治傷寒四五日頭痛壯熱胸中煩痛烏梅十四個鹽五合水一升煎取一半服吐之簡要濟衆方治消渴止煩悶以烏梅肉二兩微炒爲末每服二錢水二盞煎取一盞去滓入豉二百粒煎至半盞去滓臨卧時服之鬼遺方治一切瘡肉出以烏梅燒爲灰杵末傅上惡肉立盡極妙衍義曰梅實食梅則津液泄水生木也液泄故傷齒腎屬水外爲齒故也王叔和曰膀胱腎合爲津液此語雖鄙然理存焉熏之爲烏梅曝乾藏蜜器中名白梅木瓜木瓜實味酸温無毒主濕痹邪氣霍亂大吐下轉筋不止其枝亦可煮用圖經曰木瓜奮不著所出州土陶隱居云山陰蘭亭尤多今處處有之而宣城者爲佳其木狀若柰花生於春末而深紅色其實大者如瓜小者如拳爾雅謂之楙郭璞云實如小瓜酢可食不可多亦不益人宣州人種蒔尤謹遍滿山谷始實成則鏃紙花薄其上夜露日曝漸而變紅花文如生本州以充土貢焉陶隱居云山陰蘭亭尤多彼人以爲良果最療轉筋如轉筋時但呼其名及書上作木瓜字皆愈亦不可解俗人拄木瓜杖云利筋脛又有榠𣙁大而黄可進酒去痰又𣙁子澀斷痢禮云梨曰欑之鄭公不識𣙁乃云是梨之不臧者古亦以柤爲果不則不入例爾榠音冥𣙁音查陳藏器云木瓜本功外下冷氣强筋骨消食止水痢後渴不止作飲服之又脚氣衝心取一顆去子煎服之嫩者更佳又止嘔逆心膈痰唾日華子云木瓜止吐瀉賁豚及脚氣水腫冷熱痢心腹痛療渴嘔逆痰唾等根治脚氣孟詵云木瓜謹按枝葉煮飲之亦治霍亂不可多食損齒及骨又臍下絞痛木瓜一兩片桑葉七片大棗三枚碎之以水二升煮取半升頓服之差又云𣙁子平損齒及筋不可食亦主霍亂轉筋煮汁食之與木瓜功稍等餘無有益人處江外常爲果食禹錫云按蜀本注其樹枝狀如柰花作房生子形似栝樓火乾甚香爾雅云楙木瓜注云實如小瓜酢可食然多食亦不益人又爾雅注𣙁似梨而酢澁雷公云凡使勿誤用和圓子蔓子土伏子其色樣外形眞似木瓜只子味效并向裏子各不同若木瓜皮薄微赤黄香甘酸不澁調榮衛助穀氣向裏子頭尖一面方是眞木瓜若和圓子微黄蒂粗子小圓味澀微鹹傷人氣食療云主嘔啘風氣又吐後轉筋煮汁飲之甚良脚膝筋急痛煮木瓜令爛研作漿粥樣用裹痛處冷即易一宿三五度熱裹便差煮木瓜時入一半酒同煮之衍義曰木瓜得木之正故入筋以鉛霜塗之則失醋味受金之制故如是今人多取西京大木瓜爲佳其味和美至熟止靑白色入藥絶有功勝宣州者味淡此物入肝故益筋與血病腰腎脚膝無力此物不可闕柿柿味甘寒無毒主通鼻耳氣腸癖不足圖經曰柿舊不著所出州士今南北皆有之柿之種亦多黄柿生近京州郡紅柿南北通有朱柿出華山似紅柿而皮薄更甘珍椑柿出宣歙荆襄閩廣諸州但可生啖不堪乾諸柿食之皆善而益人椑柿更壓丹石毒耳其乾柿火乾者謂之烏柿出宣州越州性甚温人服藥口苦欲逆食少許當止兼可斷下陶隱居云柿有數種云今烏柿火熏者性熱斷下又療狗嚙瘡火煏者亦好日乾者性冷麤心柿尤不可多食令人腹痛生柿彌冷又有椑色靑惟堪生啖性冷復甚於柿散石熱家啖之亦無嫌不入藥用煏皮逼切椑音卑唐本注云别録云火柿主殺毒療金瘡火瘡生肉止痛軟熟柿解酒熱止口乾壓胃間熱陳藏器云柿本功外日乾温補多食去面皯除腹中宿血剡縣火乾者名烏柿人服藥口苦及欲吐逆食少許立止蒂煮服之止噦氣黄柿和米粉作糗蒸與小兒食之止下痢飲酒食紅柿令人心痛直至死亦令易醉陶云解酒毒失矣日華子云柿冷潤心肺止渴澀腸療肺痿心熱嗽消痰開胃亦治吐血又云柿平潤聲喉殺蟲火柿性暖功用同前禹錫云柿寒主補虚勞不足謹按乾柿厚腸胃澀中健脾胃氣消宿血又紅柿補氣續經脉氣又醂柿澀下焦健脾胃氣消宿血作餅及糕與小兒食治秋痢又研柿先煮粥欲熟即下柿更三兩沸與小兒飽食并奶母吃亦良聖惠方治耳聾鼻塞以乾柿三枚細切粳米三合豉少許煮粥空心服産寳方治産後患咳逆氣亂心煩乾柿一個碎之以水十分煮熱服衍義曰柿有著蓋柿於蒂下别生一重又牛心柿如牛之心蒸餅柿如今之市買蒸餅華州有一等朱柿比諸品中最小深紅色又一種塔柿亦大於諸柿性皆凉不至大寒食之引痰極甘故如是去皮挂大木株上使風日中自乾食之多動風火乾者味不佳生則澁以温水養之需澁去可食逮至自然紅爛澀亦自去乾則性平烏芋烏芋味苦甘微寒無毒主消渴痹熱温中益氣一名藉姑一名水萍二月生葉如芋三月三日採根暴乾圖經曰烏芋今𦳓茨也舊不著所出州土苗似龍鬚而細正靑色根黑如指大皮厚有毛又有一種皮薄無毛者亦同田中人并食之亦以作粉食之厚人腸胃不饑服丹石人尤宜蓋其能解毒爾又爾雅謂之芍陶隱居云今藉姑生水田中葉有椏狀如澤瀉不正似芋其根黄似芋子而小煮之亦可饌疑其有烏者根極相似細而美葉乖異狀如莧草呼爲𦳓茨恐是此也椏烏牙切唐本注云此草一名槎牙一名茨菰主百毒産後血悶攻心欲死産後難衣不出搗汁服一升生水中葉似錍箭鏃澤瀉之類也千金方云下石淋菰音孤錍普兮切禹錫云按孟詵云茨菰不可多食吴人常食之令人患脚又發脚氣癱痪風損齒令人失顔色皮肉乾燥卒食之令人嘔水又云𦳓茨冷下丹石消風毒除胸中實熱氣可作粉食明耳目止渴消疸黄若先有冷氣不可食令人腹脹氣滿小兒秋食臍下當痛日華子云𦳓茨無毒消風毒除胸胃熱治黃疸開胃下食服金石藥人食之良又云茨菰冷有毒葉研傅蛇蟲咬多食發虚熱及腸風痔漏崩中帶下瘡癤煮以生薑御之佳懷孕人不可食又名燕尾草及烏芋衍義曰烏芋今人謂之葧臍皮厚色黑肉硬白者謂之猪葧臍皮薄澤色淡紫肉軟者謂之羊葧臍正二月人採食之此二等藥罕用荒歲人多採以充糧枇杷枇杷葉味苦平無毒主卒啘不止下氣圖經曰枇杷葉舊不著所出州郡今襄漢吴蜀閩嶺皆有之木高丈餘葉作驢耳形皆有毛其木陰密婆娑可愛四時不凋盛冬開白花至三月四月而成實故謝眺枇杷賦云禀金秋之青條抱東陽之和氣肇寒葩之結霜成炎果乎纖露是也藥性論云枇杷使味甘能主胃氣冷嘔噦不止陶隱居云其葉不暇煮但嚼食亦差人以作飲則小冷唐本注云用葉須火炙布拭去毛不爾射人肺令咳不已又主咳逆不下食今注實味甘寒無毒多食發痰熱日華子云枇杷子平無毒治肺氣潤五臟下氣止吐逆并渴疾又云葉療婦人産後口乾雷公云凡使採得後秤濕者一葉重一兩乾者三葉重一兩者是氣足堪用使麤布拭上毛令盡用甘草湯洗一遍却用綿再拭令乾每一兩以酥一分炙之酥盡爲度禹錫云按蜀本圖經云樹高丈餘葉大如驢耳皆有黄毛子樣生如小李黃色味甘酸核大如小栗皮肉薄冬花春實四月五月熟凌冬不凋生江南山南今處處有之孟詵云枇杷温利五臟乆食亦發熱黄子食之潤肺熱上焦苔和熱炙肉及熱麫食之令人患熱毒黄病食療云卒嘔啘不止不欲食又煮汁飲之止渴偏理肺及肺風瘡胸面上瘡衍義曰枇杷葉江東西湖南北二川皆有之以其形如琵琶故名之治肺熱嗽有功花白最先春也子大如彈丸四五月熟色若黄杏微有毛肉薄性亦平與葉不同有婦人患肺熱久嗽身如炙肌瘦將成肺勞以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黄减半各如常製治訖同爲末蜜丸如櫻桃大食後夜卧各含化一丸未終一劑而愈也荔枝荔枝子味甘平無毒止渴益人顔色生嶺南及巴中其樹高一二丈葉靑陰凌冬不凋形如松子大殻朱若紅羅紋肉靑白若水精甘美如蜜四五月熟百鳥食之皆肥矣圖經曰荔枝子生嶺南及巴中今泉福漳嘉蜀渝涪州興化軍及二廣州郡皆有之其品閩中第一蜀川次之嶺南爲下扶南記云此木以荔枝爲名者以其結實時枝弱而蒂牢不可摘取以刀斧劙取其枝故以爲名耳劙音利食療云微温食之通神益智健氣及顔色多食則發熱崔亮海上方治喉痹腫以荔枝花并根共十二分以水三升煮去滓含細細咽之差衍義曰荔枝藥品中今未見用惟崔元亮方中收之果實中爲上品多食令人發虚熱此物喜雙實尤可愛先朝有蔡君謨荔枝譜其說甚詳唐杜牧詩云一騎紅塵妃子笑無人知是荔枝來此是蜀川荔枝亦可生置之長安以核熳火中燒存性爲末新酒調一枚末服治心痛及小腸氣乳柑子味甘大寒主利腸胃中熱毒解丹石止暴渴利小便多食令人脾冷發痼癖大腸泄又有沙柑山柑體性相類惟山柑皮療咽喉痛效餘者皆不堪用其樹若橘樹其形似橘而圓大皮色生靑熟黄赤未經霜時尤酸霜後甚甜故名柑子生嶺南及江南圖經曰乳柑性冷多食亦不宜人今人但取其核作塗面藥餘亦稀用故不悉載禹錫云按蕭炳云出西戎者佳日華子云冷無毒皮炙作湯可解酒毒及酒渴多食發陰汗食療云寒堪食之其皮不任藥用食多令人肺燥冷中發痃癖經驗後方獨醒湯柑子皮去瓤不計多少焙乾爲末入鹽點半錢服衍義曰乳柑子今人多作橘皮售於人不可不擇也柑皮不甚苦橘皮極苦至熟亦苦若以皮緊慢分别橘與柑又縁方宜各不同亦互有緊慢者脾胃冷人食其肉多致臟寒或泄痢石蜜乳糖味甘寒無毒主心腹熱脹口乾渴性冷利出益州及西戎煎煉沙糖爲之可作餅塊黄白色圖經曰煉沙糖和牛乳爲石蜜即乳糖也唐本注云用水牛乳米粉和煎乃得成塊西戎者佳江左亦有殆勝蜀者云用牛乳汁和沙糖煎之并作餅堅重今注此石蜜其實乳糖前卷已有石蜜之名故注此條爲乳糖唐本先附禹錫云按孟詵云石蜜治目中熱膜明目蜀中波斯者良東吴亦有并不如兩處者此皆煎甘蔗汁及牛乳汁則易細白耳和棗肉及巨勝末丸每食後含一兩丸潤肺氣助五臟津衍義曰石蜜川浙最佳其味厚其他次之煎煉成以鉶象物達京都至夏月及久陰雨多自消化土人先以竹葉及紙裹外用石灰埋之仍不得見風遂免今人謂乳糖其作餅黃白色者今人又謂之捻糖易消化入藥至少仲思棗味甘温無毒主補虚益氣潤五臟去痰嗽冷氣乆服令人肥健好顔色神仙不饑形如大棗長一二寸正紫色細文小核味甘重北齊時有仙人仲思得此棗因以爲名隋大業中信都獻數顆又有千年棗生波斯國亦稍温補非此之儔也禹錫云按爾雅云棗壺棗邊腰棗櫅白棗樲酸棗楊徹齊棗遵王洗大棗煮填棗蹶泄苦棗晳無實棗還味稔棗釋曰壺棗者棗形似壺也郭云今江東呼棗大而銳上者爲壺壺猶瓠也邊大而腰細者名邊腰棗郭云子細腰今謂之鹿盧棗棗子白熟者名櫅實小而味酢者名樲棗遵一名羊棗郭云實小而圓紫黑色今俗呼之爲羊矢棗洗最大之棗名也郭云今河東猗氏縣出大棗子如雞卵蹶泄者味苦之棗名也晳者無實之棗名也還味者短味也徹煮并未詳陳士良云苦棗大寒無毒棗中苦者是也人多不食主傷寒熱伏在臟時狂瘍煩滿大小便秘嗇取肉煮研爲蜜丸藥佳今處處有之芋味辛平有毒主寬腸胃充肌膚滑中一名土芝唐本注云芋有六種有青芋紫芋眞芋白芋連禪芋野芋其青芋細長毒多初煮要須灰汁易水煮熟乃堪食爾白芋眞芋連禪芋紫芋毒少并正爾蒸煮啖之又宜冷噉療熱止渴其眞白連禪三芋兼肉作羹大佳蹲鴞之饒蓋謂此也野芋大毒不堪噉也日華子云芋葉冷無毒除煩止瀉療妊孕心煩迷悶胎動不安又鹽研傅蛇蟲咬并療腫毒及罯傅毒箭圖經衍義本草卷之三十五
