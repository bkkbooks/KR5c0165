body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正木部中品秦椒秦椒味辛温生温熟寒有毒主風邪氣温中除寒痹堅齒髮明目療喉痹吐逆疝瘕去老血産後餘疾腹痛出汗利五臟乆服輕身好顔色耐老增年通神生太山川谷及秦嶺上或琅琊八月九月采實惡栝蔞防葵畏雌黄圖經曰秦椒生太山川谷及秦嶺上或琅琊今秦鳳間及明越金商州皆有之初秋生花秋末結實九月十月采陶隱居云似椒而大色黃黑或呼大椒蘇恭云葉及莖子都似蜀椒但實細味短爾雅云檓大椒郭璞云椒叢生實大者名爲檓詩唐風云椒聊且陸機疏云椒似茱萸有針刺莖葉堅而滑蜀人作茶吴人作茗皆合煑其葉以爲香今成皋諸山謂之竹葉椒其木亦如蜀椒少毒熱不中合藥可著飲食中又用蒸雞豚最佳藥性論云秦椒君味苦辛能治惡風遍身四肢𤸷痹口齒浮腫揺動主女人月閉不通治産後惡血痢多年痢主生髮療腹中冷痛陶隱居云今從西來形似椒而大色黄黑味亦頗有椒氣或呼爲大椒又云即今樛樹而樛子是猪椒恐謬樛居虬切孟詵云秦椒温滅瘢長毛去血若齒痛醋煎含之又損瘡中風者以麫作餛飩灰中燒之使熱斷使口開封其瘡上冷即易之又法去閉口者水洗麫拌煮作粥空腹吞之以飯壓之重者再服傷寒類要治膏癉其人飲少小便多方秦椒一分出汗瓜蒂二分末水服方寸七日三服續千金方治蟲入耳椒末一錢醋半盞浸良久少少灌耳蟲自耳出衍義曰秦椒此秦地所出者故言秦椒大率椒株皆相似秦椒但葉差大椒粒亦大而紋低不若蜀椒皺紋高爲異也然秦地亦有蜀種椒如此區别山茱萸山茱萸味酸平微温無毒主心下邪氣寒熱温中逐寒濕痹去三蟲腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黄耳聾面疱温中下氣出汗强陰益精安五臟通九竅止小便利久服輕身明目强力長年一名蜀棗一名雞足一名妓實生漢中山谷及琅琊冤句東海承縣九月十月采實陰乾蓼實爲之使惡桔梗防風防己圖經曰山茱萸生漢中山谷及琅琊冤句東海承縣今海州亦有之木高丈餘葉似榆花白子初熟未乾赤色似胡子有核亦可啖既乾皮甚薄九月十月采實陰乾吴普云一名鼠矢葉如梅有刺毛二月花如杏四月實如酸棗赤五月采實似此小異也陶隱居云出近道諸山中大樹子初熟未乾赤色亦可啖既乾皮甚薄當以合核爲用爾禹錫等按藥性論云山茱萸使味鹹辛大熱治腦骨痛止月水不定補腎氣興陽堅長陰莖添精髓療耳鳴除面上瘡主能發汗止老人尿不節日華子云暖腰膝助水臟除一切風逐一切氣破癥結治酒齄雷公云凡使勿用雀兒蘇眞似山茱萸只是核八棱不入藥用使山茱萸須去内核每修事去核子一片取内皮用只秤成四兩已來緩火熬之方用能壯元氣秘精核能滑精衍義曰山茱萸與茱萸甚不相類山茱萸色紅大如枸杞子吴菜萸如川椒初結子時其大小亦不過椒色正青得名則一治療又不同未審當日何縁如此命名然山茱萸能養腎臟無一不宜經與注所說備矣紫葳紫葳音威味酸微寒無毒主婦人産乳餘疾崩中癥瘕血閉寒熱羸瘦養胎莖葉味苦無毒主痿蹶益氣一名凌苕一名茇華一名凌霄花生西海川谷及山陽圖經曰紫葳凌霄花也生西海川谷及山陽今處處皆有多生山中人家園圃亦或種蒔初作藤蔓生依大木歲久延引至巓而有花其花黄赤夏中乃盛陶隱居云詩有苕之華郭云凌霄又蘇恭引爾雅釋草云苕郭云又名陵霄按今爾雅注苕一名陵時本草云而無陵霄之說豈古今所傳書有異同邪又據陸機及孔穎達疏義亦云苕一名陵時陵時乃是鼠尾草之别名郭又謂苕爲陵時本草云紫葳無陵時之名而鼠尾草有之乃知陶蘇所引是以陵時作陵霄耳又陵霄非草類益可明其誤矣今醫家多采其花乾之入婦人血崩風毒藥又治少女血熱風毒四肢皮膚生癮疹并行經脉方陵霄花不以多少擣羅爲散每服二錢温酒調下食前服甚效藥性論云紫葳臣一名女葳畏鹵鹹味甘主熱風風癇大小便不利腸中結實止産後奔血不定淋瀝安胎日華子云根治熱風身癢游風風疹治瘀血帶下花葉功用同斗門方治暴耳聾凌霄葉爛杵自然汁灌耳内瘥衍義曰紫葳今蔓延而生謂之爲草又有木身謂之爲木又須物而上然幹不逐冬斃亦得木之多也故分入木部爲至當唐白樂天詩有木名凌霄擢秀非孤標由是益知非草也本經又云莖葉味苦是與瞿麥别一種甚明唐本注云且紫葳瞿麥皆本經所載若用瞿麥根爲紫葳何得復用莖葉此說盡矣然其花赭黄色本條雖不言其花又却言莖葉味苦則紫葳爲花故可知矣胡桐泪胡桐泪味鹹苦大寒無毒王大毒熱心腹煩滿水和服之取吐又主牛馬急黄黑汗水研三二兩灌之立瘥又爲金銀焊藥出肅州以西平澤及山谷中形似黃礬而堅實有夾爛木者云是胡桐樹滋淪入土石鹹鹵地作之其樹高大皮葉似白楊青桐桑輩故名胡桐木堪器用又名胡桐律律泪聲訛也西域傳云胡桐似桑而曲圖經曰胡桐泪出肅州以西平澤及山谷中今西蕃亦有商人貨之者相傳其木甚高大皮似白楊青桐輩其葉初生似柳漸大則似桑桐輩其津液淪入地中與大石相著冬月采得之狀如黄礬薑石味極鹹苦得水便消如消石也古方稀用今治口齒家爲最要之物一名胡桐律泪聲近也然有一種木律極相類不堪用也日華子云治風蚛牙齒痛有二般木律不中入藥用石律形如小石片子黃土色者爲上即中入齒藥用兼殺火毒并麫毒海藥云謹按嶺表記云主風疳𧏾齒牙疼痛骨槽風勞能軟一切物多服令人吐作律字非猪苓猪苓味甘苦平無毒主痎音皆瘧解毒蠱疰不祥利水道久服輕身耐老一名豭猪屎生衡山山谷及濟陰冤句二月八月采陰乾圖經云猪苓生衡山山谷及濟陰冤句今蜀州眉州亦有之舊說是楓木苓今則不必楓根下乃有生土底皮黑作塊似猪糞故以名之又名地烏桃二月八月采陰乾削去皮肉白而實者佳莊子謂之豕橐司馬彪注云一名苓根似猪矢治渴藥性論云猪苓臣微熱解傷寒温疫大熱發汗主腫脹滿腹急痛陶隱居云舊云是楓樹苓其皮至黑作塊似猪屎故以名之肉白而實者佳削去黑皮用禹錫云按吴氏云猪苓神農甘雷公苦無毒甘雷公云凡採得用銅刀削去麤皮一重薄切下東流水浸一夜至明漉出細切以升麻葉對蒸一日出去升麻葉令淨㬠乾用外臺秘要治奸娠患子淋猪苓五兩一味末以白湯三合服方寸七漸至二七日三夜二子母秘録治奸娠從脚上至腹腫小便不利微渴猪苓五兩末以熟水服方寸七日三服楊氏産乳療通體遍身腫小便不利猪苓五兩搗篩煎水三合調服方寸七加至二七衍義曰猪苓行水之功多久服必損腎氣昏人目果欲乆服者更宜詳審烏藥烏藥味辛温無毒主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲其葉及根嫩時采作茶片炙碾煎服能補中益氣偏止小便滑數生嶺南邕容州及江南樹生似茶高丈餘一葉三椏葉青陰白根色黑褐作車轂形狀似山芍藥根又似烏樟根自餘直根者不堪一名旁其八月採根圖經曰烏藥生嶺南邕容州及江南今台州雷州衡州亦有之以天台者爲勝木似茶檟高五七尺葉微圓而尖作三椏面青背白五月開細花黄白色六月結實如山芍藥而有極粗大者又似釣樟根然根有二種嶺南者黑褐色而堅硬天台者白而虚軟并八月採根以作車轂形如連珠狀者佳或云天台出者香白可愛而不及海南者力大禹錫云按日華子云治一切氣除一切冷霍亂及反胃吐食瀉痢癰癤疥癩并解冷熱其功不可悉載猫犬百病并可磨服斗門方陰毒傷寒烏藥子一合炒令黑烟起投水中煎三五沸服一大盞候汗出回陽立可衍義曰烏藥和來氣少走泄多但不甚剛猛與沉香同磨作湯點治胸腹冷氣甚定當没藥没藥味苦平無毒主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤生波斯國似安息香其塊大小不定黑色圖經曰没藥生波斯國今海嶺諸國及廣州或有之木之根株皆如橄欖葉青而密歲久者則有膏液流滴在地下凝結成塊或大或小亦類安息香採無時今方多用治婦人内傷痛楚又治血暈及臍腹病刺者没藥一物研細温酒調一錢便止又治歷節諸風骨節疼痛晝夜不可忍者没藥半兩研虎腦骨三兩塗酥炙黄色先擣羅爲散與没藥同研令細温酒調二錢日三服大佳禹錫云按藥性論云没藥單用亦得味苦辛能主打榼損心腹血瘀傷折踒跌筋骨瘀痛金刃所損痛不可忍皆以酒投飲之良日華子云破癥結宿血消腫毒海藥云謹按徐表南州記生波斯國是彼處松脂也狀如神香赤黑色味苦辛温無毒主折傷馬墜推陳置新能生好血凡服皆須研爛以熱酒調服衍義曰没藥大槪通滯血打撲損疼痛皆以酒化服血滯則氣壅淤氣壅淤則經絡滿急經絡滿急故痛且腫凡打撲著肌肉須腫脹者經絡傷氣血不行壅淤故如是龍眼龍眼味甘平無毒主五臟邪氣安志厭食除蟲去毒乆服强魂聰明輕身不老通神明一名益智其大者似檳榔生南海山谷陶隱居云廣州别有龍眼似荔枝而小非益智恐彼人别名今者爲益智爾食之并利人唐本注云益智似連翹子頭未開者味甘辛殊不似檳榔其苗葉花根與豆蔻無别惟子小爾龍眼一名益智而益智非龍眼也其龍眼樹似荔枝葉若林檎花白子檳榔有鱗甲味甘酸衍義曰龍眼經曰一名益智今專爲果未見入藥補注不言神農本草編入木部中品果部中復不曾收入今除爲果之外别無龍眼若謂爲益智子則專調諸氣今爲果者復不能也矧自有益智條遠不相當故知木部龍眼即便是今爲果者按今注云甘味歸脾而能益智此說甚當菴摩勒菴摩勒味苦甘寒無毒主風虚熱氣一名餘甘生嶺南交廣愛等州圖經曰菴摩勒餘甘子也生嶺南交廣愛等州今二廣諸郡及西川蠻界山谷中皆有之衍義曰菴摩勒餘甘子也解金石毒爲末作湯點服佛經中謂菴摩勒者是此蓋西度有之衛矛衛矛味苦寒無毒主女子崩中下血腹滿汗出除邪殺鬼毒蠱疰中惡腹痛去白蟲消皮膚風毒腫令陰中解一名鬼箭生霍山山谷八月採陰乾圖經曰衛矛鬼箭也出霍山山谷今江淮州郡或有之三月以後生莖苗長四五尺許其榦有一羽狀如箭翎葉亦似山茶青色八月十一月十二月采條莖陰乾其木亦名狗骨崔氏方療惡疰在心痛不可忍有鬼箭羽湯集驗方療卒暴心痛或中惡氣毒痛大黄湯亦用鬼箭皆大方也禹錫云按藥性論云鬼箭使一名衛矛有小毒能破陳血能落胎主中惡腰腹痛百邪鬼魅日華子云鬼箭羽味甘澀通月經破癥結止血崩帶下殺腹臟蟲及産後血咬肚痛雷公云凡使勿用石茆根頭眞似鬼箭只是上葉不同味各别採得後只使箭頭用拭上赤毛用酥緩炒過用之每修事一兩用酥一分炒酥盡爲度外臺秘要治乳無汁鬼箭五兩水六升煎取四升一服八合日三服大效衍義曰衛矛所在山谷皆有之然未嘗於平陸地見也葉絶少其莖黄褐色若檗皮三面如鋒刃人家多燔之遣崇方家用之亦少海桐皮海桐皮味苦平無毒主霍亂中惡赤白久痢除甘𧏾疥癬牙齒蟲痛并煮服及含之水浸洗目除膚赤堪作繩索入水不爛出南海以南山谷似梓一作桐白皮圖經曰海桐皮出南海以南山谷今雷州及近海州郡亦有之葉如手大作三花尖皮若梓白皮而堅韌可作繩入水不爛不拘時月採之古方多用浸酒治風蹶禹錫云按日華子云温治血脉麻痹疼痛及目赤煎洗傳信方南唐筠州刺史王紹顔撰續傳信方著其法云頃年予在姑熟之日得腰膝痛不可忍醫以腎臟風毒攻刺諸藥莫療因覽傳信方備有此驗立修制一劑便减五分步履便輕故録之耳海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半兩薏苡人一兩生地黃十兩八物淨洗焙乾細剉生地黄以蘆刀子切用綿一兩都包裹入無灰酒二斗浸冬二七日夏一七日候熟空心食後日午晚卧時一杯長令醺醺合時不用添减禁毒食虎杖虎杖根微温主通利月水破留血癥結藥性論云虎杖使一名大蟲杖也味甘平無毒主治大熱煩躁止渴利小便壓一切熱毒暑月和甘草煎色如琥珀可愛堪看嘗之甘美陶隱居云田野甚多此狀如大馬蓼莖斑而葉圓及主暴癥酒漬根服之也禹錫云按蜀本圖經云生下濕地作樹高丈餘其莖赤根黄二月八月採根日乾所在有之爾雅云蒢虎杖注云似紅草而麤大有小刺可以染赤日華子云治産後惡血不下心腹脹滿排膿主瘡癤癰毒女人血運撲損瘀血破風毒結氣又名酸杖一名斑杖雷公云凡使勿用天藍并斑猫根其二味根形味相似用之有誤採得後細剉却用上虎杖露浥一夜後㬠乾用外臺秘要治卒暴癥腹中有物硬如石痛刺晝夜若不治之百日内死取虎杖根勿令影臨水上得石餘許洗乾搗作末稌米五升炊飯内攪之好酒五斗漬封候藥消飯浮可飲一升半勿食鮭魚鹽癥常出亦可但取其一斗乾搗酒漬飲之從少起日三亦佳此治癥乃勝諸大藥肘後方治時疫傷寒毒攻手足腫疼痛欲斷方用虎杖根剉水煮適寒温以漬手足令躁上有水尺許止之傷寒類要同集驗方治五淋虎杖不計多少爲末每服二錢用飯飲下不拘時候衍義曰虎杖根微苦經不言味此草藥也蜀本圖經言作木高丈餘此全非虎杖大率皆似寒菊然花葉莖蕊差大爲異仍莖葉有淡黑斑自六月七月旋旋開花至九月中方已花片四出其色如桃花差大外微深陜西山麓水次甚多今天下暑月多煎根汁爲飲不得甘草則不堪飲藥性論云和甘草煎嘗之甘美其味甘即是甘草之味非虎杖也論其攻治則甚當矣五倍子五倍子味苦酸平無毒療齒宣疳𧏾肺臟風毒流溢皮膚作風濕癬瘡瘙癢膿水五痔下血不止小兒面鼻疳瘡一名文蛤在處有其子色青大者如拳内多蟲一名百蟲倉圖經曰五倍子舊不著所出州土云在處有之今以蜀中者爲勝生膚木葉上七月結實無花其木青黄色其實青至熟而黄大者如拳内多蟲九月採子暴乾生津液最佳陳藏器序云五倍子治腸虚泄痢熟湯服博濟方治風毒上攻眼腫癢澁痛不可忍者或上下瞼毗赤爛浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荆子一兩半同杵末每服二錢水二盞銅石器内煎及一盞澄滓熱淋洗留滓二服又依前煎淋洗大能明眼目去澀癢經驗後方治小兒吐不定五倍子二個一生一熟甘草一握用濕紙裹炮過同搗末每服米泔調下半錢匕瘥衍義曰五倍子今染家亦用口瘡以末摻之便可飲食蜜蒙花蜜蒙花味甘平微寒無毒王青盲膚翳赤目多眵泪消目中赤脉小兒麩豆及疳氣攻眼生益州川谷樹高丈餘葉似冬青葉而厚背色白有細毛二月三月採花圖經曰蜜蒙花生益州川谷今蜀中州郡皆有之木高丈餘葉似冬青葉而厚背白色有細毛二橘葉花微紫色二月三月採花暴乾用此木類而在草部不知何至於此雷公云凡使先揀令淨用酒浸一宿漉出候乾却拌蜜令潤蒸從卯至酉出日乾如此拌蒸三度又却日乾用每修事一兩用酒八兩浸待色變用蜜半兩蒸爲度此元名小錦花衍義曰蜜蒙花利州路甚多葉冬亦不凋然不似冬青蓋柔而不光潔而不深緑花細碎數十房成一朵冬生春開此木也今居草部恐未盡墨味辛無毒止血生肌膚合金瘡主産後血運崩中卒下血醋摩服之亦主眯目物芒入目摩點瞳子止又止血痢及小兒客忤擣篩和水温服之好墨入藥粗者不堪衍義曰墨松之烟也世有以粟草灰僞爲者不可用須松烟墨方可入藥然惟遠烟爲佳今高麗國每貢墨於中國不知用何物合和不可入藥此蓋未達不敢嘗之義又治大吐血好墨細末二錢以白湯化阿膠清調稀稠得所頓服熱多者尤相宜又鄜延界内有石油燃之烟甚濃其煤可爲墨黑光如漆松烟不及其識又曰延川石液者是不可入藥當附於此棘刺花味苦平無毒主金瘡内漏冬至後百二十日採之實主明目心腹痿痹除熱利小便生道傍四月採一名菥蓂一名馬朐一名刺原又有棗針療腰痛喉痹不通陶隱居云此一條又相違越恐李言多是然復道其花一名菥蓂此恐别是一物不關棗針也今俗人皆用天門冬苗吾亦不許門冬苗乃是好作飲益人正自不可當棘刺爾禹錫云按蜀本注云棘有赤白二種切韵曰棘小棗也田野間多有之叢高三二尺花葉莖實俱似棗也聖惠方治小兒一切疳用刺針瓜蒂等分末吹入鼻中日二安息香味辛苦平無毒主心腹惡氣鬼疰出西戎似松脂黄黑色爲塊新者亦柔韌音刃禹錫云按蕭炳云燒之去鬼來神段成式酉陽雜俎云安息香樹出波斯國波斯呼爲辟邪樹長三丈皮色黄黑葉有四角經寒不凋二月開花黄色花心微碧不結實刻其樹皮其膠如飴名安息香六七月堅凝乃取之燒之通神辟衆惡海藥謹按廣州記云生南海波斯國樹中脂也狀若桃膠以秋月採之又方云婦人夜夢鬼交以臭黄合爲丸燒薰丹穴永斷又主男子遺精暖腎辟惡氣松羅味苦甘平無毒主嗔怒邪氣止虚汗頭風女子陰寒腫痛療痰熱温瘧可爲吐湯利水道一名女蘿生熊耳山川谷松樹上五月採陰乾圖經曰文具桑寄生條下陶隱居云東山甚多生雜樹上而以松上者爲眞毛詩云蔦與女蘿施於松上蔦是寄生以桑上者爲眞不用松上者此互有異同爾禹錫云按藥性論云松蘿使味苦辛微熱治寒熱能吐胸中客熱痰涎去頭瘡主項上瘤癭日華子云令人得眠大腹微温無毒主冷熱氣攻心腹大腸壅毒痰膈醋心并以薑鹽同煎入疏氣藥良所出與檳榔相似莖葉根幹小異生南海諸國圖經曰文具檳榔條下禹錫云按日華子云下一切氣止霍亂通大小腸建脾開胃調中孫眞人云檳榔皮鴆鳥夕栖此樹上宜先酒洗仍以大豆汁洗方可用天竺黃味甘寒無毒主小兒驚風天吊鎭心明目去諸風熱療金瘡止血滋養五臟一名竹膏人多燒諸骨及葛粉等雜之按臨海志云生天竺國今諸竹内往往得之禹錫云按日華子云平治中風痰壅卒失音不語小兒客忤及癇痰此是南海邊竹内塵沙結成者衍義曰天竹黄自是竹内所生如黄土著竹成也凉心經去風熱作小兒藥尤宜和緩故也白棘味辛寒無毒主心腹痛廱腫潰膿止痛决刺結療丈夫虚損陰痿精自出補腎氣益精髓一名棘針一名棘刺生雍州川谷圖經曰白棘棘針也生雍州棘刺花生道傍今近京皆有之棘小棗也叢高三四尺花葉莖實都似棗而有赤白二種蘇恭云白棘莖白如粉子葉與赤棘同赤棘中時復有之亦爲難得耳然有鈎直二種直者宜入補藥鈎者入癰腫藥針採無時花冬至後百二十日採實四月採衍義曰白棘一名棘針一名棘刺按經如此甚明諸家之意强生疑惑今略不取求其經而可矣其白棘乃取其肥盛紫色枝上有皺薄白膜先剥起者故曰白棘取白之意不過如此其棘刺花乃是棘上所開花也餘無他義今人燒枝取油塗垢髮使垢解仙人杖味鹹平一云冷無毒主噦氣嘔逆辟痁小兒吐乳大人吐食并水煮服小兒驚癇及夜啼安身伴睡良又主痔病燒爲末服方寸七此是笋欲成竹時立死者色黑如漆五六月收之苦筀竹多生此又别一種仙人杖味甘小温無毒久服長生堅筋骨令人不老作茹食之去痰癖除風冷生劍南平澤葉似苦苣叢生新補見陳藏器日華子毗梨勒味苦寒無毒功用與菴摩勒同出西域及嶺南交愛等州戎人謂之三果唐本注云樹似胡桃子形亦似胡桃核似訶梨勒而圓短無棱用亦同法唐本先附日華子云下氣止瀉痢鬱金香味苦温無毒主蠱野諸毒心氣鬼疰鴉鶻等臭陳氏云其香十二葉爲百草之英按魏略云生大秦國二月三月有花狀如紅藍四月五月採花即香也今附禹錫云按陳藏器云鬱金香平入諸香藥用之說文此香芳草也十二葉爲貫採以煑之用爲鬯爲百草之英合而釀酒以降神也以此言之則草也不當附於木部紫藤味甘微温有小毒作煎如糖下水良花挼碎拭酒醋白腐壞子作角其中人熬令香著酒中令不敗酒敗者用之亦正四月生紫花可愛人亦種之江東呼爲招豆藤皮著樹從心重重有皮今附陳藏器云主水癊病京都人亦種之以飾庭也合歡味甘平無毒主安五臟利心志令人歡樂無憂乆服輕身明目得所欲生益州山谷圖經曰合歡夜合也生益州山谷今近京雍洛間皆有之人家多植於庭除間木似梧桐枝甚柔弱葉似皂莢槐等極細而又密互相交結每一風來輒似相解了不牽綴其葉至暮而合故一名合昏五月花發紅白色瓣上若絲茸然至秋而實作莢子極薄細採皮及葉用不拘時月衍義曰合歡花其色如今之蘸暈綫上半白下半肉紅散垂如絲爲花之異其緑葉至夜則合又謂之夜合花陳藏器日華子皆曰皮殺蟲又曰續筋骨經中不言伏牛花味苦甘平無毒療乆風濕痹四肢拘攣骨節疼痛作湯主風眩頭痛五痔下血一名隔虎刺花花黄色生蜀地所在皆有三月採伏牛花生蜀地所在皆有今惟益蜀近郡有之多生川澤中葉青細似黄檗葉而不光莖赤有刺花淡黄色作穗似杏花而小三月採陰乾天竺桂味辛温無毒主腹内諸冷血氣脹功用似桂皮薄不過烈生西胡國今附海藥按廣州記云生南海山谷補暖腰脚破産後惡血治血痢腸風功力與桂心同方醫家少用折傷木味甘鹹平無毒主傷折筋骨疼痛散血補血産後血悶止痛酒水煮濃汁飲之生資州山谷唐本注云藤生繞樹上葉似菵草葉而光厚八月九月採莖日乾唐本先附桑花暖無毒建脾澀腸止鼻洪吐血腸風崩中帶下此不是桑椹花即是桑樹上白癬如地錢花樣又主盜汗書云止鹹未試聖惠方治膀胱虚熱下砂石澀痛利水道燒灰研食前温酒調下一錢七梫木味苦平無毒破産後血煮服之葉搗碎封蛇咬亦洗瘡癬樹如石榴葉細高丈餘四月開花白如雪生江東林筤間倒挂藤味苦無毒主一切老血及産後諸疾結痛血上欲死煮汁服生深山如懸鈎有逆刺倒挂於樹葉尖而長也故木砧一名百味無毒主人病後食勞復取發當時來參病人行止脚下土如錢許男病左女病右和砧上垢及鼠頭一枚無即以鼠屎三七煮服之神效又卒心腹痛取砧上垢著人鞋履底悉穿又㭢几上屑燒傅吻上嚵瘡圖經衍義本草卷之二十三
