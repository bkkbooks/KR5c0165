body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部中品蒟音矩醬唐附蘿摩子唐附青黛今附鬱金唐附盧會今附馬先蒿延胡索今附肉豆蔻今附補骨脂今附零陵香今附縮紗蜜今附蓬莪荗向律切今附積雪草白前薺苨白藥唐附葒草莎草蓽澄茄今附胡黄連今附船底苔新輔紅豆蔻今附蒔蘿今附艾蒳香今附甘松香今附垣衣地衣績注陟釐音离鳧葵唐附女苑王孫土馬駿新定蜀羊泉菟葵唐附薢草唐附鱧腸唐附爵床井中苔萍藍附茅香花白茅香花續注馬蘭新補山蘭附乾苔新補百脉根唐附白豆蔻今附地笋新補海帶新定陀得花今附翦草元附白藥條條下今分條使君子今附一十種陳藏器餘迭迷故魚綱故繳脚布江中採出蘆虱建草含生草兔肝草石芒蠶鋼草問荆味辛温無毒主下氣温中破痰積生巴蜀唐本注云蜀都賦所謂流味於番禺者蔓生葉似王瓜而厚大味辛香實似桑椹皮黑肉白西戎亦時將來細而辛烈或謂二種交州愛州人云蒟醬人家多種蔓生子長大謂苗爲浮留藤取葉合檳榔食之辛而香也又有蓽撥叢生子細味辛烈於蒟醬此當信也今注渝瀘等州出焉唐本先附圖經曰蒟醬生巴蜀今夔州嶺南皆有之昔漢武使唐蒙曉諭南越南越食蒙以蒟醬蒙問所從何來答曰西北牂牁江廣數里出番禺城下武帝感之於是開牂牁越巂也劉淵林注蜀都賦云蒟醬縁木而生其子如桑椹熟時正青長二三寸以蜜藏而食之辛香調五臟今云蔓生葉似王瓜而厚大實皮黑肉白其苗爲浮留藤取葉合檳榔食之辛而香也兩說大同小異然則淵林所云乃蜀種如此今說是海南所傳耳今惟貴蓽撥而不尚蒟醬故鮮有用者海藥云謹按廣州記云波斯國文實狀如桑椹紫褐色者爲上黑者是老不堪黔中亦有形狀相似滋味一般主咳逆上氣心腹蟲痛胃弱虚瀉霍亂吐逆解酒食味近多黑色少見褐色者也雷公云凡使採得後以刀刮去粗皮便搗用生薑自然汁拌之蒸一日了出日乾每修事五兩用生薑汁五兩蒸乾爲度食療云温散結氣治心腹中惡氣亦名土蓽撥嶺南蓽撥尤治胃氣疾巴蜀有之齊民要術蒟子下氣消穀蘿摩子味甘辛温無毒主虚勞葉食之功同於子陸機云一名芄蘭幽州謂之雀瓢唐本注按雀瓢是女青别名葉蓋相似以葉似女青故兼名雀瓢今按陳藏器本草云蘿摩條中白汁主蜘蛛蠶咬折取汁點瘡上此汁爛絲煮食補益按陶注枸杞條云傅腫東人呼爲白環藤生籬落間折有白汁一名雀瓢此注又云雀瓢是女青然女青終非白環二物相似不能分别唐本先附禹錫等按爾雅云雚芄蘭釋曰雚一名芄蘭郭璞云雚芄蔓生斷之有白汁可啖如此注則似雚芄一名蘭或傳寫誤芄衍字外臺秘要治白癜風以蘿摩草白汁傅上揩令破再傅三度瘥梅師方治火丹毒遍身赤腫不可忍以蘿摩草搗絞汁傅之或搗傅上隨手消之青黛味鹹寒無毒主解諸藥毒小兒諸熱驚癇發熱天行頭痛寒熱并水研服亦摩傅熱瘡惡腫金瘡下血蛇犬等毒從波斯國來及太原并廬陵南康等染澱亦堪傅熱惡腫蛇虺螫毒染瓮上池沫紫碧色者用之同青黛功今附禹錫等按藥性論云青黛君味甘平能解小兒疳熱消瘦殺疳蟲陳藏器云青黛并鷄子白大黄傅瘡癰蛇虺等毒圖經曰文具藍實條下宫氣方疳痢羸瘦毛焦方歌曰孩兒雜病變成疳不問强羸女與男恰似脊傍多變動還如瘦疾困耽耽又歌曰煩熱毛焦鼻口乾皮膚枯槁四肢癱腹中時時更下痢赤黄青白一般般眼澁面黄鼻孔赤穀道開張不欲看忽然瀉下成疳淀又却濃涕一團團唇焦嘔逆不乳哺壯熱增寒卧不安腹中有病須醫藥何須祈禱信神盤此方便是青黛散孩兒百病服來看初虞世治諸蟲毒所傷青黛雄黄等分同研爲末新汲水調下二錢七太平廣記青黛殺惡蟲物化爲水梅師方治傷寒發豌豆瘡未成膿方以波斯青黛大棗許冷水研服衍義曰青黛乃藍爲之有一婦人患臍下腹上連二陰遍滿生濕瘡狀如馬瓜瘡他處并無熱癢而痛大小便澀出黄汁食亦减身面浮腫醫作惡瘡治用鰻鯏魚松脂黃丹之類塗上瘡愈熱痛甚治不對故如此問之此人嗜酒貪啖喜魚蟹發風等物急令用温水洗拭去膏藥尋以馬齒莧四兩爛研細入青黛一兩再研匀塗痛瘡上即時熱减痛癢皆去仍服八正散日三服分敗客熱每塗藥得一時乆藥已乾燥又再塗新濕藥凡如此二日减三分之一五日减三分之二自此二十日愈既愈乃問曰此瘡何縁至此曰中下焦蓄風熱毒氣若不出當作腸癰内痔仍常須禁酒及發風物然不能禁酒後果餘患内痔鬱金鬱金味辛苦寒無毒主血積下氣生肌止血破惡血血淋尿血金瘡唐本注云此藥苗似薑黃花白質紅末秋出莖心無實根黃赤取四畔子根去皮火乾之生蜀地及西戎馬藥用之破血而補胡人謂之馬蒁嶺南者有實似小豆蔻不堪噉唐本先附禹錫等按藥性論云鬱金單用亦可治女人宿血氣心痛冷氣結聚温醋摩服之亦啖馬藥用治脹痛圖經曰鬱金本經不載所出州土蘇恭云生蜀地及西戎胡人謂之馬蒁今廣南江西州郡亦有之然不及蜀中者佳四月初生苗似薑黄花白質紅末秋出莖心無實根黄赤取四畔子根去皮火乾之古方稀用今小兒方及馬醫多用之謹按許愼說文解字云鬱芳草也十葉爲貫百二十貫築以煮之爲鬱鬱今鬱林郡也木部中品有鬱金香云生大秦國二月三月有花狀如紅藍其花即香也陳氏云爲百草之英既云百草之英乃是草類又與此同名而在木部非也今人不復用亦無辨之者故但附於此耳經驗方治尿血不定以一兩搗爲末葱白一握相和以水一盞煎至三合去滓温服日須三服經驗後方治風痰鬱金一分藜蘆十分各爲末和令匀每服一字用温漿水一盞先以少漿水調下餘者水漱口都服便以食壓之孫用和治陽毒入胃下血頻疼痛不可忍鬱金五個大者牛黄一皂莢子大别細研二味同爲散每服用醋漿水一盞同煎三沸温服丹房鏡源云灰可用結砂子說文曰鬱金芳草也十葉爲貫百二十貫築以煮之爲鬯曰鬱鬯草之華遠方所貢芳草合釀之以降神周禮云鬱人凡祭祀賔客之裸和事鬱鬯衍義曰鬱金不香今人將染婦人衣最鮮明然不奈日炙染成衣則微有鬱金之氣盧會盧會味苦寒無毒主熱風煩悶胸膈間熱氣明目鎭心小兒癲癇驚風療五疳殺三蟲及痔病瘡瘻解巴豆毒一名訥會一名奴會俗呼爲象膽蓋以味苦如膽故也生波斯國似黑錫今附禹錫等按藥性論云盧會亦可單用殺小兒疳蛔主吹鼻殺腦疳除鼻癢南海藥譜云樹脂也本草不細委之謂象膽者殊非也兼治小兒諸熱圖經曰盧會出波斯國今惟廣州有來者其木生山野中滴脂淚而成採之不拘時月俗呼爲象膽其味苦而云耳盧會治濕癢搔之有黄汁者劉禹錫著其方云余少年曾患癬初生頸項間後延上左耳遂成濕瘡用斑猫狗膽桃根等諸藥徒令蜇蠚其瘡轉盛偶於楚州賣藥人教用盧會一兩研炙甘草半兩末相和令匀先以温漿水洗癬乃用舊乾帛子拭乾便以二味合和傅之立乾便瘥神奇又治𧏾齒崔元亮海上方云取盧會四兩杵末先以鹽揩齒令淨然後傅少末於上妙雷公云凡使勿用雜膽其象膽乾了上有青竹文斑并光膩微微甘勿便和衆藥搗此藥先搗成粉待衆藥末出然後入藥中此物是胡人殺得白象取膽乾入漢中是也馬先蒿味苦平無毒主寒熱鬼疰中風濕痹女子帶下病無子一名馬屎蒿生南陽川澤陶隱居云方云一名爛石草主惡瘡方藥亦不復用唐本草云此葉大如茺蔚花紅白色實八月九月熟俗謂之虎麻是也一名馬新蒿所在有之茺蔚苗短小子夏中熟而初生二種相似也今按别本注云近道處處有三月八月採莖葉陰乾禹錫等按爾雅云蔚牡菣釋曰蔚即蒿之雄無子者又曰蔚一名牡菣詩蓼莪云匪莪伊蔚陸機云牡蒿也三月始生七月華葉似胡麻華而紫赤八月爲角角似小豆角銳而長一名馬新蒿圖經曰文具第七卷中白蒿條下聖惠方治大風癩疾骨肉疽敗百節疼酸眉鬢墮落身體習習癢痛以馬先蒿細剉炒爲末每空心及晚食前温酒調下三錢七外臺秘要治癩馬先蒿一名馬矢蒿搗末服方寸匕日三服如更赤起一年都瘥延胡索味辛温無毒主破血産後諸病因血所爲者婦人月經不調腹中結塊崩中淋露産後血運暴血衝上因損下血或酒摩及煑服生奚國根如半夏色黄今附禹錫等按日華子云除風治氣暖腰膝破癥癖撲損瘀血落胎及暴腰痛海藥云生奚國從安東道來味苦甘無毒主腎氣破産後惡露及兒枕與三稜鱉甲大黄爲散能散風通經絡蛀蚛成末者使之惟良偏主産後病也聖惠方治産後穢污不盡腹滿方延胡索末調酒服一錢立止又方治墮落車馬筋骨疼痛不止用延胡索一兩搗羅爲散不計時候以豆淋酒調下二錢勝金方治膜肉氣及氣塊方延胡索不拘多少爲末猪胰一具切作塊子炙熟蘸藥末食之産書治産後心悶手脚煩熱氣力欲絶血暈連心頭硬及寒熱不禁延胡索熬搗爲末酒服一錢七拾遺序云延胡索止心痛酒服肉豆蔻肉豆蔻味辛温無毒主鬼氣温中治積冷心腹脹痛霍亂中惡冷疰嘔沫冷氣消食止洩小兒乳霍其形圓小皮紫緊薄中肉辛辣生胡國胡名迦拘勒今附禹錫等按藥性論云豆蔻君味苦辛能主小兒吐逆不下乳腹痛治宿食不消痰飲日華子云調中下氣止瀉痢開胃消食皮外絡下氣解酒毒治霍亂味珍力更殊圖經曰肉豆蔻出胡國今惟嶺南人家種之春生苗花實似豆蔻而圓小皮紫緊薄中肉辛辣六月七月採續傳信方治脾泄氣痢等以豆蔻二顆米醋調麫裹之置於灰中令黄焦和麫碾末更以炒了欓子末一兩相和又焦炒陳廪米爲末每用二錢七煎作飲調前二物三七旦暮各一服便瘥陳藏器云大舶來即有中國無海藥云謹按廣志生秦國及崑崙味辛温無毒主心腹蟲痛脾胃虚冷氣併冷熱虚泄赤白痢等凡痢以白粥飲服佳霍亂氣併以生薑湯服良雷公云凡使須以糯米作粉使熱湯搜裹豆蔻於煻灰中炮待米圓子焦黄熟然後出去米其中有子取用勿令犯銅聖惠方治冷痢腹痛不能食肉豆蔻一兩去皮以醋麵裹煨令麵熟爲度搗爲散非時粥飲下一錢七衍義曰肉豆蔻對草豆蔻言之去殻只用肉肉油色者佳枯白味薄瘦虚者下等亦善下氣多服則泄氣得中則和來其氣補骨脂補骨脂味辛大温無毒主五勞七傷風虚冷骨髓傷敗腎冷精流及婦人血氣墮胎一名破故紙生廣南諸州及波斯國樹高三四尺葉小似薄苛其舶上來者最佳今附禹錫等按藥性論云婆固脂一名破故紙味苦辛能主男子腰疼膝冷囊濕逐諸冷痹頑止小便利腹中冷日華子云興陽事治冷勞明耳目南蕃者色赤廣南者色緑入藥微炒用又名胡韭子圖經曰補骨脂生廣南諸州及波斯國今嶺外山坂間多有之不及蕃舶者佳莖高三四尺葉似薄苛花微紫色實如麻子圓扁而黑九月採或云胡韭也今人多以胡桃合服此法出於唐鄭相國自叙云余爲南海節度年七十有五越地卑濕傷於内外衆疾俱作陽氣衰絶服乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶知予病狀遂傳此方并藥予初疑而未服摩訶稽顙固請遂服之經七八日而覺病驗自爾常服而功神驗十年二月罷郡歸京録方傳之破故紙十兩淨擇去皮洗搗篩令細用胡桃瓤二十兩湯浸去皮細研如泥即入前末更以好蜜和攪令匀如飴糖盛於瓷器中旦以暖酒二合調藥一匙服之便以飯壓如不飲酒以暖熟水調亦可服彌乆則延年益氣悦心明目補添筋骨但禁食芸臺羊血餘毒此物本自外蕃隨海舶而來非中華所有蕃人呼爲補骨鴟語訛爲破故紙也續傳信方載其事其義頗詳故并録之海藥云惡甘草雷公云凡使性本大燥毒用酒浸一宿後漉出却用東流水浸三日三夜却蒸從巳至申出日乾用經驗後方治腰疼極妙用破故紙爲末温酒下三錢七又方治男子女人五勞七傷下元久冷爲髭鬢一切風病四肢疼痛駐顔壯氣補骨脂一斤酒浸一宿放乾却用烏油麻一升和炒令麻子聲絶却播去只取補骨脂爲末醋煑麫糊爲丸如梧子大早晨温酒鹽湯下二十丸零陵香零陵香味甘平無毒主惡氣疰心腹痛滿下氣令體香和諸香作湯圓用之得酒良生零陵山谷葉如羅勒南越志名燕草又名薰草即香草也山海經云薰草麻葉方莖氣如蘼蕪可以止癘即零陵香也今附禹錫等按陳藏器云薰草明目止泪療洩精去臭惡氣傷寒頭疼一名蕙草生下濕地三月採陰乾脱節者良按薰草即蕙也葉如麻兩兩相對此即是零陵香也日華子云治血氣腹脹酒煎服莖葉圖經曰零陵香生零陵山谷今湖嶺諸州皆有之多生下濕地葉如麻兩兩相對莖方氣如蘼蕪常以七月中旬開花至香古所謂薰草是或云蕙草亦此也又云其莖葉謂之蕙其根謂之薰三月採脱節者良今嶺南收之皆作窟竈以炭火焙乾令黄色乃佳江淮間亦有土生者作香亦可用但不及湖嶺者芬薰耳古方但用薰草不用零陵香今合香家及面膏澡豆諸法皆用之都下市肆貨之甚多唐本注云生水山間可和諸香煑汁飲之亦宜合衣中香海藥云謹按山海經生廣南山谷陳氏云地名零陵故以地爲名味辛温無毒主風邪衝心牙車腫痛虚勞疳𧏾凡是齒痛煎含良得升麻細辛善不宜多服令人氣喘衍義曰零陵香至枯乾猶香入藥絶可用婦人浸油飾髮香無以加此即蕙草是也縮紗蜜縮紗蜜味辛温無毒主虚勞冷瀉宿食不消赤白泄痢腹中虚痛下氣生南地苗似廉薑形如白豆蔻其皮緊厚而皺黃赤色八月採今附禹錫等按藥性論云縮紗蜜君出波斯國味苦辛能主冷氣腹痛止休息氣痢勞損消化水穀温暖脾胃治冷滑下痢不禁虚羸方曰燥爲末羊子肝薄切用末逐片糝瓦上焙乾爲末入乾薑末飯爲圓日二服五十丸又方炮附子末乾薑厚朴陳橘皮等分爲丸日二服四十丸陳藏器云縮紗蜜味酸主上氣咳嗽奔豚鬼疰驚癇邪氣似白豆蔻子嵩陽子曰止痢味辛香日華子云治一切氣霍亂轉筋心腹痛能起酒香味圖經曰縮紗蜜生南地今惟嶺南山澤間有之苗莖似高良薑高三四尺葉青長八九寸闊半寸已來三月四月開花在根下五六月成實五七十枚作一穗狀似益智皮緊厚而皺如粟文外有刺黄赤色皮開細子一團八漏可四十餘粒如黍米大微黑色七月八月採海藥云今按陳氏生西海及西戎諸國味辛平鹹得訶子鱉甲豆蔻白蕪荑等良多從安東道來孫尚藥治婦人妊娠偶因所觸或墮高傷打致胎動不安腹中痛不可忍者縮紗不計多少熨斗内盛慢火炒令熱透去皮用人搗羅爲末每服二錢用熱酒調下須臾覺腹中胎動處極熱即胎已安神效蓬莪荗蓬莪荗味苦辛温無毒主心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒飲食不消酒研服之又療婦人血氣丈夫奔豚生西戎及廣南諸州子似乾椹葉似蘘荷荗在根下并生一好一惡惡者有毒西戎人取之先放羊食羊不食者棄之今附禹錫等按陳藏器云一名蓬莪黑色二名蒁黄色三名波殺味甘大有毒藥性論云蓬莪荗亦可單用能治女子血氣心痛破痃癖冷氣以酒醋摩服效日華子云得酒醋治一切氣開胃消食通月經消瘀血止撲損痛下血及内損惡血等此即是南中薑黄根也圖經曰蓬莪荗生西戎及廣南諸州今江浙或有之三月生苗在田野中其莖如錢大高二三尺葉青白色長一二尺大五寸已來頗類蘘荷五月有花作穗黃色頭微紫根如生薑而荗在根下似鷄鴨卵大小不常九月採削去粗皮蒸熟暴乾用此物極堅硬難搗治用時熱灰火中煨令透熟乘熱入臼中搗之即碎如粉古方不見用者今醫家治積聚諸氣爲最要之藥與京三梭同用之良婦人藥中亦多使雷公云凡使於砂盆中用醋磨令盡然後於火畔吸令乾重篩過用十全博濟方治小兒氣候止疼蓬莪荗炮過熱搗爲末用一大錢熱酒調下孫用和正元散治氣不接續氣短兼治滑泄及小便數王丞相服之有效蓬莪荗一兩金鈴子去核一分右件爲末入鵬砂一錢煉過研細都令匀每服二錢鹽湯或温酒調下空心服積雪草積雪草味苦寒無毒主大熱惡瘡癰疽浸淫赤熛皮膚赤身熱生荆州山谷陶隱居云方藥不用想此草當寒冷爾唐本注云此草葉圓如錢大莖細勁蔓延生溪澗側搗傅熱腫丹毒不入藥用荆楚人以葉如錢謂之地錢草徐儀藥圖名連錢草生處亦稀今按陳藏器本草云積雪草主暴熱小兒丹毒寒熱腹内熱結搗絞取汁服之又按别本注云今處處有并入藥用生陰濕地八月九月採苗葉陰乾禹錫等按藥性論云連錢草亦可單用能治瘰癧鼠漏寒熱時節來往日華子云味苦辛以鹽挼貼消腫毒并風疹疥癬圖經曰積雪草生荆州川谷今處處有之葉圓如錢大莖細而勁蔓延生溪澗之側楚人以葉如錢謂之地錢草徐儀藥圖名連錢草八月九月採苗葉陰乾用段成式酉陽雜俎云地錢葉圓莖細有蔓一曰積雪草一曰連錢草謹按天寳單行方云連錢味辛平無毒元生咸陽下濕地亦生臨淄郡濟陽郡池澤中甚香俗間或云葉圓似薄荷江東吴越郡丹陽郡極多彼人常充生菜食之河北柳城郡盡呼爲海蘇好近水生經冬不死咸洛二京亦有或名胡蔢荷所在有之單服療女子小腹痛又云女子忽得小腹中痛月經初來便覺腰中切痛連脊間如刀錐所切忍不可堪者衆醫不别是謂鬼疰妄服諸藥終無所益其疾轉增審察前狀相當即用此藥其藥夏五月正放花時即採取暴乾搗篩爲散女子有患前件病者取二方寸七和好醋二小合攪令匀平旦空腹頓服之一日一服以知爲度如女子先冷者即取前件藥五兩加桃人二百枚去尖皮熬搗爲散以蜜爲丸如梧子大每日空腹以飲及酒下二十丸日再服以疾愈爲度忌麻子蕎麥陳藏器云東人呼爲連錢草生陰處蔓延地葉如錢衍義曰積雪草今南方多有生陰濕地不必荆楚形如水荇而小面亦光潔微尖爲異今人謂之連錢草蓋取象也華葉各生搗爛貼一切熱毒癰疽等秋後採之陰乾爲末水調傅白前白前味微温臣禹錫等謹按蜀本云微寒無毒主胸脅逆氣咳嗽上氣陶隱居云此藥出近道似細辛而大色白易折主氣嗽方多用之唐本注云此藥葉似柳或似芫花苗高尺許生洲渚沙磧之上根白長於細辛味甘俗以酒漬服之主上氣不生近道俗名石藍又名嗽藥今用蔓生者味苦非眞也今按别本注云三月八月採根暴乾根似牛膝白薇禹錫等按藥性論云白前味辛兼主一切氣日華子云治賁豚腎氣肺氣煩悶及上氣圖經曰白前舊不載所出州土陶隱居云出近道今蜀中及淮浙州郡皆有之苗似細辛而大色白易折亦有葉似柳或似芫花苗者高尺許生洲渚沙磧之上根白長於細辛亦似牛膝白薇輩今用蔓生者味苦非眞也二月八月採根暴乾深師療久咳逆上氣體腫短氣脹滿晝夜倚壁不得卧常作水雞者白前湯主之白前二兩紫菀半夏洗各三兩大戟七合四物以水一斗漬一宿明旦煮取三升分三服禁食羊肉餳大佳唐本云微寒主上氣衝喉中呼吸欲絶雷公云凡使先用生甘草水浸一伏時候漉出去頭鬚了焙乾任入藥中用梅師方治久患㗇呷咳嗽喉中作聲不得眠取白前搗爲末温酒調二錢七衍義曰白前保定肺氣治嗽多用白而長於細辛但麤而脆不似細辛之柔以温藥相佐使則尤佳餘如經薺苨薺苨味甘寒主解百藥毒陶隱居云根莖都似人參而葉小異根味甜絶能殺毒以其與毒藥共處而毒皆自然歇不正入方家用也今按别本注根似桔梗以無心爲異無毒二月八月採根暴乾臣禹錫等按爾雅云苨菧苨釋曰苨一名菧苨郭云薺苨也日華子云薺苨殺蠱毒治蛇蟲咬熱狂温疾罯毒箭圖經曰薺苨舊不載所出州土今川蜀江浙皆有之春生根莖都似人參而葉小異根似桔梗根但無心爲異潤州尤多人家收以爲果菜或作脯啖味甚甘美二月八月採根暴乾古方解五石毒多生服薺苨汁良又小品方療蠱毒取薺苨根搗末以飲服方寸匕立瘥食療云丹石發動取根食之尤良千金翼封丁腫取生薺苨根汁一合去滓傅之不過三食醫心鏡薺苨主利肺氣和中明目止痛蒸切作羹粥食之齏菹亦得金匱玉函方鈎吻葉與芹葉相似誤食之殺人薺苨八兩水六升煮取三升爲兩服解之朝野僉載野猪中毒藥箭多食此物即出别說云今多蒸壓匾亂人參但味淡爾衍義曰薺苨今陜州採爲脯别有法甚甘美兼可寄遠古人以謂薺苨似人參者是此解藥毒甚驗白藥白藥味辛温無毒主金瘡生肌出原州唐本注云三月苗生葉似苦苣四月抽赤莖花白根皮黃八月葉落九月枝折採根日乾今按别本注云解野葛生金巴豆百藥毒刀斧折傷乾末傅之唐本先附禹錫等按藥性論云白藥亦可單用味苦能治喉中熱塞噎痹不通胸中隘塞咽中常痛腫脹日華子云白藥冷消痰止嗽治渴并生血喉閉消腫毒又云剪草根名白藥圖經曰白藥出原州今夔施江西嶺南亦有之三月生苗似苦苣葉四月而赤長似葫蘆蔓六月開白花八月結子亦名苽蔞九月採根以水洗切碎暴乾名白藥子江西出者葉似烏臼子如緑豆至八月其子變成赤色施州人取根并野猪尾二味洗淨去麤皮焙乾等分停搗篩酒調服一錢七療心氣痛解熱毒甚效又諸瘡癰腫不散者取生根爛搗傅貼乾則易之無生者用末水調塗之亦可崔元亮海上方治一切天行取白藥研如麵漿水一大盞空腹頻服之便仰卧一食頃俟心頭悶亂或惡心腹内如車鳴㽲刺痛良乆當下吐痢數行勿怪欲服藥時先令煑漿水粥於井中懸著待冷若吐痢過度即喫冷粥一碗止之不喫即困人經驗後方治妊娠護胎以白藥子不拘多少爲末用鷄子清調攤於紙花上可椀來大貼在臍下胎存生處乾即以温水潤之衍義曰白藥今爲治馬肺熱藥有效葒草葒音紅草味鹹微寒無毒主消渴去熱明目益氣一名鴻䕵音纈如馬蓼而大生水傍五月採實陶隱居云此類甚多今生下濕地極似馬蓼甚長大詩稱隰有遊龍注云葒草郭景純云即籠古也今按别本注云此即水紅也以爲湯浸療脚氣禹錫等按爾雅云紅籠古其大者蘬疏引陸機云一名馬蓼葉大而赤白色生水澤中高丈餘郭云俗呼葒草爲籠鼓語轉耳圖經曰葒草即水紅也舊不著所出州郡云生水傍今所在下濕地皆有之似蓼而葉大赤白色高丈餘爾雅云紅籠古其大者蘬丘追切鄭詩云隰有遊龍是也鄭詩云一名馬蓼本經云似馬蓼而大若然馬蓼自是一種也五月採實今亦稀用但取根莖作湯捋脚氣耳陳藏器云作湯浸水氣惡腫瘡佳唐本注云有毛花紅白除惡瘡腫脚氣煑濃汁漬之多瘥莎草根莎草根味甘微寒無毒主除胸中熱充皮毛久服利人益氣長鬚眉一名薃音號一名侯莎其實名緹生田野二月八月採陶隱居云方藥亦不復用離騷云青莎雜樹繁草靃音髓靡音美古人爲詩多用之而無識者乃有鼠蓑療體異此唐本注云此草根名香附子一名雀頭香大下氣除胸腹中熱所在有之莖葉都似三梭根若附子周匝而多毛交州者最勝大如棗近道者如杏人許荆襄人謂之莎草根合和香用之圖經曰莎草根又名香附子舊不著所出州土但云生田野今處處有之或云交州者勝大如棗近道者如杏人許苗莖葉都似三稜根若附子周匝多毛今近道生者苗葉如薤而瘦根如箸頭大二月八月採謹按天寳單方圖載水香梭功狀與此頗相類但味差不同其方云水香梭味辛微寒無毒性澀元生博平郡池澤中苗名香稜根名莎結亦名草附子河南及淮南下濕地即有名水莎隴西謂之地藾根蜀郡名續根草亦名水巴戟今涪都最饒名三稜草用莖作鞋履所在皆有單服療虚風又云其藥療丈夫心肺中虚風及客熱膀胱間連脅下時有氣妨皮膚瘙癢癮𤺋飲食不多日漸痩損常有憂愁心忪少氣等并春收苗及花陰乾入冬採根切貯於風凉處有患前病者取苗二十餘斤剉以水二石五斗煮取一石五斗於浴斛中浸身令汗出五六度浸兼浴其肺中風皮膚癢即止每載四時常用則癮疹風永差其心客熱膀胱間連脅下氣妨常日憂愁不樂兼心忪者取根二大斤切熬令香以生絹盛貯於三大斗無灰清酒中浸之春三月浸一日即堪服冬十月後即七日近暖處乃佳每空腹服一盞日夜三四服之常令酒氣相續以知爲度若不飲酒即取根十兩加桂心五兩蕪荑三兩和搗爲散以蜜和爲丸搗一千杵丸如梧子大每空腹以酒及薑蜜湯飲汁等下二十丸日再服漸加至三十丸以瘥爲度雷公云凡採得後陰乾於石臼中搗勿令犯鐵器用之切忌衍義曰莎草其根上如棗核者又謂之香附子亦入印香中亦能走氣今人多用雖生於莎草根上然根或有或無有薄皸皮紫黑色非多毛也刮去皮則色白若便以根爲之則誤矣其味苦蓽澄茄蓽澄茄味辛温無毒主下氣消食皮膚風心腹間氣脹令人能食療鬼氣能染髮及香身生佛誓國似梧桐子及蔓荆子微大亦名毗陵茄子今附禹錫等按日華子云治一切氣并霍亂瀉肚腹痛腎氣膀胱冷圖經曰蓽澄茄生佛誓國今廣州亦有之春夏生葉青滑可愛結實似梧桐子及蔓荆子微大八月九月採之今醫方脾胃藥中多用又治傷寒咳噫日夜不定者其方以蓽澄茄三分高良薑三分二物搗羅爲散每服二錢以水六分煎十餘沸入醋少許攪匀和查如茶熱呷海藥云謹按廣志云出諸海嫩胡椒也青時就樹採摘造之有柄粗而蒂丸是也其味辛苦微温無毒主心腹卒痛霍亂吐瀉痰癖冷氣古方偏用染髮不治病雷公云凡採得後去柄及皺皮了用酒浸蒸從已至酉出細杵任用也胡黄連胡黄連味苦平無毒主乆痢成疳傷寒咳嗽温瘧骨熱理腰腎去陰汗小兒驚癇寒熱不下食霍亂下痢生胡國似乾楊柳心黑外黄一名割孤露澤今附圖經曰胡黄連生胡國今南海及秦隴間亦有之初生似蘆乾似楊柳枝心黑外黄不拘時月收採今小兒藥中多用之又治傷寒勞復身熱大小便赤如血色者胡黄連一兩山栀子二兩去皮入蜜半兩拌和炒令微焦二味搗羅爲末用猪膽汁和丸如梧桐子大每服用生薑二片烏梅一箇童子小便三合浸半日去滓食後暖小便令温下十丸臨卧再服甚效唐本云大寒主骨蒸勞熱補肝膽明目治冷熱泄痢益顔色厚腸胃治婦人胎蒸虚驚治三消五痔大人五心煩熱出波斯國生海畔陸地八月上旬採惡菊花玄參白蘚皮解巴豆毒服之忌猪肉令人漏精以人乳浸點目甚良苗若夏枯草根頭似烏觜折之内似鸜鵒眼者良孫尚藥治小兒盜汗潮熱往來南蕃胡黄連柴胡等分羅極細煉蜜和丸如雞頭大每服二丸至三丸銀器中用酒少許化開更入水五分重湯煮三二十沸放温食後和滓服别說云謹按胡黃連折之塵出如烟者爲眞船底苔冷無毒治鼻洪吐血淋疾以炙甘草并豉汁濃煎湯旋呷又主五淋取一團鴨子大煑服之又水中細苔主天行病心悶搗絞汁服新補見孟詵陳藏器日華子陳藏器云主五淋取一鴨卵大塊水煑服之聖惠方治乳石發動小便淋澀不通心神悶亂用船底青苔如半鷄子大以水一大盞煎至五分去滓温服日三四服子母秘録小兒赤遊行於體上下至心即死水中苔搗末傅上良紅豆蔻味辛温無毒主腸虚水瀉心腹攪痛霍亂嘔吐酸水解酒毒不宜多服令人舌麤不思飲食云是高良薑子其苗如蘆葉似薑花作穗嫩葉卷而生微帶紅色生南海諸谷今附禹錫等按藥性論云紅豆蔻亦可單用味苦辛能治冷氣腹痛消瘴霧氣毒去宿食温腹腸吐瀉痢疾海藥云擇嫩者加入鹽纍纍作朵不散落須以朱槿染令色深善醒於醉解酒毒此外無諸要使也蒔蘿蒔蘿味辛温無毒主小兒氣脹霍亂吐逆腹冷食不下兩肋痞滿生佛誓國如馬芹子辛香亦名慈謀勒今附禹錫等按日華子云健脾開胃氣温腸殺魚肉毒補水藏及壯筋骨治腎氣海藥云謹按廣州記云生波斯國馬芹子即黑色而重蒔蘿子即褐色而輕主膈氣消食温胃善滋食味多食無損即不可與阿魏同合奪其味耳圖經曰蒔蘿今嶺南及近道皆有之三四月生苗花實大類蛇床而香辛六七月採實今人多以和五味不聞入藥用艾蒳香味甘温無毒去惡氣殺蟲主腹冷洩痢廣志曰出西國似細艾又有松樹皮緑衣亦名艾納可以和合諸香燒之能聚其烟青白不散而與此不同也今附禹錫等按古樂府詩云行胡從何方列國持何來氍𣯜毾㲪五木香迷迭艾蒳與都梁是也陳藏器云主癬辟蛀海藥云謹按廣志云生剽國温平主傷寒五泄主心腹注氣下寸白止腸鳴燒之辟瘟疫合整窠浴氣甚良甘松香甘松香味甘温無毒主惡氣卒心腹痛滿兼用合諸香叢生葉細廣志云甘松香出姑臧今附禹錫等按日華子云治心腹脹下氣作浴湯令人身香圖經曰甘松香出姑臧今黔蜀州郡及遼州亦有之叢生山野葉細如茅草根極繁密八月採作浴湯令人體香陳藏器云叢生葉細出凉州海藥云謹按廣志云生源州苗細引蔓而生又陳氏云主黑皮䵟𪒟風疳齒𧏾野雞痔得白芷附子良和合諸香及裛衣妙也垣衣味酸無毒主黃瘇心煩咳逆血氣暴熱在腸胃金瘡内寒久服補中益氣長肌好顔色一名昔邪一名烏韭一名垣嬴一名天韭一名鼠韭生古垣墻陰或屋上三月三日採陰乾陶隱居云方藥不甚用俗中少見有者離騷亦有昔邪或云即是天蒜耳唐本注云此即古墻北陰青苔衣也其生石上者名昔邪一名烏韭江南少墻陶故云少見本經載之屋上者名屋遊在下品形并相似爲療略同别録云主暴風口噤金瘡酒漬服之效禹錫等按日華子云垣衣冷又云地衣冷微毒治卒心痛中惡以人垢膩爲丸服七粒此是陰濕地被日㬠起苔蘚是也并生油調傅馬反花瘡甚良圖經曰文具海藻條下陟釐音離味甘大温無毒主心腹大寒温中消穀强胃氣止泄痢生江南池澤陶隱居云此即南人用作紙者方家惟合斷下藥用之唐本注云此物乃水中苔今取以爲紙名苔紙青黄色體澀小品方云水中麤苔也范東陽方云水中石上生如毛緑色藥對云河中側梨側梨陟釐聲相近也王子年拾遺云張華撰博物志上晋武帝嫌繁命削之賜華側理紙萬張子年云陟釐紙也此紙以水苔爲之溪人語訛謂之側理也今按别本注云此即石髮也色類似苔而粗澀爲異且水苔性冷陟釐甘温明其陟釐與苔全異也澤中石上名陟釐浮水中者名苔耳圖經曰文具海藻條下今按别本注云此即石髮也色類似苔而麤澀爲異且水苔性冷陟釐甘温明其陟釐與苔全異也澤中石上名陟釐浮水中者名苔耳衍義曰陟釐今人事治音池爲苔脯堪㗖京城市中甚多然治渴疾仍須禁食鹽餘方家亦罕用鳧葵味甘冷無毒主消渴去熱淋利小便生水中即莕音杏菜也一名接俞唐本注云南人名猪蒓堪食有名未用條中載也今按别本注云即荇菜也生水中菜似蒓莖澀根極長江南人多食云是猪蒓與絲蒓并一種以春夏細長肥滑爲絲蒓至冬短爲猪蒓亦呼爲龜蒓比與鳧葵殊不相似也南人搗汁服之療寒熱也唐本先附禹錫等日華子云猪蒓解蠱毒毒藥絲蒓已見蒓條解之今據唐本注云有名未用條中即無鳧葵猪蒓蓋經開寳詳定已删去圖經曰鳧葵即莕菜也舊不著所出州土云生水中今處處池澤皆有之葉似蒓莖澀根甚長花黄色水中極繁盛謹按爾雅莕謂之接俞其葉謂之符郭璞以爲叢生水中葉圓在莖端長短隨水之深淺江東人食之詩周南所謂參差荇菜是陸機云白莖葉紫赤色正圓徑寸餘浮在水上根在水底大如釵股上青下白煮其白莖以苦酒浸脆美可以按酒今人不食醫方亦不用女苑味辛温無毒主風寒洗洗霍亂泄痢腸鳴上下無常處驚癇寒熱百疾療肺傷欬逆出汗久寒在膀胱支滿飲酒夜食發病一名白苑一名織女苑一名茆音柳生漢中川谷或山陽正月二月採陰乾畏鹵鹹陶隱居云比來醫方都無復用之市人亦少有便是欲絶别復有白苑似紫苑非此之别名也唐本注云白苑即女苑更無别者有名未用中浪出一條無紫苑時亦用之功效相似也禹錫等今據有名未用中無白苑者蓋唐修本草時删去耳衍義曰女苑一名白苑或者謂爲二物非也唐删去白苑之條甚合宜陶能言不能指說性狀餘從經中所說甚明今直取經王孫味苦平無毒主五臟邪氣寒濕痹四肢疼酸膝冷痛療百病益氣吴名白功草楚名王孫齊名長孫一名黄孫一名黄昏一名海孫一名蔓延生海西川谷及汝南城郭垣下陶隱居云今方家皆呼爲黄昏又云牡蒙市人亦少識者唐本注云小品述本草牡蒙一名王孫藥對有牡蒙無王孫此則一物明矣又主金瘡破血生肌肉止痛赤白痢補虚益氣除脚腫發陰陽也禹錫等按蜀本注云葉似及己而大根長尺餘皮肉亦紫色土馬鬃治骨熱敗煩熱毒壅衂鼻所在背陰古墻垣上有之歲多雨則茂盛世人或便以爲垣衣非也垣衣生垣墻之側此物生垣墻之上比垣衣更長大抵苔之類也以其所附不同故立名與主療亦異在屋則謂之屋遊瓦苔在垣墻則謂之垣衣土馬鬃在地則謂之地衣在井則謂之井苔在水中石上則謂之陟釐土馬鬃近世常用而諸書未著故附新定條焉新定蜀羊泉味苦微寒無毒主頭秃惡瘡熱氣疥瘙痂癬蟲療齒女子陰中内傷皮間實積一名羊泉一名羊飴生蜀郡山谷陶隱居云方藥亦不復用彼土人時有採識者唐本注云此草俗名漆姑葉似菊花紫色子類枸杞子根如遠志無心有糝苗主小兒驚兼療漆瘡生毛髮所在平澤皆有之今按别本注云今處處有生陰濕地三月四月採苗葉陰乾之菟葵味甘寒無毒主下諸石五淋止虎蛇毒唐本注云苗如石龍芮葉光澤花白似梅莖紫色煮汁極滑堪啖爾雅釋草一名莃所在平澤皆有田間人多識之今按别本注云蛇虎毒諸瘡搗汁飲之及塗瘡能解毒止痛六月七月採莖葉暴乾唐本先附禹錫等按爾雅云莃菟葵頗似葵而小葉狀如藜有毛汋啖之滑蔬汋煑也圖經曰文具第二十八卷冬葵條下衍義曰菟葵緑葉如黄蜀葵花似物霜甚雅形如至小者初開單葉蜀葵有檀心色如牡丹姚黄蘂則蜀葵也唐劉夢得還京云唯菟葵燕麥動揺春風者是也薢草味甘寒無毒主暴熱喘息小兒丹腫一名斛榮生水傍唐本注云葉圓似澤瀉而小花青白亦堪噉所在有之今按别本注云江南人用蒸魚食之甚美五月六月採莖暴乾唐本先附鱧腸鳢腸味甘酸平無毒主血痢針灸瘡發洪血不可止者傅之立已汁塗髮眉生速而繁生下濕地唐本注云苗似旋復一名蓮子草所在坑渠間有之今按别本注云二月八月採陰乾唐本先附禹錫等按蕭炳云作膏點鼻中添腦日華子云排膿止血通小腸長鬢髮傅一切瘡并蠶瘑圖經曰鱧腸即蓮子草也舊不載所出州郡但云生下濕地今處處有之南方尤多此有二種一種葉似柳而光澤莖似馬齒莧高一二尺許花細而白其實若小蓮房蘇恭云苗似旋覆者是也一種苗梗枯瘦頗似蓮花而黃色實亦作房而圓南人謂之蓮翹者二種摘其苗皆有汁出須臾黑色故侈作烏髭髮藥用之俗謂之旱蓮子三月八月採陰乾亦謂之金陵草見孫思邈千金月令云益髭髮變白爲黑金陵草一秤六月以後收採揀擇無泥土者不用洗須青嫩不雜黄葉乃堪爛搗研新布絞取汁又以紗絹濾令滓盡内通油器鉢盛之日中煎五日又取生薑一斤絞汁又白蜜一斤合和入煎中以柳木篦攪勿停手令匀調又置日中煎之令如稀餳爲藥成矣每旦日及午後各服一匙以温酒一盞化下如欲作丸日中再煎令可丸大如梧桐子依前法酒服三十丸及時多合製爲佳其效甚速爵床味鹹寒無毒主腰脊痛不得著床俯仰艱難除熱可作浴湯生漢中川谷及田野唐本注云此藥似香葇葉長而大或如荏且細生平澤熟田近道傍甚療血脹下氣又主杖瘡汁塗立差俗名赤眼老母草今按别本注云今人名爲香蘇井中苔及萍大寒主漆瘡熱瘡水腫井中藍殺野葛巴豆諸毒陶隱居云廢井中多生苔萍及磚土間生雜草菜藍既解毒在井中者彌佳不應復别是一種名井中藍井底泥至冷亦療湯火灼瘡井華水又復煉法用之禹錫等按蜀本云井中苔及萍味苦日華子云無毒圖經曰文具海藻條下茅香花茅香花味苦温無毒主中惡温胃止嘔吐療心腹冷痛苗葉可煮作浴湯辟邪氣令人身香生劎南道諸州其莖葉黑褐色花白即非白茅香也今附禹錫等按陳藏器云茅香味甘平生安南如茅根日華子云白茅香花塞鼻洪傅久不合灸瘡罯刀箭瘡止血并痛煎湯止吐血鼻衂圖經曰茅香花生劎南道諸州今陜西河東京東州郡亦有之三月生苗似大麥五月開白花亦有黄花者或有結實者亦有無實者并正月二月採根五月採花八月採苗其莖葉黑褐色而花白色者名白茅香陳藏器云白茅香味甘平無毒主惡氣令人身香美煮服之主腹内冷痛生安南如茅根作浴用之海藥云謹按廣志云生廣南山谷味甘平無毒主兒遍身瘡疱以桃葉同煮浴之合諸衣香甚奇尤勝舶上來者肘後方治熱淋取白茅根四斤剉之以水一斗五升煮取五升令冷仍暖飲之日三服又方諸竹木刺在肉中不出取白茅根燒末脂膏和塗之亦治因風致腫衍義曰茅香花白根如茅但明潔而長皆可作浴湯同藁本尤佳仍入印香中合香附子用馬蘭味辛平無毒主破宿血養新血合金瘡斷血痢蠱毒解酒疸止鼻衂吐血及諸菌毒生搗傅蛇咬生澤傍如澤蘭氣臭楚辭以惡草喻惡人北人見其花呼爲紫菊以其花似菊而紫也又山蘭生山側似劉寄奴葉無椏不對生花心微黄赤亦大破下俚人多用之新補出陳藏器及日華子圖經文具澤蘭條下使君子使君子味甘温無毒主小兒五疳小便白濁殺蟲療瀉痢生交廣等州形如栀子梭瓣深而兩頭尖亦似訶梨勒而輕俗傳始因潘州郭使君療小兒多是獨用此物後來醫家因號爲使君子也今附圖經曰使君子生交廣州等今嶺南州郡皆有之生山野中及水岸其葉青如兩指頭長二寸其莖作藤如手指三月生花淡紅色乆乃深紅有五瓣七月八月結子如拇指長一寸許大類栀子而有五棱其殻青黑色内有人白色七月採實衍義曰使君子紫黑色四棱高瓣深今經中謂之稜瓣深似令人難解秋末冬初人將入鼎澧其人味如椰子肉經不言用人爲復用皮今按文味甘即是用肉然難得人蓋絶小今醫家或兼用殻乾苔味鹹寒一云温主痔殺蟲及霍亂嘔吐不止煑汁服之又心腹煩悶者冷水研如泥飲之即止又發諸瘡疥下一切丹石殺諸藥毒不可多食令人痿黄少血色殺木蠹蟲内木孔中但是海族之流皆下丹石新補見孟詵陳藏器日華子百脉根味甘苦微寒無毒主下氣止渴去熱除虚勞補不足酒浸若水煮圓散兼用之出肅州巴西唐本注云葉似苜蓿花黄根如遠志二月八月採根日乾唐本先附白豆蔻白豆蔻味辛大温無毒主積冷氣止吐逆反胃消穀下氣出伽古羅國呼爲多骨形如芭蕉葉似杜若長八九寸冬夏不凋花淺黄色子作朵如葡萄其子初出微青熟則變白七月採今附圖經曰白豆蔻出伽古羅國今廣州宜州亦有之不及蕃舶者佳苗類芭蕉葉似杜若長八九尺而光滑冬夏不凋花淺黄色子作朵如葡萄生青熟白七月採張文仲治胃氣冷喫食即欲得吐以白豆蔻子三枚搗篩更研細好酒一盞微温調之併飲三兩盞佳又有治嘔吐白术等六物湯亦用白豆蔻大抵主胃冷即宜服之地笋温無毒利九竅通血脉排膿治血止鼻洪吐血産後心腹痛一切血病肥白人産婦可作蔬菜食甚佳即澤蘭根也新補出陳藏器及日華子海帶催生治婦人及療風亦可作下水藥出東海水中石上比海藻更粗柔韌而長今登州人乾之以苴束器物新定陀得花味甘温無毒主一切風血浸酒服生西國胡人將來胡人採得花以釀酒呼爲王勒漿今附剪草剪草凉無毒治惡瘡疥癬風瘙根名白藥新分條見日華子圖經曰剪草生潤州味苦平有毒主諸瘡疥痂瘻蝕及牛馬諸瘡二月三月採暴乾用陳藏器云剪草味甚苦平無毒主蟲瘡疥癬浸酒服之生山澤間葉如茗而細江東用之治勞瘵方云婺台州皆有惟婺州者可用狀如茜草又如細辛每用一斤淨洗爲末入生蜜一斤和爲膏以器皿盛之不得犯鐵器九蒸九曝日一蒸曝病人五更起面東坐不得語令匙抄藥如粥服之每服四兩服已良乆服稀粟米飲壓之藥冷服粥飲亦不可太熱或吐或下皆不妨如乆病肺損咯血只一服愈尋常咳嗽血妄行再服一匙可也有一貴人其國封病瘵其尊人嘗以此方畀之九日而藥成前一夕病者夢人戒令翌日勿亂服藥次日將服之爲屋土墜器中不可服再合既成又將服之爲藉覆器又不得食又再合未就而夫人卒矣此藥之異如此若小小血妄行一啜而愈矣一十種陳藏器餘迭迷香味辛温無毒主惡氣令人衣香燒之去鬼魏略云出大秦國廣志云出西海也海藥云味平不治疾燒之祛鬼氣合羌活爲丸散夜燒之辟蚊蟲此外别無用矣故魚網主鯁以網覆鯁者頸差如煑汁飲之骨當下矣故繳脚布無毒主天行勞復馬駿風黑汗洗汁飲帶垢者佳江中採岀蘆蘆令夫婦和同用之有法此江中出波蘆也虱建草味苦無毒去蟣虱挼取汁沐頭盡死人有誤吞虱成病者搗絞汁服一小合亦主諸蟲瘡生山足濕地莖葉似山丹微赤高一二尺又有水竹葉如竹葉而短小生水中亦云去虱人取水竹葉生食之含生草主婦人難産口中含之立産亦咽其汁葉如卷柏而大生靺羯國其葉煮之不熱無毒兔肝草味甘平無毒主金瘡止血生肉解丹石發熱初生葉細軟似兔肝一名鷄肝與蘩蔞同名石芒味甘平無毒主人畜爲虎狼等傷恐毒入肉者取莖雜葛根濃煎服之亦取汁生高山如芒節短江西人呼爲折草六月七月生穗如荻也蠶綱草味辛平無毒主蠶及諸蟲如蠶類咬人恐毒入腹煮汁服之生搗傅瘡生濕地如蓼大莖赤花白東土亦有之問荆味苦平無毒主結氣瘤痛上氣氣急煑服之生伊洛間洲渚苗似木賊節節相接亦名接續草圖經衍義本草卷之十五
