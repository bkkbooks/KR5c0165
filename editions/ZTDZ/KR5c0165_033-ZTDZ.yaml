front:
  text: 圖經衍義本草卷之三十三曰八
  hash: sha256:674b44946fee7d72623f39ecbcc05d35f22c70b7af6f5ab8796b611673d2289d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_SJB_033-170685c, image: sjb/17/170685c.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正蟲魚部下品蝦蟆蝦蟆味辛寒有毒主邪氣破癥堅血癰腫陰瘡服之不患熱病療陰蝕疽癘音賴惡瘡猘犬傷瘡能合玉石一名蟾蜍一名𪓰音秋一名去甫一名苦蠪音龍生江湖池澤五月五日取陰乾東行者良圖經曰蝦蟆生江湖今處處有之腹大形小皮上多黑斑點能跳接百蟲食之時作呷呷聲在陂澤間舉動極急五月五日取陰乾東行者良本經一名蟾蜍以爲一物似非的也謹按爾雅鼁𪓰幨蜍郭璞注云似蝦蟆居陸地又科斗注云蝦蟆子也是非一物明矣且蟾蜍形大背上多痱磊行極遲緩不能跳躍亦不解鳴多在人家下濕處其腹下有丹書八字者眞蟾蜍也藥性論云蝦蟆亦可單用主辟百邪鬼魅塗癰腫及治熱結腫又云幨蜍臣能殺疳蟲治鼠漏惡瘡端午日取眉脂以朱砂麝香爲丸如麻子大小兒子疳瘦者空心一丸如腦疳以奶汁調鼻中燒灰傅一切有蟲惡癢滋胤瘡陶隱居云此是腹大皮上多痱蒲罪切磊者其皮汁甚有毒犬嚙之口皆腫人得温病斑出困者生食一兩枚無不差者五月五日取東行者五枚反縛著密室中閉之明日視自解者取爲術用能使人縛亦自解燒灰傅瘡立驗其肪塗玉則刻之如蠟故云能合金石但肪不可多得取肥者剉煎膏以塗玉亦軟滑易琢古玉器有奇特非雕琢人功者多是昆吾刀及蝦蟆肪所刻也蕭炳云腹下有丹書八字者以足畫地眞蟾蜍也日華子云蝦蟆冷無毒治犬咬及熱狂貼惡瘡解煩熱色斑者是又云蟾凉微毒破癥結治疳氣小兒面黄癖氣燒灰油調傅惡瘡入藥并炙用又名蟾蜍眉酥治蚛齒和牛酥摩傅腰眼并陰囊治腰腎冷并助陽氣以吴茱萸苗汁調妙糞傅惡瘡丁腫雜蟲咬油調傅瘰癧痔瘻瘡聖惠方治風邪蝦蟆燒灰珠砂等分每服一錢水調下日三四服外臺秘要方治卒狂言鬼語燒蝦蟆杵末酒服方寸七日三又方治小兒初得月蝕瘡五月蝦蟆燒灰杵末猪脂和傅之梅師方治疳𧏾無問去處皆治之以蝦蟆燒灰好醋和傅日三五度傅之差子母秘録方小兒洞泄下痢燒蝦蟆爲末飲調方寸七服衍義曰蝦蟆多在人家渠壍下大腹品類中最大者是遇陰兩或昬夜即出食取眉間有白汁謂之蟾酥以油單裹眉裂之酥出單上入藥用有人病齒縫中血出以紙絍子蘸乾蟾酥少許於血出處按之立止世有人收三足枯蟾以罔衆但以水沃半日盡見其僞蓋本無三足者牡鼠微温無毒療踒折續筋骨擣傅之三日一易四足及尾主婦人墮胎易出肉熱無毒主小兒哺露大腹炙食之糞微寒無毒主小兒癇疾大腹時行勞復圖經曰文具附鼹鼠條下陶隱居云牡鼠父鼠也其屎兩頭尖專療勞復鼠目主明目夜見書術家用之臘月鼠燒之辟惡氣膏煎之亦療諸瘡膽主目暗但纔死膽便消故不可得之陳藏器序云雄鼠脊骨未長齒多年不生者效禹錫云按孟詵曰牡鼠主小兒癇疾腹大貪食者可以黄泥裹燒之細揀去骨取肉和五味汁作羹與食之勿令食著其骨甚痩人又取臘月新死者一枚油一大升煎之使爛絞去滓重煎成膏塗凍瘡及折破瘡日華子云鼠凉無毒治小兒驚癇疾以油煎令消入蠟傅湯火瘡生搗罯折傷筋骨雄鼠糞頭尖硬者是治癇疾明目葱豉煎服治勞復足燒食催生馬刀馬刀味辛微寒有毒主漏下赤白寒熱破石淋殺禽獸賊鼠除五臟間熱肌中鼠蒲剥切止煩滿補中去厥痹利機關用之當煉得水爛人腸又云得水良一名馬蛤生江湖池澤及東海取無時陶隱居云李云生江漢中長六七寸漢間人名爲單音善姥音母亦食其肉肉似蚌今人多不識之大都似今蝏䗒蒲辛切而非方用至少凡此類皆不可多食而不止入藥衍義曰馬刀京師謂之岸春夏人不食然發風痰性微冷順安軍界河中亦出鹹大抵與馬刀相類肉頗澹人作鮓以寄鄰近不能致遠亦發風此等皆不可多食今蛤粉皆此等衆蛤灰也蚌蚌冷無毒明目止消渴除煩解熱毒補婦人虚勞下血并痔漏血崩帶下壓丹石藥毒以黄連末納之取汁點赤眼并暗良爛殻粉飲下治反胃痰飲此即是寳裝大者又云蚌粉冷無毒治疳止痢并嘔逆癰腫醋調傅兼能制石亭脂陳藏器云據陶云大蛤乃蚌按蚌寒煮之主婦人勞損下血明目除濕止消渴老蚌含珠殻堪爲粉爛殻爲粉飲下主反胃心胸間痰飲生江溪渠瀆間陶云大蛤誤耳食療云蚌大寒主大熱解酒毒止渴去眼赤動冷熱氣丹房鏡源云蚌粉制硫黃蚺蛇膽蚺蛇膽蚺音髯味甘苦寒有小毒主心腹𧏾痛下部𧏾瘡目腫痛膏平有小毒主皮膚風毒婦人産後腹痛餘疾圖經曰蚺蛇膽本經不載所出州土陶隱居云出晋安蘇恭云出桂廣以南高賀等州今嶺南州郡皆有之此蛇極大彼土人多食其肉取其膽及膏爲藥陶隱居云此蛇出晋安大者三二圍在地行住不舉頭者是眞舉頭者非眞形多相似彼土人以此别之膏膽又相亂也眞膏纍纍如梨豆子相著他蛇膏皆大如梅李子眞膽狹長通黑皮膜極薄舐之甜苦摩以注水即沉而不散其僞者并不爾此物最難得眞眞膏多所入藥用亦云能療伯牛疾藥性論云蚺蛇膽臣渡嶺南食此膾瘴毒不侵世人皆知之膽主下部蟲殺小兒五疳食療云膽主𧏾瘡瘻目腫痛疳𧏾肉主温疫氣可作膾食之如無此疾及四月勿食之膏主皮膚間毒氣小兒疳痢以膽灌鼻中及下部聖惠方治小兒急疳瘡用蚺蛇膽細研水調傅之楊氏産乳方療温痢乆不斷體瘦昏多睡坐則閉目食不下蚺蛇膽大如豆二枚煮通草汁研膽以意多少飲之并塗五心并下部朝野僉載云泉州廬元欽患大風唯鼻未倒五月五日取蚺蛇膽欲進或云肉可治風遂一截蛇肉食之三五日頓覺漸可百日平復蛇蜕音稅味鹹甘平無毒主小兒百二十種驚癇瘛尺曳切瘲子用切癲疾寒熱腸痔蟲毒蛇癇弄舌摇頭大人五邪言語僻越惡瘡嘔咳明目火熬之良一名龍子衣一名蛇符一名龍子皮一名龍子單衣一名弓皮生荆州川谷及田野五月五日十五日取之良畏磁石及酒陶隱居云草中不甚見虺蝮蛻惟有長者多是赤𧐖黄領輩其皮不可復識今往往得耳皆須完全石上者亦佳燒之甚療諸惡瘡也禹錫云按藥性論云蛇蛻皮臣有毒能主百鬼魅兼治癇瘧陳藏器云按本草蛇蛻主瘧取正發日以蛻皮塞人兩耳臨發又以手持少許并服一合鹽醋汁令吐也日華子云治蠱毒辟惡止嘔逆治小兒驚悸客忤催生癧瘍白癜風煎汁傅入藥并炙用食療云蛇蛻皮主去邪明目治小兒一百二十種驚癇寒熱腸痔蠱毒諸𧏾惡瘡安胎熬用之聖惠方治小兒重腭重齦腫痛燒末傅之效千金方治諸腫失治有膿燒蛇蛻皮水和封腫上即蟲出又方治惡瘡十年不差似癩者燒全者一條爲末猪脂和傅上良十全博救方治橫生難産方蛇皮一條瓶子内鹽泥固濟存性燒爲黑灰每服二錢用榆白皮湯調服立效必效方五痔肛脱以死蛇一枚指大者温用掘地作坑燒蛇取有孔板覆坑坐上蟲盡出杜壬方治纏喉風咽中如束氣不通蛇蛻炙黄以當歸等分爲末温酒調一錢匕得吐即愈産書云治産不順手足先見者蛇蛻皮燒作灰研面東酒服一錢七更以藥末傅手足即順衍義曰蛇蛻從口翻退出眼晴亦退今合眼藥多用取此義也入藥洗淨白頸蚯蚓白頸蚯蚓味鹹寒大寒無毒主蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化作水療傷寒伏熱狂謬大腹黄疸一名土龍生平土三月取陰乾圖經曰白頸蚯蚓生平土今處處平澤皋壤地中皆有之白頸者是老者耳三月採陰乾一云須破去土鹽之日乾方家謂之地龍治脚風藥必須此物爲使然亦有毒曾有人因脚病藥中用此果得其效病既愈服之不止至二十餘日而覺煩躁憒亂但欲飲水不已遂至委頓凡攻病用藥毒已愈當便罷服也其屎呼爲蚓螻并鹽傅瘡可去熱毒也藥性論云蚯蚓亦可單用有小毒乾者熬末用之主蛇傷毒一名地龍子唐本注云别録云鹽霑爲汁療耳聾鹽消蛔功同蚯蚓其屎封狂犬傷毒出犬毛神效陳藏器云蚯蚓糞土療赤白久熱痢取無沙者末一升炒令烟盡水沃取半大升瀘去滓空肚服之日華子云蚯蚓治中風并癇疾去三蟲治傳屍天行熱疾喉痹蛇蟲傷一名千人踏即路行人踏殺者入藥燒用其屎治蛇犬咬并熱瘡并鹽研傅小兒陰囊忽虚熱腫痛以甘草汁調輕輕塗之禹錫云按蜀本注又云解射罔毒聖惠方治風赤眼以地龍十條炙乾爲末夜卧以冷茶調下二錢七千金方治齒齦宣露蚯蚓屎水和爲泥火燒令極赤研之如粉臘月猪脂和傅上日三永差斗門方小便不通用蚯蚓杵以冷水瀘過濃服半碗立通兼大解熱疾不知人事欲死者服之立效勝金方治耳聾立效以乾地龍入鹽貯在葱尾内爲水點之百一方治交接勞復陰卵腫或縮入腹腹絞痛或便絶蚯蚓數條絞取汁服之良又方治中蠱毒或吐下血若爛肝取蚯蚓十四條以苦酒三升漬之蚓死但服其汁已死者皆可活衍義曰白頸蚯蚓自死者良然亦應候而鳴此物有毒昔有病腹大夜聞蚯蚓鳴於身有人教用鹽水浸之而愈崇寧末年平州兵士暑月中在倅廳前跣立廳下爲蚯蚓所中遂不救後數日又有人被其毒博識者教以先飲鹽湯一杯次以鹽湯浸足乃愈今入藥當去土了微炙若治腎臟風下疰病不可闕也仍須鹽湯送王荆公所謂藁壤太牢俱有味可能蚯蚓獨清廉者也蜘蛛蜘蛛微寒主大人小兒㿉七月七日取其網療喜音戲忘陶隱居云蜘蛛類數十種爾雅止載七八種爾今此用懸網狀如魚罾者亦名䖦蟱蜂及蜈蚣螫人取置肉上則能吸毒又以斷瘧及乾嘔霍亂術家取其網著衣領中辟惡有赤斑者俗名絡新婦亦入方術用餘雜種并不入藥詩云蠨蛸在户正謂此也唐本注云别録云治小兒大腹丁奚三年不能行者又主蛇毒温瘧霍亂止嘔逆劍南山東爲此蟲嚙瘡中出絲屢有死者其網纏贅疣七日消爛有驗矣禹錫云按日華子云斑蜘蛛冷無毒治瘧疾丁腫網七夕朝取食令人巧去健忘又云壁錢蟲平微毒治小兒吐逆止鼻洪并瘡滴汁傅鼻中及瘡上并傅瘻瘡是壁上作繭蜘蛛也聖惠方治瘰癧無問有頭無頭用大蜘蛛五枚日乾細研酥調如麵脂日兩度貼之千金方治鼠瘻腫核痛若已有瘡口出膿水者燒蜘蛛二七枚傅良乘閑方治瀉多時脱肛疼痛黑聖散大蜘蛛一枚瓠葉重裹綿繫定合子内燒令黑色存性取出細研入黄丹少許同研凡有上件疾即先用白礬葱椒煎湯洗浴拭乾後將藥末摻在軟處帛上將手掌按托入收之妙孫眞人方蜈蚣咬取蜘蛛一枚咬處安當自飲毒蜘蛛死痛未止更易生者廣利方治蝎螫人研踟蛛汁傅之差産寳方治産後咳逆經三五日不止欲死方煎壁鏡窠三五個呷差衍義曰蜘蛛品亦多皆有毒經不言用是何種今人多用人家檐角籬頭陋巷之間空中作圓網大腹深灰色者遺尿著人作瘡癬蠮螉蠮螉上音噎下烏紅切味辛平無毒主乆聾咳逆毒氣出汗療鼻窒陟栗切其土房主癰腫風頭一名土蜂生熊耳川谷及牂牁或人屋間陶隱居云此類甚多雖名土蜂不就土中爲窟謂摙土作房爾今一種黑色腰甚細銜泥於人壁及器物邊作房如并竹管者是也其生子如粟米大置中乃捕取草上靑踟蛛十餘枚滿中仍塞口以擬其子大爲糧也其一種入蘆竹管中者亦取草上青蟲一名蜾臝詩云螟蛉有子蜾蠃負之教誨爾子式穀似之言細腰物無雌皆取青蟲教祝音咒便變成己子斯爲謬矣造詩者乃可不詳未審夫子何爲因其僻邪聖人有闕多皆類此日華子云此中有毒治嘔逆生研罯竹木刺入藥炒用李含光音義云咒變成子近亦數有見者非虚言也聖惠方治小兒霍亂吐瀉方用此蟲窠微炙爲末以乳汁調下一字止衍義曰蠮螉諸家所論備矣然終不敢捨詩之意嘗折窠而視之果有子如半粟米大其色白而微黄所負蟲亦在其中乃靑菜蟲却在子下不與蟲相著又非葉蟲及草上靑蟲應是諸蟲皆可也陶隱居所說近之矣人取此房研細醋調塗蜂蠆葛上亭長味辛微温有毒主蠱毒鬼疰破淋結積聚墮胎七月取暴乾一名斑猫圖經曰文具芫靑條下陶隱居云葛花時取之身黑而頭赤喻如人著玄衣赤幘故名亭長此一蟲五變爲療皆相似二月三月在芫花上即呼芫青四月五月在王不留行上即呼爲王不留行蟲六月七月在葛花上即呼爲葛上亭長八月在豆花上即呼爲斑猫九月十月欲還地蟄即呼爲地膽此是僞地膽耳爲療猶同其類亭長腹中有卵白如米粒主療諸淋結也唐本注云今檢本草及古今諸方未見用王不留行蟲者若爾則四蟲專在一處禹錫云按蜀本圖經云五月六月葛葉上採取之形似芫青而蒼黑色凡用斑猫芫靑亭長之類當以糯米同炒看米色黄黑即出去頭足及翅脚以亂髮裹懸屋棟上一宿然後入藥用蛤蚧蛤蚧味鹹平有小毒主久肺勞傳尸殺鬼物邪氣療咳嗽下淋瀝通水道生嶺南山谷及城墻或大樹間身長四五寸尾與身等形如大守宫一雄一雌常自呼其名曰蛤蚧最護惜其尾或見人欲取之多自嚙斷其尾人即不取之凡採之者須存其尾則用之力全故也方言曰桂林之中守宫能鳴者謂蛤蚧蓋相似也圖經曰蛤蚧生嶺南山谷及城墻或大木間今嶺外亦有之首若蝦蟆背有細鱗如蠶子色黄如土長四五寸尾與身等蓋守宫蝘蜓之類也故揚雄方言云桂林之中守宫能鳴者俗謂之蛤蚧言其自呼其名也藥力全在尾人捕之則自嚙斷其尾因得釋去巢穴多依榕木亦有在古屋城樓間者人欲得其首尾完者乃以長柄兩股鐵叉如粘黐竿狀伺於榕木間以叉刺之皆一股中腦一股著尾故不能嚙也行常一雄一雌相隨入藥亦須兩用之或云陽人用雌陰人用雄日華子云無毒治肺氣止嗽并通月經下石淋及治血又名蛤蟹合藥去頭足洗去鱗鬣内不淨以酥炙用良衍義曰蛤蚧補肺虚勞嗽有功治乆嗽不愈肺間積虚熱乆則成瘡故嗽出膿血曉夕不出喉中氣塞胸膈噎痛蛤蚧阿膠生犀角鹿角膠羚羊角各一兩除膠外皆爲屑次入膠分四服每服用河水三升於銀石器中慢火煮去半升瀘去滓臨卧微温細細呷其滓候服盡再捶都作一服以水三升煎至半升如前服若病人乆虚不喜水當遞减水張刑部子皋病極顧樞密况送此方遂愈蜈蚣蜈蚣味辛温有毒主鬼疰蠱毒啖諸蛇蟲魚毒殺鬼物老精温瘧去三圓療心腹寒熱結聚墮胎去惡血生大吴川谷江南赤頭足者良圖經曰蜈蚣生吴中川谷及江南今江浙山南唐鄧間皆有之多在土石人家屋壁間以頭足赤者爲勝七八月取之黄足者最多人以火炙令赤當之不堪用其性能制蛇忽見大蛇便縁而啖其腦陶隱居及蘇恭皆以爲莊子稱蝍蛆甘帶淮南子云騰蛇殆於蝍蛆并言蝍蛆是此蜈蚣也陶隱居云今赤足者多出京口長山高麗山茅山亦甚有於腐爛積草處得之勿令傷暴乾之黃足者甚多而不堪用人多火炙令赤以當之非眞也一名蝍蛆莊周云蝍蛆甘帶淮南子云騰蛇游霧而殆於蝍蛆其性能制蛇忽見大蛇便縁而啖其腦蜈蚣亦嚙人以桑汁白鹽塗之即愈日華子云蜈蚣治癥癖邪魅蛇毒入藥炙用子母秘録方治小兒撮口病但看舌上有瘡如粟米大是也以蜈蚣汁刮破指甲研傅兩頭肉差如無生者乾者亦得衍義曰蜈蚣背光黑緑色足赤腹下黄有中其毒者以烏鷄屎水調稠塗咬處效大蒜塗之亦效復能治丹毒瘤蜈蚣一條乾者白礬皂子大雷丸一個百部二錢秤同爲末醋調塗之又畏蛞喻不敢過所行之路觸其身則蜈蚣死人故取以治蜈蚣毒桑汁白鹽亦效水蛭水蛭音質味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道又墮胎一名蛟一名至掌生雷澤池澤五月六月採暴乾圖經曰水蛭生雷澤池澤今近處河池中多有之一名蜞此有數種生水中者名水蛭一名馬黄生山中者名石蛭生草中名草蛭生泥中名泥蛭并能著人及牛馬股脛間嚙咂其血甚者入肉中産育爲害亦大水蛭有長尺者用之當以小者爲佳六月採暴乾一云採得當以䈽竹筒盛之待乾又用米泔浸經宿然後出之暴已又冬月猪脂煎令黄乃堪用乾蛭當展令長腹中有子者去之古法有用水蛭啖瘡者緩急所須亦不可得崔知悌令預收養之以備用此物極難死加火炙經年得水猶可活也石蛭等并頭尖腹麤不堪入藥誤用則令人目中生烟不已漸致枯損不可不辨也藥性論云水蛭使主破女子月候不通欲成血勞癥塊能治血積聚陶隱居云蚑今復有數種此用馬蜞得嚙人腹中有血者仍乾爲佳山蚑及諸小者皆不用楚王食寒菹所得而吞之果能去結積雖曰陰祐亦是物性兼然日華子云畏石灰破癥結極難修制須細剉後微火炒令色黄乃熟不爾入腹生子爲害經驗方治折傷用水蛭新瓦上焙乾爲細末熱酒調下一錢食頃痛可更一服痛止便將折骨藥封以物夾定直候至效初虞世方治從高墜下及打擊内傷神效麝香水蛭各一兩剉碎炒令烟出二件研爲末酒調一錢當下畜血未止再服其效如神衍義曰水蛭陳藏器日華子所說備矣大者京師又謂之馬鱉腹黄者謂之馬蟥畏鹽然治傷折有功經與注皆不言修制宜子細不可忽也今人用者皆炒斑猫斑猫味辛寒有毒主寒熱鬼疰蠱毒鼠瘻疥癬惡瘡疽蝕死肌破石癃血積傷人肌墮胎一名龍尾生河東川谷八月取陰乾馬刀爲之使畏巴豆丹參空靑惡膚靑圖經曰斑猫生河東川谷今處處有之七月八月大豆盛時此蟲多在葉上長五六分甲上黄黑斑文烏腹尖喙如巴豆大就葉上採之陰乾古方書多有用此其字或作斑蠡亦作斑蛭入藥不可令生生即吐瀉人藥性論云斑猫使一名龍苗有大毒能治瘰癧通利水道陶隱居云豆花時取之身上黄黑斑色如巴豆大者是也日華子云惡豆花療淋疾傅惡瘡瘻爛入藥除翅足熟炒用生即吐瀉人禹錫云按蜀本圖經云七月八月大豆葉上甲蟲長五六分黄斑文烏腹者今所在皆有之吴氏云斑猫一名斑蚝一名龍蚝一名斑菌一名腃髮一名盤蛩一名晏靑神農辛岐伯鹹桐君有毒扁鵲甘有大毒生河内川谷或生水石外臺秘要方治乾癬積年生痂搔之黄水出每逢陰雨即癢用斑猫半兩微炒爲末蜜調傅之經驗方大治大人小兒瘰癧内消方斑猫一兩去翅足用粟米一升同斑猫炒令米焦黄去米不用細研入乾薄荷末四兩同研令匀以雞子清丸如緑豆大空心臘茶下一丸加至五丸却每日减一丸减至一丸後每日服五丸衍義曰斑猫須糯米中炒米黄爲度妊娠人不可服爲能潰人肉治淋藥中用極苦人尤宜斟酌下條芫靑其用與此不相遠故附於此蛤蜊冷無毒潤五臟止消渴開胃解酒毒主老癖能爲寒熱者及婦人血塊煮食之此物性雖冷乃與丹石相反服丹石人食之令腹結痛初虞世云療湯火傷神妙蛤蜊殻灰火燒研爲末油調塗之蜆音顯冷無毒治時氣開胃壓丹石藥及丁瘡下濕氣下乳糟煮服良生浸取汁洗丁瘡多食發嗽并冷氣消腎陳殻治陰瘡止痢蜆肉寒去暴熱明目利小便下熱氣脚氣濕毒解酒毒日黄浸取汁服主消渴爛殻温燒爲白灰飲下主反胃吐食除心胸痰水殻陳久療胃反及失精陳藏器云小於蛤黑色生水泥中候風雨能以殻爲翅飛也蝛䗯殻燒作末服之主痔病陳藏器云鹹䗯一名生進有毛似蛤長扁殻燒作末服之主野鷄病人食其肉無功用也車螯冷無毒治酒毒消渴酒渴并癰腫殻治瘡癤腫毒此二度各以醋燬搗爲末又甘草等分酒服以醋調傅腫上妙車螯是大蛤一名娠能吐氣爲樓臺海中春夏間依約島溆常有此氣食療云車螯蝤蝥類也并不可多食之蚶温主心腹冷氣腰脊冷風利五臟健胃令人能食每食了以飯壓之不爾令人口乾又云温中消食起陽味最重出海中殻如瓦屋又云無毒益血色殻燒以米醋三度淬後埋令壞醋膏丸治一切血氣冷氣癥癖蟶味甘温無毒補虚主冷利煮食之主婦人産後虚損生海泥中長二三寸大如指兩頭開主胸中邪熱煩悶氣與服丹石人相宜天行病後不可食切忌之淡菜温補五臟理腰脚氣益陽事能消食除腹中冷氣消痃癖氣亦可燒令汁沸出食之多食令煩悶日暗可微利即止北人多不識雖形狀不典而甚益人又云温無毒補虚勞損産後血結腹内冷痛治癥瘕腰痛潤毛髮崩中帶下燒一頓令飽大效又名殻菜常時頻燒食即苦不宜人與少米先煮熟後除肉内兩邊鎖及毛了再入蘿蔔或紫蘇或冬瓜皮同煮即更妙陳藏器云東海夫人味甘温無毒主虚羸勞損因産瘦瘠血氣結積腹冷腸鳴下痢腰疼帶下疝瘕乆服令人髮脫取肉作臛宜人發石令腸結生南海似珠母一頭尖中銜少毛海人亦名淡菜新注云此名殻菜大甘美南人好食治勞虚傷憊精血少者及吐血婦人帶下漏下丈夫乆痢并煮食之任意出江湖蝦無鬚及煮色白者不可食謹按小者生水田及溝渠中有小毒小兒患赤白遊腫搗碎傅之鮓内者甚有毒爾陳藏器云食主五野雞病小兒患赤白遊疹擣碎傅之煮熟色正赤小兒及雞狗食之脚屈不行江湖中者稍大煮之色白陶云白者殺人非也海中有大者已出拾遺條中以熱飯盛密器中作鮓食之毒人至死食療云平動風發瘡疥蝮蛇膽味苦微寒有毒主𧏾瘡肉釀作酒療癩疾諸瘻心腹痛下結氣除蠱毒其腹中吞鼠有小毒療鼠瘻陶隱居云蝮蛇黄黑色黃頷尖口毒最烈虺形短而扁毒不異於蚖中人不即療多死蛇類甚衆惟此二種及靑蝰爲猛療之并别有方蛇皆有足五月五日取燒地令熱以酒沃之置中足出術家所用赤連黄頷多在人家屋間吞鼠子雀雛見腹中大者破取乾之唐本注云蛇屎療痔瘻器中養取之皮灰療疔腫惡瘡骨疽蛻皮主身癢瘑疥癬等蝮蛇作地色鼻反口叉長身短頭尾相似大毒一名蚖蛇無二種也山南漢沔間多有之禹錫云按蜀本圖經云形粗短黃黑如土色白斑鼻反者山南金州房州均州皆有之圖經衍義本草卷之三十三
