front:
  text: 圖經衍義本草卷之三十六嚴三
  hash: sha256:dd37b0c33a5b991660c418044b04acd133ed5093e090f108ee67fa1dd1db21d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_036-001a, image: hfl/0549/0549-004.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正果部中品甘蔗甘蔗味甘平無毒主下氣和中助脾氣利大腸圖經曰甘蔗舊不著所出州土陶隱居云今江東者為勝廬陵亦有好者廣州一種數年生皆如大竹長丈餘今江浙閩廣蜀川所生大者高丈許陶隱居云今出江東為勝廬陵亦有好者廣州一種數年生皆如大竹長丈餘取汁以為沙糖甚益人又有荻蔗節疏而細亦可噉也唐本注云蔗有兩種赤色名崑崙蔗白色名荻蔗出蜀及嶺南為勝并煎為沙糖今江東甚多而劣於蜀者亦甚甘美時用煎為稀沙糖也今會稽作乳糖殆勝於蜀去煩止渴解酒毒日華子云冷利小腸下氣痢補脾消痰止渴除心煩熱作沙糖潤心肺殺蟲解酒毒臘月窖糞坑中患天行熱狂人絞汁服甚良也食醫心鏡云理正氣止煩渴和中補脾利大腸解酒毒削甘蔗去皮食後喫之外臺祕要方主發熱口乾小便澀取甘蔗去皮盡令喫之咽汁若口痛搗取汁服之肘後方主卒乾嘔不息甘蔗汁溫令熱服半升日三又以生薑汁一升服并差梅師方主胃反朝食暮吐暮食朝吐旋旋吐者以甘蔗汁七升生薑汁一升二味相和分為三服之衍義曰甘蔗今川廣湖南北二浙江東西皆有自八九月已堪食收至三四月方酸壞石蜜沙糖糖霜皆自此出惟川浙者為勝沙糖味甘寒無毒功體與石蜜同而冷利過之笮甘蔗汁煎作蜀地西戎江東并有之笮音詐圖經曰文具附甘蔗條下禹錫云按孟詵云沙糖多食令人心痛不與鯽魚同食成疳蟲又不與葵同食生流癖又不與笋同食使笋不消成癥身重不能行履耳食療云主心熱口乾多食生長蟲消肌肉損齒發疳𧏾不可長食之衍義曰沙糖又次石蜜蔗汁清故費煎煉致紫黑色治心肺大腸熱兼啖駝馬今醫家治暴熱多以此物為先導小兒多食則損齒土制水也及生蟯蟲裸蟲屬土故因甘遂生椑柿味甘寒無毒主壓石藥發熱利水解酒熱久食令人寒中去胃中熱生江淮南似柿而靑黑間居賦云梁侯烏椑之柿是也椑音卑圖經曰文具附柿條下禹錫云椑柿止渴潤心肺除腹臟冷熱作漆甚妙不宜與蟹同食令人腹疼并大瀉果部下品桃核人桃核人味苦甘平無毒主瘀血血閉瘕邪氣殺小蟲止咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛七月採取人陰乾桃花殺疰惡鬼令人好顔色味苦平無毒主除水氣破石淋利大小便下三蟲悅澤人面三月三日採陰乾桃梟味苦微溫主殺百鬼精物療中惡腹痛殺精魅五毒不祥一名桃奴一名梟景是實著樹不落實中者正月採之桃毛主下血瘕寒熱積聚無子帶下諸疾破堅閉刮取毛用之禹錫等按本經月閉通用藥云桃毛平桃蠹殺鬼辟邪惡不祥食桃樹蟲也桃莖白皮味苦辛無毒除邪鬼中惡腹痛去胃中熱桃葉味苦平無毒主除尸蟲出瘡中蟲膠煉之主保中不饑忍風寒桃實味酸多食令人有熱生太山川谷圖經曰桃核人并花實等生太山今處處有之京東陜西出者尤大而美大都佳果多是圃人以他木接根上栽之遂至肥美失本性此等藥中不可用之當以一生者為佳七月採核破之取人陰乾今都下市賈多取炒貨之云食之亦益人然亦多雜接實之核為不堪也千金方桃人煎療婦人産後百病諸氣取桃人一千二百枚去雙人尖皮熬搗令極細以清酒一斗半研如麥粥法以極細為佳內小項瓷瓶中蜜以麵封之內湯中煮一伏時藥成溫酒和服一匙花三月三日採陰乾太清卉木方云酒漬桃花飲之除百病益顔色崔元亮海上方治面上瘡黃水出并眼瘡三月三日收取桃花不計多少細末之食後以水半盞調服方寸七日三甚良其實已乾著木上經冬不落者名桃梟正月採之以中實者良其實上毛刮取之以治女子崩中食桃木蟲名桃蠹食之悅人顔色莖白皮中惡方用之葉多用作湯導藥標嫩者名桃心尤勝張文仲治天行有支太醫桃葉湯熏身法水一石煮桃葉取七斗以為鋪席自圍衣被蓋上安桃湯於床簀下乘熱自熏停少時當雨汗汗遍去湯待歇速粉之并灸大椎則愈陳廪丘蒸法經云連發汗汗不出者死可蒸之如中風法以問張苗苗曾有疲極汗出卧單簟中冷但苦寒倦四日凡八過發汗汗不出燒地桃葉蒸之則得大汗被中傅粉極燥便差後用此發汗得出蒸法者燒地良必效方王蠱毒用大戟桃白皮東引者以大火烘之斑猫去足翅熬三物等分搗篩為散以冷水服半方寸七其毒即出不出更一服蠱并出此李饒州法云奇效若以酒中得則以酒服以食中得以飲服之桃膠入服食藥仙方著其法取膠二十斤絹袋盛櫟木灰汁一石中煮三五沸并袋出挂高處候乾再煮如此三度止暴乾篩末蜜和空腹酒下梧桐子大二十丸久服當仙去又主石淋古今録驗著其方云取桃木膠如棗大夏以冷水三合冬以湯三合和為一服日三當下石石盡即止其實亦不可多食喜令人發熱陶隱居云今處處有京口者亦好當取解核種之為佳又有山桃其人不堪用桃人作酪乃言冷桃膠入仙家用三月三日採花亦供丹方所須方言服三樹桃花盡則面色如桃花人亦無試之者服术人云禁食桃也唐本注云桃膠味苦平無毒主下石淋破血中惡疰忤花主下惡氣消腫滿利大小腸禹錫云按藥性論云桃人使桃符主中惡日華子云桃熱微毒益色多食令人生熱樹上自乾者治肺氣腰痛除鬼精邪氣破血治心痛酒摩暖服之又云桃葉暖治惡氣小兒寒熱客忤桃毛療崩中破癖氣桃蠹食之肥悅人顔色抱朴子云桃膠以桑灰漬之服百病愈又服之身輕有光明在晦夜之地如口斷穀荆楚歲時記謝道通登羅浮山見數童子以宋書桃板貼户上道通還以紙寫之貼户上鬼見畏之孫真人云桃味辛肺病宜食又桃味酸無毒多食令人有熱又云主大小腸并不通桃葉取汁和服半升冬用桃樹皮聖惠方補心虛治健忘令耳目聰明用戊子日取東引桃枝三寸枕之千金翼同又方治伏梁氣在心下結聚不散用桃奴三兩為末空心溫酒調二錢七外臺祕要方治霍亂腹痛吐痢取桃葉三升切以水五升煮取一升三合分溫二服又方治骨蒸桃人一百二十枚去皮雙人留尖杵和為丸平旦井花水頓服令盡服訖量性飲酒令醉仍須吃水能多最精隔目又服一劑百日不得食肉又方以酒漬桃花飲之除百病好顔色又桃人服之長生也千金方治風頭强不得顧視穿地作坑燒令通赤以水灑之令冷內生桃葉鋪其席下卧之令項在藥上以衣著項邊令氣上蒸病人汗出良久即差千金翼方延年去風令光潤桃人五合去皮用粳米飯漿研令細以漿水杵取汁令桃人盡即止微溫用洗面極妙又方五月五日取東向桃枝日未出時作三寸木人著衣帶中令人不忘肘後方尸注鬼疰病者葛云即是五尸之一注又挾諸鬼邪為祟其病變動及有三十六種至九十九種大略使人寒淋瀝沉沉默默不的知其所苦而無處不惡纍年積月漸就頓滯以至於死死後復傳傍人乃至滅門覺如此候者宜便急治桃人五十枚碎研以水煮取四升一服盡當吐吐病不盡三兩日不吐再服也又方卒心痛東引桃枝一把切以酒一升煎取半升頓服大效葛氏方卒中瘑瘡瘑瘡常對在兩腳杵桃葉以苦酒和傅皮亦得又方治小兒卵㿗杵桃人傅之亦治婦人陰腫燥癢又方治胎下血不止取桃樹上乾不落桃子燒作灰和水服差又産後陰腫痛燒桃人傅之梅師方諸蟲入耳取桃葉熟挼塞兩耳出又方狂狗咬人取桃白皮一握水三升煎一升服食醫心鏡方主上氣咳嗽胸膈防滿氣喘桃人二兩去皮尖以水一升研取汁和粳米二合煮粥食之又方凡風勞毒腫疼攣痛或牽引小腹及腰痛桃人一升去皮尖兩人熬令黑烟出熱研搗如脂膏以酒三升絞令相和一服取汗不過再差傷寒類要方治黃疸身眼皆如金色不可使婦人雞犬見取東引桃根切細如箸若叉股以下者一握以水一大升煎取一小升適溫空腹頓服後三五日其黃離離如薄雲散惟服最後差百日方平復身黃散後可時時飲一盞清酒則眼中易散不飲則散遲忌食熱麵猪魚等肉此是徐之才家祕方又方凡天時疫癘者常以東行桃枝細銼煮浴佳子母祕録治陰腫桃人搗傅又方小兒瘡初起熛漿似火瘡一名爛瘡杵桃人面脂傅上崔氏方主鬼疰心腹痛不可忍取東引桃枝削去蒼皮取白皮一握水二升煮取半升服令盡差如未定再服治瘧方以桃人百個去皮尖小大於乳鉢中細研成膏不得犯生水候成膏入黃丹三錢丸如桐子大每服三丸當發日面北用溫酒下不飲酒井花水亦得五月五日午時合忌雞犬婦人見典術曰桃者五木之精也今之作桃符著門上厭邪氣此仙木也衍義曰桃核人桃品亦多京畿有油桃光小於衆桃不益脾有赤點斑而光如塗油山中一種正是月令中桃始華者但花多子少不堪啖惟堪取人唐文選謂山桃發紅萼者是矣又太原有金桃色深黃西京有崑崙桃肉一紫紅色此二種尤甘又餅子桃如今之香餅子如此數種入藥惟以山中自生者為正蓋取走泄為用不取肥好者如傷寒八九日間發熱如狂不解小腹滿痛有瘀血用桃人三十個湯去皮尖麩炒赤色别研虻蟲三十枚去翅水蛭二十枚各炒川大黃一兩同為末再與桃人同搗令勻煉蜜丸如小豆大每服二十丸桃人湯下利下瘀血惡物便愈未利再服杏核人杏核人味甘苦溫冷利有毒主咳逆上氣雷鳴喉痹下氣産乳金瘡寒心賁豚驚癇心下煩熱風氣去來時行頭痛解肌消心下急殺狗毒五月採之其兩人者殺人可以毒狗杏花味苦無毒主補不足女子傷中寒熱痹厥逆杏實味酸不可多食傷筋骨生晋山川谷得火良惡黃苓黃耆葛根解錫毒畏蘘草圖經曰杏核人生晋川山谷今處處有之其實亦數種黃而圓者名金杏相傳云種出濟南郡之分流山彼人謂之漢帝杏今近都多傅之熟最早其扁而靑黃者名木杏味酢不及金杏杏子入藥今以東來者為勝仍用家園種者山杏不堪入藥劉禹錫傳信方治嗽補肺丸杏人三大升山杏不中揀却雙人及陳𦤪以童子小便一升浸之春夏七日秋冬二七日并皮尖於砂盆子中研細瀘取汁煮令魚目沸候軟如麵糊即成仍時以柳篦攪勿令著底後即以馬尾羅或粗布下之日暴通丸即丸服之時食前後總須服三十丸五十丸任意茶酒下忌白水粥只是為米泔耳自初浸至成當以紙蓋之以畏塵土也如無馬尾羅即以粗布袋下之如取棗穰法陶隱居云處處有藥中多用之湯浸去尖皮熬令黃陳藏器云杏人本功外殺蟲燒令烟未盡細研如脂物裹內𧏾齒孔中亦主産門蟲瘡癢不可忍者去人及諸畜瘡中風取人去皮熬令赤和桂末研如泥綿裹如指大含之利咽喉去喉痹痰唾咳嗽喉中熱結生瘡杏酥濃煎如膏服之潤五臟去痰嗽生熟吃俱得半生半熟殺人日華子云杏熱有毒不可多食傷神禹錫云按藥性論云杏人能治腹痹不通發汗主溫病治心下急滿痛除心腹煩悶療肺氣咳嗽上氣喘促入天門冬煎潤心肺可和酪作湯益潤聲氣宿即動冷氣雷公云凡使須以沸湯浸少時去皮膜去尖擘作兩片用白火石并烏豆杏人三件於鍋子中下東流水煮從巳至午其杏人色褐黃則去尖然用每修一斤用白火石一斤烏豆三合水旋添勿令色少免反血為妙也孟詵云杏熱面皯者取人去皮搗和雞子白夜卧塗面明早以暖清酒洗之人患卒啞取杏人三分去皮尖熬别杵桂一分和如泥取杏核人綿裹含細細咽之日五夜三謹按心腹中結伏氣杏人橘皮桂心訶梨勒皮為丸空心服三十丸無忌又燒令烟盡研如泥綿裹內女人陰中治蟲疽勝金方治久患肺氣喘急至效杏人去皮尖二兩童子小便浸一日换夏月一日三四换浸半月取焙乾爛研令極細每服一棗大薄荷一葉蜜一雞頭大水一中盞同煎取七分食後溫服甚者不過兩劑差永不發動忌腥物食療云主熱風頭痛又燒令烟盡去皮以亂髮裹之咬於所患齒下其痛便止熏諸蟲出并去風便差重者不過再服外臺祕要方治偏風半身不遂兼失音不語生吞杏人七枚不去皮尖日别從一七漸加至七七枚七七日周而復始食後即以竹瀝下之任意多少日料一升取盡又方治耳聾以杏人七個去皮拍碎為三分以綿裹於中著顆鹽如小豆許以器承於飯甑中蒸之候飯熟出裹令患人側卧和綿捻一裹以油汁滴入耳中久又以一裹依前法千金方治咳嗽旦夕加重增寒壯熱少喜多嗔忽進退面色不潤積漸少食狀若肺脉强緊者杏人半斤去皮尖入於瓶內童子便二斗浸七日了漉出去小便以暖水淘過於沙盆內研成泥别入瓷瓶中以小便三升煎之如膏量其輕重食上熟水下一錢七婦人室女服之更妙又方主卒中風頭面腫杵杏人如膏傅之又方治破傷風腫厚傅杏人膏燃燭遙炙之肘後方治穀道赤痛熬杏人杵作膏傅之良梅師方治食狗肉不消心下堅或脹口乾忽發熱妄語方杏人一升去皮水三升煎沸去滓取汁為三服下肉為度食醫心鏡方主氣喘促浮腫小便澀杏人一兩去尖皮熬研和米煮粥極熟空心喫二合又方主五痔下血不止去尖皮及雙人水一升研瀘取汁煎减半投米煮粥停冷空心食之又方能下氣主嗽除風去野雞病杏人一兩去皮尖雙人捶碎水三升研瀘取汁於鐺中急以杓攪勿住手候三分减二冷呷之不熟及熱呷即令人吐廣利方治眼築損弩肉出生杏人七枚去皮細嚼吐於掌中及熱以綿裹箸頭將點弩肉上不過四五度即差子母祕録方治小兒臍赤腫杏人杵如脂內體中相和傅臍腫上傷寒類要方治溫病食勞以杏人五兩酢二升煎取一升服之取汗差衍義曰杏核人犬傷人量所傷大小爛嚼沃破處以帛繫定至差無苦又湯去皮研一升以水一升半翻復絞取稠汁入生蜜四兩甘草一莖約一錢銀石器中慢火熬成稀膏瓷器盛食後夜卧入少酥沸湯點一匙匕服治肺燥喘熱大腸祕潤澤五臟如無上證入鹽點佳安石榴安石榴味甘酸無毒主咽燥渴損人肺不可多食酸實殼療下痢止漏精東行根療蛔蟲寸白圖經曰安石榴舊不著所出州土或云本生西域陸機與弟雲書云張騫為漢使外國十八年得塗林安石榴是也今處處有之一名丹若廣雅謂之若榴木不甚高大枝柯附幹自地便生作叢種極易息折其條盤土中便生花有黃赤二色實亦甘酢二種甘者可餐酢者入藥多食其實則損人肺東行根并殼入殺蟲及染鬚髮口齒等藥其花百葉者主心熱吐血及衄血等乾之作末吹鼻中立差藥性論云石榴皮使味酸無毒能治筋骨風腰腳不遂行步攣急疼痛主澀腸止赤白下痢一方取汁止目淚下治漏精根靑者入染鬚方用陶隱居云石榴以花赤可愛故人多植尤為外國所重入藥惟根殼而已其味有甜醋藥家用醋者子為服食者所忌雷公云凡使皮葉根勿令犯鐵若使石榴殼不計乾濕先用漿水浸一宿至明漉出其水如墨汁若使枝根葉并用漿水浸一宿方可用孟詵云石榴溫多食損齒令黑皮炙令黃杵末以棗肉為丸空腹三丸日二服治赤白痢腹痛者取醋者一枚并子搗汁頓服崔元亮海上方療金瘡刀斧傷破血流以石灰一升石榴花半斤搗末取少許傅上捺少時血斷便差又治寸白蟲取醋石榴根切一升東南引者良水二升三合煮取八合去滓著少米作稀粥空腹服之即蟲下又一種山石榴形頗相類而絶小不作房生青齊間甚多不入藥但蜜漬以當果或寄京下甚美百一方治疔腫以針剌四畔用石榴末著瘡上以麵圍四畔灸以痛為度內末傅上急裹經宿連根自出經驗方治腸滑久痢神妙無比以石榴一個擘破炭火簇燒令烟盡急取出不令作白灰用瓷碗蓋一宿出火毒為末用醋石榴一瓣水一盞煎湯服二錢瀉亦治孫真人方食之損肺又方治耳聾法以八九月取石榴一開上作孔如球子大留靨子內米醋滿石榴中却以靨子蓋之然後溲麵裹却石榴無令醋出溏灰火中燒麵熟藥成入少黑李子仙沼子末取水滴點耳內不得輒轉腦中痛勿驚如此三夜又點别耳依前法佳又方糞前有血令人面色黃石榴皮杵末茄子枝湯下十全方治寸白蟲以酸石榴東引根一握淨洗細銼用水三升煎取半碗已下去滓五更初溫服盡至明取下蟲一大團永絶根本一日喫粥補古今録驗方治冷熱不調或下帶水或赤白青黃者酸石榴子五枚合殼舂絞取二升汁每服五合至二升盡即斷小兒以意服之二三合衍義曰安石榴有酸淡兩種旋開單葉花旋結實實中子紅孫枝甚多秋後經雨則自坼裂道家謂之三尸酒云三尸得此果則醉河陰縣最多又有一種子白瑩徹如水晶者味亦甘謂之水晶石榴惟酸石榴皮合斷下藥仍須老木所結及收之陳久者佳微炙為末以燒粟米飯為丸梧子大食前熱米飲下三十丸至五十丸以和為度如寒滑加附子赤石脂各一倍梨梨味甘微酸寒多食令人寒中金瘡乳婦尤不可食圖經曰梨舊不著所出州土今處處皆有而種類殊别醫家相承用乳梨鵝梨乳梨出宣城皮厚而肉實其味極長鵝梨出近京州郡及北都皮薄而漿多味差短於乳梨其香則過之咳嗽熱風痰實藥多用之其餘水梨消梨紫煤梨赤梨甘棠禦兒梨之類甚多俱不聞入藥也治卒患赤目弩肉坐卧痛者取好梨一顆搗絞取汁黃連三枝碎之以綿裹漬令色變仰卧注目中又有紫花梨療心熱唐武宗有此疾百醫不效靑城山邢道人以此梨絞汁而進帝疾遂愈後復求之苦無此梨常山忽有一株因緘實以進帝多食之解煩躁殊效歲久木枯不復有種者今人不得而用之唐本注云梨削貼湯火瘡不爛止痛易差又主熱嗽止渴葉主霍亂吐痢不止煮汁服之别本注云梨有數種其消梨味甘寒無毒主客熱中風不語又療傷寒熱解石熱氣驚邪嗽消渴利大小便又靑梨茅梨并不任用又桑梨惟堪蜜煮食主口乾生食不益人冷中不可多食日華子云梨冷無毒消風療咳嗽氣喘熱狂又除賊風胸中熱結作漿吐風痰食療云金瘡及産婦不可食大忌北夢鎖言云有一朝士見梁奉御診之曰風疾已深請速歸去朝士復見鄜州馬醫趙鄂者復診之言疾危與梁所說同矣曰只有一法請官人試吃消梨不限多少咀齕不及絞汁而飲到家旬日唯吃消梨頓爽矣梅師方治霍亂心痛利無汗方取梨葉枝一大握水二升煎取一升服又云正二月勿食梨錢相公方小兒寒疝腹痛大汗出濃煮梨葉汁七合頓服以意消息可作三四度飲之衍義曰梨多食動脾少則不及病用梨之意須當斟酌惟病酒煩渴人食之甚佳不能却疾李核人李核人味苦平無毒主僵仆躋瘀血骨痛李根皮大寒主消渴止心煩逆奔氣李實味苦除痼熱調中圖經曰李核人舊不著所出州土今處處有李之類甚多見爾雅者有花無實李李之無實者一名趙李李痤接慮李即今之麥李細實有溝道與麥同熟故名之駁赤李其子赤者是也又有青李緑李赤李房陵李朱神李馬肝李黃李散見書傳美其味之可食陶云皆不入藥用痤俱禾切陶隱居云李類又多京口有麥李麥秀時熟小而甜脆核不入藥今此用姑熟所出南居李解核如杏子者佳凡實熟食之皆好不可合雀肉食又不可臨水上啖之李皮水煎含療齒痛佳日華子云李溫無毒益氣多食令人虛熱又云李樹根凉無毒主赤白痢濃煎服葉平無毒治小兒壯熱痁疾驚癇作浴湯别本注云李類甚多有緑李黃李紫李朱李水李并堪食味極甘美其中人不入藥用有野李味苦名郁李子核人入藥用之食醫心鏡云李味酸無毒主除固熱調中黃帝云李不可和蜜食食之損五臟崔元亮海上方治面上䵟黑子取李核中人去皮細研以雞子白和如稀餳塗至晚每以淡漿洗之後塗胡粉不過五六日有效愼風衍義曰李核人其窠大者高及丈今醫家少用實合漿水食令人霍亂澀氣而然今畿內小窑鎮一種最佳堪入貢又有御李子如櫻桃許大紅黃色先諸李熟此李品甚多然天下皆有之所以比賢士大夫盛德及天下者如桃李無處不芬芳也别本注云有野李味苦名郁李子核人入藥此自是郁李人别是一種在木部中第十四卷非野李也楊梅味酸溫無毒主去痰止嘔噦消食下酒乾作屑臨飲酒時服方寸七止吐酒多食令人發熱其樹若荔枝樹而葉細陰青其形似水楊子而生靑熟紅肉在核上無皮殼生江南嶺南山谷四月五月採圖經曰文具附梅實條下日華子云楊梅熱微毒療嘔逆吐酒皮根煎湯洗惡瘡疥癩忌生葱禹錫云按孟詵云楊梅和五臟能滌腸胃除煩憒惡氣不可多食損齒及筋亦治痢燒灰服經驗後方主一切傷損不可者瘡止血生肌無瘢痕絶妙和鹽核杵如泥成梃子竹筒中收遇破即填小可即傅此藥功神妙橄欖橄欖味酸甘溫無毒主消酒療鯸鮐毒人誤食此魚肝迷悶者可煮汁服之必解其木作楫撥著魚皆浮出故知物有相畏如此也核中人研傅唇吻燥痛其樹似木槵子樹而高端直其形似生訶子無棱瓣生嶺南八月九月採又有一種名波斯橄欖色類亦相似其形核作三瓣可以蜜漬食之生雍州橄音敢欖音覽鯸音侯鮐音怡圖經曰橄欖生嶺南今閩廣諸郡皆有木似木槵高且端直可愛秋晚實成南人尤重咀嚼滿口香久不歇生啖及煮飲并解諸毒人誤食鯸鮐肝至迷悶者飲汁立差日華子云橄欖開胃下氣止渴禹錫云按孟詵云橄欖主䲅魚毒汁服之中此魚肝子毒人立死惟此木能解生嶺南山谷樹大數圍實長寸許其子先生者向下後生者漸高八月熟蜜藏極甜衍義曰橄欖味澀食久則甘嚼汁咽治魚鯁林檎林檎味酸甘溫不可多食發熱澀氣令人好睡發冷痰生瘡癤脉閉不行其樹似奈樹其形圓如奈六月七月熟今在處有之圖經曰林檎舊不著所出州土今在處有之或謂之來禽木似奈實比奈差圓六七月熟亦有甘酢二種甘者早熟而味脆美酢者差晚須熟爛乃堪啖病消渴者宜食之亦不可多反令人心中生冷痰今俗間醫人亦乾之入治傷寒藥謂之林檎散日華子云林檎無毒下氣治霍亂肚痛消痰禹錫云按孟詵云林檎主止消渴陳士良云此有三種大長者為奈圓者林檎夏熟小者味澀為𢭞秋熟食療云林檎溫主穀痢泄精東行根治白蟲蛔蟲消渴好睡不可多食又云味苦澀平無毒食之閉百脉食醫心鏡方治水痢以十枚半熟者以水二升煎取一升和林檎空心服之子母祕録方治小兒痢林檎構子杵取汁服以意多與服之差又方治小兒閃癖頭髮堅黃故瘰癧致身羸瘦杵林檎末以和醋傅上癖和移處就傅之胡桃胡桃味甘平無毒食之令人肥健潤肌黑髮取瓤燒令黑末斷烟和松脂研傅瘰癧瘡又和胡粉為泥白鬚髮以內孔中其毛皆黑多食利小便能脫人眉動風故也去五痔外靑皮染髭及帛皆黑其樹皮止水痢可染褐仙方取青皮壓油和詹糖香塗毛髮色如漆生北土云張騫從西域將來其木春斫皮中出水承取沐頭至黑圖經曰胡桃生北土今陜洛間多有之大株厚葉多陰實亦有房秋冬熟時採之性熱不可多食補下方亦用之取肉合破故紙搗篩蜜丸朝服梧桐子大三十丸又療壓撲損傷搗肉和酒溫頓服之便差日華子云潤肌肉益髮食䤘齒細嚼解之禹錫云按孟詵云胡桃不可多食動痰飲除煩令人能食不得并漸漸食之通經脉潤血脉黑鬢髮又服法初日一顆五日加一顆至二十顆乃止常服骨肉細膩光潤能養一切痔疾崔元亮海上方療石淋便中有石子者胡桃肉一升細米煮漿粥一升相和頓服即差實上靑皮染髮及帛皆黑其木皮中水春研取沐頭至黑梅師方治火燒瘡取胡桃瓤燒令黑杵如脂傅瘡上衍義曰胡桃發風陜洛之間甚多外有靑皮包之胡桃乃核也核中桃為胡桃肉須如此說用時須以湯剝去肉上薄皮過夏至則不堪食有人患酒楂風鼻上赤將橘上核微炒為末每服二錢七研胡桃肉一個同以溫酒調服以知為度海松子味甘小溫無毒主骨節風頭眩去死肌變白散水氣潤五臟不饑生新羅如小栗三角其中人香美東夷食之當果與中土松子不同禹錫云按日華子云松子逐風痹寒氣虛羸少氣補不足潤皮膚肥五臟東人以代麻腐食海藥云松子去皮食之甚香美與雲南松子不同雲南松子似巴豆其味不厚多食發熱毒松子味甘美大溫無毒主諸風溫腸胃久服輕身延年不老味與卑古國偏桃人相似其偏桃人用與北桃人無異榅桲榅桲味酸甘微溫無毒主溫中下氣消食除心間醋水去臭辟衣魚生北土似𣙁子而小禹錫云按陳士良云發毒熱祕大小腸聚胸中痰壅不宜多食澀血脉日華子云除煩渴治氣衍義曰榅桲食之須淨去上浮毛不爾損人肺花亦香白色諸果中惟此多生蟲少有不蚛者圖經言欲卧啖一兩枚而寢如此恐太多痞塞胃脘榛子味甘平無毒主益氣力寬腸胃令人不饑健行生遼東山谷樹高丈許子如小栗軍行食之當糧中土亦有鄭注禮云榛似栗而小關中鄜坊甚多圖經曰文具附栗條下禹錫云按日華子云新羅榛子肥白人止饑調中開胃甚效獼猴桃味酸甘寒無毒止暴渴解煩熱冷脾胃動泄澼壓丹石下石淋熱壅反胃者取汁和生薑汁服之一名藤梨一名木子一名獼猴梨生山谷藤生著樹葉圓有毛其形似雞卵大其皮褐色經霜始甘美可食枝葉殺蟲煮汁飼狗療瘑也陳藏器云味鹹溫無毒主骨節風癱痪不隨長年變白野雞肉痔病調中下氣皮中作紙藤中汁至滑下石淋主胃閉取汁和生薑汁服之佳食療云候熟收之取瓤和蜜煎作煎去人煩熱久食亦得令人冷能止消渴衍義曰獼猴桃今永興軍南山甚多食之解實熱過多則令人臟寒泄十月爛熟色淡緑生則極酸子繁細其色如芥子枝條柔弱高二三丈多附木而生淺山傍道則有存者深山則多為猴所食奈味苦寒多食令人臚脹病人尤甚臚音閭圖經曰文具林檎條下陶隱居云江東乃有而北國最豐皆作脯不宜人有林檎相似而小亦恐非益人也禹錫云按孟詵云奈主補中焦諸不足氣和脾卒患食後氣不通生搗汁服之日華子云奈冷無毒治飽食多肺壅氣脹食醫心鏡云奈子味苦寒澀無毒主忍饑益心氣多食虛脹菴羅果味甘溫食之止渴動風氣天行病後及飽食後俱不可食之又不可同大蒜辛物食令人患黃病樹生狀若林檎而極大禹錫等按陳士良云微寒無毒主婦人經脉不通丈夫榮衛中血脉不行久食令人不饑葉似茶葉可以作湯療渴疾衍義曰菴羅果西洛甚多亦梨之類也其狀亦梨先諸梨熟七夕前後已堪啖色黃如鵝梨才熟便松軟入藥絶稀用無漏子味甘溫無毒主溫中益氣除痰嗽補虛損好顔色令人肥健生波斯國如棗一云波斯棗海藥云樹若栗木其實如橡子有三角消食止咳嗽虛羸悅人久服無損也懸鈎根皮味苦平無毒主子死腹中不下破血殺蟲毒卒下血婦人赤帶下久患痢不問赤白膿血腹痛并濃煮服之子如梅酸美人食之醒酒止渴除痰唾去酒毒莖上有刺如鈎生江淮林澤取莖燒為末服之亦主喉中塞也鈎栗味甘平主不饑厚腸胃令人肥健子似栗而圓小生江南山谷樹大數圍冬月不雕一名巢鈎子又有雀子小圓黑味甘久食不饑生高山子小圓黑又有櫧子小於橡子味苦澀止泄痢破血食之不饑令健行木皮葉煮取汁與産婦飲之止血皮樹如栗冬月不雕生江南子能除惡血止渴也櫧音諸諸果有毒桃杏人雙有毒五月食未成核果令人發癰癤及寒熱又秋夏果落地為惡蟲緣食之令人患九漏桃花食之令人患淋李人不可和雞子食之患內結不消圖經衍義本草卷之三十六
