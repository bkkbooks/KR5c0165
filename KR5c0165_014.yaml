body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部中品牛蒡子牛蒡子惡實味辛平主明目補中除風傷根莖療傷寒寒熱汗出中風面腫消渴熱中逐水久服輕身耐老生魯山平澤陶隱居云方藥不復用唐本注云魯山在鄧州東北其草葉大如芋子殼似栗狀實細長如茺蔚子根主牙齒疼痛勞瘧腳弱風毒癰疽咳嗽傷肺肺壅疝瘕止血主諸風癥瘕冷氣吞一枚出癰疽頭别録名牛蒡一名鼠黏草今按陳藏器本草云惡實根蒸暴乾不爾令人欲吐浸酒去風又治惡瘡子名鼠黏上有芒能綴鼠味苦主風毒腫諸瘻根可作茹食之葉亦搗傅杖瘡不膿避風禹錫等按藥性論云牛蒡可單用味甘無毒能主面目煩悶四肢不健通十二經脉洗五臟惡氣可常作菜食之令人身輕子研末投酒中浸三日每日服三二盞任性飲多少除諸風去丹石毒主明目利腰腳又食前吞三枚熟挼下散諸結節筋骨煩熱毒又根細切如豆麵拌作飯食之消脹壅又莖葉煮汁釀酒良又取汁夏月多浴去皮間習習如蟲行風洗了愼風少時又能搨一切腫毒用根葉入少許鹽花搗圖經曰惡實即牛蒡子也生魯山平澤今處處有之葉如芋而長實似葡萄而褐色外殼如栗救小而多刺鼠過之則綴惹不可脫故謂之鼠黏子亦如羊負來之比根有極大者作菜茹尤益人秋後採子入藥用根葉亦可生搗入少鹽花以搨腫毒又冬月採根蒸暴之入藥劉禹錫傳信方療中風用緊細牛蒡根取時須避風以竹刀或荆刀刮去土用生布拭了搗絞取汁一大升和著好蜜四大合溫分為兩服每服相去五六里初服得汗汗出便差此方得之嶽鄂鄭中丞鄭頃年至潁陽因食一頓熱肉便中暴風外生盧代為潁陽尉有此方當時便服得汗隨差神效又篋中方風頭及腦掣痛不可禁者摩膏主之取牛蒡莖葉搗取濃汁二升合無灰酒一升鹽花一匙頭煻火煎令稠成膏以摩痛處風毒散自止亦主時行頭痛摩時須極力令作熱乃速效冬月無苗用根代之亦可雷公云凡使採之淨揀勿令有雜子然後用酒拌蒸待上有薄白霜重出却用布拭上然後焙乾别搗如粉用食療云根作脯食之良熱毒腫搗根及葉封之杖瘡金瘡取葉貼之永不畏風又癱及丹石風毒石熱發毒明耳目利腰膝則取其子末之投酒中浸經三日每日飲三兩盞隨性多少録散支節筋骨煩熱毒則食前取子三七枚熟挼吞之十服後甚良細切根如小豆大拌麵作飯煮食尤良又皮毛間習習如蟲行煮根汁浴之夏浴愼風却入其子炒過末之如茶煎三匕通利小便聖惠方治時氣餘熱不退煩躁發渴四肢無力不能飲食用根搗絞取汁不計時服一小盞立效外臺祕要治喉痹牛蒡子六分馬藺子八分搗為散每空心暖水服方寸七漸加一七半日再服經驗方治風熱閉塞咽喉遍身浮腫以牛蒡子一合半生半熟杵為末熱酒調下一錢七立差孫真人食忌主天行以生牛蒡根搗取汁五大合空腹分為兩服服訖取桑葉一大把炙令黃水一升煮取五合去滓預服暖覆取汗無葉用枝食醫心鏡治熱攻心煩躁恍惚以牛蒡根搗汁一升食後分三服良斗門方治頭面忽腫熱毒風內攻或手足頭面腫觸著痛用牛蒡根一名蝙蝠到洗淨爛研酒煎成膏攤在紙上貼腫處仍熱酒調下一服腫止痛减王氏博濟治瘡疱將出牛蒡子炒令熟杵為末每服一錢入荆芥二穗水一杯同煎至七分放溫服如瘡膿已出更服亦妙初虞世治皮膚風熱遍身生癮疹牛蒡子浮萍等分以蔢苛湯調下二錢日二服衍義曰惡實是子也今謂牛蒡未去萼時謂之鼠黏子根謂之牛菜踈風壅涎唾多咽膈不利微炒荆芥穗各一兩甘草炙半兩同為末食後夜卧湯點二錢服當緩取效子在萼中萼上有細鈎多至百十謂之芒則誤矣根長二尺粗如拇指煮爛為菜水萍水萍味辛酸寒無毒主暴熱身癢下水氣勝酒長鬚髮主消渴下氣以沐浴生毛髮久服輕身一名水肥一名水白一名水蘇生雷澤池澤三月採曝乾陶隱居云此是水中大萍爾非今浮萍子藥録云五月有花白色即非今溝渠所生者楚王渡江所得非斯實也唐本注云水萍者有三種大者名蘋水中又有荇菜亦相似而葉圓水上小浮萍主火瘡今按陳藏器本草云水萍有三種大者曰蘋葉圓闊寸許葉下一點如水沫一名芣菜暴乾栝樓等分以人乳為丸主消渴搗絞汁飲主蛇咬毒入腹亦可傅熱瘡小萍子是溝渠間者末傅面䵟搗汁服之主水腫利小便又人中毒取萍子暴乾末酒服方寸七又為膏長髮本經云水萍應是小者禹錫等按爾雅云萍蓱其大者蘋注水中浮萍江東謂之薸陸機毛詩義疏云其粗大者謂之薸小者曰萍季春始生可糝蒸為茹又可苦酒淹以就酒日華子云治熱毒風熱疾熱狂㶸腫毒湯火瘡風疹圖經曰水萍生雷澤池澤今處處溪癇中皆有之此是水中大萍葉圓闊寸許葉下有一點如水沫一名芣菜爾雅謂之萍其大者曰蘋是也周南詩云於以採蘋陸機云海中浮萍粗大者謂之蘋季春始生可糝蒸以為茹又可用苦酒淹以挼酒三月採暴乾蘇恭云此有三種大者曰蘋中者曰荇菜即下鳧葵是也小者水上浮萍即溝渠間生者是也大蘋今醫家鮮用浮萍俗醫用治時行熱病亦堪發汗甚有功其方用浮萍草一兩四月十五日者麻黃去節根桂心附子炮製去臍皮各半兩四物搗細篩每服二錢以水一中盞入生薑半分煎至六分不計時候和滓熱服汗出乃差又治惡疾遍身瘡者取水中浮萍濃煮汁漬浴半日多效此方甚奇也聖惠方治少年面上起細皰按浮萍盦之亦可飲少許汁良也又方發背初得毒腫焮熱赤爛搗和雞子清貼之良千金方治中水毒手足指冷即是或至膝肘以浮萍日乾服方寸七差千金翼治小便不利膀胱水氣流滯以浮萍日乾末服方寸七日一二服良孫真人食忌五月取浮萍陰乾燒烟去蚊子又主消渴以浮萍汁服之子母祕録熱毒浮萍搗汁傅之令遍高供奉採萍時日歌不在山不在岸採我之時七月半選甚癱風與風些小微風都不算豆淋酒內下三丸鐵幞頭上也出汗王瓜王瓜味苦寒無毒主消渴內痹瘀血月閉寒熱酸疼益氣愈聾療諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水療馬骨刺人瘡一名土瓜生魯地平澤田野及人家墻間三月採根陰乾陶隱居云今土瓜生籬院間亦有子熟時赤如彈丸大根今多不預乾臨用時乃掘取不堪入大方正單行小小爾禮記月令云王瓜生此之謂也鄭玄云菝葜殊為謬矣唐本注云其物蔓生葉似栝樓圓無叉缺子如栀子生青熟赤但無梭爾根似葛細而多糝北間者纍纍相連大如棗皮黃肉白苗子相似根狀不同試療黃疸破血南者大勝也今按陳藏器本草云王瓜主蠱毒小兒閃癖痞滿并瘧取根及葉搗絞汁服當吐下宜少進之有小毒故也禹錫等按爾雅云鈎姑釋曰鈎一名姑郭曰鉤𧁾也一名王瓜實如瓝瓜正赤味苦藥性論云瓜根使平一名王瓜子主蠱毒治小便數遺不禁日華子云王瓜子潤心肺及肺痿吐血腸風瀉血赤白痢炒用又云土瓜根通血脉天行熱疾酒黃病壯熱心悶吐痰痰瘧排膿熱勞治撲損消瘀血破癥癖落胎圖經曰王瓜生魯地平澤田野及人家垣墻間今處處有之月令云四月王瓜生即此也葉似栝樓圓無叉缺有刺如毛五月開黃花花下結子如彈丸生青熟赤根似葛細而多糝謂之土瓜根北間者其實纍纍相連大如棗皮黃肉白苗葉都相似但根狀不同耳三月採根陰乾均房間人呼為老鴉瓜亦曰菟瓜謹按爾雅曰蔩羊善切菟瓜郭璞注云似土瓜而土瓜目謂之與睽同茹與姑同又名鈎茹蓋菟瓜别是一種也又云芴音物菲亦謂之土瓜自别是一物詩所謂採葑採菲者非此土瓜也大凡物有異類同名甚多不可不辨也葛氏療面上痱瘰子用之仍得光潤皮急以土瓜根搗篩漿水勻和入夜先漿水洗面傅藥旦復洗之百日光華射人小兒四歲發黃生搗絞汁三合與飲不過三飲已聖惠方治黑疸多死宜急治用瓜根一斤搗絞汁六合頓服當有黃水隨小便出如未出更服之外臺祕要治蠱土瓜根大如母指長三寸切以酒半升漬一宿一服當吐下肘後方治黃疸變成黑疸醫所不能治土瓜根汁頓服一小升平旦服食後須病汗小便出愈不爾再服又方治小便不通及關格方生土瓜根搗取汁以少水解之筒中吹下部取通産書下乳汁土瓜為末酒服一錢一日三衍義曰王瓜體如栝樓其殼徑寸一種長二寸上微圓下尖長七八月間熟紅赤色殼中子如螳螂頭者今人又謂之赤雹子其根即土瓜根也於細根上又生淡黃根三五相連如大指許根與子兩用紅子同白土子治頭風地榆地榆味苦甘酸微寒無毒主婦人乳痓痛七傷帶下病止痛除惡肉止汗療金瘡止膿血諸瘻惡瘡熱瘡消酒除消渴補絶傷産後內塞可作金瘡膏生桐柏及冤句山谷二月八月採根曝乾得髮良惡麥門冬陶隱居云近道處處有葉似榆而長初生布地花子紫黑色如豉故名玉豉一莖長直上根亦入釀酒道方燒作灰能爛石也乏茗時用葉作飲亦好今按别本注云今人止冷熱痢及疳痢熱極效禹錫等按藥性論云地榆味苦平能治産後餘瘀疹痛七傷治金瘡止血痢蝕膿蕭炳云今方用共樗皮同療赤白痢日華子排膿止吐血鼻洪月經不止血崩産前後諸血疾赤白痢并水瀉前止腸風但是平原川澤皆有獨莖花紫七八月採圖經曰地榆生桐柏及冤句山谷今處處有之宿根三月內生苗初生布地莖直高三四尺對分出葉葉似榆少狹細長作鋸齒狀青色七月開花如椹子紫黑色根外黑裏紅似柳根二月八月採暴乾葉不用山人乏茗時採此葉作飲亦好古斷下方多用之葛氏載徐平療下血二十年者取地榆鼠尾草各三兩水二升煮半頓服不斷水漬屋塵飲一小杯投之不過重作乃差小兒疳痢亦單煮汁如飴糖與服便已又毒蛇螫人搗新根取汁飲兼以漬瘡良崔元亮海上方赤白下骨立者地榆一斤水三升煮取一升半去滓再煎如稠餳絞濾空腹服二合日再唐本注云主帶下十二病孔氏音義云一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子藏堅六曰子門辟七曰合陰陽患痛八曰小腹寒痛九曰子門閉十曰子宫冷十一曰夢與鬼交十二曰五藏不定用葉作飲代茶甚解熱聖惠方治婦人漏下赤白不止令人黃瘦虛竭以地榆三兩細銼米醋一升煮十餘沸去滓食前稍熱服一合亦治吐血千金翼代指逆腫單煮地榆作湯漬之半日愈肘後方療虎犬咬人地榆根末服方寸七日一二服傅瘡尤佳葛氏云毒蛇螫人搗地榆根絞取汁飲兼以漬瘡梅師方治猘犬咬人煮地榆飲之兼末傅瘡上服方寸匕日三服忌酒若治瘡已差者搗生韭汁飲之一二升齊民要術地榆汁釀酒治風痹補腦三洞要録地榆銼一升稻米一升白玉屑一升三物取白露汁二升置銅器中煮米熟絞取汁玉屑化為水名曰玉液以藥內杯美醴中所謂神王漿也衍義曰地榆性沉寒入下焦熱血痢則可用若虛寒人及水瀉白痢即未可輕使大小薊根大小薊根味甘溫主養精保血大薊主女子赤白沃安胎止吐血衄鼻令人肥健五月採陶隱居云大薊是虎薊小薊是猫薊葉并多刺相似田野甚多方藥不復用是賤之故大薊根甚療血亦有毒唐本注云大小薊葉欲相似功力有殊并無毒亦非虎猫薊也大薊生山谷根療癰腫小薊生平澤俱能破血小薊不能消腫也今按陳藏器本草云小薊破宿血止新血暴下血血痢金瘡出血嘔血等絞取汁溫服作煎和糖合金瘡及蜘蛛蛇蠍毒服之亦佳禹錫等按藥性論云大薊亦可單用味苦平止崩中血下生取根搗絞汁服半升許多立定日華子云小薊根凉無毒治熱毒風并胸膈煩悶開胃下食退熱補虛損苗去煩熱生研汁服小薊力微只可退熱不似大薊能補養下氣又云大薊葉凉治腸癰腹臟瘀血血運撲損可生研酒并小便任服惡瘡疥癬鹽研窨傅又名刺薊山牛蒡圖經曰小薊根本經不著所出州土今處處有之俗名青刺薊苗高尺餘葉多刺心中出花頭如紅藍花而青紫色北人呼為千針草當二月苗初生二三寸時并根作茹食之甚美四月採苗九月採根并陰乾入藥亦生搗根絞汁飲以止吐血衄血下血皆驗大薊根苗與此相似但肥大耳而功力有殊破血之外亦療癰腫小薊專主血疾陳藏器云薊門以薊為名北方者勝也食療云小薊根主養氣取生根葉搗取自然汁服一盞立佳又取菜煮食之除風熱根主崩中又女子月候傷過搗汁半升服之金瘡血不止挼葉封之夏月熱煩悶不止搗葉取汁半升服之立差聖惠方治心熱吐血口乾用刺薊葉及根搗絞取汁每服一小盞頓服又方乳石發動壅熱心悶吐血以生刺薊搗取汁每服三合入蜜少許攪勻服之外臺祕要治鼻窒塞不通小薊一把水二升煮取一升去滓分服曾有人陰冷漸漸冷氣入陰囊腫滿恐死夜疼悶不得眠煮大薊根汁服立差也梅師方治卒吐血及瀉鮮血取小薊葉搗絞取汁溫服簡要濟衆治九竅出血以刺薊一握絞取汁以酒半盞調和頓服之如無青汁只搗乾者為末冷水調三錢七又方治小兒浸淫瘡疼痛不可忍發寒熱刺薊末新水調傅瘡上乾即易之衍義曰大小薊皆相似花如髻但大薊高三四尺葉皺小薊高一尺許葉不皺以此為異小薊山野人取為蔬甚適用雖有微芒亦不能害人海藻海藻味苦鹹寒無毒主廮瘤氣頸下核破散結氣雍腫癥瘕堅氣腹中上下鳴下十二水腫療皮間積聚曝㿉留氣熱結利小便一名落首一名藫生東海池澤七月七日採曝乾反甘草陶隱居云生海島上黑色如亂髮而大少許葉大都似藻又有石帆狀如柏療石淋又有石松狀如松療溪毒今按陳藏器本草云比物有馬尾者大而有葉者本經及注海藻功狀不分馬尾藻生淺水如短馬尾細黑色用之當浸去鹹大葉藻生深海中及新羅葉如水藻而大本經云主結氣癭瘤是也爾雅云綸音關似綸組似組正為二藻也海人取大葉藻正在深海底以繩繫腰沒水下則得旋繫繩上五月已後當有大魚傷人不可取也禹錫等按爾雅云𧂇海藻注海草也一名海蘿如亂髮生海中藥性論云海藻臣味鹹有小毒主辟百邪鬼魅治氣疾急滿療疝氣下墜疼痛核腫去腹中雷鳴幽幽作聲孟詵云海藻主起男子陰氣常食之消男子㿉疾南方人多食之傳於北人北人食之倍生諸疾更不宜矣陳藏器云馬藻大寒搗傅小兒赤白游疹火焱熱瘡搗絞汁服去暴熱熱痢止渴生水上如馬齒相連又云石帆高尺餘根如漆上漸軟作交羅文生海底煮汁服主婦人血結月閉石淋又云水松葉如松丰茸食之主水腫亦生海底吳都賦云石帆水松是也日華子云石帆平無毒紫色梗大者如箸見風漸硬色如漆多人飾作珊瑚裝圖經曰海藻生東海池澤今出登萊諸州海中凡水中皆有藻周南詩云於以採藻於沼於沚是也陸機云藻水草生水底有二種一種葉如雞蘇莖如箸長四五尺一種莖如叉股葉如蓬蒿謂之聚藻扶風人謂之藻聚為發聲也二藻皆可食熟挼其腥氣米麵糝蒸為茹甚佳美荆楊人饑荒以當穀食今謂海藻者乃是海中所生根著水底石上黑色如亂髮而粗大少許葉類水藻而大謂之大葉藻本經云主癭瘤是也海人以繩繫腰沒水下則得之旋繫繩而之又有一種馬尾藻生淺水中狀如短馬尾細黑色此主水癊下水用之陶隱居云爾雅所謂綸似綸組似組東海有之今青苔紫菜皆似綸昆布亦似組恐即是此也而陳藏器乃謂綸組正謂此二藻也謹按本經海藻一名藫而爾雅謂藫為石衣又謂𧂇徒南切名海薻與藻同是海藻自有此二名而注釋皆以為藥草謂綸組乃别草若然隱居所云似近之藏器之說亦未可的據又注釋以石衣為水苔一名石髮石髮即陟釐也色類似苔而粗澀為異又云藫葉似音薤而大生海底且陟釐下自有條味性功用與海藻全别又生江南池澤乃是水中青苔古人用以為紙亦青黃色今注以為石髮是也然則藫與𧂇皆是海藻之名石髮别是一類無疑也昆布今亦出登萊諸州功用乃與海藻相近也陶又云凡海中菜皆療癭瘤結氣青苔紫菜輩亦然又有石帆如柏主石淋水松如松主溪毒吳都賦所謂草則石帆水松劉淵林注云石帆生海嶼石上草類也無葉高尺許其花離樓相貫連死則浮水中人於海邊得之稀有見其生者水松藥草生水中出南海交趾是也紫菜附石生海上正青取乾之則紫色南海有之東海又有一種海帶似海藻而粗且長登州人取乾之柔韌可以繫束物醫家用下水速於海藻昆布之類石髮今人亦乾之作菜齏臛啖之尤美青苔可以作脯食之皆利人苔之類又有井中苔生廢井中并井藍皆主熱毒又上有垣衣條云生古垣墻陰蘇恭云即古墻北陰青苔衣也生石上者名昔邪屋上生者名屋游大抵主療略同陸龜蒙苔賦云高有瓦松卑有澤葵散巖竇者曰石髮補空田者曰垣衣在屋曰昔邪在藥曰陟釐是也瓦松生古瓦屋上若松子作層澤葵鳧葵也雖曰異類而皆感瓦石而生故陸推類而云耳今人罕復用之故但附見於此瓦松即下條昨葉何草也廣志謂之蘭香段成式云或言構木上多松栽士木氣泄則生瓦松然亦不必爾今醫家或用作女子行經絡藥陟釐古方治虛冷下痢最要范汪治腹中留飲有海藻丸又有癭酒方用海藻一斤絹袋盛以清酒二升浸春夏二日秋冬三日一服兩合日三酒盡更合飲之如前滓暴乾末服方寸匕日三不過兩劑皆差廣濟療氣膀胱急方宜下氣昆布臛法高麗昆布一斤白米泔浸一宿洗去鹹味以水一斗煮令向熱擘長三寸闊四五分仍取葱白一握二寸切斷擘之更煮令昆布極爛仍下鹽酢豉糝調和一依臛法不得令鹹酸以生薑橘皮椒末等調和宜食粱米粳米飯海藻亦依此法極下氣大效無所忌海藥云主宿食不消五膈痰壅水氣浮腫腳氣賁豚氣并良雷公云凡使先須用生烏豆并紫貝天葵和海藻三件同蒸一伏時後日乾用之肘後方治頷下瘰癧如梅李宜速消之海藻斤酒二升漬數日稍稍飲之又方治頸下卒結囊欲成癭海藻一斤洗去鹹酒浸飲之澤蘭澤蘭味苦甘微溫無毒主乳婦血衄中風餘疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫膿産後金瘡內塞一名虎蘭一名龍棗一名虎蒲生汝南諸大澤傍三月三日採陰乾防己為之使陶隱居云今處處有多生下濕地葉微香可煎油或生澤傍故名澤蘭亦名都梁香可作浴湯人家多種之而葉小異今山中又有一種甚相似莖方葉小强不甚香既云澤蘭又生澤傍故山中者為非而藥家乃採用之唐本注云澤蘭莖方節紫色葉似蘭草而不香今京下用之者是陶云都梁香乃蘭草耳俗名蘭香煮水洗浴亦生澤畔人家種之花白紫萼莖圓殊非澤蘭也陶注蘭草復云名都梁香并不深識也禹錫等按吳氏云澤蘭一名水香神農黃帝岐伯桐君酸無毒李氏溫生下地水傍葉如蘭二月生香赤節四葉相值枝節間藥性論云澤蘭使味苦辛主産後腹痛頻産血氣衰冷成勞羸瘦又治通身面目大腫主婦人血瀝腰痛日華子云澤蘭通九竅利關脉養血氣破宿血消癥瘕産前産後百病通小腸長肉生肌消撲損瘀血治鼻洪吐血頭風目痛婦人勞瘦丈夫面黃四月五月採作纏把子圖經曰澤蘭生汝南諸大澤傍今荆徐隨壽蜀梧州河中府皆有之根紫黑色如粟根二月生苗高二三尺莖𦼮青紫色作四棱葉生相對如蔢苛微香七月開花帶白色萼通紫色亦似蔢苛花三月採苗陰乾荆湖嶺南人家多種之壽州出者無花子此與蘭草大抵相類但蘭草生水傍葉光潤陰小紫五六月盛而澤蘭生水澤中及下濕地葉尖微有毛不光潤方莖紫節七月八月初採微辛此為異耳今婦人方中最急用也又有一種馬蘭生水澤傍頗似澤蘭而氣臭味辛亦主破血補金瘡斷下血陳藏器以為楚辭所喻惡草即是也北人呼為紫菊以其花似菊也又有一種山蘭生山側似劉寄奴葉無丫不對生花心微黃赤亦能破血皆可用雷公云凡使須要别識雄雌其形不同大澤蘭形葉皆圓根青黃能生血調氣與榮合小澤蘭迥别採得後看葉上斑根須尖此藥能破血通久積凡修事大小澤蘭須細銼之用絹袋盛懸於屋南畔角上令乾用子母祕録治小兒蓐瘡嚼澤蘭心封上衍義曰澤蘭按補注云葉如蘭今蘭葉如麥門冬稍闊而長及一二尺無枝梗殊不與澤蘭相似澤蘭才出土便分枝梗葉如菊但尖長若取香臭則稍相類故謂之澤蘭又曰生汝南大澤傍則其種本别如蘭之說誤矣昆布味鹹寒無毒主十二種水腫癭瘤聚結氣瘻瘡生東海陶隱居云今惟出高麗繩把索之如卷麻作黃黑色柔韌可食爾雅云綸音關似綸組似組東海有之今青苔紫菜皆似綸此昆布亦似組恐即是也凡海中菜皆療癭瘤結氣青苔紫菜輩亦然乾苔性熱柔苔甚冷也今按陳藏器本草云昆布主陰㿉含之咽汁生南海葉如手大如薄葦紫色禹錫等按藥性論云昆布臣有毒利水道去面腫治惡瘡鼠瘻陳藏器云紫菜味甘寒主下熱煩氣多食令人腹痛發氣吐白沫飲少熱醋消之蕭炳云海中菜有小螺子損人不可多食圖經曰文具海藻條下唐本注云又有石帆狀如柏治石淋又有水松狀如松治溪毒陳藏器云主頽卵腫毒煮汁咽之生南海葉如手乾紫赤色大如薄葦陶云出新羅黃黑色葉柔細陶解昆布乃是馬尾海藻也新注云如癭氣取末蜜圓含化自消也海藥云謹按異志生東海水中其草順流而生新羅者黃黑色葉細胡人採得搓之為索陰乾舶上來中國性溫主大腹水腫諸浮氣并癭瘤氣結等良雷公云凡使先弊箅筒煮去鹹味焙乾細銼用每修事一斤用甑箅大小十個同昆布細銼二味各一處下東流水從巳煮至亥水逐旋添勿令少食療云下氣久服瘦人無此疾者不可食海島之人愛食為無好菜只食此物服久病亦不生遂傳說其功於北人北人食之病皆生是水土不宜爾又云紫菜下熱氣塞咽喉煮汁飲之此是海中之物味猶有毒性凡是海中菜所以有損人矣聖惠方治癭氣結核㿔㿔腫硬以昆布一兩洗去鹹搗為散每以一錢綿裹於好醋中浸過含咽津藥味盡再含之外臺祕要治頷下卒結囊漸大欲成癭以昆布海藻等分為末蜜圓含如杏核大稍稍咽汁千金翼治五癭昆布一兩并切如指大酢漬含咽汁愈防已防已味辛苦平溫無毒主風寒溫瘧熱氣諸癇除邪利大小便療水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急止泄散癰腫惡結諸蝸疥癬蟲瘡通腠理利九竅一名解離文如車輻理解者良生漢中川谷二月八月採根陰乾殷孽為之使殺雄黃毒惡細辛畏萆薢陶隱居云今出宜都建平大而青白色虛軟者好黯黑水强者不佳服食亦須之是療風水家要藥爾唐本注云防己本出漢中者作車輻解黃實而香其青白虛軟者名木防己都不任用陶謂之佳者蓋未見漢中者爾禹錫等按藥性論云防己君味苦有小毒能治濕風口面喎斜手足疼散風痰主肺氣嗽喘又云木防己使畏女菀鹵鹹味苦辛能治男子肢節中風毒風不語主散結氣擁腫溫瘧風水腫治膀胱蕭炳云木防己出華州圖經曰防己生漢中川谷今黔中亦有之但漢中出者破之文作車輻解黃實而香莖梗甚嫩苗葉小類於牽牛折其莖一頭吹之氣從中貫如木通類他處者青白虛軟又有腥氣皮皺上有丁足子名木防己二月八月採陰乾用木防己雖今不入藥而古方亦通用之張仲景治傷寒有增减木防己湯及防己地黃五物防己黃耆六物等湯深師療膈間支滿其人喘滿心下痞堅面黧黑其脉沉緊得之數十日吐下之乃愈木防己湯主之木防己二兩石膏二枚雞子大碎綿裹桂心二兩人參四兩四物以水六升煮取二升分再服虛者便愈實者三日復發汗至三日復不愈者宜去石膏加芒消三合以水六升煮三味取二升去滓內芒消分兩服微下利則愈禁生葱孫思邈療遺溺小便澀亦用三物木防己湯陳藏器云如陶所注即是木防己用體小同按木漢二防即是根苗為名漢主水氣木主風氣宣通作藤著木生吹氣通一頭如通草雷公云凡使勿使木條以其木條已黃腥皮皺上有丁足子不堪用夫使防己要心花文黃色者然細銼又銼車前草根相對同蒸半日後出㬠去車前草根細銼用之肘後方服雄黃中毒防己汁解之防己實焙乾為末如茶法煎服俗用治脫肛初虞世南方治肺痿咯血多痰防己葶藶等分為末糯米飲調下一錢天麻天麻味辛平無毒主諸風濕痹四肢拘攣小兒風癇驚氣利腰膝强筋力久服益氣輕身長年生鄆州利州太山嶗山諸山五月採根曝乾葉如芍藥而小當中抽一莖直上如箭簳莖端結實狀若續隨子至葉枯時子黃熟其根連一二十枚猶如天門冬之類形如黃瓜亦如蘆蔔大小不定彼人多生噉或蒸煮之今多用鄆州者佳今附禹錫等按别注又云主諸毒惡氣皮滿寒疝下血今處處有之時人多用焉莖似箭簳赤色故莖名赤箭也藥性論云赤箭脂一名天麻又名定風草味甘平能治冷氣𤸷痹癱不遂語多恍惚多驚失志陳藏器云天麻寒主熱毒癰腫搗莖葉以傅之亦取子作飲去熱氣生平澤似馬鞭草節節生紫花花中有子如青葙子日華子云味甘暖助陽氣補五勞七傷鬼疰蠱毒通血脉關竅服無忌圖經曰天麻生鄆州利州太山勞山今京東京西湖南淮南州郡亦有之春生苗初出若芍藥獨抽一莖直上高二三尺如箭簳狀青赤色故名赤箭脂莖中空依半以上貼莖微有尖小葉梢頭生成穗開花結子如豆粒大其子至夏不落却透虛入莖中潜生土內其根形如黃瓜連生一二十枚大者有重半斤或五六兩其皮黃白色名白龍皮肉名天麻二月三月五月八月內採初取得乘潤刮去皮沸湯略煮過暴乾收之嵩山衡山人或取生者蜜煎作果食之甚珍雷公云凡使勿用御風草緣與天麻相似只是葉莖不同其御風草根莖斑葉皆白有青點使御風草根勿使天麻二件若同用即令人有腸結之患修事天麻十兩用蒺藜子一鎰緩火熬焦熟後便先置天麻十兩於瓶中上用火炒過蒺藜蓋內外便用三重紙蓋并繫從已至未時又取蒺藜子再入熬炒准前安天麻於瓶內用炒了蒺藜子於中依前蓋又隔一伏時後出如此七遍瓶盛出後用布拭上氣汗用刀劈焙之細銼單搗然用御風草修事法亦同天麻别說云謹按赤箭條下所說甚詳今就此考之尤為分明詳此圖經之狀即赤箭苗之未長大者二說前後自不同則所為紫花者又不知是何物也若依赤箭條後用之為是衍義曰天麻用根須别藥相佐使然後見其功仍須加而用之人或蜜漬為果或蒸煮食用天麻者深思之則得矣苗則赤箭也阿魏阿魏味辛平無毒主殺諸小蟲去臭氣破癥積下惡氣除邪鬼蠱毒生西蕃及崑崙唐本注云苗葉根莖酷似白芷搗根汁日煎作餅者為上截根穿暴乾者為次體性極臭而能止臭亦為奇物也唐本先附禹錫等按蕭炳云今人日煎蒜白為假者真者極臭而去臭為奇物今下細蟲極效段成式酉陽雜俎云阿魏出伽闍郍國即北天竺也伽闍郍呼為形虞亦出波斯國波斯呼為阿虞載樹長八九尺皮色青黃三月生葉形似鼠耳無花實斷其枝汁出如飴久乃堅凝名阿魏拂林國僧彎所說同摩伽陀僧提婆言取其汁和米豆屑合成阿魏日華子云阿魏熱治傳尸破癥癖冷氣辟溫治瘧兼主霍亂心腹痛腎氣溫瘴禦一切菌菜毒圖經曰阿魏出西蕃及崑崙今惟廣州有之舊說苗葉根極似白芷搗根汁日煎作餅者為上截根穿暴乾者為次今廣州出者云是木膏液滴釀結成二說不同謹按段成式酉陽雜俎云阿魏木生波斯國呼為阿虞木長八九尺皮色青黃三月生葉似鼠耳無花實斷其枝汁出如飴久乃堅凝名阿魏或云取汁和米豆屑合釀而成乃與今廣州所生相近耳海藥云謹按廣志云生石崑崙國是木津液如桃膠狀其色黑者不堪其狀黃散者為上其味辛溫善主於風邪鬼疰并心腹中冷服餌又雲南長河中亦有阿魏與舶上來者滋味相似一般只無黃色雷公云凡使多有訛僞其有三驗第一驗將半銖安於熟銅器中一宿至明沾阿魏處白如銀永無赤色第二驗將一銖置五斗草自然汁中一夜至明如鮮血色第三驗將一銖安柚樹上樹立乾便是真凡使先於淨鉢中研如粉了於熱酒器上裛過任入藥用千金翼尸疰惡氣阿魏治之神效别說云謹按阿魏補注圖經所說合在木部今二浙人家亦種枝葉香氣皆同而差淡薄但無汁膏爾高良薑高良薑大溫主暴冷胃中冷逆霍亂腹痛陶隱居云出高良薑郡人腹痛不止但嚼食亦效形氣與杜若相似而葉如山薑唐本注云生嶺南者形大虛軟江左者細緊味亦不甚辛其實一也今相與呼細者為杜若大者為高良薑此非也今按陳藏器本草云高良薑味辛溫下氣益聲好顔色煮作飲服之止痢及霍亂又按别本注云二月三月採根暴乾味辛苦大熱無毒禹錫等按藥性論云高良薑使能治腹內久冷胃氣逆嘔吐治風破氣腹冷氣痛去風冷痹弱療下氣冷逆衝心腹痛吐瀉日華子云治轉筋瀉痢反胃嘔食解酒毒消宿食圖經曰高良薑舊不載所出州土陶隱居云出高良郡今嶺南諸州及黔蜀皆有之內郡雖有而不堪入藥春生莖葉如薑苗而大高一二尺許花紅紫色如山薑二月三月採根暴乾古方亦單用治忽心中惡口吐清水者取根如骰塊含咽津逡巡即差若臭亦含咽更加草豆蔻同為末煎湯常飲之佳聖惠方治霍亂吐利腹痛等疾高良薑一兩銼以水三大盞煎取二盞半去滓下粳米二合煮粥食之外臺祕要備急霍亂吐利方火炙高良薑令焦香每用五兩打碎以酒一升煮三四沸頓服亦治腹痛氣惡蘇恭云凡患腳氣每旦任意飽食午後可食日晚不食如饑可食豉粥若瞑不消欲成霍亂者即以高良薑一兩打碎以水三升煮取一升頓服盡即消待極饑乃食一碗薄粥其藥唯極飲之良若卒無高良薑母薑一兩代之以清酒一升煮令極熟和滓食之雖不及高良薑亦大效矣十全方治心脾痛以高良薑細銼微炒杵末米飲調下一錢七立止百部根百部根微溫禹錫等謹按蜀本云微寒主咳嗽上氣陶隱居云山野處處有根數十相連似天門冬而苦强亦有小毒火炙酒漬飲之療咳嗽亦主去虱煮作湯洗牛犬虱即去博物志云九真一種草似百部但長大爾懸火上令乾夜取四五寸短切含咽汁勿令人知主暴嗽甚良名為嗽藥疑此是百部恐其土肥潤處是以長大爾今按陳藏器本草云百部根火炙浸酒空腹飲去蟲蠶咬兼疥癬瘡禹錫等按藥性論云百部使味甘無毒能治肺家熱上氣咳逆主潤益肺日華子云味苦無毒治疳蛔及傳尸骨蒸勞殺蛔蟲寸白蟯蟲并治一切樹木蛀蚛燒之亦可殺蠅蠓又名婆婦草一根三十來莖圖經曰百部根舊不著所出州土今江湖淮陜齊魯州郡皆有之春生苗作藤蔓葉大而尖長頗似竹葉面青色而光根下作撮如芋子一撮乃十五六枚黃白色二月三月八月採暴乾用古今方書治嗽多用葛洪主卒嗽以百部根生薑二物各絞汁合煎服二合張文仲單用百部根酒漬再宿大溫服一升日再千金方療三十年嗽以百部根二十斤搗絞取汁煎之如飴服方寸匕日三服驗唐本云微寒有小毒雷公云凡使採得後用竹刀劈破去心皮花作數十條懸於檐下令風吹待土乾後却用酒浸一宿漉出焙乾細銼用忽一窠自有八十三條者號曰地仙苗若修事餌之可千歲也外臺祕要治誤吞錢百部根四兩酒一升漬一宿溫服一升日再服續十全方治暴嗽百部藤根搗自然汁和蜜等分沸湯煎成膏咽之抱朴子百部根理咳嗽及殺虱懷香子蘹音懷香子味辛平無毒主諸瘻霍亂及蛇傷唐本注云葉似老葫荽極細莖粗高五六尺叢生今注一名茴香子亦主膀胱腎間冷氣及盲腸氣調中止痛嘔吐也唐本先附禹錫等按藥性論云蘹香亦可單用味苦辛和諸食中甚香破一切臭氣又卒惡心腹中不安煮食之即差川中多食之日華子云得酒良治乾濕腳氣并腎勞㿗疝氣開胃下食治膀胱痛陰疼入藥炒用圖經曰蘹香子亦名茴香本經不載所出今交廣諸蕃及近郡皆有之入藥多用蕃舶者或云不及近處者有力三月生葉似老胡荽極疏細作叢至五月高三四尺七月生花頭如傘蓋黃色結實如麥而小青色北人呼為土茴香茴蘹聲近故云耳八月九月採實陰乾今近地人家園圃種之甚多古方療惡毒癰腫或連陰髀間疼痛急攣牽入小腹不可忍一宿則殺人者用茴香苗葉搗取汁一升服之日三四用其滓以貼腫上冬中根亦可用此外國方永嘉以來用之起死神效食療云國人重之云有助陽道用之未得其方法也生搗莖葉汁一合投熱酒一合服之治卒腎氣衝脅如刀刺痛喘息不得亦甚理小腸氣孫真人云治瘴瘧渾身熱連背項蕤茴香子搗取汁服經驗後方治脾胃進食茴香二兩生薑四兩同搗令勻淨器內濕紙蓋一宿次以銀石器中文武火炒令黃焦為末酒圓如梧子大每服十丸至十五丸茶酒下食醫心鏡茴香治霍亂辟熱除口氣臭煮作羹及生食并得衍義曰蘹香子今人止呼為茴香治膀胱冷氣及瘇痛亦調和胃氣唐本注似老葫荽此誤也葫荽葉如蛇床蘹香徒有葉之名但散如絲髮特異諸草枝上時有大青蟲形如蠶治小腸氣甚良欵冬花欵冬花味辛甘溫無毒主咳逆上氣善喘喉痹諸驚癇寒熱邪氣消渴喘息呼吸一名橐吾一名顆東一名虎鬚一名菟奚一名氏冬生常山山谷及上黨水傍十一月採花陰乾杏人為之使得紫苑良惡皂角消石玄參畏貝母辛夷麻黃黃耆黃芩黃連青箱陶隱居云今第一出河北其形如宿蓴未舒者佳其腹內有絲次出高麗百濟其花乃似大菊花次亦出蜀北部宕昌而并不如其冬月在冰下生十二月正月旦取之唐本注云今出雍州南山溪水及華州山谷澗間葉似葵而大叢生花出根下禹錫等按爾雅云菟奚顆凍釋曰藥草也郭云欵凍紫赤華生水中藥性論云欵冬花君主療肺氣心促急熱乏勞咳連連不絶涕唾稠黏治肺痿肺癰吐膿日華子云潤心肺益五臟除煩補勞劣消痰止嗽肺痿吐血心虛驚悸洗肝明目及中風等疾十一月十二月雪中出花圖經曰款冬花出常山山谷及上黨水傍今關中亦有之根紫色莖青紫葉似萆薢十二月開黃花青紫萼去土一二寸初出如菊花萼通直而肥實無子則陶隱居所謂出高麗百濟者近此類也又有紅花者葉如荷而斗直大者容一升小者容數合俗呼為蜂斗葉又名水斗葉則唐所注大者如葵而叢生者是也十一月採花陰乾或云花生於冰下正月旦採之郭璞注爾雅顆凍云紫赤花生水中冰水字近疑一有誤而傅咸款冬賦序曰余曾逐禽登於北山於時中冬之月冰凌盈谷積雪被崖顧見款冬煒然始敷華豔當是生於冰下為正也本經主咳逆古今方用之為治嗽之最崔知悌療久嗽熏法每旦取款冬花如雞子許少蜜拌花使潤內一升鐵鐺中又用一瓦碗鑽一孔孔內安一小竹筒筆管亦得其筒稍長作碗鐺相合及插筒處皆麵埿之勿令漏氣鐺下著炭火少時款冬烟自從筒出則口含筒吸取烟咽之如胸中稍悶須舉頭即將指頭捻筒頭勿使漏烟氣吸烟使盡止凡如是五日一為之待至六日則飽食羊肉餺飥一頓永差雷公云凡採得須去向裏裹花蘂殼并向裏實如粟零殼者并枝葉用以甘草水浸一宿却取款冬花葉相伴裛一夜臨用時即干㬠去兩件拌著葉了用衍義曰款冬花百草中惟此不顧冰雪最先春也世又謂之鑽凍雖在冰雪之下至時亦生芽春時人或採以代蔬入藥須微見花者良如已芬芳則都無力也今人又多使如筯頭者恐未有花爾有人病嗽多日或教以然欵冬花三兩枚於無風處以筆管吸其烟滿口則咽之數日效紅藍花紅藍花味辛溫無毒主産後血運口噤腹內惡血不盡絞痛胎死腹中并酒煮服亦主蠱毒下血堪作燕脂其苗生搗碎傅游腫其子吞數顆主天行瘡子不出其燕脂主小兒聤耳滴耳中生梁漢及西域一名黃藍博物志云黃藍張騫所得今滄魏地亦種之今附圖經曰紅藍花即紅花也生梁漢及西域今處處有之人家場圃所種冬而布子於熟地至春生苗夏乃有花亦作梂彙多刺花蘂出梂上圃人承露採之採已復出至盡而罷梂中結實白顆如小豆大其花暴乾以染真紅及作燕脂主産後血病為勝其實亦同葉頗似藍故有藍名又名黃藍博物志云張騫所得也張仲景治六十二種風兼腹內血氣刺痛用紅花一大兩分為四分以水一大升煎强半頓服之不止再服又一方用紅藍子一升搗碎以無灰酒一大升八合拌了暴令乾重搗篩蜜圓如梧子大空腹酒下四十圓正元廣利方治女子中風血熱煩渴者以紅藍子五大合微熬搗碎旦日取半大匙以水一升煎取七合去滓細細咽之又崔元亮海上方治喉痹壅塞不通者取紅藍花搗絞取汁一小升服之以差為度如冬月無濕花可浸乾者濃絞取汁如前服之極驗咽喉塞服之皆差亦療婦人産運絶者唐本注云治口噤不語血結産後諸疾堪染紅外臺祕要治一切腫方以紅花熟爛搗取汁服之不過再三服便差服之多少量腫大小而進之簡要濟衆産後血暈心悶氣絶紅花一兩搗為末分作兩服酒二中盞煎取一盞併服如口噤斡開灌之子母祕録同産寶方療産後中風煩渴紅花子五合微熬研碎以一匙水一升煎取七合徐徐呷之近效方治血暈絶不識人煩悶者紅花三兩新者佳無灰酒半升童子小便半升煮取一大盞去滓俟冷頓服之新汲水煮之亦良牡丹牡丹味辛苦寒微寒無毒主寒熱中風瘈音契瘲音縱痙驚癇邪氣除癥堅瘀血留舍腸胃安五藏療癰瘡除時氣頭痛客熱五勞勞氣頭腰痛風噤癲疾一名鹿韭一名鼠姑生巴郡山谷及漢中二月八月採根陰乾畏菟絲子陶隱居云今東間亦有色赤者為好用之去心按鼠婦亦名鼠姑而此又同殆非其類恐字誤唐本注云牡丹生漢中劍南所出者苗似羊桃夏生白花秋實圓緑冬實赤色凌冬不凋根似芍藥肉白皮丹山江劎南土人謂之牡丹亦名百兩金京下謂之吳牡丹者是真也今俗用者異於此别有臊氣也禹錫等按藥性論云牡丹能治冷氣散諸痛治女子經脉不通血瀝腰痛蕭炳云今出合州者佳白者補赤者利出和州宣州者并良日華子云除邪氣悅色通關腠血脉排膿通月經消撲損瘀血續筋骨除風痹落胎下胞産後一切女子冷熱血氣此便是牡丹花根巴蜀渝合州者上海鹽者次服忌蒜圖經曰牡丹生巴郡山谷及漢中今丹延青越滁和州山中皆有之花有黃紫紅白數色此當是山牡丹其莖梗枯燥黑白色二月於梗上生苗葉三月開花其花葉與人家所種者相似但花止五六葉耳五月結子黑色如雞頭子大根黃白色可五七寸長如筆管大二月八月採銅刀劈去骨陰乾用此花一名木芍藥近世人多貴重圃人欲其花之詭異皆秋冬移接培以壤土至春盛開其狀百變故其根性殊失本真藥中不可用此品絶無力也牡丹止血仍去瘀滯正元廣利方療因傷損血瘀不散者取牡丹皮八分合虻蟲二十一枚熬過同搗篩每用溫酒和散方寸匕服血當化為水下雷公云凡使採得後日乾用銅刀劈碎去骨了細銼如大豆許用清酒拌蒸從巳至未出日乾用外臺祕要治蠱毒方取牡丹根搗為末服一錢匕日三服良肘後方治下部生瘡已决洞者服牡丹方寸匕日三服衍義曰牡丹用其根上皮花亦有緋者如西洛潜溪緋是也今禁苑又有深碧色者惟山中單葉花紅者為佳家椑子次之若移枝接者不堪用為其花葉既多發奪根之氣也何以知之今千葉牡丹初春留花稍多來年花枝并葉便瘦多是開不成市人或以枝梗皮售於人其乖殊甚京三稜京三棱味苦平無毒主老癖癥瘕結塊俗傳昔人患癥癖死遺言令開腹取之得病塊乾硬如石文理有五色人謂異物竊取削成刀柄後因以刀刈三梭柄消成水乃知此可療癥癖也黃色體重狀若鯽魚而小又有黑三稜狀似烏梅而稍大有鬚相連蔓延體輕為療體并同今附禹錫等按日華子云味甘澀治婦人血脉不調心腹痛落胎消瘀血補勞通月經治氣脹消撲損瘀血産後腹痛血運并宿血不下圖經曰京三稄舊不著所出地土今河陜江淮荆襄間皆有之春生苗高三四尺似茭蒲葉皆三梭五六月開花似莎草黃紫色霜降後採根削去皮鬚黃色微苦以如小鯽魚狀體重者佳多生淺水傍及陂澤中其根初生成塊如附子大或有扁者傍生一根又成塊亦出苗其不出苗只生細根者謂之雞爪三梭又不生細根者謂之黑三梭大小不常其色黑去皮即白河中府又有石三稜根黃白色形似叉股葉緑色如蒲苗高及尺葉上亦有三梭四月開花白色如紅蓼花五月採根亦消積氣下品别有草三梭條云生蜀地即雞爪三棱也其實一類故附見於此一說三梭生荆楚字當作荆以著其地本經作京非也今世都不復有三梭所用皆淮南紅蒲根也泰州尤多舉世皆用之雖太醫不以為謬蓋流習既久用根者不識其苗採藥者莫究其用因緣差失不復更辨今三梭荆襄江淮水澤之間皆有葉如莎草極長莖三梭如削大如人指高五六尺莖端開花大體皆如莎草而大生水際及淺水中苗下即魁其傍有根橫貫一根則連數魁魁上發苗采時斷其莖及橫根形扁長如鯽魚者三梭也根末將盡一魁未發苗小圓如烏梅者黑三梭也又根之端鈎屈如爪者即雞爪三棱皆皮黑肌白而至輕三者本一物但力有剛柔各適其用因其形為名如烏頭烏喙雲母雲華之類非兩物也今人乃妄以鳧茨香附子為之又本草謂京三梭形如鯽魚黑三棱如烏梅而輕今紅蒲根至堅重刻削而成莫如形體又葉扁莖圓不復有三梭處不知何緣名三梭也今三棱皆獨傍引二根無直下根其形大體多亦如鯽魚陳藏器云本經無傳三稜總有三四種但取根似烏梅有鬚相連蔓如綖作漆色蜀人織為器一名䔷者是也外臺祕要治癥瘕及主鼓脹滿以三稜草切一石水五石煮一石去滓更煎取三斗汁銅器中重釜煎如稠糖出內密器中旦服一匙酒一盞服之日二每服恆令酒氣相續又方下乳汁以京三稜三箇以水一碗煎取一碗洗奶取汁為度極妙子母祕録治小兒氣癖取三棱汁作羹粥以米麵為之與奶母食每日取一棗大與小兒喫亦得作粥與癇熱食之治小兒十歲已下及新生百日無問癇熱無辜痃癖等皆理之祕妙不可具言大效薑黃薑黃味辛苦大寒無毒主心腹結積疰忤下氣破血除風熱消癰腫功力烈於鬱金唐本注云根葉都似鬱金花春生於根與苗并出夏花無子根有黃青白三色其作之方法與鬱金同惟花生異耳唐本先附禹錫等按陳藏器云薑黃真者是經種三年已上老薑能生花在根際一如蘘荷根節緊硬氣味辛辣種薑處有之終是難得性熱不冷本經云寒誤也破血下氣西蕃亦有來者與鬱金蒁藥相似如蘇恭所附即是蒁藥而非薑黃蘇不能分别二物也又云蒁味苦溫主惡風疰忤心痛血氣結積蘇云薑黃是蒁又云鬱金是胡蒁夫如此則三物無别遞相連名總稱為蒁功狀則合不殊今蒁味苦色青薑黃味辛溫無毒色黃主破血下氣溫不寒鬱金味苦寒色赤主馬熱病三物不同所用各别日華子云薑黃熱無毒治癥瘕血塊癰腫通月經治撲損瘀血消腫毒止暴風痛冷氣下食海南生者即名蓬莪蒁江南生者即為薑黃圖經曰薑黃舊不載所出州郡今江廣蜀川多有之葉青緑長一二尺許闊三四寸有斜文如紅蕉葉而小花紅白色至中秋漸凋春末方生其花先生次方生葉不結實根盤屈黃色類生薑而圓有節或云真者是經種三年已上老薑能生花花在根際一如蘘荷根節堅硬氣味辛辣種薑處有之八月採根片切暴乾蜀人以治氣脹及産後敗血攻心甚驗蠻人生啖云可以祛邪辟惡謹按鬱金薑黃蒁藥三物相近蘇恭不細辨所說乃如一物陳藏器解紛云蒁味苦色青薑黃味辛溫色黃鬱金味苦寒色赤主馬熱病三物不同所用全别又劉淵林注吳都賦薑彙非一云薑彙大如螺氣猛近於臭南土人搗之以為齏茭一名廉薑生沙石中薑類也其味大辛而香削皮以黑梅并鹽汁漬之乃成也始安有之據此廉薑亦是其類而自是一物耳都下近年多種薑往往有薑黃生賣乃是老薑市人買生啖之云治氣為最醫家治氣藥大方中亦時用之千金翼瘡疥初成或始痛癢以薑黃傅之妙經驗後方治心痛薑黃一兩桂穰三兩為末醋湯下一錢七蓽撥蓽撥味辛大溫無毒主溫中下氣補腰腳殺腥氣消食除胃冷陰疝痃癖其根名蓽撥沒主五勞七傷陰汗核腫生波斯國此藥叢生莖葉似蒟醬子緊細味辛烈於蒟醬今附禹錫等按日華子云治霍亂冷氣心痛血氣陳藏器云畢勃沒味辛溫無毒主冷氣嘔逆心腹脹滿食不消寒疝核腫婦人內冷無子治腰腎冷除血氣生波斯國似柴胡黑硬畢撥根也圖經曰蓽撥出波斯國今嶺南有之多生竹林內正月發苗作叢高三四尺其莖如箸葉青圓闊二三寸如桑面光而厚三月開花白色在表七月結子如小指大長二寸已來青黑色類椹子九月收採灰殺暴乾南人愛其辛香或取葉生茹之黃牛乳煎其子治氣痢神良謹按唐太宗實録云正觀中上以氣痢久未痊服他名醫藥不應因詔訪求其方有衛士進乳煎蓽撥法御用有效劉禹錫亦記其事云後纍試年長而虛冷者必效海藥云謹按徐表南州記本出海南長一指赤褐色為上復有蓽撥短小黑味不堪舶上者味辛溫主人老冷心痛水瀉虛痢與阿魏和合良亦滋食味得訶子人參桂心乾薑治臟腑虛冷腸鳴泄痢神效陳藏器云蒟醬注蘇云蓽撥叢生子細味辛烈於蒟醬按蓽撥溫中下氣補腰腳煞腥氣消食除胃冷陰疝痃癖根名蓽撥沒主五勞七傷陰汗核腫已出拾遺生波斯國胡人將來此調食用之唐本注云今人以調食味雷公云凡使先去挺用頭醋浸一宿焙乾以刀刮去皮粟子令淨方用免傷人肺令人上氣聖惠方治冷痰飲惡心用蓽撥一兩搗為末於食前用清粥飲調半錢服經驗後方治偏頭痛絶妙蓽撥為末令患者口中含左邊疼令左鼻吸一字右邊令右鼻吸一字效衍義曰蓽撥走腸胃中冷氣嘔吐心腹滿痛多服走泄真氣令人腸虛下重圖經衍義本草卷之十四
