body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部下品何首烏今附商陸威靈仙今附牽牛子萆麻子禁附唐附蒴藋天南星今附羊蹄駿摸績注菰根萹蓄狼毒豨蘞馬鞭草苧根白頭翁甘蕉根芭蕉績生蘆根鬼臼角蒿唐附蒿績注馬兜鈴仙茅今附羊桃鼠尾草女青故麻鞋底唐附劉寄奴草唐附骨碎補今附何首烏何首烏味苦澀微溫無毒主瘰癧消癰腫療頭面風瘡五痔止心痛益血氣黑髭鬚悅顔色久服長筋骨益精髓延年不老亦治婦人産後及帶下諸疾本出順州南河縣今嶺外江南諸州皆有蔓紫花黃白葉如薯蕷而不光生必相對根大如拳有赤白二種赤者雄白者雌一名野苗一名交藤一名夜合一名地精一名陳知白春夏採臨用之以苦竹刀切米泔浸經宿暴乾木杵臼搗之忌鐵今附禹錫等按日華子云味甘久服令人有子治腹臟宿疾一切冷氣及腸風此藥有雌雄雄者苗葉黃白雌者赤黃色凡修合藥須雌雄相合吃有驗其藥本草無名因何首烏見藤夜交便即採食有功因以採人為名耳又名桃柳藤圖經曰何首烏本出順州南河縣嶺外江南諸州亦有今在處有之以西洛嵩山及南京柘城縣者為勝春生苗葉葉相對如山芋而不光澤其莖蔓延竹木墻壁間夏秋開黃白花似葛靳花結子有稜似蕎麥而細小才如粟大秋冬取根大者如拳各有五稜瓣似小甜瓜此有二種赤者雄白者雌採時乘濕以布帛拭去土後用苦竹刀切米泔浸一宿暴乾忌鐵以木臼杵搗之一云春採根秋採花九蒸九暴乃可服此藥本名交藤因何首烏服而得名何首烏順州河南縣人祖能嗣本名田兒生而閹弱年五十八無妻子一日醉卧野中見田中藤兩本異生苗蔓相交久乃解解合三四田兒心異之掘根持問鄉人無能名者遂暴乾搗末酒服七日而思人道百日而舊疾皆愈十年而生數男後改名能嗣又與子庭服皆壽百六十歲首烏服藥亦年百三十歲唐元和七年僧文象遇茅山老人遂傳其事李翱因著方録云又叙其苗如木藁光澤形如桃柳葉其背偏獨單皆生不相對有雌雄者雌者苗色黃白雄者黃赤其生相遠夜則苗蔓交或隱化不見春末夏中初秋三時候晴明日兼雌雄採之烈日暴乾散服酒下良採時盡其根乘潤以布帛拭去泥土勿損皮密器貯之每月再暴凡服偶日二四六八日是服訖以衣覆汗出導引尤忌猪羊血其叙頗詳故載之經驗方何首烏新採者去皮後用銅竹刀薄切片上甑如炊飯蒸下用瓷石鍋忌鐵旁更别燒一鍋常滿添水候藥甑氣上逐旋以熱水從上淋下勿令滿溢直候首烏絶無氣味然後取下一匙頭汁白湯亦可此是藥之精英與常不同治骨軟風腰膝疼行履不得遍身瘙癢首烏大而有花紋者同牛膝銼各一斤以好酒一升浸七宿暴乾於木臼內搗末蜜丸每日空心食前酒下三五十丸又方治諸處皮裏面痛首烏末薑汁調成膏痛處以帛子裹之用炙鞋底尉之妙斗門方治瘰癧或破不破以至胸前者皆治之用九真藤取其根如雞卵大洗生嚼常服又取葉搗覆瘡上數服即止其藥久服黑髮延年或取其頭獲之九數者服之乃仙矣其葉如杏其根亦類癧子用之如神又堪為利術伏沙子自有法一名何首烏又名赤葛王氏博濟治疥癬滿身作瘡不可治者何首烏艾等分以水煎令濃於盆內洗之甚能解痛生肌肉何首烏傳昔何首烏者順州南河縣人祖名能嗣父名延秀能嗣常慕道術隨師在山因醉夜卧山野忽見有藤二株相去三尺餘苗蔓相交久而方解解了又交驚訝其異至旦遂掘其根歸問諸人無識者後有山老忽來示之答曰子既無嗣其藤乃異此恐是神仙之藥何不服之遂杵為末空心酒服一錢服數月似强健因此常服又加二錢服之經年舊疾皆痊髮烏容少數年之內即有子名延秀秀生首烏首烏之名因此而得生數子年百餘歲髮黑有李安期者與首烏鄉里親善竊得方服其壽至長遂叙其事何首為味甘生溫無毒茯苓為使治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虛敗劣長筋力益精髓壯氣駐顔黑髭延年婦人惡血痿黃産後諸疾赤白帶下毒氣入腹久痢不止其功不可具述一名野苗二名交藤三名夜合四名地精五名首烏本出虔州江南諸道皆有之苗葉有光澤又如桃李葉雄苗赤根遠不過三尺春秋可採日乾去皮為末酒下最良有疾即用茯苓湯下為使常杵末新瓷器盛服之忌猪肉血無鱗魚觸藥無力此藥形大如拳連珠其中有形鳥獸山嶽之狀珍也掘得去皮生吃得味甘甜休糧讚曰神效助道著在仙經雌雄相交夜合晝疏服之去穀日居月諸返老還少變安病軀有緣者遇傳之勿泄最爾自如明州刺史李遠傳録經驗何首烏所出順州南河縣韶州潮州恩州賀州廣州四會縣潘州已上出處為上雍州晋興縣桂州康州春州瓊州高州循州已上所出次之其仙草五十年者如拳大號山奴服之一年髭鬢青黑一百年如碗大號山哥服之一年顔色紅悅一百三十年如盆大號山伯服之一年齒落重生二百年如斗栲栳大號山翁服之一年顔如童子行及奔馬三百年如三斗栲栳大號山精服之一年延齡純陽之體久服成地仙衍義曰何首烏兼黑髭鬢與蘿卜難零人髭鬢早白腸風熱多商陸商陸味辛酸平有毒主水脹疝瘕痹尉除癰腫殺鬼精物療胸中邪氣水腫痿痹腹滿洪直疏五臟散水氣如人形者有神一名䓪根一名夜呼生咸陽川谷陶隱居云近道處處有方家不甚乾用療水腫切生根雜生鯉魚煮作湯道家乃散用及煎釀皆能去尸蠱見鬼神其實亦入神藥花名䓪花尤良唐本注云此有赤白二種白者入藥用赤者見鬼神甚有毒但貼腫外若服之傷人乃至痢血不已而死也今注商陸一名白昌一名當陸禹錫等按蜀本圖經云葉大如牛舌而厚脆有赤花者根赤白花者根白今所在下之二月八月採根日乾爾雅云遂薚馬尾廣雅曰馬尾商陸本草云别名薚今關西亦呼為薚江東呼為當陸釋文云如人形者有神藥性論云當陸使忌犬肉味甘有大毒能瀉十種水病喉痹不通薄切醋熬喉腫處外傅之差日華子云白章陸味苦冷得大蒜良通大小腸瀉蠱毒墮胎協腫毒傅惡瘡赤者有毒圖經曰商陸俗名章柳根生咸陽山谷今處處有之多生於人家園圃中春生苗高三四尺葉青如牛舌而長莖青赤至柔脆夏秋開紅紫花作朵根如蘆蔔而長八月九月內採根暴乾其用歸表古方術家多用之亦可單服五月五日採根竹𥰭盛挂屋東北角陰乾百日搗篩井華水調服云神仙所祕法喉中卒被毒氣攻痛者切根炙令熱隔布尉之冷輒易立愈其花一人心昏塞多忘喜誤取花陰乾百日搗末日暮水服方寸七卧思念所欲事即於眼中自覺爾雅謂之遂薚廣雅謂之馬尾易謂之莧陸皆謂此商陸也然有赤白二種花赤者根赤花白者根白赤者不入藥服食用白者又一種名赤菖苗葉絶相類不可用服之傷筋消腎須細辨之雷公云凡使勿用赤葛緣相似其赤葛花莖有消筋腎之毒故勿餌章陸花白年多後仙人採之用作脯可下酒也每修事先以銅刀刮去上皮了薄切以東流水浸兩宿然後漉出架甑蒸以豆葉一重了與章陸一重如斯蒸從午至亥出仍去豆葉暴乾了細銼用若無豆葉只用豆代之外臺祕要治水氣商陸根白者去皮切如小豆許一大盞以水三升煮取一升已上爛即取粟米一大盞煮成粥仍空心服若一日兩度服即恐利多每日服一頓即微利不得雜食又方治瘰癧喉痹卒攻痛搗生章陸根捻作餅子置瘰癧上以艾炷於藥上灸三四壯千金髓治水氣浮腫白菖六兩取汁半合和酒半升看大小相度與服當利下水差又方卒暴癥腫中有物如石痛刺啼呼若不治百日死多取商陸根搗汁或蒸之以布藉腹上安藥勿覆冷復易書夜勿息經驗方治水疾樟柳去粗皮薄切暴乾為末用黃顙魚三頭大蒜三瓣緑豆一合以水一大碗同煮豆爛為度先將豆任意喫了却以汁調藥末一錢匕其水化為氣消梅師方治水腫不能服藥商陸一升羊肉六兩以水一斗煮取六升去滓和肉葱豉作臛如常法食之商陸白者妙孫真人食忌主一切熱毒腫章陸根和鹽少許傅之日再易又方主瘡中毒切章陸根汁熱布裹尉之冷即易斗門方治腳軟用樟柳根細切如小豆大煮令熟更入緑豆同爛煮為飯每日如此修事服餌以差為度其功最效張文仲治石癰堅如石不作膿者生章陸根搗搽之燥即易取軟為度威靈仙威靈仙味苦溫無毒主諸風宣通五臟去腹悶冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼及療折傷一名能消久服之無瘟疫瘧出商州上洛山及華山并平澤不聞水聲者良生先於衆草莖方數葉相對花淺紫根生稠密歲久益繁冬月丙丁戊己日採忌茗今附禹錫等按蜀本云九月末至十二月採陰乾餘月并不堪採圖經曰威靈仙出商州上洛山及華山并平澤今陜西河東河北京東江湖州郡或有之初生比衆草最先莖梗如叉股四棱葉似柳葉作層每層六七葉如車輪有六層至七層者七月內生花淺紫或碧白色作穗似莆臺子亦有似菊花頭者實青根稠密多鬚似穀每年亦朽敗九月採根陰乾仍以丙丁戊己日採以不聞水聲者佳唐正元中嵩陽子周君巢作威靈仙傳云先時商州有人重病足不履地者數十年良醫殫技莫能療所親置之道傍以求救者遇一新羅僧見之告曰此疾一藥可活但不知此土有否因為之入山求索果得乃威靈仙也使服之數日能步履其後山人鄧思齊知之遂傳其事崔元亮海上方著其法云採得陰乾月餘搗篩溫清酒和二錢七空腹服之如人本性殺藥可加及六錢七利過兩行則减之病除方停服其性甚善不觸諸藥但惡茶及麵湯以甘草栀子代飲可也唐本云腰腎腳膝積聚腸內諸冷痛積年不差者服之無不立效治商州洛陽縣九月末至十二月採陰乾餘月并不堪採每年傍引年深轉茂根苗漸多經數年亦朽敗千金方治腰腳痛威靈仙末空心溫酒調下錢七逐日以微利為度經驗方治大腸久冷威靈仙蜜丸桐子大於一更內生薑湯下十丸至二十丸又方治腰腳威靈仙二斤洗乾好酒浸七日為末麵糊丸桐子大以浸藥酒下二十丸集驗方治腎臟風壅積腰膝沉重威靈仙末蜜和丸桐子大初服溫酒下八十丸平明微利惡物如青濃桃膠即是風毒積滯也如未動夜再服一百丸取下後喫粥藥補之一月仍常服溫補藥孫兆放杖丸同崔氏海上集威靈仙去衆風通十二經脉此藥朝服暮效疏宣五臟冷膿宿水變病微利不瀉人服此四肢輕健手足溫暖并得清凉時商州有人患重足不履地經十年不差忽遇新羅僧見云此疾有藥可理遂入山求之遣服數日平復後留此藥名而去此藥治丈夫婦人中風不語手足不隨口眼喎邪筋骨節風胎風頭風暗風心風風狂人傷寒頭痛鼻清涕服經二度傷寒即止頭旋目眩白瘕風極治大風皮膚風癢大毒熱毒風瘡深治勞疾連腰骨節風繞腕風言語澀滯痰積宣通五臟腹內宿滯心頭痰水膀胱宿膿口中涎水好喫茶滓手足頑痹冷熱氣壅腰膝疼痛久立不得浮氣瘴氣憎寒壯熱頭痛尤甚攻耳成膿而聾又衝眼赤大小腸祕服此立通飲食即住黃疸黑疸面無顔色瘰癧遍項産後閉澀背腰痛曾經損墜心痛注氣膈氣冷氣攻衝腎臟風壅腹肚脹滿頭面浮腫注毒脾肺氣痰熱咳嗽氣急坐卧不安疥癬等瘡婦人月水不來動經多日血氣衝心陰汗盜汗鴉臭穢甚氣息不堪勤服威靈仙更用熱湯盡日頻洗朝以苦唾調藥塗身上內外每日一次塗之當得平愈孩兒無辜令母含藥灌之痔疾閉澀氣痢絞結并皆治之威靈仙一味洗焙為末好酒和令微濕入竹筒內牢塞口九蒸九暴如乾添酒重灑之以白飯和丸如桐子大每服二十至三十丸湯酒下衍義曰威靈仙治腸風根性快多服疏人五臟真氣牽牛子牽牛子味苦寒有毒主下氣療腳滿水腫除風毒利小便陶隱居云作藤生花狀如藊豆黃色子作小房實黑色形如毬子核比來服之以療腳滿氣急得小便利無不差此藥始出田野人牽牛易藥故以名之又有一種草葉上有三白點俗因以名三白草其根以療腳下氣亦甚有驗唐本注云此花似旋葍花作碧色又不黃不似藊豆其三白草有三黑點非白也古人祕之隱黑為白爾陶不見但聞而傳之謂實白點今注此藥蔓生花如鼓子花而稍大作碧色子有黃殼作小房實黑稍類蕎麥比來服之以療腳腫滿氣急利水道無不差者禹錫等按蜀本圖經云苗蔓生花碧色子若蕎麥三梭黑色九月已後收子所在有之藥性論云牽牛子使味甘有小毒能治痃癖氣塊利大小便除水氣虛腫落胎日華子云味苦㿌得青木香乾薑良取腰痛下冷膿瀉蠱毒藥并一切氣壅滯圖經曰牽牛子舊不著所出州土今處處有之二月種子三月生苗作藤蔓繞籬墻高者或三二丈其葉青有三尖角七月生花微紅帶碧色似鼓子花而大八月結實外有白皮裹作毬每毬內有子四五枚如蕎麥大有三梭有黑白二種九月後收之又名金鈴段成式酉陽雜俎云盆甑草即牽牛子也秋節後斷之狀如盆甑其中子似龜蔓如山芋即此雷公云草金鈴牽牛子是也凡使其藥秋末即有實冬收之凡使曬乾却以水中淘浮者去之取沉者㬠乾拌酒蒸從已至未曬乾臨用舂去黑皮用食療云多食稍冷和山茱萸服之去水病聖惠方治水氣遍身浮腫氣促坐卧不得用牽牛子二兩微炒搗細末烏牛尿浸宿平旦入葱白一握煎十餘沸去滓空心分為二服水從小便中下肘後方治風毒腳氣若脛已滿捻之沒指者取牽牛子搗蜜丸如小豆大每服五丸生薑湯下取令小便利亦可止斗門方治風氣所攻臟腑積滯用牽牛子以童子小便浸一宿後長流水上洗半日却用生絹袋盛挂於當風處令好乾每日鹽湯下三十粒極能搜風亦善消虛腫久服令人體清爽王氏博濟治三焦氣不順胸膈壅塞頭昏目眩涕唾痰涎精神不爽利膈丸牽牛子四兩半生半熟不蛀皂莢塗酥炙二兩為末生薑自然汁煮糊丸如桐子大每服三十丸荆芥湯下又方治産前滑胎牽牛子一兩赤土少許研令極細每覺轉痛頻煎白榆皮湯調下一錢七又方治男子婦人五般積氣成聚黑牽牛一斤生搗末八兩餘滓於新瓦上炒香熟放冷再搗取四兩熟末十二兩拌勻煉蜜和丸如桐子大患積氣至重者三五十丸煎陳橘皮生薑湯下臨卧空心服之如二更至三更已來藥行時效應未動再與三十丸投之轉下積聚之物常服十丸至十五丸行氣甚妙小兒十五已下至七歲已上服五丸至七丸年及五十已上不請服簡要濟衆治大便澀不通牽牛子半生半熟搗為散每服二錢煎薑湯調下如未通再服及以熱茶調下量虛實無時候加减服之衍義曰牽牛子諸家之說紛紛不一陶隱居尤甚言花狀如藊豆殊不相當花朵如鼓子花但碧色日出開日西合今注又謂其中子類蕎麥亦非也蓋直如木猴梨子但黑色可微炒搗取其中粉一兩别以麩炒去皮尖者桃人末半兩以熟蜜和丸如梧桐子溫水服三二十丸治大腸風祕壅熱結澀不可久服亦行脾腎氣故也萆麻子萆麻子味甘辛平有小毒主水癥水研二十枚服之吐惡沫加至三十枚三日一服差則止又主風虛寒熱身體瘡癢浮腫尸疰惡氣笮取油塗之葉主腳氣風腫不仁搗蒸傅之唐本注云此人間所種者葉似大麻葉而甚大其子如蜱音卑又名萆麻今胡中來者莖赤樹高丈餘子大如皂莢核用之益良油塗葉炙熱尉囟音信上止衄尤驗也唐本先附禹錫等按蜀本圖經云樹生葉似大麻大數倍子殼有刺實大於巴豆青黃色斑夏用莖葉秋收子冬採根日乾胡中來者莖子更倍大所在有之又云葉似葎草而厚大莖赤有節如甘蔗日華子云治水脹腹滿細研水服壯人可五粒催生傅産人手足心産後速拭去瘡痍疥癩亦可研傅圖經曰萆麻子舊不著所出州郡今在處有之夏生苗葉似葎草而厚大莖赤有節如甘蔗高丈許秋生細花隨便結實殼上有刺實類巴豆青黃斑褐形如牛蜱故名夏採莖葉秋採實冬採根日乾胡中來者莖子更大崔元亮海上方治産及胞衣不下取鹿麻子七枚研如膏塗腳心子及衣才下便速洗去不爾腸出即用此膏塗頂腸當自入雷公云凡使勿用黑天赤利子緣在地蔞上生是顆兩頭尖有毒藥中不用其萆麻子形似巴豆節節有黃黑斑點凡使先須和皮用鹽湯煮半日去皮取子研過用外臺祕要治半身不遂失音不語取萆麻子油一升酒一斗銅鉢盛油著酒中一日煮之令酒油熟服之又方治水氣取萆麻子去皮研令熟水解得三合清旦一頓服之盡日中當下青黃水千金方治嶺南腳氣從足至膝脛腫滿連骨疼者萆麻子葉切蒸薄裹二三易即消肘後方治一切毒腫疼痛不可忍者搗萆麻子傅之立差又方産難取萆麻子二枚兩手各把一枚須臾立下經驗後方治風痰鼻榻萆麻不拘多少去皮拍為二片用黃連等分捶碎二件用水一處浸七宿後空心日午卧時只用浸者水吞下一片水盡旋添勿令乾服兩月後吃大蒜猪肉試驗如不發動便是效也若發動時依前法再服直候不發如只腿脹用針出毒物纍有神驗修真祕㫖治小兒丹瘤萆麻子五個去皮研入麵一匙水調塗之甚效杜壬治癘風手指攣曲節間痛不可忍漸至漸落方萆麻一兩去皮黃連一兩銼如豆以小瓶子入水一升同浸春夏三日秋冬五日後取萆麻子一枚擘破面東以浸藥水平旦時一服漸加至四五枚微利不妨瓶中水少更添忌動風食纍用得效又方治咽中瘡腫萆麻子一枚去皮朴消一錢同研新汲水作一服連進二三服效初虞世治湯火傷神妙萆麻子蛤粉等分末研膏湯損用油調塗火瘡用水調塗蒴藋味酸溫有毒主風瘙𤺋疹身癢濕痹可作浴湯一名堇草一名芨生田野春夏採葉秋冬採莖根今附陶隱居云田野墟村中甚多絶療風痹癢痛多用薄洗不堪入服亦有酒漬根稍飲之者唐本注云此陸英也剩出此條爾雅云芨堇草郭注云烏頭苗也檢三堇别名又無此者蜀人謂烏頭苗為堇草陶引此條不知所出處藥對及古方無蒴藋惟言陸英也今注蒴藋條唐本編在狼跋子之後而與陸英條注解并云剩出一條今詳陸英味苦寒無毒既此不同難謂一種蓋其類爾今但移附陸英之下禹錫等按日華子云味苦凉有毒治瘑癩風痹并煎湯浸并葉用圖經文具陸英條下雷公云凡使之春用隔年花蕊夏用根秋冬并總用作煎只取根用銅刀細切於柳木臼中搗取自然汁緩緩於鍋子中煎如稀餳任用也外臺祕要治卒暴癥腹中有物堅如石痛欲死取蒴藋根一小束洗瀝去水細擘以酒二升漬三宿暖溫服五合至一升日三若欲速得服於熱灰中溫令藥味出服之此方無毒已愈十六人神驗藥盡復作服之又方治腰痛方蒴藋葉火燎厚鋪床上趂熱卧眠於上冷復易之冬月取根舂碎熬及熱準前用并治風溫濕冷痹及産婦患傷冷腰痛不得動亦用又方治下部閉不通取蒴藋根一把搗汁水和絞去滓强人服一升數用之并治腳氣千金方治嶺南腳氣從足至膝脛腫骨疼者蒴藋根碎和酒醋共三分根一分合蒸熟封裹腫上二三日即消亦治不仁又方治頭風取蒴藋根二升酒二升煮服之梅師方治水腫坐卧不得頭面身體悉腫取蒴藋根刮去皮搗汁一合和酒一合暖空心服當微吐利又方治一切𤺋用煮蒴藋湯和少酒塗無不差姚氏方同孫真人食忌主卒腳腫漸上以蒴藋莖葉埋熱灰中令熱傅腫上差即易斗門方治瘧疾用蒴藋一大握炙令黃色以水濃煎一盞欲發前服張文仲治手足忽生疣目蒴藋赤子挼使壞疣曰上令赤塗之差又方治熊傷人瘡蒴藋一大把銼碎以水一升漬須臾取汁飲餘滓以封裹瘡子母祕録治小兒赤遊行於身上下至心即死蒴藋煎汁洗之衍義曰蒴藋與陸英既性味及出産處不同治療又别自是二物斷無疑焉况朔藋花白子初青如緑豆顆每朵如盞面大又平生有一二百子十月方熟紅豈得言剩出此條孟浪之甚也天南星天南星味苦辛有毒主中風除痰麻痹下氣破堅積消癰腫利胸膈散血墜胎生平澤處處有之葉似蒻葉根如芋二月八月採之今附禹錫等按陳藏器云天南星主金瘡傷折瘀血取根碎傅傷處生安東山谷葉如荷獨莖最良日華子云味辛烈平畏附子乾薑生薑罯撲損瘀血主蛇蟲咬傅疥癬惡瘡入藥炮用又名鬼商蒻圖經曰天南星本經不載所出州土云生平澤今處處有之二月生苗似荷梗莖高一尺以來葉如商蒻兩枝相抱五月開花似蛇頭黃色七月結子作穗似石榴子紅色根似芋而圓二月人月採根亦與蒟蒻根相類人多誤採莖斑花紫是商蒻一說天南星如本草所說即虎掌也小者為由跋後人採用乃别立一名爾今天南星大者四邊皆有子採時盡削去之又陳藏器云半夏高一二尺由跋高一二寸此正誤相反言也今由跋苗高一二尺莖似蒟蒻而無斑根如雞卵半夏高一二寸亦有盈尺者根如小指正圓也江南吳中又有白商蒻亦曰鬼芋根都似天南星生下平澤極多皆雜採以為天南星了不可辨市中所收往往是也但天南星小柔膩肌細炮之易裂差可辨爾古方多用虎掌不言天南星天南星近出唐世中風痰毒方中多用之續傳信方治風痛用天南星躑躅花并生時同搗羅作餅子甑上蒸四五過以絺葛囊盛之候要即取焙搗為末蒸餅丸如梧桐子大溫酒下三丸腰腳骨痛空心服手臂痛食後服大良經驗方治急中風目瞑牙噤無門下藥者用此末子以中指點末揩齒三二十揩大牙左右其口自開始得下藥名開關散天南星搗為末白龍腦二件各等分研以五月五日午時合患者只一字至半錢又方治小兒走馬疳蝕透損骨及小攻蝕必效方天南星一個當心作坑子安雄黃一塊在內用麵裹燒候雄黃作汁以盞子合定出火毒去麵研為末入麝香少許拂瘡驗又方治婦人一切風攻頭目痛天南星一個掘地坑子火燒令赤安於坑中以醋一盞以盞蓋之不令透氣候冷取出為末每服一字以酒調下重者半錢又方治驚風墜涎天南星一個重一兩换酒浸七伏時取出於新瓦上周回炭火炙令乾裂置於濕地去火毒用瓷器合盛之冷搗末用朱砂一分研同拌每服半錢荆芥湯調下每日空心午時進一二服勝金方治吐血天南星一兩銼如豆大以爐灰汁浸二宿取出洗焙乾搗末用酒磨自然銅下一錢愈十全博救方治咳嗽天南星一個大者炮令裂為末每服一大錢水一盞生薑三片煎至五分溫服空心日午臨卧時各一服集效方治吐瀉不止或取轉多四肢發厥虛風不省人事服此四肢漸暖神識便省回陽散天南星為末每服三錢入京棗三枚同煎八分溫服未省再服初虞世治破傷風入瘡强直防風天南星等分為末以醋調作靨貼上談氏方治小兒牙關不開天南星一個煨熱紙裹封角休要透氣於細處剪雞頭大一竅子透氣於鼻孔中牙關立開羊蹄根羊蹄味苦寒無毒主頭秃疥瘙除熱女子陰蝕浸淫疽痔殺蟲一名東方宿一名連蟲陸一名鬼目一名蓄生陳留川澤陶隱居云今人呼名秃菜即是蓄音之訛詩云言採其蓄又一種極相似而味酸呼為酸摸根亦療疥也唐本注云實味苦澀平無毒主赤白雜痢根味辛苦有小毒萬畢方云療蟲毒今山野平澤處處有之禹錫等按蜀本圖經云生下濕地高者三四尺葉狹長莖節間紫赤花青白色子三稜夏中即枯又有一種莖葉俱細節間生子若茺蔚子療痢乃佳今所在有之日華子云羊蹄根治癬殺一切蟲腫毒醋摩貼葉治小兒疳蟲殺胡夷魚鮓魚檀胡魚毒亦可作菜食陳藏器云酸摸葉酸美小兒折食其英根主暴熱腹脹生搗絞汁服當下痢殺皮膚小蟲葉似羊蹄是山大黃一名當藥爾雅云須薞蕪注云似羊蹄而細味酸可食日華子云酸摸味酸凉無毒治小兒壯熱生山岡狀似羊蹄葉小黃圖經曰羊蹄秃菜也生陳留川澤今所在有之生下濕地春生苗高三四尺葉狹長頗似萵苣而色深莖節間紫赤花青白成穗子三稜有若茺蔚夏中即枯根似牛蒡而堅實今人生採根醋摩塗癬速效亦煎作丸服之其方以新採羊蹄根不限多少搗研絞取汁一大升白蜜半斤同熬如稠餳煎更用防風末六兩溲和令可丸大如梧子用栝樓甘草酒下三二十丸日二三大佳謹按詩小雅言採其遂陸機云遂今人謂之羊蹄似蘆蔔而莖赤一約為茹滑而美也多啖令人下氣幽州人謂之遂字或作蓄并耻六切又有一種極相類莖葉黃味酢名酸摸爾雅所謂須薞音孫蕪郭璞云薞蕪似羊蹄葉細味酢可食一名蓨音條是也食療主癢不宜多食聖惠方治癧瘍風用羊蹄菜根於生鐵上以好醋磨旋旋刮取塗於患上未差更入硫黃少許同磨塗之又方治大便卒澀結不通用羊蹄根一兩銼水一大盞煎取六分去滓溫溫頓服外臺祕要治疥方搗羊蹄根和猪脂塗上或著鹽少許佳千金方喉痹卒不語羊蹄獨根者勿見風日及婦人雞犬以三年醋研和如泥生布拭喉令赤傅之千金翼治漏瘤瘡濕癬癢浸淫日廣癢不可忍搔之黃水出差後復發取羊蹄淨去土細切搗以大酢和淨洗傅上一時間以冷水洗之日一傅差若為末傅之妙斗門方治腸風痔瀉血羊蹄根葉爛蒸一碗來食之立差簡要濟衆治癬瘡久不差羊蹄根搗絞取汁用調膩粉少許如膏塗傅癬上三五遍即差如乾即猪脂調和傅之菰根菰根大寒主腸胃痼熱消渴止小便陶隱居云菰根亦如蘆根冷利復甚也今按别本注云菰蔣草也江南人呼為茭草秣馬甚肥味甘無毒禹錫等按蜀本圖經云生水中葉似蔗荻久根盤厚夏月生菌細堪啖名菰菜三年已上心中生臺如藕白軟中有黑脉堪噉名菰首也爾雅云出隧蘧蔬釋曰菌類也一名出隧一名蘧蔬廣雅云朝生形如鬼蓋郭云似土菌生菰草中今江東唆之甜滑者氈氍㲣者說文云菰蔣也張揖云氍㲣毛席取其音同孟說云菰菜利五臟邪氣酒𤿜面赤白頭癧瘍目赤等效然滑中不可多食熱毒風氣卒心痛可鹽醋煮食之又云茭首寒主心胸中浮熱風食之發冷氣滋人齒傷陽道令下焦冷滑不食甚好陳藏器云菰菜味甘無毒去煩熱止渴除目黃利大小便止熱痢雜鯽魚為羹開胃口解酒毒生江東池澤菰葑上如菌葑是菰根歲久浮在水上者主火燒瘡燒為灰和雞子白塗之吕氏春秋曰菜之美者越路之菌是也晋張翰見秋風起思之又云菰首生菰蔣草心至秋如小兒臂故云菰首煮食之止渴甘冷雜蜜食之發痼疾無别功更有一種小者擘肉如墨名烏鬱人亦食之止小兒水痢日華子云茭首微毒多食發氣并弱陽葉利五臟食巴豆人不可食圖經曰菰根舊不著所出州土今江湖陂澤中皆有之即江南人呼為茭草者生水中葉如蒲葦輩刈以秣馬甚肥春亦生笋甜美堪啖即菰菜也又謂之茭白其歲久者中心生白臺如小兒臂謂之菰手今人作菰首非是爾雅所謂蘧蔬注云似土菌生菰草中正謂此也故南方人至今謂菌為菰亦緣此義也其臺中有墨者謂之茭鬱其根亦如蘆根冷利更甚二浙下澤處菰草最多其根相結而生久則并土浮於水上彼人謂之菰葑刈去其葉便可耕蒔其苗有莖梗者謂之菰蔣草至秋結實乃雕胡米也古人以為美饌今饑歲人猶採以當糧西京雜記云漢太液池邊皆是雕胡紫籜緑節蒲叢之類菰之有米者長安人謂為雕胡葭蘆之米解葉者紫籜菰之有首者謂之緑節是也然則雕胡諸米今皆不貴大抵菰之種類皆極冷不可過食甚不益人惟服金石人相宜耳陳藏器云茭首主心胸中浮熱動氣不中食之發冷滋牙齒傷陽道令下焦冷不食為妙食療云若丹石熱發和鯽魚煮作羹食之三兩頓即便差耳外臺祕要治湯火所灼未成瘡取菰蔣根燒取灰用雞子黃和封之廣濟方治毒蛇嚙方菰蔣草根灰取以封之其草似燕尾是子母祕録小兒風瘡久不差燒菰蔣節末以傅之衍義曰菰根蒲類四時取根搗絞汁用河朔邊人止以此苗飼馬曰菰蔣及作薦花如葦結青子細若青麻黃長幾寸彼人收之合粟為粥食之甚濟饑此杜甫所謂願作冷秋菰者是也為其皆生水中及岸際多食亦令人利萹蓄萹蓄味苦平無毒主浸淫疥瘙疽痔殺三蟲療女子陰蝕生東萊山谷五月採陰乾陶隱居云處處有布地生花節間白葉細緑人亦呼為萹竹煮汁與小兒飲療蛔蟲有驗禹錫等按蜀本圖經云葉如竹莖有節細如叉股生下濕地今所在有二月八月採苗日乾爾雅云竹萹蓄釋云李巡云一物二名也孫炎引詩衛風云緑竹猗猗郭云似小藜赤莖節好生道傍可食又殺蟲陶注本草謂之萹竹是也藥性論云萹竹使味甘煮汁與小兒服主蛔蟲等咬心心痛面青口中沫出臨死者取十斤細銼以水一石煎去滓成煎如飴空心服蟲自下皆盡止主患痔疾者常取葉搗汁服效治熱黃取汁頓服一升多年者再服之根一握洗去土搗汁服之一升惡丹石毒發衝目腫痛又傅熱腫效圖經曰萹蓄亦名萹竹出東萊山谷今在處有之春中布地生道傍苗似瞿麥葉細緑如竹赤莖如叉股節間花出甚細微青黃色根如蒿根四月五月採苗陰乾謹按爾雅云竹萹蓄郭璞注云似小藜赤莖節好生道傍可食又殺蟲衛詩緑竹猗猗說者曰緑王芻也竹萹竹也即謂此萹蓄方書亦單用治蟲葛洪小兒蛔方煮汁令濃飲之即差食療云蛔蟲心痛面青口中沫出臨水取葉十斤細切以水三石三斗煮如餳去滓通寒溫空心服一升蟲即下至重者再服仍通宿勿食來日平明服之患治常取萹竹葉煮汁澄清常用以作飯又患熱黃五痔搗汁頓服一升重者再服丹石發衝眼目腫痛取根一握洗搗以少水絞取汁服之若熱腫處搗根莖傅之外臺祕要治丹發疼痛搗萹竹汁服一升一兩服便差若未差再服效千金翼治外痔搗萹竹絞取汁溲麵作餺飥空心吃日三度常喫肘後方惡瘡連痂癢痛搗萹竹封痂落即差食醫心鏡治小兒燒蟲攻下部癢取萹竹葉一握切以水一升煎取五合去滓空腹飲之蟲即下用其汁煮粥亦佳又方治霍亂吐痢不止萹竹豉汁中以五味調和煮羹食之佳楊氏産乳治蟲狀如蝸牛食下部癢取萹竹一把水二升煮熟五歲兒空腹服三五合隔宿食明早服之尤佳狼毒狼毒味辛平有大毒主咳逆上氣破積聚飲食寒熱水氣脅下癖惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸一名續毒生秦亭山谷及奉高二月八月採根陰乾陳而沉水者良大豆為之使惡麥句薑陶隱居云秦亭在隴西亦出宕昌乃言止有數畝地生蝮蛇食其根故為難得亦用太山者今用出漢中及建平云與防葵同根類但置水中沉者便是狼毒浮者則防葵俗用稀亦難得是療腹內要藥爾唐本注云此物與防葵都不同類生處又别狼毒今出秦州成州秦亭故在二州之界其太山漢中亦不聞有但秦隴寒地元無蝮蛇復云數畝地生蝮蛇食其根謬矣今按别本注云與麻黃橘皮吳茱萸半夏枳實為六陳也又按狼毒葉似商陸及大黃莖葉上有毛根皮黃肉白以實重者為良輕者力劣秦亭在隴西奉高乃太山下縣亦出宕昌及漢中建平舊經陶云與防葵同根以置水中浮者即是防葵沉者即是狼毒此不足為信假使防葵秋冬採者堅實得水皆沉狼毒春夏採者輕虛得水乃浮爾按此與防葵全别生處不同故不可為比類禹錫等按蜀本圖經云根似玄參浮虛者為劣也藥性論云狼毒使味苦辛有毒治痰飲癥瘕亦殺鼠圖經曰狼毒生秦亭山谷及奉高今陜西州郡及遼石州亦有之苗葉似商陸及大黃莖葉上有毛四月開花八月結實根皮黃肉白二月人月採陰乾以陳而沉水者良葛洪治心腹相連常脹痛者用狼毒二兩附子半兩搗篩蜜丸如桐子大一日服一丸二日二丸三日三丸再一丸至六日又三丸自一至三常服即瘥千金療惡疾以狼毒秦艽分兩等搗末酒服方寸匕日二常服之差聖惠方治乾癬積年生痂搔之黃水出每逢陰雨即癢用狼毒末塗之集效方治臟腑內一切蟲病川狼毒杵末每服一大錢用餳一皂子大沙糖少許以水同化臨卧空腹服之服時先喫微緊食藥一服來日早取下蟲效豨蘞豨音喜蘞音杴味苦寒有小毒主熱𧏾煩滿不能食生搗汁服三四合多則令人吐唐本注云葉似酸漿而狹長花黃白色一名火蘞田野皆識之今按别本注云三月四月採苗葉暴乾唐本先附禹錫等按蜀本圖經云高二尺許子青黃夏採葉用所在下濕地有之圖經曰豨蘞俗呼火杴草本經不著所出州郡今處處有之春生苗葉似芥菜而狹長文粗莖高三二尺秋初有花如菊秋末結實頗似鶴虱夏採葉暴乾用近世多有單服者云甚益元氣蜀人服之法五月五日六月六日九月九日採其葉去根莖花實淨洗暴乾入甑中層層灑酒與蜜蒸之又暴如此九過則已氣味極香美熬搗篩蜜丸服之云治肝腎風氣四肢麻痹骨間疼腰膝無力者亦能行大腸氣諸州所說皆云性寒有小毒與本經意同惟文州高郵軍云性熱無毒服之補虛安五臟生毛髮兼主風濕瘡肌肉頑痹婦人久冷尤宜服之用去粗莖留枝葉花實蒸暴兩說不同豈單用葉乃寒而有毒并枝花實則熱而無毒乎抑繫二地所産而然邪成訥云江陵府節度使進𦻎蘞丸方臣有弟誁年三十二中風床枕五年百醫不差有道人鍾針者因睹此患曰可餌𦻎蘞丸必愈其藥多生沃壤高三尺許節葉相對其葉當夏五月已來收每去地五寸剪刈以溫水洗泥土摘其葉及枝頭凡九蒸九暴不必火燥但取蒸為度仍熬搗為末丸如桐子大空心溫酒或米飲下二三十丸服至二千丸所患忽加不得憂慮是藥攻之力服至四千丸必得復故五千丸當復丁壯臣依法修合與誁服果如其言鍾針又言此藥與本草所述功效相異蓋出處盛在江東彼土人呼猪為豨呼臭為蘞氣緣此藥如猪蘞氣故以為名但經蒸暴蘞氣自泯每當服後須吃飯三五匙壓之五月五日採者佳奉宣付醫院詳録張詠云知益州進豨蘞丸表臣因換龍興觀掘得一碑內說修養氣術并藥方二件依方差人訪問採覓其草頗有異金稜銀線素根紫荄對節而生蜀號火炊莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自吃至百服眼目輕明即至千服髭鬢烏黑筋力校健效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立痊又和尚智嚴年七十忽患偏風口眼喎邪時時吐涎臣與十服盡亦便得瘥今合一百劑差職員史元奏進馬鞭草馬鞭草主下部𧏾瘡陶隱居云村墟陌甚多莖似細辛花紫色葉微似蓬蒿也唐本注云苗似狼牙及茺蔚抽三四穗紫花似車前穗類鞭鞘故名馬鞭都不似蓬蒿也今按陳藏器本草云馬鞭草主癥癖血瘕久瘧破血作煎如糖酒服若云似馬鞭鞘亦未近之其節生紫花如馬鞭節禹錫等按蜀本云味苦微寒無毒又圖經云生濕地花白色抽三四穗以七月八月採苗日乾所在皆有之藥性論云馬鞭草亦可單用味苦有毒生搗水煎去滓成煎如飴空心酒服一匕主破腹中惡血皆下殺蟲良日華子云味辛凉無毒通月經治婦人血氣肚脹月候不勻似益母草莖圓并葉用圖經曰馬鞭草舊不載所出州土今衡山廬山江淮州郡皆有之春生苗似狼牙亦類益母而莖圓高二三尺抽三四穗子七月八月採苗葉日乾用味甘苦微寒有小毒或云子亦通用古方多用之葛氏治卒大腹水病用馬鞭草鼠尾草各十斤水一石煮取五斗去滓再煎令稠厚以粉和丸服二三大豆許加四五豆神良聖惠方治白癲用馬鞭草不限多少為末每服食前用荆芥薄荷湯調下一錢七又方治婦人月水滯澀不快通結成瘕塊肋脹大欲死用馬鞭草根苗五斤銼細水五斗煎至一斗去滓别於淨器中熬成膏每食前溫酒調下半匙外臺祕要治蠼螋尿馬鞭草爛搗以封之乾復更易差千金方食魚鱠及生肉在胸膈不化必成癥瘕搗馬鞭草汁飲之一升生薑水亦得即消又方治喉痹躁腫連頰吐氣數者名馬喉痹馬鞭草一握勿見風截去兩頭搗取汁服之集驗方治男子陰腫大如升核痛人所不能治者搗馬鞭草塗之苧根苧根寒主小兒赤丹其漬苧汁療渴陶隱居云即今績苧爾又有山苧亦相似可入用也唐本注云别録云根安胎貼熱丹毒腫有效漚苧汁主消渴也今按陳藏器本草云苧破血漬苧與産婦溫服之將苧麻與産婦枕之止血暈産後腹痛以苧安腹上則止蠶咬人毒入肉取苧汁飲之今以苧近蠶種則蠶不生也禹錫等按蜀本注云苗高丈已來南人剝其皮為布二月八月採江左山南皆有之藥性論云苧麻根使味甘平主懷奸安胎日華子云味甘滑冷無毒治心膈熱漏胎下血産前後心煩悶天行熱疾大渴大狂服金石藥人心熱罯毒箭蛇蟲咬圖經曰苧根舊不載所出州土今閩蜀江浙多有之其皮可績布苗高七八尺葉如楮葉面青背白有短毛夏秋間著細穗青花其根黃白而輕虛二月八月採又有一種山苧亦相似謹按陸機草木疏云苧一科數十莖宿根在地中至春自生不須藏種荆楊間歲三刈官令諸園種之歲再刈便剝取其皮以竹刮其表厚處自脫得裹如筋者煮之用緝今江浙閩中尚復如此孕婦胎損方所須又主白丹濃煮水浴之曰三四差韋宙療癰疽發背初覺未成膿者以苧根葉熟搗傅上日夜數易之腫消則差矣聖惠方治奸娠胎動欲墮腹痛不可忍者用苧根二兩銼銀五兩酒一盞同煎去滓不計時候分溫作二服外臺祕要備急治白丹苧根三斤小豆四升以水二斗煮以浴三四遍浸洗妙肘後方丹者惡毒之瘡五色無常苧根三斤水三斗煮浴每日塗之又方胎動不安取苧根如足大指者一尺㕮咀以水五升煮取三升去滓服斗門方治五種淋用苧麻根兩莖打碎以水一碗半煎取半碗頻服即通大妙梅師方治諸癰疽發背或發乳房初起微赤不急治之即死速消方搗苧根傅之數易又方治妊娠忽下黃汁如膠或如小豆汁苧根切二升去黑皮以銀一斤水九升煎取四升每服入酒半升或一升煎藥取一升分作二服衍義曰苧根如蕁麻花如白楊而長成穗生每一朵凡數十穗青白色白頭翁白頭翁味苦溫無毒有毒主溫瘧狂易音羊寒熱癥瘕積聚癭氣逐血止痛療瘕瘡鼻衄一名野丈人一名明王使者一名楫何草生山谷及田野四月採陶隱居云處處有近根處有白茸狀似人白頭故以為名方用亦療毒痢唐本注云其葉似芍藥而大抽一莖莖頭一花紫色似木槿花實大者如雞子白毛寸餘皆披下似纛頭正似白頭老翁故名焉今言近根有白茸陶似不識太常所貯蔓生者乃是女萎其白頭翁根甚療毒痢似續斷而扁今按别本注云今處處有其苗有風則靜無風而搖與赤箭獨活同也又今驗此草叢生狀如白薇而柔細稍長葉生莖頭如杏葉上有細白毛近根者有白茸舊經陶注則未述其莖葉唐注又云葉似芍藥實大如雞子白毛寸餘此皆誤矣禹錫等按蜀本圖經云有細毛不滑澤花蘂黃今所在有之二月採花四月採實八月採根皆日乾藥性論云白頭翁使味甘苦有小毒止腹痛及赤毒痢治齒痛主項下瘤癧又云胡王使者味苦有毒主百骨節痛豚實為使日華子云得酒良治一切風氣及暖腰膝明目消贅子功用同上莖葉同用之圖經曰白頭翁生嵩山山谷今近京州郡皆有之正月生苗作叢狀如白薇而柔細稍長葉生莖端上有細白毛而不滑澤近根有白茸正似白頭老翁故名焉根紫色深如蔓菁二月三月開紫花黃蘂五月六月結實其苗有風則靜無風而搖與赤箭獨活同七月八月採根陰乾用今俗醫用合補下藥服之大暖亦衝人外臺祕要治陰𤻊白頭翁根生者不限多少搗之隨編腫處以傅之一宿當作瘡二十日愈肘後方小兒秃取白頭翁根搗傅一宿或作瘡二十日愈衍義曰白頭翁生河南洛陽界及新安土山中性溫止腹痛暖腰膝唐本注及藥性論甚詳陶隱居失於不審宜其排叱也新安縣界兼山野中屢嘗見之正如唐本注所說至今本處山中人賣白頭翁丸言服之壽考又失古人命名之意甘蕉根芭蕉花甘蕉根甘蕉根大寒主癰腫結熱陶隱居云本出廣州今都下東閭并有根葉無異惟子不堪食爾根搗傅熱腫甚良又有五葉莓生人籬援間作藤俗人呼為籠草取其根搗傅癰癤亦效唐本注云五葉即烏蘞草也其甘蕉根味甘寒無毒搗汁服主産後血脹悶傅腫去熱毒亦效嶺南者子大味甘冷不益人北間但有花汁無實今注此藥本出廣州然有數種其子性冷不益人故不備載按此花葉與芭蕉相似而極大子形圓長及生青熟黃南人皆食之而多動氣疾其根搗傅熱腫尤良禹錫等按蜀本圖經云俗為芭蕉多生江南葉長丈許闊二尺餘莖虛軟根可生用不入方藥藥性論云甘蕉根搗傅一切癰腫上乾即更上無不瘥者日華子云生芭蕉根治天行熱狂煩悶消渴患癰毒并金石發熱悶口乾人并絞汁服及梳頭長益髮腫毒游風風疹頭痛并研罯傅又云芭蕉油冷無毒治頭風熱并女人髮落止煩渴及湯火瘡圖經曰甘蕉根舊不著所出州郡陶隱居云本出廣州江東并有根葉無異惟子不堪食今出二廣閩中川蜀者有花閩廣者實極美可噉他處雖多而作花者亦少近歲都下往往種之甚盛皆芭蕉也蕉類亦多此云甘蕉乃是有子者葉大抵與芭蕉相類但其卷心中抽稈作花初生大萼如倒垂菡萏有十數層層皆作瓣漸大則花出瓣中極繁盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉其花大類象牙故謂之牙蕉其實亦有青黃之别品類亦多食之大甘美亦可暴乾寄遠北土得之以為珍果閩人灰埋其皮令錫滑績以為布如古之錫衰焉其根極冷搗汁以傅腫毒蓐婦血妨亦可飲之又芭蕉根性亦相類俚醫以治時疾狂熱及消渴金石發動躁熱并可飲其汁又芭蕉油治暗風癇病涎作暈悶欲倒者飲之得吐便瘥極有奇效取之用竹筒插皮中如取漆法食療主黃疸子生食大寒止渴潤肺發冷病蒸熟暴之令口開拍取人食之性寒通血脉填骨髓百一方發背欲死也取根搗塗之子母祕録治小兒赤遊行於上下至心即死搗芭蕉根汁煎塗之衍義曰芭蕉三年已上即有花自心中出一莖止一花全如蓮花葉亦相似但其色微黃緑從下脫葉花心但向上生常如蓮樣然未嘗見其花心剖而示之亦無蘂悉是葉但花頭常下垂每一朵自中夏開直至中秋後方盡凡三葉開則三葉脫落北地惜其種人故少用縷其苗為布取汁婦人塗髮令黑餘說如經蘆根蘆根味甘寒主消渴客熱止小便利陶隱居云當掘取甘辛者其露出及浮水中者并不堪用也唐本注云此草根療嘔逆不下食胃中熱傷寒患者彌良其花名蓬蕽音農水煮汁服主霍亂大善用有驗也禹錫等按藥性論云蘆根使無毒能解大熱開胃治噎噦不止日華子云治寒熱時疾煩悶妊孕人心熱并瀉痢人渴圖經曰蘆根舊不載所出州土今在處有之生下濕陂澤中其狀都似竹而葉抱莖生無枝花白作穗若茅花根亦若竹根而節疏二月八月採日乾用之當極取水底甘辛者其露出及浮水中者并不堪用謹按爾雅謂蘆根為葭華郭璞云蘆葦也葦即蘆之成者謂蒹為蒹與廉同蒹似萑音完而細長高數尺江東人呼為蒹適與荻同荻者謂菼切他敢為亂五芭切亂似葦而小中實江東呼為烏蓲音丘者或謂之荻荻至秋堅成即謂之萑其芭皆名苕徒雕切其萌笋皆名𢑆音綣若然所謂蘆葦通一物也所謂廉今作蒹者是也所言菼人以當薪爨者是也今人罕能别蒹菼與蘆葦又北人以葦與蘆為二物水傍下濕所生者皆名葦其細不及指人家池圃所植者為蘆其幹差大深碧色者謂之碧蘆亦難得然則本草所用蘆今北地謂葦者皆可通用也古方多單用葛洪療嘔喊切根水煮頓服一升必效方以童子小便煮服不過三升差其蓬茸主卒得霍亂氣息危急者取一把煮濃汁頓服二升瘥兼主魚蟹中毒服之尤佳其笋味小苦堪食法如竹笋但極冷耳唐本餘生下濕地莖葉似竹花若荻花二月八月採根日乾用之雷公云凡使須要逆水蘆其根逆水生并黃泡肥厚者味甘採得後去節須并上赤黃了細銼用聖惠方治食馬肉中毒癢痛蘆根五兩切以水八升煮取二升分為三服千金方治乾嘔噦若手足厥冷蘆根三斤濃煮汁飲之肘後方食鱸魚肝鯸鮧魚中毒銼蘆根煮汁一二升飲之梅師方食狗肉不消心下堅或䐜脹口乾忽發熱妄語煮蘆根飲之金匱玉函方治五噎心膈氣滯煩悶吐逆不下食蘆根五兩銼水三大盞煮取二盞去滓不計時候溫服鬼臼鬼臼味辛溫微溫有毒主殺薰毒鬼疰精物辟惡氣不祥逐邪解百毒療咳嗽喉結風邪煩惑失魄妄見去目中膚翳殺大毒不入湯一名爵犀一名馬目毒公一名九臼一名天臼一名解毒生九真山谷及冤句二月八月採根畏垣衣陶隱居云鬼臼如射干白而味甘溫有毒主風邪鬼疰蠱毒九臼相連有毛者良一名九臼生山谷八月採陰乾又似鈎吻今馬目毒公如黃精根臼處似馬眼而柔潤鬼臼似射干术輩有兩種出錢塘近道者味甘上有叢毛最勝出會稽吳興者乃大味苦無叢毛不如略乃相似而乖異毒公今方家多用鬼臼少用毒公不知此郍復頓爾乖越也唐本注云此藥生深山岩石之陰葉如萆麻重樓輩生一莖莖端一葉亦有兩歧者年長一莖莖枯為一臼假令生來二十年則有二十臼豈惟九臼耶根肉皮鬚并似射干今俗用皆是射干及江南别送一物非真者今荆州當陽縣硤州遠安縣襄州荆山縣山中并有之極難得也禹錫等按蜀本圖經云花生莖間赤色今出硤州襄州深山二月八月採根日乾用之藥性論云鬼臼使味苦能主尸疰殗殜勞疾傳尸瘦疾主辟邪氣逐鬼神圖經曰鬼臼生九真山谷及冤句今江寧府滁舒商齊杭襄硤州荆門軍亦有之多生深山岩石之陰葉似萆麻重樓輩初生一莖莖端一葉亦有兩歧者年長一莖莖枯為一臼二十年則二十臼也花生莖間赤色三月開後結實根肉皮鬚并似射干俗用皆是射干當細别之二月八月採根暴乾用古方治五尸鬼疰百毒惡氣方用之一說鬼臼生深山陰地葉六出或五出如雁掌莖端一葉如傘蓋旦時東向及暮則西傾蓋隨日出沒也花紅紫如荔枝正在葉下常為葉所蔽未常見日一年生一葉既枯則為一臼及八九年則八九臼矣然一年一臼生而一臼腐蓋陳新相易也故俗又名曰害母草如芋魁烏頭輩亦然新苗生則舊苗死前年之魁腐矣而本草注謂全似射干今射干體狀雖相似然臼形淺薄大異鬼臼鬼臼如八九天南星側比相疊而色理正如射干要者當使人求苗採之市中不復有也角蒿味辛苦平有小毒主甘濕𧏾諸惡瘡有蟲者唐本注云葉似白蒿花如瞿麥紅赤可愛子似王不留行黑色作角七月八月採唐本先附禹錫等按蜀本圖經云葉似蛇床青蒿等子角似蔓菁實黑細秋熟所在皆有之陳藏器云𦾰蒿味辛溫無毒主破血下氣煮食之似小薊生高岡宿根先於百草一名莪蒿爾雅云莪蘿注𦾰蒿也釋曰詩小雅云菁菁者莪陸機云莪蒿也一名蘿蒿生澤田塹洳處葉似邪蒿而細科生三月中莖可食又可蒸香美味頗似莖蔞蒿雷公云凡使勿用紅蒿并邪蒿二味真似角蒿只是上香角短採得并於槐砧上細銼用之外臺祕要凡齒齦宣露多是疳角蒿取灰夜塗齦上使愼油膩沙糖乾棗切忌之千金方治口中瘡久不瘥入胸中并生瘡角蒿灰塗之一宿效口中若有汁吐之宫氣方治小兒口瘡角蒿灰貼瘡妙衍義曰角蒿莖葉如菁蒿開淡紅紫花花大約徑三四分花罷結角子長二寸許微彎苗與角治口齒絶勝馬兜鈴滁州信州馬兜鈴味苦寒無毒主肺熱咳嗽痰結喘促血痔瘻瘡生關中藤繞樹而生子狀如鈴作四五瓣今附禹錫等按藥性論云馬兜鈴平能主肺氣上急坐息不得主咳逆連連不可日華子云治痔瘻瘡以藥於瓶中燒熏病處入藥炙用是上青木香獨行根子越州七八月採圖經曰馬兜鈴生關中今河東河北江淮夔浙州郡亦有之春生苗如藤蔓葉如山芋葉六月開黃紫花頗類枸杞花七月結實棗許大如鈴作四五瓣其根名雲南根似木香小指大赤黃色亦名土青木香七月八月採實暴乾主肺病三月採根治氣下膈止刺痛雷公云凡使採得後去葉并蔓了用生絹袋盛於東屋角畔懸令乾了擘作片取向裹了去革膜并令淨用子并皮勿令去革膜不盡用之聖惠方治五種蠱毒用兜鈴根三兩為末分為三貼以水一盞煎五分去滓頻服當吐蠱出未快再服以快為度又方草蠱術正因方及嶺南人若行此毒入人咽刺痛欲死者用兜鈴苗一兩為末以溫水調下一錢匕即消化蠱出效外臺祕要崔氏蛇蠱食飲中得之咽中如有物咽不下吐不出悶心熱服兜鈴即吐出又服麝香一錢七即吐蠱毒簡要濟衆治肺氣喘嗽兜鈴二兩只用裏面子去却殼酥半兩入碗內拌和勻慢火炒乾甘草一兩炙二味為末每服一錢水一盞煎六分溫呷或以藥末含咽津亦得衍義曰馬兜鈴蔓生附木而上葉脫時鈴尚垂之其狀如馬項鈴故得名然熟時則自折坼間有子全者採得時須八九月間治肺氣喘急仙茅仙茅味辛溫有毒主心腹冷氣不能食腰腳風冷攣痹不能行丈夫虛勞老人失溺無子益陽道久服通神强記助筋骨益肌膚長精神明目一名獨茅根一名茅瓜子一名婆羅門參仙茅傳云十斤乳石不及一斤仙茅表其功力爾生西域又大庾嶺亦云忌鐵及牛乳二月八月採根今附禹錫等按日華子云治一切風氣延年益壽補五勞七傷開胃下氣益房事彭袓單服法以米泔浸去赤汁出毒後無妨損圖經曰仙茅生西域及大庾嶺今蜀川江湖兩浙諸州亦有之葉青如茅而軟復稍闊面有縱理又似棕櫚至冬盡枯春初乃生三月有花如栀子黃不結實其根獨莖而直傍有短細根相附肉黃白外皮稍粗褐色二月八月採根暴乾用衡山出者花碧五月結黑子謹按續傳信方叙仙茅云主五勞七傷明目益筋力宣而復補本西域道人所傳開元元年婆羅門僧進此藥明皇服之有效當時禁方不傳天寶之亂方書流散上都不空三藏始得此方傳與李勉司徒路嗣恭尚書齊杭給事張建封僕射服之皆得力路公久服金石無效及得此藥其益百倍齊給事守縉雲日少氣力風𤺋繼作服之遂愈八九月時採得竹刀子刮去黑皮切如豆粒米泔浸兩宿陰乾搗篩熟蜜丸如梧子每曰空肚酒飲任使下二十丸禁食牛乳及黑牛肉大减藥力也續傳信方僞唐筠州刺史王顔所著皆因書編録其方當時盛行故今江南但呼此藥為婆羅門參海藥云生西域粗細有筋或如筆管有節文理其黃色多涎梵云呼為阿輸乾阤味甘微溫有小毒主風補暖腰腳清安五臟强筋骨消食久服輕身益顔色自武城來蜀中諸州皆有葉似茅故名曰仙茅味辛平宣而復補無大毒有小熱有小毒主丈夫七傷明耳目益筋力填骨髓益陽不倦用時竹刀切糯米泔浸雷公云凡採得後用清水洗令淨刮上皮於槐砧上用銅刀切豆許大却用生稀布袋盛於烏豆水中浸一宿取出用酒濕拌了蒸從己至亥取出暴乾勿犯鐵器斑人鬚鬢羊桃味苦寒有毒主熛熱身暴赤色風水積聚惡瘍除小兒熱去五藏五水大腹利小便益氣可作浴湯一名鬼桃一名羊腸一名長楚一名御弋一名銚音姚弋生山林川谷及生田野二月採陰乾陶隱居云山野多有甚似家桃又非山桃子小細苦不堪啖花甚赤詩云隰有萇楚者即此也方藥亦不復用唐本注云此物多生溝渠隍塹之間人取煮以洗風癢及諸瘡腫極效劍南人名紐子根也禹錫等按蜀本圖經云生平澤中葉花似桃子細如棗核苗長弱即蔓生不能為樹今處處有多生溪澗今人呼為細子根似牡丹療腫爾雅云長楚銚弋郭云今羊桃也釋云葉似桃花白子如小麥亦似桃陸機云葉長而狹華紫赤色其枝莖弱過一尺引蔓於草上今人以為汲灌重而善沒不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管也陳藏器云味甘無毒主風熱羸老浸酒服之生蜀川川谷中草高一尺葉長小亦云羊桃根也肘後方治傷寒毒攻手足痛煮羊桃汁漬之雜鹽豉尤好鼠尾草鼠尾草味苦微寒無毒主鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下一名葝音勍一名陵翹生平澤中四月採葉七月採花陰乾陶隱居云田野甚多人採作滋染皂又用療下瘻當濃煮取汁令可丸服之今人亦用作飲禹錫等按蜀本圖經云所在下濕地有之葉如蒿莖端夏生四五穗穗若車前有赤白二種花七月採苗日乾用之爾雅云葝鼠尾釋曰可以染皂草也一名鼠尾陳藏器云鼠尾草平主諸痢煮汁服亦末服紫花莖葉堪染皂一名烏草又名水青也圖經曰鼠尾草舊不載所出州土云生平澤中今所在有之惟黔中人採為藥苗如蒿夏生莖端作四五穗穗若車前花有赤白二色爾雅謂葝鼠尾云可以染皂草也四月採葉七月採花陰乾古治痢多用之姚氏云濃煮汁如薄飴飲五合日三赤下用赤花白下用白花瘥聖惠方治久赤白痢不瘥羸瘦用鼠尾草搗為末每服一錢不計時候以粥飲調下女青味辛平有毒主蠱毒逐邪惡氣殺鬼溫瘧辟不祥一名雀瓢蛇銜根也生朱崖八月採陰乾陶隱居云若是蛇銜根不應獨生朱崖俗用是草葉别是一物未詳孰是術云帶此屑一兩則疫癘不犯彌宜識真者唐本注云此草即雀瓢也葉似蘿摩兩葉相對子似瓢形大如棗許也雀瓢根似白藢生平澤莖葉并臭其蛇銜根都非其類又别録云葉嫩時似蘿摩圓端大莖實黑莖葉汁黃白亦與前說相若是蛇銜根何得苗生益州根在朱崖相去萬里餘也别録云雀瓢白汁主蟲蛇毒即女青苗汁也禹錫等按藥性論云女青使味苦無毒能治溫瘧寒熱蛇銜為使圖經曰文具蛇銜條下肘後方辟瘟病正月上寅日搗女青末三角絳囊盛繫前帳中大吉子母祕録治小兒卒腹皮青黑赤不能喘息即急用此方并治吐痢卒死用女青末內口中酒服亦治大人紫虛無君南嶽夫人內傳治卒死搗女青屑一錢安喉中以水或酒送下立活也故麻鞋底水煮汁服之解紫石英發毒又主霍亂吐下不止及解食牛馬肉毒腹脹吐痢不止者今按陳藏器本草云故麻鞋底主消渴煮汁服之鞋綱繩如棗大婦人內衣有血者手大鈎頭棘針二七枚三物并燒作灰以猪脂調傅狐刺瘡出蟲唐本先附禹錫等按陳藏器云破草鞋和人亂髮燒作灰醋和傅小兒熱毒遊腫陳藏器云取麻鞋尖頭二七為灰歲朝井花水服之又主遺溺又故麻鞋底燒令赤投酒煮粟穀汁中服之主霍亂轉筋外臺祕要近效尿床取麻鞋綱帶及鼻根等唯不用底須七量以水七升煮取二升分再服之又方治蜈蚣螫人麻鞋履底炙以揩之即瘥千金方肛脫出以炙麻履底令人頻按永瘥又故麻鞋底鱉頭各一枚燒鱉頭搗為末傅肛門將履底按入即不出也經驗方治鼻塞燒麻鞋灰吹鼻中立通一名千里馬麻鞋名也廣利方治鼻衄血鞋𩍥作灰吹鼻孔中立效劉寄奴草劉寄奴草味苦溫主破血下脹多服令人痢生江南唐本注云莖似艾蒿長三四尺葉似蘭草尖長子似稗而細一莖上有數穗葉互生今按别本注云昔人將此草療金瘡止血為要藥産後餘疾下血止痛極效唐本先附禹錫等按蜀本圖經云葉似菊高四五尺花白實黃白作穗蒿之類也今出越州夏收苗日乾之日華子云劉寄奴無毒治心腹痛下氣水脹血氣通婦人經脉癥結止霍亂水瀉又名劉寄奴六七八月採圖經曰劉寄奴草生江南今河中府孟州漢中亦有之春生苗莖似艾蒿上有四稜高三二尺已來葉青似柳四月開碎小黃白花形如瓦松七月結實似黍而細一莖上有數穗互生根淡紫色似萵苣六月七月採苗花子通而用之雷公云採得後去莖葉只用實凡使先以布拭上薄殼皮令淨拌酒蒸從巳至申出暴乾用之經驗方治湯火瘡至妙劉寄奴搗末先以糯米漿雞翎掃湯著處後摻藥末在上并不痛亦無痕大凡湯著先用鹽末摻之護肉不壞然後藥末傅之骨碎補骨碎補味苦溫無毒主破血止血補傷折生江南根著樹石上有毛葉如菴䕡江西人呼為胡孫薑一名石菴䕡一名骨碎布今附禹錫等按藥性論云骨碎補使能主骨中毒氣風血疼痛五勞六極口手不收上熱下冷悉能主之陳藏器云骨碎補似石韋而一根餘葉生於木嶺南虔吉亦有本名猴薑開元皇帝以其主傷折補骨碎故作此名耳日華子云猴薑平治惡瘡蝕爛肉殺蟲是樹上寄生草苗似薑細長圖經曰骨碎補生江南今淮浙陜西夔路州郡亦有之根生大木或石上多在背陰處引根成條上有黃毛及短葉附之又有大葉成枝面青緑色有黃點背青白色有赤紫點春生葉至冬乾黃無花實惟根入藥採無時削去毛用之本名胡孫薑唐明皇以其主折傷有奇效故作此名蜀人治閃折筋骨傷損取根搗篩煮黃米粥和之裹傷處良又用治耳聾削作細條火炮乘熱塞耳亦入婦人血氣藥用又名石毛薑雷公云凡使採得後先用銅刀刮去上黃赤毛盡便細切用酒拌令潤架柳甑蒸二日後出暴乾用又乾寧記云去毛細切後用生蜜拌蒸從巳至亥準前暴乾搗末用炮猪腎空心喫治耳鳴亦能正諸雜痛靈苑方治虛氣攻牙齒痛血出牙齦癢痛骨碎補二兩細銼炒令黑色杵末依常盥漱後揩齒根下良久吐之臨卧用後睡咽之無妨圖經衍義本草卷之十八
