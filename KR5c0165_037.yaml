front:
  text: 圖經衍義本草卷之三十七嚴四
  hash: sha256:ef03e841f2641ca7253431c831594cead0dc331ca8585790adcb841149f758e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_037-001a, image: hfl/0549/0549-076.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正米穀部上品胡麻胡麻味甘平無毒主傷中虚羸補五内益氣力長肌肉填髓腦堅筋骨療金瘡止痛及傷寒温瘧大吐後虚熱羸困久服輕身不老明耳目耐饑渴延年以作油微寒利大腸胞衣不落生者摩瘡腫生秃髮一名巨勝一名狗虱一名方莖一名鴻藏葉名靑蘘生上黨川澤圖經曰胡麻巨勝也生上黨川澤青蘘巨勝苗也生中原川谷今并處處有之皆園圃所種稀復野生苗梗如麻而葉圓銳光澤嫩時可作蔬道家多食之謹按廣雅云狗虱巨勝也藤苰胡麻也陶隱居云其莖方者名巨勝圓者名胡麻如此巨勝胡麻爲二物矣或云本生胡中形體類麻故名胡麻又八穀之中最爲大勝故名巨勝如此似一物二名也然則仙方乃有服食胡麻巨勝二法功用小别疑本一物而種之有二如天雄附子之類故葛稚川亦云胡麻中有一葉兩莢者爲巨勝是也食甚甘當九蒸曝熬擣之可以斷穀又以白蜜合丸曰靜神丸服之益肺潤五臟壓取油主大熱秘腸結服一合則通利藥性論云葉擣汁沐浴甚良又牛傷熱擣汁灌之立差又患崩中血凝疰者生取一升擣内熱湯中絞取半升立愈巨勝者仙經所重白蜜一升子一升合之名曰靜神丸常服之治肺氣潤五臟其功至多亦能休糧填人骨髓其有益於男子患人虚而吸吸加胡麻用唐本注云此麻以角作八稜者爲巨勝四稜者名胡麻都以烏者良白者劣爾生嚼塗小兒頭瘡及浸淫惡瘡大效禹錫云按吴氏云胡麻一名方金神農雷公甘平無毒秋採青蘘一名夢神抱朴子云巨勝一名胡麻餌服之不老耐風濕新注云胡麻白大豆棗三物同九蒸九曝作團食令人不饑延年斷穀又合蒼耳子爲散服之治風食療云潤五臟主火灼山田種爲四稜土地有異功力同休糧人重之填骨又補虚氣聖惠方治五臟虚損羸瘦益氣力堅筋骨巨勝蒸曝各九遍每取二合用湯浸布裹挼去皮再研水濾取汁煎和粳米煮粥食之外臺秘要治手脚酸疼兼微腫烏麻五升碎之酒一升浸一宿隨多少飲千金方常服明目洞視胡麻一石蒸之三十遍末酒服每日一升又方治腰脚疼痛胡麻一升新者熬令香杵篩日服一大升許一升即永差酒飲羹汁蜜湯皆可服之經驗後方治暑毒救生散新胡麻一升内炒令黑色取出攤冷碾末新汲水調三錢七或丸如彈子新水化下凡著熱外不得以冷物逼外得冷即死修眞秘㫖神仙服胡麻法服之能除一切痼病至一年面光澤不饑三年水火不能害行及奔馬久服長生上黨者尤佳胡麻二斗淨淘上甑蒸令氣遍出日乾以水淘去沫即蒸如此九度以湯脱去皮簸令淨炒令香杵爲末蜜丸如彈子大每温酒化下一丸忌毒物生菜等續齊諧記漢明帝永平十五年中剡縣有劉晨阮肇二人入天台山採藥迷失道路忽逢一溪過之過遇二女以劉阮姓名呼之如舊識耳曰郞等來何晚耶遂邀之過家設胡麻飯以延之故唐詩有云御羹和石高香飯進胡麻衍義曰胡麻諸家之說參差不一止是今脂麻更無他義蓋其種出於大宛故言胡麻今胡地所出者皆肥大其紋鵲其色紫黑故如此區别取油亦多故詩云松下飯胡麻此乃是所食之穀無疑與白油麻爲一等如川大黄川當歸川升麻上黨人參齊州半夏之類不可與他土者更爲二物蓋特以其地之所宜立名也是知胡麻與白油麻爲一物嘗官於順安軍雄霸州之間備見之又二條皆言無毒治療大同今之用白油麻世不可一日闕也然亦不至於大寒宜兩審之青蘘味甘寒無毒主五臟邪氣風寒濕痹益氣補腦髓堅筋骨久服耳目聰明不饑不老增壽巨勝苗也生中原川谷圖經曰文具胡麻條下陶隱居云胡麻葉也甚肥滑亦可以沐頭但不知云何服之仙方并無用此法正當陰乾搗爲丸散旣服其實故不復假苗五符巨勝丸方亦云葉名靑蘘本生大宛度來千年爾唐本注云青蘘本經在草部上品中旣堪食今從胡麻條下衍義曰靑蘘即油麻葉也陶隱居注亦曰胡麻葉也胡地脂麻鵲色子頗大日華子云葉作湯沐潤毛髮乃是今人所取胡麻葉以湯浸之良乆涎出湯遂稠黄色婦人用之梳髮由是言之胡麻與白油麻今之所謂脂麻者是矣青蘘即其葉也麻蕡麻蕡味辛平有毒主五勞七傷利五臟下血寒氣破積止痹散膿多食令人見鬼狂走久服通神明輕身一名麻勃此麻花上勃勃者七月七日採良麻子味甘平無毒主補中益氣中風汗出逐水利小便破積血復血脉乳婦産後餘疾長髮可爲沐藥乆服肥健不老神仙九月採入土者損人生太山川谷畏牡蠣白薇惡茯苓圖經曰麻蕡麻子生太山川谷今處處有皆園圃所蒔績其皮以爲布者麻蕡一名麻勃麻上花勃勃者七月七日採麻子九月採入土者不用陶隱居以麻蕡爲牡麻牡麻則無花蘇恭以爲即實非花也又引爾雅賁枲實及禮云苴麻之有蕡者皆謂蕡爲子也謂陶重出子條爲誤按本經麻蕡主七傷利五臟多食令人狂走觀古今方書用麻子所治亦爾又麻花非所食之物如蘇之論似當矣然朱子云麻蕡味辛麻子味甘此又似二物疑本草與爾雅禮記有稱謂不同者耳又古方亦有用麻花者云味苦主諸風及女經不利以䗪蟲爲使然則蕡也子也花也其三物乎其葉與桐葉合搗浸水沐髮令長潤皮靑淋湯濯瘀血根煮汁冷服主下血不止今用麻人極難去殻醫家多以水浸經三兩日令殻破曝乾新瓦上擂取白用藥性論云麻花白麻是也味苦微熱無毒能治一百二十種惡風黑色遍身苦癢逐諸風惡血主女人經候不通䗪蟲爲使又葉沐髮長潤靑麻湯淋瘀血又主下血不止陶隱居云麻蕡即牡麻牡麻則無實今人作布及履用之麻勃方藥亦少用術家合人參服令逆知未來事其子中人合丸藥并釀酒大善然而其性滑利麻根汁及煮飲之亦主瘀血石淋禹錫云按爾雅云黂枲實釋曰枲麻也麻蕡子也儀禮注苴麻之有黂者又禹貢青州厥貢岱畎絲枲是也又曰荸麻釋曰苴麻之盛子者也一名荸一名麻母日華子云大麻補虚勞逐一切風氣長肌肉益毛髮去皮膚頑痹下水氣及下乳止消渇催生治横逆産陳士良云大麻人主肺臟潤五臟利大小便疏風氣不宜多食損血脉滑精氣痿陽氣婦人多食發帶疾食療云微寒治大小便不通髮落破血不饑能寒取汁煮粥去五臟風潤肺治關節不通髮落通血脉治氣青葉甚長髮研麻子汁沐髮即生長麻子一升白羊脂七兩蠟五兩白蜜一合和杵蒸食之不饑洞神經又取大麻日中服子末三升東行茱萸根剉八升漬之平旦服之二升至夜蟲下要見鬼者取生麻子菖蒲鬼臼等分杵爲丸彈子大每朝向日服一丸服滿百日即見鬼也聖惠方治生眉毛用七月烏麻花陰乾爲末生烏麻油浸每夜傅之外臺秘要治瘰癧七月七日出時收麻花五月五日收葉二件作炷子於癧上灸百壯又方治虚勞下焦虚熱骨節煩疼肌肉急小便不利大便數少吸吸口燥少氣淋石熱大麻人五合研水二升煮去半分服四五劑差千金方治髮落不生令長麻子一升熬黑壓油以傅頭長髮妙又方治風癲百病麻人四升水六升猛火煮令牙生去滓煎取七升旦空心服或發或不發或多狂語勿怪之但人摩手足須定凡進二劑愈又方主産後血不去麻子五升酒一升漬一宿明旦去滓温服一升先食不差方再服一升不吐不下不得與男子通一月將養如初差肘後方治淋下血麻根十枚水五升煮取二升一服血止神驗食醫心鏡治風水腹大臍腰重痛不可轉動冬麻子半升碎水研瀘取汁米二合以麻子汁煮作稀粥著葱椒薑豉空心服之又方主五淋小便赤少莖中疼痛冬麻子一升杵研瀘取汁二升和米三合煮粥著葱椒薑豉煮空心服之新續十全方令易産大麻根三莖水一升煎取半升頓服立産衣不下服之亦下子母秘録産後穢污不盡腹滿麻子三兩酒五升煮取一升分温二服當下惡物又方治小兒赤白痢多體弱不堪大困重者麻子一合炒令香熟末服一錢七蜜漿水和服立效白油麻白油麻大寒無毒治虚勞滑腸胃行風氣通血脉主頭浮風潤肌食後生啖一合終身不輟與乳母食其孩子永不病生若客熱可作飲汁服之停乆者發霍亂又生嚼傅小兒頭上諸瘡良乆食抽人肌肉生則寒炒則熱又葉擣和漿水絞去滓沐髮去風潤髮其油冷常食所用也無毒發冷疾滑骨髓發臟腑渴困脾臟殺五黄下三焦熱毒氣通大小腸治蛔心痛傅一切瘡疥癬殺一切蟲取油一合雞子兩顆芒消一兩攪服之少時即瀉治熱毒甚良治飲食物須逐日熬熟用經宿即動氣有牙齒并脾胃疾人切不可吃陳者煎膏生肌長肉止痛消癰腫補皮裂油麻本經舊不著條然古醫方多用之無毒滑腸胃行風氣久食消人肌肉生則寒炒熟則熱仙方蒸以辟穀壓笮爲油大寒發冷疾滑精髓發臟腑渴令人脾困然治癰疽熱病近效方婆羅門僧療大風疾并壓丹石熱毒熱風手脚不遂用消石一大兩生爲麻油二大升合内鐺中以土墼蓋口以紙泥固濟勿令氣出細進火煎之其藥未熟時氣腥候香氣發即熟更以生油麻二大升和合又微火煎之以意斟量得所即内不津器中服法患大風者用火爲使在室中重作小紙屋子外然火令患人在紙屋中發汗日服一大合病人力壯日二服服之三七日頭面疱瘡皆滅外臺秘要治胸喉間覺有癥蟲上下偏聞葱豉食香此是髮蟲油煎葱豉令香二日不食張口而卧將油葱豉致口邊蟲當漸出徐徐以物引去之經驗後方治蚰蜒踟蛛子咬人用油麻研傅之差孫眞人同斗門方治産後脫腸不收用油五斤煉熟以盆盛後温却令産婦坐油盆中約一頓飯久用皂角炙令脆去麤皮爲末少許吹入鼻中令作嚏立差神效衍義曰白油麻與胡麻一等但以其色言之比胡麻差淡亦不全白今人止謂之脂麻前條已具炒熟乘熱壓出油而謂之生油但可點照須再煎煉方謂之熟油始可食復不中點照亦一異也如鐵自火中出而謂之生鐵亦此義也飴糖糖味甘微温主補虚乏止渴去血飴音貽陶隱居云方家用飴糖乃云膠飴皆是濕糖如厚蜜者建中湯多用之其凝强及牽白者不入藥今酒麴糖用糵猶同是米麥而爲中上之異糖當以和潤爲優以醺亂爲劣也食療云主吐血健脾凝强者爲良主打損瘀血熬令焦和酒服之能下惡血又傷寒大毒軟於蔓菁薤汁中煮一沸頓服之外臺秘要誤吞錢取飴糖一斤漸漸盡食之環及釵便出肘後方魚骨哽在喉中衆法不能去飴糖丸如鷄子黄大吞之不出大作丸用妙衍義曰飴糖即餳是也多食動脾風今醫家用以和藥糯與粟米作者佳餘不堪用蜀黍米亦可造不思食人少食之亦使脾胃氣和唐白樂天詩一楪較牙餳者是此圖經衍義本草卷之三十七
