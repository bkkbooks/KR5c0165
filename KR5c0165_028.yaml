front:
  text: 圖經衍義本草卷之二十八曰三
  hash: sha256:e822cf889fba84ac3957ed27a95e432393fb43b0a5f2cf5239f579892079445b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_028-001a, image: hfl/0545/0545-084.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正獸部中品鹿鹿茸味甘酸温微温無毒主漏下惡血寒熱驚癇益氣强志主齒不老療虚勞洒洒如瘧羸瘦四肢酸疼腰脊痛小便利泄精溺血破留血在腹散石淋癰腫骨中熱疽養骨安胎下氣殺鬼精物不可近陰令痿久服耐老四月五月解角時取陰乾使時燥麻勃爲之使角味鹹無毒主惡瘡癰腫逐邪惡氣留血在陰中除小腹血急痛腰脊痛折傷惡血益氣七月採杜仲爲之使髓味甘温主丈夫女子傷中絶脉筋急痛咳逆以酒和服之良腎平主補腎氣肉温補中强五臟益氣力生者療口僻割薄之圖經曰鹿茸并角本經不載所出州土今有山林處皆有之四月角欲生時取其茸陰乾以形如小紫茄子者爲上或云茄子茸太嫩血氣猶未具不若分歧如馬鞍形者有力茸不可嗅其氣能傷人鼻七月採角鹿年歲久者其角堅好煮以爲膠入藥彌佳今醫家多貴麋茸麋角力緊於鹿本經自有麋脂角條在下品陶隱居云野肉之中獐鹿可食生不膻腥又非辰屬八卦無主而兼能温補於人即生死無尤故道家許聽爲脯過其餘肉雖牛羊鷄犬補益充肌膚於亡魂皆爲愆責并不足噉唐本注云鹿茸夏收陰乾百不收一縱得一乾臭不任用破之火乾大好頭主消渴煎之可作膠服之彌善筋主勞損續絶骨主虚勞可爲酒主風補虚髓脂主癰腫死肌温中孟詵云鹿茸主益氣不可以鼻嗅其茸中有小白蟲視之不見入人鼻必爲蟲顙藥不及也角錯爲屑白蜜五升淹之微火熬令小變暴乾更搗篩服之令人輕身益氣强骨髓補絶傷又婦人夢與鬼交者鹿角末三指一撮和清酒服即出鬼精又女子胞中餘血不盡欲死者以清酒和鹿角灰服方寸匕日三夜一甚效鹿頭肉主消渴夜夢見物又蹄肉主脚膝疼痛肉主補中益氣内又生肉主中風口偏不正以生椒同搗傅之專看正即速除之九月以後正月以前堪食之也日華子云鹿茸補虚羸壯筋骨破瘀血殺鬼精安胎下氣酥炙入用角療患瘡癰腫熱毒等醋摩傅脱精尿血夜夢鬼交并治之水摩服小兒重舌鵝口瘡炙熨之髓治筋骨弱嘔吐地黄汁煎作膏填骨髓蜜煮壯陽令有子腎補中安五臟壯陽氣作酒及煮粥服肉無毒補益氣助五臟生肉貼偏風左患右貼右患左貼頭肉治煩憊多夢蹄治脚膝痠又血治肺痿吐血及崩中帶下和酒服之良禹錫云按藥性論云鹿茸君味苦辛主補男子腰腎虚冷脚膝無力夜夢鬼交精溢自岀女人崩中漏血炙末空心温酒服方寸七又主赤白帶下入散用鹿骨味甘微熱無毒鹿角温微温鹿髓無毒雷公云凡使先以天靈蓋作末然後鋸解鹿茸作片子以好羊脂拌天靈蓋末塗之於鹿茸上慢火炙之令内外黄脆了用鹿皮一片裹之安室上一宿其藥魂歸也至明則以慢火焙之令脆方搗作末用之每五兩鹿茸用羊脂三兩炙盡爲度又制法用黄精自然汁浸兩日夜了漉出焙令乾細搗用免渴人也鹿角補陽勝如麋角其角要黄色緊重尖好者縁此鹿食靈草所以異其衆鹿其麋角頂根上有黄色毛若金綫兼傍生小尖色蒼白者上注乾寧記云鹿與遊龍相戲生此異角聖惠方治腎氣虚損耳聾用鹿腎一對去脂膜切於豉汁中入粳米二合和煮粥入五味如法調和空腹食之作羹及酒并得外臺秘要治消腎小便數鹿角一具炙令焦搗篩酒服方寸七漸漸加至一七半百一方若男女喜夢與鬼交通致恍惚者方截鹿角屑三指撮日二服酒下食療同梅師方治卒腰痛暫轉不得鹿角一枚長五寸酒二升燒鹿角令赤納酒中浸一宿飲之兵部手集療妬乳硬欲結膿令消取鹿角於右上磨取白汁塗乾又塗不得手近并以人嗍却黄水一日許即散産寳方治妊娠卒腰痛方以鹿角截五寸燒令爛赤納酒一大升中浸之冷又燒赤又浸如此數過細研空心酒調鹿角末方寸七服衍義曰鹿茸他獸肉多屬十二辰及八卦昔黄帝立子丑等十二辰以名月又以名獸配十二辰屬故獐鹿肉爲肉中第一者避十二辰也味亦勝他肉三祀皆以鹿脂其義如此茸最難得不破及不出却血者蓋其力盡在血中獵時多有損傷故也茸上毛先薄以酥塗匀於烈焰中急灼之若不先以酥塗恐火焰傷茸俟毛淨微炙入藥今人亦能將麻茸僞爲之不可不察也頭亦可釀酒然須作漿時稍益葱椒角爲膠别有法按月令冬至一陽生麋角解夏至一陰生鹿角解各逐陰陽分合如此解落今人用麋鹿茸作一種殆疏矣凡麋鹿角自生至堅完無兩月之久大者二十餘斤其堅如石計一書夜須生數兩凡骨之類成長無速於此雖草木至易生亦無能及之豈可與凡骨血爲比麋茸利補陽鹿茸利補陰凡用茸無太嫩惟長四五寸茸端如馬瑙紅者佳須佐他藥有功白馬莖味鹹甘平無毒主傷中脉絶陰不起强志益氣長肌肉肥健生子小兒驚癇陰乾百日眼主驚癇腹滿瘧疾當殺用之懸蹄主驚邪瘛瘲乳難辟惡氣鬼毒蠱疰不祥止衂血内漏齲齒生雲中平澤白馬蹄療婦人瘻下白崩赤馬蹄療婦人赤崩齒主小兒驚癇鬐頭膏主生髮鬐毛主女子崩中赤白心主喜忘肺主寒熱小兒莖痿禹錫等今詳莖痿非小兒之疾二字必誤肉味辛苦冷主熱下氣長筋强腰脊壯健强志輕身不饑脯療寒熱痿痹屎名馬通微温主婦人崩中止渴及吐下血鼻衄金創止血頭骨主喜眠令人不睡溺味辛微寒主消渴破癥堅積聚男子伏梁積疝婦人瘕疾銅器承飲之圖經曰文具羖羊角條下陳藏器云馬肉及血有小毒食之當飲美酒即解婦人懷妊不得食馬驢騾爲其十二月胎騾又不産馬頭骨於水上流浸之則無水蜞又埋安午地令宜蠶凡收白馬莖當以遊牝時力勢正强者生取得爲良馬牙燒作灰唾和緋帛貼於腫上根出屎絞取汁主傷寒時疾服之當吐下亦主産後諸血氣及時行病起合陰陽垂死者并温服之用馬屎及溺當以白者最良禹錫云按藥性論云白馬莖使味鹹能主男子陰痿堅長房中術偏要通用藥云馬眼平馬懸蹄平馬蹄甲平馬鬐膏平馬頭骨微寒按孟詵云白馬莖益丈夫陰氣陰乾者末和茯苓蜜丸空腹酒下四十丸日再百日見效懸蹄主驚癇赤馬蹄主辟温瘧馬心患痢人不得食馬肉有小毒不與倉米同食必卒得惡十有九死與薑同食生氣嗽其肉多著浸洗方煮得爛熟兼去血盡始可煮炙肥者亦然不爾毒不出患丁腫中風疼痛者炒驢馬糞熨瘡滿五十遍極效男子患未可及新差後合陰陽垂至死取白馬糞五升絞取汁好器中盛停一宿一服三合日夜二服按日華子云馬齒水磨治驚癇肉只堪煮餘食難消不可多食食後以酒投之皆須好清水搦洗三五遍即可煮食之懷娠人及患痢人并不可食忌蒼耳生薑又鬃燒灰止血并傅惡瘡頭骨治多睡作枕枕之燒灰傅頭耳瘡佳尿洗頭瘡白秃按蜀本注云諸筋肉非十二月採者并宜火乾之雷公云要馬無病嫩身如銀春收者最妙臨用以銅刀劈破作七片將生羊血拌蒸半日出曬乾以粗布拭上皮并乾羊血了細剉用也又馬自死肉不可食五月勿食傷神兵部手集多年惡瘡不差或痛癢生釁爛研馬糞并齒傅上不過三兩遍良武相在蜀自脛有瘡癢不可忍得此方便差劉涓子治被打腹中瘀血白馬蹄燒烟盡取灰末酒服方寸七日三夜一亦治婦人血病牛角鰓下閉血瘀血疼痛女人帶下血燔之味苦無毒水牛角療時氣寒熱頭痛髓補中填骨髓久服增年髓味甘温無毒主安五臟平三焦温骨髓補中續絶傷益氣止泄痢消渴以酒服之膽可丸藥膽味苦大寒除心腹熱渴利口焦燥益目精心主虚忘肝主明目腎主補腎氣益精齒主小兒牛癇肉味甘平無毒主消渴止吐泄安中益氣養脾胃自死者不良屎寒主水腫惡氣用塗門户著壁者燔之主鼠瘻惡瘡黃犍牛烏牯牛溺主水腫腹脹脚滿利小便圖經曰文具前卷牛黄條下藥性論云黄牛角鰓灰臣味苦甘無毒性澀能止婦人血崩不止赤白帶下止冷痢瀉血水牛角平青牛膽苦無毒主消渴利大小腸臘月牯牛膽中盛黑豆一百粒後一百日開取食後夜間吞二七枚鎭肝明目黑豆盛浸不計多少陶隱居云此牛亦𤚩牛爲勝青牛最良水牛爲可充食爾自死謂疫死肉多毒青牛腸不可共犬肉犬血食之令人成病也日華子云水牛肉冷微毒角煎治熱毒風并壯熱角鰓燒焦治腸風瀉血痢崩中帶下水瀉涎止反胃嘔吐治噎要取即以水洗口後鹽塗之則便吐出黄牛肉温微毒益腰脚大都食之發藥毒動病不如水牛也惟酥乳佳骨髓温無毒治吐血鼻洪崩中帶下腸風瀉血并水瀉燒灰用禹錫云按蜀本云沙牛角鰓味苦温無毒主下閉瘀血女子帶下下血燒以爲灰煖酒服之孟詵云黑牛髓和地黄汁白蜜等分作煎服治瘦病烏牛糞爲上又小兒夜啼取乾牛糞如手大安卧席下勿令母知子母俱吉食療云肚主消渴風眩補五臟醋煮食之肝治痢腎主補腎髓安五臟平三焦温中久服增年以酒送之和地黄汁白蜜作煎服之治瘦病孫眞人云主癰發數處取牛糞燒作灰以雞子白和傅之乾即易外臺秘要大病後不足病虚勞補虚取七歲已下五歲已上黄牛乳一升水四升煎取一升如人饑稍稍飲不得多十日服不住佳肘後方風毒脚氣若脛已滿捻之没指但勤飲烏牸牛溺二三升使小便利漸漸消當以銅器取新者爲佳純黃者亦可用又方治患癰腫未成膿取牛耳中垢封之愈經驗方痔漏張用方犍牛兒膽猬膽各一個用膩粉五十文麝香二十文將猬膽汁膩粉麝香和匀入牛膽内懸於檐前四十九日熟旋取爲丸如大麥用急脚送入瘡内後追出惡物是驗瘡口漸合生麫蓋瘡内一遍出惡物子母秘録治血氣逆心煩悶滿心痛燒水牛角末酒服方寸七産書主難産牛糞中大豆一枚擘作兩片一片書父一片書子却合以少水吞之立産衍義曰牛角鰓此則黃牛角鰓用尖燒爲黑灰微存性治婦人血崩大便血及冷痢又白水牛鼻乾濕皆可用治偏風口斜以火炙熱於不患處一邊熨之漸正羖羊羖羊角味鹹苦温微寒無毒主青盲明目殺疥蟲止寒泄辟惡鬼虎狼止驚悸療百節中結氣風頭痛及蠱毒吐血婦人産後餘痛燒之殺鬼魅辟虎狼久服安心益氣輕身生河西川谷取無時勿使中濕濕即有毒菟絲爲之使羊髓味甘温無毒主男女傷中陰氣不足利血脉益經氣以酒服之青羊膽主青盲明目羊肺補肺主咳嗽羊心主憂恚膈氣羊腎補腎氣益精髓羊齒主小兒羊癇寒熱三月三日取之羊肉味甘大熱無毒主緩中字乳餘疾及頭腦大風汗出虚勞寒冷補中益氣安心止驚羊骨熱主虚勞寒中羸瘦羊屎燔之主小兒泄痢腸鳴驚圖經曰羖羊角出河西川谷今河東陜西及近都州郡皆有之此謂青羝羊也餘羊則不堪取無時勿使中濕濕則有毒羊齒骨及五臟皆温平而主疾惟肉性大熱時疾初愈百日内不可食食之當復發及令人骨蒸也羊屎方書多用近人取以内鯽魚腹中瓦缶固濟燒灰以塗髭髮令易生而黑甚效乳療蜘蛛咬遍身生絲者生飲之即愈前條有白馬陰莖眼蹄白馬懸蹄赤馬蹄齒鬐頭膏鬐毛心肺肉脯頭骨屎溺及牡狗陰莖膽心腦齒四蹄白狗血肉屎中骨本經并有主治惟白馬莖眼懸蹄用出雲中平澤者餘無所出州土今醫方多用馬通即馬屎也及狗膽其餘亦稀使故但附見於下陶隱居云羖羊角方藥不甚用其餘皆入湯煎羊有三四種最以青色者爲勝次則烏羊其䍲羺羊及虜中無角羊正可啖食之爲藥不及都下者其乳髓則肥好也羊肝不可合猪肉及梅子小豆食之傷人心大病人唐本注云羊角以青羝爲佳餘不藥用也羊膽療疳時行熱熛瘡和醋服之良羊肺療渴止小便數并小豆葉煮食之良羊腎合脂爲羹療勞痢甚效蒜齏食脂一升療癥瘕羊肉熱病差後食之發熱殺人日華子云牯羊角退熱治山瘴溪毒燒之去蛇心有孔者殺人腎補虚耳聾陰弱壯陽益胃止小便治虚損盜汗羊肉治腦風并大風開胃肥健頭凉治骨蒸腦熱頭眩明目小兒驚癇脂治遊風并黑䵟牯羊糞燒灰治䁎耳并罯刺禹錫云按藥性論云羖羊角使治産後惡血煩悶燒灰酒服之又主輕身治小兒驚癇又曰青羊角亦大寒青羊膽平青羊肝服之明目膽點眼中主赤障白膜風泪主解蟲毒外臺秘要崔氏療傷寒手足疼欲脱取羊屎煮汁以灌之差止亦療時疾陰囊及莖熱腫亦可煮黃檗等洗之并除傷寒之疾又方治小兒疳羊膽二個和漿水灌下部猪膽亦得千金方療尿床方羊肚盛水令滿繫兩頭熟煮開取水頓服之即差肘後方療面多皯𪒟如雀卵色以羖羊膽一個酒二升合煮三沸以塗拭之日三度差聖惠方治風心煩恍惚腹中痛或時悶絶而復蘇用羖羊角屑微炒搗羅爲末不計時候温酒調下一錢七又方治硫黄忽發氣悶用羊血服一合梅師方治産後餘血攻心或下血不止心悶面青身冷氣欲絶新羊血一盞飲之三兩服妙食醫心鏡主風眩羸瘦小兒驚癇丈夫五勞手足無力羊頭一枚炮洗如法蒸熟切以五味調和食之又主腎勞損精竭炮羊腎一雙去脂細切於豉汁中五味米揉如常法作羹食粥亦得衍義曰羖羊角出陜西河東謂之𦍩䍽羊尤狼健毛最長而厚此羊可入藥如要食不如無角白大羊本草不言者亦有所遺爾又同華之間有卧沙細肋其羊有角似羖羊但低小供饌在諸羊之上張仲景治寒疝用生薑羊肉湯服之無不驗又一婦人産當寒月寒氣入産門臍下脹滿手不敢犯此寒疝也醫將治之以抵當湯謂其有瘀血嘗教之曰非其治也可服張仲景羊肉湯少减水二服遂愈牡狗陰莖味鹹平無毒主傷中陰痿不起令强熱大生子除女子帶下十二疾一名狗精月上伏取陰乾百日膽主明目痂瘍惡瘡心主憂恚氣除邪腦主頭風痹下部𧏾瘡鼻中息肉齒主癲癇寒熱卒風痱伏日取之頭骨主金瘡止血四脚蹄煮飲之下乳汁白狗血味鹹無毒主癇疾發作肉味鹹酸温主安五臟補絶傷輕身益氣屎中骨主寒熱小兒驚癇圖經曰文具羖羊角條下日華子云犬陰治絶陽及婦人陰瘻膽主撲損瘀血刀箭瘡心治狂犬咬除邪氣風痹療鼻衂及下部齒理小兒客忤燒入用頭骨燒灰用亦壯陽黄者佳血補安五臟犬黄者大補益餘色微補古言署預凉而能補犬肉暖而不補雖有此言服終有益然奈穢甚不食者衆禹錫云按通用藥云狗膽平狗齒平狗頭骨平狗四足平白狗血温按藥性論云狗膽亦可單用味苦有小毒主鼻齆鼻中息肉狗頭骨使燒灰爲末治久痢勞痢和乾薑莨著焦炒見烟爲丸白飲空心下十丸極效孟詵云膽去腸中膿水又白犬膽和通草桂爲丸服令人隱形青大尤妙犬肉益陽事補血脉厚腸胃實下焦填精髓不可炙食恐成消渴但和五味煮空腹食之不與蒜同食必頓損人若去血則力少不益人瘦者多是病不堪食聖惠方治女人赤白帶下乆不止用狗頭燒灰爲細散每日空心及食前温酒調下一錢七外臺秘要治馬鞍瘡狗牙灰醋和傅之又五月五日取牡狗糞燒灰傅之良楊氏産乳妊娠不得食狗肉令兒無聲羚羊羚羊角味鹹苦寒微寒無毒主明目益氣起陰去惡血注下辟蠱毒惡鬼不祥安心氣常不魘寐療傷寒時氣寒熱熱在肌膚温風注毒伏在骨間除邪氣驚夢狂越僻謬及食噎不通久服强筋骨輕身起陰益氣利丈夫生石城山川谷及華陰山採無時圖經曰羚羊角出石城山谷及華陰山今秦隴龍蜀金商州山中皆有之戎人多捕得來貨其形似羊色青而大其角長一二尺有節如人手指握痕又至堅勁今入藥者皆用此角陶隱居云今出建平宜都諸蠻中及西域多兩角一角者爲勝角甚多節蹙蹙園繞别有山羊角極長惟一邊有節節亦疏大不入藥用爾雅名羱羊而羌夷云只此名羚羊角甚能陟峻短角者乃是山羊爾亦未詳其正陳藏器云羚羊角主溪毒及驚悸煩悶卧不安心胸間惡氣毒瘰癧肉主蛇咬惡瘡山羊山驢羚羊三種相似醫工所用但信市人遂令湯丸或致乖舛且羚羊有神夜宿以角挂樹不著地但取角彎中深鋭緊小猶有挂痕者即是眞慢無痕者非作此分别餘無他異眞角耳邊聽之集集鳴者良陶云一角者繆也禹錫云按藥性論云羚羊角臣味甘能治一切熱毒風攻注中惡毒風卒死昏亂不識人散産後血上心煩悶燒末酒服之主小兒癇治山瘴能散惡血燒灰治噎塞不通孟詵云羚羊北人多食南人食之免爲蛇蟲所傷和五味子炒之投酒中經宿飲之治筋骨急强中風又角主中風筋攣附骨疼痛生磨和水塗腫上及惡瘡良又卒熱悶屑作末研和少蜜服亦治熱毒痢及血痢雷公云凡所用亦有神羊角其神羊角長有二十四節内有天生木胎此角有神力可抵千牛之力也凡修事之時勿令單角不復有驗須要不拆元對以繩縛之將鐵錯子錯之旋旋取用勿令犯風錯末盡處須三重紙裹之恐力散也錯得了即單擣擣盡背風頭重篩過然入藥中用之老更研萬匝了用之更妙免刮人腸也千金方治産後心悶不識人汗出羚羊角燒末以東流水服方寸七未差再服肘後方血氣逆心煩滿燒羚羊角若水羊角末水服方寸七子母秘録治胸脅痛及腹痛熱滿燒羚羊角末水服方寸七衍義曰羚羊角今皆取有挂痕者陳藏器取耳邊聽之集集鳴者良亦强出此說未嘗遍試也今將他角附耳皆集集有聲不如有挂痕一說盡矣然多僞爲之不可不察也犀角犀角味苦酸鹹寒微寒無毒主百毒蠱痋邪鬼瘴氣殺鈎吻鴆羽蛇毒除邪不迷惑魘寐療傷寒温疫頭痛寒熱諸毒氣久服輕身駿健生永昌山谷及益州松脂爲之使惡雚菌雷丸圖經曰犀角出永昌山谷及益州今出南海者爲上黔蜀者次之犀似牛猪首大腹痹脚脚有三蹄色黑好食棘其皮每一孔皆生三毛頂一角或云兩角或云三角謹按郭璞爾雅注云犀三角一在頂上一在額上一在鼻上鼻上者即食角也小而不橢亦有一角者嶺表録異曰犀有二角一在頂上爲兕犀一在鼻上爲胡帽犀牯犀亦有二角皆爲毛犀而今人多傳一角之說此數種俱有粟文以文之粗細爲貴賤角之貴者有通天花文犀有此角必自惡其影常飲濁水不欲照見也其文理絶好者則有百物之形或云犀之通天者是其病理不可知也又有倒插者有正插者有腰插者一半以下通正插者一半以上通腰鼓插者中斷不通其類極多足爲奇異藥性論云牯犀角君味甘有小毒能辟邪精鬼魅中惡毒氣鎭心神解大熱散風毒能治發背癰疽瘡腫化膿作水主療時疾熱如火煩悶毒入心中狂言妄語陶隱居云今出武陵交州寧州諸遠山犀有二角以額上者爲勝又有通天犀角上有一白縷直上至端此至神驗或云是水犀角出水中漢書所云駭雞犀者以置米中雞皆驚駭不敢啄又置屋中烏鳥不敢集屋上又云通天犀者夜露不濡以此知之凡犀見成物皆被蒸煮不堪入藥惟生者爲佳雖是犀片亦是已經煮炙况用屑乎又有牸犀其角甚長文理亦似犀不堪藥用陳藏器云犀肉主諸蠱蛇獸咬毒功用劣於角本經有通天犀且犀無水陸二種并以精粗言之通天者腦上角千歲者長且鋭白星徹端能出氣通天則能通神可破水駭鷄故曰通天抱朴子曰通天犀有白理如綫者以盛米鷄即駭矣其眞者刻爲魚銜入水水開三尺其鼻角一名奴角一名食角日華子云犀角味甘辛治心煩止驚安五臟補虚勞退熱消痰解山瘴溪毒鎭肝明目治中風失音熱毒風時氣發狂禹錫云按陳藏器云爾雅云兕似牛一角犀似豕三角復云多似象復如豕三角陶據爾雅而言不知三角之誤也又云雌者是兕而形不同未知的實雷公云凡使勿用奴犀牸犀病水犀攣子犀下角犀淺水犀無潤犀要使烏黑肌麤皺坼裂光潤者上凡修治之時錯其屑入臼中搗令細再入鉢中研萬匝方入藥中用之婦人有妊勿服能消胎氣凡修治切角大忌鹽也食療云此只是山犀牛未曾見人得水犀取其角此兩種者功亦同矣其生角寒可燒成灰治赤痢研爲末和水服之又主卒中惡心痛諸飲食中毒及藥毒熱毒筋骨中風心風煩悶皆差又以水磨取汁與小兒服治驚熱鼻上角尤佳肉微温味甘無毒主瘴氣百毒蠱疰邪鬼食之入山林不迷失其路客熱頭痛及五痔諸血痢若食過多令人煩即取麝香少許和水服即散也聖惠方治雉肉作臛食之吐下用生犀角末方寸七新汲水調下即差外臺秘要服藥過劑及中毒煩悶欲死燒犀角末水服方寸七千金方有蠼螋蟲尿人影著處便令人體病瘡其狀如粟粒累累一聚滲痛身中忽有處燥痛如芒剌亦如刺蟲所螫後細瘡㿔作叢如茱萸子狀也四畔赤中央有白膿如黍粟亦令人皮急舉身惡寒壯熱極者連起竟腰脅胸也治之法初得磨犀角塗之止抱朴子鄭君言但習閉氣至千息久久則能居水中一日許得眞通天犀角三寸以上者刻爲魚銜之入水水常爲開方三尺可得氣息水中又通天犀赤理如綖自本徹末以角盛米著地群雞不敢啄而轉驚故南人名爲駭鷄犀是故有蟲毒之鄉於他家飲食即以角攪之白沫竦起即爲有毒無沫即無毒也衍義曰犀角凡入藥須烏色未經湯水浸煮者故曰生犀川犀及南犀紋皆細烏犀尚有顯紋者露黄犀紋絶少皆不及西番所出紋高兩脚顯也物像黄外黑者爲正透物像黑外黄者爲倒透蓋以烏爲正以形像肖物者爲貴既曰通犀又須紋頭顯黄黑分明透不脱有兩脚滑潤者爲第一鹿取茸犀取尖其精鋭之力盡在是矣犀角尖磨服爲佳若在湯散則屑之西蕃者佳虎虎骨主除邪惡氣殺鬼疰毒止驚悸主惡瘡鼠瘻頭骨尤良膏主狗嚙瘡爪辟惡魅肉主惡心欲嘔益氣圖經曰虎骨并晴爪本經不載所出州土今有山林處皆有之骨用頭及脛色黄者佳晴亦多僞須自獲者乃眞爪并指骨毛存之以繫小兒臂上辟惡鬼兩脅間及尾端皆有威如乙字長一二寸許此數物皆用雄虎者勝凡鹿虎之類多是藥箭射殺者不可入藥蓋藥毒浸漬骨血間猶能傷人也李絳兵部手集方有虎骨酒法治臂脛痛不計深淺皆效用虎脛骨二大兩粗搗熬黄羚羊角一大兩屑新芍藥二大兩切細三物以無灰酒浸之春夏七日秋冬倍日每旦空腹飲一杯冬中速要服即以銀器物盛火爐中暖養之三兩日即可服也陶隱居云俗方熱食虎肉壞人齒信自如此虎頭作枕辟惡魘以置户上辟鬼鼻懸户上令生男骨雜朱畫符療痢鬚療齒痛爪以懸小兒臂辟惡鬼唐本注云别録云屎主惡瘡其眼晴主癲其屎中骨爲屑主火瘡牙主丈夫陰頭瘡及疽瘻鼻主癲疾小兒驚癇陳藏器云虎威令人有威帶之臨官佳無官爲人所憎威言骨如乙字長一寸在脅兩傍破肉取之尾端亦有不如脅者膽主小兒驚癇肉及皮主瘧骨煮汁浴小兒去瘡疥鬼疰驚癇屎主鬼氣眼光主驚邪辟惡鎭心凡虎夜視以一目放光一目看物獵人候而射之弩箭纔及目光隨墮地得之者如白石是也日華子云肉味酸平無毒治瘧又晴鎭心及小兒驚啼疳氣客忤雷公云虎晴凡使須知採人問其源有雌有雄有老有嫩有殺得者唯有中毒自死者勿使却有傷人之患夫用虎晴先於生羊血中浸一宿漉出微火上焙之乾搗成粉候衆藥出取合用之禹錫云按鬼疰尸疰及惡瘡通用藥并藥對云虎骨平藥性論云虎骨臣殺犬咬毒味辛微熱無毒治筋骨毒風攣急屈伸不得走疰疼痛主尸疰腹痛治温瘧療傷寒温氣按孟詵云肉食之入山虎見有畏辟三十六種精魅又眼晴主瘧病辟惡小兒熱驚悸膽主小兒疳痢驚神不安研水服之骨煮湯浴去骨節風毒膏内下部治五痔下血聖惠方治癧節風百節疼痛不可忍用虎頭骨一具塗酥炙黄捶碎絹袋盛用清酒二斗浸五宿隨性多少暖飲之妙千金翼療熛疽著手足肩背累累如米起色白刮之汁出虎尿以馬尿和之暴乾燒灰粉之經驗後方白虎風走注疼痛兩膝熱腫虎脛骨塗酥炙黑附子炮裂去皮臍各一兩爲末每服温酒調下二錢七日再服勝金方治大腸痔漏并脱肛以虎脛骨兩節蜜二兩炙令赤搗末蒸餅丸如桐子大每服凌晨温酒下二十丸隔夜先和大腸後方服此藥張文仲治痢久下經時不愈者此名休息取大蟲骨炙令黃焦搗末飲服方寸七日三即愈衍義曰虎骨頭脛與脊骨入藥内微熱陳藏器所注乙骨之事及射之目光墮地如白石之說必得之於人終不免其所誣也人或問曰風從虎何也風木也虎金也木受金制焉得不從故呼嘯則風生自然之道也所以治風攣急屈伸不得走疰癲疾驚癇骨節風毒等乃此義爾兔兔頭骨平無毒主頭眩痛癲疾骨主熱中消渴腦主凍瘡肝主目暗肉味辛平無毒主補中益氣圖經曰兔舊不著所出州土今處處有之爲食品之上味兔竅乃有六七穴子從口出故妊娠者禁食之頭骨主頭眩痛癲疾腦主凍瘡肝主目暗肉補中益氣然性冷多食損元氣不可合鷄肉食之髓及膏并主耳聾毛煎湯洗豌豆瘡毛燒灰主炙瘡皮毛及頭并燒灰酒服主難産衣不出藥性論云兔骨味甘臘月肉作醬食去小兒豌豆瘡臘毛煎湯洗豌豆瘡及毛傅良陶隱居云兔肉爲羹亦益人妊娠不可食令子唇缺其肉不可合白鷄肉食之面發黄合獺肉食令人病遁尸唐本注云兔皮毛合燒爲灰酒服主産難後衣不出及餘血搶心脹欲死者極驗頭皮主鬼疰毒氣在皮中針刺者又云主鼠瘻膏主耳聾肉治渴健脾生吃壓丹毒陳藏器云兔寒平主熱氣温脾毛燒灰主炙瘡不差骨主久疥醋磨傅之肉乆食弱陽令人色痿與薑同食令人心痛頭主難産燒灰末酒下兔竅有五六穴子從口出今懷妊忌食其肉者非爲缺唇亦縁口出禹錫云按日華子云頭骨和毛髓燒爲丸催生落胞并産後餘血不下兔骨治瘡疥刺風鬼疰肝明目補勞治頭旋眼疼孟詵云肝主明目和决明子作丸服之又主丹石人上衝眼暗不見物可生食之一如服羊子肝法八月至十一月可食服丹石人相宜大都損陽事絶血脉外臺秘要必效療婦人帶下取兔皮燒令烟絶搗爲末酒服方寸七以差爲度經驗方催生丹兔頭二個臘月内取頭中髓塗於淨紙上令風吹乾通明乳香二兩碎入前乾兔髓同研來日是臘今日先研俟夜星宿下安桌子上將果香茶同一處排定須是潔淨齋戒焚香望北帝拜告天師道弟子某修合救世上産生婦人藥願降威靈祐助此藥速令生産壽吉再拜用紙貼同露之次香燒至來日日未出時以猪肉和丸如雞頭大用紙袋盛貯透風懸每服一丸醋湯下良久未産更用冷酒下一丸即産此神仙方絶驗博濟方治産前滑胎臘月兔頭腦髓一個攤於紙上令匀候乾剪作符子於面上書生字一個覺母陣痛時用母釵子股上夾定燈焰上燒灰盞盛煎丁香酒調下勝金方治發腦發背及癰疽熱癤惡瘡等臘月兔頭細剉入瓶内密封久愈注塗帛上厚封之熱痛封之如冰頻换差集驗方治痔疾下血疼痛不止以玩月砂不限多少熳火熬令黄色爲末每二錢入乳香半錢空心温酒調下日三四服差砂即兔子糞是也子母秘録療産後陰下脱燒兔頭末傅之抱朴子兔壽千歲五百歲毛色變白又云兔血和女丹服之有神女二人來侍可役使之衍義曰兔有白毛者全得金之氣也入藥尤功凡兔至秋深時則可食金氣全也纔至春夏其味變取四脚肘後毛爲遂食飼雕鷹至次日却在其意欲腹中逐盡脂肥使饑急捕逐速爾然作醬必使五味既患豌豆瘡又食此則發毒太甚恐斑爛損人狸狸冒味甘温無毒主風疰尸疰鬼疰毒氣在皮中淫躍如針刺者心腹痛走無常處及鼠瘻惡瘡頭骨尤良肉療諸疰陰莖主月水不通男子陰㿗燒之以東流水服之圖經曰狸骨及肉本經不載所出州土今處處有之其類甚多以虎斑紋者堪用猫斑者不佳皆當用頭骨華佗方有狸骨散治尸疰肉主痔可作羹臛食之南方有一種香狸人以作膾生若北地狐生法其氣甚香微有麝氣邕州以南又有一種風狸似兔而短多栖息高木候風而吹過他木其溺主風然甚難取人久養之始可得陶隱居云狸類甚多今此用虎狸無用猫者猫狸亦好其骨至難别自取乃可信又有狸色黄而臭肉亦主鼠瘻及狸肉作羹如常食法并佳唐本注云狸屎灰主寒熱鬼瘧發無期度者極驗家狸亦好一名猫也陳藏器云風狸溺主諸色風人取養之食果子以寵之溺如乳甚難得似兔而短在高樹候風而吹至彼樹出邕州已南禹錫云按藥性論云狸骨臣亦可單用頭骨炒末治噎病不通食飲孟詵云骨主痔病作羹臛食之不與酒同食其頭燒作灰和酒服二錢七主痔又食野鳥肉中毒狸骨灰服之差炙骨和麝香雄黄爲丸服治痔及瘻瘡糞燒灰主鬼瘧日華子云骨治遊風惡瘡頭骨最妙糞燒灰主寒熱瘧疾肉治遊風等病又狸頭燒灰酒服治一切風按蜀本云肉療鼠瘻外臺秘要治痔發疼痛狸肉作羹食之良作脯食之不過三頓差此肉甚妙肘後方治鼠瘻腫核痛若破有瘡口膿血出者取狸一物理作羹如食法空心進之子母秘録療小兒鬼舐方狸屎燒灰和臘月猪脂塗上千金方同聖惠方治瘰癧腫硬痛疼年深時久不差用狸頭蹄骨等并塗酥炙令黄搗羅爲散每日空心粥飲調下一錢七衍義曰狸骨形類猫其紋有二一如連錢者一如虎紋者此二色狸皆可入藥其肉味與狐不相遠江西一種牛尾狸其尾如牛人多啖食未聞入藥孟詵云骨理痔病作羹臛食之然則骨如何作羹臛音郝肉羹也炙骨和麝香雄黄爲丸服治痔及瘻瘡甚效麞麞骨微温主虚損泄精肉温補益五臟髓益氣力悅澤人面圖經曰獐骨及肉本經不載所出州土今陂澤淺草中多有之亦呼爲麇獐之類甚多麇其總名也有有牙者有無牙者用之皆同然其牙不能噬嚙崔豹古今注曰麞有牙而不能噬鹿有角而不能觸是也其肉自八月已後至十一月已前食之勝羊肉十二月至七月食之動氣道家以獐鹿肉羞爲白脯言其無禁忌也唐方有獐骨酒及麞髓煎并補下其腦亦入面膏日華子云獐肉無毒骨補虚損益精髓悅顔色臍下有香治一切虚損禹錫云按藥性論云獐骨味甘無毒外臺秘要主瘤病獐鹿二種肉剖如厚脯炙令熱榻淹可四炙四易痛攪出膿便愈不除更炙新肉用之良豹豹肉味酸平無毒主安五臟補絶傷輕身益氣久服利人圖經曰豹肉本經不載所岀州土今河洛唐郢間或有之頭骨燒灰淋頭去風屑脂可合生髮藥朝塗而暮生謹按豹有數種有赤豹詩云赤豹黄羆陸機疏云尾赤而文黑謂之赤豹有玄豹山海經云幽都之山有玄虎玄豹有白豹陶隱居云豹至稀有爲用亦鮮惟尾可貴唐本注云陰陽神豹尾及車駕鹵薄豹尾名可尊重眞豹尾有何可貴未審陶據奚理日華子云肉微毒壯筋骨强志氣令人猛健禹錫云按孟詵云肉食之令人志性麤多時消即定乆食令人耐寒暑脂可合生髮膏朝塗暮生頭骨燒灰淋汁去白屑食療云補益人食之令人强筋骨志性麤疏食之即覺也少時消即定乆食之終令人意氣粗豪唯令筋健能耐寒暑正月食之傷神衍義曰豹肉毛赤黄其紋黑如錢而中空比相次此獸猛捷過虎故能安五臟補絶傷輕身又有土豹毛更無紋色亦不赤其形亦小此各自有種非能變爲虎也聖人假喻而已恐醫家未喻故書之筆頭灰年久者主小便不通小便數難陰腫中惡脫肛淋瀝燒灰水服之唐本先附自草部今移圖經曰文具兔頭骨條下禹錫云按藥性論云筆頭灰微寒亦可單用燒灰治男子交婚之夕莖痿取灰酒服之良其筆是使乏者外臺秘要若小便不通數而微腫方取陳久筆頭一枚燒爲灰和水服之勝金方催産治難産聖妙寸金散方敗筆頭一枚燒爲灰細研爲末研生藕汁一盞調下立産若産母虚弱及素有冷疾者恐藕冷動氣即於銀器内重湯暖過後服范汪方治喉中腫痛不得飲食燒筆頭灰漿飲下方寸七犢子臍屎主卒九竅中出血燒末服之方寸七新生未食草者預取之黄犢爲上姚氏方人有九竅四肢指歧間血出乃暴驚所爲取新生犢子未食草者臍屎日乾燒未水服方寸七日四五頓差人云口鼻出血亦良靈猫陰味辛温無毒主中惡鬼氣飛尸蠱毒心腹卒痛狂邪鬼神如麝用之功似麝生南海山谷如狸自爲牝牡亦云蛉狸異物志云靈狸一體自爲陰陽刳其水道連囊以酒灑陰乾其氣如麝若雜眞香罕有别者用之亦如麝焉震肉無毒主小兒夜驚大人因驚失心亦作脯與食之此畜爲天雷所霹靂者是圖經衍義本草卷之二十八
