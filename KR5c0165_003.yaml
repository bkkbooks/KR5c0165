front:
  text: 圖經衍義本草卷之三資三
  hash: sha256:311de648d3642b344b9de91677cfc405ce18fa2e961a7a1819b42f4dbf184422
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_003-001a, image: hfl/0536/0536-148.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正玉石部中品雄黃味苦甘平寒大溫有毒主寒熱鼠瘻惡瘡疽痔死肌療疥蟲𧏾瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺精物惡鬼邪氣百蟲毒勝五兵殺諸蛇虺毒解藜蘆毒悅澤人面煉食之輕身神仙餌服之皆飛入人腦中勝鬼神延年益壽保中不饑得銅可作金一名黃食石生武都山谷燉煌山之陽採無時圖經曰雄黃生武都山谷燉煌山之陽今階州山中有之形塊如丹砂明徹不挾石其色如雞冠者為真有青黑色而堅者名熏黃有形色似真而氣臭者名臭黃并不入服食藥只可療瘡疥耳其臭以醋洗之便可斷氣足以亂真用之尤宜細辨又階州接西戎界出一種水窟雄黃生於山岩中有水泉流處其石名青烟石白鮮石雄黃出其中其塊大者如胡桃小者如栗豆上有孔竅其色深紅而微紫體極輕虛而功用勝於常雄黃丹竈家尤所貴重或云雄黃金之苗也故南方近金坑冶處時或有之但不及西來者真好耳唐本注云出石門名石黃者亦是雄黃而通名黃食石而石門者最為劣爾岩昌武都者為佳塊方數寸明徹如雞冠或以為枕服之辟惡其青黑堅者不入藥用若火飛之而療瘡亦無嫌又云惡者名熏黃用熏瘡疥故名之無别熏黃也正觀年中以宕州新出有得方數尺者但重脆不可全致之爾日華子云雄黃微毒治疥癬風邪癲癇嵐瘴一切蛇蟲犬獸傷咬久服不饑通赤亮者為上驗之可以㶸蟲死者為真臭氣少細嚼口中含湯不激辣者通用雷公云凡使勿用黑雞黃自死黃夾膩黃其臭黃真似雄黃只是臭不堪用時用以醋洗之三兩度便無臭氣勿誤用也次有夾膩黃亦似雄黃其內一重黃一重石不堪用次有黑雞黃亦似雄黃如烏雞頭上冠也凡使要似鷓鴣鳥肝色為上抱朴子云雄黃當得武都山所出者純而無雜其赤如雞冠光明曄曄者乃可用耳其但純黃似雄黃色無光者不任作仙藥可以合理病藥耳抱朴子又云餌之法或以蒸煮或以酒服或以消石化為水乃凝之或以猪胴裹蒸夾石上生葉青者是土脉中生本經云二物同一類今人以紫色而節密者為羌活黃色而作塊者為獨活藥性論云羌活君味苦辛無毒能治賊風失音不語多癢血癩手足不遂口面喎邪遍身𤸷痹陶隱居云羌活形細而多節軟潤氣息極猛烈出益州北部西川為獨活色微白形虛大為用亦相似而小不如其一莖直上不為風搖故名獨活至易蛀宜密器藏之唐本注云療風宜用獨活兼水宜用羌活日華子云羌活治一切風并氣筋骨拳攣四肢羸劣頭旋明目赤目疼及伏梁水氣五勞七傷虛損冷氣骨節酸疼通利五臟獨活即是羌活母類也千金方治中風通身冷口噤不知人獨活四兩好酒一升煎取半升分溫再服必效方治産後腹中絞刺疼痛羌活二兩酒二升煎取一升去滓為二服小品方治産後風虛獨活湯主之又白癬蜀川者為勝春生苗高三尺以來葉似麻葉并青色四月五月著花似粟穗白色六月以後結實黑色根紫如蒿根多鬚今醫家以治咽喉腫痛口舌生瘡解傷寒頭痛凡腫毒之屬細銼一兩水一升煎煉取濃汁服之入口即止止毒氣蜀人多用之藥性論云蜀升麻主治小兒風驚癇時氣熱疾能治口齒風𧏾腫疼牙根浮爛惡臭熱毒膿血除心肺風毒熱壅閉不通口瘡煩悶療癰腫豌豆瘡水煎綿沾拭瘡上主百邪鬼魅陶隱居云舊出寧州者第一形細而黑極堅實頃無復有今惟出益州好者細削皮青緑色謂之雞骨升麻北部間亦有形又虛大黃色建平間亦有形狀味薄不堪用雷公云採得了刀刮上面粗皮熏了用黃精自然汁浸一宿出暴乾細銼蒸了暴乾用之日華子云安魂定魄并鬼附啼泣遊風腫毒口氣疳𧏾又名落新婦外臺祕要治尿血車前草搗絞取汁五合空心服之聖惠方治久患內障眼車前子乾地黃麥門冬等分為末蜜丸如梧桐子大服屢試有效百一方小便不通車前子草一斤水三升煎取一升半分三服又方治石淋車前子二升以絹囊盛水八升煮取三升不食盡服之須臾石下梅師方治妊娠患淋水道熱不通車前子五兩葵根切一升同以水五升煎取升半作二服子母祕録治橫生不得出車前子末酒服二錢匕治瀉方歐陽文忠公嘗得暴下國醫不能愈夫人云市人有此藥三文一貼甚效夫人買之以國醫藥雜進之一服而愈後召賣藥者問其方但用車前子一味為末米飲下二錢匕云利水道衍義曰車前陶隱居云其葉搗取汁服療右邊疼嗅入左鼻立效續十全方治纏喉風雄黃一塊新汲水磨急灌吐下差集驗方治卒魘雄黃搗為末細篩以管吹入鼻孔中傷寒類要治小腹痛滿不得小便及療天行病雄黃細研蜜丸如棗核內溺孔中又方殺齒蟲以末如棗塞牙間衍義曰雄黃非金苗今有金苗今有窟處無雄黃金條中言金之所生處處皆有雄黃豈處處皆得也别法治蛇咬焚之熏蛇遠去又武都者鎸磨成物形終不免其臭唐甄立言仕太常丞有道人病心腹悶煩彌二歲診曰腹有蠱誤食髮而然令餌雄黃一劑少選吐一蛇如拇指無目燒之有髮氣乃愈此殺毒蟲之驗也食鹽味鹹溫無毒主殺鬼蠱邪疰毒氣下部𧏾瘡傷寒寒熱吐胸中痰癖止心腹卒痛堅肌骨多食傷肺喜咳圖經曰食鹽舊不著所出州郡陶隱居云有東海北海鹽及河東鹽池梁益有鹽井交廣有南海鹽西羌有山鹽胡中有木鹽而色類不同以河東者為勝河東鹽今解州安邑兩池所種鹽最為精好是也又有并州兩監末鹽乃刮鹹煎煉不甚佳其鹹蓋下品所著鹵鹹生河東鹽池者謂此也下品又有大鹽生邯鄲及河東池澤蘇恭云大鹽即河東印鹽人之常食者刑粗於末鹽乃似今解鹽也解人取鹽於池傍耕地沃以池水每鹽南風急則宿昔成鹽滿畦彼人謂之種鹽東海北海南海鹽者今滄密楚秀溫台明泉福廣瓊化諸州官場煮海水作之以給民食者又謂之澤鹽醫方所謂海鹽是也其煮鹽之器漢謂之牢盆今或鼓鐵為之或編竹為之上下周以蜃灰廣丈深尺平底置於竈背謂之鹽盤南越志謂編篾為鼎和以牡蠣是也然後於海濱掘地為坑上布竹木覆以蓬茅又積沙於其上每潮汐衝沙鹵鹹淋於坑水中退即以火炬照之鹵氣衝火皆滅因取海鹵注盤中煎之頃刻而就如貫珠為戲古方大抵心肺藥多用之葛洪治卒心腹煩滿又胸脅痛者銼根濃煮汁服三升乃定今人多取葉為飲香張仲景治風濕身煩疼日晡劇者與麻黃杏人薏苡人湯麻黃三兩杏人三十枚甘草薏苡人各一兩四物以水四升煮取二升分溫再服陶隱居云真定縣屬常山郡近道在處有多生人家交址者子最大彼土呼為幹珠馬援大取將還人讒以為真珠也實重纍者為良用之取中人今小兒病蛔蟲取根煮汁作糜食之甚香而去蛔蟲大驗陳藏器餘云主消渴煞蛔蟲根煮服墮胎雷公曰凡使物用𧆐米顆大無味其𧆐米時人呼為粳𧆐是也若薏苡人顆小色青味甘咬著粘人齒大用一兩以糯米二兩同熬令糯米熟去糯米取使若更以鹽湯煮别是一般修制亦得禹錫云謹按藥性論云能治熱風筋脉攣急能令人食主肺痿肺氣吐膿血咳嗽涕唾上氣孟詵云性平去乾濕腳氣大驗食醫心鏡云治筋脉拘攣久風濕痹下氣除骨中邪氣利腸胃消水腫久服輕身益氣力薏苡人一升搗為散每服以水二升煮兩匙末作粥空腹食之梅師方肺疾唾膿血取薏苡人十兩杵碎以水三升煎取一升入酒少許服之衍義曰意苡人此李商隱太倉銘中所謂薏苡似珠不可不虞者也取人用本經云微寒主筋急拘攣拘攣有兩等素問注中大筋受熱則縮而短縮短故攣急不伸此是因熱而拘攣也故可用薏苡人若素問言因寒即筋急者不可更用此也澤瀉齊州𧏾齒并差其齒牢固聖惠方治小兒臍風濕以鹽一兩豉二合相和爛搗捏作餅子如錢大安新瓦上炙令熱以尉臍上差亦用黃檗末傅之外臺祕要治胸心痰飲傷寒熱病瘴瘧須吐者以鹽末一大匙以水或暖湯送下須臾則吐吐不快明日一更服甚良千金方治齒齦宣露每日一捻鹽內口以熱水含遍齒百遍不過五日齒即牢密千金冀方治諸瘡癬初生或始痛時以單方救不效嚼鹽塗之妙傅信方治蚯蚓咬濃作鹽湯浸身數遍差浙西軍將張韶為此蟲所咬其形如大風眉鬚皆落每夕蚯蚓鳴於體有僧教以此方愈食醫心鏡云鹽主殺鬼蠱氣下部𧏾瘡傷寒寒熱吐胸中痰癖止心腹卒痛堅肌骨黃帝云食甜瓜竟食鹽成霍亂又主大小腸不通取鹽和苦酒傅臍中乾即易差産寶方治妊娠心腹痛不可忍以一斤鹽燒令赤以三指取一撮酒服差衍義曰食鹽素問曰鹹走血故東方食魚鹽之人多黑色走血之驗故可知矣病嗽及水者宜全禁之北狄用以淹尸取其不壞也至今如此若中蚯蚓毒當以鹽洗沃亦宜湯化飲汁其燒剝金銀熔汁作藥仍須解州池鹽為佳齒縫中多出血常以鹽湯嗽即已益齒走血之驗也石硫黃味酸溫大熱有毒主婦人陰蝕疽痔惡血堅筋骨除頭秃療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部𧏾瘡止血殺疥蟲能化金銀銅鐵奇物生東海牧羊山谷中及太山河西山礬石液也圖經曰石硫黃生東海牧羊山谷中及太山河西山礬石液也今惟出南海諸蕃嶺外州郡或有而不甚佳以色如鵝子初出殼者為真謂之崑崙黃其赤色者名石亭脂青色者號冬結石半白半黑名神驚石并不堪入藥又有一種土硫黃出廣南及榮州溪澗水中流出其味辛性熱腥臭主治疥瘡殺蟲毒又可煎煉成汁以模䥱作器亦如鵝子黃色藥性論云石硫黃君有大毒以黑錫煎湯解之及食宿冷猪肉味甘太陽之精鬼焰居焉伏煉數般皆傳於作者能下氣治腳弱腰腎久冷除冷風頑痹又云生用治疥癬及療寒熱咳逆煉服主虛損泄精陶隱居云東海郡屬北徐州而箕山亦有圖經曰北都四明者為佳春生苗蔓延籬援莖紫色葉青有三尖角似牽牛更厚而光澤郭璞注云根似芋可食今江南人單呼諸語或有輕重耳據此注則薯蕷與諸乃一種南北之産或有不同故其形類差别然字音殊儲不同蓋相傳之訛也一名山芋藥性論云薯蕷臣能補五勞七傷去冷風止腰疼鎮心神安魂魄開達心孔多記事補心氣不足患人體虛羸加而用陶隱居云今近道在處有東山南江皆多掘取食之以充糧南康間最大而美服食亦用禹錫云謹按吳氏云薯蕷一名諸薯齊越名山芋一名修脆一名兒草神農甘小溫桐君雷公甘無毒或生臨朐鍾山始生赤莖細蔓五月華白七月實青黃八月熟落根中白皮黃類芋也食醫心鏡云主下焦虛冷小便數瘦損無力生芋藥半斤刮去皮以刀切碎研令細禹錫云謹按吳氏云硫黃一名石留黃神農黃帝雷公鹹有毒醫和扁鵲苦無毒或生易陽或河西或五色黃是潘水石液也燒令有紫焰者八月九月採治婦人血結海藥云謹按廣州記云生崑崙日腳下顆塊瑩淨無夾石者良主風冷虛憊腎冷止氣腿膝虛羸長肌膚益氣力遺精痔漏老人風祕等并宜燒煉服仙方謂之黃硇砂能壞五金亦能造作金色人能制伏歸本色服而能除萬病如有發動宜以猪肉鴨羹餘甘子湯并解之蜀中雅州亦出光膩甚好功力不及舶上來者丹房鏡源云石硫黃可乾汞訣曰此硫黃見五金而黑得水銀而赤又曰黃牙孫尚藥云治氣虛傷冷暴作水瀉日夜三二十行腹痛不止夏月路行備急朝真丹硫黃二兩牛角研令極細枯白礬半兩同細研勻水浸蒸餅去水脉了和丸如梧桐子大朱砂為衣每服十五丸至二十丸溫米飲鹽湯下經驗方大治元臟氣發久冷腹痛虛瀉應急大效玉粉丹生硫黃五兩青鹽一兩已上衮細研以蒸餅為丸如緑豆大每服五丸熱酒空心服以食壓之梅師方治陰生濕疱瘡取石硫黃研如粉傅瘡上日三度聖惠方治諸瘡弩肉如蛇出數寸用硫黃一兩細研於肉上薄塗之即便消外臺祕要千金療小兒聤耳硫黃末以粉耳中日一夜一差止太清服煉靈砂法石硫黃本出波斯國南明之境禀純陽火石之精氣而結成質性通流含其猛毒藥品之中號為將軍功能破邪歸正返滯還清挺立陽精消陰化魄衍義曰石硫黃今人用治下元虛冷元氣將絶久患寒泄脾胃虛弱垂命欲盡服之無不效中病當便已不可盡劑世人蓋知用而為福不知用久為禍此物損益兼行若俱棄而不用當倉卒之間又可闕乎或更以法製拒火而又常服者是亦弗思也在本經則不言如此服食但專治婦人不知者往往更以酒服其可得乎或臟中久冷服之先利如病勢危急可加丸數服少則不效仍加附子乾薑桂雌黃味辛甘平大寒有毒主惡瘡頭秃痂疥殺毒蟲虱身癢邪氣諸毒蝕鼻中息肉下部𧏾瘡身面白駁散皮膚死肌及恍惚邪氣殺蜂蛇毒煉之久服輕身增年不老令人腦滿生武都山谷與雄黃同山生其陰山有金金精熏則生雌黃採無時圖經曰雌黃生武都山谷與雄黃同山其陰山有金金精熏則生雌黃今出階州以其色如金又似雲母甲錯可析者為佳其夾石及黑如鐵色者不可用或云一塊重四兩者析之可得千重此尤奇好也採無時陶隱居云今雌黃出武都仇池者謂武都仇池黃色小赤扶南林邑者謂崑崙黃色如金而似雲母甲錯畫家所重依此言既有雌雄之名又同山之陰陽於合藥便當以武都為勝用之既稀又賤於崑崙者仙經無單服法惟以合丹砂雄黃共飛煉為丹爾雷公云雌黃凡使勿誤用夾石黃黑黃珀熟等雌黃一塊重四兩按乾寧記云指開析得千重軟如爛金者上凡修事勿令婦人雞犬新犯淫人有患人不男人非形人曾是刑獄地臭穢已上并忌若犯觸者雌黃黑如鐵不堪用也及損人壽寶藏論雌黃伏住火胎色不移鞴熔成汁者點銀成金點銅成銀丹房鏡源云黃背陰者雌也純柔者亦可乾汞舶上撰血者上湖南者次青者本性葉子上者可轉硫黃伏粉霜記之不可誤使青霞子云雌黃辟邪去惡聖惠方治烏癩瘡殺蟲用雌黃研如粉以醋并用雞子黃打令勻塗於瘡上乾即更塗又方治久心痛時發不定多吐清水不下飲食以雌黃二兩好醋二升慢火煎成膏用乾蒸餅丸如梧桐子大每服七丸薑湯下百一方治小腹滿不得小便細末雌黃蜜丸如棗核大內一丸溺孔中令入半寸許以竹管注陰令緊朔氣通之經驗方縮小便以顆塊雌黃一兩半研如粉乾薑半兩切碎入鹽四大錢同炒令乾薑色黃同為末乾蒸餅入水為丸如緑豆大每服十丸至二十丸空心鹽湯下斗門方治肺勞咳嗽以雌黃一兩入瓦合內不固濟坐合子於地上用灰焙之周匝令實可厚二寸以炭一斤簇定頂以火煅之三分去一退火待冷出研如麵用蟾酥為丸如粟大每日空心杏人湯下三丸差衍義曰入藥最釋服石者宜審諦治外功多方士點化術多用亦未聞終始如何畫工用之水銀味辛寒有毒主疥瘻痂瘍白秃殺皮膚中蝨墮胎除熱以傅男子陰陰消無氣殺金銀銅錫毒熔化還復為丹久服神仙不死一名汞生符陵平土出於丹砂畏磁石藥性論云水銀君殺金銅毒姹女也有大毒朱砂中液也此還丹之元母神仙不死之藥伏煉五金為泥生能墮胎主療瘑疥等緣殺蟲陶隱居云今水銀有生熟此云生符陵平土者是出朱砂腹中亦别出砂地皆青白色最勝出於丹砂者是今燒粗末朱砂所得色小白濁不及生者甚能消化金銀使成泥人以鍍物是也還復為丹事出仙經酒和日暴服之長生燒時飛著釜上灰名汞粉俗呼為水銀灰最能去虱唐本注云水銀出於朱砂皆因熱氣未聞朱砂腹中自出之者火燒飛取人皆解法南人蒸取之得水銀雖少而朱砂不損但色少變黑爾陳藏器云水銀本功外利水道去熱毒入耳能食腦至盡入肉令百節攣縮倒陰絶陽人患瘡疥多以水銀塗之性滑重直入肉宜愼之昔北齊徐王療攣躄以金物火炙尉之水銀得金當出蝕金候金色白者是也如此數度并差也日華子云水銀無毒治天行熱疾催生下死胎治惡瘡除風安神鎮心鍍金燒粉人多患風或大段使作須飲酒并肥猪肉及服鐵漿可禦其毒雷公云凡使勿用草中取者并舊朱漆中者勿用經别藥制過者勿用在尸過者半生半死者其水銀若在朱砂中産出者其水銀色微紅收得後用胡蘆收之免遺失若先以紫背天葵并夜交藤自然汁二味同煮一伏時其毒自退若修十兩用前二味汁各七鎰和合煮足為度漢武帝內傳曰封君達隴西人初服黃連五十餘年入烏峰山服水銀百餘年還鄉里如二十者常乘青牛故號青牛道士太清服煉靈砂法承禀五陽神之靈精會符合為一體故能輕飛玄化感遇萬靈聖惠方誤吞銀鐶子叉子以半兩服之再服即出經驗後方治心風祕水銀一兩藕節八個先研藕節令細次入水銀同研成砂子丸如雞頭大每服二丸磨刀水下一二服差梅師方治胎死腹中不出其母氣絶以水銀二兩吞之立出又方治痔穀道中蟲癢不止以水銀棗膏各二兩同研相和拈如棗形狀薄綿片裹內下部明日蟲出若痛者加粉三大分作丸衍義曰水銀入藥雖各有法極須審謹有毒故也婦人多服絶娠今人治小兒驚熱涎潮往往多用經中無一字及此亦宜詳諦得鉛則凝得硫黃則結并棗肉研之則散别法煅為膩粉粉霜唾研斃虱銅得之則明灌尸中則令尸後腐以金銀銅鐵置其上則浮得紫河車則伏石膏石膏味辛甘微寒大寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡除時氣頭痛身熱三焦大熱皮膚熱腸胃中隔氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯一名細石細理白澤者良黃者令人淋生齊山山谷及齊盧山魯蒙山採無時雞子為之使惡莽草馬目毒公圖經曰石膏生齊山山谷及齊盧山魯蒙山今汾孟虢耀州興元府亦有之生於山石上色至瑩白其黃者不堪此石與方解石絶相類今難得真者用時惟取未破者以别之其方解石不附石而生端然獨處外皮有土及水苔色破之皆作方棱石膏自然明瑩如玉石此為異也採無時方解石舊出下品本經云生方山陶隱居以為長石一名方石療體相似疑是一物陶隱居云二郡之山即青州徐州也今出錢塘縣皆在地中雨後時時自出取之皆如棋子白徹最佳彭城者亦好近道多有而大塊用之不及彼仙經不須此唐本云石膏方解石大體相似而以未破為異今市人皆以方解石代石膏未見有真石膏也石膏生於石傍其方解石不因石而生端然獨處大者如升小者若拳或在土中或生溪水其上皮隨土及水苔色破之方解大者方尺今以此為石膏療風去熱雖同而解肌發汗不如真者陳藏器云陶云出錢塘縣中按錢塘在平地無石膏陶為錯注蘇又注五石脂云五石脂中又有石膏似骨如玉堅潤服之勝鐘乳與此石膏乃是二物同名耳不可混而用之日華子云治天行熱狂下乳頭風旋心煩躁揩齒益齒通亮理如雲母者上又名方解石雷公云凡使勿用方解石方解石雖白不透明其性燥若石膏出剡州茗山縣義情山其色瑩淨如水精性良善也凡使之先於石臼搗成粉以密物羅過生甘草水飛過水澄令乾重研用之禹錫云謹按藥性論云石膏使惡巴豆畏鐵能治傷寒頭痛如裂壯熱皮如火燥煩渴解肌出毒汗主通胃中結煩悶心下急煩躁治唇口乾焦和葱煎茶去頭痛别說云謹按陶說出錢塘山中雨後時時自出今錢塘人乃鑿山以取之甚多搗為末作齒藥貨用浙人呼為寒水石然入藥最勝他處者今既鑿山石而取乃是因石而生即石膏也陳藏器謂錢塘縣在平地無石膏乃知陳不識錢塘明矣外臺祕要蒸病五日內蒸所以言內者必外寒內熱把汗附骨而熱也其根在五臟六腑之中必因患後得之骨肉自消食飲無味或皮燥面無光蒸盛之時四肢漸細足趺腫起石膏十兩研如乳粉法水和服方寸匕日再以體凉為度肘後方葛氏療小便卒大數非淋令人瘦以石膏半斤搗碎水一斗煮取五升稍飲五合梅師方治熱油湯火燒瘡痛不可忍取石膏搗末細研用粉瘡衍義曰石膏二書紛辨不决未悉厥理詳本經元無方解石之文止緣唐本注石膏方解石大體相似因此一說後人遂惑經曰生齊山山谷及齊盧山魯蒙山採無時即知他處者為非今圖經中又以汾州者編入前後人都不詳經中所言細理白澤者良故知不如是則非石膏也下有理石條中經云如石膏順理而細又可明矣今之所言石膏方解石上者何等有順理細文又白澤者有是則石膏也無是則非石膏也仍須是經中所言州土者方可入藥餘皆偏見可略不取仲景白虎湯中服之如神新校正仲景傷寒論後言四月已後天氣熱時用白虎者是也然四方氣候不齊又歲中氣運不一方所既異雖其說甚雅當此之時亦宜兩審若傷寒熱病或大汗後脉洪大口舌燥頭痛大渴不已或著暑熱身痛倦怠白虎湯服之無不效金屑味辛平有毒主鎮精神堅骨髓通利五臟除邪毒氣服之神仙生益州採無時圖經曰金屑生益州銀屑生永昌陶隱居注云金之所生處處皆有梁益寧三州多有出水沙中作屑謂之生金而銀所出處亦以金同但皆生石中耳蘇恭以為銀之與金生不同處金又出水中今饒信南劍登州出金處採得金亦多端或有若山石狀者或有若米豆粒者若此類未經火皆可為生金其銀在礦中則與銅相雜土人採得之必以鉛再三煎煉方成故不得為生銀也故下别有生銀條云出饒州樂平諸坑生銀礦中狀如硬錫方理粗錯自然者真今坑中所得乃在土石中滲溜成條若絲髮狀土人謂之老翁鬚似此者極難得方書用生銀必得此乃真耳金屑古方不見者銀屑惟葛洪治癰腫五石湯用之今人多不用惟作金銀薄入藥甚便又金石凌紅雪紫雪輩皆取金銀取汁此亦通用經煉者耳陶隱居云金之所生處處皆有梁益寧三州多有出水沙中作屑謂之生金辟惡而有毒不煉服之殺人建平晋安亦有金砂出石中燒熔鼓鑄為鍋雖被火亦未熟猶須更煉高麗扶南及西域外國成器皆煉熟可服仙經以醯蜜及猪肪牡荆酒輩煉餌柔軟服之神仙亦以合水銀作丹砂外醫方都無用者當是慮其有毒故也仙方名金為太真日華子云金平無毒畏水銀鎮心益五臟添精補髓調利血脉禹錫云謹按藥性論云黃金屑金薄亦同主小兒驚傷五臟風癇失志鎮心安魂魄楊損之云百煉者堪生者殺人水飲合膏飲之即不煉今注醫家所用皆煉熟金薄及以水煎金器取汁用之固無毒矣按陳藏器拾遺云嶺南人云生金是毒蛇屎此有毒常見人取金掘地深丈餘至紛子石石皆一頭黑焦石下有金大者如指小猶麻豆色如桑黃咬時極軟即是真金夫匠竊而吞者不見有毒其麩金出水沙中氈上淘取或鵝鴨腹中得之即便打成器物亦不重煉煎取金汁便堪鎮心此乃藏器傳聞之言全非按據宋朝收復嶺表詢其事於彼人殊無蛇屎之事入藥當必用熟金恐後人覽藏器之言惑之故此明辨海藥云按海州記云出大食國彼方出金最多凡是貨易并使金錢性多寒生者有毒熟者無毒主癲癇風熱上氣咳嗽傷寒肺損吐血骨蒸勞極渴主利五藏邪氣補心并入薄於丸散服異志云金生麗水山海經說諸山出金極多不能備録蔡州出瓜子金雲南山出顆塊金在山石間採之黔南遂府吉州水中并産麩金又嶺表録此云廣州治涯縣有金池彼中居人忽有養鵝鴨常於屎中見麩金片遂多養收屎淘之日得一兩或半兩因而至富矣寶藏論凡金有二十件雄黃金雌黃金曾青金硫黃金土中金生鐵金熟鐵金生銅金偷石金沙子金土碌砂子金金母砂子金白錫金黑鉛金朱砂金已上十五件惟只有還丹金水中金瓜子金青麩金草砂金等五件是真金餘外并皆是假衍義曰金屑不曰金而更加屑字者是已經磨屑可用之義如玉漿之義同二經不解屑為末盡蓋須烹煉鍛屑為薄方可研屑入藥陶隱居云凡用銀屑以水銀和成泥若非鍛屑成薄焉能以水銀和成泥也獨不言金屑亦其闕也生金有毒至於殺人仍為難解有中其毒者惟鷓鴣肉可解若不經鍛屑則不可用顆塊金即穴山或至百十尺見伴金石其石褐色一頭如火燒黑之狀銀屑味辛平有毒主安臟定心神止驚悸除邪氣久服輕身長年生永昌採無時圖經曰文具金屑條下陶隱居云銀之所出處亦與金同但皆是生石中煉餌法亦相似今醫方合鎮心丸用之不可正服爾為屑當以水銀研令消也永昌本屬益州今屬寧州仙經又有服煉法此當無正主療故不為本草所載古者名金為黃金銀為白金銅為赤金今銅有生熟煉熟者柔赤而本草并無用今銅青及大錢皆入方用并是生銅應在下品之例也唐本注云銀之與金生不同處金又兼出水中方家用銀屑當取見成銀薄以水銀消之為泥合消石及鹽研為粉燒出水銀淘去鹽石為粉極細用之乃佳不得已磨取屑爾且銀所在皆有而以虢州者為勝此外多錫穢為劣高麗作帖者云非銀礦所出然色妬不如虢州者又有黃銀本經不載俗云為器辟惡乃為瑞物禹錫云謹按藥性論云銀屑君銀薄同主定志去驚癇小兒癲疾狂走之病子母祕録妊娠卒腰背痛如折銀一兩水三升煎取二升飲之青霞子云金液還丹論銀破冷除風衍義曰銀屑金條中已解屑義銀本出於礦須煎煉而成故名熟銀所以於後别立生銀條也其用與熟銀大同世有術士能以朱砂而成者有鉛汞而成者有焦銅而成者何復更有造化之氣豈可更入藥既有此類不可不區别其生銀即是不自礦中出而特然自生者又謂之老翁鬚亦取像而言之耳然銀屑經言有毒生銀經言無毒釋者漏略不言蓋生銀已生發於外無藴鬱之氣故無毒礦銀尚藴蓄於石中鬱結之氣全未敷暢故言有毒亦惡錫生銀寒無毒主熱狂驚悸發癇恍惚夜卧不安讝音詹語邪氣鬼祟服之明目鎮心安神定志小兒諸熱丹毒并以水磨服功勝紫雪出饒州樂平諸坑生銀礦中狀如硬錫文理粗錯自然者真圖經曰文具金屑條下禹錫云謹按陳藏器云生銀味辛日華子云冷微毒畏石亭脂磁石治小兒衝惡熱毒煩悶并水磨服忌生血又云朱砂銀冷無毒畏石亭脂磁石鐵延年益色鎮心安神止驚悸辟邪治中惡蠱毒心熱煎煩憂忘虛劣忌一切血味甘性溫無毒主五臟百病養神安魂魄益氣明目通血脉止煩滿益精神殺精魅惡鬼氣久服通神明不老輕身神仙令人心靈一名二氣砂水銀一兩硫黃六銖細研先炒作青砂頭後入水火既濟爐抽之如束針絞者成就也惡磁石畏鹹水味辛冷無毒畏磁石石黃通大腸轉小兒疳并瘰癧殺瘡疥癬蟲及鼻上酒齇風瘡燥癢又名汞粉輕粉峭粉忌一切血新補見陳藏器及日華子經驗方治小兒吃泥及䑋肚膩粉一分用沙糖溲丸如麻子大空心米飲下一丸瀉出土差孫用和方治虛風不二散膩粉一兩用湯煎五度如茶腳熳火上焙乾麝香半兩細研如粉每服一字溫水調但是風臨時服半錢或一錢匕看虛實加减又方治血痢膩粉五錢定粉三錢同研用水浸蒸餅心少許和丸如緑豆大每服七元或十元艾一枝水一盞煎湯下艾湯多亦妙衍義曰水銀粉下涎藥并小兒涎潮瘛瘲多用然不可常服及過多多則有損兼行若兼驚則尤須審謹蓋驚為心氣不足不可下下之裏虛驚氣入心不可治若其人本虛便須禁此一物謹之至也圖經衍義本草卷之三
