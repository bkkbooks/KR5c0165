body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正草部中品之上乾薑乾薑味辛溫大熱無毒主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良圖經云文具生薑條下禹錫云謹按唐本注云治短結氣止血宣諸絡脉發汗久服令眼暗外臺祕要治瘧不痊乾薑高良薑等分為末每服一錢水一中盞煎至七分服又方治卒心痛乾薑為末米飲調下一錢千金方治齆鼻以乾薑末蜜和塞鼻中肘後方治身體重小腹急熱必上衝胸頭重不能舉眼中生翳膝脛拘急乾薑四兩末湯和溫服覆取汗得解又方治寒痢切乾薑如大豆米飲服六七十枚日三夜一服痢青色者為寒痢纍服得效王氏博濟方治瘧乾薑炒令黑色搗羅為末臨發時以溫酒調三錢服已發再服之廣利方治諸蛇毒螫人欲死兼辟蛇乾薑雄黃等分同研用小絹袋盛繫臂上男左女右蛇聞藥氣逆避人螫毒傅之孫真人方治水瀉無度乾薑末粥飲調一錢服立效集驗方治血痢神效乾薑急於火內燒黑不令成灰瓷碗合放冷為末每服一錢米飲調下又方治咳嗽冷氣結脹乾薑為末熱酒調半錢服兼治頭旋眼眩立效傷寒類要治傷寒婦人得病雖差未滿百日不可與交合為陰陽之病必拘急手足拳欲死丈夫病名為陰易婦人名為陽易速當汗之可愈滿四日不可療宜令服此藥乾薑四兩為末湯調頓服覆衣被出汗得解手足伸遂愈生薑生薑味辛微溫主傷寒頭痛鼻塞咳逆上氣止嘔吐久服去臭氣通神明生犍為川谷及荆州揚州九月採秦椒為之使殺半夏茛菪毒惡黃芩黃連天鼠糞圖經曰生薑生犍為山谷及荆州揚州今處處有之以漢溫池州者為良苗高二三尺葉似箭竹葉而長兩兩相對苗青根黃無花實八九月採根於長流水洗過日曬為乾姜又千金方主痰澼以薑附湯治之取生薑八兩附子生用四兩四破之二物以水五升煮取二升分再服亦主卒風禁猪肉冷水崔元亮集驗方載敕賜薑茶治痢方以生薑切如麻粒大和好茶一兩碗呷任意便差若是熱痢即留薑皮冷即去皮大妙劉禹錫在淮南與李亞同幕府李每與人藥而不出方或譏其吝李乃情話曰凡人患嗽多進冷藥若見此方用藥熱燥即不肯服故但出藥多效試之信然李卿换白髮方云刮老生薑皮一大升於鐺中以文武火煎之不得令過沸其鐺惟得多油膩者尤佳更不須洗刷便以薑皮置鐺中密固濟勿令通氣令一精細人守之地色未分便須煎之緩緩不得令火急如其人稍疲即换人看火一伏時即成置於瓷鉢中極研之李云雖曰一復時若火候勻即至日西藥成也使時先以小物點取如麻子大先於白鬚下點藥訖然後拔之再拔以手指熟撚之令入肉第四日當有黑者生神效陶隱居云乾薑今惟出臨海章安兩三村解作之蜀漢薑舊美荆州有好薑而并不能作乾者又云生薑歸五臟去痰下氣止嘔吐除風邪寒熱久服少志少智傷心氣如此則不可多食唐本注云薑久服通神明主風邪主痰氣生者尤良經云久服通神明即可常啖也陳藏器云生薑本功外汁解毒藥自餘破血調中去冷除痰開胃用熱即去皮要冷留皮日華子云乾薑消痰下氣治轉筋吐瀉腹臟冷反胃乾嘔瘀血撲損止鼻洪解冷熱毒開胃消宿食禹錫云按藥性論云乾薑臣味苦辛治腰腎中疼冷冷氣破血去風通四肢關節開五臟六腑去風毒冷痹夜多小便乾者治嗽主溫中用秦艽主霍亂不止腹痛消脹滿冷痢治血閉病人虛而冷宜加用之又云生薑使主痰水氣滿下氣生與乾并治嗽療時疾止嘔逆不下食生和半夏主心下急痛若中熱不能食搗汁和蜜食之又汁和杏仁作煎下一切結氣實心胸擁隔冷熱氣食療云生薑溫去痰下氣除壯熱治轉筋心滿去胸中臭氣通神明又胃氣虛風熱不能食薑汁拌雞子殼生地黃汁少許蜜一匙頭和水三合頓服立差外臺祕要治霍亂注痢不止轉筋入腹欲死生薑三兩搗破以酒一升煮三四沸頓服又方久患咳噫連咳四五之聲者取生薑汁半合蜜一匙頭煎令熱溫服如此三服立效千金方治乾噦嗽若手足厥冷宜食生薑此是嘔家藥又治心下痞堅不能食胸中嘔噦生薑八兩細切以水三升煮取一升半夏五合洗去滑以水五升煮取一升二味合煮取一升半稍稍服之又方治産後穢污下不盡腹滿生薑二斤以水煮取汁服即出經驗方善治狐臭用生薑塗腋下絶根本楊氏産乳方胎後血上衝心生薑五兩切以水八升煮三升分三服唐崔魏公云鉉夜暴亡有梁新聞之乃診之曰食毒僕曰常好食竹雞竹雞多食半夏苗必是半夏毒命生薑捩汁折齒而于之即活衍義曰生薑治暴逆氣嚼三兩皂子大下咽定屢服屢定初得寒熱痰嗽燒一塊唅齒之終日間嗽自愈暴赤眼無瘡者以古銅錢刮淨薑上取汁於錢唇點目熱淚出今日點來日愈但小兒甚懼不須疑已試良驗葈耳葈耳葈私以反實味苦甘溫葉味苦辛微寒有小毒主風頭寒痛風濕周痹四肢拘攣痛惡肉死肌膝痛溪毒久服益氣耳目聰明强志輕身一名胡葈一名地葵一名葹一名常思生安陸川谷及六安田野實熟時採圖經曰葈耳生安陸川谷及六安田野今處處有之謹按詩人謂之卷耳爾雅謂之苓耳廣雅謂之葈耳皆以實得名也陸機疏云葉青白似胡荽白華細莖蔓生可煮為茹滑而少味或曰此物本生蜀中其實多刺因羊過之毛中粘綴遂至中國故名羊負來俗呼為道人頭實熟時採之藥性論云葈耳亦可單用味甘無毒主肝家熱明目陶隱居云此是常思菜傖人皆食之以葉覆麥作黃衣者一名羊負來昔中國無此言從外國逐羊毛中來方用亦堪稀唐本注云蒼耳三月已後七月已前刈日乾為散夏水服冬酒服主大風癲癇頭風濕痹毒在骨髓日二服丸服二十三十丸陳藏器云葈耳葉挼安舌下令涎出去目黃好睡子炒令香搗去刺使腹破浸酒去風補益又燒作灰和臘月猪脂封丁腫雷公云凡採得去心取黃精用竹刀細切拌之和同蒸從已至亥去黃精取出陰乾用禹錫云按爾雅云卷耳苓耳注廣雅云葈耳也亦云胡葈江東呼為常葈或曰苓耳形似鼠耳叢生如盤釋曰詩周南云采采卷耳孟詵云蒼耳溫主中風傷寒頭痛又丁腫困重生搗蒼耳根葉和小兒尿絞汁冷服一升日三度甚驗聖惠方治婦人風瘙癮疹身癢不止用蒼耳花葉子等分搗羅為末豆淋酒調服二錢七又方治産後諸痢神效蒼耳葉搗絞汁溫服半中盞日三四服外臺祕要療熱毒病攻手足腫疼痛欲脫方取蒼耳汁以漬之千金方當以五月五日午時乾地刈取葈耳葉洗曝燥搗下篩酒若漿水服方寸七日三夜三散若吐逆可蜜為丸準計一方寸七數也風輕易治者日再服若身體有風處皆作粟肌出或如麻豆粒此為風毒出也千金翼方治牙痛以蒼耳子五升水一斗煮取五升熱含之痛即吐吐後復含不過三劑差莖葉亦得又方治五痔方蒼耳莖葉以五月五日採乾為末以水服方寸七立效食醫心鏡云除一切風濕痹四肢拘攣蒼耳子三兩搗末水一升半煎取七合去滓呷斗門方治婦人血風攻腦頭旋悶絶忽死忽倒地不知人事者用喝起草取其嫩心不限多少陰乾為末以常酒服一大盞不拘時候其功大效服之多連腦蓋善通頂門今蒼耳是也勝金方治毒蛇并射工沙虱等傷眼黑口噤手腳强直毒攻腹內成塊逡巡不救宜用此方蒼耳嫩葉一握研取汁溫酒和灌之將滓厚罨所傷處楊氏方産乳治誤吞錢葈耳頭一把以水一升浸水中十餘度飲水愈葛根葛根味甘平無毒主消渴身大熱嘔吐諸癢起陰氣解諸毒療傷寒中風頭痛解肌發表出汗開腠理療金瘡止痛脅風痛生根汁大寒療消渴傷寒壯熱葛殼主下痢十歲已上葉主金瘡止血花主消酒一名雞齊根一名鹿藿一名黃斤生汶山川谷五月採根曝乾殺野葛巴豆百藥毒圖經曰葛根生汶山川谷今處處有之江浙尤多春生苗引藤蔓長一二丈紫色葉頗似揪葉而青七月著花似豌豆花不實根形如手臂張仲景治傷寒有葛根及加半夏葛根黃芩黃連湯以其主大熱解肌開腠理陶隱居云即今之葛根人皆蒸食之當取入土深大者破而日乾之生者搗取汁飲之解毒病發熱其花并小豆花乾末服方寸七飲酒時知醉南康廬陵間最勝多肉而少筋甘美陳藏器云葛根生破血合瘡墮胎解酒毒身熱赤酒黃小便赤澀可斷穀不饑根堪作粉日華子云葛冷治胸膈熱心煩悶熱結止血痢通小腸排膿破血傅蛇蟲嚙解罯毒箭乾者力同食療云葛根蒸食之消酒毒其粉亦甚妙聖惠方治時氣頭痛壯熱用生葛根淨洗搗取汁一大盞豉一合煎至六分去豉不計時候分作二服汗出即差未汗再服若心熱加栀子仁十枚同煎去滓服又方治小兒熱渴久不止用葛根半兩細銼水一中盞煎取六分去滓頻溫服外臺祕要治傷筋絶搗葛根汁飲之葛白屑熬令黃傅瘡止血千金方酒醉不醒搗葛根汁飲一二升便醒肘後方治卒乾嘔不息搗葛根絞取汁服一升差又方食諸菜中毒發狂煩悶吐下欲死煮葛根汁飲之梅師方治傷寒初患二三日頭痛壯熱葛根五兩香豉一升細銼以童子小便六升煎取二升分作三服取汗觸風食葱豉粥廣利方治心熱吐血不止生葛根汁半大升頓服立差傷寒類要治妊娠熱病心悶取葛根汁二升分水三服衍義曰葛根澧鼎之間冬月取生葛以水中揉出粉澄成垛先煎湯使沸後擘成塊下湯中良久色如膠其體甚韌以蜜湯中拌食之擦少生薑尤佳大治中熱酒渴病多食行小便亦能使人利病酒及渴者得之甚良彼之人又切入煮茶中以待賔但甘而無益又將生葛根煮熟者作果可虔吉州南安軍亦有此賣葛粉味甘大寒無毒主壓丹石去煩熱利大小便止渴小兒熱痞以葛根浸搗汁飲之良圖經曰文具葛根條下陳藏器云拾遺云用裛小兒熱瘡妙禹錫云按中品上卷葛根條功用與此相通聖惠方治中鴆毒氣欲絶者用葛粉三合水三中盞調飲之如口禁者以物揭開灌之又方治胸中煩熱或渴心躁葛粉四兩先以水浸粟米半升經宿漉出與葛粉相拌令勻煮熟食之食醫心鏡治小兒壯熱嘔吐不住食驚癇方葛粉二大錢以水二合調令勻瀉向鏭鐸中傾側令遍重湯中煮令熟以糜飲相和食之栝樓栝樓根味苦寒無毒主消渴身熱煩滿大熱補虛安中續絶傷除腸胃中痼熱八疽身面黃唇乾口燥短氣通月水止小便利一名地樓一名果裸一名天瓜一名澤姑實名黃瓜主胸痹悅澤人面莖葉療中熱傷暑生洪農川谷及山陰地入土深者良生鹵地者有毒二月八月採根曝乾三十日成枸杞為之使惡乾薑畏牛膝乾漆反烏頭圖經曰栝樓生洪農山谷及山陰地今所在有之實名黃瓜詩所謂果兩之實是也根亦名白藥皮黃肉白三四月內生苗引藤蔓葉如甜瓜葉作叉有細毛七月開花似葫蘆花淺黃色實在花下大如拳生青至九月熟孫思邈作粉法深掘大根屈削皮至白處寸切之水浸一日一易未經五日取出爛搗研以絹袋盛之澄瀘令極細如粉唐崔元亮療箭鏃不出搗根傅瘡日三易自出又療時疾發黃心强煩熱悶不認人者取大實一枚黃者以新汲水九合浸淘取汁下蜜半大合朴消八分合不令消盡分再服便差陶隱居云出近道藤生狀如土瓜而葉有叉毛詩云果裸之實亦施於宇其實今以雜作手膏用根入土六七尺大二三圍者服食亦用之唐本注云今用根作粉大宜服食虛熱人食之作粉如作葛粉法潔白美好今出陜州者白實最佳禹錫云按爾雅云果裸之實栝樓釋曰果裸之草其實名栝樓郭云今齊人謂之天瓜日華子云栝樓子味苦冷無毒補虛勞口乾潤心肺療手面皴吐血腸風瀉血赤白痢并炒用又栝樓根通小腸排膿消腫毒生肌長肉消撲損瘀血治熱狂時疾乳癰發背痔瘻瘡癤雷公云栝樓凡使皮子莖根效各别其栝并樓樣全别若栝自丸黃皮厚蒂小若婁唯形長赤皮蒂粗是陰人服若修事去上殼皮革膜并油子使聖惠方治熱病頭疼發熱進退方用栝樓一枚大者取瓤細銼青瓷碗中用熱湯一盞沃之蓋却良久去滓不計時候服外臺祕要治消渴利方生栝樓三十斤以水一碩煮取一斗半去滓以牛脂五合煎取水盡以暖酒先食服如雞子大日三服即妙肘後方消渴小便多栝樓薄切炙取五兩水五升煮取四升隨意飲之良又方若腸隨肛出轉久不可收入搗生栝樓取汁溫之猪肉汁中洗手隨挼之令暖自得入梅師方治諸癰發背乳房初起微赤搗栝樓作末以井花水調方寸七集驗方下乳汁栝樓子淘洗控乾炒令香熟瓦上㩉令白色為末酒調下一七合面卧少時杜壬方治胸膈痛徹背心腹痞滿氣不得通及治痰嗽大栝樓去穰取子熟炒别研和子皮麵糊為丸如梧桐子大米飲下十五丸子母祕録治乳腫痛栝樓黃色老大者一枚熟搗以白酒一斗煮取四升去滓溫一升日三服若無大者小者二枚黃熟為已楊氏産乳方治熱遊丹赤腫栝樓末二大兩釅醋調塗之産寶方治産後乳無汁栝樓末井花水服方寸七日二服夜流出楊文蔚方治痰嗽利胸膈方栝樓肥實大者割開子淨洗捶破括皮細切焙乾半夏四十九個湯洗十遍捶破焙乾為末用洗栝樓熟水并瓤同熬成膏研為丸如梧子大生薑湯下二十丸衍義曰栝樓實九月十月間取穰以乾葛粉拌焙乾銀石器中熳火炒熟為末食後夜卧以沸湯點一二錢服治肺燥熱渴大腸祕其根與貝母知母秦艽黃芩之類皆治馬熱苦參苦參味苦寒無毒主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止泪養肝膽氣安安五臟定志益精利九竅除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部𧏾平胃氣令人嗜食輕身一名水槐一名苦𧄹音識一名地槐一名菟槐一名驕槐一名白莖一名虎麻一名岑莖一名祿白一名陵郎生汝南山谷及田野三月八月十月採根曝乾玄參為之使惡貝母漏蘆菟絲反藜蘆圖經曰苦參生汝南山谷及田野今近道處處皆有之其根黃色長五七寸許兩指粗細三五莖并生苗高二三尺已來葉碎青色極似槐葉故有水槐名春生冬凋其花黃白七月結實如小豆子治癩疾其法用苦參五斤切以好酒三斗漬三十日每飲一合日三常服不絶若覺痺即差陶隱居云今出近道處處有葉極似槐樹故有槐名花黃子作莢根味至苦惡病人酒實飲之多差患疥者一兩服亦除蓋能殺蟲禹錫云按藥性論云苦參能治熱毒風皮肌煩燥生瘡赤癩眉脫主除大熱嗜唾治腹中冷痛中惡腹痛除體悶治心腹積聚不入湯用日華子云殺疳蟲炒帶烟出為末飯飲下治腸風瀉血并熱痢雷公云凡使不計多少先須用糯米濃泔汁浸一宿上有腥穢氣并在水面上浮并須重重淘過即蒸從已至申出曬乾細銼用之外臺祕要治天行病四五日結胸滿痛壯熱身體熱苦參一兩銼以醋二升煮取一升二合盡飲之當吐即愈天行毒病非苦參醋藥不解及溫覆取汗愈又方小兒身熱苦參湯浴兒良千金方治狂邪發無常披頭大叫欲殺人不避水火苦參蜜丸桐子大每服十丸薄荷湯下梅師方治飲食中毒魚肉菜等苦參三兩以苦酒一升煎五沸去滓服之吐出即愈或取煮犀角汁一升亦佳又方治傷寒四五日頭痛壯熱胸中煩痛苦參五兩烏梅二十枚細銼以水二升煎取一升溫服千金方治時疾熱病狂言心躁苦參不限多少炒黃色為末每服二錢水一盞煎至八分溫服連進三服有汗無汗皆差集驗方治毒熱足腫疼欲絶酒煮苦參以漬之太史公云淳於意醫齊中大夫病齒灸左手陽明脉苦參湯日漱三升出入得五六日愈衍義曰苦參有朝士苦腰重久坐旅拒十餘步然後能行有一將佐謂朝士曰見公日逐以藥揩齒其氣味傷腎故使人腰重後有太常少卿舒昭亮用苦參已數年此病曰苦參入齒其氣味傷腎故使人腰重後有太常少卿舒昭亮用苦參揩齒歲久亦病腰自後悉不用腰疾皆愈此皆方書舊不載者有人病遍身風熱細疹癢痛不可任連胸頸臍腹及近隱皆然涎痰亦多夜不得睡以苦參末一兩皂角二兩水一升揉瀘取汁銀石器熬成膏和苦參末為丸如梧桐子大食後溫水服二十丸至三十丸次日便愈當歸當歸味甘辛溫大溫無毒主咳逆上氣溫瘧寒熱洗音癬在皮膚中婦人漏下絶子諸惡瘡瘍音羊金瘡煮飲之溫中止痛除客血內塞中風痓汗不出濕痹中惡客氣虛冷補五臟生肌肉一名乾歸生隴西川谷二月八月採根陰乾惡䕡茹畏菖蒲海藻牡蒙圖經曰當歸生隴西川谷今川蜀陜西諸郡及江寧滁州皆有之以蜀中者為勝春生苗緑葉有三瓣七八月開花似時羅淺紫色根黑黃色二月八月採根陰乾然苗有二種都類芎藭而葉有大小為異莖梗比芎藭甚卑下根亦二種大葉名馬尾當歸細葉名蠶頭當歸以肉厚不枯者勝藥性論云當歸臣惡熱麵止嘔逆虛勞寒熱破宿血主女子崩中下腸胃冷補諸不足止痢腹痛單煮飲汁治溫瘧主女人瀝血腰痛療齒疼痛不可忍患人虛冷加而用之陶隱居云今隴西叨陽黑水當歸多肉少枝氣香名馬尾當歸稍難得西川北部當歸多根枝而細歷陽所出色白而氣味薄不相似呼為草當歸闕少時乃用之方家有云真當歸正謂此有好惡故也俗用甚多道方時須爾唐本注云當歸苗有二種一種似大葉芎藭一種似細葉芎藭惟莖葉卑下於芎藭也今出當州岩州翼州松州宕州最勝細葉者名蠶頭當歸大葉者名馬尾當歸今用多是馬尾當歸蠶頭者不如此不復用陶稱歷陽者是蠶頭當歸也日華子云治一切風一切血補一切勞破惡血養新血及主癥癖雷公云凡使先去塵并頭尖硬處一分已來酒浸一宿若要破血即使頭一節硬實處若要止痛止血即用尾若一時用不如不使服食無效單使妙也禹錫云按爾雅云薛山蘄注廣雅曰山蘄當歸也當歸今似蘄而粗大吳氏云當歸神農黃帝桐君扁鵲甘無毒岐伯雷公辛無毒季氏小溫或生羌胡地别說云謹按當歸自古醫家方論用治婦人産後惡血上衝倉卒取效無急於此氣血昏亂者服之即定此蓋服之能使氣血各有所歸則可以於産後備急於補虛速效恐聖人立當歸之名必因此出矣外臺祕要治頭疼欲裂當歸二兩酒一升煮取六合飲至再服又方治心痛當歸為末酒服方寸七肘後方小兒多患胎寒好啼書夜不止因此成癇當歸末小豆大乳汁灌之日夜三四度服葛氏方治小便出血當歸四兩細銼酒三升煮取一升頓服梅師方胎動下血心腹疼死生不知服此湯活即安死即下用當歸四兩芎秦九兩細銼以酒三升水四升煎取三升分服子母祕録治倒産子死腹中搗當歸末酒服方寸匕支太醫方治婦人百病諸虛不足當歸四兩地黃二兩為末蜜和丸如梧子大食前米飲下十五丸麻黃麻黃味苦溫微溫無毒主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破癥堅積聚五臟邪氣緩急風脅痛字乳餘疾止好唾通腠理疏傷寒頭疼解肌泄邪惡氣消赤黑斑毒不可多服令人虛一名卑相一名龍沙一名卑鹽生晋地及河東立秋採莖陰乾令青厚材為之使惡辛夷石韋圖經曰麻黃生晋地及河東今近京多有之以滎陽中牟者為勝苗春生至夏五月則長及一尺已來梢上有黃花結實如百合瓣而小又似皂莢子味甜微有麻黃氣外紅皮裏仁子黑根紫赤色俗說有雌雄二種雌者於三月四月內開花六月內結子雄者無花不結子至立秋後收採其莖陰乾令青張仲景治傷寒有麻黃湯及大小青龍湯皆用麻黃治肺痿上氣有射干麻黃湯厚朴麻黃湯皆大方也古方湯用麻黃先煮去沫然後內諸藥亦用丸散者皆不然也陶隱居云今出青州彭城滎陽中牟者為勝色青而多沫蜀中亦有不好用之折除節節止汗故也先煮一兩沸去上沫沫令人煩其根亦止汗夏月雜粉用之俗用療傷寒解肌第一唐本注云鄭州鹿臺及關中沙苑河傍沙洲上大多其青徐者今不復用同州沙苑最多日華子云通九竅調血脉開毛孔皮膚逐風破癥癖積聚逐五臟邪氣退熱禦山嵐瘴氣雷公云凡使去節并沫若不盡去之令人悶用夾刀剪去節并頭槐砧上用銅刀細銼煎三四十沸竹片掠去上沫盡漉出曬乾用之禹錫云按藥性論云麻黃君味甘平能治身上毒風𤸷痹皮肉不仁主壯熱解肌發汗溫瘧治溫疫根節能止汗方曰并故竹扇杵末撲之又牡蠣粉粟粉并根等分末生絹袋盛盜汗出即撲手摩之傷寒類要張仲景傷寒論云黃疸病以麻黃醇酒湯主之麻黃一把去節綿裹以美酒五升煮取半升去滓頓服子母祕録治産後腹痛及血下不盡麻黃去節杵末酒服方寸七日二三服血下盡即止澤蘭湯服亦妙衍義曰麻黃出鄭州者佳剪去節半兩以蜜一匙匕同炒良久以水半升煎俟沸去上沫再煎去三分之一不用滓病瘡疱倒饜黑者乘熱盡服之避風伺其瘡復出一法用無灰酒煎但小兒不能飲酒者難服然其效更速以此知此藥入表也通草通草味辛甘平無毒主去惡蟲除脾胃寒熱通利九竅血脉關節令人不忘療脾疸常欲眠心煩噦出音聲療耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆音瓮鼻息肉墮胎去三蟲一名附支一名丁翁生石城山谷及山陽正月採枝陰乾圖經曰通草生石城山谷及山陽今澤潞漢中江淮湖南州郡亦有之生作藤蔓大如指其莖幹大者徑三寸每節有二三枝枝頭出五葉頗類石韋今人謂之木通俗間所謂通草乃通脫木陶隱居云今出近道繞樹藤生汁白莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良或云即葍藤莖陳藏器云通脫木無毒花上粉主諸蟲瘡野雞病取粉內瘡中生山側葉似萆麻心中有瓤輕白可愛女工取以飾物爾雅云離南活脫也一本云藥草生江南主蟲病今俗亦名通草又云本功外子味甘利大小便宣通去煩熱食之令人心寬止渴下氣江東人呼為畜葍子江西人呼為拏子如算袋穰黃子黑食之當去其皮蘇云色白乃猴葍也日華子云木通安心除煩止渴退熱治健忘明耳目治鼻息通小腸下水破積聚血塊排膿治瘡癤止痛催生下胞女人血閉月候不勻天行時疾頭痛目眩羸劣乳結及下乳子名𧄏子七八月採禹錫云按藥性論云木通臣微寒一名王翁萬年主治五淋利小便開關格治人多睡主水腫浮大除煩熱用根治項下瘤癭陳士良云燕𧄏子寒無毒主胃口熱閉反胃不下食除三焦客熱此是木通實名桴掞子莖名木通主理風熱淋疾小便數急疼小腹虛滿宜煎湯并葱食之有效野生海藥云謹按徐表南州記云生廣州山谷味溫平主諸瘻瘡喉嚨痛及喉痹并宜煎服之磨亦得急即含之食療云煮飲之通婦人血氣濃煎三五盞即便通又除寒熱不通之氣消鼠瘻金瘡踒折煮汁釀酒也芍藥芍藥味苦酸平微寒有小毒主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣通順血脉緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛腰痛一名白术一名餘容一名犁食一名解倉一名鋌半中嶽川谷及丘陵二月八月採根暴乾須丸為之使禹錫等按别本作雷丸惡石斛芒消畏消石鱉甲小薊反藜蘆圖經曰芍藥生中嶽川谷及丘陵今處處有之淮南者勝春生紅芽作叢莖上三枝五葉似牡丹而狹長高一二尺夏開花有紅白紫數種子似牡丹子而小秋時採根根亦有赤白二色崔豹古今注云芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非也正元廣利方治婦女赤白下年月深久不差者白芍藥三大兩乾薑半大兩細銼熬令黃搗篩空肚和飲汁服一錢七藥性論云芍藥臣能治肺邪氣腹中㽱痛血氣積聚通宣臟腑擁氣治邪痛敗血主時疾骨熱强五臟補腎氣治腹堅脹婦人血閉不通消瘀血能蝕膿陶隱居云今出白山蔣茅山最好白而長大餘處亦有而多赤赤者小利俗呼以止痛乃不减當歸道家亦服食之又煮石用之别本注云此有兩種赤者利小便下氣白者止痛散血其花亦有紅白二色日華子云治風補勞主女人一切病并産前後諸疾通月水退熱除煩益氣雷公云凡採得後於日中曬乾以竹刀刮上粗皮并頭土了銼蜜水拌蒸從已至未曬乾用禹錫云按吳氏云芍藥神農苦桐君甘無毒岐伯鹹季氏小寒雷公酸别說云今淮南真陽尤多藥家見其肥大而不知香味絶不佳故入藥不可責其效今考用宜依本經所說川谷丘陵有生者為勝爾經驗後方治風毒骨髓疼痛芍藥二分虎骨一兩炙為末夾絹袋盛酒三升漬五日每服二合日三服博濟方治五淋赤芍藥一兩檳榔一個麵裹煨為末每服一錢匕水一盞煎至七分空心服廣利方金瘡血不止痛白芍藥一兩熬令黃杵細為散酒或米飲下二錢并得初三服漸加初虞世治咯血衄血白芍藥一兩犀角末一分為末新水服一錢七血止為限衍義曰芍藥全用根其品亦多須用花紅而單葉山中為佳花葉即多根虛然其根多赤色其味澀苦或有色白粗肥者益好餘如經然血虛寒人禁此一物古人有言者减芍藥以避中寒誠不可忽蠡實蠡實味甘平溫無毒主皮膚寒熱胃中熱氣風寒濕痹堅筋骨令人嗜食止心煩滿利大小便長肌膚肥大久服輕身花葉去白蟲療喉痹多服令人溏泄一名荔實一名劇草一名三堅一名豕首生河東川谷五月採實陰乾圖經曰蠡實馬藺子也北人音訛呼為揀子生河東川谷今陜西諸郡及鼎澧州亦有之近京尤多葉似薤而長厚三月開紫碧花五月結實作角子如麻大而赤色有棱根細長通黃色人取以為刷三月採花五月採實并陰乾用崔元亮治喉痹腫痛取荔花皮根共十二分以水一升煮六合去滓含之細細咽汁差止陶隱居云方藥不復用俗無識者本名精亦名豕首也日華子云馬藺治婦人血氣煩悶産後血運并經脉不止崩中帶下消一切瘡癤腫毒止鼻洪吐血通小腸消酒毒治黃病傅蛇蟲咬殺菌毒亦可蔬菜食莖葉同用外臺祕要治喉痹垂死者杵蠡實根一握水絞取汁稍稍咽之口噤灌之千金方治中蠱下血如雞肝出其餘四臟悉壞唯心未毁或鼻破待死取馬藺根末水服方寸七隨吐則出極神此苗似葛蔓緑紫生子似橘子衍義曰蠡實陶隱居云方藥不復用俗無識者本經諸家所注不相應若果是馬藺其日華子不當更言亦可為蔬菜食蓋馬藺其葉馬牛皆不食為才出土葉已硬况又無味豈可更堪人食也今不敢以蠡實為馬藺子更俟博識者瞿麥瞿麥味苦辛寒無毒主關格諸癃結小便不通出刺决癰腫明目去翳破胎墮子下閉血養腎氣逐膀胱邪逆止霍亂長毛髮一名巨句麥一名大菊一名大蘭生太山川谷立秋採實陰乾蓑草牡丹為之使惡螵蛸圖經曰瞿麥生太山川谷今處處有之高一尺以來葉尖小青色根紫黑色形如細蔓菁花紅紫赤色亦似朠山紅二月至五月開花七月結實作穗子頗似麥故名瞿麥立秋後合子葉收採陰乾用古今方通心經利小腸為最要張仲景治小便不利有水氣栝蔞瞿麥丸主之陶隱居云今出近道一莖生細葉花紅紫赤可愛合子葉刈取之子頗似麥故名瞿麥此類乃有兩種一種肥大花邊有叉丫未知何者是今市人皆用小者復一種葉廣相似而有毛花晚而甚赤按經云採實實中子至細燥熟便脫盡今市人惟合莖葉用而實正空殼無復子爾日華子云瞿麥催生又名杜母草燕麥蘥麥又云石竹治痔瘻并瀉血作湯粥食并得雷公云凡使只用蕊殼不用花葉若一時使即空心令人氣咽小便不禁凡欲用須以堇竹瀝浸一伏時漉出曬乾使用外臺祕要治鯁以瞿麥為末水調方寸七千金方治産經數日不出或子死腹中母欲死以瞿麥煮濃汁服之梅師方治竹木刺入肉中不出瞿麥為末水服方寸匕或煮瞿麥汁飲之日三千金同崔氏方治魚臍瘡毒腫燒灰和油傅於腫上甚佳衍義曰瞿麥八政散用瞿麥今人為至要藥若心經雖有熱而小腸虛者服之則心熱未退而小腸别作病料其意者不過為心與小腸為傳送故用此入小腸藥按經瞿并不治心熱若心無大熱則當止治其心若或制之不盡須當求其屬以衰之用八正散者其意如此玄參玄參味苦鹹微寒無毒主腹中寒熱積聚女子産乳餘疾補腎氣令人目明主暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧灑灑血瘕下寒血除胸中氣下水止煩渴散頸下核癰腫心腹痛堅癥定五臟久服補虛明目强陰益精一名重臺一名玄臺一名鹿腸一名正馬一名咸一名生河間川谷及冤句三月四月採根暴乾惡黃耆乾薑大棗山茱萸反藜蘆圖經曰玄參生河間及冤句今處處有之二月生苗葉似脂麻又如槐柳細莖青紫色七月開花青碧色八月採子黑色亦有白花莖方大紫赤色而有細毛有節若竹者高五六尺葉如掌大尖長如鋸齒其根尖長生青白乾即紫黑新者肥膩一根生五七枚三八九月采暴乾或云蒸日乾陶隱居云今出近道處處有莖似人參而長大根甚黑亦微香道家時用亦以合香唐本注云玄參根苗臭莖亦不似人參陶云道家亦以合香未見其理也日華子云治頭風熱毒遊風補勞虛損心驚煩躁劣乏骨蒸傳尸邪氣止健忘消腫毒雷公云凡採得後須用蒲葉重重相隔入甑蒸兩伏時後出乾曬使用時勿令犯銅餌之後噎人喉喪人目揀去蒲草盡了用之禹錫云按藥性論云玄參使一名逐馬味苦治暴結熱主熱風頭痛傷寒勞復散瘤癭瘰癧經驗方治患勞人燒香法玄參一斤甘松六兩為末煉蜜一斤和勻入瓷瓶內封閉地中埋窨十日取出更用灰末六兩更煉蜜六兩和勻入瓶內封更窨五日取出燒令鼻中常聞其香疾自愈廣利方治瘰癧經年夂不差生玄參搗碎傅上日二易之秦艽秦艽音交味苦辛平微溫無毒主寒熱邪氣寒濕風痹肢節痛下水利小便療風無問新久通身攣急生飛烏山谷二月八月採根暴乾菖蒲為之使圖經曰秦艽生飛烏山谷今河陜州軍多有之根上黃色相交糾長一尺已來粗細不等枝幹高五六寸葉婆娑連莖梗俱青色如萵苣葉六月開紫花似葛花當月結子每於春秋採根陰乾陶隱居云飛烏或是地名今出甘松龍洞蠶陵長大黃白色為佳根皆作羅紋相交中多御土用之熟破除去方家多作秦膠字與獨活療風常用道家不須爾唐本注云今出涇州鄜州岐州者良本作札或作糾作膠正作艽也日華子云味甘冷主傳尸骨蒸治疳及時氣又名秦艽羅紋者佳雷公云凡使秦并艽須於腳文處認取左文列為秦即治疾艽即發腳氣凡用秦先以布拭上黃肉毛盡然後用還元湯浸一宿至明出日乾用禹錫云按藥性論云秦艽解米脂人食穀不充悅畏牛乳點食之利大小便差五種黃病解酒毒去頭風蕭炳云本經名秦瓜世人以療酒黃黃疸大效聖惠方治傷寒心神熱躁口乾煩渴用秦艽一兩去苗細銼以牛乳一大盞煎六分去滓不計時候分溫一服又方治小便難腹滿悶不急療之殺人用秦艽一兩去苗以水一大盞煎取七分去滓每於食前作兩服差孫真人方治黃疸皮膚眼睛赤金色小便赤取秦艽五兩牛乳三升煮取一升去滓內芒消一兩服百合百合味甘平無毒主邪氣腹脹心痛利大小便補中益氣除浮腫臚脹痞滿寒熱通身疼痛及乳難喉痹止涕泪一名重箱一名摩羅一名中逢花一名强瞿生荆州川谷二月八月採根曝乾圖經曰百合生荆州川谷今近道處處有之春生苗高數尺幹粗如箭四面有葉如雞距又似柳葉青色葉近莖微紫莖端碧白四五月開白花如石榴觜而大根如葫蒜重疊生二三十二月八月採根暴乾人亦蒸食之甚益氣張仲景治病有百合知母湯百合滑石代赭湯百合雞子湯百合地黃湯凡四方病名百合而用百合治之不識其義陶隱居云近道處處有根如葫蒜數十片相纍人亦蒸煮食之乃言初是蛇蚓相纏結變作之俗人皆呼為强仇仇即瞿也聲之訛爾亦堪服食唐本注云此藥有二種一種細葉花紅白色一種葉大莖長根粗花白不入藥用日華子云白百合安心定膽益志養五臟治癲邪啼泣狂叫驚悸殺蠱毒氣協乳癰發背及諸瘡腫并治産後血狂運禹錫云按藥性論云百合使有小毒主百邪鬼魅涕泣不止除心下急滿痛治腳氣熱咳逆食療云平主心急黃蒸過蜜食之作粉尤佳紅花者名山丹不堪食聖惠方治肺臟壅熱煩悶新百合四兩蜜半盞和蒸令軟時時含一棗大咽津又方治傷寒腹中滿痛用百合一兩炒令黃色搗為散不計時候粥飲調下二錢服之孫真人食忌云治陰毒傷寒煮百合濃汁服一升良勝金方治耳聾疼痛以乾百合為末溫水調下二錢匕食後服衍義曰百合張仲景用治傷寒壞後百合病須此也莖高三尺許葉如大柳葉四向攢枝而上其顚即有淡黃白花四垂向下覆長蕊花心有檀色每一枝顚須五六花紫色圓如梧子生於枝葉間每葉一子不在花中此又異也根即百合其色白其形如松子殼四向攢生中間出苗圖經衍義本草卷之十二
