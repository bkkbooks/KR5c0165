body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正獸部上品龍骨龍骨味甘平微寒無毒主心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癇療心腹煩滿四肢痿枯汗出夜卧自驚恚怒伏氣在心下不得喘息腸癰內疽陰蝕止汗縮小便溺血養精神定魂魄安五臟白龍骨療夢寐泄精小便泄精禹錫等按泄精通用藥云白龍骨平微寒齒主小兒大人驚癇癲疾狂走心下結氣不能喘息諸痙殺精物小兒五驚十二癇身熱不可近大人骨間寒熱又殺蠱毒得人參牛黃良畏石膏禹錫等謹按驚邪通用藥及藥對云龍齒平角主驚癇瘛尺曳切瘲子用切身熱如火腹中堅及熱泄久服輕身通神明延年生晋地川谷及泰山巖水岸土穴中死龍處採無時畏乾漆蜀椒理石圖經曰龍骨并齒角出晋地川谷及泰山巖水岸土穴中死龍處今河東州郡多有之或云是龍蛻實非死骨得脊腦作白地錦文舐之著舌者良齒小强猶有齒形角强而實採無時李肇國史補云春水時至魚登龍門蛻其骨甚多人採以為藥而有五色者本經云出晋地龍門又是晋地豈今所謂龍骨者乃此魚之骨乎或云骨有雄雌細文而廣者是雌粗文而狹者是雄凡入藥五色具者尤佳黃白色者次黑色者下皆不得經落不淨處則不堪用骨齒醫家常用角亦稀使石晋時鎮州接邢臺界嘗鬥殺一龍鄉豪有曹寬者見之取其雙角角前有一物如藍色文如亂錦人莫之識曹寬未經年為寇所殺鎮帥俄亦被誅又云海上人言龍每生二卵一為吉吊吉吊多與鹿游或於水邊遺瀝值流槎則粘著木枝如蒲槌狀其色微青黃復似灰色號紫稍花坐湯多用之延齡藥性論云龍骨君忌魚有小毒逐邪氣安心神止冷痢及下膿血女子崩中帶下止夢中精夜夢鬼交治尿血虛而多夢紛紜加而用之陶隱居云今多出梁益間巴中亦有骨欲得脊腦作白地錦文舐之著舌者良齒小强猶有齒形角强而實又有龍腦肥軟亦斷痢云皆是龍蛻非實死也此來巴中數得龍胞吾自親見形體具存云療産餘疾正當末服唐本注云龍骨今并出晋地生碩者不好五色具者良其青黃赤白黑亦應隨色與腑臟相會如五芝五石英五石脂等輩而本經不論莫知所以日華子云龍骨健脾澀腸胃止瀉痢渴疾懷孕漏胎腸風下血崩中帶下鼻洪吐血止汗又云龍齒澀凉治煩悶癲癇熱狂辟鬼魅外臺祕要療傷寒已八九日至十餘日大煩渴熱盛而三焦有瘡𧏾者多下或張口吐舌呵吁目爛口鼻生瘡吟語不識人除熱毒止痢龍骨半斤碎以水一斗煮取四升沉之井底令冷服五合漸漸進之恣意飲尤宜老少千金方婦人無故尿血龍骨一兩以酒調方寸七空心日三肘後方治熱病不解而下痢欲死龍骨半斤搗研水一斗煮取五升候極冷稍稍飲得汗即愈又方若久下痢經時不止者此成休息龍骨四兩如小豆大研碎以水五升煮取二升半令冷分為五服又以米飲和為丸服十丸經驗方暖精氣益元陽白龍骨遠志等分為末煉蜜為丸如梧桐子大卧時冷水下三十丸梅師方治失精暫睡即泄白龍骨四分韭子五合右件為散子空心酒調方寸七服廣利方治鼻中衄血及咯吐血不止五色龍骨作末吹一江豆許於鼻中立止姚氏方治小便出血末龍骨二方寸七水調溫服之日二服差姚和衆方治小兒因痢脫肛白龍骨粉撲之楊文公談苑澤州山中多龍骨蓋龍蛻於土中崖崩多得之體骨頭角皆全衍義曰龍骨諸家之說紛然不一既不能指定終是臆度西京潁陽縣民家忽崖壞得龍骨一副支體頭角悉具不知其蛻也其斃也若謂蛻斃則是有形之物而又生不可得見死方可見謂其化也則其形獨不能化然西域記中所說甚詳但未敢據憑萬物所禀各異造化不可盡知莫可得而詳矣孔子曰君子有所不知蓋闕如也妄亂穿鑿恐誤後學治精滑及大腸滑不可闕也麝香麝香味辛溫無毒主辟惡氣殺鬼精物溫瘧蠱毒癇痓去三蟲療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墮胎去面䵴音孕目中膚翳久服除邪不夢寤魘寐通神仙生中臺川谷及益州雍州山中春分取之生者益良圖經曰麝香出中臺山谷及益州雍州山中今陜西益利河東諸路山中皆有之而秦州文州諸蠻中尤多形似獐而小其香正在陰前皮內别有膜裹之春分取之生者益良此物極難得真蠻人採得以一子香刮取皮膜雜肉餘物裹以四足膝皮共作五子而土人買得又復分揉一為二三其僞可知惟生得之乃當全真耳蘄光山中或時亦有然其香絶小一子才若彈丸往往是真香蓋彼人不甚能作僞耳藥性論云麝香臣禁食大蒜味苦辛除百邪魅鬼疰痛小兒驚癇客忤鎮心安神以當門子一粒丹砂相似細研熟水灌下止小便利能蝕一切癰瘡膿入十香丸令人百毛九竅皆香陶隱居云麝形似獐常食柏葉又噉蛇五月得香往往有蛇皮骨故麝香療蛇毒今以蛇蛻皮裹麝香彌香則是相使也其香正在麝陰莖前皮內别有膜裹之今出隨郡義陽晋熙諸蠻中者亞之出益州者形扁仍以皮膜裹之一子真香分揉作三四子刮取血膜雜以餘物大都亦有精粗破看一片毛共在裹中者為勝彼人以為志若於諸羌夷中得者多真好燒當門沸良久即好今惟得活者自看取之必當全真爾生香人云是精溺凝作之殊不爾麝夏月食蛇蟲多至寒香滿入春患急痛自以腳剔出之著屎溺中覆之皆有常處人有遇得乃至一斗五升也用此香乃勝殺取者帶麝非但香亦辟惡以真者一子置頸間枕之辟惡夢及尸疰鬼氣日華子云辟邪氣殺鬼毒蠱氣瘧疾催生墮胎殺臟腑蟲制蛇蠶咬沙虱溪瘴毒吐風痰內子宫暖水臟止冷帶疾雷公云凡使多有僞者不如不用其香有三等一者名遺香是麝子臍閉滿其麝自於石上用蹄尖彈臍落處一里草木不生并焦黃人若收得此香價與明珠同也二名膝香採得甚堪用三名心結香被大獸驚心破了因兹狂定雜諸群中遂亂投水被人收得擘破見心流在脾上結作一大乾血塊可隔山間早聞之香是香中之次也凡使麝香并用子日開之不用苦細研篩用之也段成式酉陽雜俎云水麝臍中惟水瀝一滴於斗水中用灑衣衣至敗其香不歇每取以針剌之稔以真雄黃則合香氣倍於肉麝天寶初虞人獲詔養之楊文公談苑公常言商汝山多群麝所遺糞常就一處雖遠逐食必還走之不敢遺迹他所慮為人獲人反以是求得必絶群而取之麝絶愛其臍每為人所逐勢急即投巖舉爪剔裂其香就縶而死猶拱四足保其臍李商隱詩投巖麝退香許渾云尋麝採生香廣利方治中惡客忤垂死麝香一錢重研和醋二合服之即差又方治小兒驚啼發咳不定用真好麝香研細每服清水調下一字日三服量兒大小服楊氏産乳方療中水氣已服藥未平除麝香如大豆三枚細研奶汁調分為四五服衍義曰麝每糞時須聚糞及有遺麝氣遂為人獲亦物之一病爾此獵人云餘如經牛黃牛黃味苦平有小毒主驚癇寒熱熱盛狂痓除邪逐鬼療小兒百病諸癇熱口不開大人狂癲及墮胎久服輕身增年令人不忘生晋地平澤於牛得之即陰乾百日使時燥無令見日月光人參為之使得牡丹菖蒲利耳目惡龍骨地黃龍膽蜚蠊畏牛膝圖經曰牛黃出晋地平澤今出登萊州他處或有不甚佳凡牛有黃者毛皮光澤眼如血色時復鳴吼又好照水人以盆水承之伺其吐出乃喝迫即墮落水中既得之陰乾百日一子如雞子黃大其重叠可揭輕虛而氛香者佳然此物多僞今人試之皆揩摩手甲上以透甲黃者為真又云此有四種喝迫而得者名生黃其殺死而在角中得者名角中黃心中剝得者名心黃初在心中如漿汁取得便投水中沾水乃硬如碎蒺藜或皂莢子是也肝膽中得之者名肝黃大抵皆不及喝迫得者最勝凡牛之入藥者水牛𤚩牛黃牛取乳及造酥酪醍醐等然性亦不同水牛乳凉𤚩牛乳溫其肉皆寒也其自死者皆不可食其酥以合諸膏摩風腫腕跌血瘀則牛酥為强醍醐尤佳又有底野迦是西戎人用諸膽和合作之狀似久壞丸藥赤黑色今南海或有之又中品有牛角鰓用水牛黃牛久在糞土中爛白者主赤白下燒灰末服之陶隱居云舊云神山出入鳴吼者有之伺其出角上以盆水承而吐之即墮落水中今人多皆就膽中得之多出梁益一子如雞子黃大相重叠藥中之貴莫復過此唐本注云牛黃今出萊州密州淄州青州雋州戎州牛有黃者必多吼喝迫而得之謂之生黃最佳黃有三種散黃粒如麻豆慢黃若雞卵中黃糊在肝膽圓黃為塊形有大小并在肝膽中多生於𤚩特牛其吳牛未聞有黃也禹錫云按藥性論云牛黃君惡常山畏乾漆味甘能辟邪魅安魂定魄小兒夜啼主卒中惡日華子云牛黃凉療中風失音口噤婦人血噤驚悸天行時疾健忘虛乏雷公云凡使有四件第一是生神黃賺得者次有角黃是取之者又有小黃是病死後識者剝之擘破其心其黃在心中如濃黃醬汁採得便投於水中黃沾水復硬如碎蒺藜子許如豆者硬如帝珠子又有肝黃其牛身上光眼如血色多玩弄好照水自有夜光恐懼人或有人别採之可有神妙之事凡用須先單搗細研如塵却絹裹又有黃嫩牛皮裹安於井面上去水三四尺已來一宿至明方取用之吳氏云牛黃無毒牛出入呻者有之夜光走角中牛死入膽中如雞子黃聖惠方初生兒至十日口噤以牛黃少許細研淡竹瀝調下一字灌之更以猪乳點口中差又方治小兒腹痛夜啼用牛黃如小豆大乳汁化服又臍下書一田字差廣利方治孩子驚癇不知迷悶嚼舌仰目牛黃一大豆研和蜜水服之姚和衆治小孩初生三日去驚邪辟惡氣牛黃一大豆許細研以赤蜜酸棗許熟研以綿蘸之令兒吮之一日令盡衍義曰牛黃亦有駱駝黃皆西戎所出也駱駝黃極易得醫家當審别考而用之為其形相亂也黃牛黃輕鬆自然微香以此為異蓋又有牦牛黃堅而不香熊脂熊脂味甘微寒微溫無毒主風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白秃面皯疱食飲吐嘔久服强志不饑輕身長年生雍州山谷十一月取圖經曰熊脂并膽出雍州山谷今雍洛河東及懷衛山中皆有之熊形類犬豕而性輕健好攀緣上高木見人則顚倒自投地而下冬多入穴而藏蟄始春而出脂謂之熊白十一月取之須其背上者寒月則有夏月則無其腹中肪及他處脂煎煉亦可作藥而不中啖膽陰乾用然亦多僞欲試之取粟顆許滴水中一道若線不散者為真其足蹯為食珍之貴古人最重之然臑之難熟多食之令人耐寒腦髓作油摩頭可去白屑有痼疾者不可食熊令人終身不愈熊惡鹽食之則死陶隱居云此脂即是熊白是背上膏寒月則有夏月則無其腹中肪及身中膏煎取可作藥而不中啖今東西諸山縣皆有之自是非易得物爾痼疾不可食熊肉令終身不除愈唐本注云熊膽味苦寒無毒療時氣熱盛變為黃疸暑月久痢疳𧏾心痛疰忤腦療諸聾血療小兒客忤脂長髮令黑悅澤人面酒煉服之差風痹凡言膏者皆脂消已後之名背上不得言膏左傳義云膏肓者乃是鬲肓文誤有此名陶言背膏同於舊說也禹錫云按藥性論云熊膽臣惡防己地黃至小兒五疳殺蟲治惡瘡又云熊脂君能治面上䵟𪒟及治瘡日華子云熊白凉治五腫風補虛損殺勞蟲脂强心腦髓去白秃風屑療頭旋并髮落掌食可御風寒此是八珍之數膽治疳瘡耳鼻瘡及諸疳疾雷公云凡收得煉過就器中安生椒每一斤熊脂入生椒十四個煉了去脂革并椒入瓶中食療云熊脂微寒甘滑冬中凝白時取之作生無以偕也脂入拔白髮膏中用極良脂與猪脂相和燃燈烟入人目中令失光明緣熊脂烟損人眼光肉平味甘無毒主風痹筋骨不仁若腹中有積聚寒熱者食熊肉永不除差其骨煮湯浴之主歷節風亦主小兒客忤膽寒主時氣盛熱疳𧏾小兒驚癇十月勿食傷神小兒驚癇瘈瘲熊膽兩大豆許和乳汁及竹瀝服并得去心中涎良聖惠方治小兒疳瘡蟲蝕鼻用熊膽半分湯化調塗於鼻中熊掌得酒醋水三件煮熟即嗔大如皮球食之耐風寒外臺祕要療蜎心痛熊膽如大豆和水服大效又方五十年痔不差塗熊膽取差神效千金翼療髮黃熊脂塗髮梳之散頭入床底伏地一食頃即出便盡黑不過一升脂驗食醫心鏡療腳氣風痹不仁五緩筋急熊肉半斤於豉汁中和薑椒葱白鹽醬作腌臘空腹食之又方主中風心肺風熱手足不隨及風痹不任筋脉五緩恍惚煩躁熊肉一斤切如常法調和作腌臘空腹食之斗門方治水弩射人熊膽塗之更以雄黃同用酒摩服之即愈象牙象牙無毒主諸鐵及雜物入肉刮取屑細研和水傅瘡上及雜物剌等立出齒主癇病屑為末炙令黃飲下肉味淡不堪啖多食令人體重主秃瘡作灰和油塗之晴主目疾和乳滴目中胸前小橫骨令人能浮水作灰酒服之身有百獸肉皆自有分段惟鼻是其本肉餘并雜肉圖經曰象牙舊不著所出州郡爾雅云南方之美者有梁山之犀象焉今多出交趾潮循州亦有之彼人捕得爭食其肉云肥脆堪作炙或云象有十二種肉配十二辰屬惟鼻是其肉又膽不附肝隨月在諸肉間淳化中上苑一馴象斃太宗命取膽不獲使問徐鉉鉉曰當在前左足既而剖足果得又問其故鉉曰象膽隨四時今其斃在春故知左足也世傅荆蠻山中亦有野象蓋左氏傳所謂楚師燧象以奔吳軍是其事也然楚粵之象皆青惟西竺林大食諸國乃多白象樊綽雲南記平居誨于闐行程記皆言其事象牙主諸物剌人肉刮取屑細研和水傅瘡上刺立出咽中刺則水調飲之舊牙梳屑尤佳齒及肉目睛等醫方亦或有用者禹錫云按日華子云象牙平治小便不通生煎服之小便多燒灰飲下膽明目及治疳太平廣記安南有象能知人曲直有鬥訟者行立而嗅之有理者則過無理者以鼻卷之擲空數丈以牙接而剌之以水洗牙飲之愈疾象膽隨四時在四腿春在前左夏在前右如龜定體鼻端有爪可拈針肉有十二般惟鼻是本肉胸前小骨灰之酒服可令人能浮水出沒食其肉令人體重古訓云象孕五歲始産肘後方治箭并針折在肉中細刮象牙屑以水和傅上即出簡要濟衆方主小兒誤為諸骨及魚骨剌入肉不出水煮白梅肉爛研後調象牙末厚傅有剌處自軟海藥謹按內典云象出西國有二牙四牙者味寒主風癇熱骨蒸勞諸瘡等并皆宜生屑入藥琥珀竹膏真珠犀角牛黃等良西域重之用飾床座中國貴之以為笏崑崙諸國有象生於山谷每遇解牙人不可取崑崙以白木為牙易之酉陽雜俎云生文理必國富又云龍與象六十歲骨方足衍義曰象牙取口兩邊各出一牙下垂夾鼻者非口內食齒齒别入藥令為象笏者是牙也白膠味甘平溫無毒主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎療吐血下血崩中不止四肢酸疼多汗淋露折跌傷損折言舌跌音迭久服輕身延年一名鹿角膠生雲中煮鹿角作之得火良畏大黃圖經曰文具阿膠條下禹錫云按藥性論云白膠又名黃明膠能主男子腎臟氣衰虛勞損婦人服之令有子能安胎去冷治漏下赤白主吐血食療云傅腫四邊中心留一孔子其腫即頭自開也治咳嗽不差者黃明膠炙令半焦為末每服一錢七人參末二錢七用薄豉湯一盞八分葱少許入銚子煎一兩沸後傾入盞遇咳嗽時呷三五口後依前溫暖却准前咳嗽時吃之也外臺祕要療虛勞尿血乾膠三兩炙搗末酒二升和溫服又方治凡腫已潰未潰者以膠一片水漬令軟納納然腫毒大小貼當頭上開孔若已潰還合者膿當披膠急撮之膿皆出盡未有膿者腫當自消矣又方補虛勞益髓長肌悅顔色令人肥健鹿角膠炙搗為末酒服方寸七日三服千金方治耳中有物不可出以麻繩剪令頭散傅好膠著耳中物上粘之令相著徐徐引出肘後方治妊娠卒下血以酒煮膠二兩消盡頓服斗門方治肺破出血忽嗽血不止者用海犀膏一大片於火上炙令焦黃色後以膠塗之又炙膠塗令通透可碾為末用湯化三大錢七放冷服之即血止水膠是也大驗談氏小兒方治小兒面上瘡豆子瘢法黃明膠慢火炙為末溫酒調服一錢七出者服之無瘢未出服之瀉下又治小兒火燒瘡滅瘢痕黃明膠小雞翎掃之阿膠阿膠味甘平微溫無毒主心腹內崩勞極灑灑音蘚如瘧狀腰腹痛四肢酸痛女子下血安胎丈夫小腹痛虛勞羸瘦陰氣不足腳酸不能久立養肝氣久服輕身益氣一名傅致膠生東平郡煮牛皮作之出東阿畏大黃得火良圖經曰阿膠出東平郡煮牛皮作之出東阿故名阿膠今鄆州皆能作之以阿縣城北井水作煮為真造之用阿井水煎烏驢皮如常煎膠法井官禁真膠亦難得都下貨者甚多恐非真尋方書所說所以勝諸膠者大抵以驢皮得阿井水乃佳耳廣濟方療癱緩風及諸風手腳不遂腰腳無力者驢皮膠炙令微起煮葱豉粥一升别貯又以水一升煮香豉二合去滓內膠更煮六七沸膠煬如餳頓服之及暖吃前葱豉粥任意多少如冷吃令人嘔逆頓服三四劑即止禁如藥法又膠之止泄得蠟黃連尤佳陶隱居云出東阿故曰阿膠也今東都下亦能作之用皮亦有老少膠則有清濁凡三種清薄者畫用厚而清者名為盆覆膠作藥用之皆火炙丸散須極燥入湯微炙爾濁黑者可膠物不入藥用用一片鹿角即成膠不爾不成也陳藏器云阿井水煎成膠人間用者多非真也凡膠俱療風止泄補虛驢皮膠主風為最禹錫云按藥性論云阿膠君主堅筋骨益氣止痢署預為之使雷公云凡使先於猪脂內浸一宿至明出於柳木火上炙待炮子細碾用聖惠方治妊娠尿血用阿膠炒令黃燥為散每食前以粥飲調下二錢七梅師方治妊娠無故卒下血不止取阿膠三兩炙搗末酒一升半煎令消一服愈又一方以阿膠二兩搗末生地黃半斤搗取汁以清酒三升絞汁分三服楊氏産乳療妊娠血痢阿膠二兩以酒一升半煮取一升頓服酥音蘇微寒補五臟利大腸主口瘡圖經文具牛黃條下陶隱居云酥出外國亦從益州來本是牛羊乳所為作之自有法佛經稱乳成酪酪成酥酥成醍醐醍醐色黃白作餅甚甘肥亦時至江南唐本注云酥掏吐刀切酪作之其性猶與酪異聖通言功是陶之未達然酥有牛酥羊酥而牛酥勝羊酥其牦牛復優於家牛也陳藏器云酥堪合諸膏摩風腫踠跌血瘀日華子云牛酥凉益心肺止渴嗽潤毛髮除肺痿心熱并吐血禹錫云按蜀本云酥味甘孟詵云寒主胸中熱補五臟利腸胃食療云寒除胸中熱補五臟利腸胃水牛酥功同寒與羊酥同功羊酥真者勝牛酥聖惠方豆蜂螫人以酥傅之愈又方主惡蟲咬以酥和鹽傅之差羊乳溫補寒冷虛乏陶隱居云牛乳羊乳實為補潤故北人皆多肥健禹錫云按藥性論云羊乳臣味甘無毒主心肺治消渴食療云補肺腎氣和小腸亦主消渴治虛勞益精氣合用作羹食補腎虛亦主女子與男子中風蚰蜒入耳以羊乳灌耳中即成水又主小兒口中爛瘡取羊生乳含五六日差經驗方治蜘蛛咬一身生絲羊乳一件飲之牛乳微寒補虛羸止渴唐本注云水牛乳造石蜜須之言作酪濃厚味勝𤚩牛𤚩牛乳性平生飲令人痢熟飲令人口乾似溫也陳藏器云黃牛乳生服利人下熱氣冷補潤膚止渴和酥煎三五沸食之去冷氣痃癖羸瘦凡服乳必煮一二沸停冷啜之熱食即壅不欲頓服欲得漸消與酸物相反令人腹中結癥凡以乳及溺屎去病黑牛勝黃牛太平廣記貞觀中太宗苦於氣痢衆醫不效詔問殿廷左右有能治其疾者當重賞之有術士進以乳汁煎蓽撥服之立差酪味甘酸寒無毒主熱毒止渴解散發利除胸中虛熱身面上熱瘡肌瘡唐本注云按牛羊馬水牛乳并爾言驢乳尤冷不堪作酪也千金翼療丹癮疹方酪和鹽熱煮以摩之手下消廣利方療蚰蜒入耳以牛酪灌耳中須臾蟲出入腹中即飲酪二升自消為黃水醍醐味甘平無毒主風邪痹氣通潤骨髓可為摩藥性冷利功優於酥生酥中唐本注云此酥之精液也好酥一石有三四升醍醐熟拌煉貯器中待凝穿中至底便津出得之陶云黃白為餅此乃未達之言唐本先附禹錫云按蜀本云一說在酥中盛冬不凝盛夏不融者是也日華子云醍醐止驚悸心熱頭疼明目傅腦頂心聖惠方治中風煩熱皮膚瘙癢用醍醐四兩每服酒調下半匙衍義曰醍醐作酪時上一重凝者為酪麵酪面上其色如油者為醍醐熬之即出不可多得極甘美雖如此取之用處亦少惟潤養瘡痂最相宜馬乳止渴唐本注云馬乳與驢乳性同冷利止渴療熱馬乳作酪彌應酷冷江南乏馬乳今俱合是冷委言之驢乳療微熱黃小兒中熱驚熱服之亦利胡言馬酪性溫飲之消肉當以物類自相制伏不拘冷熱也陳藏器云味甘治熱性冷利孫真人云合生魚食則作瘕乳腐微寒潤五臟利大小便益十二經脉微動氣細切如豆麵拌醋漿水煮二十餘沸治赤白痢小兒患服之彌佳底野迦味辛苦平無毒主百病中惡客忤邪氣心腹積聚出西戎唐本注云彼人云用諸膽作之狀似久壞丸藥赤黑色胡人時將至此甚珍貴試用有效烏氈無毒主火燒生瘡令不著風水止血除賊風燒為灰酒下二錢七主産後血下不止久卧吸人脂血令人無顔色上氣海獺味鹹無毒主人食魚中毒魚骨傷人痛不可忍及鯁不下者取皮煮汁服之海人亦食其肉似獺大如犬腳下有皮如人胼拇毛著水不濡海中魚獺海牛海馬海驢等皮毛在陸地皆候風潮猶能毛起博物志有此說也土撥鼠味甘平無毒主野雞瘻瘡肥美煮食之宜人生西蕃山澤穴土為窠形如獺夷人掘取食之魏略曰大秦國出辟毒鼠近似此也圖經衍義本草卷之二十七
