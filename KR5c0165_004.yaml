body:
  text: 宋遍直郎辨驗藥材寇宗奭編撰宋大醫助教辨驗藥材許洪校正玉石部中品磁石味辛鹹寒無毒主周痹禹錫等按蜀本注云凡痹隨血脉上下不能左右去者爲周痹風濕肢節中痛不可持物洗酸痟除大熱煩滿及耳聾養腎臟强骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癇煉水飲之亦令人有子一名玄石一名處石生太山川谷及慈山山陰有鐵處則生其陽採無時柴胡爲之使殺鐵毒惡牡丹莽草畏黄石脂圖經曰磁石生太山山谷及慈山山陰有鐵處則生其陽今慈州徐州及南海傍山中皆有之慈州者歲貢最佳能吸鐵虚連十數針或一二斤刀器回轉不落者尤眞採無時其石中有孔孔中黃赤色其上有細毛性温功用更勝謹按南州異物志云漲海崎頭水淺而多磁石徼外大舟以鐵葉銅之者至此多不得過以此言之海南所出尤多也按磁石一名玄石而此下自有玄石條云生太山之陽山陰有銅銅者雌鐵者雄主療頗亦相近而寒温銅鐵畏惡乃别蘇恭以爲鐵液也是磁石中無孔光澤純黑者其功劣於磁石又不能懸針今北蕃以磁石作禮物其塊多光澤又吸針無力疑是此石醫方罕用藥性論云磁石臣味鹹有小毒能補男子腎虚風虚身强腰中不利丹方用之陶隱居云今南方有好者能懸吸針虚連三四爲佳殺鐵毒消金仙經丹方黄白術用之陳藏器云磁石毛味鹹温無毒主補絶傷益陽道止小便白數治腰脚去瘡瘻長肌膚令人有子宜入酒出相州北山磁石毛鐵之母也取鐵如母之招子焉本經有磁石不言毛毛石功狀殊也又言磁石寒此彌誤也日華子云磁石味甘澀平治眼昏筋骨羸弱補五勞七傷除煩燥消腫毒小兒誤吞鐵針等即細末筋肉莫令斷與磁石同下之雷公云凡使勿誤用玄中石并中麻石此石之二眞相似磁石只是吸鐵不得中麻石心有赤皮粗是鐵山石也誤服之令人有惡瘡不可療夫欲驗者一斤磁石四面只吸鐵一斤者此名延年沙四面只吸得鐵八兩者號曰續未石四面只吸得五兩已來者號曰磁石聖惠方治小兒誤吞針用磁石如棗核大磨令光鑽作竅絲穿令含針自出外臺秘要療丁腫取磁石搗爲粉釅醋和封之根即立出差鬼遺方治金瘡腸出欲入之磁石滑石各三兩爲末以白米飲調方寸匕服日再服衍義曰磁石色輕紫石上皸澀可吸連針鐵俗謂之熁鐵石養益腎氣補填精髓腎虚耳聾目昏皆用之入藥須燒赤醋焠其玄石即磁石之黑色者也多滑淨其治體大同小異不可不分而爲二也磨其石則能指南然常偏東不全南也其法取新纊中獨縷以半芥子許蠟綴于針腰無風處垂之則針常指南以針橫貫燈心浮水上亦指南然常偏東位蓋丙爲大火庚辛金受其制故如是物理相感爾玄石玄石味鹹温無毒主大人小兒驚癇女子絶孕小腹冷痛少精身重服之令人有子一名玄水石一名處石生太山之陽山陰有銅銅者雌黑者雄惡松脂柏實菌桂圖經具磁石下陶隱居云本經磁石一名玄石别録各一種今按其一名處石既同療體又相似而寒温銅鐵及畏惡有異俗方既不復用之亦無識其形者不知與磁石相類否唐本注云此物鐵液也但不能拾針療體如經劣於磁石磁石中有細孔孔中黄赤色初破好者能連十針一斤鐵刀亦被迴轉其無孔光澤純黑者玄石也不能吸針凝水石味辛甘寒大寒無毒主身熱腹中積聚邪氣皮中如火燒煩滿水飲之除時氣熱盛五臟伏熱胃中熱煩滿止渴水腫小腹痹久服不饑一名白水石一名寒水石一名凌水石色如雲母可析者良鹽之精也生常山山谷又中水縣及邯鄲解巴豆毒畏地榆藥性論云寒水石能壓丹石毒風去心煩渴悶解傷寒復勞陶隱居云常山屬并州中水縣屬河間郡邯鄲即趙郡并屬冀州域此處地皆鹹鹵故云鹽精而碎之亦似朴消此石未置水中夏月能爲冰者佳唐本注云此石有兩種有縱理橫理色清明者爲佳或云縱理爲寒水石橫理爲凝水石今出同州韓城色青黄理如雲母爲良出澄城者斜理文色白爲劣也禹錫云按吴氏云神農辛岐伯醫和扁鵲甘無毒季氏大寒或生邯鄲採無時如雲母色雷公云凡使先須用生薑自然汁煮汁盡爲度細研如粉用每修十兩用薑汁一鎰傷寒類要治肉癉其人小便白以凝水石主之也丹房鏡源云凝水石可作油衣可食制丹砂爲匱伏玄精經驗方治小兒丹毒皮膚熱赤用寒水石半兩白土二分搗羅爲末用米醋調傅之愈集驗方治風熱心躁口乾狂言渾身壯熱及中諸毒龍腦甘露丸寒水石半斤燒半日淨地坑内盆合四面濕上擁起候經宿取出入甘草末天竺黄各二兩龍腦二分糯米膏丸彈大蜜水下衍義曰凝水石又謂之寒水石紋理通徹人或磨刻爲材以備暑月之用入藥須燒過或市人燒入膩粉中以亂眞不可不察也陶隱居言夏月能爲冰者佳如此則舉世不能得似乎失言陽起石味鹹微温無毒主崩中漏下破子臟中血癥瘕結氣寒熱腹痛無子陰痿不起補不足療男子莖頭寒陰下濕癢去臭汗消水腫乆服不饑令人有子一名白石一名石生一名羊起石雲母根也生齊山山谷及琅琊或雲山陽起山採無時桑螵蛸爲之使惡澤瀉菌桂雷丸蛇蜕皮畏菟絲圖經曰陽起石生齊山山谷及琅琊或雲山陽起山今惟出齊州他處不復有或云邢州鵲山亦有之然不甚好今齊州城西惟一土山石出其中彼人謂之陽起山其山常有温暖氣雖盛冬大雪遍境獨此山無積白蓋石氣熏蒸使然也山惟一穴官中常禁閉至初冬則州發丁夫遣人監視取之歲月積乆其穴益深鑱鑿他石得之甚難以色白肌理瑩明若狼牙者爲上亦有夾他石作塊者不堪每歲採擇上供之餘州中貨之不爾市賈無由得也貨者雖多而精好者亦難得藥性論云陽起石惡石葵忌羊血味甘平主補腎氣精乏腰疼膝冷濕痹能暖女子子宫乆冷冷癥寒瘕止月水不定陶隱居云此所出即與雲母同而甚似雲母但厚實爾今用乃出益州與礬石同處色小黄黑即礬石雲母根未知何者是俗用乃稀仙經亦服之唐本注云此石以白色肌理似殷孽仍夾帶雲母緑潤者爲良故本經一名白石今有用純黑如炭者誤矣雲母條中既云黑者名雲膽又名地涿服之損人黑陽起石必爲惡矣經言生齊山齊山在齊州歷城西北五六里採訪無陽起石陽起石乃齊山西北六七里盧山出之本經云或雲山雲廬字訛矣今太山沂州惟有黑者其白者獨出齊州也禹錫云吴公氏云陽起石神農扁鵲酸無毒桐君雷公岐伯鹹無毒季氏小寒或生太山南海藥譜云陽起石惟太山所出黄者絶佳邢州鵲山出白者亦好衍義曰陽起石如狼牙者佳其外色不白如薑石其大塊者亦内白治男子婦人下部虚冷腎氣乏絶子臟久寒須水飛研用凡石藥冷熱皆有毒宜斟酌味辛温無毒主傷食不化邪氣結惡瘡疽瘻痔利九竅下乳汁男子陰瘡女子陰蝕及傷食病常欲眠睡一名通石殷孽根也青黄色生梁山山谷木蘭爲之使惡細辛圖經曰文具石鍾乳條下藥性論云孔公孽忌羊血味甘有小毒主治腰冷膝痹毒風男女陰蝕瘡治人常欲多睡能使喉聲圓亮陶隱居云梁山屬馮翊郡此即今鍾乳床也亦出始興皆大塊打破之凡鍾乳之類三種同一體從石室上汁溜積久盤結者爲鍾乳床即此孔公孽也其次以小巃嵸者爲殷孽今人呼爲孔公孽殷孽復溜輕好者爲鍾乳雖同一類而療體爲異賤相殊此二孽不堪丸散人皆搗末酒漬飲之甚療脚弱其前諸療恐宜水煮爲湯也按今三種同根而所生各處當是隨其土地爲勝爾日華子云孔公孽味甘暖治癥結此即殷孽床也禹錫云按蜀本云凡鍾乳之類有五種一鍾乳二殷孽三孔公孽四石床五石花雖同一體而主療有異此二孽止可酒浸不堪入丸散藥用然甚療脚弱脚氣石花石床顯在後條青霞子云孽輕身充飢味辛温無毒主爛傷瘀血泄痢寒熱鼠瘻癥瘕結氣脚冷疼弱一名薑石鍾乳根也生趙國山谷又梁山及南海採無時惡防己畏术圖經曰文具石鍾乳條下陶隱居云趙國屬冀州此即今人所呼孔公孽大如牛羊角長一二尺左右亦出始興唐本注云此名石室下孔公孽根也盤結如薑故名薑石俗人乃以孔公孽爲之誤爾禹錫云按日華子云殷孽治筋骨弱并痔瘻等疾及下乳汁蜜陀僧味鹹辛平有小毒主久痢五痔金瘡面上瘢𩈅面膏藥用之圖經曰蜜陀僧本經不載所出州土注云出波斯國今嶺南閩中銀銅冶處亦有之是銀鉛脚其初採礦時銀銅相雜先以鉛銅煎煉銀隨鉛出又採山木葉燒灰開地作爐填灰其中謂之灰池置銀鉛於灰上更加火大鍛鉛滲灰下銀住灰上罷火候冷岀銀其灰池感鉛銀氣置之積乆成此物今之用者往往是此未必胡中來也形似黄龍齒而堅重者佳日華子云味甘平無毒鎭心補五臟治驚癇嗽嘔及吐痰等雷公云製用蜜陀僧凡使搗令細於瓷堝中安置了用重紙袋盛柳蚛末焙蜜陀僧堝中次下東流水浸令滿著火者一伏時足去柳末紙袋取蜜陀僧用禹錫云按蜀本注云五痔謂牡痔酒痔腸痔血痔氣痔聖惠方治䵟𪒟斑點方用蜜陀僧二兩細研以人乳調塗面每夜用之又方赤白痢所下不多遍數不减用蜜陀僧三兩燒令黄色研如粉每服醋茶調下一錢匕日三服外臺秘要冷面生光方以蜜陀僧用人乳煎塗面佳兼治㾴鼻皰譚氏小兒方療豆瘡瘢面黶以蜜陀僧細研水調夜塗之明旦洗去平復矣衍義曰蜜陀僧堅重椎破如金色者佳平微温主明目化銅療驚悸定心氣小兒風癇陰㿉脱肛圖經曰文具鐵條下陶隱居云鐵落是染皂鐵漿生鐵是不破鑐鎗釜之類鋼鐵是雜煉生鍒作刀鐮者鐵精出鍛竈中如塵紫色輕者爲佳亦以摩瑩鋼器用之陳藏器云針砂性平無毒堪染白爲皂及和没食子染鬚至黑飛爲粉功用如鐵粉煉鐵粉中亦别須之針是其眞鋼砂堪用人多以雜和之謬也又云鍛鑽下鐵屑味辛平無毒主鬼打鬼疰邪氣水漬攪令沫出澄清去滓及暖飲一二盞日華子云鐵屑治驚邪癲癇小兒客忤消食及冷氣并煎汁服之也一云犁鑱尖浸水名爲鐵精可制朱砂石亭脂水銀毒聖惠方陰脱鐵精羊脂二味攪令稠布裹炙熱熨推内之差又方食中有蠱毒令人腹内堅痛兩目青黃淋露骨立病變無常用鐵精細研搗鷄肝和爲丸如梧桐子大食前後酒下五丸生鐵微寒主療下部及脱肛圖經曰文具鐵條下禹錫云按日華子云生鐵鍛後飛淘去麤赤汁烘乾用治癇疾鎭心安五臟能黑鬚髮治癬及惡瘡疥蜘蛛咬蒜摩生油傅并得今注解在鐵精條肘後方治熊虎所傷毒痛煮生鐵令有味以洗之又方若被打瘀血在骨節及脅外不去以鐵一斤酒三升煮取一升服之集驗方治脱肛歷年不愈以生鐵三斤水一斗煮取五升出鐵以汁洗日再子母秘録治小兒卒得熛瘡一名爛瘡燒鐵淬水中三七遍以浴兒三二遍起作熛瘡漿柔鐵味甘無毒主金瘡煩滿熱中胸膈氣寒食不化一名跳今注解在鐵精條圖經曰文具鐵條下鐵主堅肌耐痛圖經曰諸鐵不著所出州郡亦當同處耳今江南西蜀有爐冶處皆有之鐵落者鍛家燒鐵赤沸砧上打落細皮屑俗呼爲鐵花是也初煉去礦用以鑄䥱器物者爲生鐵再三銷拍可以作鍱者爲鑐鐵亦謂之熟鐵以生柔相雜和用以作刀劍鋒刃者爲鋼鐵鍛竈中飛出如塵紫色而輕虚可以瑩磨銅器者爲鐵精作針家磨鑪細末謂之針砂取諸鐵於器中水浸之經乆色青沫出可以染單者爲鐵漿以鐵拍作片段置醋糟中積乆衣生刮取之爲鐵華粉入火飛煉者爲鐵粉作鐵華粉自有法文多不載諸鐵無正入丸散者惟煮汁用之華粉則研治極細合和諸藥及馬銜秤錘車轄及杵鋸等皆燒以淬酒用之刀斧刃磨水作藥使并俗用有效故載之珊瑚味甘平無毒主宿血去目中翳鼻衂末吹鼻中生南海圖經曰珊瑚生南海注云又從波斯國及師子國來今廣州亦有云生海底作枝柯狀明潤如紅玉中多有孔亦有無孔者枝柯多者更難得採無時謹按海中經曰取珊瑚先作鐵網沉水底珊瑚貫中而生歲高三二尺有枝無葉因絞網出之皆摧折在網中故難得完好者不知今之取者果爾否漢積翠池中有珊瑚高一丈二尺一本三柯上有四百六十三條云是南越王趙佗所獻夜有光影晋石崇家有珊瑚高六七尺今并不聞有此高大者唐本注云似玉紅潤中多有孔亦有無孔者又從波斯國及斯國及師子國來唐本先附陳藏器云生石岩刺刻之汁流如血以金投之爲丸名金漿以玉投之爲玉髓乆服長生禹錫云按日華子云鎭心止驚明目海藥云按晋列傳云石崇金谷園珊瑚樹交加苑生藥味甘平無毒主消宿血風癇等疾按其主治與金相似也異物志云出波斯國爲人間至貴之寳也鐵相公篋中方治七八歲小兒眼有麩翳未堅不可妄傅藥宜點珊瑚散細研如粉細爛用少點目中即愈衍義曰珊瑚治翳目今人用爲點眼箸有一等紅油色有細縱紋可愛又一種如鉛丹色無縱紋爲下入藥用紅油色者嘗見一本高尺許兩枝直上分十餘歧將至其顚則交合連理仍紅潤有縱紋亦一異也波斯國海中有珊瑚洲海人乘大舶墮鐵網水底珊瑚初生磐石上白極菌一歲而黄三歲赤枝榦交錯高三四尺鐵發其根繫網舶上絞而出之失時不取即腐石蟹味鹹寒無毒主青盲目中膚翳及丁翳漆瘡生南海又云是尋常蟹爾年月深乆水沫相著因化成石每遇海潮即飄出又一般入洞穴年深者亦然皆細研水飛過入諸藥相佐用之點目良圖經曰出南海今嶺南近海州郡皆有體質石也都與蟹相似或云是海蟹多年水沫相著化而爲石每海潮風飄出爲人所得又一種入洞穴年深者亦然醋磨傅癰腫亦解金石毒採無時禹錫云按日華子云石蟹凉解一切藥毒并蠱毒催生落胎療血運消癰治天行熱疾等并熟水磨服也又云浮石平無毒止渴治淋殺野獸毒衍義曰石蟹直是今之生蟹更無異處但有泥與粗石相著凡用須去其泥粗石止用蟹磨合他藥點目中須水飛過長石味辛苦寒無毒主身熱胃中結氣四肢寒厥利小便通血脉明目去翳眇下三蟲殺蟲毒止消渴下氣除脅肋肺間邪氣乆服不饑一名方石一名土石一名直石理如馬齒方而潤澤玉色生長子山谷及太山臨淄採無時陶隱居云長子縣屬上黨郡臨淄縣屬青州俗方及仙經并無用此者唐本注云此石狀同石膏而厚大縱理而長文似馬齒今均州遼坂山有之土人以爲理石者長石也桃花石味甘温無毒主大腸中冷膿血痢久服令人肌熱能食唐本注云出申州鍾山縣似赤石脂但舐之不著舌者爲眞唐本先附南海藥譜云其狀亦似紫石英若桃花其潤且光而重目之可愛是也衍義曰桃花石有赤白兩等有赤地淡白點如桃花片者有淡白地有淡赤點如桃花片者人往往鎸磨爲器用今人亦罕服食味辛寒無毒主辟惡熨目赤爛紅色似馬瑙亦美石之類重寳也生西國玉石間來中國者皆以爲器亦云馬瑙珠是馬口中吐出多是胡人謬言以貴之耳陳藏器云馬瑙出日本國用砑木不熱爲上砑木熱非眞也衍義曰馬瑙非石非玉自是一類有紅白黑色三種亦有其紋如纏絲者出西裔者佳彼土人以小者碾爲好玩之物大者碾爲器今古方入藥絶可用此物西方重之故佛經多言之其馬口吐出既知謬言不合編入太陰玄精味鹹温無毒主除風冷邪氣濕痹益精氣婦人痼冷漏下心腹積聚冷氣止頭痛解肌其色青白龜背者良出解縣圖經曰太陰玄精出解縣今解池及通泰州積鹽倉中亦有之其色青白龜背者佳採無時解池又有鹽精味更鹹苦青黑色大者三二寸形似鐵鏵觜三月四月採亦主除風冷無毒又名泥精蓋玄精之類也古方不見用者近世補藥及治傷寒多用之其著者治傷寒三日頭痛壯熱四肢不利正陽用太陰玄精滑石硫黄各二兩硇砂一兩四物都細研入瓦瓶子中固濟以火半斤於瓶子周一寸翳之約近半日今藥青紫色住火待冷取出用臘月雪水拌令匀灌入瓷瓶子中屋後北陰下陰乾又入地埋二七日取出細研以麵糊和爲丸如鷄頭實大先用鹽水浴後以艾湯研下一丸以衣蓋汗出爲差衍義曰太陰玄精石合他藥塗大風疾别有法陰證傷寒指甲面色青黑六脉沉細而疾心下脹滿結硬躁渴虚汗不止或時狂言四肢逆冷咽喉不利腹疼亦須佐他藥兼之圖經本草已有法惟出解州者良味鹹苦辛平無毒主目赤泪出膚翳眵暗唐本注云以光明鹽硇砂赤銅屑釀之成塊緑色眞者出焉耆國水中石下取之狀若扁青空青爲眼藥之要唐本先附鐵法中陶爲鐵落是鐵漿蘇云非也按鐵漿取諸鐵於器中以水浸之經乆色青沫出即堪染皂兼解諸毒入腹服之亦鎭心主癲癇發熱急狂走六畜癲狂人爲蛇犬虎狼毒刺惡蟲等嚙服之毒不入内見陳藏器主賊風止産後血瘕復痛及喉痹熱塞并燒令赤投酒中及熱飲之時人呼血瘕爲兒枕産後即起痛不可忍無錘用斧今附禹錫云按陳藏器云秤鍾味辛温無毒味鹹平無毒主安心神堅骨髓强志力除風邪養血氣延年變白去百病隨所冷熱合和諸藥用棗膏爲丸作鐵華粉法取鐵鍛作葉如笏或團平面磨錯令光淨以鹽水水灑之於醋瓮中陰處埋之一百日鐵上衣生鐵華成矣刮取更細搗篩入乳鉢研如麵和合諸藥爲丸散此鐵之精華功用强於鐵粉也今附禹錫云按日華子云鐵胤粉止驚悸虚癇鎭五臟去邪氣强志壯筋骨治健忘冷氣心痛痃癖癥結脱肛痔瘻宿食等味鹹平無毒主安心神堅骨髓除百病變白潤肌膚令人不老體健能食久服令人身重肥黑合和諸藥各有所主其造作粉飛煉有法文多不載人多取雜鐵作屑飛之令體重眞鋼則不爾其針砂市人錯鍒鐵爲屑和砂飛爲粉賣之飛煉家亦莫辨也取鋼鐵爲粉勝之今附鐡落味辛甘平無毒主風熱惡瘡瘍疽瘡痂疥氣在皮膚中除胸膈中熱氣食不下止煩去黑子一名鐵液可以染皂生牧羊平澤及枋音俘城或析城採無時禹錫云按了華子云鐵液治心驚邪一切毒蛇蟲及蠶漆咬瘡腸風痔瘻脱肛時疾熱狂并染鬢髮令注解在鐵精條石腦味甘温無毒主風寒虚損腰脚疼痹安五臟益氣一名石飴餅生名山土石中採無時陶隱居云此亦鍾乳之類形如曾青而白色黑斑軟易破令茅山東及西平山并有鑿土龕取之俗方不見用仙經有劉君導仙散用之又眞誥曰李整採服療風痹虚損而得長生味辛甘寒大寒無毒主身熱利胃解煩益精明目破積聚去三蟲除榮衛中去來大熱結熱解煩毒止消渴及中風痿痹一名立制石一名肌石如石膏順理而細生漢中山谷及盧山採無時滑石爲之使惡麻董陶隱居云漢中屬梁州盧山屬青州今出寧州俗用亦稀衍義曰理石如長石但理石如石膏順理而細其非順理而細者爲長石治療亦不相遼無毒主難産小兒癇産婦臨産時手持之亦煮汁服一盞此馬勒口鐵也本經馬條注中已略言之今附禹錫云按本經難産通用藥云馬銜平無毒主破宿血下石淋除癥結伏鬼物惡氣一名磨石燒赤熱投酒中飲之即今磨刀石取垽傅蠼螋溺瘡有效又不欲人蹋之令人患帶下未知所由又有越砥石極細磨汁滴目除障闇燒赤投酒中破血瘕痛功狀極同名又相近應是礪矣禹貢法云砥細於礪皆磨石也新補見陳藏器味甘温無毒酒漬服主腰脚風冷與殷孽同一名乳花唐本注云三月九月採之乳水滴水上散如霜雪者出乳穴堂中唐本先附衍義曰石花白色圓如覆大馬杓上有百十枝每枝各槎牙分歧如鹿角上有細文起以指撩之錚錚然有聲此石花也多生海中石上世亦難得家中有一本後又於大相國宫中見一本其體甚脆不禁觸擊本條所注皆非味鹹甘平無毒主頭面諸風目赤痛多眵泪生鹽州五原鹽池下鑿取之大者如升皆正方光徹一名石鹽唐本先附禹錫云謹按蜀本注云亦呼爲聖石味甘温無毒酒漬服與殷孽同一名乳床一名逆石唐本注云陶謂孔公孽即乳床非也二孽在上床花在下性體雖同上下有别鍾乳水下凝積生如笋狀漸長乆與上乳相接爲柱也出鍾乳堂中採無時唐本先附味辛鹹平無毒主蠱毒及蛇菜肉諸毒惡瘡不可乆服令人瘦一名推青一名推石生益州川谷陶隱居云俗方及仙經并無用此者亦相與不復識無毒主喉痹及喉中熱寒燒令赤投酒中及熱飲之今附無毒主驚悸癲邪安神定魄强志入官不懼利見大官宜婚市玉者所封五色土亦其次焉已前主病正爾水服餘皆藏寳牧宰臨官自取以塗門户主盜不入境今郡縣皆有社壇也鑄鍾黄土無毒主卒心痛疰忤惡氣置酒中温服之彌佳也土蜂窠上細土主腫毒醋和爲泥傅之亦主蜘蛛咬土蜂者在地土中作窠者是春牛角上土收置户上令人宜田桑根下土搜成泥餅傅風腫上仍灸二三十壯取熱通瘡中又人中惡風水肉腫一個差以土碗灸二百壯當下黄水即差也胡燕窠内土無毒主風瘙癮疹末以水和傅之又巢中草主卒溺血燒爲灰飲服又主惡刺瘡及浸淫瘡繞身至心者死亦用之柱下土無毒主腹痛暴卒者末服方寸匕蟻穴中岀土取七枚如粒和醋搽狐刺瘡故茅屋上塵無毒主老嗽取多年烟火者拂取上塵和石黄款冬花婦人月經衣帶爲末以水和塗於茅上待乾内竹筒子中燒一頭以口吸之入咽喉數數咽之無不差也圖經衍義本草卷之四
