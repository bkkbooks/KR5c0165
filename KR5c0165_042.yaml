front:
  text: 圖經衍義本草卷之四十二嚴九
  hash: sha256:7512d0feb003c0593c4f104f54f63ec6af1958375c60bc644b266306616e9d95
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_042-001a, image: hfl/0550/0550-134.png}
body:
  text: 宋遍直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正菜部下品苦瓠味苦寒有毒主大水面目四肢浮腫下水令人吐生晉地川澤藥性論云瓠瓤使治水浮腫面目肢節腫脹下大水氣疾陶隱居云瓠與冬瓜氣類同輩而有上下之殊當是為其苦爾今瓠自忽有苦如膽不可食非别生一種也又有瓠𤬏亦是瓠類小者名瓢食之乃勝瓠凡此等皆利水道所以在夏月食之大理自不及冬瓜也𤬏音婁唐本注云瓠與冬瓜瓠𤬏全非類例今此論性都是瓜瓠𤬏爾陶謂瓠中苦者大誤矣瓠中苦者不入藥用冬瓜自依前説瓠𤬏與瓠又須辨之此二物苗葉相似而實形有異瓠味皆甜時有苦者而似越瓜長者尺餘頭尾相似其瓠𤬏形狀大小非一瓠夏中便熟秋末并枯瓠𤬏夏末始實秋中方熟取其為器經霜乃堪瓠與甜瓠𤬏體性相似但味甘冷通利水道止渴消熱無毒多食令人吐苦瓠𤬏為療一如經説然瓠苦者不堪啖無所主療不入方用而甜瓠𤬏與瓠子啖之俱勝冬瓜陶言不及乃是未悉此等元種各别非甘者變而為苦也其苦瓠瓤味苦冷有毒主水腫石淋吐咳嗽囊結疰蠱痰飲或服過分令人吐利不止者宜以黍穰灰汁解皮又煮汁漬陰療小便不通日華子云瓠無毒又云微毒除煩止渴治心熱利小腸潤心肺治石淋吐蛔蟲孟詵云瓠冷主消渴惡瘡又患腳氣及虛脹冷氣人不可食之尤甚又壓熱服丹石人方可食餘人不可輒食外臺祕要云治卒患腫滿曾有人忽腳跌腫漸上至膝足不可踐地主大水頭面遍身大腫脹滿苦瓠白瓤實捻如大豆粒以麵裹煮一沸空心服七枚至午當出水一斗三日水自出不止大瘦乃差三年內慎口味也苦瓠須好者無靨翳細理妍淨者不爾有毒不用雷公云味苦有毒經驗方主消渴肘後方療中蠱毒吐血或下血皆如爛肝者苦瓠一枚水二升煮取一升服立吐即愈又方用苦酒一升煮令消服神效傷寒類要方治黃疸苦葫蘆瓤如大棗許大以童子小便二合浸之三兩食頃收兩酸棗許分內兩鼻中病人深吸氣及黃水出良馬齒莧馬齒莧主目盲白翳利大小便去寒熱殺諸蟲止渴破癥結癰瘡服之長年不白和梳垢封疔瘡又燒為灰和多年醋滓先炙疔腫以封之即根出生搗絞汁服當利下惡物去白蟲煎為膏塗白秃又主三十六種風結瘡以一釜煮澄清內蠟三兩重煎成膏塗瘡上亦服之圖經曰馬齒莧舊不著所出州土今處處有之雖名莧類而苗葉與人莧輩都不相似又名五行草以其葉靑梗赤花黃根白子黑也此有二種葉大者不堪用葉小者為勝云其節葉間有水銀每乾之十斤中得水銀八兩至十兩者然至難燥當以木捶搗碎向日東作架曝之三兩日即乾如經年矣入藥則去莖節大抵能肥腸令人不思食耳陳藏器云破痃癖止消渴又主馬惡瘡蟲此物至難死燥了致之地猶活孟詵云馬齒莧又主馬毒瘡以水煮令服一升并塗瘡上濕癬白秃以馬齒莧又主馬毒瘡以水煮令服一升并塗瘡上濕癬白秃以馬齒膏和灰塗效治疳痢除一切風傅杖瘡良及煮一碗和鹽醋等空腹食之少時當出盡白蟲矣食療云延年益壽明目患濕癬白秃取馬齒膏塗之若燒灰傅之亦良作膏主三十六種風可取馬齒一碩水可二碩蠟三兩煎之成膏亦治疳痢一切風又可細切煮粥止痢治腹痛聖惠方治馬咬毒入心馬齒莧湯食之差又方治反花瘡用一斤燒作灰細研豬脂調傅之外臺祕要治癧馬齒菜陰乾燒灰臘月豬脂和以暖泔清洗瘡拭乾傅之三日千金方治諸腋臭馬齒草杵以蜜和作團紙裹之以泥泥紙上厚半寸日乾以火燒熟破取更以少許蜜和仍令熱先以生布揩之以藥夾腋下令極痛難忍然後以手巾勒兩臂即差肘後方療豌豆瘡馬齒草燒灰傅瘡上根須臾逐藥出若不出更傅良食醫心鏡云理腳氣頭面浮腫心腹脹滿小便澀少馬齒莧和少粳米醬汁煮食之又方小兒血痢取生馬齒莧絞汁一合和蜜一匙匕空心飲之産寶方産後血痢小便不通臍腹痛生馬齒菜杵汁三合煎一沸下蜜一合攪服衍義曰馬齒莧人多食之然性寒滑靑黛條中已著葫葫蒜也味辛溫有毒主散癰腫𧈟瘡除風邪殺毒氣獨子者亦佳歸五臟久食傷人損目明五月五日採圖經曰葫大蒜也舊不著所出州土今處處皆有之人家園圃所蒔也每頭六七瓣初種一瓣當年便成獨子葫至明年則復其本矣然其花中有實亦葫瓣狀而極小亦可種之五月五日採謹按本經云主散癰腫李絳兵部手集方療毒瘡腫號叫卧不得人不别者取獨頭蒜兩顆細搗以油麻和厚傅瘡上乾即易之陶隱居云今人謂葫為大蒜謂蒜為小蒜以其氣類相如也性最熏臭不可食俗人作齏以啖鱠肉損性伐命莫此之甚此物惟生食不中煮以合青魚鮓食令人發黃取其條上子初種之成獨子葫明年則復其本也日華子云蒜健脾治腎氣止霍亂吐瀉腹痛除邪辟瘟去蠱毒療勞瘧冷風痃癖瘟疫氣傅風冷痛蛇蟲傷惡瘡疥溪毒沙虱并搗貼之熟醋浸之經年者甚良孟詵云蒜久服損眼傷肝治蛇咬瘡取蒜去皮一升搗以小便一升煮三四沸通人即入漬損處從朝至暮初被咬未腫速嚼蒜封之六七易又蒜一升去皮以乳二升煮使爛空腹頓服之隨後飯壓之明日依前進服下一切冷毒風氣又獨頭者一枚和雄黃杏人研為丸空腹飲下三丸靜坐少時患鬼氣者當汗出即差外臺祕要治牙齒疼痛獨頭蒜煨之乘熱截用頭以尉痛上轉易之亦主蟲痛又方關格脹滿大小便不通獨頭蒜燒熱去皮綿裹納下部氣立通千金方治暴痢搗蒜兩足下貼之又方治血氣逆心煩悶心痛生蒜搗汁服二升則差梅師方若腹滿不能服藥導之方取獨顆蒜煨令熟去皮綿裹內下部中冷即易方方治蜈蚣咬人痛不止獨頭蒜摩螫處痛止又方治蛇虺螫人以獨頭蒜酸草搗絞傅所咬處簡要濟衆方治鼻血不止服藥不應宜用蒜一枚去皮細研如泥攤一餅子如錢大厚一豆許左鼻血出貼左腳心右鼻血出貼右腳心如兩鼻出即貼兩腳下差血止急以溫水洗腳心衍義曰葫大蒜也其氣極葷然置臭肉中掩臭氣中暑毒人爛嚼三兩瓣以溫水送之下咽即知仍禁冷水又患暴下血以葫五七枚去梗皮量多少入豆豉搗為膏可丸即丸梧子大以米飲下五六十丸無不愈者又鼻衄爛研一顆塗兩足心下才止便拭去又將紫皮者橫切作片子厚一分初患瘡發於背脅間未辨癰疽者若陽滯於陰即為癰陰滯於陽即為疽癰即皮光赤疽則皮肉紋起不澤并以葫片覆之用艾灸如已痛灸至不痛如不痛灸至痛初覺即便灸無不效者仍審度正於中心貼葫灸之世人往往不悟此瘡初見其瘡小不肯灸惜哉蒜蒜味辛溫有小毒歸脾腎主霍亂腹中不安消穀理胃溫中除邪痹毒氣五月五日採之圖經曰蒜小蒜也舊不著所出州土今處處有之生田野中根苗皆如葫而極細小者是也五月五日採謹按爾雅蒚山蒜釋曰説文云蒜葷菜也一云菜之美者雲夢之菌生山中者名蒚今本經謂大蒜為葫小蒜為蒜而爾雅説文所謂蒜葷菜者乃今大蒜也蒚乃今小蒜也書傳載物之列名不同如此用藥不可不審也蒚力切的日華子云小蒜熱有毒下氣止霍亂吐瀉消宿食治蠱毒傅蛇蟲沙虱瘡三月不可食孟詵云小蒜亦主諸蟲毒疔腫甚良不可常食食療云主霍亂消穀治胃溫中除邪氣五月五日採者上又去諸蟲毒疔腫毒瘡不可常食肘後方治霍亂心腹脹滿氣未得吐下小蒜一升㕮咀以水三升煮取一升頓服治瘧用蒜不拘多少細研極爛和黃丹少許以聚為度丸如雞頭大候乾每服一丸新汲水下面東服至妙衍義曰蒜小蒜也又謂之蒚苗如蔥針根白大者如烏芋子兼根煮食之又謂之宅蒜華他用蒜齏是此物茄茄子味甘寒久冷不可多食損人動氣發瘡及痼疾一名落蘇處處有之根及枯莖葉主凍腳瘡可煮作湯漬之良苦茄樹小有刺其子以醋摩療癰腫根亦作浴湯生嶺南食療云平主寒熱五臟勞不可多食動氣亦發痼疾熟者少食之無畏患冷人不可食發痼疾又根主凍腳瘡煮湯浸之勝金方治搕撲損肌膚青腫方茄子留花種通黃極大者切作片如一指厚新瓦上焙乾為末欲卧酒調三錢七一夜消盡無痕迹也靈苑方治腸風下血久不止茄蒂燒存性為末每服食前米飲調三錢七衍義曰茄子新羅國出一種淡光微紫色蒂長味甘今其子已遍中國蔬圃中惟此無益并無所治止説損人後人雖有處治之法然終與本經相失圃人又植於暖處厚加糞壤遂於小滿前後求貴價以售既不以時損人益多不時不食烏可忽也馬芹子味甘辛溫無毒主心腹脹滿下氣消食調味用之香似橘皮而無苦味唐本注云生水澤傍苗似鬼針菾菜等花青白色子黃黑色似防風子唐本先附日華子云馬芹嫩時可食子治卒心氣痛炒食令人得睡禹錫云按蜀本圖經云花若芹子如防風子而扁大爾雅云茭牛蘄釋曰似芹可食菜也而葉細鋭一名茭一名牛蘄一名馬芹子入藥用孟詵云和醬食諸味良根及葉不堪食卒心痛子作末醋服差蕓薹味辛溫無毒主風遊丹腫乳癰日華子云蕓薹涼治産後血風及瘀血胡臭人不可食别本注云破癥瘕結血今俗方病人得喫蕓薹是宜血病禹錫云按孟詵云若先患腰腳不可多食必加極又極損陽氣發口瘡齒痛又能生腹中蟲衍義曰蕓薹不甚香經冬根不死辟蠹於諸菜中亦不甚佳菠薐冷微毒利五臟通腸胃熱解酒毒服丹石人食之佳北人食肉麵即平南人食魚鱉水米即冷不可多食冷大小腸久食令人腳弱不能行發腰痛不與鱔魚同食發霍亂吐瀉劉禹錫嘉話録云菠薐本西國中有自彼將其子來如苜蓿葡萄因張騫而至也本是頗陵國將來語訛爾時多不知也胡蔥味辛溫中消穀下氣殺蟲久食傷神損性令人多忘損目明尤發痼疾患胡臭人不可食令轉甚其狀似大蒜而小形圓皮赤稍長而鋭生蜀郡山谷五月六月採食療云胡蔥平主消穀能食久食之令人多忘根發痼疾又食著諸毒肉吐血不止痿黃甚者取子一升洗煮使破取汁停冷服半升日一服夜一服血定止又患胡臭𧈟齒人不可食轉極甚謹按利五臟不足氣亦傷絶血脈氣多食損神此是熏物耳蓴味甘寒無毒主消渴熱痹陶隱居云蓴性寒又云冷補下氣雜鯉魚作羹亦逐水而性滑服食家不可多噉之也唐本注云蓴久食大宜人合鮒魚為羹食之令人氣弱不下者至效又宜老人只應在上品中三四月至七八月通名絲蓴味甜體軟霜降已後至十二月名瑰蓴味苦體澀取以為羹晉書云張翰每臨秋風思鱸魚蓴羹以下氣也水斳味甘平無毒主女子赤沃止血養精保血脈益氣令人肥健嗜食一名水英生南海池澤斳音芹陶隱居云論斳主療合是上品末解何意乃在下其二月三月作英時可菹及熟爚之又有渣芹可為生菜亦可生啖俗中皆作芹字别本注云即芹菜也芹有兩種荻芹取根白色赤芹取莖葉并堪作菹及生菜味甘經云平其性大寒無毒金匱方春秋二時龍帶精入芹菜中人遇食之為病發時手青肚滿痛不可忍作蚊龍病肚硬糖二三升日二度吐出如蜥蜴二三便差子母祕録主小兒霍亂吐痢芹菜細切煮熟汁飲任性多少得止蘩蔞味酸平無毒主積年惡瘡不愈五月五日日中採乾用之圖經曰蘩蔞即雞腸草也舊不著所出州土今南中多生於田野間近京下濕地亦或有之葉似荇菜而小夏秋間生小白黃花其莖梗作蔓斷之有絲縷又細而中空似雞腸因得此名也本經作兩條而蘇恭以為一物二名謹按爾雅蔜䕅蔞與縷同釋曰蔜一名䕅蔞一名蘩蔞一名雞腸草實一物也今南北所生或肥瘠不同又其名多人不盡見者往往疑為二物也蔞音縷唐本注云此草即是雞腸也俱非正經所出而一處説異多生濕地坑渠之側流俗通謂雞腸雅士總名蘩蔞爾雅物重名者并云一物兩名衍義曰蘩蔞雞腸草一物也今雖分之為二其雞腸草條中獨不言性味故知一物也雞腸草春開小花如緑豆大莖葉如園荽初生則直長大即覆地小户收之為齏食之烏髭髮雞腸草主毒腫止小便利唐本注云此草即蘩蔞是也剩出此條宜除之今按雞腸草元在草部下品唐注以為剩出一條詳此主療相似其一物乎今移附蘩蔞之下白苣味苦寒一云平主補筋骨利五臟開胸膈擁氣通經脈止脾氣令人齒白聰明少睡可常食之患冷氣人食即腹冷不至苦損人産後不可食令人寒中小腹痛陳藏器白苣如萵苣葉有白毛落葵味酸寒無毒主滑中散熱實主悅澤人面一名天葵一名繁露陶隱居云又名承露人家多種之葉惟可𩚫鮓性冷滑人食之惟狗所嚙作瘡者終身不差其子紫色女人以漬粉傅面為佳多少入藥用堇汁味甘寒無毒主馬毒瘡搗汁洗之并服之堇菜也出小品方萬畢方云除蛇蝎毒及癰腫唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫色唐本先注食療云堇菜味苦主寒熱鼠瘻瘰癧生瘡結核聚氣下瘀血葉主霍亂與香茙同功蛇咬生杵傅之毒即出矣又乾末和油煎成摩結核上三五度差蕺味辛微溫主蠷螋溺瘡多食令人氣喘蕺音戢蠷音劬螋音搜圖經曰蕺菜味辛微溫主蠼螋溺瘡山谷陰處濕地有之作蔓生莖紫赤色葉如蕎麥而肥山南江左人好生食之然不宜多食令人氣喘乏虛弱損陽氣消精髓素有腳弱病尤忌之一啖令人終身不愈關中謂之菹菜者是也古今方家亦鮮用之經驗方主背瘡熱腫取汁蓋之至瘡上開孔以歇熱毒冷即易之差雍菜味甘平無毒主解野葛毒煮食之亦生搗服之嶺南種之蔓生花白堪為菜云南人先食雍菜後食野葛二物相伏自然無苦又取汁滴野葛苗當時煙死其相殺如此張司空云魏武帝啖野葛至一尺應是先食此菜也苦蕒冷無毒治面目黃強力止困傅蛇蟲咬又汁傅疔腫即根出蠶蛾出時切不可取拗令蛾子赤爛蠶婦亦忌食野苦蕒五六回拗後味甘滑於家苦蕒甚佳日華子云治面目黃鹿角菜大寒無毒微毒下熱風氣療小兒骨蒸熱勞丈夫不可久食發痼疾損經絡血氣令人腳冷痹損腰腎少顔色服石人食之下石力也出海州登萊沂密州并有生海中又能解麵熱千金方下熱氣莙薘平微毒補中下氣理脾氣去頭風利益五臟冷氣不可多食動氣先患腹冷食必破腹莖灰淋汁洗衣白如玉色東風菜味甘寒無毒主風毒壅熱頭疼目眩肝熱眼赤亦堪入羹臛煮食甚美生嶺南平澤莖高二三尺葉似杏葉而長極厚軟上有細毛先春而生故有東風之號圖經衍義本草卷之四十二
