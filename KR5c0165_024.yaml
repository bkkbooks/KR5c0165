body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正木部下品巴豆巴豆味辛溫生溫熟寒有毒主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩滌五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚療女子月閉爛胎金瘡膿血不利丈夫陰殺斑貓毒可煉餌之益血脈令人色好變化與鬼神通一名巴椒生巴郡川谷八月採陰乾用之去心皮芫花為之使惡蘘草畏大黃黃連藜蘆圖經曰巴豆出巴郡川谷今嘉眉戎州皆有之木高一二丈葉如櫻桃而厚大初生青後漸黃赤至十二月葉漸凋二月復漸生至四月舊葉落盡新葉齊生即花發成穗微黃色五六月結實作房生青至八月熟而黃白類白豆蔻漸漸自落即收之一房有三瓣一瓣有實一粒一房共實二粒也戎州出者殼上有縱文隱起如線一道至兩三道彼土人呼為金線巴豆最為上等它處稀有陶隱居云出巴郡似大豆最能瀉人新者佳用之皆去心皮乃稱又熬令黃黑别搗如膏乃和丸散爾道方亦有煉餌法服之乃言神仙人吞一枚便欲死而鼠食之三年重三十斤物性乃有相耐如此爾唐本注云樹高丈餘葉似櫻桃葉頭微赤十二月葉漸凋至四月落盡五月葉漸生七月花八月結實九月成十月採其子三枚共蒂各有殼裹出眉州嘉州者良陳藏器曰巴豆主癥癖痃氣痞滿腹內積聚冷氣血塊宿食不消痰飲吐水取青黑大者每日空腹服一枚去殼勿令白膜破乃作兩片并四邊不得有損缺吞之以飲壓令下少間腹內熱如火痢出惡物雖痢不虛若久服亦不瀉白膜破者棄之日華子云通宣一切病泄壅滯除風補勞健胃開脾消痰破血排膿消腫毒殺腹臟蟲治惡瘡息肉及疥癩丁腫凡合丸散炒不如去心膜煮五度换水各煮一沸雷公云凡使巴之與豆及剛子須在仔細認勿誤用殺人巴顆小緊實色黃豆即顆有三稜色黑若剛子顆小似棗核兩頭尖巴與豆即用剛子勿使凡修事巴豆敲碎以麻油并酒等可煮巴豆了研膏後用每修事一兩以酒麻油各七合盡為度聖惠方治中風口巴豆七枚去皮爛研左塗右手心右塗左手心仍以暖水一盞安向手心須臾即便正洗去藥并頻抽掣中指又方治牙疼用巴豆一粒煨至黃熟去殼用蒜一瓣切一頭作蓋剜去中心可安巴豆在內以蓋子合之用綿裹隨患處左右塞耳中外臺祕要文仲方主唯腹大動搖水聲皮膚黑名曰水腫巴豆九十枚去心皮熬令黃搗丸如小豆大水下二丸以利為度勿飲酒千金方治寒癖宿食久飲不消大便祕巴豆仁一升清酒五升煮三日三夜研令大熟合酒微火煎之丸如胡豆大每服一丸水下欲吐者服二丸千金翼治小兒身腫并手足腫兼癮疹巴豆五十枚去皮心以水二升煎取一升用綿於湯中隨手拭之經驗方治耳卒聾巴豆一粒蠟裹針刺令通透用塞耳中又方治箭鏃入骨不可拔取巴豆微熬與蜣螂同研塗所傷處斯須痛定微癢忍之待極癢不可忍便撼動箭鏃即拔之立出十全方治疥瘡巴豆十粒火炮過黃色去皮膜右順手研如麵入酥少許膩粉少許同研勻爪破以竹篦子點藥不得落眼裏及外腎上如熏炙著外腎以黃丹塗甚妙蜀椒蜀椒味辛溫大熱有毒主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下痢泄精女子字乳餘疾散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒久服之頭不白輕身增年開腠理通血脈堅齒髮調關節耐寒暑可作膏藥多食令人乏氣口閉者殺人一名巴椒一名蓎藙蓎音唐藙音毅生武都川谷及巴郡八月採實陰乾杏仁為之使畏款冬圖經曰蜀椒生武都川谷及巴郡今歸峽及蜀川陜洛間人家多作園圃種之高四五尺似茱萸而小有鋒刺葉堅而滑可煮飲食甚辛香四月結子無花但生於葉間如小豆顆而圓皮紫赤八月采實焙乾此椒江淮及北土皆有之莖實都相類但不及蜀中者皮肉厚腹裏白氣味濃烈耳藥性論云椒目使治十二種水氣味苦辛有小毒主和巴豆菖蒲松脂以蠟溶為筒子內耳中抽腎氣虛耳中如風水嗚或如打鐘磬之聲若暴聾一日一易若神驗唐本注云椒目味苦寒無毒主水腹脹滿利小便今椒出金州西城者最佳日華子云漢椒破癥結開胃治天行時氣溫疾産後宿血治心腹氣壯陽療陰汗暖腰膝縮小便椒目主膀胱急又云椒葉熱無毒治賁豚伏梁氣及內外腎釣并霍亂轉筋雷公云一名南椒凡使須去目及閉口者不用其椒子先須酒拌令濕蒸從巳至午放冷密蓋除向下火四畔無氣後取出使入瓷器中盛勿令傷風用也聖惠方治因熱取涼睡有蛇入口中挽不出用刀破蛇尾內生椒三二粒裹著須臾即出外臺祕要治瘡腫生椒末麵釜下土末之以大醋和傅之千金方有人陰冷漸漸冷氣入陰囊腫滿恐死日夜疼悶不得眠取生椒擇之洗淨以布帛裹著丸囊令厚半寸須臾熱氣大通日再易之取出差孫真人方十月勿食椒食之損氣傷心令人多忘又方治心腹俱痛以布裹椒薄注上火尉令椒汗出良斗門方治腹內虛冷久服駐顔用生椒擇去不拆者除其黑子用四十粒以漿水浸經一宿盡令口合空心新汲水下去積年冷暖臟腑久服則能駐顔黑髮明目令人思飲食妙勝金方治好食生茶用椒末不限多少以糊丸如梧桐子大茶下十丸衍義曰蜀椒須微炒使汗出又須去附紅黃殼去殼之法先微炒乘熱入竹筒中以梗椿之播取紅如未盡更揀更樁以盡為度凡用椒須如此其中子謂之椒目治盜汗尤功將目微炒搗為極細末用半錢七以生豬上唇煎湯一合調臨睡服無不效蓋椒目能行水又治水蠱皂角皂莢味辛鹹溫有小毒主風痹死肌邪氣風頭淚出利九竅殺精物療腹脹滿消穀除咳嗽囊結婦人胞不落明目益精可為沐藥不入湯生雍州川谷及魯鄒縣如豬牙者良九月十月採莢陰乾柏實為之使惡麥門冬畏空青人參苦參圖經曰皂莢出雍州川谷及魯鄒縣今所在有之以懷孟州者為勝木極有高大者此有三種本經云形如豬牙者良陶隱居云長尺二者良唐注云長六寸圓厚節促直者皮薄多肉味濃大好令醫家作疏風氣丸煎多用長皂莢治齒及取積藥多用豬牙皂莢所用雖殊大抵性味不相遠唐本注云此物有三種豬牙皂莢最下其形曲戾薄惡全無滋潤洗垢不去其尺二寸者粗大長虛而無潤若長六七寸圓厚促直者皮薄多肉味濃大好禹錫云按藥性論云皂莢使主破堅癥腹中痛能墮胎又曰將皂莢於酒中取盡其精於火內煎之成膏塗帛貼一切腫毒兼能止疼痛陳藏器云鬼皂莢作浴湯去風瘡疥癬挼葉去衣垢沐頭長髮生江南澤畔如皂莢高一二尺日華子云通關節除頭風消痰殺勞蟲治骨蒸開胃及中風口噤入藥去皮子以酥炙用雷公云凡使須要赤膩肥并不蚛者然用新汲水浸一宿了用銅刀削上粗皮用酥反覆炙酥盡為度然出捶之去子搗篩皂莢一兩酥二分子收得揀取圓滿堅硬不蚛者用瓶盛下水於火畔煮待泡熟剝去硬皮一重了取向裏白嫩肉消去黃用銅刀細切於日中乾用其子消人腎氣聖惠方治時氣三日頭痛煩熱用皂角燒作灰為末非時新汲水一中盞生薑汁蜜各少許和二錢服之先用暖水淋浴後服藥須臾汗出愈外臺祕要治卒中風口以皂角五兩去皮為末以三年大醋和左塗左右塗右乾更傅之差又方溺死一宿者尚活搗皂角綿裹內下部須臾出水即活千金方齆鼻炙皂角末如小豆以竹管吹入鼻中肘後方卒腫滿身面洪大皂角剝炙令黃銼三升酒一斗漬合器煮沸服一升日三服頻作經驗方治食氣遍身黃腫氣喘食不得心胸滿悶不蛀皂角去皮及子塗好醋炙令焦為末一錢七巴豆七枚去油膜二件以淡醋及研好墨為丸如麻子大每服三丸食後陳橘皮湯下日三服隔一日增一丸以利為度如常服消酒食梅師方治霍亂轉筋皂莢末吹一小豆入鼻中得嚏便瘥孫真人方治大小便不通關格不利燒皂莢細研粥飲下三錢立通簡要濟衆方治中風口噤不開涎潮吐涎方皂角一挺去皮塗豬脂炙令黃色為末每服一錢七非時溫酒服如氣實脈盛調下二錢七如牙關不開用白梅揩齒口開即灌藥吐出風涎差靈苑方治急喉閉逡巡不救方以皂莢去皮子生半兩為末每服少許以箸頭點腫處更以醋調藥末厚傅項下須臾便破少血出即愈孫尚藥方治卒中風昏昏若醉形體昏悶四肢不收或倒或不倒或口角似利微有涎出斯須不治便為大病故傷人也此證風涎潮於上膈痹氣不通宜用救急稀涎散豬牙皂角四挺須是肥實不蚛削去黑皮晉礬一兩光明通瑩者二味同搗羅為細末再研為散如有患者可服半錢重者三字七溫水調灌下不大嘔吐只是微微涎稀冷出或一升二升當時惺惺次緩而調治不可便大段吐之恐過傷人命纍經效不能盡述感應神仙傳崔言者職隸左親騎軍一旦得疾雙眼昏咫尺不辨人物眉髮自落鼻梁崩倒肌膚有瘡如癬皆為惡疾勢不可救因為洋州駱谷子歸寨使遇一道流自谷中出不言名姓授其方曰皂角刺一二斤為灰蒸久晒研為末食上濃煎大黃湯調一錢七服一旬鬢髮再生肌膚悅潤愈眼目倍常明得此方後却入山不知所之又鐵砧以煅金銀雖百十年不朽以捶皂莢則一夕碎破衍義曰皂莢其子炒舂去赤皮仁將骨浸軟煮熟以糖漬之可食主宣導五臟風熱壅其莢不蚛肥者微炙為末一兩入生白礬末半兩膩粉半兩風涎潮塞氣不通溫水調一二錢但過咽關須吐涎凡用白礬煮分隔下涎也又暑中濕熱時或久雨合蒼术服辟溫疫邪濕氣訶梨勒訶梨勒味苦溫無毒主冷氣心腹脹滿下食生交愛州圖經曰訶梨勒生交愛州今嶺南皆有而廣州最盛株似木梡花白子似梔子青黃色皮肉相著七月八月實熟時採六路者佳嶺南異物志云廣州法性寺佛殿前有四五十株子極小而味不澀皆是六路每歲州貢只以此寺者寺有古井木根蘸水水味不苦每子熟時有佳客至則院僧煎湯以延之其法用新摘訶子五枚甘草一寸皆碎破汲木下井水同煎色若新茶今其寺謂之乾明舊木猶有六七株古井亦在南海風俗尚貴此湯然煎之不必盡如昔時之法也劉禹錫傳信方云豫曾苦赤白下諸藥服遍久不差轉為白膿令狐將軍傳此法用訶梨勒三枚上好者兩枚炮取皮一枚生取皮同末之以沸漿水一兩合服之淡水亦得若空水痢加一錢七甘草末若微有膿血加二七若血多加三七皆效藥性論云訶梨勒使亦可單用味苦甘能通利津液主破胸膈結氣止水道黑髭髮日華子云消痰下氣除煩治水調中止瀉痢霍亂賁脈腎氣肺氣喘急消食開胃腸風瀉血崩中帶下五膈氣懷孕未足月人漏胎及胎動欲生脹悶氣喘并患痢人後分急痛并産後陰痛和蠟燒熏及熱煎湯熏通手後洗禹錫云按蕭炳云苦酸下宿物止腸澼久泄赤白痢波斯舶上來者六路黑色肉厚者良雷公云凡使勿用毗梨勒梨勒榔精勒雜路勒若訶梨勒文只有六路或多或少并是雜路勒毗路勒個個毗雜路勒皆圓路文或八路至十三路號曰榔精勒多澀不入用凡修事先於酒內浸然後蒸一伏時其訶梨勒以刀削路細銼焙乾用之經驗方治嗽氣嗽久者亦主之生訶梨一枚含之咽汁差後口爽不知食味却煎檳湯一碗服之立便有味此知連州銀坑官成密方外臺祕要治一切風痰風霍亂食不消大便澀訶梨三枚搗取皮和酒頓服三五度良廣濟方治嘔逆不能食訶梨勒皮二兩去核熬為末蜜和丸梧子大空心服二十丸日二服孫真人方治常患氣訶梨三枚濕紙裹煨紙乾即剝去核細嚼以生乳一升下之日三服衍義曰訶梨勒氣虛人亦宜緩緩煨熟少服此物雖澀腸而又泄氣蓋其味苦澀柳花柳花味苦寒無毒主風水黃疸面熱黑痂疥惡瘡金瘡一名柳絮葉主馬疥痂瘡取煎煮以洗馬疥立愈又療心腹內血止痛實主潰癰逐膿血子汁療渴生琅邪川澤陶隱居云柳即今水楊柳也花熟隨風狀如飛雪陳元方以為譬當用其未開時子亦隨花飛正應水漬汁爾柳花亦宜貼灸瘡皮葉療漆瘡禹錫云按藥性論云苦柳花使主止血治濕痹四肢攣急膝痛日華子曰葉治天行熱病丁瘡傳尸骨蒸勞湯火瘡毒入腹熱悶服金石藥人發大熱悶并下水氣煎膏續筋骨長肉止痛牙痛煎含枝煎汁可消食也外臺祕要治黃疸柳枝以水一斗煮取濃汁半升服令盡衍義曰柳華經曰味苦即是初生有黃蘂者也及其華乾絮方出又謂之柳絮收之貼灸瘡及為茵褥絮之下連小黑子因風而起得水濕處便生如地丁之類多不因種植於人家庭院中自然生出蓋亦如柳絮兼子而飛陳藏器之説是然古人以絮為花陶隱居亦曰花隨風狀如飛雪誤矣經中有實及子汁諸家不解今人亦不見用注釋氏謂柳為尼俱律陀木其子極細如人妄因極小妄果至大是知小黑子得因風而起楝實楝實味苦寒有小毒主溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道一名金鈴子俗呼為苦楝根微寒療蛔蟲利大腸生荆山山谷圖經曰楝實即金鈴子也生荆山山谷今處處有之以蜀川者為佳木高丈餘葉密如槐而長三四月開花紅紫色芬香滿庭間實如彈丸生青熟黃十二月採實其根採無時陶隱居云處處有俗人五月五日皆取葉佩之云辟惡其根以苦酒摩塗疥甚良煮汁作糜食之去蛔蟲唐本注云此有兩種有雄有雌雄者根赤無子有毒服之多使人吐不能止時有至死者雌者根白有子微毒用當取雌者禹錫云按藥性論云楝實亦可單用主人中大熱狂失心躁悶作湯浴不入湯服日華子云楝皮苦微毒治遊風熱毒風疹惡瘡疥癩小便壯熱并煎湯浸洗服食須是生子雌樹皮一兩可入五十粒糯米煎煮殺毒瀉多以冷粥止不瀉以熱蔥粥發無子雄樹吐瀉殺人雷公云凡采得後曬乾酒拌浸令濕蒸待上皮軟剝去皮取肉去核勿單用其核碎捶用漿水煮一伏時了如用使肉即不使核使核即不使肉又花落子謂之石茱萸外臺祕要治長蟲楝實淳苦酒中漬宿以綿裹塞穀道中三寸許日易之經驗方小兒穀蟲定疼痛抵聖散以苦楝二兩白蕪荑半兩為末水一盞末一錢煎取二分放冷待發時服之又方治臟毒下血以苦楝子炒令黃為末蜜丸米飲下十丸至二十丸甚妙又方治丈夫臟氣傷膀胱連小腸等氣金鈴子一百個溫湯浸過去皮巴豆二百個捶微破麵二升同於銅鍋內炒金鈴子赤熟為度放冷取出去核為末每服三錢非時熱酒醋湯調服并得其麵巴豆不用也椿木椿木葉味苦有毒主洗瘡疥風疽水煮藥汁用之皮主甘𧈟樗木樗木根葉尤良圖經曰椿木樗木舊并不載所出州土今南北皆有之二木形幹大抵相類但椿木實而葉香可啖樗木疏而氣臭膳夫亦能熬去其氣北人呼樗為山椿江東人呼為鬼目葉脫處有痕如樗蒲子又如眼目故得此名其木最為無用莊子所謂吾有大木人謂之樗其大本擁腫不中繩墨小枝曲拳不中規矩立於途匠者不顧是也并採無時唐本注云二樹形相似樗木疏椿木實為别也陳藏器云樗木味苦有小毒皮主赤白久痢口鼻中疳蟲去疥𧈟主鬼疰傳尸蠱毒下血根皮去鬼氣取一握細切以童兒小便二升豉一合宿浸絞取汁溫一沸三五日一度服葉似椿北人呼為山椿江東人呼為虎目葉脫處有痕如白樗散木也唐先附禹錫云按藥性論云樗白皮使味苦微熱無毒能治赤白痢腸滑痔疾瀉血不住蕭炳云樗皮主疳痢得地榆同療之根皮尤良俗呼為虎眼樹本經椿木殊不相似日華子云樗皮溫無毒止瀉及腸風能縮小便入藥蜜炙用公云椿木根凡使根不近西頭者上及不用莖葉只用根采出拌生蔥蒸半日出生蔥細銼用袋盛挂屋南畔陰乾用偏利溺澀也肘後方治小兒頭生白秃髮不生出椿枝桃葉心取汁傅之大效經驗方治臟毒赤白痢香椿淨洗刷剝取皮日乾為末飲下一錢立效楊氏産乳方療疳痢困重樗白皮搗麵拌作小顆子日晒少時又拌凡三過水煮至熟加鹽醋酒亦得頻服多少量兒大小衍義曰椿木葉椿樗皆臭但一種有花結子一種無花不實世以無花不實木身大其幹端直者為椿椿用木葉其有花而莢木身小幹多迂矯者為樗樗用根葉莢故曰未見椿上有莢者惟樗木上有又有樗雞故知古人命名曰不言椿雞而言樗雞者以顯有雞者為樗無雞者為椿其義甚明用椿木葉樗木根葉莢者宜依此推窮郁李人郁李人味酸平無毒主大腹水腫面目四肢浮腫利小便水道根主齒齦腫齲丘禹切齒堅齒去白蟲一名爵李一名車下李一名棣生高山川谷及丘陵上五月六月採根圖經曰郁李人本經不載所出州土但云生高山川谷及丘陵上今處處有之木高五六尺枝條花葉皆若李惟子小若櫻桃赤色而味甘酸核隨子熟六月採根并實取核中仁用陸機草木疏云棠棣即郁李也一名雀梅亦曰車下李所在山中皆有其花或白或赤六月中成實如李子可食今近京人家園圃植一種枝莖作長條花極繁密而多葉亦謂之郁李不堪入藥用藥性論云郁李人臣味苦辛能治腸中結氣關格不通根治齒痛宣結氣破結聚陶隱居云山野處處有子熟赤色亦可啖之日華子云郁李人通治五臟膀胱急痛宣腰胯冷膿消宿食下氣又云根涼無毒治小兒熱發作湯浴風蚛牙濃煎含之雷公云凡採得先湯浸却削上尖去皮令淨用生蜜浸一宿漉出陰乾研如膏用韋宙獨行方療腳氣浮腫心腹滿大小便不通氣急喘息者以郁李人十二個搗碎水研取汁薏苡人搗碎如粟米取三合以汁煮米作粥空腹食之佳必效方療癖取車下李人微湯退去皮及并人者與乾麵相拌搗之為餅如猶乾和淡水如常搜麵作餅大小一如病人掌為二餅微炙使黃切令至熟空腹食一枚當快利如不利更食一枚或飲熱粥汁以利為度若至午後痢不止即以醋飯止之利後當虛病未盡者量力一二日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉等無不效食療云氣結者酒服人四十九粒更瀉尤良又破癖氣能下四肢水外臺祕要張文仲治齲齒以郁李根白皮水煮濃汁含之冷即易吐出蟲楊氏産乳方療身體腫滿水氣急卧不得郁李人一大合搗為末和麥麵搜作餅子與吃入口即大便通利氣便差衍義曰郁李人其子如御李子至紅熟堪啖微澀其人湯去皮研極爛入生龍腦點赤目陜西甚多根煎湯泄風蚛牙莽草莽草味辛苦溫有毒主風頭癰腫乳癰疝瘕除結氣疥瘙殺蟲魚療喉痹不通乳難頭風癢可用沐勿令入眼一名葞一名春草生上谷山谷及冤句五月採葉陰乾圖經曰莽草亦曰菵草出上谷及冤句今南中州郡及蜀川皆有之木若石南而葉稀無花實五月七月採葉陰乾一説藤生繞木石間古方治風毒痹厥諸酒皆用菵草今醫家取其葉煎湯熱含少頃間吐之以治牙齒風蚛甚效此木也而爾雅釋草云葞春草釋曰藥草莽草也郭璞云一名芒芒菵音近故爾然謂之草者乃蔓生者是也藥性論云兩草臣能治氣疽疝氣腫墜凝血治瘰癧除濕風不入湯服主頭瘡白秃殺蟲與白斂赤小豆為末雞子白調如糊貼毒腫乾即更易上陶隱居云今東間處處皆有葉青新烈者良人用搗以和米內水中魚吞即死浮出人取食之無妨莽草字亦作兩字今俗呼為菵草也菵音罔日華子云治皮膚麻痹并濃煎湯淋風蚛牙痛喉痹亦濃煎汁含後淨漱口良雷公云凡使采得後便取葉細銼又生甘草水蓼二味并細銼用生稀絹袋盛毒木葉於甑中上甘草水蓼同蒸一日去諸藥二件取出曬乾用之勿用尖有攣生者聖惠方治牙齒蚛孔疼痛及有蟲用菵草為末綿裹內蚛孔中或於痛處咬之低頭吐津勿咽之疼痛便定又方治瘰癧發腫堅結成核菵草一兩為末雞子白和傅於帛上貼之日二易之差肘後方治癰瘡未潰菵草末雞子白塗紙厚貼上燥復易得痛良又風齒疼頰腫用五兩水一斗煮取五升熱含漱吐之一日盡周禮翦氏掌除蠧物以兩草熏之則死衍義曰莽草今人呼為菵草濃煎湯淋泄皮膚麻痹本經一名春草諸家皆謂為草今居木部圖經亦然今世所用者皆木葉也如石南枝梗乾則皺揉之其嗅如椒爾雅釋草云葞春草釋曰今莽草也與本經合今當具言之石南條中陶隱居注云似菵草凌冬不凋誠木無疑黃藥根黃藥根味苦平無毒主諸惡腫瘡瘻喉痹蛇犬咬毒取根研服之亦含亦塗藤生高三四尺根及莖似小桑生嶺南圖經曰黃藥根生嶺南今夔州郡及明越秦隴州山中亦有之以忠萬州者為勝藤生高三四尺根及莖似小桑十月採根秦州出者謂之紅藥子葉似蕎麥枝梗赤色七月開白花其根初採濕時紅赤色暴乾即黃開州興元府又産一種藥子大抵與藥相類主五臟邪氣治肺壓熱除煩躁亦入馬藥用春採根暴乾經驗方治咯血黃藥漢防己各一兩為末每服一錢匕水一盞小麥二十粒同煎食後溫服簡要濟衆治鼻衄不止黃藥子為末每服二錢七煎薄荷湯下良久以新汲水調麵末二匙頭服之又方傅瘡藥黃藥子四兩為末以冷水調傅瘡上乾即旋傅之衍義曰黃藥亦治馬心肺熱有功槲若槲若味甘苦平無毒主痔止血療血痢止渴取脈炙用之皮味苦水煎濃汁除蠱及瘻俗用甚效圖經曰斛若本經不載所出州土今處處山林多有之木高丈餘若即葉也與櫟相類亦有斗但小不中用耳不拘時採其葉并皮用葛洪洗諸敗爛瘡乳瘡并用此皮禹錫云按藥性論云斛皮亦可單用主治惡瘡煎湯洗之良日華子云槲皮味澀能吐瘰癧澀五臟聖惠方治冷淋小腸不利莖中急痛用斛葉搗末每服三錢水一盞蔥白七寸煎六分去滓食前溫服又方治螻蛄咬用斛葉燒灰細研以泔别浸斛葉取洗瘡拭之內少許灰於瘡中立效簡要濟衆方治吐血斛葉不拘多少搗末每服二錢水一盞煎取五七分和滓服子母祕録治小兒及大人赤白痢新斛皮一斤去黑皮細切以水一斗煎取五升去更煎如膏和酒服立差衍義曰槲若亦有斗但不及櫟木雖堅而不堪充材葉微炙炒槐花減槲葉之半同為末米飲調服治初得腸風及血痔熱多者尤佳亦堪為炭但不及櫟木桐葉桐葉味苦寒無毒主惡蝕瘡著陰皮主五痔殺三蟲療賁豚氣病梧花主傅豬瘡飼豬肥大三倍生桐柏山谷衍義曰桐葉經注不指定是何桐致難執用今具四種桐各有治療條其狀列於後一種白桐可斫琴者葉三杈開白花亦不結子藥性論云皮能治五淋沐髮去頭風生髮一種荏桐早春先開淡紅花狀如鼓子花成筒子子或作桐油日華子云桐油冷微毒一種梧桐四月開淡黃小花一如棗花枝頭出絲墮地成油沾漬衣履五月六月結桐子今人收炒作果動風氣此是月令清明之日桐始華者一種岡桐無花不可作琴體重無食子味苦溫無毒主赤白痢腸滑生肌肉出西戎一名沒石子唐本注云生沙磧間樹似柳今注一名沒石子也出波斯國主小兒疳𧈟能黑髭髮治陰瘡陰汗溫中和氣唐本先附禹錫云按藥性論云無食子使治大人小兒大腹冷滑痢不禁海藥云謹按徐表南荆記云波斯國大小如藥子味溫平無毒主腸虛冷痢益血生精烏髭髮和氣安神治陰毒痿燒灰用張仲景使治陰汗取燒灰先以微溫湯浴了即以帛微裛後傅灰囊上甚良波斯每食以代果番胡呼為沒食子今人呼墨食子轉謬矣雷公云墨石子凡用勿令犯銅鐵并被火驚者顆小文細上無杴米者妙用漿水於砂盆中或硬青石上研令盡却焙乾研了用勿搗能為烏犀色宫氣方治小兒久痢不效沒石子二個切熬令黃色研作餛飩食之衍義曰無食子今人合他藥染髭雷丸味苦鹹寒微寒有小毒主殺三蟲逐毒氣胃中熱利丈夫不利女子作摩膏除小兒百病逐邪氣惡風汗出除皮中熱結積蠱毒白蟲寸白自出不止久服令陰痿一名雷矢一名雷實赤者殺人生石城山谷及漢中土中八月採根暴乾荔實厚朴為之使惡葛根藥性論云雷丸君惡蓄根味苦有小毒能逐風芫花為使主癤癇狂走殺蛔蟲陶隱居云今出建平宜都間纍纍相連如丸本經云利丈夫别録云久服陰痿事相反也唐本注云雷丸竹之苓也無有苗蔓皆零無相連者今出房州金州禹錫云按范子云雷矢出漢中色白者善吳氏云雷丸神農苦黃帝岐伯桐君甘有毒扁鵲甘無毒季氏大寒雷公云凡使用甘草水浸一宿了銅刀刮上黑皮破作四五片又用甘草湯浸一宿後蒸從巳至未出日乾却以酒拌如前從巳至未蒸日乾用經驗前方下寸白蟲雷丸一味水浸軟去皮切焙乾為末每有病者五更初先食炙肉少許便以一錢七藥稀粥調半錢服之服時須六衙及上半月日蟲乃下胡椒味辛大溫無毒主下氣溫中去痰除臟腑中風冷生西戎形如鼠李子調食用之味甚辛辣禹錫云按日華子云調五臟止霍亂心腹冷痛壯腎氣及主冷痢殺一切魚肉鱉菌毒海藥云謹按徐表南州記生南海諸國去胃口氣虛冷宿食不消霍亂氣逆心腹卒痛冷氣上衝和氣不宜多服損肺一云向陰者澄茹向陽者胡椒也雷公云凡使只用內無皺殼者用力大漢椒使殼胡椒使子每修事即於石糟中碾碎成粉食療云治五臟風冷冷氣心腹痛吐清水酒服之佳亦宜湯服若冷氣吞三七枚衍義曰去胃中寒痰吐水食已即止甚驗過劑則走氣大腸寒滑亦用須各以他藥佐之蘇方木味甘鹹平無毒主破血産後血脹悶欲死者水煮苦酒煮五兩取濃汁服之效唐本注云此木用染色者出南海崑崙來交州愛州亦有樹似菴羅葉若榆葉而無澀抽條長丈許花黃子生青熟黑陳藏器云蘇方寒主霍亂嘔逆及人常嘔吐用水煎服之破血當以酒煮為良唐本先附雷公云凡使去上粗皮并節子若有中心文橫如紫角者號曰木中尊色其效倍常百等須細銼了重篩拌細條梅枝蒸從巳至申出陰乾用肘後方治血運蘇方三兩細銼水五升煮取二升分再服差若無蘇方取緋衣煮汁服亦得海藥云謹按徐表南海記生海畔葉似降木若女楨味平無毒主虛勞血癖氣壅滯産後惡露不安怯起衝心腹中攪痛及經絡不通男女中風口噤不語宜此法細研乳頭香細末方寸七酒煎蘇方去滓調服立吐惡物差白楊樹皮味苦無毒主毒風腳氣腫四肢緩弱不隨毒氣遊易在皮膚中痰癖等酒漬服之取葉圓大蒂小無風自動者圖經曰白楊舊不載所出州土今處處有之北土尤多人種於墟墓間株大葉圓如梨皮白木似楊故名白楊採其皮無時衍義曰白楊陜西甚多永耀間居人修蓋多此木也然易生根斫木時碎札入土即生根故易以繁植非止墟墓間於人家舍前後及夾道往往植之土地所宜爾風才至葉如大兩聲葉梗故如是又謂無風自動則無此事桄榔子味苦平無毒主宿血其木似栟櫚堅硬斫其內有麵大者至數斛食之不飢其皮堪作綆生嶺南山谷今附圖經曰桄榔生嶺南山谷今二廣州郡皆有之人家亦植於庭除間其木似栟櫚而堅硬斫其間有麵大者至數石食之不飢其皮至柔皮韌可以作綆其子作穗生木端不拘時月採之海藥謹按嶺表録云生廣南山谷樹身皮葉與蕃棗檳榔等小異然葉下有髮如粗馬尾廣人用織巾子木皮內有麵食之極有補益虛羸乏損腰腳無力久服輕身辟穀録異云桄榔蓋以此也櫸樹皮大寒主時行頭痛熱結在腸胃唐本注云此樹所在皆有多生溪澗水側葉似樗而狹長樹大者連抱高數仞皮極粗厚殊不似檀俗人取煮汁以療水及斷痢取小葉挼貼火爛瘡有效衍義曰櫸木皮今人呼為櫸柳然葉似柳非柳謂槐非槐木最大者高五六十尺合二三人抱湖南北甚多然亦下材也不堪為器用嫩皮取以緣栲栳與箕唇釣樟根皮主金瘡止血陶隱居云出桂陽邵陵諸處亦呼作鳥樟方家少用而俗人多識此刮根皮屑以療金瘡斷血易合甚驗唐本注云釣樟生郴州山谷樹高丈餘葉似葉楠而尖長背有赤毛若枇杷葉八月九月採根皮日乾也楠音南千金藤主一切血毒諸氣霍亂中惡天行虛勞瘧瘴痰嗽不利癰腫蛇犬毒藥石發癲癇悉主之生北地者根大如指色黑似漆生南土者黃赤如細辛今附陳藏器云有數種南北名模不同大略主痰相似或是皆近於藤生北地者根大如指色似漆生南土者黃赤如細辛南北所用若取的稱未知孰是其中有草今并入木部草部亦重載也南燭枝葉味苦平無毒止泄除睡強筋益氣力久服輕身長年令人不飢變白去老取莖葉搗碎漬汁浸粳米九浸九蒸九暴米粒緊小正黑如醫珠袋盛之可適遠方日進一合不飢益顔色堅筋骨能行取汁炊飯名烏飯亦名烏草亦名牛筋言食之健如牛筋也色赤名文燭生高山經冬不凋今附圖經曰南燭本經不載所出州土云生高山今惟江東州郡有之株高三五尺葉類苦楝而小陵冬不凋冬生紅子作穗人家多植庭除間俗謂之南天燭不拘時採其枝葉用亦謂之南燭草木其種是木而似草故號為之禹錫云按日華子云黑飯草益腸胃搗汁浸蒸晒乾服又名南燭也無患子皮有小毒主浣垢去面皯喉痹內喉中立開又主飛尸子中人燒令香辟惡氣其子如漆珠生南谷大樹一名噤婁一名桓今附日華子云無患子皮平纂文無患木名實可以去垢核黑如醫問櫨木曰無患何也答曰昔有神巫曰無患此木能作符劾百鬼則以此木為棒殺之世人相傳以此木為衆鬼所惡競取為器用以厭鬼故號無患也衍義曰無患子今釋子取以為念珠出佛經惟取紫紅色小者佳今入藥絶少西洛亦有之梓白皮味苦寒無毒主熱去三蟲療目中疾葉搗傅豬瘡飼豬肥大三倍生河內山谷陶隱居云此即梓樹之皮梓亦有三種當用拌素不腐者葉療手腳火爛瘡桐葉及此以肥豬之法未見應在商丘子養豬經中日華子云煎湯洗小兒壯熱一切瘡疥皮膚瘙癢梓樹皮有數般惟楸梓佳餘即不堪用圖經曰梓白皮生河內山谷今近道皆有之木似桐而葉小花紫爾雅曰椅梓郭注云即楸也詩鄘風云椅桐梓漆陸機云梓者楸之疏理白色而生子者為梓梓實桐皮曰椅大同而小異也又一種鼠梓一名楰亦楸之屬也圖經衍義本草卷之二十四
