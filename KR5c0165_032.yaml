front:
  text: 圖經衍義本草卷之三十二曰七
  hash: sha256:91bc731b77081324fa5077fa7734249113b55521bbd337080c42eec9794a3f0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0165_HFL_032-001a, image: hfl/0547/0547-004.png}
body:
  text: 宋通直郎辨驗藥材寇宗奭編撰宋太醫助教辨驗藥材許洪校正蟲魚部中品蝟蝟皮味苦平無毒主五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之又療腹痛疝積亦燒灰為末酒服之生楚山川谷田野取無時勿使中濕得酒良畏桔梗麥門冬圖經曰猬皮生楚山川谷田野今在處山林中皆有之狀類猯豚腳短多刺尾長寸餘人觸近便藏頭足外皆刺不可嚮爾惟見鵲則反腹受啄或云惡鵲聲故欲掩取之猶蚌𧑐也此類亦多惟蒼白色腳似豬蹄者佳鼠腳者次藥性論云猬皮臣味甘有小毒主腸風瀉血痔病有頭多年不差者炙末白飲下方寸七燒末吹主鼻衄甚解一切藥力陶隱居云田野中時有此獸人犯近便藏頭足毛刺人不可得捉能跳入虎耳中而見鵲便自仰腹受啄物有相制不可思議爾其脂煬鐵注中內少水銀則柔如鉛錫矣日華子云開胃氣止血汗肚脹痛疝氣脂治腸風瀉血作豬蹄者妙鼠腳者次孟詵云猬食之肥下焦理胃氣其脂可主金八石皮燒灰酒服治胃逆又煮汁服止反胃又可五味淹炙食之不得食骨令人瘦小食療云平其肉可食以五味汁淹炙食之良不得食其骨也其骨能瘦人使人縮小也謹按主下焦弱理胃氣令人能食其皮可燒灰和酒服及炙令黃煮汁飲之主胃逆細銼炒令黑入丸中治腸風鼠奶痔效主腸風痔瘻可煮五金八石與桔梗麥門冬反惡外臺祕要方治五痔猬皮方三指大切熏黃如棗大熟艾右三味穿地作坑調和取便熏之取口中熏黃煙氣出為佳火氣稍盡即停三日將息更熏之三度永差勿犯風冷羹臛將補謹忌雞豬魚生冷二十日後補之千金冀方治蠱毒下血猬皮燒末水服方寸匕當吐蠱毒肘後方治腸痔大便血燒猬皮傅之聖惠方治鼻衄塞鼻散用猬皮一大枚燒末研用半錢綿裹塞鼻衍義曰猬皮取乾皮兼刺用刺作刷治紕帛絶佳此物兼治胃逆開胃氣有功從蟲從胃有理焉膽治鷹食病世有養者去而復來久亦不去當縮身藏足之時人溺之即開合穿山甲等分燒存性治痔入肉豆蔻一半末之空肚熱米飲調二錢服隱居所説跳入虎耳及仰腹受啄之事唐本注見擯亦當然露蜂房露蜂房味苦鹹平有毒主驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良又療蜂毒腫一名蜂腸一名百穿一名蜂音窠生牂牁山谷七月七日採陰乾惡乾薑丹參黃芩芍藥牡蠣圖經曰露蜂房生牂牁山谷今處處山林中皆有之此木上大黃蜂窠也大者如甕小者如桶其蜂黑色長寸許螫牛馬及人乃至欲死者用此尤效人家屋間亦往往有之但小而力慢不堪用不若山林中得風露氣者佳古今方書治牙齒湯多用之七月七日採又云十一月十二月採者佳亦解蠱毒又主乳石發動頭痛煩熱口乾便旋赤少者取二分炙以水二升煮取八合分溫再服當利小便諸惡毒隨便出陶隱居云此蜂房多在樹腹中及地中今此曰露蜂當用人家屋間及樹枝間苞裹者乃遠舉牂牁未解所以藥性論云土蜂房亦可單用不入服食能治臃腫不消用醋水調塗乾即更易日華子云露蜂房微毒治牙齒疼痢疾乳癰蜂叮惡瘡即煎洗入藥并炙用千金方蜂螫人用蜂房末豬膏和傅之楊氏産乳蜂房煎湯洗亦得肘後方治若鼻中外查瘤膿水血出蜂房火炙焦末酒服方寸七日七經驗方解藥毒上攻如聖散蜂房甘草等分用麩炒令黃色去麩為末水二碗煎至八分一碗令溫臨卧頓服明日取一惡物簡要濟衆方治婦人乳癰汁不出內結成膿腫名妬乳方蜂房燒灰末每服二錢水一中盞煎至六分去滓溫服勝金方治小兒咳嗽蜂房二兩淨洗去蜂糞及泥土以快火燒為灰每服一字飯飲調下廣利方治頭痛煩熱口乾小便赤少蜂房十二分炙水二升煎取八合分為二服當利小便諸惡石毒隨小便出之又方治熱病後毒氣衝目痛蜂房半兩水二升煮取一升重濾洗目日三四度治赤白翳集驗方治風氣客於皮膚瘙癢不已蜂房炙過蟬蛻等分為末酒調一錢匕日三二服子母祕録方小兒大小便不通蜂房燒末酒服二錢日二服衍義曰露蜂房有兩種一種小而其色淡黃窠長六七寸至一尺者闊二三寸如蜜脾下垂一邊是房多在叢木鬱翳之中世謂之牛舌蜂又一種或在高木上或屋之下外作固如三四斗許小者一二斗中有窠如瓠之狀由此得名蜂色赤黃其形大於諸蜂世謂之玄瓠蜂蜀本圖經言十一月十二月採者應避生息之時也今人用露蜂房兼用此兩種鱉甲鱉甲味鹹平無毒主心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉療溫瘧血瘕腰痛小兒脅下堅肉味甘主傷中益氣補不足生丹陽池澤取無時惡礬石圖經曰鱉生丹陽池澤今處處有之以嶽州沅江其甲有九肋者為勝取無時仍生取甲剔去肉為好不用煮脫者但看有連厭及乾巖便真若上兩邊骨出是已被煮也古今治癥癖虛勞方中用之最多婦人漏下五色羸瘦者燒甲令黃色篩未酒服方寸匕日二又合訶梨勒皮乾薑三物等分為丸空腹服三十丸治癖最良又醋炙令黃搗末以牛乳一合調一匙朝日服之主痃氣其肉食之亦益人補虛去血熱但不可久食則損人以其性冷耳藥性論云鱉甲使惡理石能主宿食癥塊痃癖氣冷瘕勞瘦下氣除骨熱骨節間勞熱結實擁塞治婦人漏下五色羸瘦者但燒甲令黃色為末清酒服之方寸匕日二服陶隱居云生取甲剔去肉為好不用煮脫者今看有連厭及乾巖便好若上有甲兩邊骨出已被煮也用之當炙夏月銼鱉以赤莧包置濕地則變化生鱉人有裹鱉甲屑經五月皆能變成鱉子其肉亦不足食多作癥瘕其目陷者及合雞子食之殺人不可合莧菜食之其肉下有如王字形者亦不可食日華子云鱉益氣調中婦人帶下治血瘕腰痛鱉甲去血氣破癥結惡血墮胎消瘡腫并撲損瘀血瘧疾腸癰頭燒灰療脫肛孟詵云鱉主婦人漏下羸瘦中春食之美夏月有腥氣嶽州昌江者為上赤足不可食殺人雷公云凡使要緑色九肋多裙重七兩者為上治氣破塊消癥定心藥中用之每個寸甲以六一泥固濟瓶子外了乾於大火以物搘於中與頭醋下火煮之盡三升醋為度仍去裙并肋骨了方炙乾然後入藥中用聖惠方治久患勞瘧瘴等方用鱉甲三兩塗酥炙令黃去裙為末臨發時溫酒調下二錢匕又方治小兒尸疰勞瘦或時寒熱方用鱉頭一枚燒灰杵末新汲水下半錢匕千金方治脫肛歷年不愈死鱉頭一枚燒令煙絶杵末以傅肛上手按挼之千金翼方治丈夫陰頭癰師所不能醫鱉甲一枚燒令末之以雞子白和傅之良肘後方治篤病新起早勞食飲多致復欲死燒鱉甲服方寸匕楊氏産乳方療上氣急滿坐卧不得方鱉甲一大兩炙令黃細搗為散取燈心一握熱水二升煎取五合食前服錢匕食後蜜水服一錢匕衍義曰鱉甲九肋者佳煮熟者不如生得者仍以釅醋炙黃色用經中不言治勞惟蜀本藥性論云治勞瘦除骨熱後人遂用之然甚有據亦不可過劑頭血塗脫肛又燒頭灰亦治之蟹蟹味鹹寒有毒主胸中邪氣熱結痛僻面腫敗漆燒之致鼠解結散血愈漆瘡養筋氣爪主破胞墮胎生伊洛池澤諸水中取無時殺莨菪毒圖經曰蟹生伊洛池澤諸水中今淮海京東河北陂澤多有之伊洛乃反難得也八足二螯大者箱角兩出足節屈曲行則旁橫今人以為食品之佳味獨螯獨目及兩目相向者皆有大毒不可食其黃能化漆為水故塗漆瘡用之黃并肉熬末以內金瘡中筋斷亦可續黃并螯燒煙可以集鼠於庭爪入藥最多胡洽療孕婦僵仆胎轉上搶心困篤有蟹爪湯之類是也陶隱居云蟹類甚多蝤音遒蛑音謀擁劍彭螖音越皆是并不入藥惟蟹最多有用仙方以化漆為水服之長生以黑大血灌之二日燒之諸鼠畢至未被霜甚有毒云食水莨音建所為人中之不即療多死目相向者亦殺人服冬瓜汁紫蘇汁及大黃丸皆得差海邊又有彭蜞擁劍似彭螖而大似蟹而小不可食蔡謨初渡江不識而啖之幾死嘆曰讀爾雅不熟幾為勸學所誤日華子云螃蟹涼微毒治産後肚痛血不下并酒服筋骨折損傷生搗炒罯良腳爪破宿血止産後血閉肚痛酒及醋湯煎服良又云蝤蛑冷無毒解熱氣治小兒痞氣孟詵云蟹主散諸熱治胃氣理經脈消食八月輸芒後食好未輸時為長未成就醋食之利肢節去五臟中煩悶氣其物雖形狀惡食甚宜人百一方金瘡方續筋多取蟹黃及腦并足中肉熬末納瘡中簡要濟衆方小兒解顱不合生蟹足骨半兩焙乾白斂半兩為末用乳汁和貼骨縫上以差為度楊氏産乳方妊娠人不得食螃蟹令兒橫生也衍義曰蟹伊洛絶少今多自京師來京師亦自河北置之今河北沿邊滄瀛州等處所出甚多徐州亦有但不及河北者小兒解顱以螯并白及爛搗塗𩕄上顱合此物極動風體有風疾人不可食屢見其事洎北人取之當八九月蟹浪之時直於塘濼岸上伺其出水而拾之又夜則以燈火照捕始得之時黃與白滿殼凡收藏十數日不死亦不食此物每至夏末秋初則如蟬蛻解當日名蟹之意必取此義蚱蟬蚱蟬蚱音笮又音側味鹹甘寒無毒主小兒驚癇夜啼癲病寒熱驚悸婦人乳難胞衣不出又墮胎生楊柳上五月採蒸乾之勿令蠹圖經曰蚱蟬本經不載所出州土但云生楊柳上今在處有之陶隱居以為啞蟬蘇恭以為鳴蟬二説不同按字書解蚱字云蟬聲也月令仲夏之月蟬始鳴言五月始有此蟬鳴也而本經亦云五月採正與月令所記始鳴者同時如此蘇説得之矣蟬類甚多爾雅云蝒馬蜩郭璞注云蜩中最大者為馬蟬今夏中所鳴者比衆蟬最大陶又引詩鳴蜩嘒嘒云是形大而黑昔人所啖者又禮冠之飾附蟬者亦黑而大皆此類也藥性論云蚱蟬使味酸主治小兒驚哭不止殺疳蟲去壯熱治腸中幽幽作聲又云蟬蛻使主治小兒渾身壯熱驚癇兼能止渴唐本汪云别録云殼名枯蟬一名伏音育主小兒癇女人生子不出灰服之主久痢又云蚱者鳴蟬也主小兒癇絶不能言今云啞蟬啞者則雌蟬也極乖體用按諸蟲獸雄者為良雷公云味鹹無毒聖惠方治風頭旋用蟬殼二兩微炒為末非時溫酒下一錢匕集驗方治風氣客皮膚瘙癢不已蟬蛻薄荷葉等分為末酒調一錢匕日三服御藥院方治頭風目眩蟬蛻末飲湯下衍義曰蚱蟬夏月身與聲皆大者是始終一般聲仍皆乘昏夜方出土中升高處背殼拆蟬出所以皆夜出者一以畏人二畏日炙乾其殼而不能蛻也至時寒則墜地小兒蓄之雖數日亦不須食古人以謂飲風露信有之蓋不糞而溺亦可見矣西川有蟬花乃是蟬在殼中不出而化為花自頂中出又殼治目昏翳又水煎殼汁治小兒出瘡疹不快甚良蟬花蟬花味甘寒無毒主小兒天吊驚癇瘛瘲夜啼心悸所在皆有七月採生苦竹林者良花出士上圖經曰文具蚱蟬條下雷公云凡使要白花全者收得後於屋下東角懸乾去甲土後用漿水煮一日至夜焙乾碾細用之衍義曰文具蚱蟬條下蠐螬蠐螬味鹹微溫微寒有毒主惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜療吐血在胸腹不去及破骨踒折血結金瘡內塞産後中寒下乳汁一名蟦扶文切蠐一名音肥齊一名勃齊生河內平澤及人家積糞草中取無時反行者良蜚蠊為之使惡附子圖經曰蠐螬生河內平澤及人家積糞草中今處處有之大者有如足大指以背行反駃於腳採無時反行者良此爾雅所謂蟦蠐螬郭璞云在糞土中者是也而諸朽木中蠹蟲形相似但潔白於糞土中者即爾雅所云蝤蠐蝎又云蝎蛣䖦又云蝎桑蟲郭云在木中雖通名蝎所在異者是此也蘇恭以謂入藥當用木中者乃與本經云生積糞草中相戾矣藥性論云蠐螬臣汁主滴目中去翳障主血止痛陶隱居云大者如足大指以背行反駃於腳雜豬蹄作羹與乳母不能别之詩云領如蝤蠐今此别之名以蠐字在下恐此云蠐螬倒爾唐本注云此蟲有在糞聚或在腐柳樹中者內外潔白土糞中者皮黃內黑黯形色既異土木又殊當以木中者為勝採雖無時亦宜取冬月為佳按爾雅一名蝎音曷一名蛣䖦一名蝤蠐今按陳藏器本草云蠐螬主赤白遊疹以物發疹破碎蠐螬汁塗之禹錫云按蜀本注云今據爾雅蟦蠐螬注云在糞土中本經亦云一名蟦蠐又云生積糞草中則此外恐非也今諸朽樹中蠹蟲俗通謂之蝎莫知其主療惟柳樹中者近方用之治眼得效外臺祕要方刪繁丹走皮中浸淫名火丹方取蠐螬末傅之千金方治稻麥芒入眼取蠐螬以新布覆目上持蠐螬從布上摩之其芒出著布上良也百一方諸竹木刺得肉中不出蠐螬碎之傅刺上立出衍義曰蠐螬此蟲諸腐木根下有之構木津甘故根下多有此蟲其木身未有完者亦有生於糞土中者雖肥大但腹中黑不若木中者雖瘦而稍白生研水絞汁濾清飲下妙烏賊魚烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥肉味酸平主益氣強志生東海池澤取無時惡白斂白及附子圖經曰烏賊魚出東海池澤今近海州郡皆有之云是顯為所化今其口腳猶存頗相似故名烏鰂能吸波噀墨以溷水所以自衛使水匿不能為人所害又云性嗜烏每暴水上有飛烏過謂其已死便啄其腹則卷取而食之以此得名言為烏之賊害也形若革囊口在腹下八足聚生口傍只一骨厚三四分似小舟輕虛而白又有兩鬚如帶可以自纜故别名纜魚南越志云烏賊有碇遇風便虬前一鬚下碇而往碇亦纜之義也腹中血及膽正如墨中以書也世謂烏賊懷墨而知禮藥性論云烏賊魚骨使有小毒止女人漏血主耳聾陶隱居云此是顯音剝烏所化作今其口腳具存尤相似爾用其骨亦炙之其魚腹中有墨今作好墨用之唐本注云此魚骨療牛馬目中障翳亦療人目中翳用之良也陳藏器云烏賊魚骨主小兒痢下細研為末飲下之亦主婦人血瘕殺小蟲并水中蟲投骨於井中蟲死腹中墨主血刺心痛醋摩服之海人云昔秦王東遊棄算袋於海化為此魚其形一如算袋兩帶極長墨尤在腹也孟詵云烏賊骨主目中一切翳細研和蜜點之又骨末治眼中熱淚日華子云烏賊魚通月經骨療血門殺蟲心痛甚者炒其墨醋調服也又名纜魚鬚腳悉在眼前風波稍急即以鬚粘石為纜食療云骨主小兒大人下痢炙令黃去皮細研成粉粥中調服之良其骨能銷一切目中浮翳細研和蜜點之妙又點馬眼熱泪甚良久食之主絶嗣無子益精其魚腹中有墨一片堪用書字聖惠方治傷寒熱毒氣攻眼生赤白翳用烏賊魚骨一兩不用夫皮杵末入龍腦少許更研令細日三四度取少許點之外臺祕要方治癧瘍風取三年醋磨烏賊魚骨先布磨肉赤即傅之千金方治婦人水户痛烏賊魚骨燒末酒下方寸已日二服子母祕録方治小兒重舌燒烏賊魚骨和雞子黃傅喉及舌上衍義曰烏賊魚乾置四方人炙食之又取骨鏤為鈿研細水飛沉下比去水日乾之熟蜜和得所點目中翳緩取效鰻鱺魚鰻鱺魚鰻音曼鱺音黎味甘有毒主五痔瘡瘻殺諸蟲圖經曰鰻鱺魚本經不載所出州土今在處有之似鱔而腹大青黃色云是蛟蜃之類善攻崎岸使輒頽弛近江河居人酷畏之此魚雖有毒而能補五臟虛損久病罷瘵人可和五味以米煮食之患諸瘡痔漏及有風者長食歙州出一種背有五色紋其功最勝出海中者名海鰻相類而大功用亦同海人又名慈鰻又名猧狗魚陶隱居云能援樹食藤花形似鱔取作臛食之炙以熏諸木竹辟蛀蟲膏療諸瘻瘡又有鰍音秋亦相似而短也日華子云海鰻平有毒治皮膚惡瘡疥疳𧈟痔瘻又名慈鰻猧狗魚又云鰻魚平微毒治勞補不足殺傳尸疰氣殺蟲毒惡瘡暖腰膝起陽療女人産尸瘡蟲癢聖惠方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶用鰻鱺魚淡炙令熟令患人三五度食之又方治骨蒸勞及腸風下蟲以魚二斤治如食法切作段子入鐺內以酒三盞煮鹽醋食經驗方治惡瘡用鮀魚骨作末入諸色膏藥中相和合傅上紙花子貼之食醫心鏡云主五痔瘻瘡殺蟲方鰻鱺魚一頭治如食法切作片炙著椒鹽醬調和食之稽神録云有人多得勞疾相因染死者數人取病者於棺中釘之棄於水永絶傳染之病流之於江金山有人異之引岸開視見一女尤活因取置漁舍多得鰻鱺魚食之病愈遂為漁人妻衍義曰鰻鱺魚生剖曬乾取少許火上微炙俟油出塗白剝風以指擦之即時色轉凡如此五七次用即愈仍先於白處微微擦動鮀魚甲鮀音駝味辛微溫有毒主心腹癥瘕伏堅積聚寒熱女子崩中下血五色小腹陰中相引痛瘡疥死肌五邪涕泣時驚腰中重痛小兒氣癃眥潰肉主少氣吸吸足不立地生南海池澤取無時蜀漆為之使畏狗膽芫花甘遂圖經曰鮀甲生南海池澤今江湖中多即鼉也形似守宫陵鯉輩而長一二丈背尾俱有鱗甲善攻崎岸夜則出邊岸人甚畏之南人食其肉云色白如雞但發冷氣痼疾其皮亦中冒鼓其頭骨燒灰研末米飲服主腸風痔疾甚者入紅雞冠花末白礬為末和之空腹服便差今醫者少有用黿鮀甲者陳藏器云主惡瘡腹內癥瘕甲更佳炙酒浸服之口內涎有毒也藥性論云鼉甲臣味甘平有小毒主百邪鬼魅婦人帶下除腹內血積聚伏堅相引結痛孟詵云黿療驚恐及小腹氣疼日華子云黿甲臣平無毒主五臟邪氣殺百蟲毒消百藥毒續人筋骨又脂塗鐵燒之便明淮南王方術內用之白殭蠶白殭蠶味鹹辛平無毒主小兒驚癇夜啼去三蟲滅黑皯令人而色好男子陰瘍病女子崩中赤白産後餘痛滅諸瘡瘢痕生潁川十澤四月取自死者勿令中濕濕有毒不可用也圖經曰白殭蠶生潁川平澤今所在養蠶處皆有之用自殭死白色而條直者為佳四月取勿令中濕濕則有毒不可用用時仍去綿絲及子炒過今醫家用治中風急喉痹欲死者搗篩為末生薑自然汁調灌之下喉立愈又合衣魚鷹屎白等分為末面膏和塗瘡瘢疵便出藥性論云白殭蠶惡桑螵蛸桔梗茯苓茯神萆薢有小毒治口噤發汗主婦人崩中下血不止與衣中白魚鷹屎白等分治瘡滅瘢陶隱居云人家養蠶時有合箔皆殭者即暴燥都不壞今見小白色似有鹽度者為好末以塗馬齒即不能食草以桑葉拭去乃還食此明蠶即馬類也日華子云殭蠶治中風失音并一切風疾小兒客忤男子陰癢痛女子帶下入藥除綿絲并子盡勻炒用又云蠶蛹子食治風及勞瘦又研傅蠶瘑惡瘡等聖惠方治風遍身癮疹疼痛成瘡用白殭蠶少許焙令黃色細研為末用酒服之立差又方主偏正頭疼并夾腦風連兩太陽穴疼痛以白殭蠶細研為末溫茶調服方寸七小兒宫氣方主小兒口瘡通白者及風疳瘡蝕透者以白殭蠶炒令黃色拭去蠶上黃肉毛為末用蜜和傅之立效斗門方治中風急喉痹欲死者用白殭蠶以火焙乾令黃色搗篩為末用生薑自然汁調灌千金方主婦人崩中下血不止以衣中白魚殭蠶等分為末以井花水服之日三服即差衍義曰白殭蠶然蠶有兩三番惟頭番殭蠶最佳大而無蛆治小兒驚風白殭蠶蝎梢等分天雄尖附子尖共一錢微炮過為細末每服一字或半錢以生薑溫水調灌之其蠶蛾則第二番者以其敏於生育蠶蛾原蠶蛾雄者有小毒主益精氣強陰道交接不倦亦止精屎溫無毒主腸鳴熱中消渴風痹癮疹陶隱居云原蠶是熏養者俗呼為魏蠶道家用其蛾止精其甕繭入術用屎名蠶沙多入諸方用不但尉風而已也圖經曰原蠶蛾本經不載所出州土今東南州郡多養此蠶處處皆有之此是重養者俗呼為晚蠶北人不甚再養蓋惡其損桑而周禮禁原蠶者鄭康成注云為其傷馬傷馬亦是其一事耳淮南子曰原蠶一歲再登非不利也然王法禁之者為其殘桑是也人既稀養市中貨者亦多早蛾不可用也至於用蠶沙蠶退亦須用晚出者惟白殭蠶不看早晚但用白而條直者陳藏器云原蠶一名蠶沙淨收取曬乾炒令黃袋盛浸消去風護諸節不隨皮膚頑痹腹內宿冷冷血瘀血腰腳疼冷炒令熱袋盛熱尉之主偏風筋骨癱緩手足不隨及腰腳軟皮膚頑痹禹錫云按日華子云晚蠶蛾壯陽事止泄精尿血暖水臟又蠶蛾平治暴風金瘡凍瘡湯火瘡并滅瘡瘢入藥炒用又云蠶布紙平治吐血鼻洪腸風瀉血崩中帶下赤白痢傅丁腫瘡入藥燒用又云蠶沙治風痹頑疾不仁腸鳴聖惠方治風瘙癮疹遍身癢成瘡用蠶沙一升水二斗煮取一斗二升去滓溫熱洗宜避風勝金方治刀斧傷止血生肌天蛾散晚蠶蛾為末摻勻絹裹隨手瘡合血止一切金瘡亦治簡要濟衆方小兒撮口及發噤方晚蠶蛾二枚炙令黃為末蜜和傅兒口唇內衍義曰原蠶蛾有原復敏速之義此則第二番蛾也白殭蠶條中已具屎飼牛代穀又以三升醇酒拌蠶屎五斗用甑蒸熱於暖室中鋪於油單上令患風冷氣閉及近感癱風人就所患一邊卧看溫熱厚蓋覆汗出為度若虛人須常在左右防大熱昏冒仍令頭面不得壅覆未全愈間再作蠶退主血風病益婦人一名馬鳴退近世醫家多用蠶退紙而東方諸醫用蠶欲老眠起所蛻皮雖二者之用各殊然東人所用者為正用之當微炒和諸藥可作丸散服集驗方治纏喉風及喉痹牙癰口瘡并小兒走馬疳蠶蛾退紙不計多少燒成灰存性又煉蜜和丸如雞頭大含化咽津牙宣牙癰揩齦上口瘡乾傅患處小兒走馬疳入麝香少許貼患處佳衍義曰蠶退治婦人血風此則眠起時所蛻皮也其蠶退紙謂之蠶連亦燒灰用之治婦人血露蛞蝓蛞蝓上音闊下音俞味鹹寒無毒主賊風口乖切僻軼音益筋及脫肛驚癇攣縮一名陵蠡一名土蝸一名附蝸生泰山池澤及陰地沙石垣下八月收陶隱居云今蛞蝓無殼不應有蝸名其附蝸者復名蝸牛生池澤沙石則應是今山蝸或當言其頭形類猶似蝸牛蟲者俗名蝸牛者作瓜字則蝸字亦音瓜莊子所云戰於蝸角也蛞蝓入三十六禽限又是四種角蟲之例營室星之精矣方家殆無復用乎禹錫云按爾雅云附螔螺蝓注云蝸牛也而玉篇蝓字下注亦云螔蝓蝸牛也此則一物明矣形似小螺白色生池澤草樹間頭有四角行則出驚之則縮首尾俱能藏入殼中而蘇注云無殼蝸牛非也衍義曰蛞蝓蝸牛二物矣蛞蝓其身肉止一段蝸牛背上别有肉以負殼行顯然異矣其為一物經中焉得分為二條也其治療亦大同小異故知别類又謂蛞蝓是蝸牛之老者甚無謂蛭蝓有二角蝸牛四角兼背有皮殼肉豈得為一物也蝸牛味鹹寒主賊風僻踠跌大腸下脫肛筋急及驚癇陶隱居云蝸牛字是力戈切而俗呼為瓜牛生山中及人家頭形如蛞蝓但背負殼爾前以注説之海邊又一種正相似火炙殼便走出食之益顔色名為寄居方家既不復用人無取者禹錫云按藥性論云蝸牛角亦可單用又名蠡牛有小毒能治大腸脫肛生研取服止消渴日華子云冷有毒治驚癇等入藥炒用此即負殼蜒蚰也聖惠方治齒𧈟并有蟲用蝸牛殼三十枚燒灰細研每用揩齒良又方治蜈蚣咬方用蝸牛挎取汁滴入咬處又方治大腸久積則虛冷因大便脫肛收不得蝸牛一兩燒灰豬脂和傅之集驗方治發背以蝸牛一百枚活者以一升淨瓶入蝸牛用新汲水一盞浸瓶中封繫自晚至明取蝸牛放之其水如涎將真蛤粉不以多少調以雞翎刷瘡上日可十餘度其熱痛止瘡便愈衍義曰文具蛞蝓條下石龍子石龍子味鹹寒有小毒主五癃邪結氣破石淋下血利小便水道一名蜥蜴上音錫下音亦一名山龍子一名守宫一名石蜴生平陽川谷及荆山山石間五月取著石上令乾惡硫黃斑貓蕪荑陶隱居云其類有四種一大形純黃色為蛇醫母亦名蛇舅母不入藥次似蛇醫小形長尾見人不動名龍子次有小形而五色尾青碧可愛名蜥蜴并不螫人一種喜緣籬壁名蝘蜓形小而黑乃言螫人必死而未嘗聞中人按東方朔云是非守宫則蜥蜴如此蝘蜓名守宫矣以朱飼之滿三斤殺乾末以塗女子身有交接事便脫不爾如赤志故謂守宫今此一名守宫猶如野葛鬼臼之義也殊難分别禹錫云按蜀本圖經云長者一尺今出山南襄州安州申州以三四八九月採去腹物火乾衍義曰石龍子蜥蜴也今人但呼為蜴蜥大者長七八寸身有金碧色孝仁廟朝有一蜥蜴在右掖門西濬溝廟中此真是蜥蜴也鄭狀元有詩有樵者於澗下行見一蜴自石罅中出飲水訖而入良久凡百十次尚不已樵者疑不免翻石視之有冰雹一二升樵人訝而去行方三五里大雨至良久風雹暴作今之州縣依法用此祈雨經云治五癃破石淋利水道亦此義乎樗雞樗雞樗丑如切味苦平有小毒主心腹邪氣陰痿益精強志生子好色補中輕身又療腰痛下氣強陰多精不可近目生河內川谷樗樹上七月採暴乾陶隱居云形似寒螀而小今出梁州方用至稀惟合大麝香丸用之樗樹似漆而臭今以此樹上為好亦如芫菁亭長必以芫葛上為良矣唐本注云此物有二種以五色具者為雄良青黑質白斑者是雌不入藥用今出歧州河內無此物衍義曰樗雞東西京界尤多形類蠶蛾但頭足微黑翅兩重外一重灰色下一重深紅五色皆具腹大此即樗雞也今人又用之行瘀血月閉木虻木虻音萌味苦平有毒主目赤痛眥傷淚出瘀血血閉寒熱酸廝音西無子一名魂常生漢中川澤五月取圖經曰木虻生漢中川澤蜚生江夏川谷今并處處有之而襄漢近地尤多虻有數種皆能啖牛馬血木虻最大而緑色幾若蜩蟬蜚虻狀如蜜蜂黃色醫方所用虻蟲即此也又有一種小虻名鹿虻大如蠅咂牛馬亦猛三種大抵同體俱能治血而方家相承只用蜚虻他不復用并五月採腹有血者良人伺其啖嚙牛馬時腹紅者掩取乾之用入藥須去翅足也陶隱居云此虻不啖血狀似虻而小近道中不見市人亦常有賣者方家所用惟蜚虻也淮南子散積血斫木愈齲丘主切此以類推之者也然今本草不著斫木之治病亦漏脫耳肘後方葛氏云蛇螫人九竅皆血出方取虻蟲初食牛馬血腹滿者二七枚燒服之衍義曰木虻大小有三種蜚虻今人多用之大如蜜蜂腹凹偏微黃緑色雄霸州順安軍沿塘濼界河甚多以其惟食牛馬等血故治瘀血血閉蟅蟲蟅蟲蟅音柘味鹹寒有毒主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名地鱉一名土鱉生河東川澤及沙中人家墻壁下土中濕處十月暴乾畏皂角菖蒲陶隱居云形扁扁如鱉故名土鱉而有甲不能飛小有臭氣今人家亦有之唐本注云此物好生鼠壤土中及屋壁下狀似鼠婦而大者寸餘形似鱉無甲但有鱗也禹錫云按藥性論云蟅蟲使畏屋遊味苦鹹治月水不通破留血積聚張仲景治雜病方主久瘕積結有大黃蟅蟲丸又大鱉甲丸中并治婦人藥并用衍義曰蟅蟲今人謂之簸箕蟲為其像形也乳脈不行研一枚水半合瀘清服勿使服藥人知也鮫魚沙魚鮫魚皮主蠱氣蠱疰方用之即裝刀靶音霸䱜音鵲魚皮也圖經曰鮫魚皮舊不著所出州土蘇恭云出南海形似鱉無腳而有尾山海經云鮫沙魚其皮可以飾劍是也今南人但謂之沙魚然有二種其最大而長喙如鋸者謂之胡沙性善而肉美小而皮粗者曰白沙肉強而有小毒二種彼人皆鹽為修脯其皮刮治去沙剪為膾皆食品之美者食之益人然皆不類鱉蓋其種類之别耳唐本注云出南海形似鱉無腳而有尾陳藏器云一名沙魚一名鰒魚皮主食魚中毒燒末服之唐本先附禹錫云按蜀本圖經云圓廣尺餘尾長尺許惟無足背皮粗錯日華子云鮫魚平微毒胡洽云治五尸鬼疰百毒惡氣等鮫魚皮散主之鮫魚皮炙朱砂雄黃金牙椒天雄細辛鬼臼麝香乾薑雞舌香桂心莽草各一兩貝母半兩蜈蚣炙蜴蜥炙各二枚凡十六物治下篩溫清酒服半錢七日三漸增至五分七亦作帶之中用蜈蚣蜴蜥皆此品類中故并載方食療云平補五臟作食之亞於鯽魚作鮓鯆食之并同又有大患喉閉取膽汁和白礬灰丸之如豆顆綿裹內喉中良久吐惡涎沫即喉嚨開臘月取之海藥云謹按名醫别録云生廣州南海味甘鹹無毒主心氣鬼疰蠱毒吐血皮上有真珠斑衍義曰鮫魚沙魚皮一等形稍異令人取皮飾鞍劍餘如經青魚青魚味甘平無毒肉主腳氣濕痹作鮓與服石人相反眼晴王能夜視頭中枕蒸取乾代琥珀用之摩服王心腹痛膽主目暗滴汁目中并塗惡瘡生江湖間禹錫云按蕭炳云療卒氣研服止腹痛可白煮吃治腳氣腳弱日華子云作鯖字平微毒治腳軟煩滿益氣力枕用醋摩治水氣血氣心痛不可同葵蒜食之服术人亦勿啖也紫貝紫貝明目去熱毒圖經曰紫貝本經不載所出州土蘇恭注云出東海及南海上今南海多有之即砑磊也形似貝而圓大二三寸儋振夷黎採以為貨市北人惟畫家用砑物又車螯之紫者海人亦謂之紫貝車螯近世治癰疽方中多用其殼燒煅為灰傅瘡南海北海皆有之採無時人亦食其肉云味鹹平無毒似蛤蜊而肉堅硬不及亦可解酒毒不中者殼粗不堪用唐本注云形似貝圓大二三寸生東海及南海上紫斑而骨白唐本先附衍義曰紫貝大二三寸背上深紫有點俱黑本經以此燒存性入瞭眼藥緣桑螺主人患脫肛燒末和豬膏傅之脫肛立縮此螺全似蝸牛黃小雨後好緣桑葉范汪方脫肛緣桑樹螺燒之以豬脂和傅之立縮亦可末傅之蜚虻味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水不通積聚除賊血在胸腹五臟者及喉痹結塞生江夏川谷五月取腹有血者良陶隱居云此即今啖牛馬血者伺其腹滿掩取用之方家皆呼為虻蟲矣唐本注云三虻俱食牛馬非獨此也但得即堪用何假血充然始掩取如以義求應如養鷹飢則為用若伺其飽何能除疾爾禹錫云按藥性論云虻蟲使一名蜚虻惡麻黃日華子云破癥結消積膿墮胎入丸散除去翅足炒用之蜚蠊味鹹寒有毒主血瘀癥堅寒熱破積聚喉咽痹內寒無子通利血脈生晉陽川澤及人家屋間立秋採圖經曰文具木虻條下陶隱居云形亦似蟅蟲而輕小能飛舉於草中八月九月知寒多入人家屋裏逃爾有兩三種以作廉薑氣者為真南人亦啖之唐本注云此蟲味辛辣而臭漢中人食之言下氣名曰石薑一名蠦蜰一名負盤别録云形似蠶蛾腹下赤二月八月採此即南人謂之滑蟲也禹錫云按蜀本圖經云金州房州等山人啖之謂之石薑多在林樹間百十為聚爾雅云蜚蠦蜰注云蜰即負盤臭蟲白魚味甘平無毒主胃氣開胃下食去水氣令人肥健大者六七尺色白頭昂生江湖中禹錫云按孟詵云白魚主脾家不足氣不堪多食泥人心雖不發病終養𧈟所食新者好久食令人心腹諸病可煮炙於蔥醋中一兩沸食猶少調五臟氣理經脈日華子云助血脈補肝明目患瘡癰人不可食甚發膿炙瘡不發作鱠食之良鱖魚味甘平無毒主腹內惡血益氣力令人肥健去腹內小蟲背有黑點味尤重昔仙人劉憑常食桂魚今此魚猶有桂名恐是此也生江溪間禹錫云按日華子云微毒益氣治腸風瀉血又名鱖豚水豚河豚味甘溫無毒主補虛去濕氣理腰腳去痔疾殺蟲江河淮皆有陳藏器云如鮎魚口尖一名鮑魚也禹錫云按日華子云河豚有毒又云胡夷魚涼有毒煮和秃菜食良毒以蘆根及橄欖等解之肝有大毒又名魚規魚吹肚魚衍義曰河豚經言無毒此魚實有大毒味雖珍然修治不如法食之殺人不可不謹也厚生者不食亦好蘇子美云河豚於此時貴不數魚蝦此即詩家鄙諷之言未足全信也然此物多怒觸之則怒氣滿腹翻浮水上漁人就以物撩之遂為人獲橄欖并蘆根汁解其毒石首魚味甘無毒頭中有石如棋子主下石淋磨石服之亦燒為灰末服和蓴菜作羹開胃益氣候乾食之名為鮝音想炙食之主消瓜成水亦主卒腹脹食不消暴下痢初出水能鳴夜視有光又野鴨頭中有石云是此魚所化生東海禹錫云按陳士良云石首魚平日華子云取腦中枕燒為末飲下治淋也嘉魚味甘溫無毒食之令人肥健悅澤此乳穴中小魚常食乳水所以益人能久食之力強於乳有似英雞功用同乳陳藏器云吳都賦云嘉魚出於丙穴李善注云丙日出穴今人不然丙者向陽穴也陽穴多生此魚魚復何能擇丙日耶此注誤矣新注云治腎虛消渴及勞損羸瘦皆煮食之又抱朴子云鳩知夜半燕知戊己豈魚不知丙日也食療云微溫常於崖石下孔中吃乳石沫甚補益微有毒其味甚珍美也鯔魚味甘平無毒主開胃通利五臟久食令人肥健此魚食泥與百藥無忌似鯉身圓頭扁骨軟生江海淺水中鱸魚平補五臟益筋骨和腸胃治水氣多食宜人作鮓猶良又暴乾甚香美雖有小毒不至發病一云多食發痃癖及瘡腫不可與乳酪同食食療云平主安胎補中作鱠尤佳衍義曰鱸魚益肝腎補五臟和腸胃食之宜人不甚發病宜然張翰思之也鱟平微毒治痔殺蟲多食發嗽并瘡癬殼入香發衆香氣尾燒焦治腸風瀉血并崩中帶下及産後痢脂燒集鼠陳藏器云味辛無毒主治野雞病殺蟲發嗽殼發衆香尾灰斷産後痢膏燒集鼠未試生南海大者如扇牡牝相隨牝無目得牡始行牡去牝死以骨及尾尾長二尺燒為黑灰末酒下大主産後痢先服生地黃蜜等煎訖然後服尾無不斷也黿鱉魚陶云黿肉補此老者能變化為魅按黿甲功用同鱉甲炙浸酒主瘰癧殺蟲逐風惡瘡瘻風頑疥瘙肉主濕氣諸邪氣蠱消百藥毒張鼎云膏塗摩之便明未試膏摩風及惡瘡子如雞卵正圓煮之白不凝今世人謂藏卵為黿子似此非為木石杌也至難死剔其肉盡頭猶咬物可以張鳶鳥食療云微溫主五臟邪氣殺百蟲蠱毒消百藥毒續人筋又膏塗鐵摩之便明淮南術方中有用處海馬謹按異志云生西海大小如守宫蟲形若馬形其色黃褐性溫平無毒主婦人難産帶之於身神驗此外别無諸要用今無齊蛤遠志注陶云遠志畏齊蛤蘇云藥録下卷有蛤而不言功狀注又云蠟畏齊蛤按齊蛤如蛤兩頭尖小生海水中無别功用海人食之蚱蜢石蟹注陶云石蟹如蚱蜢形長小兩股如石蟹在草頭能飛蟲螽之類無别功與蚯蚓交在土中得之堪為媚藥入拾遺記圖經衍義本草卷之三十二
